<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Comer Rico — Cris</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --teal:#26a69a;--teal-dark:#1a6b64;--teal-light:#4dd0e1;
  --mint:#d6f0eb;--mint-mid:#b8e4dd;--mint-soft:#e8f8f5;
  --text:#1a6b64;--text-soft:#3d8880;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Outfit',sans-serif;background:var(--mint);min-height:100vh;color:var(--text)}
.screen{display:none;min-height:100vh;padding:16px 16px 36px}
.screen.active{display:block}
.max-w{max-width:440px;margin:0 auto;padding-top:12px}

.topbar{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.back-btn{background:rgba(26,107,100,.12);border:none;border-radius:50%;width:40px;height:40px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--teal-dark)}
.topbar h1{font-size:1.15rem;font-weight:700;color:var(--teal-dark)}

.home-header{text-align:center;margin-bottom:12px}
.home-header h1{font-size:1.6rem;font-weight:800;color:var(--teal-dark);margin-bottom:4px}
.home-header p{font-size:.85rem;color:var(--text-soft)}
.home-quokka{display:flex;justify-content:center;margin-bottom:12px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.bubble{background:rgba(255,255,255,.8);border:2px solid var(--mint-mid);border-radius:16px;padding:10px 16px;font-size:.85rem;font-weight:600;color:var(--teal-dark);text-align:center;margin:0 auto 16px;max-width:280px}

.nav-cards{display:flex;flex-direction:column;gap:10px}
.nav-card{border:none;border-radius:16px;padding:16px 18px;font-family:'Outfit',sans-serif;font-size:.95rem;font-weight:700;color:#fff;cursor:pointer;text-align:left;display:flex;align-items:center;gap:14px;width:100%;transition:transform .1s,filter .1s}
.nav-card:active{transform:scale(.97);filter:brightness(.9)}
.nav-card .nic{font-size:1.5rem}
.nav-card .info{display:flex;flex-direction:column;gap:2px}
.nav-card .sub{font-size:.75rem;font-weight:400;opacity:.88}
.c-comida{background:linear-gradient(135deg,var(--teal-dark),var(--teal))}
.c-cena{background:linear-gradient(135deg,#3b82f6,var(--teal))}
.c-test{background:linear-gradient(135deg,#f59e0b,#ef4444)}
.c-shop{background:linear-gradient(135deg,#8b5cf6,#6366f1)}

.card{background:rgba(255,255,255,.82);border-radius:18px;padding:18px;border:2px solid var(--mint-mid);margin-bottom:12px}
.card h2{font-size:1rem;font-weight:700;color:var(--teal-dark);margin-bottom:5px}
.card p{font-size:.84rem;color:var(--text-soft);line-height:1.5}

.btn-row{display:flex;gap:8px;margin-top:12px}
.btn{border:none;border-radius:12px;padding:13px 18px;font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;flex:1;transition:transform .1s,filter .1s}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--teal-dark),var(--teal));color:#fff}
.btn-secondary{background:var(--mint-soft);color:var(--teal-dark);border:2px solid var(--mint-mid)}
.btn-full{width:100%}

/* Tabs comida/cena */
.tabs{display:flex;gap:6px;margin-bottom:16px}
.tab{flex:1;padding:10px;border:2px solid var(--mint-mid);border-radius:12px;background:rgba(255,255,255,.7);font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;color:var(--text-soft);transition:all .2s;text-align:center}
.tab.active{background:var(--teal-dark);color:#fff;border-color:var(--teal-dark)}

/* Recipe cards */
.recipe-card{background:rgba(255,255,255,.85);border-radius:18px;padding:16px;border:2px solid var(--mint-mid);margin-bottom:10px;cursor:pointer;transition:transform .1s,border-color .1s}
.recipe-card:active{transform:scale(.98);border-color:var(--teal)}
.r-head{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.r-emoji{font-size:2rem;flex-shrink:0}
.r-info h3{font-size:.95rem;font-weight:700;color:var(--teal-dark)}
.time-tag{background:var(--teal);color:#fff;border-radius:999px;padding:2px 9px;font-size:.7rem;font-weight:700;margin-top:3px;display:inline-block}
.nutrient-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.nut-chip{background:var(--mint-soft);border:1px solid var(--mint-mid);color:var(--teal-dark);border-radius:999px;padding:2px 8px;font-size:.68rem;font-weight:600}
.recipe-desc{font-size:.8rem;color:var(--text-soft);line-height:1.4;margin-top:6px}

/* Detail */
.section-label{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--teal);margin-bottom:8px}
.ingr-list{list-style:none;font-size:.88rem;line-height:1}
.ingr-list li{padding:7px 0;border-bottom:1px solid var(--mint);display:flex;gap:8px;align-items:flex-start}
.ingr-list li:last-child{border:none}
.ingr-list li::before{content:"•";color:var(--teal);font-weight:700;flex-shrink:0}
.tip-box{background:var(--mint-soft);border-left:4px solid var(--teal);border-radius:0 12px 12px 0;padding:12px 14px;font-size:.83rem;color:var(--text);line-height:1.5;margin-bottom:14px}
.nutri-box{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.nutri-cell{background:rgba(255,255,255,.8);border:2px solid var(--mint-mid);border-radius:12px;padding:10px;text-align:center}
.nutri-cell .val{font-size:1.2rem;font-weight:800;color:var(--teal-dark)}
.nutri-cell .lbl{font-size:.65rem;color:var(--text-soft);margin-top:2px}

/* Cooking */
.step-box{background:var(--mint-soft);border:2px solid var(--mint-mid);border-radius:18px;padding:22px;text-align:center;margin-bottom:14px}
.step-num{font-size:.72rem;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.step-text{font-size:1.02rem;font-weight:600;color:var(--teal-dark);line-height:1.6;margin-bottom:14px}
.step-timer{font-size:3rem;font-weight:800;color:var(--teal-dark);font-variant-numeric:tabular-nums;margin-bottom:2px}
.step-timer-lbl{font-size:.72rem;color:var(--text-soft)}
.prog-wrap{background:var(--mint-mid);border-radius:999px;height:5px;margin-bottom:14px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--teal-dark),var(--teal-light));border-radius:999px;transition:width .6s}
.dots{display:flex;justify-content:center;gap:5px;margin-bottom:12px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--mint-mid);transition:all .3s}
.dot.done{background:var(--teal)}.dot.active{background:var(--teal-light);transform:scale(1.4)}
.done-box{background:linear-gradient(135deg,var(--teal-dark),var(--teal));color:#fff;border-radius:18px;padding:28px;text-align:center;margin-bottom:14px}
.done-box .big{font-size:3rem;margin-bottom:8px}
.done-box h2{font-size:1.3rem;font-weight:800;margin-bottom:6px}
.done-box p{font-size:.88rem;opacity:.9}

/* Test */
.opt-btn{width:100%;border:2px solid var(--mint-mid);border-radius:14px;padding:13px 16px;font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:600;color:var(--teal-dark);background:rgba(255,255,255,.8);cursor:pointer;text-align:left;margin-bottom:8px}
.opt-btn:active{border-color:var(--teal);background:var(--mint-soft)}
.result-box{background:linear-gradient(135deg,var(--teal-dark),var(--teal));color:#fff;border-radius:18px;padding:22px;text-align:center;margin-bottom:14px}
.result-box h2{font-size:1.3rem;font-weight:800;margin-bottom:6px}
.result-box p{font-size:.88rem;opacity:.9;line-height:1.5}

/* Shopping */
.shop-cat h3{font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--teal);margin-bottom:8px;padding-bottom:4px;border-bottom:2px solid var(--mint-mid)}
.shop-cat{margin-bottom:16px}
.shop-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--mint)}
.shop-item:last-child{border:none}
.shop-item input{margin-top:3px;width:18px;height:18px;accent-color:var(--teal);flex-shrink:0;cursor:pointer}
.shop-item label{font-size:.86rem;color:var(--text);line-height:1.4;cursor:pointer}
.shop-item label strong{color:var(--teal-dark)}
.shop-item label small{display:block;color:var(--text-soft);font-size:.73rem;margin-top:1px}
.shop-item.ck label{text-decoration:line-through;opacity:.45}
</style>
</head>
<body>

<!-- HOME -->
<div id="v-home" class="screen active">
<div class="max-w">
  <div class="home-header">
    <h1>🍳 Comer Rico</h1>
    <p>Sin estrés · sin tomate · nutritivo</p>
  </div>
  <div class="home-quokka">
    <svg viewBox="0 0 110 130" width="96" height="113" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="28" cy="22" rx="13" ry="16" fill="#33b5a7"/>
      <ellipse cx="82" cy="22" rx="13" ry="16" fill="#33b5a7"/>
      <ellipse cx="28" cy="23" rx="7" ry="9" fill="#5dcfc2"/>
      <ellipse cx="82" cy="23" rx="7" ry="9" fill="#5dcfc2"/>
      <ellipse cx="55" cy="93" rx="34" ry="36" fill="#33b5a7"/>
      <ellipse cx="55" cy="97" rx="20" ry="25" fill="#5dcfc2" opacity=".65"/>
      <circle cx="55" cy="50" r="30" fill="#33b5a7"/>
      <circle cx="43" cy="47" r="6" fill="#0f4d47"/><circle cx="45" cy="45" r="2.5" fill="white"/>
      <circle cx="67" cy="47" r="6" fill="#0f4d47"/><circle cx="69" cy="45" r="2.5" fill="white"/>
      <ellipse cx="55" cy="58" rx="5" ry="4" fill="#0f4d47"/>
      <path d="M46 65 Q55 74 64 65" stroke="#0f4d47" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <ellipse cx="23" cy="96" rx="11" ry="8" fill="#33b5a7" transform="rotate(-20 23 96)"/>
      <ellipse cx="87" cy="96" rx="11" ry="8" fill="#33b5a7" transform="rotate(20 87 96)"/>
      <ellipse cx="42" cy="126" rx="12" ry="6" fill="#2da098"/>
      <ellipse cx="68" cy="126" rx="12" ry="6" fill="#2da098"/>
      <rect x="42" y="17" width="26" height="9" rx="3" fill="white" opacity=".9"/>
      <ellipse cx="55" cy="17" rx="13" ry="8" fill="white" opacity=".9"/>
    </svg>
  </div>
  <div class="bubble">¿Qué cocinamos hoy? 🌿</div>
  <div class="nav-cards">
    <button class="nav-card c-test" onclick="startTest()">
      <span class="nic">🤔</span>
      <div class="info"><span>¿QUÉ COCINO HOY?</span><span class="sub">Test rápido según cómo estás</span></div>
    </button>
    <button class="nav-card c-comida" onclick="go('recipes');setTab('comida')">
      <span class="nic">☀️</span>
      <div class="info"><span>COMIDAS</span><span class="sub">5 recetas completas y nutritivas</span></div>
    </button>
    <button class="nav-card c-cena" onclick="go('recipes');setTab('cena')">
      <span class="nic">🌙</span>
      <div class="info"><span>CENAS</span><span class="sub">5 cenas ligeras y fáciles</span></div>
    </button>
    <button class="nav-card c-shop" onclick="go('shopping')">
      <span class="nic">🛒</span>
      <div class="info"><span>LISTA DE COMPRAS</span><span class="sub">Todo para 7 días · 1 persona</span></div>
    </button>
  </div>
</div>
</div>

<!-- TEST -->
<div id="v-test" class="screen">
<div class="max-w">
  <div class="topbar"><button class="back-btn" onclick="go('home')">←</button><h1>¿Qué cocino hoy?</h1></div>
  <div id="test-content"></div>
</div>
</div>

<!-- RECIPES -->
<div id="v-recipes" class="screen">
<div class="max-w">
  <div class="topbar"><button class="back-btn" onclick="go('home')">←</button><h1 id="recipes-title">Recetas</h1></div>
  <div class="tabs">
    <button class="tab active" id="tab-comida" onclick="setTab('comida')">☀️ Comidas</button>
    <button class="tab" id="tab-cena" onclick="setTab('cena')">🌙 Cenas</button>
  </div>
  <div id="recipes-list"></div>
</div>
</div>

<!-- DETAIL -->
<div id="v-detail" class="screen">
<div class="max-w">
  <div class="topbar"><button class="back-btn" id="detail-back">←</button><h1 id="detail-title"></h1></div>
  <div id="detail-content"></div>
</div>
</div>

<!-- COOKING -->
<div id="v-cooking" class="screen">
<div class="max-w">
  <div class="topbar"><button class="back-btn" onclick="stopCook();go('detail')">←</button><h1 id="cook-title"></h1></div>
  <div id="cook-content"></div>
</div>
</div>

<!-- SHOPPING -->
<div id="v-shopping" class="screen">
<div class="max-w">
  <div class="topbar"><button class="back-btn" onclick="go('home')">←</button><h1>Lista de Compras</h1></div>
  <div class="card" style="margin-bottom:14px"><p>Para 7 días · 1 persona · sin tomate. Marca según vas comprando — se guarda automáticamente 💚</p></div>
  <div id="shop-list"></div>
  <div class="btn-row">
    <button class="btn btn-secondary" onclick="shareList()">📱 Compartir</button>
    <button class="btn btn-secondary" onclick="clearShop()">↺ Borrar marcas</button>
  </div>
</div>
</div>

<script>
/* ─── DATOS ─── */
const RECIPES = {
comida:[
  { id:'quinoa', emoji:'🥣', name:'Bowl de Quinoa', time:'15 min',
    kcal:'420', prot:'18g', tip:'La quinoa prelavada no necesita lavarse. Si te queda algo, guárdalo en un tupper — aguanta 2 días en la nevera.',
    tags:['Vegetariano','Sin gluten','1 olla'],
    desc:'Proteína completa + grasa buena. Se cocina sola mientras cortas el pepino.',
    nutrients:[{v:'420',l:'kcal'},{v:'18g',l:'proteína'},{v:'22g',l:'grasa sana'}],
    ingredients:['½ taza quinoa prelavada','½ pepino en trozos','Aceitunas negras al gusto','50g queso feta (en dados)','2 cdas aceite de oliva','½ limón (zumo)','Sal'],
    steps:[
      {text:'Pon 1 taza de agua en una olla, enciende fuego medio-alto y espera a que hierva',time:3,voice:'Pon una taza de agua en la olla y enciende el fuego. Espera a que hierva'},
      {text:'Echa la quinoa, baja el fuego, tapa la olla y pon alarma de 12 minutos. No tienes que vigilar nada',time:12,voice:'Echa la quinoa, baja el fuego, tapa y pon doce minutos de alarma. La quinoa se cocina sola'},
      {text:'Mientras esperas: corta el pepino en trozos del tamaño que quieras y ponlos en un bowl',time:3,voice:'Corta el pepino y ponlo en el bowl donde vayas a comer'},
      {text:'Añade las aceitunas y el queso feta al bowl',time:1,voice:'Añade aceitunas y queso feta'},
      {text:'Cuando suene la alarma: apaga el fuego y espera 2 minutos con la olla tapada',time:2,voice:'Apaga el fuego y espera dos minutos con la tapa puesta'},
      {text:'Vierte la quinoa en el bowl, añade aceite, zumo de limón y sal. Mezcla y a comer',time:1,voice:'Vierte la quinoa, añade aceite, limón y sal. Mezcla y a comer'}
    ]},
  { id:'pollo', emoji:'🍗', name:'Pollo al Limón con Arroz', time:'22 min',
    tags:['Proteína','Sin gluten','2 fuegos'],
    desc:'Plato completo: hidratos + proteína magra. El arroz se hace solo.',
    nutrients:[{v:'510',l:'kcal'},{v:'38g',l:'proteína'},{v:'52g',l:'hidratos'}],
    tip:'El truco es no mover el pollo hasta que se despegue solo de la sartén — así queda dorado. Si quemas el arroz, pon el fuego más bajo y tapa.',
    ingredients:['1 pechuga de pollo fileteada','½ taza arroz blanco','1 taza agua','1 limón (zumo + ralladura)','1 diente ajo (o ajo en polvo)','1 cda aceite de oliva','Sal y perejil (opcional)'],
    steps:[
      {text:'Pon el arroz con 1 taza de agua y sal en una olla. Lleva a ebullición, baja el fuego al mínimo, tapa y pon 18 minutos',time:18,voice:'Pon el arroz con agua y sal, lleva a ebullición, baja el fuego al mínimo y tapa. Dieciocho minutos'},
      {text:'Mientras el arroz se hace: sala el pollo y ponlo en una sartén con aceite a fuego medio-alto',time:3,voice:'Sala el pollo y ponlo en la sartén con aceite a fuego medio-alto'},
      {text:'Cocina 4 minutos sin moverlo. Cuando se despegue solo, dale la vuelta',time:4,voice:'Cuatro minutos sin moverlo. Cuando se despegue solo, dale la vuelta'},
      {text:'Otros 4 minutos por el otro lado. Exprímele el limón por encima y apaga',time:4,voice:'Cuatro minutos más, exprime el limón por encima y apaga el fuego'},
      {text:'Sirve el arroz con el pollo encima. Listo',time:1,voice:'Sirve el arroz y el pollo encima. Buen provecho'}
    ]},
  { id:'lentejas', emoji:'🫘', name:'Lentejas Express', time:'12 min',
    tags:['Vegetariano','Sin gluten','Hierro'],
    desc:'Lentejas cocidas de bote — ya están listas, solo calentar y condimentar.',
    nutrients:[{v:'380',l:'kcal'},{v:'22g',l:'proteína'},{v:'9mg',l:'hierro'}],
    tip:'Las lentejas de bote son igual de nutritivas que las secas. Escúrrelas y lávalas bien para quitarles el líquido de conserva.',
    ingredients:['1 bote lentejas cocidas (400g)','1 puñado espinacas congeladas','½ cebolla','1 cda aceite de oliva','1 cdita comino (opcional)','Sal'],
    steps:[
      {text:'Pica la cebolla en trozos. Ponla en una olla con aceite a fuego medio y rehoga 3 minutos removiendo',time:3,voice:'Pica la cebolla y ponla en la olla con aceite. Tres minutos removiendo de vez en cuando'},
      {text:'Añade las espinacas congeladas directamente (sin descongelar). Remueve hasta que se deshagan (2 min)',time:2,voice:'Echa las espinacas congeladas y remueve hasta que se deshagan, unos dos minutos'},

      {text:'Calienta todo junto 5 minutos a fuego medio. Remueve de vez en cuando',time:5,voice:'Calienta cinco minutos a fuego medio removiendo de vez en cuando. Ya está listo'},
    ]},
  { id:'salmon', emoji:'🐟', name:'Salmón con Brócoli', time:'20 min',
    tags:['Omega-3','Sin gluten','Al horno'],
    desc:'Omega-3 + vitaminas. Todo en una bandeja de horno — sin ensuciar nada más.',
    nutrients:[{v:'480',l:'kcal'},{v:'42g',l:'proteína'},{v:'28g',l:'omega-3'}],
    tip:'Si el salmón es congelado, sácalo del congelador la noche anterior o ponlo 15 min en agua fría. El brócoli congelado va directo al horno.',
    ingredients:['1 filete salmón (150-200g)','200g brócoli congelado','1 cda aceite de oliva','½ limón','Sal y pimienta','Ajo en polvo (opcional)'],
    steps:[
      {text:'Enciende el horno a 200°C (o el grill fuerte si no tienes horno convencional). Pon papel de horno en una bandeja',time:2,voice:'Enciende el horno a doscientos grados y pon papel de horno en la bandeja'},

      {text:'Vuelve al horno otros 10-12 minutos hasta que el salmón esté opaco por dentro',time:12,voice:'Al horno otros doce minutos hasta que el salmón esté opaco. Listo para comer'}
    ]},
  { id:'tortilla', emoji:'🥚', name:'Tortilla de Espinacas', time:'12 min',
    tags:['Vegetariano','Sin gluten','Hierro'],
    desc:'Proteína + hierro. Rápida y llena mucho. Con pan integral queda completa.',

    ]}

const TEST = [
  {q:'¿Comida o cena?',opts:[{l:'☀️ Comida (la principal)',v:'comida'},{l:'🌙 Cena (algo más ligero)',v:'cena'}]},
  {q:'¿Cómo está tu energía ahora?',opts:[{l:'😴 Baja — mínimo esfuerzo',v:'baja'},{l:'😊 Normal',v:'normal'},{l:'⚡ Alta, puedo cocinar bien',v:'alta'}]},
  {q:'¿Qué te apetece?',opts:[{l:'🥗 Algo fresco / sin calor',v:'frio'},{l:'🍲 Algo caliente y reconfortante',v:'calor'},{l:'🍽️ Algo completo con proteína',v:'proteina'}]}
];

let curRecipeId=null,curMeal='comida',testStep=0,testAns=[];
let cookStep=0,cookPlaying=false,cookTimer=0,cookInt=null;

function beep(f=600,d=.2){try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.setValueAtTime(.3,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
function vibrate(ms=60){try{if(navigator.vibrate)navigator.vibrate(ms);}catch(e){}}
let _utt=null;
function speak(t){
  try{
    if(!window.speechSynthesis)return;
    speechSynthesis.cancel();
    if(speechSynthesis.paused)speechSynthesis.resume();
    _utt=new SpeechSynthesisUtterance(t);
    _utt.lang='es-ES';_utt.rate=.88;
    const voices=speechSynthesis.getVoices();
    const esVoice=voices.find(v=>v.lang.startsWith('es'));
    if(esVoice)_utt.voice=esVoice;
    speechSynthesis.speak(_utt);
  }catch(e){}
}

function go(v){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('v-'+v).classList.add('active');
  if(v==='shopping')renderShop();
}

/* ── TEST ── */
function startTest(){testStep=0;testAns=[];go('test');renderTest();}
function renderTest(){
  const el=document.getElementById('test-content');
  if(testStep>=TEST.length){
    const rec=pickRec();
    const r=RECIPES[testAns[0]].find(r=>r.id===rec);
    el.innerHTML=`<div class="result-box"><div style="font-size:3rem;margin-bottom:8px">${r.emoji}</div><h2>${r.name}</h2><p>${r.tags.join(' · ')}</p></div>
    <button class="btn btn-primary btn-full" onclick="openRecipe('${testAns[0]}','${r.id}','test')">Ver receta →</button>
    <button class="btn btn-secondary btn-full" style="margin-top:8px" onclick="startTest()">Repetir test</button>`;
    return;
  }
  const s=TEST[testStep];
  el.innerHTML=`<div class="card"><p style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--teal);margin-bottom:8px">Pregunta ${testStep+1} de ${TEST.length}</p><h2 style="font-size:1.05rem;font-weight:700;color:var(--teal-dark)">${s.q}</h2></div>
  ${s.opts.map(o=>`<button class="opt-btn" onclick="testAns_('${o.v}')">${o.l}</button>`).join('')}`;
}
function testAns_(v){beep(400,.1);vibrate(30);testAns.push(v);testStep++;renderTest();}
function pickRec(){
  const meal=testAns[0];const energy=testAns[1];const type=testAns[2];
  const pool=RECIPES[meal];
  if(meal==='cena'){
    if(energy==='baja'||type==='frio') return pool.find(r=>r.id==='garbanzos'||r.id==='hummus')?pool[1].id:pool[0].id;
    if(type==='calor') return 'sopa-cal';
    if(type==='proteina') return 'tortilla-fr';
    return pool[Math.floor(Math.random()*pool.length)].id;
  }
  if(energy==='baja') return 'lentejas';
  if(type==='frio') return 'quinoa';
  if(type==='calor') return 'sopa-cal';
  if(type==='proteina') return energy==='alta'?'salmon':'pollo';
  return pool[Math.floor(Math.random()*pool.length)].id;
}

/* ── RECIPES LIST ── */
function setTab(tab){
  curMeal=tab;
  document.getElementById('tab-comida').classList.toggle('active',tab==='comida');
  document.getElementById('tab-cena').classList.toggle('active',tab==='cena');
  document.getElementById('recipes-title').textContent=tab==='comida'?'Comidas':'Cenas';
  renderRecipeList();
}
function renderRecipeList(){
  const el=document.getElementById('recipes-list');
  el.innerHTML=RECIPES[curMeal].map(r=>`
    <div class="recipe-card" onclick="openRecipe('${curMeal}','${r.id}','recipes')">
      <div class="r-head"><span class="r-emoji">${r.emoji}</span>
        <div class="r-info"><h3>${r.name}</h3><span class="time-tag">${r.time}</span></div>
      </div>
      <p class="recipe-desc">${r.desc}</p>
      <div class="nutrient-row">${r.tags.map(t=>`<span class="nut-chip">${t}</span>`).join('')}</div>
    </div>`).join('');
}

/* ── DETAIL ── */
function openRecipe(meal,id,from){

  const r=RECIPES[meal].find(r=>r.id===id);
  document.getElementById('detail-title').textContent=r.name;
  document.getElementById('detail-back').onclick=()=>go(from==='test'?'test':'recipes');
  document.getElementById('detail-content').innerHTML=`
    <div class="card" style="text-align:center;margin-bottom:12px">
      <div style="font-size:2.8rem;margin-bottom:10px">${r.emoji}</div>
      <div class="nutrient-row" style="justify-content:center">${r.tags.map(t=>`<span class="nut-chip">${t}</span>`).join('')}</div>
    </div>
    <div class="nutri-box">${r.nutrients.map(n=>`<div class="nutri-cell"><div class="val">${n.v}</div><div class="lbl">${n.l}</div></div>`).join('')}</div>
    <div class="tip-box">💡 ${r.tip}</div>
    <p class="section-label">Ingredientes (1 persona)</p>
    <div class="card" style="margin-bottom:14px">
      <ul class="ingr-list">${r.ingredients.map(i=>`<li>${i}</li>`).join('')}</ul>
    </div>
    <button class="btn btn-primary btn-full" onclick="startCook('${meal}','${id}')">🎵 Guía paso a paso →</button>
  `;
  go('detail');
}

/* ── COOKING ── */
function startCook(meal,id){
  curMeal=meal;curRecipeId=id;
  const r=RECIPES[meal].find(r=>r.id===id);
  document.getElementById('cook-title').textContent=r.name;
  cookStep=0;cookPlaying=false;cookTimer=0;
  if(cookInt){clearInterval(cookInt);cookInt=null;}
  go('cooking');renderCook();
}
function stopCook(){
  if(cookInt){clearInterval(cookInt);cookInt=null;}
  cookPlaying=false;
  try{speechSynthesis.cancel();}catch(e){}
}
function renderCook(){
  const r=RECIPES[curMeal].find(r=>r.id===curRecipeId);
  const el=document.getElementById('cook-content');
  if(cookStep>=r.steps.length){
    el.innerHTML=`<div class="done-box"><div class="big">🎉</div><h2>¡A comer!</h2><p>Lo has hecho genial 💚</p></div>
    <button class="btn btn-secondary btn-full" onclick="go('home')">🏠 Inicio</button>
    <button class="btn btn-primary btn-full" style="margin-top:8px" onclick="startCook('${curMeal}','${curRecipeId}')">Repetir</button>`;
    return;
  }
  const s=r.steps[cookStep];
  const pct=(cookStep/r.steps.length)*100;
  const dots=r.steps.map((_,i)=>`<div class="dot ${i<cookStep?'done':i===cookStep?'active':''}"></div>`).join('');
  const t=cookPlaying&&cookTimer>0?cookTimer:s.time*60;
  const mm=String(Math.floor(t/60)).padStart(2,'0');
  const ss=String(t%60).padStart(2,'0');
  el.innerHTML=`
    <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="dots">${dots}</div>
    <div class="step-box">
      <div class="step-num">Paso ${cookStep+1} de ${r.steps.length}</div>
      <div class="step-text">${s.text}</div>
      <div class="step-timer" id="ct">${mm}:${ss}</div>
      <div class="step-timer-lbl">minutos restantes</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="cookToggle()">${cookPlaying?'⏸ Pausar':'▶ Iniciar'}</button>
      <button class="btn btn-primary" onclick="cookNext()">Siguiente →</button>
    </div>`;
}
function cookToggle(){
  if(!cookPlaying){
    cookPlaying=true;
    const r=RECIPES[curMeal].find(r=>r.id===curRecipeId);
    if(!cookTimer||cookTimer<=0) cookTimer=r.steps[cookStep].time*60;
    speak(r.steps[cookStep].voice);vibrate(50);
    cookInt=setInterval(cookTick,1000);
  } else {
    cookPlaying=false;
    if(cookInt){clearInterval(cookInt);cookInt=null;}
    try{speechSynthesis.cancel();}catch(e){}
  }
  renderCook();
}
function cookTick(){
  cookTimer--;
  const el=document.getElementById('ct');
  if(el) el.textContent=String(Math.floor(cookTimer/60)).padStart(2,'0')+':'+String(cookTimer%60).padStart(2,'0');
  if(cookTimer<=0)cookAdv();
}
function cookAdv(){
  if(cookInt){clearInterval(cookInt);cookInt=null;}
  const r=RECIPES[curMeal].find(r=>r.id===curRecipeId);
  cookStep++;cookPlaying=false;cookTimer=0;
  if(cookStep<r.steps.length){beep(600,.15);vibrate(60);}
  else{beep(800,.2);setTimeout(()=>beep(1000,.3),250);vibrate([80,50,80]);}
  renderCook();
}
function cookNext(){if(cookInt){clearInterval(cookInt);cookInt=null;}cookPlaying=false;cookTimer=0;cookAdv();}

/* ── SHOPPING ── */
function getChecked(){try{return JSON.parse(localStorage.getItem('cris_comida_shop')||'{}');}catch(e){return{};}}
function setChecked(d){try{localStorage.setItem('cris_comida_shop',JSON.stringify(d));}catch(e){}}
function renderShop(){
  const el=document.getElementById('shop-list');
  const ck=getChecked();
  el.innerHTML=SHOPPING.map(cat=>`
    <div class="shop-cat">
      <h3>${cat.cat}</h3>
      ${cat.items.map(item=>`
        <div class="shop-item ${ck[item.id]?'ck':''}" id="si-${item.id}">
          <input type="checkbox" id="cb-${item.id}" ${ck[item.id]?'checked':''} onchange="toggleItem('${item.id}',this.checked)">
          <label for="cb-${item.id}"><strong>${item.name}</strong> — ${item.qty}<small>${item.loc}</small></label>
        </div>`).join('')}
    </div>`).join('')+
  `<div class="card" style="background:var(--mint-soft);border:2px solid var(--mint-mid);margin-top:4px"><p style="font-size:.84rem">Con esta compra tienes <strong>5 comidas + 5 cenas distintas</strong> para toda la semana 💚</p></div>`;
}
function toggleItem(id,val){
  beep(400,.08);
  const d=getChecked();d[id]=val;setChecked(d);
  document.getElementById('si-'+id).classList.toggle('ck',val);
}
function clearShop(){setChecked({});renderShop();}
function shareList(){
  const lines=['🛒 Lista de compras — Cris App (7 días)\n'];
  SHOPPING.forEach(cat=>{lines.push('\n'+cat.cat);cat.items.forEach(i=>lines.push('☐ '+i.name+' — '+i.qty+' ['+i.loc+']'));});
  const text=lines.join('\n');
  if(navigator.share) navigator.share({title:'Lista de compras Cris',text}).catch(()=>{});
  else if(navigator.clipboard) navigator.clipboard.writeText(text).then(()=>alert('📋 Lista copiada 💚'));
}
