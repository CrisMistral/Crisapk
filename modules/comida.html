<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Comer Rico — Cris</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--teal:#26a69a;--teal-dark:#1a6b64;--teal-light:#4dd0e1;--mint:#d6f0eb;--mint-mid:#b8e4dd;--mint-soft:#e8f8f5;--text:#1a6b64;--text-soft:#2d6b64}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Outfit',sans-serif;background:var(--mint);min-height:100vh;color:var(--text)}
.screen{display:none;min-height:100vh;padding:16px 16px 100px}
.screen.active{display:block}
.max-w{max-width:440px;margin:0 auto;padding-top:12px}
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.back-btn{background:rgba(26,107,100,.12);border:none;border-radius:50%;width:40px;height:40px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--teal-dark)}
.topbar h1{font-size:1.15rem;font-weight:700;color:var(--teal-dark)}
.home-header{text-align:center;margin-bottom:16px}
.home-header h1{font-size:1.6rem;font-weight:800;color:var(--teal-dark);margin-bottom:4px}
.home-header p{font-size:.85rem;color:var(--text-soft)}
.bubble{background:rgba(255,255,255,.8);border:2px solid var(--mint-mid);border-radius:16px;padding:10px 16px;font-size:.85rem;font-weight:600;color:var(--teal-dark);text-align:center;margin:0 auto 16px;max-width:300px}
.nav-cards{display:flex;flex-direction:column;gap:10px}
.nav-card{border:none;border-radius:16px;padding:16px 18px;font-family:'Outfit',sans-serif;font-size:.95rem;font-weight:700;color:#fff;cursor:pointer;text-align:left;display:flex;align-items:center;gap:14px;width:100%;transition:transform .1s,filter .1s}
.nav-card:active{transform:scale(.97);filter:brightness(.9)}
.nav-card .nic{font-size:1.5rem}
.nav-card .info{display:flex;flex-direction:column;gap:2px}
.nav-card .sub{font-size:.75rem;font-weight:400;opacity:.88}
.c-season{background:linear-gradient(135deg,#059669,var(--teal))}
.c-months{background:linear-gradient(135deg,var(--teal-dark),#0369a1)}
.c-test{background:linear-gradient(135deg,#f59e0b,#ef4444)}
.c-shop{background:linear-gradient(135deg,#8b5cf6,#6366f1)}
.c-express{background:linear-gradient(135deg,#d97706,#f59e0b)}
/* Week menu */
.wk-row{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.85);border:2px solid var(--mint-mid);border-radius:14px;padding:12px 14px;margin-bottom:8px}
.wk-check{width:36px;height:36px;border-radius:50%;border:2.5px solid var(--teal);background:#fff;color:#fff;font-size:1.05rem;font-weight:800;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif}
.wk-done .wk-check{background:var(--teal)}
.wk-done .wk-name,.wk-done .wk-meta{text-decoration:line-through;opacity:.5}
.wk-info{flex:1;cursor:pointer;min-width:0}
.wk-name{font-size:.92rem;font-weight:700;color:var(--teal-dark)}
.wk-meta{font-size:.75rem;color:var(--text-soft);margin-top:2px}
.wk-ingr{font-size:.74rem;color:var(--text-soft);margin-top:5px;line-height:1.5;background:var(--mint-soft);border-radius:8px;padding:5px 8px}
/* Month grid */
.months-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.month-tile{background:rgba(255,255,255,.82);border:2px solid var(--mint-mid);border-radius:16px;padding:14px 8px;text-align:center;cursor:pointer;transition:transform .1s,border-color .1s}
.month-tile:active{transform:scale(.95);border-color:var(--teal)}
.month-tile.current{border-color:var(--teal);background:rgba(38,166,154,.08)}
.month-tile .m-emoji{font-size:1.6rem;display:block;margin-bottom:4px}
.month-tile .m-name{font-size:.8rem;font-weight:700;color:var(--teal-dark)}
/* Season banner */
.season-banner{background:rgba(255,255,255,.82);border:2px solid var(--mint-mid);border-radius:16px;padding:14px 16px;margin-bottom:14px}
.season-banner .sb-title{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--teal);margin-bottom:6px}
.season-chips{display:flex;flex-wrap:wrap;gap:6px}
.s-chip{background:var(--mint-soft);border:1px solid var(--mint-mid);border-radius:999px;padding:4px 10px;font-size:.75rem;font-weight:600;color:var(--teal-dark)}
.season-tip{font-size:.78rem;color:var(--text-soft);margin-top:8px;line-height:1.4}
/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:14px}
.tab{flex:1;padding:10px;border:2px solid var(--mint-mid);border-radius:12px;background:rgba(255,255,255,.7);font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;color:var(--text-soft);text-align:center}
.tab.active{background:var(--teal-dark);color:#fff;border-color:var(--teal-dark)}
/* Recipe cards */
.recipe-card{background:rgba(255,255,255,.85);border-radius:18px;padding:16px;border:2px solid var(--mint-mid);margin-bottom:10px;cursor:pointer;transition:transform .1s,border-color .1s}
.recipe-card:active{transform:scale(.98);border-color:var(--teal)}
.r-head{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.r-emoji{font-size:2rem;flex-shrink:0}
.r-info h3{font-size:.95rem;font-weight:700;color:var(--teal-dark)}
.r-badges{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap}
.badge{border-radius:999px;padding:2px 9px;font-size:.68rem;font-weight:700}
.b-time{background:var(--teal);color:#fff}
.b-budget{background:#fef3c7;color:#92400e}
.recipe-desc{font-size:.8rem;color:var(--text-soft);line-height:1.4;margin-top:6px}
.tag-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.tag{background:var(--mint-soft);border:1px solid var(--mint-mid);color:var(--teal-dark);border-radius:999px;padding:2px 8px;font-size:.65rem;font-weight:600}
/* Detail */
.card{background:rgba(255,255,255,.82);border-radius:18px;padding:18px;border:2px solid var(--mint-mid);margin-bottom:12px}
.card h2{font-size:1rem;font-weight:700;color:var(--teal-dark);margin-bottom:5px}
.card p{font-size:.84rem;color:var(--text-soft);line-height:1.5}
.section-label{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--teal);margin-bottom:8px}
/* Harvard plate */
.harvard-plate{display:flex;gap:6px;margin-bottom:14px}
.hp-seg{border-radius:12px;padding:10px 8px;text-align:center;flex-shrink:0}
.hp-veg{background:#dcfce7;color:#166534;flex:2}
.hp-prot{background:#fef3c7;color:#92400e;flex:1}
.hp-grain{background:#dbeafe;color:#1e40af;flex:1}
.hp-seg .hp-label{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:3px}
.hp-seg .hp-what{font-size:.72rem;font-weight:600;line-height:1.3}
.nutri-box{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.nutri-cell{background:rgba(255,255,255,.8);border:2px solid var(--mint-mid);border-radius:12px;padding:10px;text-align:center}
.nutri-cell .val{font-size:1.2rem;font-weight:800;color:var(--teal-dark)}
.nutri-cell .lbl{font-size:.65rem;color:var(--text-soft);margin-top:2px}
.tip-box{background:var(--mint-soft);border-left:4px solid var(--teal);border-radius:0 12px 12px 0;padding:12px 14px;font-size:.83rem;color:var(--text);line-height:1.5;margin-bottom:14px}
.ingr-list{list-style:none;font-size:.88rem}
.ingr-list li{padding:7px 0;border-bottom:1px solid var(--mint);display:flex;gap:8px;align-items:flex-start}
.ingr-list li:last-child{border:none}
.ingr-list li::before{content:"•";color:var(--teal);font-weight:700;flex-shrink:0}
/* Buttons */
.btn{border:none;border-radius:12px;padding:13px 18px;font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:transform .1s}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--teal-dark),var(--teal));color:#fff;width:100%}
.btn-secondary{background:var(--mint-soft);color:var(--teal-dark);border:2px solid var(--mint-mid);width:100%}
.btn-row{display:flex;gap:8px;margin-top:12px}
.btn-row .btn{flex:1}
/* Cooking */
.step-box{background:var(--mint-soft);border:2px solid var(--mint-mid);border-radius:18px;padding:22px;text-align:center;margin-bottom:14px}
.step-num{font-size:.72rem;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.step-text{font-size:1.02rem;font-weight:600;color:var(--teal-dark);line-height:1.6;margin-bottom:14px}
.step-timer{font-size:3rem;font-weight:800;color:var(--teal-dark);font-variant-numeric:tabular-nums;margin-bottom:2px}
.step-timer-lbl{font-size:.72rem;color:var(--text-soft)}
.prog-wrap{background:var(--mint-mid);border-radius:999px;height:5px;margin-bottom:12px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--teal-dark),var(--teal-light));border-radius:999px;transition:width .6s}
.dots{display:flex;justify-content:center;gap:5px;margin-bottom:12px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--mint-mid)}
.dot.done{background:var(--teal)}.dot.active{background:var(--teal-light);transform:scale(1.4)}
.done-box{background:linear-gradient(135deg,var(--teal-dark),var(--teal));color:#fff;border-radius:18px;padding:28px;text-align:center;margin-bottom:14px}
.done-box .big{font-size:3rem;margin-bottom:8px}
.done-box h2{font-size:1.3rem;font-weight:800;margin-bottom:6px}
.done-box p{font-size:.88rem;opacity:.9}
/* Test */
.opt-btn{width:100%;border:2px solid var(--mint-mid);border-radius:14px;padding:13px 16px;font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:600;color:var(--teal-dark);background:rgba(255,255,255,.8);cursor:pointer;text-align:left;margin-bottom:8px}
.opt-btn:active{border-color:var(--teal);background:var(--mint-soft)}
.result-box{background:linear-gradient(135deg,var(--teal-dark),var(--teal));color:#fff;border-radius:18px;padding:22px;text-align:center;margin-bottom:14px}
.result-box h2{font-size:1.3rem;font-weight:800;margin-bottom:6px}
.result-box p{font-size:.88rem;opacity:.9;line-height:1.5}
/* Shopping */
.shop-cat h3{font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--teal);margin-bottom:8px;padding-bottom:4px;border-bottom:2px solid var(--mint-mid)}
.shop-cat{margin-bottom:16px}
.shop-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--mint)}
.shop-item:last-child{border:none}
.shop-item input{margin-top:3px;width:18px;height:18px;accent-color:var(--teal);flex-shrink:0;cursor:pointer}
.shop-item label{font-size:.86rem;color:var(--text);line-height:1.4;cursor:pointer}
.shop-item label strong{color:var(--teal-dark)}
.shop-item label small{display:block;color:var(--text-soft);font-size:.73rem;margin-top:1px}
.shop-item.ck label{text-decoration:line-through;opacity:.45}

.calm *,.calm *::before,.calm *::after{animation:none !important;transition:none !important}

/* Anillo de tiempo: se vacía según pasa — para ver cuánto queda sin leer números */
.tring{width:176px;height:176px;border-radius:50%;margin:4px auto 10px;display:flex;align-items:center;justify-content:center;background:conic-gradient(#26a69a 360deg,#cde9e4 0);flex-shrink:0;}
.tring-in{width:144px;height:144px;border-radius:50%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px;text-align:center;}
.tring .step-timer{font-size:2.2rem;margin-bottom:0}

/* Quico con manitas (mascota) */
.quico-mascot{position:relative;width:-moz-fit-content;width:fit-content;margin:0 auto 6px;filter:drop-shadow(0 3px 8px rgba(93,64,55,.18));}
.quico-mascot .qm-head{display:block;margin:0;filter:none;}
.qm-paws{position:absolute;left:50%;bottom:-7px;transform:translateX(-50%);width:64%;line-height:0;}
.qm-paws svg{display:block;width:100%;}
</style>
</head>
<body>

<div id="v-home" class="screen active">
<div class="max-w">
  <div class="home-header">
    <img src="../quico/quico_happy.png" alt="Quico" style="width:124px;height:auto;object-fit:contain;display:block;margin:0 auto 6px;filter:drop-shadow(0 4px 10px rgba(93,64,55,.18))">
    <h1>🍳 Comer Rico</h1>
    <p>De temporada · sin tomate · plato Harvard</p>
  </div>
  <div class="bubble" id="home-bubble">¿Qué cocinamos hoy? 🌿</div>
  <div class="nav-cards">
    <button class="nav-card c-test" onclick="startPick()">
      <span class="nic">🍽️</span>
      <div class="info"><span>¿QUÉ COMO HOY?</span><span class="sub" id="home-pick-sub">2 preguntas y te lo digo</span></div>
    </button>
    <button class="nav-card c-season" onclick="go('week')">
      <span class="nic">📅</span>
      <div class="info"><span>MENÚ DE LA SEMANA</span><span class="sub" id="home-week-sub">14 recetas · 1 sola compra</span></div>
    </button>
    <button class="nav-card c-shop" onclick="go('shopping')">
      <span class="nic">🛒</span>
      <div class="info"><span>LISTA DE LA COMPRA</span><span class="sub">Una compra · toda la semana</span></div>
    </button>
    <button class="nav-card c-express" onclick="go('basicos')">
      <span class="nic">⚡</span>
      <div class="info"><span>BÁSICOS SALVAVIDAS</span><span class="sub">Recetas de 10 min con despensa</span></div>
    </button>
    <button class="nav-card c-months" onclick="go('months')">
      <span class="nic">🗓️</span>
      <div class="info"><span>TODOS LOS MESES</span><span class="sub">Recetas de temporada todo el año</span></div>
    </button>
  </div>
</div>
</div>

<div id="v-months" class="screen">
<div class="max-w">
  <div class="topbar"><button class="back-btn" onclick="go('home')">←</button><h1>Elige el mes</h1></div>
  <div class="months-grid" id="months-grid"></div>
</div>
</div>

<div id="v-month" class="screen">
<div class="max-w">
  <div class="topbar"><button class="back-btn" onclick="go('months')">←</button><h1 id="month-title">Enero</h1></div>
  <div class="season-banner" id="season-banner"></div>
  <div class="tabs">
    <button class="tab active" id="tab-c" onclick="setMealTab('comidas')">☀️ Comidas</button>
    <button class="tab" id="tab-n" onclick="setMealTab('cenas')">🌙 Cenas</button>
  </div>
  <div id="month-recipes"></div>
</div>
</div>

<div id="v-detail" class="screen">
<div class="max-w">
  <div class="topbar"><button class="back-btn" id="detail-back">←</button><h1 id="detail-title"></h1></div>
  <div id="detail-content"></div>
</div>
</div>

<div id="v-cooking" class="screen">
<div class="max-w">
  <div class="topbar"><button class="back-btn" onclick="stopCook();go('detail')">←</button><h1 id="cook-title"></h1></div>
  <div id="cook-content"></div>
</div>
</div>

<div id="v-test" class="screen">
<div class="max-w">
  <div class="topbar"><button class="back-btn" onclick="go('home')">←</button><h1>¿Qué como hoy?</h1></div>
  <div id="test-content"></div>
</div>
</div>

<div id="v-week" class="screen">
<div class="max-w">
  <div class="topbar"><button class="back-btn" onclick="go('home')">←</button><h1>Menú de la semana</h1></div>
  <div class="card" style="margin-bottom:14px" id="week-banner"></div>
  <div id="week-list"></div>
</div>
</div>

<div id="v-basicos" class="screen">
<div class="max-w">
  <div class="topbar"><button class="back-btn" onclick="go('home')">←</button><h1>Básicos salvavidas</h1></div>
  <div id="basicos-content"></div>
</div>
</div>

<div id="v-shopping" class="screen">
<div class="max-w">
  <div class="topbar"><button class="back-btn" onclick="go('home')">←</button><h1>Lista de Compras</h1></div>
  <div class="card" style="margin-bottom:14px"><p>Una sola compra para las 14 recetas de la semana + básicos salvavidas · 1 persona · sin tomate. Marca según vas comprando 💚</p></div>
  <div id="shop-list"></div>
  <div class="btn-row">
    <button class="btn btn-secondary" onclick="shareList()">📱 Compartir</button>
    <button class="btn btn-secondary" onclick="clearShop()">↺ Borrar marcas</button>
  </div>
</div>
</div>

<script>
/* Ajustes globales (voz/sonido/vibración/reducir estímulos) — compartidos vía localStorage */
function __cfg(){try{return JSON.parse(localStorage.getItem('cris_cfg')||'{}');}catch(e){return{};}}
function __allow(k){const c=__cfg();return c[k]!==false&&c.calm!==true;}
if(__cfg().calm)document.documentElement.classList.add('calm');

function __ring(id,frac){const r=document.getElementById(id);if(r)r.style.background='conic-gradient(#26a69a '+(Math.max(0,Math.min(1,frac))*360)+'deg,#cde9e4 0)';}

/* ── DATOS ── */
const MONTHS = [
{id:'ene',name:'Enero',emoji:'❄️',
 season:['Puerro','Brócoli','Coliflor','Zanahoria','Col','Naranja'],
 tip:'Las verduras de raíz aguantan toda la semana en la nevera. Compra en mercado para ahorrar.',
 comidas:[
  {id:'ene-c1',emoji:'🥘',name:'Sopa de Puerro y Lentejas',time:'20 min',budget:'€',
   harvard:{veg:'Puerro · zanahoria',prot:'Lentejas',grain:'—'},
   tags:['Vegetariano','Sin gluten'],
   desc:'Caldito que calienta el cuerpo en invierno. Las lentejas de bote hacen este plato muy rápido.',
   nutrients:[{v:'370',l:'kcal'},{v:'18g',l:'proteína'},{v:'9mg',l:'hierro'}],
   tip:'Usa lentejas de bote — ya están cocidas. Solo necesitan 5 min de calor para absorber el sabor.',
   ingredients:['1 puerro','2 zanahorias','1 bote lentejas cocidas (400g)','1L caldo de verduras','1 cda aceite de oliva','Sal, comino'],
   steps:[
    {text:'Corta el puerro y zanahoria en rodajas. Rehoga con aceite en olla a fuego medio 5 min removiendo',time:5,voice:'Corta puerro y zanahoria en rodajas y rehoga con aceite cinco minutos'},
    {text:'Añade el caldo, sube el fuego hasta que hierva, baja a medio y cocina 10 min tapado',time:10,voice:'Añade el caldo, hierve, baja a fuego medio y tapa diez minutos'},
    {text:'Escurre las lentejas y añádelas con sal y comino. 5 min más removiendo y lista',time:5,voice:'Añade las lentejas escurridas con sal y comino. Cinco minutos más y listo'}
   ]},
  {id:'ene-c2',emoji:'🥣',name:'Arroz con Brócoli y Huevo',time:'18 min',budget:'€',
   harvard:{veg:'Brócoli',prot:'Huevo',grain:'Arroz'},
   tags:['Vegetariano','Sin gluten','1 olla'],
   desc:'El brócoli congelado se cocina encima del arroz sin esfuerzo. Rápido y completo.',
   nutrients:[{v:'420',l:'kcal'},{v:'16g',l:'proteína'},{v:'48g',l:'hidratos'}],
   tip:'El brócoli congelado va directo a la olla sin descongelar. El huevo puede ir frito si no dominas el pochado.',
   ingredients:['½ taza arroz blanco','150g brócoli congelado','1 huevo','1 taza agua','1 cda aceite de oliva','Sal, ajo en polvo'],
   steps:[
    {text:'Pon arroz, agua y sal en olla. Hierve, baja al mínimo, tapa. Pon 15 min de alarma',time:15,voice:'Pon el arroz con agua y sal. Hierve, baja al mínimo y tapa quince minutos'},
    {text:'A los 10 min: pon el brócoli congelado encima del arroz sin mezclar. Tapa de nuevo',time:0,voice:'A los diez minutos pon el brócoli encima del arroz y vuelve a tapar'},
    {text:'Fríe el huevo en sartén aparte con aceite. Sirve arroz+brócoli con el huevo encima y ajo en polvo',time:3,voice:'Fríe el huevo y sírvelo encima del arroz con brócoli y ajo en polvo'}
   ]}
 ],
 cenas:[
  {id:'ene-n1',emoji:'🍵',name:'Crema de Coliflor',time:'15 min',budget:'€',
   harvard:{veg:'Coliflor',prot:'—',grain:'Pan integral'},
   tags:['Vegetariano','Sin gluten','Ligera'],
   desc:'Cremosa, suave y reconfortante. La coliflor congelada va directa a la olla.',
   nutrients:[{v:'200',l:'kcal'},{v:'7g',l:'proteína'},{v:'Vit C',l:'inmunidad'}],
   tip:'Tritura bien para que quede suave. Un chorrito de leche de coco al final la hace más cremosa.',
   ingredients:['300g coliflor congelada','½ cebolla','1 vaso caldo de verduras','1 cda aceite de oliva','Sal, nuez moscada','Pan integral para acompañar'],
   steps:[

/* Menú semanal: 14 recetas de la estación actual (6+1 comidas, 6+1 cenas) */
const SEASON_GROUPS=[['dic','ene','feb'],['mar','abr','may'],['jun','jul','ago'],['sep','oct','nov']];
function weekMenu(){
  const curId=MONTHS[new Date().getMonth()].id;
  const grp=SEASON_GROUPS.find(g=>g.includes(curId))||SEASON_GROUPS[0];
  const order=[curId,...grp.filter(x=>x!==curId)];
  const comidas=[],cenas=[];
  order.forEach(id=>{const m=MONTHS.find(m=>m.id===id);if(m){comidas.push(...m.comidas);cenas.push(...m.cenas);}});
  comidas.push(EXPRESS.comidas[0]);
  cenas.push(EXPRESS.cenas[0]);
  return {comidas,cenas};
}
function menuKey(){const d=new Date(),y=d.getFullYear(),s=new Date(y,0,1),w=Math.ceil(((d-s)/864e5+s.getDay()+1)/7);return 'cris_menu_w'+w+'_'+y;}
function getMenuDone(){try{return JSON.parse(localStorage.getItem(menuKey())||'{}');}catch(e){return{};}}
function setMenuDone(d){try{localStorage.setItem(menuKey(),JSON.stringify(d));}catch(e){}}
function remainingMenu(){const w=weekMenu(),d=getMenuDone();return {comidas:w.comidas.filter(r=>!d[r.id]),cenas:w.cenas.filter(r=>!d[r.id])};}
function ingrLine(r){
  const seen={},out=[];
  r.ingredients.forEach(i=>{
    if(PANTRY_RE.test(i))return;
    const n=normIngr(i).toLowerCase();
    if(!seen[n]){seen[n]=1;out.push(n);}
  });
  return out.length?out.join(' · '):'todo de despensa';
}

let __beepCtx=null;function __getCtx(){try{if(!__beepCtx)__beepCtx=new(window.AudioContext||window.webkitAudioContext)();if(__beepCtx.state==='suspended')__beepCtx.resume();return __beepCtx;}catch(e){return null;}}
function beep(f=600,d=.2){if(!__allow('sound'))return;try{const c=__getCtx();if(!c)return;const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.setValueAtTime(.3,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
function vibrate(ms=60){if(!__allow('vib'))return;try{if(navigator.vibrate)navigator.vibrate(ms);}catch(e){}}
let _utt=null;
function speak(t){
  try{if(!__allow('voice'))return;
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    if(window.speechSynthesis.paused)window.speechSynthesis.resume();
    _utt=new SpeechSynthesisUtterance(t);
    _utt.lang='es-ES';_utt.rate=.88;
    const voices=window.speechSynthesis.getVoices();
    const esVoice=voices.find(v=>v.lang.startsWith('es'));
    if(esVoice)_utt.voice=esVoice;
    window.speechSynthesis.speak(_utt);
  }catch(e){}
}

function go(v){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));

  window.scrollTo(0,0);
  if(v==='shopping')renderShop();

  if(v==='basicos')renderBasicos();

}

  document.getElementById('home-bubble').textContent='📅 '+m.name+' · temporada: '+m.season.slice(0,3).join(', ')+' 🌿';

/* ── DETAIL ── */
function findRecipe(id){
  for(const m of MONTHS){
    for(const r of m.comidas)if(r.id===id)return r;
    for(const r of m.cenas)if(r.id===id)return r;
  }
  for(const r of EXPRESS.comidas)if(r.id===id)return r;
  for(const r of EXPRESS.cenas)if(r.id===id)return r;
  return null;
}
let backView='month';
function openRecipe(id,from){

  curRecipe=findRecipe(id);

  const r=curRecipe;

  document.getElementById('detail-back').onclick=()=>go(backView);

/* ── COOKING ── */
function startCook(){
  cookStep=0;cookPlaying=false;cookTimer=0;
  if(cookInt){clearInterval(cookInt);cookInt=null;}
  document.getElementById('cook-title').textContent=curRecipe.name;
  go('cooking');renderCook();
}
function stopCook(){
  if(cookInt){clearInterval(cookInt);cookInt=null;}
  cookPlaying=false;
  try{speechSynthesis.cancel();}catch(e){}
}
function renderCook(){
  const r=curRecipe;const el=document.getElementById('cook-content');
  if(cookStep>=r.steps.length){
    const dn=getMenuDone();
    const inWeek=weekMenu().comidas.concat(weekMenu().cenas).some(x=>x.id===r.id);
    if(inWeek&&!dn[r.id]){dn[r.id]=true;setMenuDone(dn);}
    el.innerHTML=`<div class="done-box"><div class="big">🎉</div><h2>¡A comer!</h2><p>Lo has hecho genial 💚${inWeek?'<br><br>✓ Tachada del menú de la semana':''}</p></div>
    <button class="btn btn-secondary" style="margin-bottom:8px" onclick="go('home')">🏠 Inicio</button>
    <button class="btn btn-primary" onclick="startCook()">Repetir receta</button>`;
    return;
  }
  const s=r.steps[cookStep];
  const pct=(cookStep/r.steps.length)*100;
  const dots=r.steps.map((_,i)=>`<div class="dot ${i<cookStep?'done':i===cookStep?'active':''}"></div>`).join('');
  const t=cookPlaying&&cookTimer>0?cookTimer:s.time*60;
  const mm=String(Math.floor(t/60)).padStart(2,'0'),ss=String(t%60).padStart(2,'0');
  el.innerHTML=`
    <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="dots">${dots}</div>
    <div class="step-box">
      <div class="step-num">Paso ${cookStep+1} de ${r.steps.length}</div>
      <div class="step-text">${s.text}</div>
      ${s.time>0?`<div class="tring" id="ct-ring"><div class="tring-in"><div class="step-timer" id="ct">${mm}:${ss}</div><div class="step-timer-lbl">minutos restantes</div></div></div>`:''}
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="cookToggle()">${cookPlaying?'⏸ Pausar':'▶ Iniciar'}</button>
      <button class="btn btn-primary" onclick="cookNext()">Siguiente →</button>
    </div>`;
  __ring('ct-ring',cookPlaying&&s.time>0?cookTimer/(s.time*60):1);
}
function cookToggle(){
  if(!cookPlaying){
    cookPlaying=true;
    const s=curRecipe.steps[cookStep];
    if(!cookTimer||cookTimer<=0)cookTimer=s.time*60;
    speak(s.voice);vibrate(50);
    if(s.time>0)cookInt=setInterval(cookTick,1000);
  }else{
    cookPlaying=false;
    if(cookInt){clearInterval(cookInt);cookInt=null;}
    try{speechSynthesis.cancel();}catch(e){}
  }
  renderCook();
}
function cookTick(){
  cookTimer--;
  const el=document.getElementById('ct');
  if(el)el.textContent=String(Math.floor(cookTimer/60)).padStart(2,'0')+':'+String(cookTimer%60).padStart(2,'0');
  const _s=curRecipe.steps[cookStep];
  __ring('ct-ring',(_s&&_s.time)?cookTimer/(_s.time*60):0);
  if(cookTimer<=0)cookAdv();
}
function cookAdv(){
  if(cookInt){clearInterval(cookInt);cookInt=null;}
  cookStep++;cookPlaying=false;cookTimer=0;
  if(cookStep<curRecipe.steps.length){beep(600,.15);vibrate(60);}
  else{beep(800,.2);setTimeout(()=>beep(1000,.3),250);vibrate([80,50,80]);}
  renderCook();
}
function cookNext(){if(cookInt){clearInterval(cookInt);cookInt=null;}cookPlaying=false;cookTimer=0;cookAdv();}

/* ── ¿QUÉ COMO HOY? (preguntas fáciles → receta recomendada) ── */
let pickMeal='comidas',pickIdx=0,pickStep='q1',pickAns={};
function startPick(){
  pickMeal=new Date().getHours()<17?'comidas':'cenas';
  pickIdx=0;pickStep='q1';pickAns={};
  go('test');
}
function suggCard(r,from){
  return `<div class="result-box"><div style="font-size:3rem;margin-bottom:8px">${r.emoji}</div>
    <h2>${r.name}</h2><p>${r.time} · ${r.tags.join(' · ')}</p>
    <p style="margin-top:10px;background:rgba(255,255,255,.16);border-radius:10px;padding:8px 12px;font-size:.8rem">🧺 ${ingrLine(r)}</p></div>
    <button class="btn btn-primary" style="margin-bottom:8px" onclick="openRecipe('${r.id}','${from||'test'}')">Ver receta →</button>`;
}
let pickLock=0;
function pickAnswer(k,v){
  const n=Date.now();if(n<pickLock)return;pickLock=n+400; // un doble-toque no salta la siguiente pregunta
  pickAns[k]=v;pickIdx=0;pickStep=k==='t'?'q2':'result';beep(600,.1);vibrate(30);renderPick();
}
function isVeg(r){return r.tags&&r.tags.indexOf('Vegetariano')>=0;}
/* «Proteína animal» incluye el huevo (la promesa del botón es «pescado, pollo o huevo»),
   aunque la receta lleve etiqueta Vegetariano */
function hasAnimal(r){return !!(r.harvard&&/atún|pollo|pavo|pescado|merluza|salmón|sardina|caballa|bacalao|dorada|lubina|gamba|marisco|huevo|bonito|anchoa|jamón|calamar|sepia|pulpo/i.test(r.harvard.prot||''));}
function pickMins(r){const m=parseInt(r.time);return isNaN(m)?99:m;}
/* Filtra lo que queda del menú según las respuestas; si no hay nada exacto, relaja */
function pickFilter(){
  const rem=remainingMenu()[pickMeal];
  const max=pickAns.t==='poca'?12:pickAns.t==='normal'?20:999;
  const tOK=r=>pickMins(r)<=max;
  const pOK=r=>pickAns.p==='igual'?true:pickAns.p==='veg'?isVeg(r):hasAnimal(r);
  let list=rem.filter(r=>tOK(r)&&pOK(r)),note='';
  if(!list.length&&rem.length){list=rem.filter(pOK);if(list.length)note='No queda nada tan rápido — esto es lo más cercano:';}
  if(!list.length&&rem.length){list=rem.filter(tOK);if(list.length)note='De ese tipo no queda esta semana — pero mira:';}
  if(!list.length&&rem.length){list=rem;note='Esto es lo que queda esta semana:';}
  if(!list.length){
    // Semana completada: el salvavidas también respeta tu respuesta si puede
    const ex=EXPRESS[pickMeal].filter(pOK);
    list=ex.length?ex:EXPRESS[pickMeal];
    note='¡Semana completada! 🎉 Un salvavidas de despensa:';
  }
  return {list,note};
}
const pickQ=(title,opts)=>`<div class="card" style="margin-bottom:10px"><p style="font-weight:700;margin-bottom:12px">${title}</p>
  ${opts.map(o=>`<button class="btn btn-primary" style="width:100%;margin-bottom:8px;text-align:left" onclick="pickAnswer('${o[0]}','${o[1]}')">${o[2]}</button>`).join('')}</div>`;
function renderPick(){
  const el=document.getElementById('test-content');
  const chip=(m,l)=>`<button class="tab ${pickMeal===m?'active':''}" onclick="pickMeal='${m}';pickIdx=0;renderPick()">${l}</button>`;
  let body;
  if(pickStep==='q1'){
    body=`<div class="card" style="margin-bottom:10px;text-align:center"><p><strong>Solo 2 preguntas fáciles</strong><br>y te digo qué ${pickMeal==='comidas'?'comer':'cenar'} hoy 😊</p></div>`
      +pickQ('1️⃣ ¿Cuánta energía tienes para cocinar?',[
        ['t','poca','😴 Poca — algo muy rápido'],
        ['t','normal','😊 Normal — hasta 20 minutos'],
        ['t','mucha','⚡ Con ganas de cocinar']]);
  }else if(pickStep==='q2'){
    body=pickQ('2️⃣ ¿Te apetece proteína animal?',[
      ['p','animal','🐟 Sí — pescado, pollo o huevo'],
      ['p','veg','🌱 Mejor vegetariano'],
      ['p','igual','🤷 Me da igual, sorpréndeme']]);
  }else{
    const f=pickFilter();
    const r=f.list[pickIdx%f.list.length];
    body=(f.note?`<div class="card" style="margin-bottom:10px"><p>${f.note}</p></div>`:'')
      +suggCard(r)
      +(f.list.length>1?`<button class="btn btn-secondary" style="margin-bottom:8px" onclick="pickIdx++;renderPick()">🔄 Otra opción (${f.list.length} disponibles)</button>`:'')
      +`<button class="btn btn-secondary" style="margin-bottom:8px" onclick="pickStep='q1';pickAns={};renderPick()">↺ Cambiar mis respuestas</button>`
      +`<button class="btn btn-secondary" onclick="go('basicos')">⚡ Mejor algo de 10 minutos</button>`;
  }
  el.innerHTML=`<div class="tabs">${chip('comidas','☀️ Comida')}${chip('cenas','🌙 Cena')}</div>`+body;
}

  const rem=w.comidas.filter(r=>!d[r.id]).length+w.cenas.filter(r=>!d[r.id]).length;
  document.getElementById('week-banner').innerHTML=rem
    ?`<p>Te quedan <strong>${rem} de 14</strong> recetas esta semana. Marca ✓ al comerla — así siempre sabes qué puedes cocinar con lo que queda en la nevera 💚</p>`
    :`<p>🎉 ¡Semana completada! El lunes el menú se reinicia solo.</p>`;
  const row=r=>{const done=!!d[r.id];return `
    <div class="wk-row ${done?'wk-done':''}">
      <button class="wk-check" onclick="tickMenu('${r.id}')">${done?'✓':''}</button>
      <div class="wk-info" onclick="openRecipe('${r.id}','week')">
        <div class="wk-name">${r.emoji} ${r.name}</div>
        <div class="wk-meta">${r.time} · ${r.budget}${r.express?' · de despensa':''}</div>
        ${done?'':`<div class="wk-ingr">🧺 ${ingrLine(r)}</div>`}
      </div>
    </div>`;};
  document.getElementById('week-list').innerHTML=

    `<p class="section-label" style="margin-top:16px">🌙 Cenas (7)</p>`+w.cenas.map(row).join('');

function tickMenu(id){
  beep(500,.1);vibrate(40);
  const d=getMenuDone();
  if(d[id])delete d[id];else d[id]=true;
  setMenuDone(d);
  renderWeek();
}

/* ── SHOPPING ── */
function getChecked(){try{return JSON.parse(localStorage.getItem('cris_comida_shop')||'{}');}catch(e){return{};}}
function setChecked(d){try{localStorage.setItem('cris_comida_shop',JSON.stringify(d));}catch(e){}}
function getShopRecipes(){try{return JSON.parse(localStorage.getItem('cris_comida_shop_recetas')||'[]');}catch(e){return[];}}
function setShopRecipes(a){try{localStorage.setItem('cris_comida_shop_recetas',JSON.stringify(a));}catch(e){}}
function addToShop(id){
  const list=getShopRecipes();
  if(!list.includes(id)){list.push(id);setShopRecipes(list);}
  beep(700,.12);vibrate(50);
  go('shopping');
}
function removeFromShop(id){
  setShopRecipes(getShopRecipes().filter(x=>x!==id));
  const ck=getChecked();
  Object.keys(ck).forEach(k=>{if(k.indexOf('r-'+id+'-')===0)delete ck[k];});
  setChecked(ck);
  renderShop();
}
/* La compra semanal se genera sola desde las 14 recetas del menú.
   Los ingredientes de despensa (aceite, especias...) se filtran: ya están en básicos. */
const PANTRY_RE=/(aceite|(^|\s)sal\b|sal,|pimienta|orégano|oregano|comino|cúrcuma|curcuma|pimentón|pimenton|vinagre|ajo|especias|agua|papel de horno|eneldo|jengibre|menta|hierbabuena|laurel|curry)/i;
function normIngr(s){
  let t=s.replace(/\(.*?\)/g,'').trim();
  t=t.replace(/^[\d½¼¾.,\/\s]+/,'');
  t=t.replace(/^(cdas?|cucharadas?|cucharaditas?|g|gr|kg|ml|l|vasos?|tazas?|rebanadas?|filetes?|latas?|botes?|bolsas?|briks?|bricks?|puñados?|hojas?|rodajas?|ramas?|docenas?|paquetes?|zumo)\s+(de\s+)?/i,'');
  t=t.replace(/^[\d½¼¾.,\/\s]+/,'');
  t=t.replace(/\b(grande|pequeñ[oa]s?|crud[oa]s?|madur[oa]s?|fileteada|en rodajas|en dados|de temporada|o verde|o molid[oa]s)\b/gi,'').replace(/\s+/g,' ').trim();
  const SING={'pepinos':'pepino','pimientos':'pimiento','berenjenas':'berenjena','calabacines':'calabacín','limones':'limón','zanahorias':'zanahoria','puerros':'puerro','cebollas':'cebolla','tomates':'tomate','yogures naturales':'yogur natural'};
  if(SING[t.toLowerCase()])t=SING[t.toLowerCase()];
  return t?t.charAt(0).toUpperCase()+t.slice(1):s;
}
function ingrCat(n){
  const s=n.toLowerCase();
  if(/congelad/.test(s))return '❄️ Congelados';
  if(/(bote |lata|conserva|garbanzo|lenteja|alubia|atún|atun|aceituna|maíz|maiz|caldo)/.test(s))return '🫙 Conservas y botes';
  if(/(huevo|queso|yogur|leche|feta|mozzarella|nata)/.test(s))return '🥚 Huevos y lácteos';
  if(/(pollo|pavo|salmón|salmon|merluza|bacalao|pescado|carne|ternera|lomo)/.test(s))return '🍗 Carne y pescado';
  if(/(arroz|pasta|quinoa|pan|cuscús|cuscus|avena|almendra|nuez|nueces)/.test(s))return '🌾 Cereales y frutos secos';
  return '🥬 Frescos: fruta y verdura';
}
const CAT_ORDER=['🥬 Frescos: fruta y verdura','❄️ Congelados','🫙 Conservas y botes','🥚 Huevos y lácteos','🍗 Carne y pescado','🌾 Cereales y frutos secos'];
function weeklyShop(){
  const w=weekMenu(),map={};
  [...w.comidas,...w.cenas].filter(r=>!r.express).forEach(r=>{
    r.ingredients.forEach(ing=>{
      if(PANTRY_RE.test(ing))return;
      const n=normIngr(ing),k=n.toLowerCase();
      if(!map[k])map[k]={name:n,count:0};
      map[k].count++;
    });
  });
  const cats={};
  Object.values(map).forEach(it=>{const c=ingrCat(it.name);(cats[c]=cats[c]||[]).push(it);});
  Object.values(cats).forEach(a=>a.sort((x,y)=>x.name.localeCompare(y.name)));
  return cats;
}
function slugIngr(n){return 'w-'+n.toLowerCase().replace(/[^a-z0-9ñáéíóúü]+/g,'-');}

function renderShop(){
  const el=document.getElementById('shop-list');
  const ck=getChecked();
  const cats=weeklyShop();

  const weekHtml=CAT_ORDER.filter(c=>cats[c]).map(c=>`
    <div class="shop-cat"><h3>${c}</h3>
    ${cats[c].map(it=>{const id=slugIngr(it.name);return `
      <div class="shop-item ${ck[id]?'ck':''}" id="si-${id}">
        <input type="checkbox" id="cb-${id}" ${ck[id]?'checked':''} onchange="toggleItem('${id}',this.checked)">
        <label for="cb-${id}"><strong>${it.name}</strong>${it.count>1?`<small>en ${it.count} recetas del menú</small>`:''}</label>
      </div>`;}).join('')}</div>`).join('');

  const recipes=getShopRecipes().map(r=>findRecipe(r)).filter(Boolean);
  const extrasHtml=recipes.length
    ?`<p class="section-label" style="margin-top:20px">➕ Extras que añadiste tú</p>`+recipes.map(r=>`
      <div class="shop-cat">
        <h3 style="display:flex;justify-content:space-between;align-items:center">
          <span>${r.emoji} ${r.name}</span>
          <button onclick="removeFromShop('${r.id}')" style="border:none;background:var(--mint);color:var(--teal-dark);font-family:'Outfit',sans-serif;font-size:.7rem;font-weight:700;border-radius:10px;padding:4px 10px;cursor:pointer">✕ quitar</button>
        </h3>
        ${r.ingredients.map((ing,i)=>{const iid='r-'+r.id+'-'+i;return `
          <div class="shop-item ${ck[iid]?'ck':''}" id="si-${iid}">
            <input type="checkbox" id="cb-${iid}" ${ck[iid]?'checked':''} onchange="toggleItem('${iid}',this.checked)">
            <label for="cb-${iid}">${ing}</label>
          </div>`;}).join('')}
      </div>`).join('')
    :'';

  el.innerHTML=`
    <p class="section-label">📅 La compra de la semana — cubre las 14 recetas</p>
    ${weekHtml}
    ${extrasHtml}
    <p class="section-label" style="margin-top:20px">🧺 Básicos salvavidas (revisa que no falten)</p>
    ${SHOPPING.map(cat=>`
    <div class="shop-cat">
      <h3>${cat.cat}</h3>
      ${cat.items.map(item=>`
        <div class="shop-item ${ck[item.id]?'ck':''}" id="si-${item.id}">
          <input type="checkbox" id="cb-${item.id}" ${ck[item.id]?'checked':''} onchange="toggleItem('${item.id}',this.checked)">
          <label for="cb-${item.id}"><strong>${item.name}</strong> — ${item.qty}<small>${item.loc}</small></label>
        </div>`).join('')}
    </div>`).join('')}`;
}
function toggleItem(id,val){beep(400,.08);const d=getChecked();d[id]=val;setChecked(d);document.getElementById('si-'+id).classList.toggle('ck',val);}
function clearShop(){setChecked({});renderShop();}
function shareList(){
  const lines=['🛒 Compra de la semana — Cris\n'];
  const cats=weeklyShop();
  CAT_ORDER.filter(c=>cats[c]).forEach(c=>{
    lines.push('\n'+c);
    cats[c].forEach(i=>lines.push('☐ '+i.name+(i.count>1?' (en '+i.count+' recetas)':'')));
  });
  lines.push('\n🧺 BÁSICOS SALVAVIDAS');
  SHOPPING.forEach(cat=>{cat.items.forEach(i=>lines.push('☐ '+i.name+' — '+i.qty));});
  const text=lines.join('\n');
  if(navigator.share)navigator.share({title:'Lista de compras Cris',text}).catch(()=>{});
  else if(navigator.clipboard)navigator.clipboard.writeText(text).then(()=>alert('📋 Lista copiada 💚'));
}

// Init
initHome();
renderMonthsGrid();
if(location.hash==='#basicos')go('basicos'); // modo eco: directo a recetas salvavidas
/* Botón atrás del móvil: la app pregunta si este módulo puede retroceder una pantalla */
/* Atrás del móvil: el padre llama __crisBack() (síncrono); true = retrocedió */
window.__crisBack=function(){
  var el=document.querySelector('.screen.active .back-btn');
  if(el){el.click();return true;}
  return false;
};
/* Puente para versiones mezcladas: si el index viejo aún manda postMessage */
window.addEventListener('message',function(e){
  if(e&&e.data==='cris:back'&&window.__crisBack&&window.__crisBack()){
    try{parent.postMessage('cris:back-ok','*');}catch(_){}
  }
});
</script>
