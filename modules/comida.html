<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Comer Rico — Cris</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --teal:#26a69a;--teal-dark:#1a6b64;--teal-light:#4dd0e1;
  --mint:#d6f0eb;--mint-mid:#b8e4dd;--mint-soft:#e8f8f5;
  --text:#1a6b64;--text-soft:#3d8880;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Outfit',sans-serif;background:var(--mint);min-height:100vh;color:var(--text)}

.screen{display:none;min-height:100vh;padding:16px 16px 36px}
.screen.active{display:block}
.max-w{max-width:440px;margin:0 auto;padding-top:12px}

/* Topbar */
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.back-btn{background:rgba(26,107,100,.12);border:none;border-radius:50%;width:40px;height:40px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--teal-dark)}
.topbar h1{font-size:1.15rem;font-weight:700;color:var(--teal-dark)}

/* Home */
.home-header{text-align:center;margin-bottom:16px}
.home-header h1{font-size:1.6rem;font-weight:800;color:var(--teal-dark);margin-bottom:4px}
.home-header p{font-size:.88rem;color:var(--text-soft)}
.home-quokka{display:flex;justify-content:center;margin-bottom:16px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.bubble{background:rgba(255,255,255,.8);border:2px solid var(--mint-mid);border-radius:16px;padding:10px 16px;font-size:.85rem;font-weight:600;color:var(--teal-dark);text-align:center;margin:0 auto 16px;max-width:260px}

/* Nav cards */
.nav-cards{display:flex;flex-direction:column;gap:10px}
.nav-card{border:none;border-radius:16px;padding:16px 18px;font-family:'Outfit',sans-serif;font-size:.95rem;font-weight:700;color:#fff;cursor:pointer;text-align:left;display:flex;align-items:center;gap:14px;width:100%;transition:transform .1s,filter .1s}
.nav-card:active{transform:scale(.97);filter:brightness(.9)}
.nav-card .nic{font-size:1.5rem}
.nav-card .info{display:flex;flex-direction:column;gap:2px}
.nav-card .sub{font-size:.75rem;font-weight:400;opacity:.88}
.c-test{background:linear-gradient(135deg,var(--teal-dark),var(--teal))}
.c-recipes{background:linear-gradient(135deg,var(--teal),var(--teal-light))}
.c-shop{background:linear-gradient(135deg,#f59e0b,#f97316)}

/* Cards genéricos */
.card{background:rgba(255,255,255,.82);border-radius:18px;padding:20px;border:2px solid var(--mint-mid);margin-bottom:14px;box-shadow:0 2px 12px rgba(38,166,154,.08)}
.card h2{font-size:1.05rem;font-weight:700;color:var(--teal-dark);margin-bottom:6px}
.card p{font-size:.85rem;color:var(--text-soft);line-height:1.5}

/* Botones */
.btn-row{display:flex;gap:8px;margin-top:12px}
.btn{border:none;border-radius:12px;padding:13px 18px;font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;flex:1;transition:transform .1s,filter .1s}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--teal-dark),var(--teal));color:#fff}
.btn-secondary{background:var(--mint-soft);color:var(--teal-dark);border:2px solid var(--mint-mid)}
.btn-full{width:100%}

/* Test de receta */
.test-q h2{font-size:1.1rem;font-weight:700;color:var(--teal-dark);margin-bottom:14px}
.opt-btn{width:100%;border:2px solid var(--mint-mid);border-radius:14px;padding:14px 16px;font-family:'Outfit',sans-serif;font-size:.92rem;font-weight:600;color:var(--teal-dark);background:rgba(255,255,255,.8);cursor:pointer;text-align:left;margin-bottom:8px;transition:border-color .15s,background .15s}
.opt-btn:active{border-color:var(--teal);background:var(--mint-soft)}

/* Recetas grid */
.recipes-grid{display:flex;flex-direction:column;gap:12px}
.recipe-card{background:rgba(255,255,255,.85);border-radius:18px;padding:18px;border:2px solid var(--mint-mid);cursor:pointer;transition:transform .1s,border-color .1s}
.recipe-card:active{transform:scale(.98);border-color:var(--teal)}
.recipe-card .r-head{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.recipe-card .r-emoji{font-size:2.2rem}
.recipe-card h3{font-size:1rem;font-weight:700;color:var(--teal-dark)}
.recipe-card .time-tag{background:var(--teal);color:#fff;border-radius:999px;padding:3px 10px;font-size:.72rem;font-weight:700;margin-top:3px;display:inline-block}
.recipe-card p{font-size:.82rem;color:var(--text-soft);line-height:1.5}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag{background:var(--mint-soft);border:1px solid var(--mint-mid);color:var(--teal-dark);border-radius:999px;padding:3px 10px;font-size:.72rem;font-weight:600}

/* Detalle receta */
.section-title{font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--teal);margin-bottom:8px}
.ingredient-list{font-size:.9rem;line-height:2;color:var(--text)}
.ingredient-list li{list-style:none;padding:2px 0;border-bottom:1px solid var(--mint);display:flex;gap:8px}
.ingredient-list li:last-child{border:none}
.ingredient-list li::before{content:"•";color:var(--teal);font-weight:700}
.tip-box{background:var(--mint-soft);border-left:4px solid var(--teal);border-radius:0 12px 12px 0;padding:12px 14px;font-size:.85rem;color:var(--text);line-height:1.5;margin-bottom:14px}

/* Cooking guide */
.step-box{background:var(--mint-soft);border:2px solid var(--mint-mid);border-radius:18px;padding:22px;text-align:center;margin-bottom:16px}
.step-num{font-size:.75rem;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.step-text{font-size:1.05rem;font-weight:600;color:var(--teal-dark);line-height:1.6;margin-bottom:16px}
.step-timer{font-size:3.2rem;font-weight:800;color:var(--teal-dark);font-variant-numeric:tabular-nums;margin-bottom:4px}
.step-timer-label{font-size:.75rem;color:var(--text-soft)}
.progress-bar-wrap{background:var(--mint-mid);border-radius:999px;height:5px;margin-bottom:16px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--teal-dark),var(--teal-light));border-radius:999px;transition:width .6s}
.steps-mini{display:flex;justify-content:center;gap:5px;margin-bottom:14px}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--mint-mid);transition:all .3s}
.step-dot.done{background:var(--teal)}
.step-dot.active{background:var(--teal-light);transform:scale(1.4)}
.done-box{background:linear-gradient(135deg,var(--teal-dark),var(--teal));color:#fff;border-radius:18px;padding:28px;text-align:center;margin-bottom:16px}
.done-box .big{font-size:3rem;margin-bottom:8px}
.done-box h2{font-size:1.3rem;font-weight:800;margin-bottom:6px}
.done-box p{font-size:.88rem;opacity:.9}

/* Shopping list */
.shop-category{margin-bottom:16px}
.shop-category h3{font-size:.8rem;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;padding-bottom:4px;border-bottom:2px solid var(--mint-mid)}
.shop-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--mint)}
.shop-item:last-child{border:none}
.shop-item input{margin-top:3px;width:18px;height:18px;accent-color:var(--teal);flex-shrink:0;cursor:pointer}
.shop-item label{font-size:.88rem;color:var(--text);line-height:1.4;cursor:pointer}
.shop-item label strong{color:var(--teal-dark)}
.shop-item label small{display:block;color:var(--text-soft);font-size:.75rem;margin-top:1px}
.shop-item.checked label{text-decoration:line-through;opacity:.5}
.result-box{background:linear-gradient(135deg,var(--teal-dark),var(--teal));color:#fff;border-radius:18px;padding:24px;text-align:center;margin-bottom:16px}
.result-box h2{font-size:1.4rem;font-weight:800;margin-bottom:8px}
.result-box p{font-size:.9rem;opacity:.9;line-height:1.5}
</style>
</head>
<body>

<!-- HOME -->
<div id="v-home" class="screen active">
<div class="max-w">
  <div class="home-header">
    <h1>🍳 Comer Rico</h1>
    <p>Simple, sin estrés, sin tomate</p>
  </div>
  <div class="home-quokka">
    <svg viewBox="0 0 110 130" width="100" height="118" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="28" cy="22" rx="13" ry="16" fill="#33b5a7"/>
      <ellipse cx="82" cy="22" rx="13" ry="16" fill="#33b5a7"/>
      <ellipse cx="28" cy="23" rx="7" ry="9" fill="#5dcfc2"/>
      <ellipse cx="82" cy="23" rx="7" ry="9" fill="#5dcfc2"/>
      <ellipse cx="55" cy="93" rx="34" ry="36" fill="#33b5a7"/>
      <ellipse cx="55" cy="97" rx="20" ry="25" fill="#5dcfc2" opacity=".65"/>
      <circle cx="55" cy="50" r="30" fill="#33b5a7"/>
      <circle cx="43" cy="47" r="6" fill="#0f4d47"/><circle cx="45" cy="45" r="2.5" fill="white"/>
      <circle cx="67" cy="47" r="6" fill="#0f4d47"/><circle cx="69" cy="45" r="2.5" fill="white"/>
      <ellipse cx="55" cy="58" rx="5" ry="4" fill="#0f4d47"/>
      <path d="M46 65 Q55 74 64 65" stroke="#0f4d47" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <ellipse cx="23" cy="96" rx="11" ry="8" fill="#33b5a7" transform="rotate(-20 23 96)"/>
      <ellipse cx="87" cy="96" rx="11" ry="8" fill="#33b5a7" transform="rotate(20 87 96)"/>
      <ellipse cx="42" cy="126" rx="12" ry="6" fill="#2da098"/>
      <ellipse cx="68" cy="126" rx="12" ry="6" fill="#2da098"/>
      <!-- chef hat -->
      <rect x="41" y="18" width="28" height="10" rx="3" fill="white" opacity=".9"/>
      <ellipse cx="55" cy="18" rx="14" ry="9" fill="white" opacity=".9"/>
    </svg>
  </div>
  <div class="bubble">¡A cocinar sin agobios! 🌿</div>
  <div class="nav-cards">
    <button class="nav-card c-test" onclick="startTest()">
      <span class="nic">🤔</span>
      <div class="info"><span>¿QUÉ COCINO HOY?</span><span class="sub">Te ayudo a elegir según cómo estás</span></div>
    </button>
    <button class="nav-card c-recipes" onclick="go('recipes')">
      <span class="nic">🍽️</span>
      <div class="info"><span>VER RECETAS</span><span class="sub">Bowl de quinoa · Sopa de calabaza</span></div>
    </button>
    <button class="nav-card c-shop" onclick="go('shopping')">
      <span class="nic">🛒</span>
      <div class="info"><span>LISTA DE COMPRAS</span><span class="sub">7 días para 1 persona</span></div>
    </button>
  </div>
</div>
</div>

<!-- TEST -->
<div id="v-test" class="screen">
<div class="max-w">
  <div class="topbar">
    <button class="back-btn" onclick="go('home')">←</button>
    <h1>¿Qué cocino hoy?</h1>
  </div>
  <div id="test-content"></div>
</div>
</div>

<!-- RECIPES LIST -->
<div id="v-recipes" class="screen">
<div class="max-w">
  <div class="topbar">
    <button class="back-btn" onclick="go('home')">←</button>
    <h1>Recetas</h1>
  </div>
  <div class="recipes-grid" id="recipes-grid"></div>
</div>
</div>

<!-- RECIPE DETAIL -->
<div id="v-recipe-detail" class="screen">
<div class="max-w">
  <div class="topbar">
    <button class="back-btn" id="recipe-back">←</button>
    <h1 id="detail-title"></h1>
  </div>
  <div id="detail-content"></div>
</div>
</div>

<!-- COOKING GUIDE -->
<div id="v-cooking" class="screen">
<div class="max-w">
  <div class="topbar">
    <button class="back-btn" onclick="stopCooking();go('recipe-detail')">←</button>
    <h1 id="cooking-title"></h1>
  </div>
  <div id="cooking-content"></div>
</div>
</div>

<!-- SHOPPING LIST -->
<div id="v-shopping" class="screen">
<div class="max-w">
  <div class="topbar">
    <button class="back-btn" onclick="go('home')">←</button>
    <h1>Lista de Compras</h1>
  </div>
  <div class="card" style="margin-bottom:16px">
    <p>Marca lo que ya tienes o lo que coges en el súper. Se guarda automáticamente 💚</p>
  </div>
  <div id="shopping-list"></div>
  <div class="btn-row">
    <button class="btn btn-secondary" onclick="shareList()">📱 Compartir</button>
    <button class="btn btn-secondary" onclick="clearAll()">↺ Borrar marcas</button>
  </div>
</div>
</div>

<script>
const RECIPES = [
  {
    id:'quinoa', emoji:'🥣', name:'Bowl de Quinoa', time:'15 min',
    tags:['Super fácil','Sin tomate','1 olla'],
    desc:'Se cocina sola. Solo cortas el pepino y mezclas.',
    tip:'La quinoa prelavada no necesita lavarse. Si te queda tiempo, añade más aceitunas — están ricas.',
    ingredients:[
      '½ taza quinoa prelavada',
      '½ pepino',
      'Aceitunas negras (las que quieras)',
      '50g queso feta (ya en dados)',
      '2 cdas aceite de oliva',
      '½ limón',
      'Sal al gusto'
    ],
    steps:[
      {text:'Pon 1 taza de agua en una olla y enciende el fuego. Espera a que hierva (verás burbujitas pequeñas)', time:3, voice:'Primer paso: pon una taza de agua en la olla y enciende el fuego. Espera a que hierva'},
      {text:'Echa la quinoa, baja el fuego a medio, tapa la olla. Pon una alarma de 12 minutos y olvídate', time:12, voice:'Echa la quinoa, baja el fuego, tapa la olla y pon doce minutos de alarma. La quinoa se cocina sola'},
      {text:'Mientras esperas, corta el pepino en trozos pequeños. No importa la forma', time:3, voice:'Mientras esperas, corta el pepino en trozos del tamaño que quieras'},
      {text:'Pon las aceitunas y el queso feta en un bowl grande', time:1, voice:'Pon las aceitunas y el queso feta en un bowl grande donde vayas a comer'},
      {text:'Cuando suene la alarma: apaga el fuego y deja reposar 2 minutos con la olla tapada', time:2, voice:'Cuando suene la alarma, apaga el fuego y deja reposar dos minutos con la tapa puesta'},
      {text:'Echa la quinoa en el bowl, añade el pepino, aceite de oliva, zumo de medio limón y sal. ¡Mezcla y a comer!', time:1, voice:'Echa la quinoa en el bowl, añade el pepino, aceite, limón y sal. Mezcla y a comer'}
    ]
  },
  {
    id:'calabaza', emoji:'🍜', name:'Sopa de Calabaza', time:'12 min',
    tags:['Ultra fácil','Sin tomate','1 olla'],
    desc:'Calabaza congelada directo a la olla. Casi sin cortar nada.',
    tip:'Usa calabaza CONGELADA (ya cortada) y caldo de brick. Si no tienes batidora, aplasta con un tenedor — queda igual de rica.',
    ingredients:[
      '250g calabaza congelada (ya cortada)',
      '½ cebolla pequeña',
      '1 vaso caldo de verduras (brick)',
      '½ lata leche de coco',
      '1 cda aceite de oliva',
      'Cúrcuma (opcional)',
      'Sal al gusto'
    ],
    steps:[
      {text:'Corta la cebolla en trozos (no importa cómo, luego se tritura todo)', time:2, voice:'Corta la cebolla en trozos, no importa el tamaño porque luego lo trituramos todo'},
      {text:'Pon aceite en la olla, enciende fuego medio y echa la cebolla. Remueve cada minuto durante 3 minutos', time:3, voice:'Pon una cucharada de aceite, enciende el fuego medio, echa la cebolla y remueve cada minuto durante tres minutos'},
      {text:'Echa la calabaza congelada directamente a la olla (no hay que descongelarla)', time:1, voice:'Echa la calabaza congelada directamente, sin descongelar'},
      {text:'Añade el caldo de brick y un poco de sal. Sube el fuego hasta que hierva', time:2, voice:'Añade el caldo y la sal. Sube el fuego hasta que hierva'},
      {text:'Cuando hierva, baja el fuego a medio. Pon alarma de 5 minutos. Puedes hacer otra cosa', time:5, voice:'Cuando hierva baja el fuego y pon cinco minutos de alarma. Puedes irte a hacer otra cosa'},
      {text:'Apaga el fuego. Tritura con batidora de mano o aplasta con tenedor hasta que quede cremoso', time:2, voice:'Apaga el fuego y tritura con la batidora. Si no tienes, aplasta con un tenedor hasta que quede cremoso'},
      {text:'Añade la leche de coco, remueve suavemente y listo. ¡Sírvelo caliente!', time:1, voice:'Añade la leche de coco, remueve y listo. A disfrutar de tu sopa calentita'}
    ]
  }
];

const SHOPPING = [
  { cat:'🥬 Verduras', items:[
    {id:'calabaza-c',name:'Calabaza CONGELADA cortada',qty:'2 bolsas 500g',loc:'Sección congelados'},
    {id:'pepinos',name:'Pepinos',qty:'4 unidades',loc:'Verduras frescas'},
    {id:'cebollas',name:'Cebollas pequeñas',qty:'4 unidades',loc:'Verduras frescas'},
    {id:'limones',name:'Limones',qty:'4 unidades',loc:'Frutas'}
  ]},
  { cat:'🥛 Lácteos', items:[
    {id:'feta',name:'Queso feta en dados',qty:'1 paquete 200g',loc:'Quesos / nevera'}
  ]},
  { cat:'🌾 Secos', items:[
    {id:'quinoa',name:'Quinoa PRELAVADA',qty:'1 paquete 500g',loc:'Arroz / legumbres / zona sana'}
  ]},
  { cat:'🫒 Conservas', items:[
    {id:'aceitunas',name:'Aceitunas negras',qty:'2 tarritos pequeños',loc:'Conservas'},
    {id:'coco',name:'Leche de coco',qty:'2 latas',loc:'Cocina internacional / leches vegetales'},
    {id:'caldo',name:'Caldo de verduras BRICK',qty:'2 briks de 1L',loc:'Caldos / sopas'}
  ]},
  { cat:'🧂 Básicos', items:[
    {id:'aceite',name:'Aceite de oliva',qty:'1 botella',loc:'Aceites'},
    {id:'sal',name:'Sal',qty:'1 paquete',loc:'Sal / especias'},
    {id:'curcuma',name:'Cúrcuma (OPCIONAL)',qty:'1 botecito',loc:'Especias'}
  ]}
];

const TEST_STEPS = [
  { q:'¿Cómo está tu energía ahora?', opts:[
    {label:'😴 Baja — estoy cansado/a', val:'baja'},
    {label:'😊 Normal', val:'normal'},
    {label:'⚡ Alta, tengo energía', val:'alta'}
  ]},
  { q:'¿Qué te pide el cuerpo?', opts:[
    {label:'🥗 Algo fresco y ligero', val:'fresco'},
    {label:'🍲 Algo caliente y reconfortante', val:'caliente'},
    {label:'🍽️ Algo completo y nutritivo', val:'completo'}
  ]},
  { q:'¿Cuánto tiempo tienes?', opts:[
    {label:'⚡ Poco — lo más rápido', val:'poco'},
    {label:'⏱️ Unos 15 minutos', val:'medio'},
    {label:'🕐 Sin prisa', val:'mucho'}
  ]}
];

// ── State ──
let currentRecipeId = null;
let cookStep = 0, cookPlaying = false, cookTimer = 0, cookInterval = null;
let testStep = 0, testAnswers = [];
let fromTest = false;

function beep(freq=600,dur=0.2){
  try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=freq;g.gain.setValueAtTime(.3,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+dur);o.start();o.stop(c.currentTime+dur);}catch(e){}
}
function vibrate(ms=60){try{if(navigator.vibrate)navigator.vibrate(ms);}catch(e){}}
function speak(text){try{if(!window.speechSynthesis)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='es-ES';u.rate=.88;speechSynthesis.speak(u);}catch(e){}}

function go(view){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('v-'+view).classList.add('active');
  if(view==='recipes') renderRecipes();
  if(view==='shopping') renderShopping();
}

// ── TEST ──
function startTest(){
  testStep=0; testAnswers=[];
  go('test');
  renderTest();
}
function renderTest(){
  const el=document.getElementById('test-content');
  if(testStep>=TEST_STEPS.length){
    // resultado
    const rec=pickRecipe();
    const r=RECIPES.find(r=>r.id===rec);
    el.innerHTML=`
      <div class="result-box">
        <div style="font-size:3rem;margin-bottom:8px">${r.emoji}</div>
        <h2>Te recomiendo: ${r.name}</h2>
        <p>En ${r.time}, con lo que tienes en casa 💚</p>
      </div>
      <button class="btn btn-primary btn-full" onclick="openRecipeFromTest('${r.id}')">Ver receta →</button>
      <button class="btn btn-secondary btn-full" style="margin-top:8px" onclick="startTest()">Repetir test</button>
    `;
    return;
  }
  const s=TEST_STEPS[testStep];
  el.innerHTML=`
    <div class="card test-q">
      <p style="font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--teal);margin-bottom:10px">Pregunta ${testStep+1} de ${TEST_STEPS.length}</p>
      <h2>${s.q}</h2>
    </div>
    ${s.opts.map(o=>`<button class="opt-btn" onclick="testAnswer('${o.val}')">${o.label}</button>`).join('')}
  `;
}
function testAnswer(val){
  beep(400,.1);vibrate(30);
  testAnswers.push(val);
  testStep++;
  renderTest();
}
function pickRecipe(){
  let sc={quinoa:0,calabaza:0};
  // energía baja → sopa más fácil
  if(testAnswers[0]==='baja') sc.calabaza+=2;
  if(testAnswers[0]==='alta') sc.quinoa+=1;
  // tipo
  if(testAnswers[1]==='fresco'||testAnswers[1]==='completo') sc.quinoa+=2;
  if(testAnswers[1]==='caliente') sc.calabaza+=3;
  // tiempo
  if(testAnswers[2]==='poco') sc.calabaza+=2;
  return sc.calabaza>sc.quinoa?'calabaza':'quinoa';
}
function openRecipeFromTest(id){
  fromTest=true;
  openRecipe(id);
}

// ── RECIPES ──
function renderRecipes(){
  const el=document.getElementById('recipes-grid');
  el.innerHTML=RECIPES.map(r=>`
    <div class="recipe-card" onclick="openRecipe('${r.id}')">
      <div class="r-head">
        <span class="r-emoji">${r.emoji}</span>
        <div>
          <h3>${r.name}</h3>
          <span class="time-tag">${r.time}</span>
        </div>
      </div>
      <p>${r.desc}</p>
      <div class="tags">${r.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    </div>
  `).join('');
}
function openRecipe(id){
  currentRecipeId=id;
  const r=RECIPES.find(r=>r.id===id);
  document.getElementById('detail-title').textContent=r.name;
  document.getElementById('recipe-back').onclick=()=>go(fromTest?'test':'recipes');
  const el=document.getElementById('detail-content');
  el.innerHTML=`
    <div class="card" style="margin-bottom:14px">
      <div style="font-size:2.5rem;text-align:center;margin-bottom:10px">${r.emoji}</div>
      <div class="tags" style="justify-content:center;margin-bottom:10px">${r.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    </div>
    <div class="tip-box">💡 ${r.tip}</div>
    <p class="section-title">Ingredientes (1 persona)</p>
    <div class="card" style="margin-bottom:16px">
      <ul class="ingredient-list">${r.ingredients.map(i=>`<li>${i}</li>`).join('')}</ul>
    </div>
    <button class="btn btn-primary btn-full" onclick="startCooking('${r.id}')">🎵 Guía paso a paso →</button>
  `;
  go('recipe-detail');
}

// ── COOKING ──
function startCooking(id){
  currentRecipeId=id;
  const r=RECIPES.find(r=>r.id===id);
  document.getElementById('cooking-title').textContent=r.name;
  cookStep=0; cookPlaying=false; cookTimer=0;
  if(cookInterval){clearInterval(cookInterval);cookInterval=null;}
  go('cooking');
  renderCooking();
}
function stopCooking(){
  if(cookInterval){clearInterval(cookInterval);cookInterval=null;}
  cookPlaying=false;
  try{speechSynthesis.cancel();}catch(e){}
}
function renderCooking(){
  const r=RECIPES.find(r=>r.id===currentRecipeId);
  const el=document.getElementById('cooking-content');
  if(cookStep>=r.steps.length){
    el.innerHTML=`
      <div class="done-box">
        <div class="big">🎉</div>
        <h2>¡Listo, a comer!</h2>
        <p>Lo has hecho genial 💚</p>
      </div>
      <button class="btn btn-secondary btn-full" onclick="go('home')">🏠 Inicio</button>
      <button class="btn btn-primary btn-full" style="margin-top:8px" onclick="startCooking('${currentRecipeId}')">Repetir receta</button>
    `;
    return;
  }
  const step=r.steps[cookStep];
  const pct=(cookStep/r.steps.length)*100;
  const dots=r.steps.map((_,i)=>`<div class="step-dot ${i<cookStep?'done':i===cookStep?'active':''}"></div>`).join('');
  const t=cookPlaying?cookTimer:step.time*60;
  const mm=String(Math.floor(t/60)).padStart(2,'0');
  const ss=String(t%60).padStart(2,'0');
  el.innerHTML=`
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="steps-mini">${dots}</div>
    <div class="step-box">
      <div class="step-num">Paso ${cookStep+1} de ${r.steps.length}</div>
      <div class="step-text">${step.text}</div>
      <div class="step-timer" id="cook-timer">${mm}:${ss}</div>
      <div class="step-timer-label">minutos restantes</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="cookToggle()">${cookPlaying?'⏸ Pausar':'▶ Iniciar'}</button>
      <button class="btn btn-primary" onclick="cookNext()">Siguiente →</button>
    </div>
  `;
}
function cookToggle(){
  if(!cookPlaying){
    cookPlaying=true;
    const r=RECIPES.find(r=>r.id===currentRecipeId);
    if(!cookTimer||cookTimer<=0) cookTimer=r.steps[cookStep].time*60;
    speak(r.steps[cookStep].voice);
    vibrate(50);
    cookInterval=setInterval(cookTick,1000);
  } else {
    cookPlaying=false;
    if(cookInterval){clearInterval(cookInterval);cookInterval=null;}
    try{speechSynthesis.cancel();}catch(e){}
  }
  renderCooking();
}
function cookTick(){
  cookTimer--;
  const el=document.getElementById('cook-timer');
  if(el) el.textContent=String(Math.floor(cookTimer/60)).padStart(2,'0')+':'+String(cookTimer%60).padStart(2,'0');
  if(cookTimer<=0) cookAdvance();
}
function cookAdvance(){
  if(cookInterval){clearInterval(cookInterval);cookInterval=null;}
  const r=RECIPES.find(r=>r.id===currentRecipeId);
  cookStep++;
  cookPlaying=false; cookTimer=0;
  if(cookStep<r.steps.length){
    beep(600,.15);vibrate(60);
    renderCooking();
  } else {
    beep(800,.2);setTimeout(()=>beep(1000,.3),250);
    vibrate([80,50,80]);
    renderCooking();
  }
}
function cookNext(){
  if(cookInterval){clearInterval(cookInterval);cookInterval=null;}
  cookPlaying=false; cookTimer=0;
  cookAdvance();
}

// ── SHOPPING ──
function loadChecked(){try{return JSON.parse(localStorage.getItem('cris_comida_shop')||'{}');}catch(e){return{};}}
function saveChecked(d){try{localStorage.setItem('cris_comida_shop',JSON.stringify(d));}catch(e){}}

function renderShopping(){
  const el=document.getElementById('shopping-list');
  const checked=loadChecked();
  el.innerHTML=SHOPPING.map(cat=>`
    <div class="shop-category">
      <h3>${cat.cat}</h3>
      ${cat.items.map(item=>`
        <div class="shop-item ${checked[item.id]?'checked':''}" id="si-${item.id}">
          <input type="checkbox" id="cb-${item.id}" ${checked[item.id]?'checked':''} onchange="toggleShop('${item.id}',this.checked)">
          <label for="cb-${item.id}"><strong>${item.name}</strong> — ${item.qty}<small>${item.loc}</small></label>
        </div>`).join('')}
    </div>
  `).join('')+'<div class="card" style="background:var(--mint-soft);border:2px solid var(--mint-mid)"><p>✅ Con esta compra tienes para 7 días (1 almuerzo + 1 cena por día)</p></div>';
}
function toggleShop(id,val){
  beep(400,.08);
  const d=loadChecked();
  d[id]=val;
  saveChecked(d);
  const el=document.getElementById('si-'+id);
  if(el) el.classList.toggle('checked',val);
}
function clearAll(){
  saveChecked({});
  renderShopping();
}
function shareList(){
  const lines=['🛒 Lista de compras — Cris App\n'];
  SHOPPING.forEach(cat=>{
    lines.push('\n'+cat.cat);
    cat.items.forEach(i=>lines.push('☐ '+i.name+' — '+i.qty+' ['+i.loc+']'));
  });
  const text=lines.join('\n');
  if(navigator.share){
    navigator.share({title:'Lista de compras',text}).catch(()=>{});
  } else if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>alert('📋 Lista copiada. Pégala en WhatsApp o notas 💚'));
  }
}
</script>
