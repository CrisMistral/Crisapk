"name":"Bol de petits pois à la feta","desc":"Petits pois cuits avec de la feta et de la menthe. Frais, rapide et sans cuisson.","tip":"Utilise des petits pois en boîte égouttés — ils sont déjà cuits. Les surgelés n'ont besoin que de 3 min au micro-ondes.","tags":["Végétarien","Sans cuisson","Rapide"],"harvard":{"veg":"Petits pois","prot":"Feta","grain":"—"},"nutL":["kcal","protéines","fibres"],"ingredients":["1 boîte de petits pois cuits (400g)","50g de feta","1 c. à soupe d'huile d'olive","Jus d'½ citron","Menthe fraîche ou séchée","Sel"],"steps":[{"text":"Égoutte et rince les petits pois. Mets-les dans un bol","voice":"Égoutte et rince les petits pois"},{"text":"Émiette la feta dessus. Assaisonne avec l'huile, le citron, la menthe et le sel. C'est prêt","voice":"Ajoute la feta émiettée, assaisonne avec l'huile et le citron et c'est prêt"}]},"abr-c1":{"name":"Riz aux fèves et au poulet","desc":"Les fèves de saison avec du poulet et du riz. Une saveur de printemps avec des ingrédients économiques.","tip":"Les fèves surgelées n'ont pas besoin d'être décongelées — elles vont directement à la poêle. Le temps de cuisson est le même.","tags":["Sans gluten","Printemps"],"harvard":{"veg":"Fèves","prot":"Poulet","grain":"Riz"},"nutL":["kcal","protéines","glucides"],"ingredients":["1 blanc de poulet en morceaux","150g de fèves (fraîches ou surgelées)","½ tasse de riz","1 c. à soupe d'huile d'olive","1 gousse d'ail","Sel, persil"],"steps":[{"text":"Mets le riz à cuire avec l'eau et le sel. 15-18 min selon le type","voice":"Mets le riz à cuire avec l'eau et le sel dix-huit minutes"},{"text":"Fais sauter le poulet en morceaux avec l'huile et l'ail 5 min à feu moyen-vif jusqu'à ce qu'il soit doré","voice":"Fais sauter le poulet avec l'ail cinq minutes jusqu'à ce qu'il soit doré"},{"text":"Ajoute les fèves au poulet. 5 min de plus à feu moyen. Sers avec le riz","voice":"Ajoute les fèves et cuis cinq minutes de plus. Sers avec le riz"}]},"abr-c2":{"name":"Pâtes complètes aux asperges et à l'œuf","desc":"Des pâtes avec des asperges sautées et un œuf. Simple, rapide et bien rassasiant.","tip":"Les pâtes complètes rassasient plus que les blanches et ont plus de fibres. Cuis-les al dente — tu les termineras à la poêle.","tags":["Végétarien","Printemps"],"harvard":{"veg":"Asperges","prot":"Œuf","grain":"Pâtes complètes"},"nutL":["kcal","protéines","glucides"],"ingredients":["80g de pâtes complètes","1 botte d'asperges vertes","1 œuf","2 c. à soupe d'huile d'olive","1 gousse d'ail","Sel, fromage râpé"],"steps":[{"text":"Porte l'eau à ébullition avec du sel. Cuis les pâtes selon le paquet (8-10 min). Réserve un peu de l'eau","voice":"Cuis les pâtes dans l'eau salée selon les instructions"},{"text":"Fais sauter les asperges coupées avec l'ail et l'huile 4 min. Ajoute les pâtes égouttées et mélange","voice":"Fais sauter les asperges quatre minutes, ajoute les pâtes et mélange"},{"text":"Fais un puits, casse l'œuf et remue le tout 1 min. Éteins, ajoute le fromage","voice":"Casse l'œuf dans la poêle, remue une minute et ajoute le fromage râpé"}]},"abr-n1":{"name":"Omelette aux asperges","desc":"Les asperges vertes revenues à l'intérieur de l'omelette. Un classique de printemps.","tip":"Coupe les asperges en morceaux de 2 cm — comme ça elles se répartissent bien dans toute l'omelette.","tags":["Végétarien","Sans gluten","Rapide"],"harvard":{"veg":"Asperges","prot":"Œuf","grain":"Pain complet (facultatif)"},"nutL":["kcal","protéines","bon gras"],"ingredients":["1 botte d'asperges vertes","2 œufs","1 c. à soupe d'huile d'olive","Sel"],"steps":[{"text":"Coupe les asperges en morceaux. Fais-les sauter avec l'huile et le sel 4 min à feu moyen","voice":"Coupe les asperges et fais-les sauter quatre minutes avec l'huile et le sel"},{"text":"Bats les œufs avec le sel, verse sur les asperges. 3 min à feu doux sans remuer","voice":"Bats les œufs et verse-les. Trois minutes sans remuer"},{"text":"Retourne-la à l'aide d'une assiette. 2 min de plus et c'est prêt","voice":"Retourne-la et cuis deux minutes de plus"}]},"abr-n2":{"name":"Velouté de petits pois","desc":"Vert, doux et sucré. Les petits pois surgelés vont directement dans la casserole.","tip":"Une touche de menthe au moment de mixer apporte beaucoup de fraîcheur. Sans mixeur, écrase à la fourchette — c'est plus rustique.","tags":["Végétarien","Sans gluten","Légère"],"harvard":{"veg":"Petits pois","prot":"—","grain":"Pain complet"},"nutL":["kcal","protéines","printemps"],"ingredients":["250g de petits pois surgelés","½ oignon","1 verre de bouillon de légumes","1 c. à soupe d'huile d'olive","Menthe (facultatif)","Sel"],"steps":[{"text":"Fais revenir l'oignon avec l'huile 3 min. Ajoute les petits pois et le bouillon","voice":"Fais revenir l'oignon trois minutes et ajoute les petits pois et le bouillon"},{"text":"Porte à ébullition et cuis 8 min à feu moyen à couvert","voice":"Porte à ébullition et cuis huit minutes à couvert"},{"text":"Ajoute la menthe et le sel. Mixe jusqu'à ce que ce soit onctueux","voice":"Ajoute la menthe et le sel et mixe jusqu'à ce que ce soit onctueux"}]},"may-c1":{"name":"Lentilles aux fèves et carotte","desc":"Lentilles en boîte + fèves de saison = un plat plein de fer et de protéines végétales à tout petit prix.","tip":"Les fèves surgelées vont directement dans la casserole. Elles sont bien moins chères que les fraîches et tout aussi bonnes.","tags":["Végétarien","Sans gluten","Fer"],"harvard":{"veg":"Fèves · carotte","prot":"Lentilles","grain":"—"},"nutL":["kcal","protéines","fer"],"ingredients":["1 boîte de lentilles cuites (400g)","150g de fèves surgelées","1 carotte","½ oignon","1 c. à soupe d'huile d'olive","Sel, cumin, paprika"],"steps":[{"text":"Émince l'oignon et la carotte. Fais-les revenir avec l'huile 5 min à feu moyen","voice":"Émince l'oignon et la carotte et fais-les revenir cinq minutes avec l'huile"},{"text":"Ajoute les fèves surgelées et 1 verre d'eau. Cuis 8 min à couvert","voice":"Ajoute les fèves et l'eau. Cuis huit minutes à couvert"},{"text":"Ajoute les lentilles égouttées, le sel, le cumin et le paprika. 5 min de plus et c'est prêt","voice":"Ajoute les lentilles, le sel et le cumin. Cinq minutes de plus et c'est prêt"}]},"may-c2":{"name":"Pâtes au thon et petits pois","desc":"Pâtes complètes avec petits pois et thon. La protéine la plus économique dans le plat le plus facile.","tip":"Le thon s'ajoute hors du feu à la fin — comme ça il reste moelleux et ne se dessèche pas. Ajoute un filet de citron pour rehausser la saveur.","tags":["Protéines","Économique","Rapide"],"harvard":{"veg":"Petits pois","prot":"Thon","grain":"Pâtes complètes"},"nutL":["kcal","protéines","glucides"],"ingredients":["80g de pâtes complètes","100g de petits pois surgelés","1 boîte de thon au naturel","2 c. à soupe d'huile d'olive","Jus d'½ citron","Sel"],"steps":[{"text":"Cuis les pâtes dans l'eau salée selon le paquet. Dans les 3 dernières min ajoute les petits pois dans la même casserole","voice":"Cuis les pâtes et dans les trois dernières minutes ajoute les petits pois dans la même casserole"},{"text":"Égoutte le tout. Mélange avec le thon égoutté, l'huile, le citron et le sel. C'est prêt","voice":"Égoutte, mélange avec le thon, l'huile et le citron. C'est prêt"}]},"may-n1":{"name":"Œufs brouillés aux asperges et fromage","desc":"Les œufs brouillés aux asperges, c'est le dîner de saison le plus rapide.","tip":"Le brouillé réussit mieux à feu moyen-doux en remuant lentement — les œufs restent crémeux, pas secs.","tags":["Végétarien","Sans gluten","Rapide"],"harvard":{"veg":"Asperges","prot":"Œuf · fromage","grain":"Pain complet"},"nutL":["kcal","protéines","bon gras"],"ingredients":["2 œufs","1 botte d'asperges vertes","30g de fromage râpé","1 c. à soupe d'huile d'olive","Sel"],"steps":[{"text":"Coupe les asperges en morceaux. Fais-les revenir avec l'huile 4 min à feu moyen","voice":"Coupe les asperges et fais-les revenir quatre minutes avec l'huile"},{"text":"Bats les œufs avec du sel. Verse sur les asperges à feu moyen-doux en remuant doucement","voice":"Verse les œufs battus et remue doucement trois minutes"},{"text":"Éteins quand ils sont encore crémeux. Ajoute le fromage râpé par-dessus","voice":"Éteins quand ils sont crémeux et ajoute le fromage râpé"}]},"may-n2":{"name":"Salade de fèves à la feta","desc":"Sans cuisson. Des fèves cuites en bocal avec de la feta et une vinaigrette au citron.","tip":"Les fèves en bocal sont déjà cuites — il suffit de les égoutter et de les rincer. Si tu utilises des surgelées, 3 min au micro-ondes.","tags":["Végétarien","Sans cuisson","Rapide"],"harvard":{"veg":"Fèves","prot":"Feta","grain":"—"},"nutL":["kcal","protéines","fibres"],"ingredients":["1 bocal de fèves cuites","50g de feta","Jus d'½ citron","2 c. à soupe d'huile d'olive","Menthe fraîche ou séchée","Sel"],"steps":[{"text":"Égoutte et rince les fèves. Mets-les dans un bol","voice":"Égoutte et rince les fèves"},{"text":"Ajoute la feta émiettée, le citron, l'huile, la menthe et le sel. Mélange doucement et c'est prêt","voice":"Ajoute la feta, le citron, l'huile et la menthe. Mélange doucement et c'est prêt"}]},"jun-c1":{"name":"Bol de quinoa aux courgettes","desc":"Courgette poêlée avec quinoa froide et feta. Bien fraîche pour la chaleur.","tip":"Laisse refroidir la quinoa avant de la mélanger avec la courgette — comme ça le bol est bien frais.","tags":["Végétarien","Sans gluten","Fraîche"],"harvard":{"veg":"Courgette · concombre","prot":"Feta","grain":"Quinoa"},"nutL":["kcal","protéines","bon gras"],"ingredients":["½ tasse de quinoa","1 courgette","50g de feta","½ concombre","2 c. à soupe d'huile d'olive","Jus de citron","Sel"],"steps":[{"text":"Fais bouillir la quinoa avec 1 tasse d'eau et du sel. À l'ébullition, baisse au minimum et couvre 12 min","voice":"Fais bouillir la quinoa avec de l'eau et du sel douze minutes au minimum"},{"text":"Poêle la courgette en rondelles avec l'huile et le sel 4 min de chaque côté","voice":"Poêle la courgette avec l'huile quatre minutes"},{"text":"Mélange la quinoa, la courgette, le concombre en morceaux et la feta. Assaisonne avec le citron et l'huile","voice":"Mélange le tout avec la feta et assaisonne avec le citron"}]},"jun-c2":{"name":"Poulet aux poivrons et riz","desc":"Les poivrons d'été ont plein de goût. Avec du poulet et du riz, ça fait un plat complet.","tip":"Les poivrons ramollissent vite à la chaleur. Ne les couvre pas — comme ça ils cuisent sans vapeur et restent plus savoureux.","tags":["Sans gluten","Été"],"harvard":{"veg":"Poivron","prot":"Poulet","grain":"Riz"},"nutL":["kcal","protéines","glucides"],"ingredients":["1 blanc de poulet en escalopes","1 poivron rouge ou vert","½ tasse de riz","1 c. à soupe d'huile d'olive","Sel, paprika, ail en poudre"],"steps":[{"text":"Mets le riz à cuire avec de l'eau et du sel 18 min","voice":"Mets le riz à cuire dix-huit minutes"},{"text":"Fais revenir le poulet 4 min. Ajoute le poivron en lanières et le paprika. Cuis 5 min de plus","voice":"Fais revenir le poulet quatre minutes, ajoute le poivron et cuis cinq minutes de plus"},{"text":"Sers le poulet avec les poivrons sur le riz","voice":"Sers le poulet avec les poivrons sur le riz"}]},"jun-n1":{"name":"Gaspacho vert au pain","desc":"Concombre et courgette mixés avec de l'huile. Ultra frais et sans cuisson pour les jours de chaleur.","tip":"Mets tous les ingrédients au frigo 1 heure avant de les mixer — beaucoup plus frais et savoureux.","tags":["Végétarien","Sans cuisson","Rafraîchissant"],"harvard":{"veg":"Concombre · courgette","prot":"—","grain":"Pain complet"},"nutL":["kcal","protéines","hydratation"],"ingredients":["1 gros concombre","½ courgette crue","2 c. à soupe d'huile d'olive","Jus d'½ citron","1 gousse d'ail","Sel","Pain complet"],"steps":[{"text":"Coupe le concombre et la courgette crue non pelés en morceaux. Mets-les dans le bol du mixeur","voice":"Coupe le concombre et la courgette et mets-les dans le bol"},{"text":"Ajoute l'ail, l'huile, le citron et le sel. Mixe jusqu'à ce que ce soit lisse. Goûte le sel","voice":"Ajoute l'ail, l'huile, le citron et le sel. Mixe le tout"},{"text":"Sers froid avec du pain complet. Si c'est trop épais, ajoute un peu d'eau","voice":"Sers froid avec du pain complet"}]},"jun-n2":{"name":"Omelette de courgette","desc":"La courgette d'été en omelette. Très moelleuse et toute simple.","tip":"La courgette rend beaucoup d'eau — mets-la à la poêle avec du sel et attends qu'elle s'évapore avant d'ajouter les œufs.","tags":["Végétarien","Sans gluten","Rapide"],"harvard":{"veg":"Courgette","prot":"Œuf","grain":"Pain complet (facultatif)"},"nutL":["kcal","protéines","bon gras"],"ingredients":["1 petite courgette","2 œufs","1 c. à soupe d'huile d'olive","Sel"],"steps":[{"text":"Râpe ou coupe la courgette finement. Fais-la revenir avec l'huile et le sel 4 min jusqu'à ce que l'eau s'évapore","voice":"Fais revenir la courgette avec du sel quatre minutes jusqu'à ce que l'eau s'évapore"},{"text":"Bats les œufs avec du sel. Verse sur la courgette à feu moyen-doux. 3 min sans remuer","voice":"Bats les œufs et verse-les. Trois minutes sans remuer"},{"text":"Retourne-la et 2 min de plus. C'est prêt","voice":"Retourne-la et deux minutes de plus"}]},"jul-c1":{"name":"Salade de pois chiches, concombre et maïs","desc":"Sans cuisson. Protéines + légumes de saison en 5 minutes. Parfaite pour la chaleur.","tip":"Le concombre et le poivron d'été sont croquants et bon marché. Le maïs en boîte apporte la touche sucrée.","tags":["Végétarien","Sans cuisson","Été"],"harvard":{"veg":"Concombre · poivron","prot":"Pois chiches","grain":"Maïs"},"nutL":["kcal","protéines","fibres"],"ingredients":["1 bocal de pois chiches (400g)","1 concombre","½ poivron rouge","½ boîte de maïs doux","Olives noires","2 c. à soupe d'huile d'olive","Sel, origan"],"steps":[{"text":"Égoutte et rince les pois chiches. Mets-les dans un grand saladier","voice":"Égoutte et rince les pois chiches"},{"text":"Coupe le concombre et le poivron. Ajoute au saladier avec le maïs et les olives","voice":"Coupe le concombre et le poivron et ajoute au saladier avec le maïs et les olives"},{"text":"Assaisonne avec l'huile, le sel et l'origan. Mélange et à table","voice":"Assaisonne avec l'huile, le sel et l'origan et c'est prêt"}]},"jul-c2":{"name":"Riz à l'aubergine et pois chiches","desc":"L'aubergine d'été avec des pois chiches et du riz. Plat méditerranéen et économique.","tip":"Coupe l'aubergine en dés et sale-la avant de la cuisiner — comme ça elle perd son amertume et absorbe moins d'huile.","tags":["Végétarien","Sans gluten","Été"],"harvard":{"veg":"Aubergine","prot":"Pois chiches","grain":"Riz"},"nutL":["kcal","protéines","glucides"],"ingredients":["1 aubergine","1 bocal de pois chiches (400g)","½ tasse de riz","1 c. à soupe d'huile d'olive","1 gousse d'ail","Sel, cumin, paprika"],"steps":[{"text":"Mets le riz à cuire avec de l'eau et du sel 18 min","voice":"Mets le riz à cuire dix-huit minutes"},{"text":"Pendant ce temps : fais revenir l'aubergine en dés avec l'ail et l'huile 8 min jusqu'à ce qu'elle soit dorée","voice":"Fais revenir l'aubergine en dés avec l'ail huit minutes jusqu'à ce qu'elle soit dorée"},{"text":"Ajoute les pois chiches égouttés, le cumin et le paprika. 3 min de plus. Sers avec le riz","voice":"Ajoute les pois chiches avec le cumin trois minutes de plus et sers avec le riz"}]},"jul-n1":{"name":"Soupe froide de concombre au yaourt","desc":"L'alternative au gaspacho sans tomate. Ultra fraîche et prête en 5 minutes.","tip":"Prépare-la la veille et garde-la au frigo bien couverte — bien froide, elle est deux fois meilleure.","tags":["Végétarien","Sans cuisson","Rafraîchissant"],"harvard":{"veg":"Concombre","prot":"Yaourt","grain":"Pain (accompagnement)"},"nutL":["kcal","protéines","minéral"],"ingredients":["2 concombres","2 yaourts nature","1 petite gousse d'ail","2 c. à soupe d'huile d'olive","Jus d'½ citron","Sel, menthe"],"steps":[{"text":"Épluche et coupe les concombres en morceaux. Mets-les dans le bol du mixeur","voice":"Épluche et coupe les concombres et mets-les dans le bol du mixeur"},{"text":"Ajoute le yaourt, l'ail, l'huile, le citron et le sel. Mixe 1 minute","voice":"Ajoute le yaourt, l'ail, l'huile et le citron. Mixe une minute"},{"text":"Goûte le sel. Sers bien froide avec des feuilles de menthe","voice":"Goûte le sel et sers bien froide avec de la menthe"}]},"jul-n2":{"name":"Poivron farci au thon","desc":"Poivrons d'été farcis au thon. Sans four — ça se fait à la poêle.","tip":"Les poivrons italiens ou piquillos sont parfaits à farcir. Coupe le haut et vide les graines.","tags":["Sans gluten","Été"],"harvard":{"veg":"Poivron","prot":"Thon","grain":"Riz (facultatif)"},"nutL":["kcal","protéines","bon gras"],"ingredients":["2 poivrons (italiens ou piquillos)","2 boîtes de thon au naturel","2 c. à soupe d'huile d'olive","Sel, origan","Jus de citron"],"steps":[{"text":"Mélange le thon égoutté avec l'huile, le citron, le sel et l'origan dans un bol","voice":"Mélange le thon avec l'huile, le citron et l'origan"},{"text":"Coupe le haut des poivrons et vide les graines. Farcis avec le mélange de thon","voice":"Vide les poivrons et farcis-les avec le thon"},{"text":"Chauffe à la poêle couverte à feu moyen 8 min jusqu'à ce que le poivron soit tendre","voice":"Cuis à la poêle couverte huit minutes jusqu'à ce que le poivron ramollisse"}]},"ago-c1":{"name":"Bol de quinoa au pisto","desc":"Pisto d'été avec des légumes de saison sur de la quinoa. Plat complet et nourrissant.","tip":"Le pisto est meilleur le lendemain — prépares-en le double et garde la moitié pour demain.","tags":["Végétarien","Sans gluten","Méditerranéen"],"harvard":{"veg":"Courgette · poivron · aubergine","prot":"Œuf (facultatif)","grain":"Quinoa"},"nutL":["kcal","protéines","bon gras"],"ingredients":["½ tasse de quinoa","1 courgette","1 poivron rouge","1 petite aubergine","1 c. à soupe d'huile d'olive","1 gousse d'ail","Sel, origan"],"steps":[{"text":"Fais bouillir la quinoa avec de l'eau et du sel 12 min au minimum à couvert","voice":"Fais bouillir la quinoa douze minutes à couvert au minimum"},{"text":"Coupe tous les légumes en dés. Fais-les revenir avec l'ail et l'huile 10 min à feu moyen en remuant","voice":"Fais revenir tous les légumes en dés avec l'ail dix minutes"},{"text":"Ajoute l'origan et le sel au pisto. Sers sur la quinoa","voice":"Ajoute l'origan et sers le pisto sur la quinoa"}]},"ago-c2":{"name":"Saumon en papillote aux courgettes","desc":"La papillote cuit le saumon avec sa propre vapeur. Sans salir et sans odeur.","tip":"Papillote = papier cuisson plié en enveloppe. La vapeur qui reste à l'intérieur cuit parfaitement le poisson.","tags":["Sans gluten","Oméga-3","Été"],"harvard":{"veg":"Courgette","prot":"Saumon","grain":"—"},"nutL":["kcal","protéines","oméga 3"],"ingredients":["1 filet de saumon (150g)","1 courgette en rondelles","1 c. à soupe d'huile d'olive","Jus d'½ citron","Sel, aneth (facultatif)","Papier cuisson"],"steps":[{"text":"Allume le four à 200°C. Mets la courgette en rondelles sur le papier cuisson","voice":"Allume le four à deux cents degrés"},{"text":"Pose le saumon dessus, ajoute l'huile, le citron et le sel. Plie le papier en fermant bien comme une enveloppe","voice":"Pose le saumon dessus, ajoute l'huile et le citron et ferme bien le papier"},{"text":"Enfourne 12 min. Le paquet gonfle — c'est bon signe. Ouvre en faisant attention à la vapeur","voice":"Enfourne douze minutes. Ouvre en faisant attention à la vapeur chaude"}]},"ago-n1":{"name":"Ajoblanco au melon","desc":"La plus ancienne soupe froide andalouse — et sans tomate. Avec le melon d'août, c'est un luxe pas cher.","tip":"Le pain rassis de la veille est parfait — il donne du corps. Si tu n'as pas de poudre d'amande, une poignée d'amandes crues fait l'affaire.","tags":["Végétarien","Sans cuisson","Été"],"harvard":{"veg":"Melon (fruit)","prot":"Amandes","grain":"Pain complet"},"nutL":["kcal","protéines","antioxyd."],"ingredients":["50g d'amandes crues ou en poudre","1 tranche de pain rassis","1 petite gousse d'ail","3 c. à soupe d'huile d'olive","1 c. à soupe de vinaigre","1 verre d'eau très froide","Melon en dés"],"steps":[{"text":"Fais tremper le pain dans l'eau. Mets-le dans le mixeur avec les amandes, l'ail, l'huile et le vinaigre","voice":"Fais tremper le pain et mets-le dans le mixeur avec les amandes, l'ail, l'huile et le vinaigre"},{"text":"Ajoute le verre d'eau très froide et mixe jusqu'à ce que ce soit très fin","voice":"Ajoute l'eau froide et mixe jusqu'à ce que ce soit très fin"},{"text":"Sers bien froid avec les dés de melon par-dessus","voice":"Sers bien froid avec les dés de melon par-dessus"}]},"ago-n2":{"name":"Aubergine grillée au fromage","desc":"Rondelles d'aubergine dorées avec du fromage fondu. Simple et savoureux.","tip":"Sale les rondelles 10 min avant de les cuisiner et sèche-les avec du papier — comme ça elles restent croustillantes et ne s'imbibent pas d'huile.","tags":["Végétarien","Sans gluten","Été"],"harvard":{"veg":"Aubergine","prot":"Fromage","grain":"Pain complet"},"nutL":["kcal","protéines","bon gras"],"ingredients":["1 grosse aubergine","60g de mozzarella ou de fromage à fondre","1 c. à soupe d'huile d'olive","Sel, origan"],"steps":[{"text":"Coupe l'aubergine en rondelles de 1 cm. Sale et laisse 5 min. Sèche avec du papier","voice":"Coupe en rondelles, sale et attends cinq minutes. Sèche avec du papier"},{"text":"Poêle avec l'huile à feu moyen-vif 4 min de chaque côté jusqu'à ce qu'elles soient dorées","voice":"Poêle quatre minutes de chaque côté jusqu'à ce qu'elles soient dorées"},{"text":"Ajoute le fromage par-dessus, couvre 2 min jusqu'à ce qu'il fonde. Ajoute l'origan","voice":"Mets le fromage par-dessus et couvre deux minutes jusqu'à ce qu'il fonde"}]},"sep-c1":{"name":"Velouté de potiron aux lentilles","desc":"Le potiron surgelé rend ce velouté très rapide. Les lentilles en font un plat complet.","tip":"Le potiron surgelé est déjà coupé et épluché. C'est la version la plus pratique et la moins chère.","tags":["Végétarien","Sans gluten","Automne"],"harvard":{"veg":"Potiron","prot":"Lentilles","grain":"Pain complet"},"nutL":["kcal","protéines","vitamine A"],"ingredients":["250g de potiron surgelé","1 bocal de lentilles cuites (400g)","½ oignon","1 verre de bouillon de légumes","1 c. à soupe d'huile d'olive","Sel, curcuma, gingembre"],"steps":[{"text":"Fais revenir l'oignon avec l'huile 3 min. Ajoute le potiron surgelé et le bouillon","voice":"Fais revenir l'oignon trois minutes et ajoute le potiron et le bouillon"},{"text":"Porte à ébullition et cuis 12 min à couvert à feu moyen jusqu'à ce que le potiron soit tendre","voice":"Porte à ébullition et cuis douze minutes jusqu'à ce que le potiron soit tendre"},{"text":"Mixe. Ajoute les lentilles égouttées, le curcuma, le sel. Chauffe 3 min de plus","voice":"Mixe, ajoute les lentilles égouttées avec le curcuma et chauffe trois minutes de plus"}]},"sep-c2":{"name":"Riz aux champignons et poulet","desc":"Le goût des champignons de saison avec du poulet et du riz. Plat d'automne complet.","tip":"Les champignons n'ont pas besoin de beaucoup d'eau — ils cuisent dans leur propre jus. Ne mets pas de couvercle quand tu les fais revenir.","tags":["Sans gluten","Automne"],"harvard":{"veg":"Champignons","prot":"Poulet","grain":"Riz"},"nutL":["kcal","protéines","glucides"],"ingredients":["1 blanc de poulet en morceaux","150g de champignons (frais ou surgelés)","½ tasse de riz","1 c. à soupe d'huile d'olive","1 gousse d'ail","Sel, persil"],"steps":[{"text":"Mets le riz à cuire avec de l'eau et du sel 18 min","voice":"Mets le riz à cuire avec de l'eau et du sel dix-huit minutes"},{"text":"Fais revenir le poulet avec l'huile et l'ail 5 min. Ajoute les champignons. Cuis 6 min sans couvrir","voice":"Fais revenir le poulet cinq minutes, ajoute les champignons et cuis six minutes sans couvrir"},{"text":"Ajoute le sel et le persil. Sers avec le riz","voice":"Ajoute le sel et le persil et sers avec le riz"}]},"sep-n1":{"name":"Soupe de champignons au pain","desc":"Les champignons ont un goût intense qui transforme le bouillon en quelque chose de spécial.","tip":"Un filet de sauce soja à la fin intensifie beaucoup le goût. Juste une cuillère à café.","tags":["Végétarien","Sans gluten","Automne"],"harvard":{"veg":"Champignons","prot":"—","grain":"Pain complet"},"nutL":["kcal","protéines","champignons"],"ingredients":["150g de champignons variés","½ oignon","1 gousse d'ail","1L de bouillon de légumes","1 c. à soupe d'huile d'olive","Sel, persil","Pain complet"],"steps":[{"text":"Hache l'oignon et l'ail. Fais revenir avec l'huile 3 min. Ajoute les champignons coupés et fais revenir 4 min","voice":"Fais revenir l'oignon et l'ail trois minutes, ajoute les champignons et fais revenir quatre minutes"},{"text":"Ajoute le bouillon. Porte à ébullition et cuis 5 min. Ajoute le sel et le persil","voice":"Ajoute le bouillon, fais bouillir cinq minutes et ajoute le sel et le persil"},{"text":"Sers avec du pain complet grillé","voice":"Sers avec du pain complet"}]},"sep-n2":{"name":"Quinoa à l'aubergine rôtie","desc":"Aubergine rôtie avec quinoa et feta. Version automnale du bol méditerranéen.","tip":"L'aubergine rôtie au four est plus tendre et sans amertume qu'à la poêle. Ça vaut le coup d'allumer le four.","tags":["Végétarien","Sans gluten","Automne"],"harvard":{"veg":"Aubergine","prot":"Feta","grain":"Quinoa"},"nutL":["kcal","protéines","bon gras"],"ingredients":["1 aubergine","½ tasse de quinoa","50g de feta","2 c. à soupe d'huile d'olive","Sel, origan","Jus de citron"],"steps":[{"text":"Allume le four à 200°C. Coupe l'aubergine en dés, mélange avec l'huile et le sel. Enfourne 12 min","voice":"Enfourne l'aubergine en dés avec l'huile et le sel douze minutes à deux cents degrés"},{"text":"Fais bouillir la quinoa avec de l'eau et du sel 12 min au minimum à couvert","voice":"Fais bouillir la quinoa douze minutes au minimum à couvert"},{"text":"Mélange la quinoa avec l'aubergine rôtie, la feta émiettée, le citron et l'origan","voice":"Mélange la quinoa avec l'aubergine, la feta et le citron"}]},"oct-c1":{"name":"Bowl de courge et lentilles","desc":"La courge rôtie avec des lentilles et du riz est un plat d'automne complet et très économique.","tip":"Tu peux utiliser de la courge surgelée ou en bocal pour aller plus vite. Le résultat est tout aussi bon.","tags":["Végétarien","Sans gluten","Automne"],"harvard":{"veg":"Courge","prot":"Lentilles","grain":"Riz complet"},"nutL":["kcal","protéines","vitamine A"],"ingredients":["250g de courge (surgelée ou fraîche)","1 bocal de lentilles (400g)","½ tasse de riz","1 c. à soupe d'huile d'olive","Sel, cumin, curcuma"],"steps":[{"text":"Mets le riz à cuire 18 min. En parallèle : mets la courge en dés dans une poêle avec l'huile à feu moyen","voice":"Mets le riz à cuire et, en parallèle, fais revenir la courge en dés avec l'huile"},{"text":"Cuis la courge 10 min en remuant jusqu'à ce qu'elle soit tendre. Ajoute le cumin et le curcuma","voice":"Cuis la courge dix minutes jusqu'à ce qu'elle ramollisse. Ajoute le cumin et le curcuma"},{"text":"Ajoute les lentilles égouttées et le sel. Encore 2 min. Sers avec le riz","voice":"Ajoute les lentilles, le sel et sers avec le riz"}]},"oct-c2":{"name":"Pâtes aux champignons et fromage","desc":"Les champignons avec des pâtes complètes et du fromage, c'est le plat d'automne le plus réconfortant.","tip":"Garde un peu de l'eau de cuisson des pâtes — elle aide à émulsionner la sauce pour qu'elle accroche bien aux pâtes.","tags":["Végétarien","Automne"],"harvard":{"veg":"Champignons","prot":"Fromage","grain":"Pâtes complètes"},"nutL":["kcal","protéines","glucides"],"ingredients":["80g de pâtes complètes","150g de champignons","30g de fromage râpé","1 gousse d'ail","2 c. à soupe d'huile d'olive","Sel, persil"],"steps":[{"text":"Cuis les pâtes dans l'eau salée selon le paquet. Garde ½ verre de l'eau","voice":"Cuis les pâtes et garde un demi-verre de l'eau de cuisson"},{"text":"Fais revenir les champignons avec l'ail et l'huile 6 min à feu moyen sans couvrir","voice":"Fais revenir les champignons avec l'ail six minutes sans couvrir"},{"text":"Mélange les pâtes égouttées avec les champignons et un peu de l'eau réservée. Ajoute le fromage et le persil","voice":"Mélange les pâtes avec les champignons, l'eau de cuisson, le fromage et le persil"}]},"oct-n1":{"name":"Velouté de courge épicé","desc":"Doux, crémeux et réconfortant. Avec le gingembre et le curcuma, il a une touche chaleureuse qui fait du bien en automne.","tip":"Le lait de coco le rend plus crémeux et rassasiant. Sans lui, il reste délicieux avec juste le bouillon.","tags":["Végétarien","Sans gluten","Automne"],"harvard":{"veg":"Courge","prot":"—","grain":"Pain complet"},"nutL":["kcal","protéines","vitamine A"],"ingredients":["300g de courge surgelée","½ oignon","1 verre de bouillon de légumes","½ boîte de lait de coco","1 c. à soupe d'huile d'olive","Gingembre en poudre, curcuma, sel"],"steps":[{"text":"Fais revenir l'oignon avec l'huile 3 min. Ajoute la courge surgelée et le bouillon","voice":"Fais revenir l'oignon et ajoute la courge avec le bouillon"},{"text":"Porte à ébullition et cuis 8 min à couvert. Éteins le feu","voice":"Porte à ébullition et cuis huit minutes à couvert"},{"text":"Mixe. Ajoute le lait de coco, le curcuma, le gingembre et le sel. Mélange et sers","voice":"Mixe, ajoute le lait de coco et les épices. Sers bien chaud"}]},"oct-n2":{"name":"Champignons à l'œuf et à l'ail","desc":"Des champignons sautés à l'ail avec un œuf par-dessus. Le dîner d'automne le plus simple.","tip":"Ne mets pas de couvercle quand tu fais sauter les champignons — la vapeur les cuirait et ils deviendraient mous au lieu de dorés.","tags":["Végétarien","Sans gluten","Rapide"],"harvard":{"veg":"Champignons","prot":"Œuf","grain":"Pain complet"},"nutL":["kcal","protéines","champignons"],"ingredients":["150g de champignons","1 gousse d'ail","1 œuf","1 c. à soupe d'huile d'olive","Sel, persil","Pain complet"],"steps":[{"text":"Fais sauter les champignons avec l'ail et l'huile à feu vif 5 min sans couvrir. Sale à la fin","voice":"Fais sauter les champignons avec l'ail à feu vif cinq minutes sans couvrir"},{"text":"Fais un creux dans la poêle, fais frire l'œuf à feu moyen 2 min","voice":"Fais un creux et fais frire l'œuf deux minutes"},{"text":"Sers avec du pain complet et du persil haché","voice":"Sers avec du pain et du persil haché"}]},"nov-c1":{"name":"Soupe de poireau et poulet","desc":"La soupe de poireau et poulet est le plat le plus réconfortant de novembre.","tip":"Le poulet en haut de cuisse effiloché reste plus juteux que le blanc dans la soupe. Il est aussi plus économique.","tags":["Sans gluten","Réconfortante","Hiver"],"harvard":{"veg":"Poireau · carotte","prot":"Poulet","grain":"—"},"nutL":["kcal","protéines","glucides"],"ingredients":["1 blanc de poulet (ou 2 hauts de cuisse)","2 poireaux","1 carotte","1L de bouillon de poulet","1 c. à soupe d'huile d'olive","Sel, persil"],"steps":[{"text":"Coupe les poireaux et la carotte. Fais revenir avec l'huile dans une grande casserole 5 min à feu moyen","voice":"Coupe les poireaux et la carotte et fais-les revenir cinq minutes avec l'huile"},{"text":"Ajoute le poulet entier et le bouillon. Porte à ébullition, baisse à feu doux et cuis 15 min à couvert","voice":"Ajoute le poulet et le bouillon. Porte à ébullition et cuis quinze minutes à feu doux"},{"text":"Sors le poulet, effiloche-le et remets-le dans la casserole. Ajoute le persil et le sel","voice":"Effiloche le poulet et remets-le dans la casserole avec le persil et le sel"}]},"nov-c2":{"name":"Lentilles aux champignons","desc":"Les lentilles avec les champignons d'automne sont une association exceptionnelle de saveur et de nutrition.","tip":"Les champignons déshydratés donnent beaucoup de goût au bouillon. Fais-les tremper 10 min dans de l'eau chaude avant de les utiliser.","tags":["Végétarien","Sans gluten","Fer"],"harvard":{"veg":"Champignons · carotte","prot":"Lentilles","grain":"Pain complet"},"nutL":["kcal","protéines","fer"],"ingredients":["1 bocal de lentilles (400g)","150g de champignons","1 carotte","½ oignon","1 c. à soupe d'huile d'olive","Sel, paprika, ail"],"steps":[{"text":"Hache l'oignon et la carotte. Fais revenir avec l'huile et l'ail 5 min","voice":"Hache l'oignon et la carotte et fais revenir avec l'ail cinq minutes"},{"text":"Ajoute les champignons coupés. Fais sauter 5 min sans couvrir. Ajoute le paprika","voice":"Ajoute les champignons et fais sauter cinq minutes sans couvrir"},{"text":"Ajoute les lentilles égouttées et ½ verre d'eau. Sale. Cuis 8 min en remuant","voice":"Ajoute les lentilles avec l'eau et le sel. Cuis huit minutes en remuant"}]},"nov-n1":{"name":"Velouté de chou-fleur et poireau","desc":"L'association du chou-fleur et du poireau donne un velouté doux et très parfumé.","tip":"Le poireau donne au velouté une saveur plus douce et suave que l'oignon. C'est le secret de cette recette.","tags":["Végétarien","Sans gluten","Réconfortante"],"harvard":{"veg":"Chou-fleur · poireau","prot":"—","grain":"Pain complet"},"nutL":["kcal","protéines","immunité"],"ingredients":["200g de chou-fleur surgelé","1 poireau","1 verre de bouillon de légumes","1 c. à soupe d'huile d'olive","Sel, noix de muscade","Pain complet"],"steps":[{"text":"Coupe le poireau en rondelles. Fais revenir avec l'huile 4 min à feu moyen","voice":"Coupe le poireau et fais-le revenir quatre minutes avec l'huile"},{"text":"Ajoute le chou-fleur surgelé et le bouillon. Porte à ébullition et cuis 8 min à couvert","voice":"Ajoute le chou-fleur et le bouillon. Porte à ébullition et cuis huit minutes"},{"text":"Mixe bien. Ajoute la noix de muscade et le sel. Sers avec du pain","voice":"Mixe, ajoute la noix de muscade et sers avec du pain"}]},"nov-n2":{"name":"Chou sauté à l'œuf et à l'ail","desc":"Le chou est le légume le plus économique de l'hiver et il est très bon sauté avec de l'ail et un œuf.","tip":"Le chou a besoin d'un feu vif pour sauter — ainsi il reste légèrement doré et pas mou. Remue-le peu.","tags":["Végétarien","Sans gluten","Rapide","Économique"],"harvard":{"veg":"Chou","prot":"Œuf","grain":"Pain complet"},"nutL":["kcal","protéines","immunité"],"ingredients":["¼ de chou (chou vert ou chou frisé)","1 gousse d'ail","1 œuf","1 c. à soupe d'huile d'olive","Sel","Pain complet"],"steps":[{"text":"Coupe le chou en fines lanières. Fais sauter avec l'ail et l'huile à feu vif 4 min sans couvrir","voice":"Fais sauter le chou en lanières avec l'ail à feu vif quatre minutes"},{"text":"Ajoute le sel, pousse le chou sur les côtés et fais frire l'œuf au centre 3 min","voice":"Ajoute le sel et fais frire l'œuf au centre de la poêle trois minutes"},{"text":"Sers avec du pain complet","voice":"Sers avec du pain complet"}]},"dic-c1":{"name":"Bowl de quinoa au brocoli et saumon","desc":"Plat complet d'hiver avec des oméga-3, des protéines et un légume de saison.","tip":"Le saumon surgelé en filet est bien plus économique que le frais. Décongèle-le la veille au soir.","tags":["Sans gluten","Oméga-3"],"harvard":{"veg":"Brocoli","prot":"Saumon","grain":"Quinoa"},"nutL":["kcal","protéines","oméga 3"],"ingredients":["½ tasse de quinoa","1 filet de saumon (150g)","150g de brocoli surgelé","1 c. à soupe d'huile d'olive","Jus de citron","Sel, aneth"],"steps":[{"text":"Fais bouillir le quinoa 12 min à feu minimum. À 8 min, pose le brocoli par-dessus sans mélanger","voice":"Fais bouillir le quinoa douze minutes et à huit minutes pose le brocoli par-dessus"},{"text":"Sale le saumon. Poêle-le avec l'huile 3 min de chaque côté à feu moyen-vif","voice":"Poêle le saumon avec l'huile trois minutes de chaque côté"},{"text":"Sers le quinoa et le brocoli avec le saumon par-dessus. Presse le citron et ajoute l'aneth","voice":"Sers le tout ensemble, presse le citron et ajoute l'aneth"}]},"dic-c2":{"name":"Lentilles au poireau et à la carotte","desc":"Les lentilles d'hiver au poireau et à la carotte. Le plat le plus économique et le plus nutritif du mois.","tip":"Un filet de vinaigre de vin au moment de servir active l'absorption du fer des lentilles. Une astuce toute simple.","tags":["Végétarien","Sans gluten","Fer"],"harvard":{"veg":"Poireau · carotte","prot":"Lentilles","grain":"Pain complet"},"nutL":["kcal","protéines","fer"],"ingredients":["1 bocal de lentilles (400g)","1 poireau","1 carotte","½ oignon","1 c. à soupe d'huile d'olive","Sel, paprika, laurier"],"steps":[{"text":"Hache l'oignon, le poireau et la carotte. Fais revenir avec l'huile et le laurier 5 min","voice":"Hache les légumes et fais revenir avec l'huile et le laurier cinq minutes"},{"text":"Ajoute ½ verre d'eau et le paprika. Cuis 10 min à feu moyen à couvert","voice":"Ajoute l'eau et le paprika. Cuis dix minutes à couvert"},{"text":"Ajoute les lentilles égouttées et le sel. Encore 5 min et c'est prêt","voice":"Ajoute les lentilles avec le sel et cuis cinq minutes de plus"}]},"dic-n1":{"name":"Velouté de poireau","desc":"Le velouté de poireau est le plus doux et le plus réconfortant de tous. Parfait pour le froid.","tip":"Utilise aussi la partie verte du poireau — elle donne plus de goût et il n'y a aucune raison de la jeter.","tags":["Végétarien","Sans gluten","Réconfortante"],"harvard":{"veg":"Poireau","prot":"—","grain":"Pain complet"},"nutL":["kcal","protéines","poireau"],"ingredients":["2 poireaux (en entier, partie verte incluse)","1 verre de bouillon de légumes","1 c. à soupe d'huile d'olive","Sel, noix de muscade","Pain complet"],"steps":[{"text":"Coupe les poireaux en rondelles. Fais revenir avec l'huile dans une casserole 4 min à feu moyen","voice":"Coupe les poireaux et fais-les revenir quatre minutes avec l'huile"},{"text":"Ajoute le bouillon. Porte à ébullition et cuis 8 min à couvert","voice":"Ajoute le bouillon, porte à ébullition et cuis huit minutes à couvert"},{"text":"Mixe. Ajoute la noix de muscade et le sel. Sers avec du pain grillé","voice":"Mixe, ajoute la noix de muscade et sers avec du pain grillé"}]},"dic-n2":{"name":"Brocoli à l'œuf et au fromage","desc":"Brocoli à la vapeur avec un œuf au plat et du fromage râpé. Le dîner de décembre le plus rapide.","tip":"Le brocoli au micro-ondes ne prend que 4 minutes avec un peu d'eau — bien plus rapide que bouilli.","tags":["Végétarien","Sans gluten","Rapide"],"harvard":{"veg":"Brocoli","prot":"Œuf · fromage","grain":"Pain complet"},"nutL":["kcal","protéines","brocoli"],"ingredients":["200g de brocoli (frais ou surgelé)","1 œuf","30g de fromage râpé","1 c. à soupe d'huile d'olive","Sel"],"steps":[{"text":"Brocoli au micro-ondes : mets-le dans un bol avec 2 c. à soupe d'eau, couvre de film 4 min","voice":"Mets le brocoli avec de l'eau dans un bol couvert au micro-ondes quatre minutes"},{"text":"Fais frire l'œuf avec l'huile dans une poêle 2 min","voice":"Fais frire l'œuf avec l'huile deux minutes"},{"text":"Sers le brocoli avec l'œuf par-dessus et le fromage râpé. Ajoute le sel","voice":"Sers le brocoli avec l'œuf et le fromage râpé"}]},"exp-c1":{"name":"Pâtes express au thon","desc":"Tout vient du placard. Quand il n'y a ni énergie ni courses, ces pâtes sauvent la journée.","tip":"Jette les petits pois surgelés dans l'eau des pâtes les 3 dernières minutes — une casserole de moins à laver.","tags":["Dépannage","10 minutes"],"harvard":{"veg":"Petits pois","prot":"Thon","grain":"Pâtes complètes"},"nutL":["kcal","protéines","glucides"],"ingredients":["80g de pâtes complètes","1 boîte de thon au naturel","Poignée de petits pois surgelés","2 c. à soupe d'huile d'olive","Ail en poudre, origan, sel"],"steps":[{"text":"Mets l'eau à bouillir avec du sel et cuis les pâtes le temps indiqué sur le paquet. Les 3 dernières minutes : ajoute les petits pois surgelés dans l'eau","voice":"Cuis les pâtes. Les trois dernières minutes, ajoute les petits pois surgelés dans la même eau"},{"text":"Égoutte le tout ensemble. Mélange avec le thon, l'huile, l'ail en poudre et l'origan","voice":"Égoutte et mélange avec le thon, l'huile et l'origan. C const SEASON_GROUPS=[['dic','ene','feb'],['mar','abr','may'],['jun','jul','ago'],['sep','oct','nov']];
function weekMenu(){
  const curId=MONTHS[new Date().getMonth()].id;
  const grp=SEASON_GROUPS.find(g=>g.includes(curId))||SEASON_GROUPS[0];
  const order=[curId,...grp.filter(x=>x!==curId)];
  const comidas=[],cenas=[];
  order.forEach(id=>{const m=MONTHS.find(m=>m.id===id);if(m){comidas.push(...m.comidas);cenas.push(...m.cenas);}});
  comidas.push(EXPRESS.comidas[0]);
  cenas.push(EXPRESS.cenas[0]);
  return {comidas,cenas};
}
function menuKey(){const d=new Date(),y=d.getFullYear(),s=new Date(y,0,1),w=Math.ceil(((d-s)/864e5+s.getDay()+1)/7);return 'cris_menu_w'+w+'_'+y;}
function getMenuDone(){try{return JSON.parse(localStorage.getItem(menuKey())||'{}');}catch(e){return{};}}
function setMenuDone(d){try{localStorage.setItem(menuKey(),JSON.stringify(d));}catch(e){}}
function remainingMenu(){const w=weekMenu(),d=getMenuDone();return {comidas:w.comidas.filter(r=>!d[r.id]),cenas:w.cenas.filter(r=>!d[r.id])};}
function ingrLine(r){
  const seen={},out=[];
  r.ingredients.forEach(i=>{
    if(PANTRY_RE.test(i))return;
    const n=normIngr(i).toLowerCase();
    if(!seen[n]){seen[n]=1;out.push(normL(n)||n);}
  });
  return out.length?out.join(' · '):t('all_pantry');
}

let __beepCtx=null;function __getCtx(){try{if(!__beepCtx)__beepCtx=new(window.AudioContext||window.webkitAudioContext)();if(__beepCtx.state==='suspended')__beepCtx.resume();return __beepCtx;}catch(e){return null;}}
function beep(f=600,d=.2){if(!__allow('sound'))return;try{const c=__getCtx();if(!c)return;const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.setValueAtTime(.3,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
function vibrate(ms=60){if(!__allow('vib'))return;try{if(navigator.vibrate)navigator.vibrate(ms);}catch(e){}}
let _utt=null;
function speak(t){
  try{if(!__allow('voice'))return;
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    if(window.speechSynthesis.paused)window.speechSynthesis.resume();
    _utt=new SpeechSynthesisUtterance(t);
    _utt.lang=VOICE_LANG[crisLang()];_utt.rate=.88;
    const voices=window.speechSynthesis.getVoices();
    const esVoice=voices.find(v=>v.lang.startsWith(crisLang()));
    if(esVoice)_utt.voice=esVoice;
    window.speechSynthesis.speak(_utt);
  }catch(e){}
}

function startCook(){

function stopCook(){
  if(cookInt){clearInterval(cookInt);cookInt=null;}
  cookPlaying=false;
  try{speechSynthesis.cancel();}catch(e){}
}
function renderCook(){
  const r=recL(curRecipe);const el=document.getElementById('cook-content');
  if(cookStep>=r.steps.length){
    const dn=getMenuDone();
    const inWeek=weekMenu().comidas.concat(weekMenu().cenas).some(x=>x.id===r.id);
    if(inWeek&&!dn[r.id]){dn[r.id]=true;setMenuDone(dn);}
    el.innerHTML=`<div class="done-box"><div class="big">🎉</div><h2>${t('cook_done_h')}</h2><p>${t('cook_done_p')}${inWeek?t('cook_done_ticked'):''}</p></div>
    <button class="btn btn-secondary" style="margin-bottom:8px" onclick="go('home')">${t('btn_home')}</button>
    <button class="btn btn-primary" onclick="startCook()">${t('btn_repeat_recipe')}</button>`;
    return;
  }
  const s=r.steps[cookStep];
  const pct=(cookStep/r.steps.length)*100;
  const dots=r.steps.map((_,i)=>`<div class="dot ${i<cookStep?'done':i===cookStep?'active':''}"></div>`).join('');
  const tv=cookPlaying&&cookTimer>0?cookTimer:s.time*60;
  const mm=String(Math.floor(tv/60)).padStart(2,'0'),ss=String(tv%60).padStart(2,'0');
  el.innerHTML=`
    <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="dots">${dots}</div>
    <div class="step-box">
      <div class="step-num">${t('step_of',{i:cookStep+1,n:r.steps.length})}</div>
      <div class="step-text">${s.text}</div>
      ${s.time>0?`<div class="tring" id="ct-ring"><div class="tring-in"><div class="step-timer" id="ct">${mm}:${ss}</div><div class="step-timer-lbl">${t('min_left')}</div></div></div>`:''}
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="cookToggle()">${cookPlaying?t('btn_pause'):t('btn_start')}</button>
      <button class="btn btn-primary" onclick="cookNext()">${t('btn_next')}</button>
    </div>`;
  __ring('ct-ring',cookPlaying&&s.time>0?cookTimer/(s.time*60):1);
}
function cookToggle(){
  if(!cookPlaying){
    cookPlaying=true;
    const s=recL(curRecipe).steps[cookStep];
    if(!cookTimer||cookTimer<=0)cookTimer=s.time*60;
    speak(s.voice);vibrate(50);
    if(s.time>0)cookInt=setInterval(cookTick,1000);
  }else{
    cookPlaying=false;
    if(cookInt){clearInterval(cookInt);cookInt=null;}
    try{speechSynthesis.cancel();}catch(e){}
  }
  renderCook();
}
// Alarma inconfundible al terminar un paso con temporizador (sueles estar lejos del móvil)
function cookAlarm(){
  beep(760,.22);
  setTimeout(()=>beep(980,.22),260);
  setTimeout(()=>beep(1240,.42),520);
  vibrate([160,90,160,90,320]);
}
function cookTick(){
  cookTimer--;
  const el=document.getElementById('ct');
  if(el)el.textContent=String(Math.floor(cookTimer/60)).padStart(2,'0')+':'+String(cookTimer%60).padStart(2,'0');
  const _s=curRecipe.steps[cookStep];
  __ring('ct-ring',(_s&&_s.time)?cookTimer/(_s.time*60):0);
  if(cookTimer===10)speak(t('v_last10'));
  if(cookTimer<=0)cookAdv(true);
}
function cookAdv(auto){
  if(cookInt){clearInterval(cookInt);cookInt=null;}
  cookStep++;cookPlaying=false;cookTimer=0;
  if(cookStep<curRecipe.steps.length){
    const nx=recL(curRecipe).steps[cookStep];
    if(auto){
      // El temporizador acabó solo: alarma fuerte y dicta el siguiente paso
      cookAlarm();
      speak(t('v_time_next',{s:(nx.voice||nx.text)}));
    }else{beep(600,.15);vibrate(60);}
  }else{
    // Último paso terminado: la receta está lista
    cookAlarm();
    speak(t('v_recipe_done'));
  }
  renderCook();
}
function cookNext(){if(cookInt){clearInterval(cookInt);cookInt=null;}cookPlaying=false;cookTimer=0;cookAdv(false);}

function isVeg(r){return r.tags&&r.tags.indexOf('Vegetariano')>=0;}
/* «Proteína animal» incluye el huevo (la promesa del botón es «pescado, pollo o huevo»),
   aunque la receta lleve etiqueta Vegetariano */
function hasAnimal(r){return !!(r.harvard&&/atún|pollo|pavo|pescado|merluza|salmón|sardina|caballa|bacalao|dorada|lubina|gamba|marisco|huevo|bonito|anchoa|jamón|calamar|sepia|pulpo/i.test(r.harvard.prot||''));}
function pickMins(r){const m=parseInt(r.time);return isNaN(m)?99:m;}
/* Filtra lo que queda del menú según las respuestas; si no hay nada exacto, relaja */
function pickFilter(){
  const rem=remainingMenu()[pickMeal];
  const max=pickAns.t==='poca'?12:pickAns.t==='normal'?20:999;
  const tOK=r=>pickMins(r)<=max;
  const pOK=r=>pickAns.p==='igual'?true:pickAns.p==='veg'?isVeg(r):hasAnimal(r);
  let list=rem.filter(r=>tOK(r)&&pOK(r)),note='';
  if(!list.length&&rem.length){list=rem.filter(pOK);if(list.length)note=t('note_fast');}
  if(!list.length&&rem.length){list=rem.filter(tOK);if(list.length)note=t('note_type');}
  if(!list.length&&rem.length){list=rem;note=t('note_left');}
  if(!list.length){
    // Semana completada: el salvavidas también respeta tu respuesta si puede
    const ex=EXPRESS[pickMeal].filter(pOK);
    list=ex.length?ex:EXPRESS[pickMeal];
    note=t('note_complete');
  }
  return {list,note};
}

  }else if(pickStep==='q2'){
    body=pickQ(t('q2_title'),[
      ['p','animal',t('q2_a')],
      ['p','veg',t('q2_b')],
      ['p','igual',t('q2_c')]]);
  }else{
    const f=pickFilter();
    const r=f.list[pickIdx%f.list.length];
    body=(f.note?`<div class="card" style="margin-bottom:10px"><p>${f.note}</p></div>`:'')
      +suggCard(r)
      +(f.list.length>1?`<button class="btn btn-secondary" style="margin-bottom:8px" onclick="pickIdx++;renderPick()">${t('btn_another',{n:f.list.length})}</button>`:'')
      +`<button class="btn btn-secondary" style="margin-bottom:8px" onclick="pickStep='q1';pickAns={};renderPick()">${t('btn_change')}</button>`
      +`<button class="btn btn-secondary" onclick="go('basicos')">${t('btn_express10')}</button>`;
  }
  el.innerHTML=`<div class="tabs">${chip('comidas',t('chip_lunch'))}${chip('cenas',t('chip_dinner'))}</div>`+body;
}

/* ── MENÚ SEMANAL ── */
function renderWeek(){
  const w=weekMenu(),d=getMenuDone();
  const rem=w.comidas.filter(r=>!d[r.id]).length+w.cenas.filter(r=>!d[r.id]).length;
  document.getElementById('week-banner').innerHTML=rem
    ?`<p>${t('week_banner_rem',{n:rem})}</p>`
    :`<p>${t('week_banner_done')}</p>`;
  const row=r0=>{const r=recL(r0),done=!!d[r0.id];return `
    <div class="wk-row ${done?'wk-done':''}">
      <button class="wk-check" onclick="tickMenu('${r0.id}')">${done?'✓':''}</button>
      <div class="wk-info" onclick="openRecipe('${r0.id}','week')">
        <div class="wk-name">${r.emoji} ${r.name}</div>
        <div class="wk-meta">${r.time} · ${r.budget}${r0.express?t('from_pantry'):''}</div>
        ${done?'':`<div class="wk-ingr">🧺 ${ingrLine(r0)}</div>`}
      </div>
    </div>`;};
  document.getElementById('week-list').innerHTML=
    `<p class="section-label">${t('week_lunch7')}</p>`+w.comidas.map(row).join('')+
    `<p class="section-label" style="margin-top:16px">${t('week_dinner7')}</p>`+w.cenas.map(row).join('');
}
function tickMenu(id){
  beep(500,.1);vibrate(40);
  const d=getMenuDone();
  if(d[id])delete d[id];else d[id]=true;
  setMenuDone(d);
  renderWeek();
}

/* ── BÁSICOS SALVAVIDAS ── */

  document.getElementById('basicos-content').innerHTML=`
   <div class="card" style="margin-bottom:14px"><p>${t('basics_intro')}</p></div>
   <p class="section-label">${t('basics_recipes')}</p>
   ${[...EXPRESS.comidas,...EXPRESS.cenas].map(r0=>{const r=recL(r0);return`
     <div class="recipe-card" onclick="openRecipe('${r.id}','basicos')">
      <div class="r-head"><span class="r-emoji">${r.emoji}</span>

/* ── SHOPPING ── */
function getChecked(){try{return JSON.parse(localStorage.getItem('cris_comida_shop')||'{}');}catch(e){return{};}}
function setChecked(d){try{localStorage.setItem('cris_comida_shop',JSON.stringify(d));}catch(e){}}
function getShopRecipes(){try{return JSON.parse(localStorage.getItem('cris_comida_shop_recetas')||'[]');}catch(e){return[];}}
function setShopRecipes(a){try{localStorage.setItem('cris_comida_shop_recetas',JSON.stringify(a));}catch(e){}}
function addToShop(id){
  const list=getShopRecipes();
  if(!list.includes(id)){list.push(id);setShopRecipes(list);}
  beep(700,.12);vibrate(50);
  go('shopping');
}
function removeFromShop(id){
  setShopRecipes(getShopRecipes().filter(x=>x!==id));
  const ck=getChecked();
  Object.keys(ck).forEach(k=>{if(k.indexOf('r-'+id+'-')===0)delete ck[k];});
  setChecked(ck);
  renderShop();
}
/* La compra semanal se genera sola desde las 14 recetas del menú.
   Los ingredientes de despensa (aceite, especias...) se filtran: ya están en básicos. */
const PANTRY_RE=/(aceite|(^|\s)sal\b|sal,|pimienta|orégano|oregano|comino|cúrcuma|curcuma|pimentón|pimenton|vinagre|ajo|especias|agua|papel de horno|eneldo|jengibre|menta|hierbabuena|laurel|curry)/i;
function normIngr(s){
  let t=s.replace(/\(.*?\)/g,'').trim();
  t=t.replace(/^[\d½¼¾.,\/\s]+/,'');
  t=t.replace(/^(cdas?|cucharadas?|cucharaditas?|g|gr|kg|ml|l|vasos?|tazas?|rebanadas?|filetes?|latas?|botes?|bolsas?|briks?|bricks?|puñados?|hojas?|rodajas?|ramas?|docenas?|paquetes?|zumo)\s+(de\s+)?/i,'');
  t=t.replace(/^[\d½¼¾.,\/\s]+/,'');
  t=t.replace(/\b(grande|pequeñ[oa]s?|crud[oa]s?|madur[oa]s?|fileteada|en rodajas|en dados|de temporada|o verde|o molid[oa]s)\b/gi,'').replace(/\s+/g,' ').trim();
  const SING={'pepinos':'pepino','pimientos':'pimiento','berenjenas':'berenjena','calabacines':'calabacín','limones':'limón','zanahorias':'zanahoria','puerros':'puerro','cebollas':'cebolla','tomates':'tomate','yogures naturales':'yogur natural'};
  if(SING[t.toLowerCase()])t=SING[t.toLowerCase()];
  return t?t.charAt(0).toUpperCase()+t.slice(1):s;
}
function ingrCat(n){
  const s=n.toLowerCase();
  if(/congelad/.test(s))return '❄️ Congelados';
  if(/(bote |lata|conserva|garbanzo|lenteja|alubia|atún|atun|aceituna|maíz|maiz|caldo)/.test(s))return '🫙 Conservas y botes';
  if(/(huevo|queso|yogur|leche|feta|mozzarella|nata)/.test(s))return '🥚 Huevos y lácteos';
  if(/(pollo|pavo|salmón|salmon|merluza|bacalao|pescado|carne|ternera|lomo)/.test(s))return '🍗 Carne y pescado';
  if(/(arroz|pasta|quinoa|pan|cuscús|cuscus|avena|almendra|nuez|nueces)/.test(s))return '🌾 Cereales y frutos secos';
  return '🥬 Frescos: fruta y verdura';
}
const CAT_ORDER=['🥬 Frescos: fruta y verdura','❄️ Congelados','🫙 Conservas y botes','🥚 Huevos y lácteos','🍗 Carne y pescado','🌾 Cereales y frutos secos'];
function weeklyShop(){
  const w=weekMenu(),map={};
  [...w.comidas,...w.cenas].filter(r=>!r.express).forEach(r=>{
    r.ingredients.forEach(ing=>{
      if(PANTRY_RE.test(ing))return;
      const n=normIngr(ing),k=n.toLowerCase();
      if(!map[k])map[k]={name:n,count:0};
      map[k].count++;
    });
  });
  const cats={};
  Object.values(map).forEach(it=>{const c=ingrCat(it.name);(cats[c]=cats[c]||[]).push(it);});
  Object.values(cats).forEach(a=>a.sort((x,y)=>x.name.localeCompare(y.name)));
  return cats;
}
function slugIngr(n){return 'w-'+n.toLowerCase().replace(/[^a-z0-9ñáéíóúü]+/g,'-');}

function renderShop(){
  const el=document.getElementById('shop-list');
  const ck=getChecked();
  const cats=weeklyShop();

  const weekHtml=CAT_ORDER.filter(c=>cats[c]).map(c=>`
    <div class="shop-cat"><h3>${catOrderL(c)}</h3>
    ${cats[c].map(it=>{const id=slugIngr(it.name);return `
      <div class="shop-item ${ck[id]?'ck':''}" id="si-${id}">
        <input type="checkbox" id="cb-${id}" ${ck[id]?'checked':''} onchange="toggleItem('${id}',this.checked)">
        <label for="cb-${id}"><strong>${normL(it.name.toLowerCase())||it.name}</strong>${it.count>1?`<small>${t('in_n_recipes',{n:it.count})}</small>`:''}</label>
      </div>`;}).join('')}</div>`).join('');

  const recipes=getShopRecipes().map(r=>findRecipe(r)).filter(Boolean);
  const extrasHtml=recipes.length
    ?`<p class="section-label" style="margin-top:20px">${t('shop_extras')}</p>`+recipes.map(r0=>{const r=recL(r0);return`
      <div class="shop-cat">
        <h3 style="display:flex;justify-content:space-between;align-items:center">
          <span>${r.emoji} ${r.name}</span>
          <button onclick="removeFromShop('${r0.id}')" style="border:none;background:var(--mint);color:var(--teal-dark);font-family:'Outfit',sans-serif;font-size:.7rem;font-weight:700;border-radius:10px;padding:4px 10px;cursor:pointer">${t('btn_remove')}</button>
        </h3>
        ${r.ingredients.map((ing,i)=>{const iid='r-'+r0.id+'-'+i;return `
          <div class="shop-item ${ck[iid]?'ck':''}" id="si-${iid}">
            <input type="checkbox" id="cb-${iid}" ${ck[iid]?'checked':''} onchange="toggleItem('${iid}',this.checked)">
            <label for="cb-${iid}">${ing}</label>
          </div>`;}).join('')}
      </div>`;}).join('')
    :'';

  el.innerHTML=`
    <p class="section-label">${t('shop_week_label')}</p>
    ${weekHtml}
    ${extrasHtml}
    <p class="section-label" style="margin-top:20px">${t('shop_basics_label')}</p>
    ${SHOPPING.map(cat=>`
    <div class="shop-cat">
      <h3>${shopCatL(cat.cat)}</h3>
      ${cat.items.map(item=>`
        <div class="shop-item ${ck[item.id]?'ck':''}" id="si-${item.id}">
          <input type="checkbox" id="cb-${item.id}" ${ck[item.id]?'checked':''} onchange="toggleItem('${item.id}',this.checked)">
          <label for="cb-${item.id}"><strong>${shopItemL(item.id,'name',item.name)}</strong> — ${shopItemL(item.id,'qty',item.qty)}<small>${shopItemL(item.id,'loc',item.loc)}</small></label>
        </div>`).join('')}
    </div>`).join('')}`;
}
function toggleItem(id,val){beep(400,.08);const d=getChecked();d[id]=val;setChecked(d);document.getElementById('si-'+id).classList.toggle('ck',val);}
function clearShop(){setChecked({});renderShop();}
function shareList(){
  const lines=[t('share_title')];
  const cats=weeklyShop();
  CAT_ORDER.filter(c=>cats[c]).forEach(c=>{
    lines.push('\n'+catOrderL(c));
    cats[c].forEach(i=>lines.push('☐ '+(normL(i.name.toLowerCase())||i.name)+(i.count>1?' '+t('share_in',{n:i.count}):'')));
  });
  lines.push('\n'+t('share_basics'));
  SHOPPING.forEach(cat=>{cat.items.forEach(i=>lines.push('☐ '+shopItemL(i.id,'name',i.name)+' — '+shopItemL(i.id,'qty',i.qty)));});
  const text=lines.join('\n');
  if(navigator.share)navigator.share({title:t('share_share_title'),text}).catch(()=>{});
  else if(navigator.clipboard)navigator.clipboard.writeText(text).then(()=>alert(t('copied')));
}

/* Botón atrás del móvil: la app pregunta si este módulo puede retroceder una pantalla */
/* Atrás del móvil: el padre llama __crisBack() (síncrono); true = retrocedió */
window.__crisBack=function(){
  var el=document.querySelector('.screen.active .back-btn');
  if(el){el.click();return true;}
  return false;
};
/* Puente para versiones mezcladas: si el index viejo aún manda postMessage */
window.addEventListener('message',function(e){
  if(e&&e.data==='cris:back'&&window.__crisBack&&window.__crisBack()){
    try{parent.postMessage('cris:back-ok','*');}catch(_){}
  }
});
