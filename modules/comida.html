<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Comer Rico — Cris</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--teal:#26a69a;--teal-dark:#1a6b64;--teal-light:#4dd0e1;--mint:#d6f0eb;--mint-mid:#b8e4dd;--mint-soft:#e8f8f5;--text:#1a6b64;--text-soft:#2d6b64}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Outfit',sans-serif;background:var(--mint);min-height:100vh;color:var(--text)}
.screen{display:none;min-height:100vh;padding:16px 16px 100px}
.screen.active{display:block}
.max-w{max-width:440px;margin:0 auto;padding-top:12px}
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.back-btn{background:rgba(26,107,100,.12);border:none;border-radius:50%;width:40px;height:40px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--teal-dark)}
.topbar h1{font-size:1.15rem;font-weight:700;color:var(--teal-dark)}
.home-header{text-align:center;margin-bottom:16px}
.home-header h1{font-size:1.6rem;font-weight:800;color:var(--teal-dark);margin-bottom:4px}
.home-header p{font-size:.85rem;color:var(--text-soft)}
.bubble{background:rgba(255,255,255,.8);border:2px solid var(--mint-mid);border-radius:16px;padding:10px 16px;font-size:.85rem;font-weight:600;color:var(--teal-dark);text-align:center;margin:0 auto 16px;max-width:300px}
.nav-cards{display:flex;flex-direction:column;gap:10px}
.nav-card{border:none;border-radius:16px;padding:16px 18px;font-family:'Outfit',sans-serif;font-size:.95rem;font-weight:700;color:#fff;cursor:pointer;text-align:left;display:flex;align-items:center;gap:14px;width:100%;transition:transform .1s,filter .1s}
.nav-card:active{transform:scale(.97);filter:brightness(.9)}
.nav-card .nic{font-size:1.5rem}
.nav-card .info{display:flex;flex-direction:column;gap:2px}
.nav-card .sub{font-size:.75rem;font-weight:400;opacity:.88}
.c-season{background:linear-gradient(135deg,#059669,var(--teal))}
.c-months{background:linear-gradient(135deg,var(--teal-dark),#0369a1)}
.c-test{background:linear-gradient(135deg,#f59e0b,#ef4444)}
.c-shop{background:linear-gradient(135deg,#8b5cf6,#6366f1)}
.c-express{background:linear-gradient(135deg,#d97706,#f59e0b)}
/* Week menu */
.wk-row{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.85);border:2px solid var(--mint-mid);border-radius:14px;padding:12px 14px;margin-bottom:8px}
.wk-check{width:36px;height:36px;border-radius:50%;border:2.5px solid var(--teal);background:#fff;color:#fff;font-size:1.05rem;font-weight:800;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif}
.wk-done .wk-check{background:var(--teal)}
.wk-done .wk-name,.wk-done .wk-meta{text-decoration:line-through;opacity:.5}
.wk-info{flex:1;cursor:pointer;min-width:0}
.wk-name{font-size:.92rem;font-weight:700;color:var(--teal-dark)}
.wk-meta{font-size:.75rem;color:var(--text-soft);margin-top:2px}
.wk-ingr{font-size:.74rem;color:var(--text-soft);margin-top:5px;line-height:1.5;background:var(--mint-soft);border-radius:8px;padding:5px 8px}
/* Month grid */
.months-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.month-tile{background:rgba(255,255,255,.82);border:2px solid var(--mint-mid);border-radius:16px;padding:14px 8px;text-align:center;cursor:pointer;transition:transform .1s,border-color .1s}
.month-tile:active{transform:scale(.95);border-color:var(--teal)}
.month-tile.current{border-color:var(--teal);background:rgba(38,166,154,.08)}
.month-tile .m-emoji{font-size:1.6rem;display:block;margin-bottom:4px}
.month-tile .m-name{font-size:.8rem;font-weight:700;color:var(--teal-dark)}
/* Season banner */
.season-banner{background:rgba(255,255,255,.82);border:2px solid var(--mint-mid);border-radius:16px;padding:14px 16px;margin-bottom:14px}
.season-banner .sb-title{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--teal);margin-bottom:6px}
.season-chips{display:flex;flex-wrap:wrap;gap:6px}
.s-chip{background:var(--mint-soft);border:1px solid var(--mint-mid);border-radius:999px;padding:4px 10px;font-size:.75rem;font-weight:600;color:var(--teal-dark)}
.season-tip{font-size:.78rem;color:var(--text-soft);margin-top:8px;line-height:1.4}
/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:14px}
.tab{flex:1;padding:10px;border:2px solid var(--mint-mid);border-radius:12px;background:rgba(255,255,255,.7);font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;color:var(--text-soft);text-align:center}
.tab.active{background:var(--teal-dark);color:#fff;border-color:var(--teal-dark)}
/* Recipe cards */
.recipe-card{background:rgba(255,255,255,.85);border-radius:18px;padding:16px;border:2px solid var(--mint-mid);margin-bottom:10px;cursor:pointer;transition:transform .1s,border-color .1s}
.recipe-card:active{transform:scale(.98);border-color:var(--teal)}
.r-head{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.r-emoji{font-size:2rem;flex-shrink:0}
.r-info h3{font-size:.95rem;font-weight:700;color:var(--teal-dark)}
.r-badges{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap}
.badge{border-radius:999px;padding:2px 9px;font-size:.68rem;font-weight:700}
.b-time{background:var(--teal);color:#fff}
.b-budget{background:#fef3c7;color:#92400e}
.recipe-desc{font-size:.8rem;color:var(--text-soft);line-height:1.4;margin-top:6px}
.tag-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.tag{background:var(--mint-soft);border:1px solid var(--mint-mid);color:var(--teal-dark);border-radius:999px;padding:2px 8px;font-size:.65rem;font-weight:600}
/* Detail */
.card{background:rgba(255,255,255,.82);border-radius:18px;padding:18px;border:2px solid var(--mint-mid);margin-bottom:12px}
.card h2{font-size:1rem;font-weight:700;color:var(--teal-dark);margin-bottom:5px}
.card p{font-size:.84rem;color:var(--text-soft);line-height:1.5}
.section-label{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--teal);margin-bottom:8px}
/* Harvard plate */
.harvard-plate{display:flex;gap:6px;margin-bottom:14px}
.hp-seg{border-radius:12px;padding:10px 8px;text-align:center;flex-shrink:0}
.hp-veg{background:#dcfce7;color:#166534;flex:2}
.hp-prot{background:#fef3c7;color:#92400e;flex:1}
.hp-grain{background:#dbeafe;color:#1e40af;flex:1}
.hp-seg .hp-label{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:3px}
.hp-seg .hp-what{font-size:.72rem;font-weight:600;line-height:1.3}
.nutri-box{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.nutri-cell{background:rgba(255,255,255,.8);border:2px solid var(--mint-mid);border-radius:12px;padding:10px;text-align:center}
.nutri-cell .val{font-size:1.2rem;font-weight:800;color:var(--teal-dark)}
.nutri-cell .lbl{font-size:.65rem;color:var(--text-soft);margin-top:2px}
.tip-box{background:var(--mint-soft);border-left:4px solid var(--teal);border-radius:0 12px 12px 0;padding:12px 14px;font-size:.83rem;color:var(--text);line-height:1.5;margin-bottom:14px}
.ingr-list{list-style:none;font-size:.88rem}
.ingr-list li{padding:7px 0;border-bottom:1px solid var(--mint);display:flex;gap:8px;align-items:flex-start}
.ingr-list li:last-child{border:none}
.ingr-list li::before{content:"•";color:var(--teal);font-weight:700;flex-shrink:0}
/* Buttons */
.btn{border:none;border-radius:12px;padding:13px 18px;font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:transform .1s}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--teal-dark),var(--teal));color:#fff;width:100%}
.btn-secondary{background:var(--mint-soft);color:var(--teal-dark);border:2px solid var(--mint-mid);width:100%}
.btn-row{display:flex;gap:8px;margin-top:12px}
.btn-row .btn{flex:1}
/* Cooking */
.step-box{background:var(--mint-soft);border:2px solid var(--mint-mid);border-radius:18px;padding:22px;text-align:center;margin-bottom:14px}
.step-num{font-size:.72rem;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.step-text{font-size:1.02rem;font-weight:600;color:var(--teal-dark);line-height:1.6;margin-bottom:14px}
.step-timer{font-size:3rem;font-weight:800;color:var(--teal-dark);font-variant-numeric:tabular-nums;margin-bottom:2px}
.step-timer-lbl{font-size:.72rem;color:var(--text-soft)}
.prog-wrap{background:var(--mint-mid);border-radius:999px;height:5px;margin-bottom:12px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--teal-dark),var(--teal-light));border-radius:999px;transition:width .6s}
.dots{display:flex;justify-content:center;gap:5px;margin-bottom:12px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--mint-mid)}
.dot.done{background:var(--teal)}.dot.active{background:var(--teal-light);transform:scale(1.4)}
.done-box{background:linear-gradient(135deg,var(--teal-dark),var(--teal));color:#fff;border-radius:18px;padding:28px;text-align:center;margin-bottom:14px}
.done-box .big{font-size:3rem;margin-bottom:8px}
.done-box h2{font-size:1.3rem;font-weight:800;margin-bottom:6px}
.done-box p{font-size:.88rem;opacity:.9}
/* Test */
.opt-btn{width:100%;border:2px solid var(--mint-mid);border-radius:14px;padding:13px 16px;font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:600;color:var(--teal-dark);background:rgba(255,255,255,.8);cursor:pointer;text-align:left;margin-bottom:8px}
.opt-btn:active{border-color:var(--teal);background:var(--mint-soft)}
.result-box{background:linear-gradient(135deg,var(--teal-dark),var(--teal));color:#fff;border-radius:18px;padding:22px;text-align:center;margin-bottom:14px}
.result-box h2{font-size:1.3rem;font-weight:800;margin-bottom:6px}
.result-box p{font-size:.88rem;opacity:.9;line-height:1.5}
/* Shopping */
.shop-cat h3{font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--teal);margin-bottom:8px;padding-bottom:4px;border-bottom:2px solid var(--mint-mid)}
.shop-cat{margin-bottom:16px}
.shop-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--mint)}
.shop-item:last-child{border:none}
.shop-item input{margin-top:3px;width:18px;height:18px;accent-color:var(--teal);flex-shrink:0;cursor:pointer}
.shop-item label{font-size:.86rem;color:var(--text);line-height:1.4;cursor:pointer}
.shop-item label strong{color:var(--teal-dark)}
.shop-item label small{display:block;color:var(--text-soft);font-size:.73rem;margin-top:1px}
.shop-item.ck label{text-decoration:line-through;opacity:.45}

.calm *,.calm *::before,.calm *::after{animation:none !important;transition:none !important}

/* Anillo de tiempo: se vacía según pasa — para ver cuánto queda sin leer números */
.tring{width:176px;height:176px;border-radius:50%;margin:4px auto 10px;display:flex;align-items:center;justify-content:center;background:conic-gradient(#26a69a 360deg,#cde9e4 0);flex-shrink:0;}
.tring-in{width:144px;height:144px;border-radius:50%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px;text-align:center;}
.tring .step-timer{font-size:2.2rem;margin-bottom:0}

/* Quico con manitas (mascota) */
.quico-mascot{position:relative;width:-moz-fit-content;width:fit-content;margin:0 auto 6px;filter:drop-shadow(0 3px 8px rgba(93,64,55,.18));}
.quico-mascot .qm-head{display:block;margin:0;filter:none;}
.qm-paws{position:absolute;left:50%;bottom:-7px;transform:translateX(-50%);width:64%;line-height:0;}
.qm-paws svg{display:block;width:100%;}
</style>
</head>
<body>

<div id="v-home" class="screen active">
<div class="max-w">
  <div class="home-header">
    <img src="../quico/quico_happy.png" alt="Quico" style="width:124px;height:auto;object-fit:contain;display:block;margin:0 auto 6px;filter:drop-shadow(0 4px 10px rgba(93,64,55,.18))">
    <h1 data-i18n="home_h">🍳 Comer Rico</h1>
    <p data-i18n="home_sub">De temporada · sin tomate · plato Harvard</p>
  </div>
  <div class="bubble" id="home-bubble">¿Qué cocinamos hoy? 🌿</div>
  <div class="nav-cards">
    <button class="nav-card c-test" onclick="startPick()">
      <span class="nic">🍽️</span>
      <div class="info"><span data-i18n="nc_pick">¿QUÉ COMO HOY?</span><span class="sub" id="home-pick-sub">2 preguntas y te lo digo</span></div>
    </button>
    <button class="nav-card c-season" onclick="go('week')">
      <span class="nic">📅</span>
      <div class="info"><span data-i18n="nc_week">MENÚ DE LA SEMANA</span><span class="sub" id="home-week-sub">14 recetas · 1 sola compra</span></div>
    </button>
    <button class="nav-card c-shop" onclick="go('shopping')">
      <span class="nic">🛒</span>
      <div class="info"><span data-i18n="nc_shop">LISTA DE LA COMPRA</span><span class="sub" data-i18n="nc_shop_sub">Una compra · toda la semana</span></div>
    </button>
    <button class="nav-card c-express" onclick="go('basicos')">
      <span class="nic">⚡</span>
      <div class="info"><span data-i18n="nc_basics">BÁSICOS SALVAVIDAS</span><span class="sub" data-i18n="nc_basics_sub">Recetas de 10 min con despensa</span></div>
    </button>
    <button class="nav-card c-months" onclick="go('months')">
      <span class="nic">🗓️</span>
      <div class="info"><span data-i18n="nc_months">TODOS LOS MESES</span><span class="sub" data-i18n="nc_months_sub">Recetas de temporada todo el año</span></div>
    </button>
  </div>
</div>
</div>

<div id="v-months" class="screen">
<div class="max-w">
  <div class="topbar"><button class="back-btn" onclick="go('home')">←</button><h1 data-i18n="months_h">Elige el mes</h1></div>
  <div class="months-grid" id="months-grid"></div>
</div>
</div>

<div id="v-month" class="screen">
<div class="max-w">
  <div class="topbar"><button class="back-btn" onclick="go('months')">←</button><h1 id="month-title">Enero</h1></div>
  <div class="season-banner" id="season-banner"></div>
  <div class="tabs">
    <button class="tab active" id="tab-c" onclick="setMealTab('comidas')" data-i18n="tab_lunch">☀️ Comidas</button>
    <button class="tab" id="tab-n" onclick="setMealTab('cenas')" data-i18n="tab_dinner">🌙 Cenas</button>
  </div>
  <div id="month-recipes"></div>
</div>
</div>

<div id="v-detail" class="screen">
<div class="max-w">
  <div class="topbar"><button class="back-btn" id="detail-back">←</button><h1 id="detail-title"></h1></div>
  <div id="detail-content"></div>
</div>
</div>

<div id="v-cooking" class="screen">
<div class="max-w">
  <div class="topbar"><button class="back-btn" onclick="stopCook();go('detail')">←</button><h1 id="cook-title"></h1></div>
  <div id="cook-content"></div>
</div>
</div>

<div id="v-test" class="screen">
<div class="max-w">
  <div class="topbar"><button class="back-btn" onclick="go('home')">←</button><h1 data-i18n="test_h">¿Qué como hoy?</h1></div>
  <div id="test-content"></div>
</div>
</div>

<div id="v-week" class="screen">
<div class="max-w">
  <div class="topbar"><button class="back-btn" onclick="go('home')">←</button><h1 data-i18n="week_h">Menú de la semana</h1></div>
  <div class="card" style="margin-bottom:14px" id="week-banner"></div>
  <div id="week-list"></div>
</div>
</div>

<div id="v-basicos" class="screen">
<div class="max-w">
  <div class="topbar"><button class="back-btn" onclick="go('home')">←</button><h1 data-i18n="basics_h">Básicos salvavidas</h1></div>
  <div id="basicos-content"></div>
</div>
</div>

<div id="v-shopping" class="screen">
<div class="max-w">
  <div class="topbar"><button class="back-btn" onclick="go('home')">←</button><h1 data-i18n="shop_h">Lista de Compras</h1></div>
  <div class="card" style="margin-bottom:14px"><p data-i18n="shop_intro">Una sola compra para las 14 recetas de la semana + básicos salvavidas · 1 persona · sin tomate. Marca según vas comprando 💚</p></div>
  <div id="shop-list"></div>
  <div class="btn-row">
    <button class="btn btn-secondary" onclick="shareList()" data-i18n="btn_share">📱 Compartir</button>
    <button class="btn btn-secondary" onclick="clearShop()" data-i18n="btn_clear">↺ Borrar marcas</button>
  </div>
</div>
</div>

<script>
/* Ajustes globales (voz/sonido/vibración/reducir estímulos) — compartidos vía localStorage */
function __cfg(){try{return JSON.parse(localStorage.getItem('cris_cfg')||'{}');}catch(e){return{};}}
function __allow(k){const c=__cfg();return c[k]!==false&&c.calm!==true;}
if(__cfg().calm)document.documentElement.classList.add('calm');

function __ring(id,frac){const r=document.getElementById(id);if(r)r.style.background='conic-gradient(#26a69a '+(Math.max(0,Math.min(1,frac))*360)+'deg,#cde9e4 0)';}

  home_bubble:'📅 {m} · temporada: {s} 🌿',week_sub_full:'14 recetas · 1 sola compra',week_sub_rem:'Te quedan {n} de 14 esta semana',pick_sub_n:'2 preguntas · quedan {n} recetas',pick_sub_done:'Salvavidas de 10 min listos',

const REC_L={en:{"ene-c1":{"name":"Leek and Lentil Soup","desc":"A warm broth to heat you up in winter. Canned lentils make this dish very quick.","tip":"Use canned lentils — they're already cooked. They only need 5 min of heat to soak up the flavor.","tags":["Vegetarian","Gluten-free"],"harvard":{"veg":"Leek · carrot","prot":"Lentils","grain":"—"},"nutL":["kcal","protein","iron"],"ingredients":["1 leek","2 carrots","1 can cooked lentils (400g)","1L vegetable broth","1 tbsp olive oil","Salt, cumin"],"steps":[{"text":"Slice the leek and carrot into rounds. Sauté with oil in a pot over medium heat for 5 min, stirring","voice":"Slice the leek and carrot into rounds and sauté with oil for five minutes"},{"text":"Add the broth, turn up the heat until it boils, lower to medium and cook 10 min covered","voice":"Add the broth, bring to a boil, lower to medium heat and cover for ten minutes"},{"text":"Drain the lentils and add them with salt and cumin. 5 min more, stirring, and it's ready","voice":"Add the drained lentils with salt and cumin. Five minutes more and it's ready"}]},"ene-c2":{"name":"Rice with Broccoli and Egg","desc":"The frozen broccoli cooks right on top of the rice with no effort. Quick and complete.","tip":"The frozen broccoli goes straight into the pot without thawing. The egg can be fried if you haven't mastered poaching.","tags":["Vegetarian","Gluten-free","One pot"],"harvard":{"veg":"Broccoli","prot":"Egg","grain":"Rice"},"nutL":["kcal","protein","carbs"],"ingredients":["½ cup white rice","150g frozen broccoli","1 egg","1 cup water","1 tbsp olive oil","Salt, garlic powder"],"steps":[{"text":"Put rice, water and salt in a pot. Bring to a boil, lower to the minimum, cover. Set a 15 min timer","voice":"Put the rice with water and salt. Bring to a boil, lower to the minimum and cover for fifteen minutes"},{"text":"At 10 min: put the frozen broccoli on top of the rice without stirring. Cover again","voice":"At ten minutes put the broccoli on top of the rice and cover again"},{"text":"Fry the egg in a separate pan with oil. Serve rice + broccoli with the egg on top and garlic powder","voice":"Fry the egg and serve it on top of the rice with broccoli and garlic powder"}]},"ene-n1":{"name":"Cauliflower Cream Soup","desc":"Creamy, smooth and comforting. The frozen cauliflower goes straight into the pot.","tip":"Blend it well so it turns out smooth. A splash of coconut milk at the end makes it creamier.","tags":["Vegetarian","Gluten-free","Light"],"harvard":{"veg":"Cauliflower","prot":"—","grain":"Whole grain bread"},"nutL":["kcal","protein","immunity"],"ingredients":["300g frozen cauliflower","½ onion","1 glass vegetable broth","1 tbsp olive oil","Salt, nutmeg","Whole grain bread to serve alongside"],"steps":[{"text":"Chop the onion. Sauté with oil in a pot for 3 min over medium heat","voice":"Chop the onion and sauté for three minutes with oil"},{"text":"Add the frozen cauliflower and the broth. Turn up the heat. Once it boils, lower to medium and cover 10 min","voice":"Add the cauliflower and the broth. Bring to a boil, lower and cover for ten minutes"},{"text":"Blend with a hand blender, add salt and nutmeg. Serve with whole grain bread","voice":"Blend everything, add salt and serve with whole grain bread"}]},"ene-n2":{"name":"Leek Omelette","desc":"The leek gives a sweet, mild flavor. Protein + vegetable in 10 minutes.","tip":"Sauté the leek well until it's translucent — that way it won't taste raw inside the omelette.","tags":["Vegetarian","Gluten-free","Quick"],"harvard":{"veg":"Leek","prot":"Egg","grain":"Whole grain bread (optional)"},"nutL":["kcal","protein","healthy fat"],"ingredients":["1 leek (white part)","2 eggs","1 tbsp olive oil","Salt"],"steps":[{"text":"Slice the leek into thin rounds. Sauté with oil for 5 min over medium heat until softened","voice":"Slice the leek and sauté it for five minutes until it's soft"},{"text":"Beat the eggs with salt. Pour over the leek over medium-low heat. 3 min without stirring","voice":"Beat the eggs with salt and pour them over the leek. Three minutes without moving it"},{"text":"Flip it over with a plate. 2 min more and it's ready","voice":"Flip it over with a plate and cook two minutes more"}]},"feb-c1":{"name":"Spinach and Chickpea Bowl","desc":"No stove. Open the can, mix and dress. Ready in 10 minutes.","tip":"If the spinach is fresh, it's ready as is. If it's frozen, thaw and drain it well.","tags":["Vegetarian","No-cook","Quick"],"harvard":{"veg":"Spinach","prot":"Chickpeas","grain":"—"},"nutL":["kcal","protein","fiber"],"ingredients":["1 can chickpeas (400g)","2 handfuls fresh spinach","30g feta cheese","Juice of ½ lemon","2 tbsp olive oil","Salt, cumin"],"steps":[{"text":"Drain and rinse the chickpeas with cold water","voice":"Drain and rinse the chickpeas"},{"text":"Put the spinach in a bowl, add the chickpeas and the crumbled feta","voice":"In a bowl, mix the spinach, chickpeas and feta"},{"text":"Dress with lemon, oil, salt and cumin. Mix and dig in","voice":"Dress with lemon, oil and salt. Mix and it's ready"}]},"feb-c2":{"name":"Lemon Chicken with Broccoli","desc":"Juicy chicken with broccoli and rice. Two burners but very simple.","tip":"Don't move the chicken until it releases from the pan on its own — that way it turns out golden and juicy.","tags":["Gluten-free","Protein"],"harvard":{"veg":"Broccoli","prot":"Chicken","grain":"Rice"},"nutL":["kcal","protein","carbs"],"ingredients":["1 chicken breast, sliced","150g frozen broccoli","½ cup rice","1 lemon","1 tbsp olive oil","Salt, garlic powder"],"steps":[{"text":"Put rice with water and salt in a pot. Boil, lower to the minimum, cover 15 min. At 10 min add the broccoli on top","voice":"Put the rice to cook for fifteen minutes and at ten minutes add the broccoli on top"},{"text":"Salt the chicken. Pan with oil over medium-high heat. 4 min without moving it. Flip","voice":"Salt the chicken and cook it in the pan for four minutes without moving it"},{"text":"4 min more, squeeze the lemon over it and turn off. Serve with rice and broccoli","voice":"Four minutes more, squeeze the lemon and serve with the rice and the broccoli"}]},"feb-n1":{"name":"Broccoli and Turmeric Cream Soup","desc":"The frozen broccoli and the turmeric make a comforting, anti-inflammatory soup.","tip":"Turmeric needs a little black pepper to activate. Add a pinch when blending.","tags":["Vegetarian","Gluten-free","Anti-inflammatory"],"harvard":{"veg":"Broccoli","prot":"—","grain":"Whole grain bread"},"nutL":["kcal","protein","immunity"],"ingredients":["250g frozen broccoli","½ onion","1 glass vegetable broth","1 tbsp olive oil","½ tsp turmeric","Pinch black pepper","Salt"],"steps":[{"text":"Sauté onion with oil for 3 min. Add frozen broccoli and broth","voice":"Sauté the onion for three minutes, add the broccoli and the broth"},{"text":"Bring to a boil and cook 8 min covered over medium heat","voice":"Bring to a boil and cook eight minutes covered"},{"text":"Add turmeric, pepper and salt. Blend until smooth","voice":"Add turmeric, pepper and salt. Blend until it's smooth"}]},"feb-n2":{"name":"Spinach with Poached Egg","desc":"Spinach sautéed with garlic and a poached egg on top. A simple, nutritious dinner.","tip":"For the poached egg: boiling water with a pinch of vinegar, stir to make a whirlpool and drop in the egg. 3 min.","tags":["Vegetarian","Gluten-free","Quick"],"harvard":{"veg":"Spinach","prot":"Egg","grain":"Whole grain bread"},"nutL":["kcal","protein","spinach"],"ingredients":["2 handfuls spinach","1 egg","1 clove garlic (or garlic powder)","1 tbsp olive oil","Salt","Whole grain bread"],"steps":[{"text":"Sauté the spinach with garlic and oil for 3 min over medium heat until it wilts down","voice":"Sauté the spinach with garlic and oil for three minutes"},{"text":"At the same time: boil water, add a pinch of vinegar, stir and drop in the egg. 3 min","voice":"Boil water with vinegar, stir and drop in the egg. Three minutes"},{"text":"Serve the spinach with the egg on top and whole grain bread on the side","voice":"Serve the spinach with the poached egg on top and bread on the side"}]},"mar-c1":{"name":"Quinoa with Asparagus and Egg","desc":"Seasonal asparagus with quinoa and hard-boiled egg. A complete spring dish.","tip":"Canned white asparagus works too. Drain them and grill them for 2 min.","tags":["Vegetarian","Gluten-free","Spring"],"harvard":{"veg":"Asparagus","prot":"Egg","grain":"Quinoa"},"nutL":["kcal","protein","healthy fat"],"ingredients":["½ cup pre-rinsed quinoa","1 bunch asparagus","2 eggs","1 tbsp olive oil","Juice of ½ lemon","Salt"],"steps":[{"text":"Boil quinoa with 1 cup water and salt. Once it boils, lower to the minimum and cover 12 min","voice":"Boil the quinoa with water and salt. Once it boils lower to the minimum and cover for twelve minutes"},{"text":"Boil the eggs for 8 min in boiling water. Cool and peel","voice":"Boil the eggs for eight minutes. Cool with cold water and peel"},{"text":"Grill the asparagus with oil and salt for 4 min. Serve it all together with lemon","voice":"Grill the asparagus for four minutes and serve everything with a squeeze of lemon"}]},"mar-c2":{"name":"Rice with Peas and Tuna","desc":"A seasonal classic. Canned tuna is the cheapest and most practical protein.","tip":"The tuna goes in at the end, off the heat — that way it doesn't dry out. Drain it well of the oil from the can.","tags":["Gluten-free","Protein","Cheap"],"harvard":{"veg":"Peas","prot":"Tuna","grain":"Rice"},"nutL":["kcal","protein","carbs"],"ingredients":["½ cup rice","100g peas (frozen or canned)","1 can tuna in water","1 tbsp olive oil","Salt, parsley (optional)"],"steps":[{"text":"Boil rice with water and salt for 15-18 min. In the last 5 min add the peas on top","voice":"Boil the rice and in the last five minutes add the peas on top"},{"text":"Drain the tuna. Mix rice + peas with the tuna, oil and salt","voice":"Drain the tuna and mix everything with oil and salt"}]},"mar-n1":{"name":"Grilled Asparagus with Egg","desc":"An express spring dinner. Grilled green asparagus is ready in 4 minutes.","tip":"The asparagus is ready when it turns bright green and you can pierce it easily.","tags":["Vegetarian","Gluten-free","Quick"],"harvard":{"veg":"Asparagus","prot":"Egg","grain":"Whole grain bread"},"nutL":["kcal","protein","spring"],"ingredients":["1 bunch green asparagus","1 egg","1 tbsp olive oil","Coarse salt","Whole grain bread"],"steps":[{"text":"Heat a pan over high heat with oil. Grill the asparagus for 4 min with salt","voice":"Grill the asparagus with oil and salt for four minutes over high heat"},{"text":"In the same pan lower the heat and fry the egg. 2 min","voice":"Lower the heat and fry the egg in the same pan for two minutes"},{"text":"Serve the asparagus with the egg on top and whole grain bread","voice":"Serve the asparagus with the egg and whole grain bread on the side"}]},"mar-n2":{"name":"Pea and Feta Bowl","desc":"Cooked peas with feta cheese and mint. Fresh, quick and no stove.","tip":"Use drained canned peas — they're already cooked. Frozen ones need just 3 min in the microwave.","tags":["Vegetarian","No-cook","Quick"],"harvard":{"veg":"Peas","prot":"Feta","grain":"—"},"nutL":["kcal","protein","fiber"],"ingredients":["1 can cooked peas (400g)","50g feta cheese","1 tbsp olive oil","Juice of ½ lemon","Fresh or dried mint","Salt"],"steps":[{"text":"Drain and rinse the peas. Put them in a bowl","voice":"Drain and rinse the peas"},{"text":"Crumble the feta on top. Dress with oil, lemon, mint and salt. Ready","voice":"Add the crumbled feta, dress with oil and lemon and it's ready"}]},"abr-c1":{"name":"Rice with Fava Beans and Chicken","desc":"Seasonal fava beans with chicken and rice. Spring flavor with cheap ingredients.","tip":"Frozen fava beans don't need thawing — they go straight into the pan. The cooking time is the same.","tags":["Gluten-free","Spring"],"harvard":{"veg":"Fava beans","prot":"Chicken","grain":"Rice"},"nutL":["kcal","protein","carbs"],"ingredients":["1 chicken breast in pieces","150g fava beans (fresh or frozen)","½ cup rice","1 tbsp olive oil","1 clove garlic","Salt, parsley"],"steps":[{"text":"Put the rice to cook with water and salt. 15-18 min depending on the type","voice":"Put the rice to cook with water and salt for eighteen minutes"},{"text":"Sauté the chicken pieces with oil and garlic for 5 min over medium-high heat until golden","voice":"Sauté the chicken with garlic for five minutes until it's golden"},{"text":"Add the fava beans to the chicken. 5 min more over medium heat. Serve with the rice","voice":"Add the fava beans and cook five minutes more. Serve with the rice"}]},"abr-c2":{"name":"Whole Wheat Pasta with Asparagus and Egg","desc":"Pasta with sautéed asparagus and egg. Simple, quick and very filling.","tip":"Whole wheat pasta is more filling than white and has more fiber. Cook it al dente — then finish it in the pan.","tags":["Vegetarian","Spring"],"harvard":{"veg":"Asparagus","prot":"Egg","grain":"Whole wheat pasta"},"nutL":["kcal","protein","carbs"],"ingredients":["80g whole wheat pasta","1 bunch green asparagus","1 egg","2 tbsp olive oil","1 clove garlic","Salt, grated cheese"],"steps":[{"text":"Boil water with salt. Cook the pasta according to the package (8-10 min). Reserve a little of the water","voice":"Cook the pasta in salted water according to the instructions"},{"text":"Sauté the cut asparagus with garlic and oil for 4 min. Add the drained pasta and mix","voice":"Sauté the asparagus for four minutes, add the pasta and mix"},{"text":"Make a well, crack the egg and stir everything for 1 min. Turn off, add cheese","voice":"Crack the egg into the pan, stir for a minute and add grated cheese"}]},"abr-n1":{"name":"Asparagus Omelette","desc":"Green asparagus sautéed inside the omelette. A spring classic.","tip":"Cut the asparagus into 2 cm pieces — that way they spread evenly through the whole omelette.","tags":["Vegetarian","Gluten-free","Quick"],"harvard":{"veg":"Asparagus","prot":"Egg","grain":"Whole grain bread (optional)"},"nutL":["kcal","protein","healthy fat"],"ingredients":["1 bunch green asparagus","2 eggs","1 tbsp olive oil","Salt"],"steps":[{"text":"Cut the asparagus into pieces. Sauté with oil and salt for 4 min over medium heat","voice":"Cut the asparagus and sauté it for four minutes with oil and salt"},{"text":"Beat the eggs with salt, pour over the asparagus. 3 min over low heat without stirring","voice":"Beat the eggs and pour them in. Three minutes without stirring"},{"text":"Flip it over with a plate. 2 min more and it's ready","voice":"Flip it over and cook two minutes more"}]},"abr-n2":{"name":"Pea Cream Soup","desc":"Green, sweet and smooth. The frozen peas go straight into the pot.","tip":"A touch of mint when blending gives it lots of freshness. Without a blender, mash with a fork — it comes out more rustic.","tags":["Vegetarian","Gluten-free","Light"],"harvard":{"veg":"Peas","prot":"—","grain":"Whole grain bread"},"nutL":["kcal","protein","spring"],"ingredients":["250g frozen peas","½ onion","1 glass vegetable broth","1 tbsp olive oil","Mint (optional)","Salt"],"steps":[{"text":"Sauté onion with oil for 3 min. Add peas and broth","voice":"Sauté the onion for three minutes and add the peas and the broth"},{"text":"Bring to a boil and cook 8 min over medium heat covered","voice":"Bring to a boil and cook eight minutes covered"},{"text":"Add mint and salt. Blend until smooth","voice":"Add mint and salt and blend until it's smooth"}]},"may-c1":{"name":"Lentils with Fava Beans and Carrot","desc":"Canned lentils + seasonal fava beans = a super cheap dish full of iron and plant protein.","tip":"Frozen fava beans go straight into the pot. They're much cheaper than fresh ones and just as good.","tags":["Vegetarian","Gluten-free","Iron"],"harvard":{"veg":"Fava beans · carrot","prot":"Lentils","grain":"—"},"nutL":["kcal","protein","iron"],"ingredients":["1 can cooked lentils (400g)","150g frozen fava beans","1 carrot","½ onion","1 tbsp olive oil","Salt, cumin, paprika"],"steps":[{"text":"Chop onion and carrot. Sauté with oil for 5 min over medium heat","voice":"Chop onion and carrot and sauté for five minutes with oil"},{"text":"Add the frozen fava beans and 1 glass of water. Cook 8 min covered","voice":"Add the fava beans and water. Cook eight minutes covered"},{"text":"Add the drained lentils, salt, cumin and paprika. 5 min more and it's ready","voice":"Add the lentils, salt and cumin. Five minutes more and it's ready"}]},"may-c2":{"name":"Pasta with Tuna and Peas","desc":"Whole wheat pasta with peas and tuna. The most economical protein in the easiest dish.","tip":"The tuna goes in off the heat at the end — that way it stays juicy and doesn't dry out. Add a splash of lemon to boost the flavor.","tags":["Protein","Cheap","Quick"],"harvard":{"veg":"Peas","prot":"Tuna","grain":"Whole wheat pasta"},"nutL":["kcal","protein","carbs"],"ingredients":["80g whole wheat pasta","100g frozen peas","1 can tuna in water","2 tbsp olive oil","Juice of ½ lemon","Salt"],"steps":[{"text":"Cook the pasta in salted water according to the package. In the last 3 min add the peas to the same pot","voice":"Cook the pasta and in the last three minutes add the peas to the same pot"},{"text":"Drain everything. Mix with drained tuna, oil, lemon and salt. Ready","voice":"Drain, mix with the tuna, oil and lemon. Ready"}]},"may-n1":{"name":"Scrambled Eggs with Asparagus and Cheese","desc":"Scrambled eggs with asparagus are the quickest dinner of the season.","tip":"The scramble turns out best over medium-low heat, stirring slowly — the eggs stay creamy, not dry.","tags":["Vegetarian","Gluten-free","Quick"],"harvard":{"veg":"Asparagus","prot":"Egg · cheese","grain":"Whole-grain bread"},"nutL":["kcal","protein","healthy fat"],"ingredients":["2 eggs","1 bunch green asparagus","30g grated cheese","1 tbsp olive oil","Salt"],"steps":[{"text":"Cut the asparagus into pieces. Sauté with oil for 4 min over medium heat","voice":"Cut the asparagus and sauté it for four minutes with oil"},{"text":"Beat the eggs with salt. Pour over the asparagus over medium-low heat, stirring gently","voice":"Pour in the beaten eggs and stir gently for three minutes"},{"text":"Turn off the heat while they're still creamy. Add grated cheese on top","voice":"Turn off the heat while they're creamy and add the grated cheese"}]},"may-n2":{"name":"Broad Bean Salad with Feta","desc":"No stovetop. Canned cooked broad beans with feta and a lemon dressing.","tip":"Canned broad beans are already cooked — you just need to drain and rinse them. If you use frozen ones, 3 min in the microwave.","tags":["Vegetarian","No-cook","Quick"],"harvard":{"veg":"Broad beans","prot":"Feta","grain":"—"},"nutL":["kcal","protein","fiber"],"ingredients":["1 can cooked broad beans","50g feta cheese","Juice of ½ lemon","2 tbsp olive oil","Fresh or dried mint","Salt"],"steps":[{"text":"Drain and rinse the broad beans. Put them in a bowl","voice":"Drain and rinse the broad beans"},{"text":"Add the crumbled feta, lemon, oil, mint and salt. Mix gently and it's ready","voice":"Add feta, lemon, oil and mint. Mix gently and it's ready"}]},"jun-c1":{"name":"Quinoa Bowl with Zucchini","desc":"Grilled zucchini with cold quinoa and feta. Nice and fresh for the heat.","tip":"Let the quinoa cool before mixing it with the zucchini — that way the bowl stays nice and fresh.","tags":["Vegetarian","Gluten-free","Fresh"],"harvard":{"veg":"Zucchini · cucumber","prot":"Feta cheese","grain":"Quinoa"},"nutL":["kcal","protein","healthy fat"],"ingredients":["½ cup quinoa","1 zucchini","50g feta cheese","½ cucumber","2 tbsp olive oil","Lemon juice","Salt"],"steps":[{"text":"Boil the quinoa with 1 cup water and salt. Once boiling, lower to the minimum and cover for 12 min","voice":"Boil the quinoa with water and salt for twelve minutes on the lowest heat"},{"text":"Grill the sliced zucchini with oil and salt for 4 min per side","voice":"Grill the zucchini with oil for four minutes"},{"text":"Mix the quinoa, zucchini, chopped cucumber and feta. Dress with lemon and oil","voice":"Mix everything with the feta and dress with lemon"}]},"jun-c2":{"name":"Chicken with Peppers and Rice","desc":"Summer peppers are full of flavor. With chicken and rice they make a complete dish.","tip":"Peppers soften quickly with the heat. Don't cover them — that way they cook without steam and turn out tastier.","tags":["Gluten-free","Summer"],"harvard":{"veg":"Pepper","prot":"Chicken","grain":"Rice"},"nutL":["kcal","protein","carbs"],"ingredients":["1 chicken breast, sliced into fillets","1 red or green pepper","½ cup rice","1 tbsp olive oil","Salt, paprika, garlic powder"],"steps":[{"text":"Put the rice on to cook with water and salt for 18 min","voice":"Put the rice on to cook for eighteen minutes"},{"text":"Sauté the chicken for 4 min. Add the pepper in strips and paprika. Cook 5 min more","voice":"Sauté the chicken for four minutes, add the pepper and cook five minutes more"},{"text":"Serve the chicken with peppers on top of the rice","voice":"Serve the chicken with peppers over the rice"}]},"jun-n1":{"name":"Green Gazpacho with Bread","desc":"Blended cucumber and zucchini with oil. Super fresh and no cooking for hot days.","tip":"Put all the ingredients in the fridge 1 hour before blending — much fresher and tastier.","tags":["Vegetarian","No-cook","Refreshing"],"harvard":{"veg":"Cucumber · zucchini","prot":"—","grain":"Whole-grain bread"},"nutL":["kcal","protein","hydration"],"ingredients":["1 large cucumber","½ raw zucchini","2 tbsp olive oil","Juice of ½ lemon","1 garlic clove","Salt","Whole-grain bread"],"steps":[{"text":"Chop the cucumber and raw zucchini without peeling. Put them in the blender jug","voice":"Chop the cucumber and the zucchini and put them in the jug"},{"text":"Add garlic, oil, lemon and salt. Blend until smooth. Taste for salt","voice":"Add garlic, oil, lemon and salt. Blend everything"},{"text":"Serve cold with whole-grain bread. If it's too thick, add a little water","voice":"Serve cold with whole-grain bread"}]},"jun-n2":{"name":"Zucchini Omelette","desc":"Summer zucchini in an omelette. Very juicy and simple.","tip":"Zucchini releases a lot of water — put it in the pan with salt and wait for it to evaporate before adding the eggs.","tags":["Vegetarian","Gluten-free","Quick"],"harvard":{"veg":"Zucchini","prot":"Egg","grain":"Whole-grain bread (optional)"},"nutL":["kcal","protein","healthy fat"],"ingredients":["1 small zucchini","2 eggs","1 tbsp olive oil","Salt"],"steps":[{"text":"Grate or thinly slice the zucchini. Sauté with oil and salt for 4 min until the water evaporates","voice":"Sauté the zucchini with salt for four minutes until the water evaporates"},{"text":"Beat the eggs with salt. Pour over the zucchini over medium-low heat. 3 min without moving","voice":"Beat the eggs and pour them in. Three minutes without moving"},{"text":"Flip it and 2 min more. Ready","voice":"Flip it and two minutes more"}]},"jul-c1":{"name":"Chickpea, Cucumber and Corn Salad","desc":"No stovetop. Protein + seasonal veg in 5 minutes. Perfect for the heat.","tip":"Summer cucumber and pepper are crunchy and cheap. Canned corn adds the sweet touch.","tags":["Vegetarian","No-cook","Summer"],"harvard":{"veg":"Cucumber · pepper","prot":"Chickpeas","grain":"Corn"},"nutL":["kcal","protein","fiber"],"ingredients":["1 can chickpeas (400g)","1 cucumber","½ red pepper","½ can sweet corn","Black olives","2 tbsp olive oil","Salt, oregano"],"steps":[{"text":"Drain and rinse the chickpeas. Put in a large bowl","voice":"Drain and rinse the chickpeas"},{"text":"Chop the cucumber and the pepper. Add to the bowl with the corn and the olives","voice":"Chop the cucumber and the pepper and add to the bowl with the corn and the olives"},{"text":"Dress with oil, salt and oregano. Mix and dig in","voice":"Dress with oil, salt and oregano and it's ready"}]},"jul-c2":{"name":"Rice with Eggplant and Chickpeas","desc":"Summer eggplant with chickpeas and rice. A Mediterranean and budget-friendly dish.","tip":"Cut the eggplant into cubes and salt it before cooking — that way it loses the bitterness and absorbs less oil.","tags":["Vegetarian","Gluten-free","Summer"],"harvard":{"veg":"Eggplant","prot":"Chickpeas","grain":"Rice"},"nutL":["kcal","protein","carbs"],"ingredients":["1 eggplant","1 can chickpeas (400g)","½ cup rice","1 tbsp olive oil","1 garlic clove","Salt, cumin, paprika"],"steps":[{"text":"Put the rice on to cook with water and salt for 18 min","voice":"Put the rice on to cook for eighteen minutes"},{"text":"Meanwhile: sauté the cubed eggplant with garlic and oil for 8 min until golden","voice":"Sauté the cubed eggplant with garlic for eight minutes until golden"},{"text":"Add the drained chickpeas, cumin and paprika. 3 min more. Serve with the rice","voice":"Add the chickpeas with cumin for three minutes more and serve with the rice"}]},"jul-n1":{"name":"Cold Cucumber and Yogurt Soup","desc":"The tomato-free alternative to gazpacho. Super fresh and ready in 5 minutes.","tip":"Make it the night before and keep it well covered in the fridge — very cold it tastes twice as good.","tags":["Vegetarian","No-cook","Refreshing"],"harvard":{"veg":"Cucumber","prot":"Yogurt","grain":"Bread (side)"},"nutL":["kcal","protein","mineral"],"ingredients":["2 cucumbers","2 plain yogurts","1 small garlic clove","2 tbsp olive oil","Juice of ½ lemon","Salt, mint or spearmint"],"steps":[{"text":"Peel and chop the cucumbers. Put them in the blender jug","voice":"Peel and chop the cucumbers and put them in the blender jug"},{"text":"Add yogurt, garlic, oil, lemon and salt. Blend for 1 minute","voice":"Add the yogurt, the garlic, the oil and the lemon. Blend for one minute"},{"text":"Taste for salt. Serve very cold with little mint leaves","voice":"Taste for salt and serve very cold with mint"}]},"jul-n2":{"name":"Tuna-Stuffed Peppers","desc":"Summer peppers stuffed with tuna. No oven — they're made in the pan.","tip":"Italian or piquillo peppers are perfect for stuffing. Cut off the top and scoop out the seeds.","tags":["Gluten-free","Summer"],"harvard":{"veg":"Pepper","prot":"Tuna","grain":"Rice (optional)"},"nutL":["kcal","protein","healthy fat"],"ingredients":["2 peppers (Italian or piquillo)","2 cans tuna in water","2 tbsp olive oil","Salt, oregano","Lemon juice"],"steps":[{"text":"Mix the drained tuna with oil, lemon, salt and oregano in a bowl","voice":"Mix the tuna with oil, lemon and oregano"},{"text":"Cut off the top of the peppers and scoop out the seeds. Fill with the tuna mixture","voice":"Scoop out the peppers and fill them with the tuna"},{"text":"Heat in a covered pan over medium heat for 8 min until the pepper is tender","voice":"Cook in a covered pan for eight minutes until the pepper softens"}]},"ago-c1":{"name":"Quinoa Bowl with Pisto","desc":"Summer pisto with seasonal vegetables over quinoa. A complete and nutritious dish.","tip":"Pisto gets better from one day to the next — make double and save half for tomorrow.","tags":["Vegetarian","Gluten-free","Mediterranean"],"harvard":{"veg":"Zucchini · pepper · eggplant","prot":"Egg (optional)","grain":"Quinoa"},"nutL":["kcal","protein","healthy fat"],"ingredients":["½ cup quinoa","1 zucchini","1 red pepper","1 small eggplant","1 tbsp olive oil","1 garlic clove","Salt, oregano"],"steps":[{"text":"Boil the quinoa with water and salt for 12 min on the minimum, covered","voice":"Boil the quinoa for twelve minutes covered on the lowest heat"},{"text":"Chop all the vegetables into cubes. Sauté with garlic and oil for 10 min over medium heat, stirring","voice":"Sauté all the cubed vegetables with garlic for ten minutes"},{"text":"Add oregano and salt to the pisto. Serve over the quinoa","voice":"Add oregano and serve the pisto over the quinoa"}]},"ago-c2":{"name":"Salmon en Papillote with Zucchini","desc":"The papillote cooks the salmon with its own steam. No mess and no smell.","tip":"Papillote = parchment paper folded into an envelope. The steam trapped inside cooks the fish perfectly.","tags":["Gluten-free","Omega-3","Summer"],"harvard":{"veg":"Zucchini","prot":"Salmon","grain":"—"},"nutL":["kcal","protein","omega-3"],"ingredients":["1 salmon fillet (150g)","1 sliced zucchini","1 tbsp olive oil","Juice of ½ lemon","Salt, dill (optional)","Parchment paper"],"steps":[{"text":"Turn the oven on to 200°C. Put the sliced zucchini on parchment paper","voice":"Turn the oven on to two hundred degrees"},{"text":"Place the salmon on top, add oil, lemon and salt. Fold the paper, closing it well like an envelope","voice":"Put the salmon on top, add oil and lemon and close the paper well"},{"text":"Bake for 12 min. The packet puffs up — that's a good sign. Open carefully, watch out for the steam","voice":"Bake for twelve minutes. Open carefully, watch out for the hot steam"}]},"ago-n1":{"name":"Ajoblanco with Melon","desc":"The oldest Andalusian cold soup — and with no tomato. With August melon it's a cheap luxury.","tip":"Day-old stale bread works perfectly — it gives it body. If you don't have ground almonds, a handful of raw almonds will do.","tags":["Vegetarian","No-cook","Summer"],"harvard":{"veg":"Melon (fruit)","prot":"Almonds","grain":"Whole-grain bread"},"nutL":["kcal","protein","antioxid."],"ingredients":["50g raw or ground almonds","1 slice stale bread","1 small garlic clove","3 tbsp olive oil","1 tbsp vinegar","1 glass very cold water","Cubed melon"],"steps":[{"text":"Soak the bread in water. Put it in the blender with almonds, garlic, oil and vinegar","voice":"Soak the bread and put it in the blender with the almonds, the garlic, the oil and the vinegar"},{"text":"Add the glass of very cold water and blend until very smooth","voice":"Add the cold water and blend until very smooth"},{"text":"Serve very cold with the cubed melon on top","voice":"Serve very cold with the cubed melon on top"}]},"ago-n2":{"name":"Grilled Eggplant with Cheese","desc":"Golden eggplant slices with melted cheese. Simple and tasty.","tip":"Salt the slices 10 min before cooking them and pat them dry with paper — that way they turn out crispy and don't soak up oil.","tags":["Vegetarian","Gluten-free","Summer"],"harvard":{"veg":"Eggplant","prot":"Cheese","grain":"Whole-grain bread"},"nutL":["kcal","protein","healthy fat"],"ingredients":["1 large eggplant","60g mozzarella or melting cheese","1 tbsp olive oil","Salt, oregano"],"steps":[{"text":"Cut the eggplant into 1 cm slices. Salt and leave for 5 min. Pat dry with paper","voice":"Cut into slices, salt and wait five minutes. Pat dry with paper"},{"text":"Grill with oil over medium-high heat for 4 min per side until golden","voice":"Grill for four minutes on each side until golden"},{"text":"Add the cheese on top, cover for 2 min until it melts. Add oregano","voice":"Put the cheese on top and cover for two minutes until it melts"}]},"sep-c1":{"name":"Pumpkin Cream Soup with Lentils","desc":"Frozen pumpkin makes this soup very quick. The lentils turn it into a complete dish.","tip":"Frozen pumpkin comes already cut and peeled. It's the most practical and cheapest version.","tags":["Vegetarian","Gluten-free","Autumn"],"harvard":{"veg":"Pumpkin","prot":"Lentils","grain":"Whole-grain bread"},"nutL":["kcal","protein","vitamin A"],"ingredients":["250g frozen pumpkin","1 can cooked lentils (400g)","½ onion","1 glass vegetable stock","1 tbsp olive oil","Salt, turmeric, ginger"],"steps":[{"text":"Sauté the onion with oil for 3 min. Add the frozen pumpkin and stock","voice":"Sauté the onion for three minutes and add the pumpkin and the stock"},{"text":"Bring to a boil and cook for 12 min covered over medium heat until the pumpkin is tender","voice":"Bring to a boil and cook for twelve minutes until the pumpkin is tender"},{"text":"Blend. Add the drained lentils, turmeric, salt. Heat 3 min more","voice":"Blend, add the drained lentils with turmeric and heat for three minutes more"}]},"sep-c2":{"name":"Rice with Mushrooms and Chicken","desc":"The flavor of seasonal mushrooms with chicken and rice. A complete autumn dish.","tip":"Mushrooms don't need much water — they cook in their own juices. Don't put a lid on when you sauté them.","tags":["Gluten-free","Autumn"],"harvard":{"veg":"Mushrooms","prot":"Chicken","grain":"Rice"},"nutL":["kcal","protein","carbs"],"ingredients":["1 chicken breast in pieces","150g mushrooms (fresh or frozen)","½ cup rice","1 tbsp olive oil","1 garlic clove","Salt, parsley"],"steps":[{"text":"Put the rice on to cook with water and salt for 18 min","voice":"Put the rice on to cook with water and salt for eighteen minutes"},{"text":"Sauté the chicken with oil and garlic for 5 min. Add the mushrooms. Cook 6 min uncovered","voice":"Sauté the chicken for five minutes, add the mushrooms and cook six minutes uncovered"},{"text":"Add salt and parsley. Serve with the rice","voice":"Add salt and parsley and serve with the rice"}]},"sep-n1":{"name":"Mushroom Soup with Bread","desc":"Mushrooms have an intense flavor that turns the broth into something special.","tip":"A splash of soy sauce at the end really intensifies the flavor. Just one teaspoon.","tags":["Vegetarian","Gluten-free","Autumn"],"harvard":{"veg":"Mushrooms","prot":"—","grain":"Whole-grain bread"},"nutL":["kcal","protein","mushrooms"],"ingredients":["150g mixed mushrooms","½ onion","1 garlic clove","1L vegetable stock","1 tbsp olive oil","Salt, parsley","Whole-grain bread"],"steps":[{"text":"Chop the onion and garlic. Sauté with oil for 3 min. Add the chopped mushrooms and sauté 4 min","voice":"Sauté the onion and garlic for three minutes, add the mushrooms and sauté four minutes"},{"text":"Add the stock. Bring to a boil and cook for 5 min. Add salt and parsley","voice":"Add the stock, boil for five minutes and add salt and parsley"},{"text":"Serve with toasted whole-grain bread","voice":"Serve with whole-grain bread"}]},"sep-n2":{"name":"Quinoa with Roasted Eggplant","desc":"Roasted eggplant with quinoa and feta. An autumn version of the Mediterranean bowl.","tip":"Eggplant roasted in the oven turns out softer and without bitterness than in the pan. It's worth turning the oven on.","tags":["Vegetarian","Gluten-free","Autumn"],"harvard":{"veg":"Eggplant","prot":"Feta cheese","grain":"Quinoa"},"nutL":["kcal","protein","healthy fat"],"ingredients":["1 eggplant","½ cup quinoa","50g feta cheese","2 tbsp olive oil","Salt, oregano","Lemon juice"],"steps":[{"text":"Turn the oven on to 200°C. Cut the eggplant into cubes, mix with oil and salt. Bake for 12 min","voice":"Bake the cubed eggplant with oil and salt for twelve minutes at two hundred degrees"},{"text":"Boil the quinoa with water and salt for 12 min on the minimum, covered","voice":"Boil the quinoa for twelve minutes on the lowest heat, covered"},{"text":"Mix the quinoa with the roasted eggplant, crumbled feta, lemon and oregano","voice":"Mix the quinoa with eggplant, feta and lemon"}]},"oct-c1":{"name":"Pumpkin and Lentil Bowl","desc":"Roasted pumpkin with lentils and rice makes a complete, very cheap autumn dish.","tip":"You can use frozen or jarred pumpkin to make it faster. The result is just as good.","tags":["Vegetarian","Gluten-free","Autumn"],"harvard":{"veg":"Pumpkin","prot":"Lentils","grain":"Brown rice"},"nutL":["kcal","protein","vitamin A"],"ingredients":["250g pumpkin (frozen or fresh)","1 can lentils (400g)","½ cup rice","1 tbsp olive oil","Salt, cumin, turmeric"],"steps":[{"text":"Put the rice on to cook for 18 min. Meanwhile: put the diced pumpkin in a pan with oil over medium heat","voice":"Put the rice on to cook and, at the same time, sauté the diced pumpkin with oil"},{"text":"Cook the pumpkin for 10 min, stirring, until tender. Add the cumin and turmeric","voice":"Cook the pumpkin for ten minutes until it softens. Add the cumin and turmeric"},{"text":"Add the drained lentils and salt. 2 min more. Serve with the rice","voice":"Add the lentils, salt, and serve with the rice"}]},"oct-c2":{"name":"Pasta with Mushrooms and Cheese","desc":"Mushrooms with whole-wheat pasta and cheese is the most comforting autumn dish.","tip":"Save a little of the pasta cooking water — it helps emulsify the sauce so it clings nicely to the pasta.","tags":["Vegetarian","Autumn"],"harvard":{"veg":"Mushrooms","prot":"Cheese","grain":"Whole-wheat pasta"},"nutL":["kcal","protein","carbs"],"ingredients":["80g whole-wheat pasta","150g mushrooms","30g grated cheese","1 clove garlic","2 tbsp olive oil","Salt, parsley"],"steps":[{"text":"Cook the pasta in salted water according to the package. Reserve ½ glass of the water","voice":"Cook the pasta and reserve half a glass of the cooking water"},{"text":"Sauté the mushrooms with garlic and oil for 6 min over medium heat, uncovered","voice":"Sauté the mushrooms with garlic for six minutes, uncovered"},{"text":"Mix the drained pasta with the mushrooms and a little of the reserved water. Add the cheese and parsley","voice":"Mix the pasta with the mushrooms, cooking water, cheese, and parsley"}]},"oct-n1":{"name":"Spiced Pumpkin Soup","desc":"Sweet, creamy, and comforting. With ginger and turmeric it has a warm touch that feels lovely in autumn.","tip":"Coconut milk makes it creamier and more filling. Without it, it's still tasty with just the broth.","tags":["Vegetarian","Gluten-free","Autumn"],"harvard":{"veg":"Pumpkin","prot":"—","grain":"Whole-wheat bread"},"nutL":["kcal","protein","vitamin A"],"ingredients":["300g frozen pumpkin","½ onion","1 glass vegetable broth","½ can coconut milk","1 tbsp olive oil","Ground ginger, turmeric, salt"],"steps":[{"text":"Sauté the onion with oil for 3 min. Add the frozen pumpkin and broth","voice":"Sauté the onion and add the pumpkin with the broth"},{"text":"Bring to a boil and cook for 8 min, covered. Turn off the heat","voice":"Bring to a boil and cook for eight minutes, covered"},{"text":"Blend. Add the coconut milk, turmeric, ginger, and salt. Mix and serve","voice":"Blend, add the coconut milk and spices. Serve hot"}]},"oct-n2":{"name":"Mushrooms with Egg and Garlic","desc":"Mushrooms sautéed with garlic and an egg on top. The simplest autumn dinner.","tip":"Don't cover the pan when you sauté the mushrooms — the steam would cook them and they'd turn soft instead of golden.","tags":["Vegetarian","Gluten-free","Quick"],"harvard":{"veg":"Mushrooms","prot":"Egg","grain":"Whole-wheat bread"},"nutL":["kcal","protein","mushrooms"],"ingredients":["150g mushrooms","1 clove garlic","1 egg","1 tbsp olive oil","Salt, parsley","Whole-wheat bread"],"steps":[{"text":"Sauté the mushrooms with garlic and oil over high heat for 5 min, uncovered. Salt them at the end","voice":"Sauté the mushrooms with garlic over high heat for five minutes, uncovered"},{"text":"Make a gap in the pan and fry the egg over medium heat for 2 min","voice":"Make a gap and fry the egg for two minutes"},{"text":"Serve with whole-wheat bread and chopped parsley","voice":"Serve with bread and chopped parsley"}]},"nov-c1":{"name":"Leek and Chicken Soup","desc":"Leek and chicken soup is November's most comforting dish.","tip":"Shredded chicken thigh stays juicier than breast in the soup. It's also cheaper.","tags":["Gluten-free","Comforting","Winter"],"harvard":{"veg":"Leek · carrot","prot":"Chicken","grain":"—"},"nutL":["kcal","protein","carbs"],"ingredients":["1 chicken breast (or 2 thighs)","2 leeks","1 carrot","1L chicken broth","1 tbsp olive oil","Salt, parsley"],"steps":[{"text":"Chop the leeks and carrot. Sauté with oil in a large pot for 5 min over medium heat","voice":"Chop the leeks and carrot and sauté for five minutes with oil"},{"text":"Add the whole chicken and the broth. Bring to a boil, lower to a gentle simmer, and cook for 15 min, covered","voice":"Add the chicken and the broth. Bring to a boil and cook for fifteen minutes over low heat"},{"text":"Take out the chicken, shred it, and return it to the pot. Add parsley and salt","voice":"Shred the chicken and return it to the pot with parsley and salt"}]},"nov-c2":{"name":"Lentils with Mushrooms","desc":"Lentils with autumn mushrooms are an exceptional combination of flavor and nutrition.","tip":"Dried mushrooms add lots of flavor to the broth. Soak them for 10 min in hot water before using.","tags":["Vegetarian","Gluten-free","Iron"],"harvard":{"veg":"Mushrooms · carrot","prot":"Lentils","grain":"Whole-wheat bread"},"nutL":["kcal","protein","iron"],"ingredients":["1 can lentils (400g)","150g mushrooms","1 carrot","½ onion","1 tbsp olive oil","Salt, paprika, garlic"],"steps":[{"text":"Chop the onion and carrot. Sauté with oil and garlic for 5 min","voice":"Chop the onion and carrot and sauté with garlic for five minutes"},{"text":"Add the chopped mushrooms. Sauté for 5 min, uncovered. Add the paprika","voice":"Add the mushrooms and sauté for five minutes, uncovered"},{"text":"Add the drained lentils and ½ glass of water. Salt. Cook for 8 min, stirring","voice":"Add the lentils with water and salt. Cook for eight minutes, stirring"}]},"nov-n1":{"name":"Cauliflower and Leek Soup","desc":"The combination of cauliflower and leek makes a smooth, very aromatic soup.","tip":"The leek gives the soup a sweeter, milder flavor than onion. It's the secret of this recipe.","tags":["Vegetarian","Gluten-free","Comforting"],"harvard":{"veg":"Cauliflower · leek","prot":"—","grain":"Whole-wheat bread"},"nutL":["kcal","protein","immunity"],"ingredients":["200g frozen cauliflower","1 leek","1 glass vegetable broth","1 tbsp olive oil","Salt, nutmeg","Whole-wheat bread"],"steps":[{"text":"Slice the leek. Sauté with oil for 4 min over medium heat","voice":"Slice the leek and sauté for four minutes with oil"},{"text":"Add the frozen cauliflower and broth. Bring to a boil and cook for 8 min, covered","voice":"Add the cauliflower and the broth. Bring to a boil and cook for eight minutes"},{"text":"Blend well. Add the nutmeg and salt. Serve with bread","voice":"Blend, add the nutmeg, and serve with bread"}]},"nov-n2":{"name":"Sautéed Cabbage with Egg and Garlic","desc":"Cabbage is winter's cheapest vegetable and it works beautifully sautéed with garlic and egg.","tip":"Cabbage needs high heat to sauté — that way it turns slightly golden and not soft. Stir it little.","tags":["Vegetarian","Gluten-free","Quick","Cheap"],"harvard":{"veg":"Cabbage","prot":"Egg","grain":"Whole-wheat bread"},"nutL":["kcal","protein","immunity"],"ingredients":["¼ cabbage (green or kale)","1 clove garlic","1 egg","1 tbsp olive oil","Salt","Whole-wheat bread"],"steps":[{"text":"Cut the cabbage into thin strips. Sauté with garlic and oil over high heat for 4 min, uncovered","voice":"Sauté the cabbage strips with garlic over high heat for four minutes"},{"text":"Add salt, push the cabbage to the sides, and fry the egg in the center for 3 min","voice":"Add salt and fry the egg in the center of the pan for three minutes"},{"text":"Serve with whole-wheat bread","voice":"Serve with whole-wheat bread"}]},"dic-c1":{"name":"Quinoa Bowl with Broccoli and Salmon","desc":"A complete winter dish with omega-3, protein, and seasonal vegetables.","tip":"Frozen salmon fillet is much cheaper than fresh. Thaw it the night before.","tags":["Gluten-free","Omega-3"],"harvard":{"veg":"Broccoli","prot":"Salmon","grain":"Quinoa"},"nutL":["kcal","protein","omega 3"],"ingredients":["½ cup quinoa","1 salmon fillet (150g)","150g frozen broccoli","1 tbsp olive oil","Lemon juice","Salt, dill"],"steps":[{"text":"Boil the quinoa for 12 min on low. At the 8-min mark, put the broccoli on top without mixing","voice":"Boil the quinoa for twelve minutes and at eight minutes put the broccoli on top"},{"text":"Salt the salmon. Pan-sear with oil for 3 min per side over medium-high heat","voice":"Pan-sear the salmon with oil for three minutes on each side"},{"text":"Serve the quinoa and broccoli with the salmon on top. Squeeze the lemon and add the dill","voice":"Serve everything together, squeeze the lemon, and add the dill"}]},"dic-c2":{"name":"Lentils with Leek and Carrot","desc":"Winter lentils with leek and carrot. The cheapest and most nutritious dish of the month.","tip":"A splash of wine vinegar when serving boosts the iron absorption from the lentils. A simple trick.","tags":["Vegetarian","Gluten-free","Iron"],"harvard":{"veg":"Leek · carrot","prot":"Lentils","grain":"Whole-wheat bread"},"nutL":["kcal","protein","iron"],"ingredients":["1 can lentils (400g)","1 leek","1 carrot","½ onion","1 tbsp olive oil","Salt, paprika, bay leaf"],"steps":[{"text":"Chop the onion, leek, and carrot. Sauté with oil and bay leaf for 5 min","voice":"Chop the vegetables and sauté with oil and bay leaf for five minutes"},{"text":"Add ½ glass of water and paprika. Cook for 10 min over medium heat, covered","voice":"Add water and paprika. Cook for ten minutes, covered"},{"text":"Add the drained lentils and salt. 5 min more and it's ready","voice":"Add the lentils with salt and cook for five minutes more"}]},"dic-n1":{"name":"Leek Soup","desc":"Leek soup is the smoothest and most comforting of all. Perfect for the cold.","tip":"Use the green part of the leek too — it adds more flavor and there's no reason to throw it away.","tags":["Vegetarian","Gluten-free","Comforting"],"harvard":{"veg":"Leek","prot":"—","grain":"Whole-wheat bread"},"nutL":["kcal","protein","leek"],"ingredients":["2 leeks (all of it, including the green part)","1 glass vegetable broth","1 tbsp olive oil","Salt, nutmeg","Whole-wheat bread"],"steps":[{"text":"Slice the leeks. Sauté with oil in a pot for 4 min over medium heat","voice":"Slice the leeks and sauté for four minutes with oil"},{"text":"Add the broth. Bring to a boil and cook for 8 min, covered","voice":"Add the broth, bring to a boil, and cook for eight minutes, covered"},{"text":"Blend. Add the nutmeg and salt. Serve with toasted bread","voice":"Blend, add the nutmeg, and serve with toasted bread"}]},"dic-n2":{"name":"Broccoli with Egg and Cheese","desc":"Steamed broccoli with a fried egg and grated cheese. December's quickest dinner.","tip":"Broccoli in the microwave takes only 4 minutes with a little water — much faster than boiling.","tags":["Vegetarian","Gluten-free","Quick"],"harvard":{"veg":"Broccoli","prot":"Egg · cheese","grain":"Whole-wheat bread"},"nutL":["kcal","protein","broccoli"],"ingredients":["200g broccoli (fresh or frozen)","1 egg","30g grated cheese","1 tbsp olive oil","Salt"],"steps":[{"text":"Broccoli in the microwave: put it in a bowl with 2 tbsp water, cover with plastic wrap, 4 min","voice":"Put the broccoli with water in a covered bowl in the microwave for four minutes"},{"text":"Fry the egg with oil in a pan for 2 min","voice":"Fry the egg with oil for two minutes"},{"text":"Serve the broccoli with the egg on top and grated cheese. Add salt","voice":"Serve the broccoli with the egg and grated cheese"}]},"exp-c1":{"name":"Express Pasta with Tuna","desc":"All from the pantry. When there's no energy and no groceries, this pasta saves the day.","tip":"Toss the frozen peas into the pasta water for the last 3 minutes — one less pot to wash.","tags":["Lifesaver","10 minutes"],"harvard":{"veg":"Peas","prot":"Tuna","grain":"Whole-wheat pasta"},"nutL":["kcal","protein","carbs"],"ingredients":["80g whole-wheat pasta","1 can tuna in water","Handful of frozen peas","2 tbsp olive oil","Garlic powder, oregano, salt"],"steps":[{"text":"Put salted water on to boil and cook the pasta for the time on the package. Last 3 min: add the frozen peas to the water","voice":"Cook the pasta. For the last three minutes, add the frozen peas to the same water"},{"text":"Drain it all together. Mix with the tuna, oil, garlic powder, and oregano","voice":"Drain and mix with the tuna, oil, and oregano. Done"}]},"exp-c2":{"name":"Sautéed Rice with Egg","desc":"The perfect use-it-up dish. With yesterday's rice it's ready in 6 minutes.","tip":"If you have cooked rice from another day (or a microwave rice pouch), this dish comes together in 6 minutes.","tags":["Lifesaver","Gluten-free"],"harvard":{"veg":"Peas","prot":"Egg","grain":"Rice"},"nutL":["kcal","protein","carbs"],"ingredients":["½ cup rice (or yesterday's rice)","2 eggs","Handful of frozen peas","1 tbsp olive oil","Garlic powder, salt, paprika"],"steps":[{"text":"Cook the rice for 12 min (skip this step if you're using yesterday's rice or a pouch)","voice":"Cook the rice for twelve minutes. If you already have it cooked, skip this step"},{"text":"Sauté the peas with oil for 2 min. Add the rice and sauté for 2 min more","voice":"Sauté the peas for two minutes and add the rice"},{"text":"Make a gap in the center, crack in the eggs, and stir until set. Season","voice":"Crack the eggs in the center and stir until set"}]},"exp-n1":{"name":"Spinach Scramble with Bread","desc":"A complete dinner in 8 minutes with what's always at home.","tip":"Frozen spinach goes straight into the pan — it releases its water and in 3 minutes it's ready.","tags":["Lifesaver","Vegetarian"],"harvard":{"veg":"Spinach","prot":"Eggs","grain":"Whole-wheat bread"},"nutL":["kcal","protein","mineral"],"ingredients":["3 eggs","2 handfuls of frozen spinach","1 slice whole-wheat bread","1 tbsp olive oil","Salt, pepper"],"steps":[{"text":"Sauté the frozen spinach with oil for 3 min until it loses its water","voice":"Sauté the frozen spinach for three minutes"},{"text":"Beat the eggs with salt and add them. Stir gently until set. Toast the bread","voice":"Add the beaten eggs and stir until set. Toast the bread"}]},"exp-n2":{"name":"Spiced Sautéed Chickpeas","desc":"A can of chickpeas + spices = a warm, tasty dinner without a second thought.","tip":"Paprika and cumin turn a can of chickpeas into something delicious. Don't skip them.","tags":["Lifesaver","Vegetarian","Gluten-free"],"harvard":{"veg":"Spinach","prot":"Chickpeas","grain":"—"},"nutL":["kcal","protein","fiber"],"ingredients":["1 can chickpeas (400g)","Handful of frozen spinach","1 tbsp olive oil","Paprika, cumin, salt"],"steps":[{"text":"Drain the chickpeas. Sauté them with oil over medium-high heat for 5 min until golden","voice":"Drain the chickpeas and sauté them for five minutes until golden"},{"text":"Add the frozen spinach, paprika, and cumin. 4 min more and it's ready","voice":"Add the spinach with paprika and cumin. Four minutes more and it's ready"}]}},
fr:{"ene-c1":{"name":"Soupe de poireau et lentilles","desc":"Un petit bouillon qui réchauffe le corps en hiver. Les lentilles en boîte rendent ce plat très rapide.","tip":"Utilise des lentilles en boîte — elles sont déjà cuites. Elles ont juste besoin de 5 min de chaleur pour s'imprégner de saveur.","tags":["Végétarien","Sans gluten"],"harvard":{"veg":"Poireau · carotte","prot":"Lentilles","grain":"—"},"nutL":["kcal","protéines","fer"],"ingredients":["1 poireau","2 carottes","1 boîte de lentilles cuites (400g)","1L de bouillon de légumes","1 c. à soupe d'huile d'olive","Sel, cumin"],"steps":[{"text":"Coupe le poireau et la carotte en rondelles. Fais-les revenir avec l'huile dans une casserole à feu moyen 5 min en remuant","voice":"Coupe le poireau et la carotte en rondelles et fais-les revenir avec l'huile cinq minutes"},{"text":"Ajoute le bouillon, monte le feu jusqu'à ébullition, baisse à moyen et cuis 10 min à couvert","voice":"Ajoute le bouillon, porte à ébullition, baisse à feu moyen et couvre dix minutes"},{"text":"Égoutte les lentilles et ajoute-les avec le sel et le cumin. 5 min de plus en remuant et c'est prêt","voice":"Ajoute les lentilles égouttées avec le sel et le cumin. Cinq minutes de plus et c'est prêt"}]},"ene-c2":{"name":"Riz au brocoli et à l'œuf","desc":"Le brocoli surgelé cuit au-dessus du riz sans effort. Rapide et complet.","tip":"Le brocoli surgelé va directement dans la casserole sans décongeler. L'œuf peut être frit si tu ne maîtrises pas le pochage.","tags":["Végétarien","Sans gluten","Une casserole"],"harvard":{"veg":"Brocoli","prot":"Œuf","grain":"Riz"},"nutL":["kcal","protéines","glucides"],"ingredients":["½ tasse de riz blanc","150g de brocoli surgelé","1 œuf","1 tasse d'eau","1 c. à soupe d'huile d'olive","Sel, ail en poudre"],"steps":[{"text":"Mets le riz, l'eau et le sel dans une casserole. Porte à ébullition, baisse au minimum, couvre. Règle une alarme de 15 min","voice":"Mets le riz avec l'eau et le sel. Porte à ébullition, baisse au minimum et couvre quinze minutes"},{"text":"Au bout de 10 min : pose le brocoli surgelé sur le riz sans mélanger. Couvre de nouveau","voice":"Au bout de dix minutes, pose le brocoli sur le riz et couvre de nouveau"},{"text":"Fais frire l'œuf dans une poêle à part avec l'huile. Sers le riz et le brocoli avec l'œuf dessus et l'ail en poudre","voice":"Fais frire l'œuf et sers-le sur le riz au brocoli avec de l'ail en poudre"}]},"ene-n1":{"name":"Velouté de chou-fleur","desc":"Crémeux, doux et réconfortant. Le chou-fleur surgelé va directement dans la casserole.","tip":"Mixe bien pour que ce soit onctueux. Un filet de lait de coco à la fin le rend plus crémeux.","tags":["Végétarien","Sans gluten","Légère"],"harvard":{"veg":"Chou-fleur","prot":"—","grain":"Pain complet"},"nutL":["kcal","protéines","immunité"],"ingredients":["300g de chou-fleur surgelé","½ oignon","1 verre de bouillon de légumes","1 c. à soupe d'huile d'olive","Sel, noix de muscade","Pain complet pour accompagner"],"steps":[{"text":"Émince l'oignon. Fais-le revenir avec l'huile dans une casserole 3 min à feu moyen","voice":"Émince l'oignon et fais-le revenir trois minutes avec l'huile"},{"text":"Ajoute le chou-fleur surgelé et le bouillon. Monte le feu. À ébullition, baisse à moyen et couvre 10 min","voice":"Ajoute le chou-fleur et le bouillon. Porte à ébullition, baisse et couvre dix minutes"},{"text":"Mixe au mixeur plongeant, ajoute le sel et la noix de muscade. Sers avec du pain complet","voice":"Mixe le tout, ajoute le sel et sers avec du pain complet"}]},"ene-n2":{"name":"Omelette au poireau","desc":"Le poireau apporte une saveur douce et sucrée. Protéine + légume en 10 minutes.","tip":"Fais bien revenir le poireau jusqu'à ce qu'il soit translucide — comme ça il n'a pas un goût de cru dans l'omelette.","tags":["Végétarien","Sans gluten","Rapide"],"harvard":{"veg":"Poireau","prot":"Œuf","grain":"Pain complet (facultatif)"},"nutL":["kcal","protéines","bon gras"],"ingredients":["1 poireau (partie blanche)","2 œufs","1 c. à soupe d'huile d'olive","Sel"],"steps":[{"text":"Coupe le poireau en fines rondelles. Fais-le revenir avec l'huile 5 min à feu moyen jusqu'à ce qu'il ramollisse","voice":"Coupe le poireau et fais-le revenir cinq minutes jusqu'à ce qu'il soit tendre"},{"text":"Bats les œufs avec le sel. Verse sur le poireau à feu moyen-doux. 3 min sans remuer","voice":"Bats les œufs avec le sel et verse-les sur le poireau. Trois minutes sans la remuer"},{"text":"Retourne-la à l'aide d'une assiette. 2 min de plus et c'est prêt","voice":"Retourne-la à l'aide d'une assiette et cuis deux minutes de plus"}]},"feb-c1":{"name":"Bol d'épinards et pois chiches","desc":"Sans cuisson. Ouvrir la boîte, mélanger et assaisonner. Prêt en 10 minutes.","tip":"Si les épinards sont frais, ils sont prêts tels quels. S'ils sont surgelés, décongèle-les et égoutte-les bien.","tags":["Végétarien","Sans cuisson","Rapide"],"harvard":{"veg":"Épinards","prot":"Pois chiches","grain":"—"},"nutL":["kcal","protéines","fibres"],"ingredients":["1 boîte de pois chiches (400g)","2 poignées d'épinards frais","30g de feta","Jus d'½ citron","2 c. à soupe d'huile d'olive","Sel, cumin"],"steps":[{"text":"Égoutte et rince les pois chiches à l'eau froide","voice":"Égoutte et rince les pois chiches"},{"text":"Mets les épinards dans un bol, ajoute les pois chiches et la feta émiettée","voice":"Mélange dans un bol les épinards, les pois chiches et la feta"},{"text":"Assaisonne avec le citron, l'huile, le sel et le cumin. Mélange et c'est prêt à déguster","voice":"Assaisonne avec le citron, l'huile et le sel. Mélange et c'est prêt"}]},"feb-c2":{"name":"Poulet au brocoli et citron","desc":"Poulet moelleux avec brocoli et riz. Deux feux mais très simple.","tip":"Ne bouge pas le poulet tant qu'il ne se décolle pas tout seul de la poêle — comme ça il est doré et moelleux.","tags":["Sans gluten","Protéines"],"harvard":{"veg":"Brocoli","prot":"Poulet","grain":"Riz"},"nutL":["kcal","protéines","glucides"],"ingredients":["1 blanc de poulet en escalopes","150g de brocoli surgelé","½ tasse de riz","1 citron","1 c. à soupe d'huile d'olive","Sel, ail en poudre"],"steps":[{"text":"Mets le riz avec l'eau et le sel dans une casserole. Porte à ébullition, baisse au minimum, couvre 15 min. Au bout de 10 min ajoute le brocoli dessus","voice":"Mets le riz à cuire quinze minutes et au bout de dix minutes ajoute le brocoli dessus"},{"text":"Sale le poulet. Poêle avec l'huile à feu moyen-vif. 4 min sans le bouger. Retourne","voice":"Sale le poulet et cuis-le à la poêle quatre minutes sans le bouger"},{"text":"4 min de plus, presse le citron dessus et éteins. Sers avec le riz et le brocoli","voice":"Quatre minutes de plus, presse le citron et sers avec le riz et le brocoli"}]},"feb-n1":{"name":"Velouté de brocoli et curcuma","desc":"Le brocoli surgelé et le curcuma font un velouté réconfortant et anti-inflammatoire.","tip":"Le curcuma a besoin d'un peu de poivre noir pour s'activer. Ajoute une pincée au moment de mixer.","tags":["Végétarien","Sans gluten","Anti-inflammatoire"],"harvard":{"veg":"Brocoli","prot":"—","grain":"Pain complet"},"nutL":["kcal","protéines","immunité"],"ingredients":["250g de brocoli surgelé","½ oignon","1 verre de bouillon de légumes","1 c. à soupe d'huile d'olive","½ c. à café de curcuma","Pincée de poivre noir","Sel"],"steps":[{"text":"Fais revenir l'oignon avec l'huile 3 min. Ajoute le brocoli surgelé et le bouillon","voice":"Fais revenir l'oignon trois minutes, ajoute le brocoli et le bouillon"},{"text":"Porte à ébullition et cuis 8 min à couvert à feu moyen","voice":"Porte à ébullition et cuis huit minutes à couvert"},{"text":"Ajoute le curcuma, le poivre et le sel. Mixe jusqu'à ce que ce soit onctueux","voice":"Ajoute le curcuma, le poivre et le sel. Mixe jusqu'à ce que ce soit onctueux"}]},"feb-n2":{"name":"Épinards à l'œuf poché","desc":"Épinards sautés à l'ail avec un œuf poché dessus. Un dîner simple et nourrissant.","tip":"Pour l'œuf poché : eau bouillante avec une pincée de vinaigre, remue pour faire un tourbillon et casse l'œuf. 3 min.","tags":["Végétarien","Sans gluten","Rapide"],"harvard":{"veg":"Épinards","prot":"Œuf","grain":"Pain complet"},"nutL":["kcal","protéines","épinards"],"ingredients":["2 poignées d'épinards","1 œuf","1 gousse d'ail (ou ail en poudre)","1 c. à soupe d'huile d'olive","Sel","Pain complet"],"steps":[{"text":"Fais sauter les épinards avec l'ail et l'huile 3 min à feu moyen jusqu'à ce qu'ils réduisent","voice":"Fais sauter les épinards avec l'ail et l'huile trois minutes"},{"text":"En parallèle : porte l'eau à ébullition, ajoute une pincée de vinaigre, remue et casse l'œuf. 3 min","voice":"Porte l'eau à ébullition avec du vinaigre, remue et casse l'œuf. Trois minutes"},{"text":"Sers les épinards avec l'œuf dessus et du pain complet à côté","voice":"Sers les épinards avec l'œuf poché dessus et du pain à côté"}]},"mar-c1":{"name":"Quinoa aux asperges et à l'œuf","desc":"Les asperges de saison avec du quinoa et un œuf dur. Un plat de printemps complet.","tip":"Les asperges blanches en bocal font aussi l'affaire. Égoutte-les et fais-les 2 min à la plancha.","tags":["Végétarien","Sans gluten","Printemps"],"harvard":{"veg":"Asperges","prot":"Œuf","grain":"Quinoa"},"nutL":["kcal","protéines","bon gras"],"ingredients":["½ tasse de quinoa prélavé","1 botte d'asperges","2 œufs","1 c. à soupe d'huile d'olive","Jus d'½ citron","Sel"],"steps":[{"text":"Porte le quinoa à ébullition avec 1 tasse d'eau et du sel. À ébullition, baisse au minimum et couvre 12 min","voice":"Porte le quinoa à ébullition avec l'eau et le sel. À ébullition baisse au minimum et couvre douze minutes"},{"text":"Cuis les œufs 8 min dans l'eau bouillante. Refroidis et écale","voice":"Cuis les œufs huit minutes. Refroidis-les à l'eau froide et écale-les"},{"text":"Fais les asperges à la plancha avec l'huile et le sel 4 min. Sers le tout ensemble avec le citron","voice":"Fais les asperges à la plancha quatre minutes et sers le tout avec un filet de citron"}]},"mar-c2":{"name":"Riz aux petits pois et au thon","desc":"Un classique de saison. Le thon en conserve est la protéine la moins chère et la plus pratique.","tip":"Le thon s'ajoute à la fin, hors du feu — comme ça il ne se dessèche pas. Égoutte-le bien de l'huile de la boîte.","tags":["Sans gluten","Protéines","Économique"],"harvard":{"veg":"Petits pois","prot":"Thon","grain":"Riz"},"nutL":["kcal","protéines","glucides"],"ingredients":["½ tasse de riz","100g de petits pois (surgelés ou en boîte)","1 boîte de thon au naturel","1 c. à soupe d'huile d'olive","Sel, persil (facultatif)"],"steps":[{"text":"Porte le riz à ébullition avec l'eau et le sel 15-18 min. Dans les 5 dernières min ajoute les petits pois dessus","voice":"Cuis le riz et dans les cinq dernières minutes ajoute les petits pois dessus"},{"text":"Égoutte le thon. Mélange le riz et les petits pois avec le thon, l'huile et le sel","voice":"Égoutte le thon et mélange le tout avec l'huile et le sel"}]},"mar-n1":{"name":"Asperges à la plancha avec œuf","desc":"Un dîner express de printemps. Les asperges vertes à la plancha sont prêtes en 4 minutes.","tip":"Les asperges sont prêtes quand elles deviennent vert vif et que tu peux les piquer facilement.","tags":["Végétarien","Sans gluten","Rapide"],"harvard":{"veg":"Asperges","prot":"Œuf","grain":"Pain complet"},"nutL":["kcal","protéines","printemps"],"ingredients":["1 botte d'asperges vertes","1 œuf","1 c. à soupe d'huile d'olive","Gros sel","Pain complet"],"steps":[{"text":"Chauffe la poêle à feu vif avec l'huile. Fais les asperges à la plancha 4 min avec du sel","voice":"Fais les asperges à la plancha avec l'huile et le sel quatre minutes à feu vif"},{"text":"Dans la même poêle, baisse le feu et fais frire l'œuf. 2 min","voice":"Baisse le feu et fais frire l'œuf dans la même poêle deux minutes"},{"text":"Sers les asperges avec l'œuf dessus et du pain complet","voice":"Sers les asperges avec l'œuf et du pain complet à côté"}]},"mar-n2":{
