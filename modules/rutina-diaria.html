<!DOCTYPE html>
<html lang="es">
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cris - Rutina Diaria</title>
<style>
  :root{
    --turq:#26a69a;
    --turq-light:#4dd0e1;
    --lavanda:#e8e6fb;
    --lavanda-soft:#f3f1ff;
    --bg:#f0f9ff;
    --work:#ff6b6b;
    --break:#4dd0e1;
    --longbreak:#ffd54f;
    --text:#2d3748;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Outfit','Segoe UI',system-ui,sans-serif;}
  body{
    background:linear-gradient(135deg,var(--bg) 0%,var(--lavanda-soft) 100%);
    min-height:100vh;
    padding:16px;
    color:var(--text);
    -webkit-tap-highlight-color:transparent;
  }
  .card{
    max-width:480px;
    margin:0 auto;
    background:#fff;
    border-radius:24px;
    box-shadow:0 8px 24px rgba(38,166,154,0.12);
    padding:20px;
  }
  .header{text-align:center;margin-bottom:18px;}
  .header .quokka{font-size:3rem;animation:bounce 2s ease-in-out infinite;}
  @keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
  .header h1{color:var(--turq);font-size:1.4rem;margin-top:4px;}

  .section{background:var(--lavanda-soft);border-radius:16px;padding:14px;margin-bottom:16px;}
  .section h2{color:var(--turq);font-size:1.05rem;margin-bottom:10px;}

  .pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
  .pill{
    border:2px solid var(--turq);
    color:var(--turq);
    background:#fff;
    border-radius:999px;
    padding:7px 14px;
    font-size:0.8rem;
    font-weight:600;
    cursor:pointer;
    transition:all .15s;
  }
  .pill.active, .pill:active{background:var(--turq);color:#fff;}

  .block-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
  .block-item{
    background:#fff;
    border-radius:12px;
    padding:8px 10px;
    display:flex;
    align-items:center;
    gap:8px;
    font-size:0.85rem;
    border-left:5px solid var(--turq-light);
  }
  .block-item .label{flex:1;}
  .block-item button{
    border:none;background:var(--lavanda);color:var(--text);
    width:30px;height:30px;border-radius:8px;font-size:1rem;cursor:pointer;
  }
  .block-item button:active{background:var(--turq-light);color:#fff;}

  .add-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
  .add-btn{
    flex:1;min-width:90px;border:none;border-radius:999px;padding:10px;
    font-size:0.8rem;font-weight:700;color:#fff;cursor:pointer;
  }
  .add-btn.work{background:var(--work);}
  .add-btn.break{background:var(--turq-light);}
  .add-btn.long{background:var(--longbreak);color:#5d4e37;}

  .summary{
    background:#fff;border-radius:12px;padding:10px;font-size:0.8rem;
    margin-bottom:14px;display:flex;justify-content:space-between;
  }

  .btn-main{
    width:100%;border:none;border-radius:999px;padding:14px;
    font-size:1rem;font-weight:800;color:#fff;background:#4caf50;cursor:pointer;
    box-shadow:0 4px 12px rgba(76,175,80,0.35);
  }
  .btn-main:active{transform:scale(0.98);}

  /* SESSION VIEW */
  .session-title{font-size:1.1rem;font-weight:800;margin-bottom:8px;}
  .timer-display{font-size:3rem;font-weight:800;margin-bottom:10px;letter-spacing:2px;}
  .progress-track{width:100%;height:10px;background:var(--lavanda);border-radius:999px;overflow:hidden;margin-bottom:14px;}
  .progress-fill{height:100%;background:var(--turq);transition:width .3s;}

  .dots-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;}
  .dot{
    width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;
    font-size:1.1rem;border:2px solid var(--lavanda);background:var(--lavanda-soft);
  }
  .dot.done{background:#4caf50;border-color:#4caf50;}
  .dot.current{background:var(--turq);border-color:var(--turq);}

  .session-info{font-size:0.78rem;color:#666;text-align:center;line-height:1.5;margin-bottom:14px;}

  .controls{display:flex;gap:10px;justify-content:center;}
  .controls button{
    border:none;border-radius:999px;padding:12px 18px;font-size:1.1rem;color:#fff;cursor:pointer;
  }
  .controls .pause{background:#ff9800;}
  .controls .skip{background:#90a4ae;}
  .controls .reset{background:var(--work);}

  /* TASKS */
  .task{
    background:#fff;border-radius:12px;padding:10px 12px;
    display:flex;align-items:center;gap:10px;margin-bottom:8px;
    border-left:4px solid transparent;cursor:pointer;font-size:0.9rem;
  }
  .task.done{opacity:.55;text-decoration:line-through;border-left-color:var(--turq-light);}
  .check{
    width:22px;height:22px;border-radius:50%;border:2px solid var(--turq);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:0.8rem;color:#fff;
  }
  .task.done .check{background:var(--turq);}
  .task .del{margin-left:auto;background:none;border:none;font-size:1rem;color:var(--work);cursor:pointer;padding:4px;}

  .new-task-row{display:flex;gap:8px;margin-top:6px;}
  .new-task-row input{
    flex:1;border:2px solid var(--turq);border-radius:12px;padding:10px;font-size:0.9rem;
  }
  .new-task-row button{
    background:var(--turq);color:#fff;border:none;border-radius:12px;
    width:46px;font-size:1.3rem;cursor:pointer;
  }

  /* MODAL */
  .overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.45);
    display:none;align-items:center;justify-content:center;z-index:50;padding:20px;
  }
  .overlay.show{display:flex;}
  .modal{background:#fff;border-radius:20px;padding:20px;width:100%;max-width:340px;}
  .modal h3{color:var(--turq);margin-bottom:14px;}
  .modal .close{float:right;border:none;background:none;font-size:1.3rem;cursor:pointer;}
  .modal input{
    width:100%;border:2px solid var(--turq);border-radius:12px;padding:10px;
    margin-bottom:12px;font-size:0.95rem;
  }
  .modal .confirm{
    width:100%;background:var(--turq);color:#fff;border:none;border-radius:999px;
    padding:12px;font-weight:800;font-size:1rem;cursor:pointer;
  }
  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--turq);color:#fff;padding:12px 20px;border-radius:14px;
    font-size:0.9rem;text-align:center;max-width:320px;box-shadow:0 4px 16px rgba(0,0,0,0.2);
    display:none;z-index:60;
  }
  .toast.show{display:block;}

.calm *,.calm *::before,.calm *::after{animation:none !important;transition:none !important}

/* Herramientas anti-bloqueo */
.tools-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:6px}
.tool-btn{background:#fff;border:2px solid var(--lavanda);border-radius:16px;padding:13px 8px;cursor:pointer;font-family:inherit;text-align:center;font-size:.76rem;font-weight:700;color:var(--turq);display:flex;flex-direction:column;align-items:center;gap:6px;line-height:1.2;transition:transform .1s}
.tool-btn:active{transform:scale(.96);background:var(--lavanda-soft)}
.tool-btn .te{font-size:1.6rem}
.tool-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;z-index:70}
.tool-ov.show{display:flex}
.tool-sheet{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;padding:20px 18px 34px;animation:sheetup .25s ease}
@keyframes sheetup{from{transform:translateY(40px);opacity:.4}to{transform:translateY(0);opacity:1}}
.tool-sheet h3{color:var(--turq);font-size:1.2rem;margin-bottom:4px}
.tool-sheet .t-desc{font-size:.82rem;color:#667;margin-bottom:14px;line-height:1.45}
.tool-field{width:100%;border:2px solid var(--lavanda);border-radius:12px;padding:11px;font-family:inherit;font-size:.9rem;margin-bottom:10px;color:var(--text)}
.tool-field:focus{outline:none;border-color:var(--turq)}
textarea.tool-field{min-height:74px;resize:vertical}
.tool-close{float:right;border:none;background:none;font-size:1.4rem;cursor:pointer;color:#aaa;line-height:1}
.t-label{font-size:.78rem;font-weight:700;color:var(--turq);margin:8px 0 5px}
.t-btn{border:none;border-radius:12px;padding:12px;font-family:inherit;font-size:.92rem;font-weight:700;cursor:pointer;width:100%;color:#fff;background:var(--turq);margin-top:4px}
.t-btn.sec{background:var(--lavanda);color:var(--turq)}
.t-chip{display:inline-block;border:2px solid var(--lavanda);background:#fff;color:var(--turq);border-radius:999px;padding:8px 14px;font-size:.82rem;font-weight:600;cursor:pointer;margin:0 6px 6px 0}
.t-chip:active{background:var(--turq);color:#fff}
.t-timer{font-size:3rem;font-weight:800;color:var(--turq);text-align:center;font-variant-numeric:tabular-nums;margin:6px 0}
.t-card{background:var(--lavanda-soft);border-radius:14px;padding:14px;font-size:.9rem;line-height:1.5;margin:10px 0;color:var(--text)}
.t-mini{background:var(--lavanda-soft);border-radius:12px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:8px;font-size:.85rem}
.t-mini .g{display:flex;gap:5px;margin-left:auto}
.t-mini .g button{border:none;border-radius:8px;padding:5px 9px;font-size:.72rem;font-weight:700;cursor:pointer}

/* Anillo de tiempo: se vacía según pasa — para ver cuánto queda sin leer números */
.tring{width:176px;height:176px;border-radius:50%;margin:4px auto 10px;display:flex;align-items:center;justify-content:center;background:conic-gradient(#26a69a 360deg,#cde9e4 0);flex-shrink:0;}
.tring-in{width:144px;height:144px;border-radius:50%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px;text-align:center;}
.tring .timer-display{font-size:2.3rem;margin-bottom:0;letter-spacing:1px}
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="quokka">🐨📝</div>
    <h1>Rutina Diaria</h1>
  </div>

  <!-- POMODORO -->
  <div class="section">
    <h2>⏰ Trabajo por Bloques</h2>

    <!-- CONFIG VIEW -->
    <div id="configView">
      <button class="btn-main" id="quickStartBtn" style="margin-bottom:14px;">⚡ EMPEZAR YA — 25 min y a por ello</button>
      <div style="font-size:0.75rem;opacity:.6;text-align:center;margin-bottom:10px;">o personaliza tu sesión:</div>
      <div class="pill-row">
        <button class="pill" data-preset="clasico">Clásico</button>
        <button class="pill" data-preset="intenso">Intenso</button>
        <button class="pill" data-preset="sprint">Sprint</button>
      </div>

      <strong style="font-size:0.85rem;">📋 Bloques:</strong>
      <div class="block-list" id="blockList"></div>

      <strong style="font-size:0.85rem;">➕ Agregar:</strong>
      <div class="add-row" style="margin-top:6px;">
        <button class="add-btn work" data-type="work">🔥 Trabajo</button>
        <button class="add-btn break" data-type="break">☕ Descanso</button>
        <button class="add-btn long" data-type="longbreak">🌟 Largo</button>
      </div>

      <div class="summary">
        <span>⏱️ Total: <strong id="totalTime">0</strong> min</span>
        <span>📊 <strong id="blockCount">0</strong> bloques</span>
      </div>

      <button class="btn-main" id="startBtn">▶️ INICIAR SESIÓN</button>
    </div>

    <!-- SESSION VIEW -->
    <div id="sessionView" style="display:none;">
      <div style="text-align:center;">
        <div class="session-title" id="blockLabel"></div>
        <div class="tring" id="blk-ring"><div class="tring-in"><div class="timer-display" id="timeLeft">00:00</div><div style="font-size:0.7rem;color:#666;">restante</div></div></div>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <div class="dots-row" id="dotsRow"></div>
        <div class="session-info" id="sessionInfo"></div>
        <div class="controls">
          <button class="pause" id="pauseBtn">⏸️</button>
          <button class="skip" id="skipBtn">⏭️</button>
          <button class="reset" id="resetBtn">🔁</button>
        </div>
      </div>
    </div>
  </div>

  <!-- TAREAS -->
  <div class="section">
    <h2>📋 Tareas del Día</h2>
    <div id="taskList"></div>
    <div class="new-task-row">
      <input type="text" id="newTaskInput" placeholder="Nueva tarea...">
      <button id="addTaskBtn">+</button>
    </div>
  </div>

  <!-- HERRAMIENTAS ANTI-BLOQUEO -->
  <div class="section">
    <h2>🧠 Herramientas anti-bloqueo</h2>
    <div style="font-size:0.75rem;opacity:.7;margin-bottom:8px;">Para cuando tu cerebro se atasca. Toca la que necesites.</div>
    <div class="tools-grid">
      <button class="tool-btn" onclick="openTool('paralisis')"><span class="te">🧩</span>Destructor de parálisis</button>
      <button class="tool-btn" onclick="openTool('dopamina')"><span class="te">🍽️</span>Menú de dopamina</button>
      <button class="tool-btn" onclick="openTool('doble')"><span class="te">👥</span>Doble de cuerpo</button>
      <button class="tool-btn" onclick="openTool('contexto')"><span class="te">🔄</span>Cambio de contexto</button>
      <button class="tool-btn" onclick="openTool('interes')"><span class="te">🎮</span>Convertir en misión</button>
      <button class="tool-btn" onclick="openTool('tiempo')"><span class="te">⏳</span>Auditor del tiempo</button>
      <button class="tool-btn" onclick="openTool('volcado')" style="grid-column:1/-1"><span class="te">🧠</span>Vaciar la mente (bucles abiertos)</button>
    </div>
  </div>
</div>

<!-- OVERLAY HERRAMIENTAS -->
<div class="tool-ov" id="toolOv">
  <div class="tool-sheet" id="toolSheet"></div>
</div>

<!-- MODAL AGREGAR BLOQUE -->
<div class="overlay" id="modalOverlay">
  <div class="modal">
    <button class="close" id="modalClose">✕</button>
    <h3 id="modalTitle">Agregar Bloque</h3>
    <input type="number" id="modalDuration" min="1" max="120" placeholder="Minutos">
    <input type="text" id="modalLabel" placeholder="Etiqueta (opcional)">
    <button class="confirm" id="modalConfirm">Agregar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* Ajustes globales (voz/sonido/vibración/reducir estímulos) — compartidos vía localStorage */
function __cfg(){try{return JSON.parse(localStorage.getItem('cris_cfg')||'{}');}catch(e){return{};}}
function __allow(k){const c=__cfg();return c[k]!==false&&c.calm!==true;}
if(__cfg().calm)document.documentElement.classList.add('calm');

function __ring(id,frac){const r=document.getElementById(id);if(r)r.style.background='conic-gradient(#26a69a '+(Math.max(0,Math.min(1,frac))*360)+'deg,#cde9e4 0)';}

(function(){
  const STORAGE_KEY = 'cris_rutina_diaria_v1';

  const presets = {
    clasico: [
      { type:'work', duration:25, label:'Trabajo 1' },
      { type:'break', duration:5, label:'Descanso' },
      { type:'work', duration:25, label:'Trabajo 2' },
      { type:'break', duration:5, label:'Descanso' },
      { type:'work', duration:25, label:'Trabajo 3' },
      { type:'longbreak', duration:15, label:'Descanso largo' }
    ],
    intenso: [
      { type:'work', duration:45, label:'Profundo 1' },
      { type:'break', duration:10, label:'Pausa' },
      { type:'work', duration:45, label:'Profundo 2' },
      { type:'longbreak', duration:20, label:'Descanso' }
    ],
    sprint: [
      { type:'work', duration:15, label:'Sprint 1' },
      { type:'break', duration:3, label:'Break' },
      { type:'work', duration:15, label:'Sprint 2' },
      { type:'break', duration:3, label:'Break' },
      { type:'work', duration:15, label:'Sprint 3' },
      { type:'longbreak', duration:10, label:'Descanso' }
    ]
  };

  const defaultTasks = [
    { text:'☀️ Despertar', done:false },
    { text:'🥐 Desayunar', done:false },
    { text:'💻 Trabajo', done:false },
    { text:'🏃‍♀️ Ejercicio', done:false }
  ];

  let state = {
    blocks: JSON.parse(JSON.stringify(presets.clasico)),
    tasks: JSON.parse(JSON.stringify(defaultTasks)),
    currentBlockIndex: 0,
    blockTimeLeft: 0,
    blockTotalTime: 0,
    sessionRunning: false,
    isPaused: false
  };

  // ---- Persistencia ----
  function save(){
    const toSave = {
      blocks: state.blocks,
      tasks: state.tasks
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
  }
  function load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        const data = JSON.parse(raw);
        if(data.blocks && data.blocks.length) state.blocks = data.blocks;
        if(data.tasks) state.tasks = data.tasks;
      }
    }catch(e){}
  }

  // ---- Audio / Feedback ----
  let audioCtx;
  function beep(freq=880, dur=0.15){if(!__allow('sound'))return;
    try{
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.frequency.value = freq;
      o.type = 'sine';
      g.gain.setValueAtTime(0.2, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      o.start(); o.stop(audioCtx.currentTime + dur);
    }catch(e){}
  }
  function vibrate(pattern){if(!__allow('vib'))return;
    if(navigator.vibrate) navigator.vibrate(pattern);
  }
  let _utt = null;
  function speak(text){
    try{if(!__allow('voice'))return;
      if(!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      if(window.speechSynthesis.paused) window.speechSynthesis.resume();
      _utt = new SpeechSynthesisUtterance(text);
      _utt.lang = 'es-ES'; _utt.rate = 0.9;
      const v = window.speechSynthesis.getVoices().find(v=>v.lang.startsWith('es'));
      if(v) _utt.voice = v;
      window.speechSynthesis.speak(_utt);
    }catch(e){}
  }
  function showToast(msg, ms=2200){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(()=>t.classList.remove('show'), ms);
  }

  // ---- Helpers ----
  function getBlockIcon(type){ return type==='work' ? '🔥' : type==='break' ? '☕' : '🌟'; }
  function getBlockColorVar(type){ return type==='work' ? 'var(--work)' : type==='break' ? 'var(--break)' : 'var(--longbreak)'; }
  function formatTime(seconds){
    const m = Math.floor(seconds/60);
    const s = seconds%60;
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }
  function getTotalTime(){ return state.blocks.reduce((sum,b)=>sum+b.duration,0); }

  // ---- Render: config ----
  function renderConfig(){
    const list = document.getElementById('blockList');
    list.innerHTML = '';
    state.blocks.forEach((block,i)=>{
      const row = document.createElement('div');
      row.className = 'block-item';
      row.style.borderLeftColor = getBlockColorVar(block.type);
      row.innerHTML = `
        <span>${getBlockIcon(block.type)}</span>
        <span class="label">${block.label} - ${block.duration}min</span>
        <button data-act="up" data-i="${i}">▲</button>
        <button data-act="down" data-i="${i}">▼</button>
        <button data-act="del" data-i="${i}">🗑️</button>
      `;
      list.appendChild(row);
    });
    document.getElementById('totalTime').textContent = getTotalTime();
    document.getElementById('blockCount').textContent = state.blocks.length;
  }

  // ---- Render: session ----
  function renderSession(){
    const block = state.blocks[state.currentBlockIndex];
    if(!block) return;
    document.getElementById('blockLabel').textContent = `${getBlockIcon(block.type)} ${block.label.toUpperCase()}`;
    document.getElementById('blockLabel').style.color = getBlockColorVar(block.type);
    document.getElementById('timeLeft').textContent = formatTime(state.blockTimeLeft);
    __ring('blk-ring', state.blockTotalTime > 0 ? state.blockTimeLeft/state.blockTotalTime : 0);

    const progress = state.blockTotalTime > 0 ? ((state.blockTotalTime - state.blockTimeLeft)/state.blockTotalTime)*100 : 0;
    document.getElementById('progressFill').style.width = progress + '%';

    const dots = document.getElementById('dotsRow');
    dots.innerHTML = '';
    state.blocks.forEach((b,i)=>{
      const d = document.createElement('div');
      d.className = 'dot' + (i < state.currentBlockIndex ? ' done' : i === state.currentBlockIndex ? ' current' : '');
      d.textContent = getBlockIcon(b.type);
      dots.appendChild(d);
    });

    const sessionProgress = Math.round((state.currentBlockIndex/state.blocks.length)*100);
    const timeRemaining = state.blocks.slice(state.currentBlockIndex).reduce((sum,b)=>sum+b.duration,0);
    document.getElementById('sessionInfo').innerHTML =
      `Bloque ${state.currentBlockIndex+1} de ${state.blocks.length}<br>Sesión: ${sessionProgress}% &nbsp;·&nbsp; Quedan ~${timeRemaining} min`;

    document.getElementById('pauseBtn').textContent = state.isPaused ? '▶️' : '⏸️';
  }

  // ---- Lógica del temporizador ----
  let timerInterval = null;

  function startBlock(index){
    const block = state.blocks[index];
    state.blockTotalTime = block.duration * 60;
    state.blockTimeLeft = state.blockTotalTime;
    state.isPaused = false;
    speak(`${block.label}. ${block.duration} minutos.`);
    renderSession();
  }

  function tick(){
    if(!state.sessionRunning || state.isPaused) return;
    if(state.blockTimeLeft > 0){
      state.blockTimeLeft--;
      renderSession();
      if(state.blockTimeLeft === 0){
        completeBlock();
      }
    }
  }

  function completeBlock(){
    beep(660, 0.4);
    vibrate([200,100,200]);
    const nextIndex = state.currentBlockIndex + 1;
    if(nextIndex < state.blocks.length){
      const next = state.blocks[nextIndex];
      speak(`¡Bloque completado! Siguiente: ${next.label}`);
      showToast(`✅ ¡Bloque completado! Siguiente: ${next.label}`, 2800);
      state.currentBlockIndex = nextIndex;
      startBlock(nextIndex);
    } else {
      beep(880, 0.6);
      vibrate([200,100,200,100,200]);
      speak('¡Sesión completada! Buen trabajo.');
      showToast('🎉 ¡Sesión completada! Buen trabajo.', 3500);
      resetSession();
    }
  }

  function startSession(){
    if(state.blocks.length === 0) return;
    state.currentBlockIndex = 0;
    state.sessionRunning = true;
    document.getElementById('configView').style.display = 'none';
    document.getElementById('sessionView').style.display = 'block';
    startBlock(0);
    if(timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(tick, 1000);
  }

  function resetSession(){
    state.sessionRunning = false;
    state.isPaused = false;
    state.currentBlockIndex = 0;
    state.blockTimeLeft = 0;
    if(timerInterval) clearInterval(timerInterval);
    document.getElementById('configView').style.display = 'block';
    document.getElementById('sessionView').style.display = 'none';
    renderConfig();
  }

  // ---- Tareas ----
  function renderTasks(){
    const list = document.getElementById('taskList');
    list.innerHTML = '';
    state.tasks.forEach((task,i)=>{
      const row = document.createElement('div');
      row.className = 'task' + (task.done ? ' done' : '');
      row.innerHTML = `
        <div class="check">${task.done ? '✓' : ''}</div>
        <span style="flex:1;">${task.text}</span>
        <button class="del" data-i="${i}">🗑️</button>
      `;
      row.addEventListener('click', (e)=>{
        if(e.target.closest('.del')) return;
        task.done = !task.done;
        if(task.done){ beep(990,0.1); vibrate(50); }
        save();
        renderTasks();
      });
      row.querySelector('.del').addEventListener('click', ()=>{
        state.tasks.splice(i,1);
        save();
        renderTasks();
      });
      list.appendChild(row);
    });
  }

  // ---- Eventos: presets ----
  document.querySelectorAll('.pill').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(state.sessionRunning) return;
      const preset = btn.dataset.preset;
      state.blocks = JSON.parse(JSON.stringify(presets[preset]));
      document.querySelectorAll('.pill').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      save();
      renderConfig();
    });
  });

  // ---- Eventos: lista de bloques ----
  document.getElementById('blockList').addEventListener('click', (e)=>{
    const btn = e.target.closest('button');
    if(!btn || state.sessionRunning) return;
    const i = parseInt(btn.dataset.i);
    const act = btn.dataset.act;
    if(act === 'del'){
      state.blocks.splice(i,1);
    } else if(act === 'up' && i > 0){
      [state.blocks[i-1], state.blocks[i]] = [state.blocks[i], state.blocks[i-1]];
    } else if(act === 'down' && i < state.blocks.length-1){
      [state.blocks[i+1], state.blocks[i]] = [state.blocks[i], state.blocks[i+1]];
    }
    save();
    renderConfig();
  });

  // ---- Modal agregar bloque ----
  let modalType = 'work';
  document.querySelectorAll('.add-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      modalType = btn.dataset.type;
      const defaults = { work:25, break:5, longbreak:15 };
      document.getElementById('modalDuration').value = defaults[modalType];
      document.getElementById('modalLabel').value = '';
      const titles = { work:'🔥 Agregar bloque de trabajo', break:'☕ Agregar descanso', longbreak:'🌟 Agregar descanso largo' };
      document.getElementById('modalTitle').textContent = titles[modalType];
      document.getElementById('modalOverlay').classList.add('show');
    });
  });
  document.getElementById('modalClose').addEventListener('click', ()=>{
    document.getElementById('modalOverlay').classList.remove('show');
  });
  document.getElementById('modalOverlay').addEventListener('click', (e)=>{
    if(e.target.id === 'modalOverlay') document.getElementById('modalOverlay').classList.remove('show');
  });
  document.getElementById('modalConfirm').addEventListener('click', ()=>{
    const duration = parseInt(document.getElementById('modalDuration').value) || 0;
    if(duration < 1) return;
    let label = document.getElementById('modalLabel').value.trim();
    if(!label){
      label = modalType==='work' ? 'Trabajo' : modalType==='break' ? 'Descanso' : 'Descanso largo';
    }
    state.blocks.push({ type:modalType, duration, label });
    document.getElementById('modalOverlay').classList.remove('show');
    save();
    renderConfig();
  });

  // ---- Botones de sesión ----
  document.getElementById('startBtn').addEventListener('click', startSession);
  document.getElementById('pauseBtn').addEventListener('click', ()=>{
    state.isPaused = !state.isPaused;
    if(state.isPaused){ speak('Pausado'); } else { speak('Reanudado'); }
    renderSession();
  });
  document.getElementById('skipBtn').addEventListener('click', ()=>{
    completeBlock();
  });
  document.getElementById('resetBtn').addEventListener('click', ()=>{
    speak('Sesión reiniciada');
    showToast('🔁 Sesión reiniciada');
    resetSession();
  });
  document.getElementById('quickStartBtn').addEventListener('click', ()=>{
    state.blocks = JSON.parse(JSON.stringify(presets.clasico));
    renderConfig();
    startSession();
  });

  // ---- Tareas: agregar ----
  document.getElementById('addTaskBtn').addEventListener('click', addTask);
  document.getElementById('newTaskInput').addEventListener('keypress', (e)=>{
    if(e.key === 'Enter') addTask();
  });
  function addTask(){
    const input = document.getElementById('newTaskInput');
    const text = input.value.trim();
    if(!text) return;
    state.tasks.push({ text, done:false });
    input.value = '';
    save();
    renderTasks();
  }

  // ---- Init ----
  load();
  renderConfig();
  renderTasks();
})();

/* ═══ HERRAMIENTAS ANTI-BLOQUEO ═══ */
(function(){
  const ov=document.getElementById('toolOv'), sheet=document.getElementById('toolSheet');
  let tTimer=null, _u=null;

  function allow(k){try{const c=JSON.parse(localStorage.getItem('cris_cfg')||'{}');return c[k]!==false&&c.calm!==true;}catch(e){return true;}}
  function speak(t){if(!allow('voice'))return;try{if(!window.speechSynthesis)return;speechSynthesis.cancel();if(speechSynthesis.paused)speechSynthesis.resume();_u=new SpeechSynthesisUtterance(t);_u.lang='es-ES';_u.rate=.92;const v=speechSynthesis.getVoices().find(v=>v.lang.startsWith('es'));if(v)_u.voice=v;speechSynthesis.speak(_u);}catch(e){}}
  function beep(f=660,d=.15){if(!allow('sound'))return;try{const c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.setValueAtTime(.2,c.currentTime);g.gain.exponentialRampToValueAtTime(.01,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
  function vib(m){if(!allow('vib'))return;try{navigator.vibrate(m);}catch(e){}}
  function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
  function stopTimer(){if(tTimer){clearInterval(tTimer);tTimer=null;}}
  function run(secs,tickEl,onCheck,onEnd){
    stopTimer();let t=secs;const el=document.getElementById(tickEl);
    if(el)el.textContent=fmt(t);
    tTimer=setInterval(()=>{t--;if(el)el.textContent=fmt(t);if(onCheck)onCheck(t,secs);if(t<=0){stopTimer();beep(880,.2);vib([60,40,80]);onEnd&&onEnd();}},1000);
  }
  const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const gv=id=>{const e=document.getElementById(id);return e?e.value.trim():'';};
  function lsGet(k,d){try{return JSON.parse(localStorage.getItem(k))??d;}catch(e){return d;}}
  function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

  window.openTool=function(id){ stopTimer(); sheet.innerHTML=TOOLS[id](); ov.classList.add('show'); if(INIT[id])INIT[id](); };
  window.closeTool=function(){ stopTimer(); try{speechSynthesis.cancel();}catch(e){} ov.classList.remove('show'); };
  ov.addEventListener('click',e=>{if(e.target===ov)closeTool();});
  const head=(emoji,title,desc)=>`<button class="tool-close" onclick="closeTool()">✕</button><h3>${emoji} ${title}</h3><div class="t-desc">${desc}</div>`;

  const TOOLS={
    /* 1 · Destructor de parálisis por tareas */
    paralisis:()=>head('🧩','Destructor de parálisis',
      'Cuando miras la tarea y no puedes empezar. La partimos en un paso ridículamente pequeño.')+`
      <div class="t-label">¿Qué tarea te tiene atascada?</div>
      <input class="tool-field" id="pa-task" placeholder="Ej: escribir el informe">
      <div class="t-label">El primer paso RIDÍCULO (menos de 1 minuto)</div>
      <input class="tool-field" id="pa-step" placeholder="Ej: abrir el documento y escribir el título">
      <div class="t-label">¿Dónde pones las manos AHORA mismo?</div>
      <input class="tool-field" id="pa-hands" placeholder="Ej: en el teclado / en el boli">
      <div class="t-timer" id="pa-timer" style="display:none">01:00</div>
      <button class="t-btn" id="pa-go">▶ Hacer solo ese paso (1 min)</button>
      <div style="font-size:.76rem;color:#889;margin-top:10px;text-align:center">No tienes que hacer la tarea. Solo ese paso. Solo un minuto.</div>`,

    /* 2 · Menú de dopamina */
    dopamina:()=>head('🍽️','Menú de dopamina',
      'Elige un plato para mantener el cerebro enganchado. Tócalo y empieza.')+`
      <div class="t-label">🥗 Aperitivos · 5 min (movimiento rápido)</div>
      <div id="dm-ap"></div>
      <div class="t-label">🍲 Platos principales · 20 min (trabajo profundo)</div>
      <div id="dm-pr"></div>
      <div class="t-label">🍮 Acompañamientos · 10 min (juego creativo)</div>
      <div id="dm-ac"></div>
      <div id="dm-run" style="display:none;text-align:center;margin-top:10px">
        <div id="dm-name" style="font-weight:700;color:var(--turq)"></div>
        <div class="t-timer" id="dm-timer">05:00</div>
        <button class="t-btn sec" onclick="openTool('dopamina')">Parar</button>
      </div>`,

    /* 3 · Doble de cuerpo */
    doble:()=>head('👥','Doble de cuerpo',
      'Trabajo acompañado. 30 minutos con un aviso cada 10 para mantener el enfoque anclado.')+`
      <div class="t-label">¿En qué vas a trabajar?</div>
      <input class="tool-field" id="db-task" placeholder="Escríbelo para no perderte">
      <div class="t-timer" id="db-timer">30:00</div>
      <button class="t-btn" id="db-go">▶ Empezar sesión acompañada</button>
      <div style="font-size:.76rem;color:#889;margin-top:10px;text-align:center">Cada 10 min te preguntaré cómo vas. Estoy aquí contigo.</div>`,

    /* 4 · Cambio de contexto */
    contexto:()=>head('🔄','Cambio de contexto',
      'Un limpiador de paladar mental de 3 minutos para pasar de una tarea a otra.')+`
      <div class="t-timer" id="cx-timer">01:00</div>
      <div class="t-card" id="cx-step">Pulsa empezar y te guío en 3 pasitos.</div>
      <button class="t-btn" id="cx-go">▶ Empezar transición (3 min)</button>`,

    /* 5 · Convertir en misión */
    interes:()=>{const m=lsGet('cris_mision',null);return head('🎮','Convertir en misión',
      'Gamifica una tarea aburrida conectándola con lo que te fascina ahora.')+`
      <div class="t-label">Tarea aburrida</div>
      <input class="tool-field" id="in-task" placeholder="Ej: ordenar los correos">
      <div class="t-label">Tu hiperfijación / interés de ahora</div>
      <input class="tool-field" id="in-int" placeholder="Ej: una serie, un juego, un tema">
      <div class="t-label">Recompensa al terminar</div>
      <input class="tool-field" id="in-rew" placeholder="Ej: un capítulo, un café rico">
      <button class="t-btn" id="in-go">Crear misión</button>
      <div id="in-card">${m?misionCard(m):''}</div>`;},

    /* 6 · Auditor del tiempo */
    tiempo:()=>head('⏳','Auditor del tiempo',
      'Contra la ceguera del tiempo: suma las subtareas ocultas que siempre olvidamos.')+`
      <div class="t-label">¿Qué proyecto?</div>
      <input class="tool-field" id="ti-proj" placeholder="Ej: preparar la presentación">
      <div class="t-label">Tu estimación optimista (min)</div>
      <input class="tool-field" id="ti-est" type="number" min="1" value="20" oninput="recalcTiempo()">
      <div class="t-label">Subtareas ocultas que solemos olvidar</div>
      <div class="t-mini">🏁 Preparación y arranque <input id="ti-a" type="number" min="0" value="10" style="width:60px;margin-left:auto;border:2px solid var(--lavanda);border-radius:8px;padding:4px" oninput="recalcTiempo()"> min</div>
      <div class="t-mini">🔀 Interrupciones y cambios <input id="ti-b" type="number" min="0" value="15" style="width:60px;margin-left:auto;border:2px solid var(--lavanda);border-radius:8px;padding:4px" oninput="recalcTiempo()"> min</div>
      <div class="t-mini">✅ Revisión y cierre <input id="ti-c" type="number" min="0" value="10" style="width:60px;margin-left:auto;border:2px solid var(--lavanda);border-radius:8px;padding:4px" oninput="recalcTiempo()"> min</div>
      <div class="t-card" style="text-align:center"><div style="font-size:.8rem;color:#667">Tiempo realista</div><div style="font-size:1.8rem;font-weight:800;color:var(--turq)" id="ti-real">55 min</div></div>`,

    /* 7 · Vaciar la mente */
    volcado:()=>head('🧠','Vaciar la mente',
      'Saca todos los bucles abiertos y clasifícalos. Deja de cargarlos en la cabeza.')+`
      <div class="new-task-row" style="margin-bottom:12px"><input class="tool-field" id="vo-in" placeholder="Escribe algo que te ronda..." style="margin-bottom:0" onkeydown="if(event.key==='Enter')addVolcado()"><button class="t-btn" style="width:auto;padding:11px 16px;margin:0" onclick="addVolcado()">+</button></div>
      <div id="vo-list"></div>`
  };

  function misionCard(m){return `<div class="t-card"><div style="font-weight:800;color:var(--turq);margin-bottom:6px">🎯 MISIÓN: ${esc(m.task)}</div>Mientras la haces, conéctala con <strong>${esc(m.int)}</strong>.<br>🏆 Al terminar desbloqueas: <strong>${esc(m.rew)}</strong></div><button class="t-btn" onclick="startMision()">▶ Empezar misión (20 min)</button><div class="t-timer" id="mi-timer" style="display:none">20:00</div>`;}

  const DOPA={ap:[['Estiramientos',5],['Bailar 1 canción',5],['20 saltos',5],['Caminar',5],['Agua fría en la cara',5]],
    pr:[['Trabajo profundo en tu tarea',20],['Estudiar',20],['Escribir',20],['Ordenar un espacio',20]],
    ac:[['Dibujar o garabatear',10],['Puzzle de gemas',10],['Tocar/escuchar música',10],['Escribir libre',10]]};

  const INIT={
    paralisis(){
      document.getElementById('pa-go').onclick=function(){
        const step=gv('pa-step')||'tu primer paso';
        document.getElementById('pa-timer').style.display='block';
        this.textContent='⏳ Solo este paso...';
        speak('Solo este paso: '+step+'. Un minuto. Empieza ahora.');vib(50);
        run(60,'pa-timer',null,()=>{beep(1000,.25);speak('¡Ya está! Has empezado. Eso era lo difícil.');document.getElementById('pa-go').textContent='✓ ¡Empezaste! Otra vez';});
      };
    },
    dopamina(){
      const mk=(arr,cont)=>document.getElementById(cont).innerHTML=arr.map((x,i)=>`<span class="t-chip" data-n="${esc(x[0])}" data-m="${x[1]}">${esc(x[0])}</span>`).join('');
      mk(DOPA.ap,'dm-ap');mk(DOPA.pr,'dm-pr');mk(DOPA.ac,'dm-ac');
      sheet.querySelectorAll('.t-chip').forEach(ch=>ch.onclick=()=>{
        const name=ch.dataset.n,min=+ch.dataset.m;
        document.getElementById('dm-run').style.display='block';
        document.getElementById('dm-name').textContent='▶ '+name;
        speak(name+'. '+min+' minutos. Vamos.');vib(50);
        run(min*60,'dm-timer',null,()=>{speak('¡Tiempo! Bien hecho.');});
        document.getElementById('dm-run').scrollIntoView({behavior:'smooth'});
      });
    },
    doble(){
      document.getElementById('db-go').onclick=function(){
        const task=gv('db-task')||'tu tarea';
        this.textContent='⏳ En marcha — estoy contigo';
        speak('Empezamos con '+task+'. Yo trabajo a tu lado. Te aviso en diez minutos.');vib(50);
        run(1800,'db-timer',(t)=>{ if(t===1200||t===600){beep(700,.15);vib(60);speak('¿Sigues en ello? ¿Cómo vas? Sigue, lo estás haciendo genial.');} },
          ()=>{speak('¡Treinta minutos completos! Lo lograste. Estoy orgulloso de ti.');this.textContent='✓ ¡Sesión completa!';});
      };
    },
    contexto(){
      const steps=[['Levántate y estírate. Suelta los hombros y respira hondo.',60],
        ['Bebe un poco de agua y mira algo lejano unos segundos.',60],
        ['Anota en una palabra qué acabas de terminar y qué empiezas ahora.',60]];
      document.getElementById('cx-go').onclick=function(){
        this.style.display='none';let i=0;
        const doStep=()=>{document.getElementById('cx-step').textContent=(i+1)+'/3 · '+steps[i][0];speak(steps[i][0]);vib(40);
          run(steps[i][1],'cx-timer',null,()=>{i++;if(i<steps.length)doStep();else{document.getElementById('cx-step').textContent='✨ Listo. Ya puedes empezar la nueva tarea con la mente despejada.';speak('Listo. Mente despejada. Ya puedes empezar.');}});};
        doStep();
      };
    },
    interes(){
      document.getElementById('in-go').onclick=()=>{
        const m={task:gv('in-task')||'tu tarea',int:gv('in-int')||'lo que te gusta',rew:gv('in-rew')||'un premio'};
        lsSet('cris_mision',m);
        document.getElementById('in-card').innerHTML=misionCard(m);
        beep(760,.15);vib(40);
      };
    },
    tiempo(){ window.recalcTiempo(); },
    volcado(){ renderVolcado(); }
  };

  window.startMision=function(){
    const m=lsGet('cris_mision',{task:'tu tarea'});
    const el=document.getElementById('mi-timer');if(el)el.style.display='block';
    speak('Misión activada: '+m.task+'. Veinte minutos. Al terminar, tu recompensa.');vib(50);
    run(1200,'mi-timer',null,()=>{speak('¡Misión cumplida! Disfruta tu recompensa, te la has ganado.');beep(1000,.25);});
  };
  window.recalcTiempo=function(){
    const est=+gv('ti-est')||0,a=+gv('ti-a')||0,b=+gv('ti-b')||0,c=+gv('ti-c')||0;
    const el=document.getElementById('ti-real');if(el)el.textContent=(est+a+b+c)+' min';
  };
  window.addVolcado=function(){
    const inp=document.getElementById('vo-in');const v=inp.value.trim();if(!v)return;
    const list=lsGet('cris_volcado',[]);list.push({t:v,cat:null,step:''});lsSet('cris_volcado',list);
    inp.value='';beep(500,.08);renderVolcado();
  };
  window.setVolcadoCat=function(i,cat){
    const list=lsGet('cris_volcado',[]);if(!list[i])return;
    if(cat==='basura'){list.splice(i,1);}else{list[i].cat=cat;}
    lsSet('cris_volcado',list);vib(15);renderVolcado();
  };
  window.setVolcadoStep=function(i,val){const list=lsGet('cris_volcado',[]);if(list[i]){list[i].step=val;lsSet('cris_volcado',list);}};
  function renderVolcado(){
    const cont=document.getElementById('vo-list');if(!cont)return;
    const list=lsGet('cris_volcado',[]);
    if(!list.length){cont.innerHTML='<div style="font-size:.82rem;color:#889;text-align:center;padding:14px">Vacía aquí todo lo que te ronde. Luego lo clasificas.</div>';return;}
    cont.innerHTML=list.map((it,i)=>{
      if(it.cat==='ahora')return `<div class="t-mini" style="flex-wrap:wrap"><span>🔴 <strong>${esc(it.t)}</strong></span><div class="g"><button style="background:#eee" onclick="setVolcadoCat(${i},'luego')">→ Luego</button><button style="background:#fdd" onclick="setVolcadoCat(${i},'basura')">🗑️</button></div><input class="tool-field" style="margin:8px 0 0;font-size:.82rem" placeholder="Siguiente paso en 1 frase..." value="${esc(it.step)}" oninput="setVolcadoStep(${i},this.value)"></div>`;
      if(it.cat==='luego')return `<div class="t-mini"><span>🟡 ${esc(it.t)}</span><div class="g"><button style="background:#d7f5ec;color:var(--turq)" onclick="setVolcadoCat(${i},'ahora')">↑ Ahora</button><button style="background:#fdd" onclick="setVolcadoCat(${i},'basura')">🗑️</button></div></div>`;
      return `<div class="t-mini"><span>${esc(it.t)}</span><div class="g"><button style="background:#d7f5ec;color:var(--turq)" onclick="setVolcadoCat(${i},'ahora')">Ahora</button><button style="background:#eee" onclick="setVolcadoCat(${i},'luego')">Luego</button><button style="background:#fdd" onclick="setVolcadoCat(${i},'basura')">🗑️</button></div></div>`;
    }).join('');
  }
})();
</script>
