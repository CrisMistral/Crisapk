<!DOCTYPE html>
<html lang="es">
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cris - Rutina Diaria</title>
<style>
  :root{
    --turq:#26a69a;
    --turq-light:#4dd0e1;
    --lavanda:#e8e6fb;
    --lavanda-soft:#f3f1ff;
    --bg:#f0f9ff;
    --work:#ff6b6b;
    --break:#4dd0e1;
    --longbreak:#ffd54f;
    --text:#2d3748;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Outfit','Segoe UI',system-ui,sans-serif;}
  body{
    background:linear-gradient(135deg,var(--bg) 0%,var(--lavanda-soft) 100%);
    min-height:100vh;
    padding:16px 16px 100px;
    color:var(--text);
    -webkit-tap-highlight-color:transparent;
  }
  .card{
    max-width:480px;
    margin:0 auto;
    background:#fff;
    border-radius:24px;
    box-shadow:0 8px 24px rgba(38,166,154,0.12);
    padding:20px;
  }
  .header{text-align:center;margin-bottom:18px;}
  .header .quokka{font-size:3rem;animation:bounce 2s ease-in-out infinite;}
  @keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
  .header h1{color:var(--turq);font-size:1.4rem;margin-top:4px;}

  .section{background:var(--lavanda-soft);border-radius:16px;padding:14px;margin-bottom:16px;}
  .section h2{color:var(--turq);font-size:1.05rem;margin-bottom:10px;}

  .pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
  .pill{
    border:2px solid var(--turq);
    color:var(--turq);
    background:#fff;
    border-radius:999px;
    padding:7px 14px;
    font-size:0.8rem;
    font-weight:600;
    cursor:pointer;
    transition:all .15s;
  }
  .pill.active, .pill:active{background:var(--turq);color:#fff;}

  .block-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
  .block-item{
    background:#fff;
    border-radius:12px;
    padding:8px 10px;
    display:flex;
    align-items:center;
    gap:8px;
    font-size:0.85rem;
    border-left:5px solid var(--turq-light);
  }
  .block-item .label{flex:1;}
  .block-item button{
    border:none;background:var(--lavanda);color:var(--text);
    width:30px;height:30px;border-radius:8px;font-size:1rem;cursor:pointer;
  }
  .block-item button:active{background:var(--turq-light);color:#fff;}

  .add-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
  .add-btn{
    flex:1;min-width:90px;border:none;border-radius:999px;padding:10px;
    font-size:0.8rem;font-weight:700;color:#fff;cursor:pointer;
  }
  .add-btn.work{background:var(--work);}
  .add-btn.break{background:var(--turq-light);}
  .add-btn.long{background:var(--longbreak);color:#5d4e37;}

  .summary{
    background:#fff;border-radius:12px;padding:10px;font-size:0.8rem;
    margin-bottom:14px;display:flex;justify-content:space-between;
  }

  .btn-main{
    width:100%;border:none;border-radius:999px;padding:14px;
    font-size:1rem;font-weight:800;color:#fff;background:#4caf50;cursor:pointer;
    box-shadow:0 4px 12px rgba(76,175,80,0.35);
  }
  .btn-main:active{transform:scale(0.98);}

  /* SESSION VIEW */
  .session-title{font-size:1.1rem;font-weight:800;margin-bottom:8px;}
  .timer-display{font-size:3rem;font-weight:800;margin-bottom:10px;letter-spacing:2px;}
  .progress-track{width:100%;height:10px;background:var(--lavanda);border-radius:999px;overflow:hidden;margin-bottom:14px;}
  .progress-fill{height:100%;background:var(--turq);transition:width .3s;}

  .dots-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;}
  .dot{
    width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;
    font-size:1.1rem;border:2px solid var(--lavanda);background:var(--lavanda-soft);
  }
  .dot.done{background:#4caf50;border-color:#4caf50;}
  .dot.current{background:var(--turq);border-color:var(--turq);}

  .session-info{font-size:0.78rem;color:#666;text-align:center;line-height:1.5;margin-bottom:14px;}

  .controls{display:flex;gap:10px;justify-content:center;}
  .controls button{
    border:none;border-radius:999px;padding:12px 18px;font-size:1.1rem;color:#fff;cursor:pointer;
  }
  .controls .pause{background:#ff9800;}
  .controls .skip{background:#90a4ae;}
  .controls .reset{background:var(--work);}

  /* TASKS */
  .task{
    background:#fff;border-radius:12px;padding:10px 12px;
    display:flex;align-items:center;gap:10px;margin-bottom:8px;
    border-left:4px solid transparent;cursor:pointer;font-size:0.9rem;
  }
  .task.done{opacity:.55;text-decoration:line-through;border-left-color:var(--turq-light);}
  .check{
    width:22px;height:22px;border-radius:50%;border:2px solid var(--turq);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:0.8rem;color:#fff;
  }
  .task.done .check{background:var(--turq);}
  .task .del{margin-left:auto;background:none;border:none;font-size:1rem;color:var(--work);cursor:pointer;padding:4px;}

  .new-task-row{display:flex;gap:8px;margin-top:6px;}
  .new-task-row input{
    flex:1;border:2px solid var(--turq);border-radius:12px;padding:10px;font-size:0.9rem;
  }
  .new-task-row button{
    background:var(--turq);color:#fff;border:none;border-radius:12px;
    width:46px;font-size:1.3rem;cursor:pointer;
  }

  /* MODAL */
  .overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.45);
    display:none;align-items:center;justify-content:center;z-index:50;padding:20px;
  }
  .overlay.show{display:flex;}
  .modal{background:#fff;border-radius:20px;padding:20px;width:100%;max-width:340px;}
  .modal h3{color:var(--turq);margin-bottom:14px;}
  .modal .close{float:right;border:none;background:none;font-size:1.3rem;cursor:pointer;}
  .modal input{
    width:100%;border:2px solid var(--turq);border-radius:12px;padding:10px;
    margin-bottom:12px;font-size:0.95rem;
  }
  .modal .confirm{
    width:100%;background:var(--turq);color:#fff;border:none;border-radius:999px;
    padding:12px;font-weight:800;font-size:1rem;cursor:pointer;
  }
  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--turq);color:#fff;padding:12px 20px;border-radius:14px;
    font-size:0.9rem;text-align:center;max-width:320px;box-shadow:0 4px 16px rgba(0,0,0,0.2);
    display:none;z-index:60;
  }
  .toast.show{display:block;}

.calm *,.calm *::before,.calm *::after{animation:none !important;transition:none !important}

/* Herramientas anti-bloqueo */
.tools-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:6px}
.tool-btn{background:#fff;border:2px solid var(--lavanda);border-radius:16px;padding:13px 8px;cursor:pointer;font-family:inherit;text-align:center;font-size:.76rem;font-weight:700;color:var(--turq);display:flex;flex-direction:column;align-items:center;gap:6px;line-height:1.2;transition:transform .1s}
.tool-btn:active{transform:scale(.96);background:var(--lavanda-soft)}
.tool-btn .te{font-size:1.6rem}
.tool-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;z-index:70}
.tool-ov.show{display:flex}
.tool-sheet{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding:20px 18px 96px;animation:sheetup .25s ease}
@keyframes sheetup{from{transform:translateY(40px);opacity:.4}to{transform:translateY(0);opacity:1}}
.tool-sheet h3{color:var(--turq);font-size:1.2rem;margin-bottom:4px}
.tool-sheet .t-desc{font-size:.82rem;color:#667;margin-bottom:14px;line-height:1.45}
.tool-field{width:100%;border:2px solid var(--lavanda);border-radius:12px;padding:11px;font-family:inherit;font-size:16px;margin-bottom:10px;color:var(--text)}
.tool-field:focus{outline:none;border-color:var(--turq)}
textarea.tool-field{min-height:74px;resize:vertical}
.tool-close{float:right;border:none;background:none;font-size:1.4rem;cursor:pointer;color:#aaa;line-height:1}
.t-label{font-size:.78rem;font-weight:700;color:var(--turq);margin:8px 0 5px}
.t-btn{border:none;border-radius:12px;padding:12px;font-family:inherit;font-size:.92rem;font-weight:700;cursor:pointer;width:100%;color:#fff;background:var(--turq);margin-top:4px}
.t-btn.sec{background:var(--lavanda);color:var(--turq)}
.t-chip{display:inline-block;border:2px solid var(--lavanda);background:#fff;color:var(--turq);border-radius:999px;padding:8px 14px;font-size:.82rem;font-weight:600;cursor:pointer;margin:0 6px 6px 0}
.t-chip:active{background:var(--turq);color:#fff}
.t-timer{font-size:3rem;font-weight:800;color:var(--turq);text-align:center;font-variant-numeric:tabular-nums;margin:6px 0}
.t-card{background:var(--lavanda-soft);border-radius:14px;padding:14px;font-size:.9rem;line-height:1.5;margin:10px 0;color:var(--text)}
.t-mini{background:var(--lavanda-soft);border-radius:12px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:8px;font-size:.85rem}
.t-mini .g{display:flex;gap:5px;margin-left:auto}
.t-mini .g button{border:none;border-radius:8px;padding:5px 9px;font-size:.72rem;font-weight:700;cursor:pointer}

/* Trabajo: empezar + triaje por momento */
.work-start{width:100%;border:none;border-radius:16px;padding:16px;font-family:inherit;font-size:1.05rem;font-weight:800;color:#fff;background:linear-gradient(135deg,#26a69a,#4dd0e1);box-shadow:0 4px 14px rgba(38,166,154,.3);cursor:pointer;margin-bottom:10px}
.work-start:active{transform:scale(.98)}
.work-triage{width:100%;border:2px solid var(--turq);border-radius:16px;padding:14px;font-family:inherit;font-size:.98rem;font-weight:700;color:var(--turq);background:#fff;cursor:pointer;margin-bottom:18px}
.work-triage:active{transform:scale(.98);background:var(--lavanda-soft)}
.wgroup{margin-bottom:14px}
.wg-label{font-size:.82rem;font-weight:800;color:var(--turq);margin:0 2px 8px}
.wrow{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:#fff;border:2px solid var(--lavanda);border-radius:14px;padding:12px 14px;margin-bottom:8px;cursor:pointer;font-family:inherit;transition:transform .1s,background .1s}
.wrow:active{transform:scale(.99);background:var(--lavanda-soft)}
.wrow .we{font-size:1.5rem;flex-shrink:0}
.wrow .wi{display:flex;flex-direction:column;gap:1px}
.wrow .wi b{font-size:.9rem;color:var(--turq);font-weight:700}
.wrow .wi i{font-size:.75rem;color:#778;font-style:normal;line-height:1.3}

/* Anillo de tiempo: se vacía según pasa — para ver cuánto queda sin leer números */
.tring{width:176px;height:176px;border-radius:50%;margin:4px auto 10px;display:flex;align-items:center;justify-content:center;background:conic-gradient(#26a69a 360deg,#cde9e4 0);flex-shrink:0;}
.tring-in{width:144px;height:144px;border-radius:50%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px;text-align:center;}
.tring .timer-display{font-size:2.3rem;margin-bottom:0;letter-spacing:1px}

/* Quico con manitas (mascota) */
.quico-mascot{position:relative;display:inline-block;filter:drop-shadow(0 3px 8px rgba(93,64,55,.18));}
.quico-mascot .qm-head{display:block;margin:0;filter:none;}
.qm-paws{position:absolute;left:50%;bottom:-6px;transform:translateX(-50%);width:64%;line-height:0;}
.qm-paws svg{display:block;width:100%;}
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="quokka"><img src="../quico/quico_happy.png" alt="Quico" style="width:104px;height:auto;object-fit:contain;display:block;margin:0 auto 6px;filter:drop-shadow(0 4px 10px rgba(93,64,55,.18))"></div>
    <h1 data-i18n="h1">Trabajo</h1>
  </div>

  <button class="work-start" onclick="openTool('foco')" data-i18n="ws">▶ Empezar a trabajar</button>
  <button class="work-triage" onclick="openTool('triaje')" data-i18n="wt">🤔 No sé qué me pasa</button>

  <div class="section">
    <div style="font-size:0.78rem;opacity:.75;margin-bottom:12px;text-align:center;" data-i18n="sec_hint">…o si ya sabes qué necesitas, elígelo directo:</div>

    <div class="wgroup">
      <div class="wg-label" data-i18n="g1">🏁 No puedo empezar</div>
      <button class="wrow" onclick="openTool('paralisis')"><span class="we">🧩</span><span class="wi"><b data-i18n="w_par_t">Destructor de parálisis</b><i data-i18n="w_par_s">miras la tarea y no arrancas</i></span></button>
      <button class="wrow" onclick="openTool('interes')"><span class="we">🎮</span><span class="wi"><b data-i18n="w_int_t">Convertir en misión</b><i data-i18n="w_int_s">gamifica una tarea aburrida con algo que te gusta</i></span></button>
    </div>

    <div class="wgroup">
      <div class="wg-label" data-i18n="g2">🎯 Quiero mantener el foco</div>
      <button class="wrow" onclick="openTool('doble')"><span class="we">👥</span><span class="wi"><b data-i18n="w_dob_t">Doble de cuerpo</b><i data-i18n="w_dob_s">trabajo acompañado, con avisos cada 10 min</i></span></button>
      <button class="wrow" onclick="openTool('dopamina')"><span class="we">🍽️</span><span class="wi"><b data-i18n="w_dop_t">Menú de dopamina</b><i data-i18n="w_dop_s">elige un plato y mantén el cerebro enganchado</i></span></button>
    </div>

    <div class="wgroup">
      <div class="wg-label" data-i18n="g3">🧠 Tengo la cabeza llena</div>
      <button class="wrow" onclick="openTool('volcado')"><span class="we">🧠</span><span class="wi"><b data-i18n="w_vol_t">Vaciar la mente</b><i data-i18n="w_vol_s">suelta los bucles abiertos y clasifícalos</i></span></button>
    </div>

    <div class="wgroup" style="margin-bottom:0">
      <div class="wg-label" data-i18n="g4">🔄 Cambiar de tarea o planificar</div>
      <button class="wrow" onclick="openTool('contexto')"><span class="we">🔄</span><span class="wi"><b data-i18n="w_ctx_t">Cambio de contexto</b><i data-i18n="w_ctx_s">3 min para pasar de una tarea a otra</i></span></button>
      <button class="wrow" onclick="openTool('tiempo')" style="margin-bottom:0"><span class="we">⏳</span><span class="wi"><b data-i18n="w_tim_t">Auditor del tiempo</b><i data-i18n="w_tim_s">estima cuánto tardarás de verdad</i></span></button>
    </div>
  </div>
</div>

<!-- OVERLAY HERRAMIENTAS -->
<div class="tool-ov" id="toolOv">
  <div class="tool-sheet" id="toolSheet"></div>
</div>

<div class="toast" id="toast"></div>

function crisLang(){const l=localStorage.getItem('cris_lang');return UI[l]?l:'es';}
function t(k,vars){let s=UI[crisLang()][k];if(s===undefined)s=UI.es[k];if(s===undefined)return k;if(vars)Object.keys(vars).forEach(x=>{s=s.split('{'+x+'}').join(vars[x]);});return s;}
const VOICE_LANG={es:'es-ES',en:'en-US',fr:'fr-FR'};
function applyStaticI18n(){document.documentElement.lang=crisLang();document.querySelectorAll('[data-i18n]').forEach(el=>{el.innerHTML=t(el.getAttribute('data-i18n'));});}

/* ═══ HERRAMIENTAS ANTI-BLOQUEO ═══ */
(function(){
  const ov=document.getElementById('toolOv'), sheet=document.getElementById('toolSheet');
  let tTimer=null, _u=null;

  function allow(k){try{const c=JSON.parse(localStorage.getItem('cris_cfg')||'{}');return c[k]!==false&&c.calm!==true;}catch(e){return true;}}
  function speak(t){if(!allow('voice'))return;try{if(!window.speechSynthesis)return;speechSynthesis.cancel();if(speechSynthesis.paused)speechSynthesis.resume();_u=new SpeechSynthesisUtterance(t);_u.lang=VOICE_LANG[crisLang()];_u.rate=.92;const v=speechSynthesis.getVoices().find(v=>v.lang.startsWith(crisLang()));if(v)_u.voice=v;speechSynthesis.speak(_u);}catch(e){}}
  let __beepCtx=null;function __getCtx(){try{if(!__beepCtx)__beepCtx=new(window.AudioContext||window.webkitAudioContext)();if(__beepCtx.state==='suspended')__beepCtx.resume();return __beepCtx;}catch(e){return null;}}
  function beep(f=660,d=.15){if(!allow('sound'))return;try{const c=__getCtx();if(!c)return;const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.setValueAtTime(.2,c.currentTime);g.gain.exponentialRampToValueAtTime(.01,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
  function vib(m){if(!allow('vib'))return;try{navigator.vibrate(m);}catch(e){}}
  function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
  function stopTimer(){if(tTimer){clearInterval(tTimer);tTimer=null;}}
  function __ring(id,frac){const r=document.getElementById(id);if(r)r.style.background='conic-gradient(#26a69a '+(Math.max(0,Math.min(1,frac))*360)+'deg,#cde9e4 0)';}
  // Alarma inconfundible al terminar un temporizador: 3 tonos + vibración larga.
  function alarm(){
    beep(760,.22);
    setTimeout(()=>beep(980,.22),260);
    setTimeout(()=>beep(1240,.42),520);
    vib([160,90,160,90,320]);
  }
  function run(secs,tickEl,onCheck,onEnd){
    stopTimer();let t=secs;const el=document.getElementById(tickEl);
    // Anillo visual opcional por convención: «fo-timer» busca «fo-ring».
    const ringId=tickEl.replace('timer','ring');
    if(el)el.textContent=fmt(t);
    __ring(ringId,1);
    // Aviso 5s antes de acabar: dos pitidos cortos para no pillar por sorpresa.
    tTimer=setInterval(()=>{t--;if(el)el.textContent=fmt(t);__ring(ringId,secs?t/secs:0);if(t===5)beep(700,.1);if(onCheck)onCheck(t,secs);if(t<=0){stopTimer();alarm();onEnd&&onEnd();}},1000);
  }
  const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const gv=id=>{const e=document.getElementById(id);return e?e.value.trim():'';};
  function lsGet(k,d){try{return JSON.parse(localStorage.getItem(k))??d;}catch(e){return d;}}
  function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

  window.openTool=function(id){ stopTimer(); sheet.innerHTML=TOOLS[id](); ov.classList.add('show'); if(INIT[id])INIT[id](); };
  window.closeTool=function(){ stopTimer(); try{speechSynthesis.cancel();}catch(e){} ov.classList.remove('show'); };
  ov.addEventListener('click',e=>{if(e.target===ov)closeTool();});
  const head=(emoji,title,desc)=>`<button class="tool-close" onclick="closeTool()">✕</button><h3>${emoji} ${title}</h3><div class="t-desc">${desc}</div>`;

  const TOOLS={
    /* Triaje · No sé qué me pasa → pregunta y te lleva a la técnica */
    triaje:()=>head('🤔',t('tri_t'),t('tri_d'))+`
      <div class="t-label">${t('tri_q')}</div>
      <button class="wrow" onclick="triagePick('A')"><span class="we">🧊</span><span class="wi"><b>${t('tri_A_t')}</b><i>${t('tri_A_s')}</i></span></button>
      <button class="wrow" onclick="triagePick('B')"><span class="we">🌪️</span><span class="wi"><b>${t('tri_B_t')}</b><i>${t('tri_B_s')}</i></span></button>
      <button class="wrow" onclick="triagePick('C')"><span class="we">🥱</span><span class="wi"><b>${t('tri_C_t')}</b><i>${t('tri_C_s')}</i></span></button>
      <button class="wrow" onclick="triagePick('D')"><span class="we">🔀</span><span class="wi"><b>${t('tri_D_t')}</b><i>${t('tri_D_s')}</i></span></button>
      <button class="wrow" onclick="triagePick('E')" style="margin-bottom:0"><span class="we">🙂</span><span class="wi"><b>${t('tri_E_t')}</b><i>${t('tri_E_s')}</i></span></button>`,

    /* 0 · Empezar a trabajar (sesión de foco) */
    foco:()=>head('▶️',t('foco_t'),t('foco_d'))+`
      <div style="text-align:center">
        <div id="fo-pick">
          <div class="t-label" style="text-align:center">${t('foco_q')}</div>
          <div><span class="t-chip" data-m="15">15 min</span><span class="t-chip" data-m="25">25 min</span><span class="t-chip" data-m="45">45 min</span></div>
        </div>
        <div id="fo-run" style="display:none">
          <div class="tring" id="fo-ring"><div class="tring-in"><div class="t-timer" id="fo-timer" style="margin:0;font-size:2.2rem">25:00</div></div></div>
          <div style="font-size:.78rem;color:#889;margin-bottom:8px">${t('foco_run')}</div>
          <button class="t-btn sec" onclick="openTool('foco')">${t('foco_stop')}</button>
        </div>
      </div>`,

    /* 1 · Destructor de parálisis por tareas */
    paralisis:()=>head('🧩',t('par_t'),t('par_d'))+`
      <div class="t-label">${t('par_l1')}</div>
      <input class="tool-field" id="pa-task" placeholder="${t('par_p1')}">
      <div class="t-label">${t('par_l2')}</div>
      <input class="tool-field" id="pa-step" placeholder="${t('par_p2')}">
      <div class="t-label">${t('par_l3')}</div>
      <input class="tool-field" id="pa-hands" placeholder="${t('par_p3')}">
      <div class="t-timer" id="pa-timer" style="display:none">01:00</div>
      <button class="t-btn" id="pa-go">${t('par_go')}</button>
      <div style="font-size:.76rem;color:#889;margin-top:10px;text-align:center">No tienes que hacer la tarea. Solo ese paso. Solo un minuto.</div>`,

    /* 2 · Menú de dopamina */
    dopamina:()=>head('🍽️',t('dop_t'),t('dop_d'))+`
      <div class="t-label">${t('dop_l1')}</div>
      <div id="dm-ap"></div>
      <div class="t-label">${t('dop_l2')}</div>
      <div id="dm-pr"></div>
      <div class="t-label">${t('dop_l3')}</div>
      <div id="dm-ac"></div>
      <div id="dm-run" style="display:none;text-align:center;margin-top:10px">
        <div id="dm-name" style="font-weight:700;color:var(--turq)"></div>
        <div class="t-timer" id="dm-timer">05:00</div>
        <button class="t-btn sec" onclick="openTool('dopamina')">Parar</button>
      </div>`,

    /* 3 · Doble de cuerpo */
    doble:()=>head('👥',t('dob_t'),t('dob_d'))+`
      <div class="t-label">${t('dob_l')}</div>
      <input class="tool-field" id="db-task" placeholder="${t('dob_p')}">
      <div class="t-timer" id="db-timer">30:00</div>
      <button class="t-btn" id="db-go">${t('dob_go')}</button>
      <div style="font-size:.76rem;color:#889;margin-top:10px;text-align:center">Cada 10 min te preguntaré cómo vas. Estoy aquí contigo.</div>`,

    /* 4 · Cambio de contexto */
    contexto:()=>head('🔄',t('ctx_t'),t('ctx_d'))+`
      <div class="t-timer" id="cx-timer">01:00</div>
      <div class="t-card" id="cx-step">Pulsa empezar y te guío en 3 pasitos.</div>
      <button class="t-btn" id="cx-go">${t('ctx_go')}</button>`,

    /* 5 · Convertir en misión */
    interes:()=>{const m=lsGet('cris_mision',null);return head('🎮',t('int_t'),t('int_d'))+`
      <div class="t-label">${t('int_l1')}</div>
      <input class="tool-field" id="in-task" placeholder="${t('int_p1')}">
      <div class="t-label">${t('int_l2')}</div>
      <input class="tool-field" id="in-int" placeholder="${t('int_p2')}">
      <div class="t-label">${t('int_l3')}</div>
      <input class="tool-field" id="in-rew" placeholder="${t('int_p3')}">
      <button class="t-btn" id="in-go">${t('int_go')}</button>
      <div id="in-card">${m?misionCard(m):''}</div>`;},

    /* 6 · Auditor del tiempo */
    tiempo:()=>head('⏳',t('tim_t'),t('tim_d'))+`
      <div class="t-label">${t('tim_l1')}</div>
      <input class="tool-field" id="ti-proj" placeholder="${t('tim_p1')}">
      <div class="t-label">${t('tim_l2')}</div>
      <input class="tool-field" id="ti-est" type="number" min="1" value="20" oninput="recalcTiempo()">
      <div class="t-label">${t('tim_l3')}</div>
      <div class="t-mini">${t('tim_a')} <input id="ti-a" type="number" min="0" value="10" style="width:60px;margin-left:auto;border:2px solid var(--lavanda);border-radius:8px;padding:4px" oninput="recalcTiempo()"> min</div>
      <div class="t-mini">${t('tim_b')} <input id="ti-b" type="number" min="0" value="15" style="width:60px;margin-left:auto;border:2px solid var(--lavanda);border-radius:8px;padding:4px" oninput="recalcTiempo()"> min</div>
      <div class="t-mini">${t('tim_c')} <input id="ti-c" type="number" min="0" value="10" style="width:60px;margin-left:auto;border:2px solid var(--lavanda);border-radius:8px;padding:4px" oninput="recalcTiempo()"> min</div>
      <div class="t-card" style="text-align:center"><div style="font-size:.8rem;color:#667">${t('tim_real')}</div><div style="font-size:1.8rem;font-weight:800;color:var(--turq)" id="ti-real">55 min</div></div>`,

    /* 7 · Vaciar la mente */
    volcado:()=>head('🧠',t('vol_t'),t('vol_d'))+`
      <div class="new-task-row" style="margin-bottom:12px"><input class="tool-field" id="vo-in" placeholder="${t('vol_p')}" style="margin-bottom:0" onkeydown="if(event.key==='Enter')addVolcado()"><button class="t-btn" style="width:auto;padding:11px 16px;margin:0" onclick="addVolcado()">+</button></div>
      <div id="vo-list"></div>`
  };

  function misionCard(m){return `<div class="t-card"><div style="font-weight:800;color:var(--turq);margin-bottom:6px">${t('mis_label')} ${esc(m.task)}</div>${t('mis_mid')} <strong>${esc(m.int)}</strong>.<br>${t('mis_unlock')} <strong>${esc(m.rew)}</strong></div><button class="t-btn" onclick="startMision()">${t('mis_go')}</button><div class="t-timer" id="mi-timer" style="display:none">20:00</div>`;}

  const DOPA={ap:[['Estiramientos',5],['Bailar 1 canción',5],['20 saltos',5],['Caminar',5],['Agua fría en la cara',5]],
    pr:[['Trabajo profundo en tu tarea',20],['Estudiar',20],['Escribir',20],['Ordenar un espacio',20]],
    ac:[['Dibujar o garabatear',10],['Puzzle de gemas',10],['Tocar/escuchar música',10],['Escribir libre',10]]};

  const INIT={
    foco(){
      sheet.querySelectorAll('#fo-pick .t-chip').forEach(ch=>ch.onclick=()=>{
        const min=+ch.dataset.m;
        document.getElementById('fo-pick').style.display='none';
        document.getElementById('fo-run').style.display='block';
        speak(t('v_foco',{m:min}));vib(50);
        run(min*60,'fo-timer',(t,tot)=>{ if(min>=25&&t===Math.floor(tot/2)){beep(700,.12);vib(50);speak(t('v_foco_half'));} },
          ()=>{try{var _n=new Date();localStorage.setItem('cris_trabajo_v1_'+_n.getFullYear()+'-'+String(_n.getMonth()+1).padStart(2,'0')+'-'+String(_n.getDate()).padStart(2,'0'),'1');}catch(e){}speak(t('v_foco_end'));});
      });
    },
    paralisis(){
      document.getElementById('pa-go').onclick=function(){
        const step=gv('pa-step')||'tu primer paso';
        document.getElementById('pa-timer').style.display='block';
        this.textContent=t('par_going');
        speak(t('v_par',{s:step}));vib(50);
        run(60,'pa-timer',null,()=>{speak(t('v_par_end'));document.getElementById('pa-go').textContent=t('par_done');});
      };
    },
    dopamina(){
      const mk=(names,durs,cont)=>document.getElementById(cont).innerHTML=names.map((nm,i)=>`<span class="t-chip" data-n="${esc(nm)}" data-m="${durs[i][1]}">${esc(nm)}</span>`).join('');
      mk(t('dop_ap'),DOPA.ap,'dm-ap');mk(t('dop_pr'),DOPA.pr,'dm-pr');mk(t('dop_ac'),DOPA.ac,'dm-ac');
      sheet.querySelectorAll('.t-chip').forEach(ch=>ch.onclick=()=>{
        const name=ch.dataset.n,min=+ch.dataset.m;
        document.getElementById('dm-run').style.display='block';
        document.getElementById('dm-name').textContent='▶ '+name;
        speak(t('v_dop',{n:name,m:min}));vib(50);
        run(min*60,'dm-timer',null,()=>{speak(t('v_dop_end'));});
        document.getElementById('dm-run').scrollIntoView({behavior:'smooth'});
      });
    },
    doble(){
      document.getElementById('db-go').onclick=function(){
        const task=gv('db-task')||'tu tarea';
        this.textContent=t('dob_going');
        speak(t('v_dob',{t:task}));vib(50);
        run(1800,'db-timer',(t)=>{ if(t===1200||t===600){beep(700,.15);vib(60);speak(t('v_dob_mid'));} },
          ()=>{speak(t('v_dob_end'));this.textContent=t('dob_done');});
      };
    },
    contexto(){
      const steps=[[t('ctx_s1'),60],[t('ctx_s2'),60],[t('ctx_s3'),60]];
      document.getElementById('cx-go').onclick=function(){
        this.style.display='none';let i=0;
        const doStep=()=>{document.getElementById('cx-step').textContent=(i+1)+'/3 · '+steps[i][0];speak(steps[i][0]);vib(40);
          run(steps[i][1],'cx-timer',null,()=>{i++;if(i<steps.length)doStep();else{document.getElementById('cx-step').textContent=t('ctx_end');speak(t('v_ctx_end'));}});};
        doStep();
      };
    },
    interes(){
      document.getElementById('in-go').onclick=()=>{
        const m={task:gv('in-task')||'tu tarea',int:gv('in-int')||'lo que te gusta',rew:gv('in-rew')||'un premio'};
        lsSet('cris_mision',m);
        document.getElementById('in-card').innerHTML=misionCard(m);
        beep(760,.15);vib(40);
      };
    },
    tiempo(){ window.recalcTiempo(); },
    volcado(){ renderVolcado(); }
  };

  window.triagePick=function(code){
    const back=`<button class="t-btn sec" style="margin-top:12px" onclick="openTool('triaje')">← Volver a las preguntas</button>`;
    if(code==='A'){
      sheet.innerHTML=head('🧊','No consigo empezar','¿Qué te frena más?')+`
        <button class="wrow" onclick="openTool('paralisis')"><span class="we">🐘</span><span class="wi"><b>Es enorme y no sé por dónde</b><i>la partimos en un paso de 1 minuto</i></span></button>
        <button class="wrow" onclick="openTool('interes')" style="margin-bottom:0"><span class="we">😑</span><span class="wi"><b>Es aburrida y no me apetece</b><i>la convertimos en misión</i></span></button>`+back;
    }else if(code==='B'){
      openTool('volcado');
    }else if(code==='C'){
      sheet.innerHTML=head('🥱','Sin chispa','¿Qué te apetece más?')+`
        <button class="wrow" onclick="openTool('interes')"><span class="we">🎮</span><span class="wi"><b>Convertirlo en un juego</b><i>con algo que te gusta</i></span></button>
        <button class="wrow" onclick="openTool('dopamina')"><span class="we">🍽️</span><span class="wi"><b>Elegir algo con chispa</b><i>del menú de dopamina</i></span></button>
        <button class="wrow" onclick="openTool('doble')" style="margin-bottom:0"><span class="we">👥</span><span class="wi"><b>Que alguien trabaje a tu lado</b><i>doble de cuerpo</i></span></button>`+back;
    }else if(code==='D'){
      sheet.innerHTML=head('🔀','En transición','¿Qué necesitas?')+`
        <button class="wrow" onclick="openTool('contexto')"><span class="we">🔄</span><span class="wi"><b>Limpiar la cabeza para cambiar</b><i>3 minutos de transición</i></span></button>
        <button class="wrow" onclick="openTool('tiempo')" style="margin-bottom:0"><span class="we">⏳</span><span class="wi"><b>Saber cuánto me va a llevar</b><i>auditor del tiempo</i></span></button>`+back;
    }else if(code==='E'){
      openTool('foco');
    }
  };

  window.startMision=function(){
    const m=lsGet('cris_mision',{task:'tu tarea'});
    const el=document.getElementById('mi-timer');if(el)el.style.display='block';
    speak(t('v_mis',{t:m.task}));vib(50);
    run(1200,'mi-timer',null,()=>{speak(t('v_mis_end'));});
  };
  window.recalcTiempo=function(){
    const est=+gv('ti-est')||0,a=+gv('ti-a')||0,b=+gv('ti-b')||0,c=+gv('ti-c')||0;
    const el=document.getElementById('ti-real');if(el)el.textContent=(est+a+b+c)+' min';
  };
  window.addVolcado=function(){
    const inp=document.getElementById('vo-in');const v=inp.value.trim();if(!v)return;
    const list=lsGet('cris_volcado',[]);list.push({t:v,cat:null,step:''});lsSet('cris_volcado',list);
    inp.value='';beep(500,.08);renderVolcado();
  };
  window.setVolcadoCat=function(i,cat){
    const list=lsGet('cris_volcado',[]);if(!list[i])return;
    if(cat==='basura'){list.splice(i,1);}else{list[i].cat=cat;}
    lsSet('cris_volcado',list);vib(15);renderVolcado();
  };
  window.setVolcadoStep=function(i,val){const list=lsGet('cris_volcado',[]);if(list[i]){list[i].step=val;lsSet('cris_volcado',list);}};
  function renderVolcado(){
    const cont=document.getElementById('vo-list');if(!cont)return;
    const list=lsGet('cris_volcado',[]);
    if(!list.length){cont.innerHTML='<div style="font-size:.82rem;color:#889;text-align:center;padding:14px">'+t('vol_empty')+'</div>';return;}
    cont.innerHTML=list.map((it,i)=>{
      if(it.cat==='ahora')return `<div class="t-mini" style="flex-wrap:wrap"><span>🔴 <strong>${esc(it.t)}</strong></span><div class="g"><button style="background:#eee" onclick="setVolcadoCat(${i},'luego')">${t('vol_to_later')}</button><button style="background:#fdd" onclick="setVolcadoCat(${i},'basura')">🗑️</button></div><input class="tool-field" style="margin:8px 0 0" placeholder="${t('vol_step_p')}" value="${esc(it.step)}" oninput="setVolcadoStep(${i},this.value)"></div>`;
      if(it.cat==='luego')return `<div class="t-mini"><span>🟡 ${esc(it.t)}</span><div class="g"><button style="background:#d7f5ec;color:var(--turq)" onclick="setVolcadoCat(${i},'ahora')">${t('vol_up')}</button><button style="background:#fdd" onclick="setVolcadoCat(${i},'basura')">🗑️</button></div></div>`;
      return `<div class="t-mini"><span>${esc(it.t)}</span><div class="g"><button style="background:#d7f5ec;color:var(--turq)" onclick="setVolcadoCat(${i},'ahora')">${t('vol_now')}</button><button style="background:#eee" onclick="setVolcadoCat(${i},'luego')">${t('vol_later')}</button><button style="background:#fdd" onclick="setVolcadoCat(${i},'basura')">🗑️</button></div></div>`;
    }).join('');
  }
})();
/* Botón atrás del móvil: si hay una herramienta abierta, se cierra */
/* Atrás del móvil: el padre llama __crisBack() (síncrono); true = retrocedió */
window.__crisBack=function(){
  var ov=document.querySelector('.tool-ov.show, .overlay.show');
  if(ov&&window.closeTool){closeTool();return true;}
  return false;
};
/* Puente para versiones mezcladas: si el index viejo aún manda postMessage */
window.addEventListener('message',function(e){
  if(e&&e.data==='cris:back'&&window.__crisBack&&window.__crisBack()){
    try{parent.postMessage('cris:back-ok','*');}catch(_){}
  }
});
applyStaticI18n();
</script>
</body>
</html>
