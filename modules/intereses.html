<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Intereses — Cris</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--teal:#26a69a;--td:#1a6b64;--mint:#d6f0eb;--mm:#b8e4dd;--ms:#e8f8f5;--fg:#1a2e2b;--fg2:#2d6b64;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Outfit',sans-serif;background:var(--ms);min-height:100vh;color:var(--fg);}
.screen{display:none;flex-direction:column;min-height:100vh;padding:16px 16px 100px;max-width:460px;margin:0 auto;}
.screen.active{display:flex;}

.hdr{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-top:4px;}
.hdr-back{width:42px;height:42px;border:none;background:white;border-radius:13px;font-size:1.3rem;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hdr-title{font-size:1.25rem;font-weight:800;color:var(--td);}

.motiv{background:var(--mint);border-radius:14px;padding:12px 16px;font-size:0.88rem;color:var(--td);font-weight:600;text-align:center;line-height:1.45;margin-bottom:16px;}

/* Today hint */
.today-hint{color:white;border-radius:18px;padding:16px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px;cursor:pointer;border:none;width:100%;text-align:left;font-family:'Outfit',sans-serif;}
.today-hint:active{transform:scale(.99);}
.th-tag{font-size:0.72rem;font-weight:700;opacity:.85;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
.th-name{font-size:1.1rem;font-weight:800;}
.th-sub{font-size:0.82rem;opacity:.88;margin-top:3px;}
.th-em{font-size:2.6rem;margin-left:auto;flex-shrink:0;}

.sec-label{font-size:0.78rem;font-weight:700;color:var(--fg2);text-transform:uppercase;letter-spacing:.07em;margin:4px 0 10px;}

/* Interest grid */
.int-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.int-card{background:white;border:none;border-radius:18px;padding:16px 12px;text-align:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.06);font-family:'Outfit',sans-serif;}
.int-card:active{transform:scale(.97);}
.ic-em{font-size:2.1rem;display:block;margin-bottom:6px;}
.ic-name{font-size:0.92rem;font-weight:700;color:var(--td);}
.ic-dots{display:flex;gap:4px;justify-content:center;margin-top:8px;}
.ic-dot{width:8px;height:8px;border-radius:50%;background:var(--mm);}
.ic-dot.done{background:var(--teal);}

/* Streak */
.streak-box{background:white;border-radius:16px;padding:13px 16px;display:flex;align-items:center;gap:12px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.streak-fire{font-size:1.8rem;}
.streak-txt{font-size:0.86rem;font-weight:600;color:var(--fg2);line-height:1.35;}
.streak-txt strong{color:var(--td);font-size:1rem;}

/* Day list */
.day-row{background:white;border:none;border-radius:16px;padding:14px;margin-bottom:9px;cursor:pointer;width:100%;text-align:left;box-shadow:0 2px 8px rgba(0,0,0,.05);display:flex;align-items:center;gap:12px;font-family:'Outfit',sans-serif;}
.day-row:active{transform:scale(.99);}
.dr-num{width:36px;height:36px;border-radius:50%;background:var(--mm);display:flex;align-items:center;justify-content:center;font-size:0.9rem;font-weight:800;color:var(--td);flex-shrink:0;}
.day-row.done .dr-num{background:var(--teal);color:white;}
.dr-info{flex:1;min-width:0;}
.dr-title{font-size:0.92rem;font-weight:700;color:var(--td);}
.day-row.done .dr-title{text-decoration:line-through;opacity:.55;}
.dr-goal{font-size:0.76rem;color:var(--fg2);margin-top:2px;}
.dr-arrow{color:var(--fg2);font-size:1.2rem;}

/* Activity */
.act-hero{border-radius:20px;padding:22px 20px;color:white;margin-bottom:14px;text-align:center;}
.ah-em{font-size:3rem;display:block;margin-bottom:6px;}
.ah-day{font-size:0.75rem;font-weight:700;opacity:.85;text-transform:uppercase;letter-spacing:.06em;}
.ah-title{font-size:1.25rem;font-weight:800;margin-top:4px;line-height:1.25;}
.act-card{background:white;border-radius:18px;padding:18px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.05);font-size:0.92rem;line-height:1.6;color:var(--fg);}
.goal-pill{background:#fef3c7;color:#92400e;border-radius:14px;padding:12px 16px;font-size:0.88rem;font-weight:700;margin-bottom:12px;display:flex;gap:8px;align-items:flex-start;}
.deep-btn{width:100%;border:2px solid var(--mm);background:white;border-radius:14px;padding:12px;font-family:'Outfit',sans-serif;font-size:0.85rem;font-weight:700;color:var(--td);cursor:pointer;margin-bottom:12px;}
.deep-box{background:var(--mint);border-radius:14px;padding:14px 16px;font-size:0.85rem;line-height:1.55;color:var(--td);margin-bottom:12px;display:none;}
.deep-box.open{display:block;}

/* Timer */
.timer-zone{text-align:center;padding:8px 0 4px;}
.timer-dig{font-size:3.8rem;font-weight:800;color:var(--td);line-height:1;font-variant-numeric:tabular-nums;}
.timer-lbl{font-size:0.78rem;color:var(--fg2);margin-top:4px;margin-bottom:12px;}
.pbar-outer{height:8px;background:var(--mm);border-radius:4px;margin-bottom:14px;overflow:hidden;}
.pbar-inner{height:100%;background:var(--teal);border-radius:4px;transition:width 1s linear;}

.btn-f{display:block;width:100%;border:none;border-radius:14px;padding:16px;font-family:'Outfit',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;margin-bottom:9px;}
.btn-f:active{transform:scale(.98);}
.btn-teal{background:var(--teal);color:white;}
.btn-soft{background:var(--mm);color:var(--td);}
.btn-white{background:white;color:var(--td);box-shadow:0 2px 8px rgba(0,0,0,.06);}
.btn-f:disabled{opacity:.4;pointer-events:none;}

/* Note */
.note-area{width:100%;border:2px solid var(--mm);border-radius:14px;padding:12px;font-family:'Outfit',sans-serif;font-size:16px;color:var(--fg);background:white;resize:vertical;min-height:64px;margin-bottom:12px;}
.note-area:focus{outline:none;border-color:var(--teal);}

/* Done */
.done-hero{text-align:center;padding:30px 0 16px;}
.done-em{font-size:4.5rem;display:block;margin-bottom:10px;}
.done-t{font-size:1.7rem;font-weight:800;color:var(--td);margin-bottom:6px;}
.done-s{font-size:0.95rem;color:var(--fg2);line-height:1.5;}

.calm *,.calm *::before,.calm *::after{animation:none !important;transition:none !important}

/* Anillo de tiempo: se vacía según pasa — para ver cuánto queda sin leer números */
.tring{width:176px;height:176px;border-radius:50%;margin:4px auto 10px;display:flex;align-items:center;justify-content:center;background:conic-gradient(#26a69a 360deg,#cde9e4 0);flex-shrink:0;}
.tring-in{width:144px;height:144px;border-radius:50%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px;text-align:center;}
.tring .timer-dig{font-size:2.4rem}

/* Quico con manitas (mascota) */
.quico-mascot{position:relative;width:-moz-fit-content;width:fit-content;margin:0 auto 6px;filter:drop-shadow(0 3px 8px rgba(93,64,55,.18));}
.quico-mascot .qm-head{display:block;margin:0;filter:none;}
.qm-paws{position:absolute;left:50%;bottom:-7px;transform:translateX(-50%);width:64%;line-height:0;}
.qm-paws svg{display:block;width:100%;}
</style>
</head>
<body>

<!-- ▌HOME ▐ -->
<div id="v-home" class="screen active">
  <div style="padding:6px 0 2px;">
    <img src="../quico/quico_happy.png" alt="Quico" style="width:120px;height:auto;object-fit:contain;display:block;margin:0 auto 6px;filter:drop-shadow(0 4px 10px rgba(93,64,55,.18))">
    <div style="font-size:1.9rem;font-weight:800;color:var(--td);line-height:1.1;">🎨 Intereses</div>
    <div style="font-size:0.9rem;color:var(--fg2);margin-top:3px;font-weight:600;">10-15 min al día · un interés cada vez</div>
  </div>

  <div class="motiv" id="home-motiv" style="margin-top:14px;"></div>

  <button class="today-hint" id="home-today" onclick="openToday()"></button>

  <div class="streak-box" id="streak-box" style="display:none;"></div>

  <div class="sec-label">Todos tus intereses</div>
  <div class="int-grid" id="int-grid"></div>
</div>

<!-- ▌INTEREST (day list) ▐ -->
<div id="v-int" class="screen">
  <div class="hdr">
    <button class="hdr-back" onclick="go('v-home')">←</button>
    <span class="hdr-title" id="int-title">Interés</span>
  </div>
  <div class="motiv" id="int-motiv"></div>
  <div id="int-days"></div>
</div>

<!-- ▌ACTIVITY ▐ -->
<div id="v-act" class="screen">
  <div class="hdr">
    <button class="hdr-back" onclick="exitAct()">←</button>
    <span class="hdr-title" id="act-hdr">Actividad</span>
  </div>
  <div id="act-body"></div>
</div>

<!-- ▌DONE ▐ -->
<div id="v-done" class="screen">
  <div class="done-hero">
    <span class="done-em" id="done-em">🎉</span>
    <div class="done-t">¡Actividad completada!</div>
    <div class="done-s" id="done-sub"></div>
  </div>
  <div class="motiv" id="done-motiv"></div>
  <button class="btn-f btn-teal" onclick="go('v-home')">🏠 Volver al inicio</button>
  <button class="btn-f btn-white" id="done-next-btn" style="display:none;"></button>
</div>

<script>
/* Ajustes globales (voz/sonido/vibración/reducir estímulos) — compartidos vía localStorage */
function __cfg(){try{return JSON.parse(localStorage.getItem('cris_cfg')||'{}');}catch(e){return{};}}
function __allow(k){const c=__cfg();return c[k]!==false&&c.calm!==true;}
if(__cfg().calm)document.documentElement.classList.add('calm');

function __ring(id,frac){const r=document.getElementById(id);if(r)r.style.background='conic-gradient(#26a69a '+(Math.max(0,Math.min(1,frac))*360)+'deg,#cde9e4 0)';}

/* ── DATOS: 6 intereses × 5 días ── */
const INTERESTS=[
 {id:'musica',name:'Música',emoji:'🎻',mins:10,color:'linear-gradient(135deg,#7c3aed,#a855f7)',
  days:[
   {title:'Postura y sujeción del violín',content:'Practica la postura correcta. Coloca el violín en tu hombro izquierdo, sostén el cuello con tu mano izquierda y mantén la espalda recta.',goal:'Practicar postura 10 min'},
   {title:'Técnica básica del arco',content:'Ejercicios de arco abierto en cuerdas al aire. Movimientos largos y suaves, con el arco perpendicular a las cuerdas.',goal:'30 movimientos de arco limpios'},
   {title:'Primeras notas — Cuerda Sol',content:'Aprende las notas Sol, La y Si en la cuerda Sol. Practica cada nota por separado, luego combínalas en secuencias simples.',goal:'Tocar Sol-La-Si 10 veces'},
   {title:'Primeras notas — Cuerda Re',content:'Continúa con las notas Re, Mi y Fa# en la cuerda Re. Alterna entre las cuerdas Sol y Re.',goal:'Secuencias entre 2 cuerdas'},
   {title:'Ritmo básico — Negras',content:'Introduce las negras. Toca notas simples siguiendo un metrónomo a 60 BPM.',goal:'5 min con metrónomo'}
  ]},
 {id:'escritura',name:'Escritura',emoji:'✍️',mins:15,color:'linear-gradient(135deg,#d97706,#f59e0b)',
  days:[
   {title:'Reflexión matutina',content:'Escribe sobre cómo te sientes al comenzar el día. ¿Qué esperas lograr hoy? ¿Qué pensamientos cruzan tu mente?',goal:'Escribir 100 palabras mínimo'},
   {title:'Describir un objeto',content:'Elige un objeto cercano y descríbelo en detalle. No solo su apariencia: qué sensaciones te provoca, qué recuerdos despierta.',goal:'Descripción de 150 palabras'},
   {title:'Diálogo imaginario',content:'Crea una conversación entre dos personas que acaban de conocerse en un lugar inusual. ¿De qué hablan? ¿Cómo se conocieron?',goal:'Diálogo de 10 intercambios'},
   {title:'Carta al futuro yo',content:'Escribe una carta a ti misma dentro de un año. ¿Qué le dirías? ¿Qué consejos le darías? ¿Qué esperas haber logrado?',goal:'Carta de 200 palabras'},
   {title:'Historia en 6 palabras',content:'El reto de Hemingway: cuenta una historia completa en exactamente 6 palabras. Luego expándela a un párrafo completo.',goal:'Historia de 6 palabras + expansión'}
  ]},
 {id:'dibujo',name:'Dibujo',emoji:'🎨',mins:15,color:'linear-gradient(135deg,#db2777,#ec4899)',
  days:[
   {title:'Línea continua',content:'Dibuja tu mano no dominante usando una sola línea continua, sin levantar el lápiz del papel. Concéntrate en observar cada detalle.',goal:'Dibujo de mano completo'},
   {title:'Formas geométricas',content:'Crea una composición usando solo círculos, cuadrados y triángulos. Experimenta con tamaños y superposiciones.',goal:'Composición de 15 formas'},
   {title:'Sombreado básico',content:'Dibuja una esfera, un cubo y un cilindro. Practica técnicas de sombreado para crear volumen y profundidad.',goal:'3 objetos con sombras'},
   {title:'Textura natural',content:'Encuentra algo con textura interesante (corteza, piedra, tela) y recréala en papel con distintos trazados.',goal:'Estudio de textura detallado'},
   {title:'Boceto rápido',content:'Haz 5 bocetos de 2 minutos cada uno de objetos de tu entorno. Captura la esencia, no los detalles.',goal:'5 bocetos de 2 minutos'}
  ]},
 {id:'nudos',name:'Nudos',emoji:'🪢',mins:10,color:'linear-gradient(135deg,#059669,#10b981)',
  days:[
   {title:'Nudo simple — La base',content:'El nudo simple es la base de todos. Haz un bucle y pasa el extremo por él. Sirve para evitar que una cuerda se deslice o como base de nudos complejos.',goal:'10 nudos simples perfectos'},
   {title:'Nudo de ocho — Seguridad',content:'Forma un ocho con la cuerda y pasa el extremo siguiendo el mismo camino. No se desliza y se deshace fácil incluso bajo tensión.',goal:'Nudo en ocho en ambas direcciones'},
   {title:'Nudo llano — Unir cuerdas',content:'Para unir dos cuerdas del mismo grosor. Recuerda: «derecha sobre izquierda, izquierda sobre derecha». Fundamental en rescate y navegación.',goal:'Unir 2 cuerdas sin mirar'},
   {title:'Ballestrinque — Sujeción rápida',content:'Ideal para atar una cuerda a un poste. Dos vueltas alrededor del objeto, cruzando la cuerda sobre sí misma. Se puede hacer con una mano.',goal:'Ballestrinque con una sola mano'},
   {title:'As de guía — El rey',content:'Crea un bucle fijo que no se desliza. «El conejo sale del agujero, rodea el árbol y vuelve al agujero». El nudo más versátil: escalada, rescate, navegación.',goal:'As de guía en menos de 10 seg'}
  ]},
 {id:'electricidad',name:'Electricidad',emoji:'⚡',mins:10,color:'linear-gradient(135deg,#0369a1,#0891b2)',
  days:[
   {title:'¿Qué es la electricidad?',content:'Es el movimiento de electrones por un conductor. Los electrones van del polo negativo al positivo. Como el agua en una tubería, necesita un circuito cerrado para fluir.',goal:'Entender el flujo de electrones'},
   {title:'Voltaje, corriente y resistencia',content:'VOLTAJE (V) = presión eléctrica. CORRIENTE (A) = cantidad de electrones fluyendo. RESISTENCIA (Ω) = oposición al flujo. Ley de Ohm: V = I × R.',goal:'Calcular 3 ejemplos con Ley de Ohm'},
   {title:'Serie vs paralelo',content:'SERIE: componentes uno tras otro — misma corriente, el voltaje se divide. PARALELO: ramas separadas — mismo voltaje, la corriente se divide. Las casas usan paralelo.',goal:'Dibujar ambos circuitos'},
   {title:'Potencia y consumo',content:'POTENCIA (W) = V × I. Una bombilla de 60W a 120V consume 0.5A. Tu factura se mide en kWh (kilovatios-hora).',goal:'Calcular consumo de 5 aparatos'},
   {title:'Seguridad eléctrica',content:'NUNCA trabajes con electricidad sin cortar la alimentación. Los disyuntores protegen de sobrecargas, los diferenciales de electrocución. Usa siempre multímetro.',goal:'Identificar protecciones de tu casa'}
  ]},
 {id:'neuro',name:'Neurociencia',emoji:'🧠',mins:10,color:'linear-gradient(135deg,#1a6b64,#26a69a)',
  days:[
   {title:'¿Qué es la neurociencia?',content:'Estudia cómo funciona tu cerebro. Cada pensamiento, emoción y movimiento es resultado de 86 mil millones de neuronas comunicándose. ¡Tu cerebro consume el 20% de tu energía diaria!',goal:'Observar una función cerebral básica',
    deep:'Las neuronas tienen dendritas (antenas receptoras), soma (cuerpo celular), axón (cable transmisor) y sinapsis (conectores). Se comunican con señales eléctricas que viajan a 120 m/s.'},
   {title:'El poder del sueño',content:'Mientras duermes, tu cerebro se «limpia» eliminando toxinas y consolida las memorias del día transfiriéndolas del hipocampo a la corteza.',goal:'Mejorar higiene del sueño',
    deep:'Plasticidad sináptica: cuando dos neuronas se activan juntas repetidamente, su conexión se fortalece (LTP). «Las neuronas que se activan juntas, se conectan juntas» — así aprendes habilidades nuevas.'},
   {title:'Ejercicio = medicina cerebral',content:'El ejercicio aeróbico libera BDNF, una proteína que actúa como «fertilizante» para las neuronas. 20 minutos diarios pueden mejorar tu memoria en semanas.',goal:'Conectar con tu rutina de Pilates',
    deep:'Neurotransmisores clave: dopamina (motivación), serotonina (bienestar), GABA (calma), acetilcolina (atención), noradrenalina (alerta). Cada uno encaja en receptores específicos como llave y cerradura.'},
   {title:'Música y cerebro completo',content:'Tocar música activa a la vez áreas motoras, auditivas, visuales y de memoria. Es la única actividad que hace trabajar todo el cerebro, creando conexiones permanentes.',goal:'Conectar con tu práctica de violín',
    deep:'Ondas cerebrales: Delta (sueño profundo), Theta (creatividad), Alpha (relajación), Beta (concentración), Gamma (alta cognición). Cada frecuencia acompaña una función mental distinta.'},
   {title:'Neurotecnología actual',content:'Las interfaces cerebro-ordenador no invasivas ya permiten tratamientos en casa para sueño y concentración. El neurofeedback entrena tu cerebro en tiempo real.',goal:'Explorar apps de neurofeedback',
    deep:'En 2024 se cartografió el cerebro completo de la mosca Drosophila — un hito hacia el «conectoma humano»: el mapa completo de todas las conexiones neuronales.'}
  ]}
];

const MOTIVS=[
 '🌱 10 minutos al día construyen una habilidad en un año.',
 '🎯 Solo una actividad. Solo hoy. Eso es todo.',
 '🧠 Aprender algo nuevo es dopamina de la buena.',
 '✨ No hace falta hacerlo bien — hace falta hacerlo.',
 '💚 Tu curiosidad es un músculo: hoy toca entrenarlo.',
 '🐾 Pasito a pasito se llega lejos.',
 '🔥 Ya estás aquí. Eso es la mitad del trabajo.'
];

/* ── Estado y persistencia ── */
let cur={intId:null,dayIdx:0,timer:0,total:0,interval:null,running:false};
let _utt=null;

function getData(){
  try{return JSON.parse(localStorage.getItem('cris_intereses2')||'{}');}catch(e){return{};}
}
function setData(d){try{localStorage.setItem('cris_intereses2',JSON.stringify(d));}catch(e){}}
function getDone(intId){const d=getData();return (d.done&&d.done[intId])||[];}
function markDone(intId,dayIdx){
  const d=getData();
  d.done=d.done||{};d.done[intId]=d.done[intId]||[];
  d.done[intId][dayIdx]=true;
  // Racha amable: crece si practicas, se congela (no se rompe) si un día no
  const today=new Date().toISOString().split('T')[0];
  if(d.lastDay!==today){
    d.streak=(d.streak||0)+1;
    d.lastDay=today;
  }
  setData(d);
}
function getNote(intId){const d=getData();return (d.notes&&d.notes[intId])||'';}
function setNote(intId,txt){const d=getData();d.notes=d.notes||{};d.notes[intId]=txt;setData(d);}

/* ── Utils ── */
function speak(t){
  try{if(!__allow('voice'))return;
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    if(window.speechSynthesis.paused)window.speechSynthesis.resume();
    _utt=new SpeechSynthesisUtterance(t);
    _utt.lang='es-ES';_utt.rate=.9;
    const v=window.speechSynthesis.getVoices().find(v=>v.lang.startsWith('es'));
    if(v)_utt.voice=v;
    window.speechSynthesis.speak(_utt);
  }catch(e){}
}
let __beepCtx=null;function __getCtx(){try{if(!__beepCtx)__beepCtx=new(window.AudioContext||window.webkitAudioContext)();if(__beepCtx.state==='suspended')__beepCtx.resume();return __beepCtx;}catch(e){return null;}}
function beep(f,d){
  try{if(!__allow('sound'))return;
    const c=__getCtx();if(!c)return;
    const o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.frequency.value=f||660;
    g.gain.setValueAtTime(.2,c.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,c.currentTime+(d||.2));
    o.start();o.stop(c.currentTime+(d||.2));
  }catch(e){}
}
function vibrate(p){if(!__allow('vib'))return;try{navigator.vibrate&&navigator.vibrate(p||50);}catch(e){}}
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function findInt(id){return INTERESTS.find(i=>i.id===id);}
function nextPending(it){const done=getDone(it.id);for(let i=0;i<it.days.length;i++)if(!done[i])return i;return -1;}

function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
  if(id==='v-home')initHome();
}

/* ── HOME ── */
function todayInterest(){
  // Rota el interés sugerido por día del año; salta los ya completos
  const doy=Math.floor((new Date()-new Date(new Date().getFullYear(),0,0))/864e5);
  for(let k=0;k<INTERESTS.length;k++){
    const it=INTERESTS[(doy+k)%INTERESTS.length];
    if(nextPending(it)>=0)return it;
  }
  return INTERESTS[doy%INTERESTS.length];
}
function initHome(){
  document.getElementById('home-motiv').textContent=MOTIVS[new Date().getDay()%MOTIVS.length];

  const it=todayInterest();
  const pend=nextPending(it);
  const btn=document.getElementById('home-today');
  btn.style.background=it.color;
  btn.innerHTML=pend>=0
    ?`<div><div class="th-tag">Hoy toca</div><div class="th-name">${it.name}: ${it.days[pend].title}</div><div class="th-sub">Día ${pend+1} de 5 · ~${it.mins} min</div></div><span class="th-em">${it.emoji}</span>`
    :`<div><div class="th-tag">¡Todo completado!</div><div class="th-name">Repite tu favorito</div><div class="th-sub">O simplemente disfruta 💚</div></div><span class="th-em">🏆</span>`;

  const d=getData();
  const sb=document.getElementById('streak-box');
  if(d.streak&&d.streak>0){
    sb.style.display='flex';
    sb.innerHTML=`<span class="streak-fire">🔥</span><span class="streak-txt"><strong>${d.streak} ${d.streak===1?'día':'días'} practicando</strong><br>La racha nunca se rompe — solo se pausa 💚</span>`;
  }else sb.style.display='none';

  document.getElementById('int-grid').innerHTML=INTERESTS.map(it=>{
    const done=getDone(it.id);
    const dots=it.days.map((_,i)=>`<span class="ic-dot${done[i]?' done':''}"></span>`).join('');
    return `<button class="int-card" onclick="openInt('${it.id}')">
      <span class="ic-em">${it.emoji}</span>
      <span class="ic-name">${it.name}</span>
      <span class="ic-dots">${dots}</span>
    </button>`;
  }).join('');
}
function openToday(){
  const it=todayInterest();
  const pend=nextPending(it);
  if(pend>=0)openAct(it.id,pend);
  else openInt(it.id);
}

/* ── INTEREST day list ── */
function openInt(id){
  const it=findInt(id);
  const done=getDone(id);
  const nDone=done.filter(Boolean).length;
  document.getElementById('int-title').textContent=it.emoji+' '+it.name;
  document.getElementById('int-motiv').textContent=
    nDone===5?'🏆 ¡Los 5 días completados! Puedes repetir cualquiera.':
    nDone===0?`Cinco días pequeños de ~${it.mins} min. Empieza por el primero.`:
    `Llevas ${nDone} de 5. ¡Sigue así!`;
  document.getElementById('int-days').innerHTML=it.days.map((day,i)=>`
    <button class="day-row${done[i]?' done':''}" onclick="openAct('${id}',${i})">
      <span class="dr-num">${done[i]?'✓':i+1}</span>
      <span class="dr-info">
        <span class="dr-title">${day.title}</span>
        <span class="dr-goal">🎯 ${day.goal}</span>
      </span>
      <span class="dr-arrow">›</span>
    </button>`).join('');
  go('v-int');
}

/* ── ACTIVITY ── */
function openAct(intId,dayIdx){
  const it=findInt(intId);
  const day=it.days[dayIdx];
  cur={intId,dayIdx,timer:it.mins*60,total:it.mins*60,interval:null,running:false};
  document.getElementById('act-hdr').textContent=it.name;
  document.getElementById('act-body').innerHTML=`
    <div class="act-hero" style="background:${it.color}">
      <span class="ah-em">${it.emoji}</span>
      <div class="ah-day">Día ${dayIdx+1} de 5</div>
      <div class="ah-title">${day.title}</div>
    </div>
    <div class="act-card">${day.content}</div>
    <div class="goal-pill"><span>🎯</span><span>${day.goal}</span></div>
    ${day.deep?`<button class="deep-btn" onclick="document.getElementById('deep-box').classList.toggle('open')">🔬 ¿Quieres profundizar? (opcional)</button>
    <div class="deep-box" id="deep-box">${day.deep}</div>`:''}
    <div class="timer-zone">
      <div class="tring" id="t-ring"><div class="tring-in">
        <div class="timer-dig" id="t-dig">${fmt(cur.timer)}</div>
        <div class="timer-lbl" id="t-lbl">sin presión</div>
      </div></div>
    </div>
    <button class="btn-f btn-teal" id="t-start" onclick="actStart()">▶ Empezar ${it.mins} min</button>
    <button class="btn-f btn-soft" onclick="actDone()">✓ Ya lo he hecho</button>
    <textarea class="note-area" id="act-note" placeholder="📝 Nota rápida (opcional)— se guarda sola">${getNote(intId)}</textarea>
  `;
  document.getElementById('act-note').addEventListener('input',e=>setNote(intId,e.target.value));
  __ring('t-ring',1);
  go('v-act');
}

function actStart(){
  const btn=document.getElementById('t-start');
  if(cur.running){
    clearInterval(cur.interval);cur.interval=null;cur.running=false;
    btn.textContent='▶ Seguir';
    return;
  }
  cur.running=true;
  btn.textContent='⏸ Pausa';
  if(cur.timer===cur.total){
    const it=findInt(cur.intId),day=it.days[cur.dayIdx];
    speak(day.title+'. '+day.content);
    vibrate(50);
  }
  cur.interval=setInterval(()=>{
    cur.timer--;
    const dig=document.getElementById('t-dig');
    if(dig)dig.textContent=fmt(cur.timer);
    __ring('t-ring',cur.total?cur.timer/cur.total:0);
    if(cur.timer===60)speak('Queda un minuto.');
    if(cur.timer===10)speak('Últimos diez segundos.');
    if(cur.timer<=0){
      clearInterval(cur.interval);cur.interval=null;
      // Alarma inconfundible de fin de tiempo
      beep(760,.22);setTimeout(()=>beep(980,.22),260);setTimeout(()=>beep(1240,.42),520);
      vibrate([160,90,160,90,320]);
      actDone();
    }
  },1000);
}

function exitAct(){
  if(cur.interval){clearInterval(cur.interval);cur.interval=null;}
  window.speechSynthesis&&window.speechSynthesis.cancel();
  openInt(cur.intId);
}

function actDone(){
  if(cur.interval){clearInterval(cur.interval);cur.interval=null;}
  // Marca diaria para que el panel «Hoy» tache la fila de Intereses al volver
  try{var _n=new Date();localStorage.setItem('cris_intereses_v1_'+_n.getFullYear()+'-'+String(_n.getMonth()+1).padStart(2,'0')+'-'+String(_n.getDate()).padStart(2,'0'),'1');}catch(e){}
  markDone(cur.intId,cur.dayIdx);
  vibrate([70,40,70]);
  speak('¡Muy bien! Actividad completada.');

  const it=findInt(cur.intId);
  const d=getData();
  document.getElementById('done-em').textContent=it.emoji;
  document.getElementById('done-sub').textContent=`${it.name} · Día ${cur.dayIdx+1} de 5`;
  document.getElementById('done-motiv').textContent=
    d.streak>1?`🔥 ${d.streak} días practicando. Tu cerebro está creando conexiones nuevas ahora mismo.`
    :'✨ Cada práctica cuenta. Tu cerebro está creando conexiones nuevas ahora mismo.';

  const pend=nextPending(it);
  const nb=document.getElementById('done-next-btn');
  if(pend>=0){
    nb.style.display='block';
    nb.textContent=`${it.emoji} Siguiente: ${it.days[pend].title}`;
    nb.onclick=()=>openAct(it.id,pend);
  }else nb.style.display='none';

  go('v-done');
}

/* ── Boot ── */
initHome();
/* Botón atrás del móvil: la app pregunta si este módulo puede retroceder una pantalla */
/* Atrás del móvil: el padre llama __crisBack() (síncrono); true = retrocedió */
window.__crisBack=function(){
  var el=document.querySelector('.screen.active .hdr-back');
  if(el){el.click();return true;}
  var act=document.querySelector('.screen.active');
  if(act&&act.id!=='v-home'&&typeof go==='function'){go('v-home');return true;}
  return false;
};
/* Puente para versiones mezcladas: si el index viejo aún manda postMessage */
window.addEventListener('message',function(e){
  if(e&&e.data==='cris:back'&&window.__crisBack&&window.__crisBack()){
    try{parent.postMessage('cris:back-ok','*');}catch(_){}
  }
});
</script>
</body>
