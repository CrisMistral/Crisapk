<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Juegos Mentales - Próximamente</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif;}
  body{
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(160deg,#f0f9ff 0%, #f3f1ff 50%, #ffffff 100%);
    color:#2d3748;text-align:center;padding:24px;
  }
  .box{max-width:340px;}
  .icon{font-size:4rem;margin-bottom:14px;animation:bounce 2.2s ease-in-out infinite;}
  @keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
  h1{color:#26a69a;font-size:1.3rem;margin-bottom:10px;}
  p{font-size:0.9rem;color:#7a8a99;line-height:1.6;}
</style>
</head>
<body>
  <div class="box">
    <div class="icon">🧩🦘</div>
    <h1>Juegos Mentales</h1>
    <p>Este módulo está en construcción.<br>
    Pronto tendrás aquí Sudoku 4x4 y otros juegos cortos de agilidad mental.</p>
    <p style="margin-top:14px;">Mientras tanto, usa el botón 🏠 para volver al inicio.</p>
  </div>
</body>
</html>
