<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Juego · Cris</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--teal:#26a69a;--td:#1a6b64;--mint:#d6f0eb;--mm:#b8e4dd;--ms:#e8f8f5;--fg:#1a2e2b;--fg2:#4a7069;}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Outfit',sans-serif;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;background:var(--ms);}
body{display:flex;flex-direction:column;align-items:center;min-height:100vh;color:var(--fg);padding:16px 12px 40px;}

.screen{display:none;width:100%;max-width:460px;flex-direction:column;align-items:center;}
.screen.active{display:flex;}

h1{color:var(--td);font-size:1.5rem;font-weight:800;text-align:center;}
.sub{color:var(--fg2);font-size:.85rem;text-align:center;margin-bottom:18px;font-weight:600;line-height:1.4;}

/* Picker */
.pick-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;}
.pick-card{background:#fff;border:none;border-radius:20px;padding:14px 10px 12px;cursor:pointer;box-shadow:0 3px 12px rgba(38,166,154,.12);position:relative;font-family:'Outfit',sans-serif;}
.pick-card:active{transform:scale(.97);}
.pick-thumb{display:grid;margin:0 auto 8px;border-radius:8px;overflow:hidden;background:#f4fbf9;padding:6px;width:max-content;}
.pick-thumb i{display:block;border-radius:2px;}
.pick-name{font-size:.92rem;font-weight:700;color:var(--td);}
.pick-tag{font-size:.72rem;color:var(--fg2);font-weight:600;margin-top:2px;}
.pick-badge{position:absolute;top:8px;right:8px;font-size:1rem;}

/* Board */
.topbar{display:flex;align-items:center;gap:10px;width:100%;margin-bottom:12px;}
.back-btn{width:42px;height:42px;border:none;background:#fff;border-radius:13px;font-size:1.3rem;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;color:var(--td);flex-shrink:0;}
.topbar h2{font-size:1.1rem;font-weight:800;color:var(--td);}

.pbar-out{width:100%;max-width:380px;height:9px;background:var(--mm);border-radius:6px;overflow:hidden;margin-bottom:14px;}
.pbar-in{height:100%;background:linear-gradient(90deg,var(--teal),#4dd0e1);border-radius:6px;transition:width .3s;width:0;}

.board-wrap{position:relative;background:#fff;border-radius:18px;padding:10px;box-shadow:0 6px 22px rgba(38,166,154,.14);margin-bottom:18px;}
.board{display:grid;gap:2px;touch-action:none;}
.cell{position:relative;border-radius:4px;background:#eef6f4;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;transition:transform .1s;}
.cell.blank{background:transparent;cursor:default;}
.cell .hint{font-size:.6rem;font-weight:800;pointer-events:none;}
.cell.filled .hint{display:none;}
.cell.filled::after{content:'';position:absolute;top:16%;left:20%;width:34%;height:28%;border-radius:50%;background:rgba(255,255,255,.6);pointer-events:none;}
.cell.glow{box-shadow:0 0 0 2px var(--teal),0 0 7px rgba(38,166,154,.5);z-index:1;}
.cell.pop{animation:pop .28s ease;}
@keyframes pop{0%{transform:scale(.4)}60%{transform:scale(1.14)}100%{transform:scale(1)}}
.cell.nope{animation:nope .3s ease;}
@keyframes nope{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}

/* Tray (donde están las gemas) */
.tray-label{font-size:.72rem;font-weight:700;color:var(--fg2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.tray{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;width:100%;}
.gem{border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;font-family:'Outfit',sans-serif;padding:2px;}
.gem-face{width:48px;height:48px;border-radius:12px;position:relative;box-shadow:0 3px 8px rgba(0,0,0,.18);transition:transform .1s;}
.gem-face::after{content:'';position:absolute;top:15%;left:20%;width:36%;height:30%;border-radius:50%;background:rgba(255,255,255,.6);}
.gem.sel .gem-face{transform:scale(1.14);box-shadow:0 0 0 3px var(--td),0 3px 10px rgba(0,0,0,.25);}
.gem.done .gem-face{opacity:.25;}
.gem-count{font-size:.8rem;font-weight:800;color:var(--td);}
.gem.done .gem-count{color:var(--fg2);}

/* Completion */
.done-hero{position:absolute;inset:0;background:rgba(255,255,255,.72);backdrop-filter:blur(2px);border-radius:18px;display:none;flex-direction:column;align-items:center;justify-content:center;gap:6px;z-index:5;}
.done-hero.show{display:flex;}
.done-hero .big{font-size:3rem;}
.done-hero h3{font-size:1.35rem;font-weight:800;color:var(--td);}
.spark{position:absolute;font-size:1.2rem;pointer-events:none;animation:spark 1.1s ease-out forwards;}
@keyframes spark{0%{transform:scale(0) rotate(0);opacity:0}30%{opacity:1}100%{transform:scale(1.4) rotate(40deg) translateY(-14px);opacity:0}}

.btn{border:none;border-radius:14px;padding:12px 20px;font-family:'Outfit',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;}
.btn-teal{background:var(--teal);color:#fff;}
.btn-soft{background:var(--mm);color:var(--td);}
.row-btns{display:flex;gap:10px;margin-top:14px;}

.calm *,.calm *::before,.calm *::after{animation:none !important;transition:none !important}
</style>
</head>
<body>

<!-- PICKER -->
<div id="v-pick" class="screen active">
  <h1>💎 Joyas</h1>
  <p class="sub">Coge cada gema de la bandeja y ponla en su casilla del color correcto.<br>El dibujo se ilumina solo.</p>
  <div class="pick-grid" id="pick-grid"></div>
</div>

<!-- GAME -->
<div id="v-game" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="go('v-pick')">←</button>
    <h2 id="game-title">Dibujo</h2>
  </div>
  <div class="pbar-out"><div class="pbar-in" id="pbar"></div></div>
  <div class="board-wrap">
    <div class="board" id="board"></div>
    <div class="done-hero" id="done-hero">
      <span class="big">✨</span>
      <h3>¡Precioso!</h3>
      <div style="font-size:.85rem;color:var(--fg2);font-weight:600;">Dibujo completado 💚</div>
      <div class="row-btns">
        <button class="btn btn-soft" onclick="go('v-pick')">← Galería</button>
        <button class="btn btn-teal" id="next-btn">Siguiente →</button>
      </div>
    </div>
  </div>
  <div class="tray-label">Bandeja de gemas</div>
  <div class="tray" id="tray"></div>
</div>

<script>
/* Ajustes globales compartidos */
function __cfg(){try{return JSON.parse(localStorage.getItem('cris_cfg')||'{}');}catch(e){return{};}}
function __allow(k){const c=__cfg();return c[k]!==false&&c.calm!==true;}
if(__cfg().calm)document.documentElement.classList.add('calm');

/* ── Gemas ── */
const GEMS={
  R:'#e5484d', O:'#f2820b', Y:'#f5c518', G:'#2fb457', B:'#3b82f6',
  P:'#a855f7', K:'#ec4899', C:'#06b6d4', W:'#bfe3f5', N:'#8a5a2b', X:'#3a3a3a'
};
function gemBg(l){const c=GEMS[l];return `radial-gradient(circle at 34% 28%, ${shade(c,55)}, ${c} 62%, ${shade(c,-22)})`;}
function shade(hex,p){let n=parseInt(hex.slice(1),16),r=(n>>16)&255,g=(n>>8)&255,b=n&255;const f=v=>Math.max(0,Math.min(255,Math.round(v+(p>0?(255-v)*p/100:v*p/100))));return `rgb(${f(r)},${f(g)},${f(b)})`;}
function faint(l){const c=GEMS[l];return shade(c,72);}

/* ── Dibujos (cada fila mismo ancho, '.' = fondo vacío) ── */
const PICTURES=[
  {id:'corazon',name:'Corazón',emoji:'❤️',grid:[
    '.RR...RR.','RRRRRRRRR','RKRRRRRKR','RRRRRRRRR','.RRRRRRR.','..RRRRR..','...RRR...','....R....']},
  {id:'estrella',name:'Estrella',emoji:'⭐',grid:[
    '....Y....','....Y....','...YOY...','YYYYYYYYY','.YYYYYYY.','..YYYYY..','..YY.YY..','.YY...YY.']},
  {id:'flor',name:'Flor',emoji:'🌸',grid:[
    '...KKK...','..KKKKK..','.KKKYKKK.','..KKKKK..','...KGK...','....G....','..GGGGG..','....G....','....G....']},
  {id:'mariposa',name:'Mariposa',emoji:'🦋',grid:[
    '.P.....P.','PBP...PBP','PBBP.PBBP','.PBP.PBP.','...BKB...','.PBP.PBP.','PBBP.PBBP','PBP...PBP','.P.....P.']},
  {id:'arcoiris',name:'Arcoíris',emoji:'🌈',grid:[
    'RRRRRRRRR','OOOOOOOOO','YYYYYYYYY','GGGGGGGGG','BBBBBBBBB','PPPPPPPPP']},
  {id:'sandia',name:'Sandía',emoji:'🍉',grid:[
    '.GGGGGGG.','GWWWWWWWG','WRRRRRRRW','WRRXRRXRW','.RRRXRRR.','..RRRRR..','...RRR...','....R....']},
  {id:'manzana',name:'Manzana',emoji:'🍎',grid:[
    '....N....','...GGN...','..RRRRR..','.RRRRRRR.','RRRRWRRRR','RRRRRRRRR','.RRRRRRR.','..RRRRR..']},
  {id:'diamante',name:'Diamante',emoji:'💎',grid:[
    '..WWWWW..','.WCCCCCW.','WCCCCCCCW','.WCCCCCW.','..WCCCW..','...WCW...','...WCW...','....W....']}
];

/* ── Estado ── */
let cur=null, selGem=null, cells=[], remaining={}, filledCount=0, targetCount=0, dragging=false;

function go(v){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(v).classList.add('active');
  window.scrollTo(0,0);
  if(v==='v-pick')renderPicker();
}

/* ── Persistencia ── */
function getDone(){try{return JSON.parse(localStorage.getItem('cris_joyas_done')||'[]');}catch(e){return[];}}
function markDone(id){const d=getDone();if(!d.includes(id)){d.push(id);localStorage.setItem('cris_joyas_done',JSON.stringify(d));}}

/* ── Audio/vibración ── */
function beep(f=600,d=.15){if(!__allow('sound'))return;try{const a=new(window.AudioContext||window.webkitAudioContext)(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.16,a.currentTime);g.gain.exponentialRampToValueAtTime(.01,a.currentTime+d);o.start();o.stop(a.currentTime+d);}catch(e){}}
function vib(ms){if(!__allow('vib'))return;try{navigator.vibrate(ms);}catch(e){}}

/* ── PICKER ── */
function renderPicker(){
  const done=getDone();
  document.getElementById('pick-grid').innerHTML=PICTURES.map(p=>{
    const w=p.grid[0].length;
    const cell=Math.min(13,Math.floor(120/w));
    const thumb=`<div class="pick-thumb" style="grid-template-columns:repeat(${w},${cell}px);gap:1px;">`+
      p.grid.join('').split('').map(ch=>`<i style="width:${cell}px;height:${cell}px;background:${ch==='.'?'transparent':GEMS[ch]}"></i>`).join('')+`</div>`;
    return `<button class="pick-card" onclick="startPic('${p.id}')">
      ${done.includes(p.id)?'<span class="pick-badge">✅</span>':''}
      ${thumb}
      <div class="pick-name">${p.emoji} ${p.name}</div>
      <div class="pick-tag">${countGems(p)} gemas</div>
    </button>`;
  }).join('');
}
function countGems(p){return p.grid.join('').replace(/\./g,'').length;}

/* ── EMPEZAR ── */
function startPic(id){
  cur=PICTURES.find(p=>p.id===id);
  selGem=null;filledCount=0;remaining={};
  const flat=cur.grid.join('').split('');
  targetCount=flat.filter(c=>c!=='.').length;
  flat.forEach(c=>{if(c!=='.')remaining[c]=(remaining[c]||0)+1;});
  document.getElementById('game-title').textContent=cur.emoji+' '+cur.name;
  document.getElementById('done-hero').classList.remove('show');
  buildBoard();
  buildTray();
  updateProgress();
  const first=Object.keys(remaining)[0];
  if(first)selectGem(first);
  go('v-game');
}

function buildBoard(){
  const w=cur.grid[0].length,h=cur.grid.length;
  const board=document.getElementById('board');
  const cellPx=Math.floor(Math.min(360, window.innerWidth-56)/w);
  board.style.gridTemplateColumns=`repeat(${w},${cellPx}px)`;
  board.innerHTML='';
  cells=[];
  cur.grid.forEach((row)=>{
    row.split('').forEach((ch)=>{
      const d=document.createElement('div');
      d.style.width=d.style.height=cellPx+'px';
      if(ch==='.'){d.className='cell blank';}
      else{
        d.className='cell';
        d.dataset.t=ch;
        d.innerHTML=`<span class="hint" style="color:${faint(ch)}">${ch}</span>`;
        d.addEventListener('pointerdown',e=>{e.preventDefault();dragging=true;tryFill(d);});
        d.addEventListener('pointerenter',()=>{if(dragging)tryFill(d);});
      }
      board.appendChild(d);cells.push(d);
    });
  });
}
window.addEventListener('pointerup',()=>dragging=false);

function buildTray(){
  document.getElementById('tray').innerHTML=Object.keys(remaining).map(letter=>`
    <button class="gem" data-g="${letter}" onclick="selectGem('${letter}')">
      <span class="gem-face" style="background:${gemBg(letter)}"></span>
      <span class="gem-count" id="cnt-${letter}">${remaining[letter]}</span>
    </button>`).join('');
}

function selectGem(letter){
  if(remaining[letter]<=0)return;
  selGem=letter;
  document.querySelectorAll('.gem').forEach(g=>g.classList.toggle('sel',g.dataset.g===letter));
  cells.forEach(d=>{
    if(d.classList.contains('blank')||d.classList.contains('filled')){d.classList.remove('glow');return;}
    d.classList.toggle('glow',d.dataset.t===letter);
  });
  beep(680,.08);
}

function tryFill(d){
  if(!selGem||d.classList.contains('filled')||d.classList.contains('blank'))return;
  if(d.dataset.t!==selGem){d.classList.add('nope');vib(20);setTimeout(()=>d.classList.remove('nope'),300);return;}
  d.classList.add('filled','pop');d.classList.remove('glow');
  d.style.background=gemBg(selGem);
  setTimeout(()=>d.classList.remove('pop'),300);
  filledCount++;remaining[selGem]--;
  document.getElementById('cnt-'+selGem).textContent=remaining[selGem];
  beep(720+filledCount*3,.06);vib(10);
  updateProgress();
  if(remaining[selGem]<=0){
    const btn=document.querySelector('.gem[data-g="'+selGem+'"]');
    if(btn)btn.classList.add('done');
    if(filledCount<targetCount){
      const nxt=Object.keys(remaining).find(k=>remaining[k]>0);
      if(nxt)selectGem(nxt);
    }
  }
  if(filledCount>=targetCount)finishPic();
}

function updateProgress(){document.getElementById('pbar').style.width=(filledCount/targetCount*100)+'%';}

function finishPic(){
  markDone(cur.id);
  cells.forEach(d=>d.classList.remove('glow'));
  beep(880,.16);setTimeout(()=>beep(1100,.22),160);vib([60,40,80]);
  sparkle();
  const idx=PICTURES.findIndex(p=>p.id===cur.id);
  const next=PICTURES[(idx+1)%PICTURES.length];
  const nb=document.getElementById('next-btn');
  nb.textContent=next.emoji+' '+next.name+' →';
  nb.onclick=()=>startPic(next.id);
  setTimeout(()=>document.getElementById('done-hero').classList.add('show'),650);
}

function sparkle(){
  const wrap=document.querySelector('.board-wrap');
  const em=['✨','💛','⭐','💎','🌟'];
  for(let i=0;i<14;i++){
    const s=document.createElement('span');
    s.className='spark';s.textContent=em[i%em.length];
    s.style.left=(10+Math.random()*80)+'%';s.style.top=(10+Math.random()*80)+'%';
    s.style.animationDelay=(Math.random()*.5)+'s';
    wrap.appendChild(s);setTimeout(()=>s.remove(),1700);
  }
}

/* ── Boot ── */
renderPicker();
</script>
</body>
</html>
