<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Juego · Cris</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--teal:#26a69a;--td:#1a6b64;--mint:#d6f0eb;--mm:#b8e4dd;--ms:#e8f8f5;--fg:#1a2e2b;--fg2:#4a7069;}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Outfit',sans-serif;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;background:var(--ms);}
body{display:flex;flex-direction:column;align-items:center;min-height:100vh;color:var(--fg);padding:16px 12px 40px;}

.screen{display:none;width:100%;max-width:460px;flex-direction:column;align-items:center;}
.screen.active{display:flex;}

h1{color:var(--td);font-size:1.5rem;font-weight:800;text-align:center;}
.sub{color:var(--fg2);font-size:.85rem;text-align:center;margin-bottom:18px;font-weight:600;line-height:1.4;}

/* Level picker */
.lv-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;}
.lv-card{background:#fff;border:none;border-radius:20px;padding:18px 12px;cursor:pointer;box-shadow:0 3px 12px rgba(38,166,154,.12);position:relative;font-family:'Outfit',sans-serif;text-align:center;}
.lv-card:active{transform:scale(.97);}
.lv-num{font-size:2rem;font-weight:800;color:var(--teal);}
.lv-name{font-size:.95rem;font-weight:700;color:var(--td);margin-top:2px;}
.lv-tag{font-size:.74rem;color:var(--fg2);font-weight:600;margin-top:3px;}
.lv-badge{position:absolute;top:8px;right:10px;font-size:1.05rem;}
.lv-card.locked{opacity:.5;pointer-events:none;}

/* Board */
.topbar{display:flex;align-items:center;gap:10px;width:100%;margin-bottom:6px;}
.back-btn{width:42px;height:42px;border:none;background:#fff;border-radius:13px;font-size:1.3rem;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;color:var(--td);flex-shrink:0;}
.topbar h2{font-size:1.1rem;font-weight:800;color:var(--td);flex:1;}
.moves{font-size:.8rem;font-weight:700;color:var(--fg2);}

.hint-line{font-size:.8rem;color:var(--fg2);font-weight:600;text-align:center;margin:6px 0 16px;min-height:1.1em;}

.tubes{display:flex;flex-wrap:wrap;gap:16px 18px;justify-content:center;align-items:flex-end;width:100%;margin-bottom:20px;}
.tube{position:relative;display:flex;flex-direction:column-reverse;background:rgba(255,255,255,.55);border:3px solid #cfe7e2;border-top:none;border-radius:6px 6px 20px 20px;padding:5px;cursor:pointer;transition:transform .12s;}
.tube:active{transform:scale(.97);}
.tube.sel{border-color:var(--teal);box-shadow:0 0 0 2px rgba(38,166,154,.35);}
.tube.win{border-color:#f5c518;box-shadow:0 0 12px rgba(245,197,24,.6);}
.tube.nope{animation:nope .3s ease;}
@keyframes nope{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.gem{border-radius:7px;position:relative;transition:transform .18s ease;}
.gem::after{content:'';position:absolute;top:14%;left:20%;width:34%;height:28%;border-radius:50%;background:rgba(255,255,255,.6);}
.gem.lift{transform:translateY(-14px) scale(1.04);z-index:2;}
.gem .glyph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;color:rgba(255,255,255,.9);}

.row-btns{display:flex;gap:10px;}
.btn{border:none;border-radius:14px;padding:12px 20px;font-family:'Outfit',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;}
.btn-teal{background:var(--teal);color:#fff;}
.btn-soft{background:var(--mm);color:var(--td);}
.btn:disabled{opacity:.4;pointer-events:none;}

/* Win overlay */
.win-ov{position:fixed;inset:0;background:rgba(232,248,245,.94);backdrop-filter:blur(3px);display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;z-index:20;padding:20px;text-align:center;}
.win-ov.show{display:flex;}
.win-ov h2{font-size:1.6rem;font-weight:800;color:var(--td);}
.win-ov p{font-size:.9rem;color:var(--fg2);font-weight:600;}
.art{display:grid;margin:10px 0;border-radius:12px;padding:8px;background:#fff;box-shadow:0 6px 22px rgba(38,166,154,.16);}
.art i{display:block;border-radius:3px;}
.art i.rv{animation:reveal .4s ease both;}
@keyframes reveal{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.spark{position:absolute;font-size:1.3rem;pointer-events:none;animation:spark 1.2s ease-out forwards;}
@keyframes spark{0%{transform:scale(0) rotate(0);opacity:0}30%{opacity:1}100%{transform:scale(1.5) rotate(45deg) translateY(-18px);opacity:0}}

.calm *,.calm *::before,.calm *::after{animation:none !important;transition:none !important}
</style>
</head>
<body>

<!-- LEVEL PICKER -->
<div id="v-pick" class="screen active">
  <h1>💎 Joyas</h1>
  <p class="sub">Ordena las joyas por color hasta que cada tubo tenga uno solo.<br>Sin prisa, sin perder.</p>
  <div class="lv-grid" id="lv-grid"></div>
</div>

<!-- GAME -->
<div id="v-game" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="go('v-pick')">←</button>
    <h2 id="g-title">Nivel</h2>
    <span class="moves" id="g-moves">0 mov.</span>
  </div>
  <div class="hint-line" id="g-hint">Toca un tubo para coger la joya de arriba</div>
  <div class="tubes" id="tubes"></div>
  <div class="row-btns">
    <button class="btn btn-soft" id="undo-btn" onclick="undo()">↩ Deshacer</button>
    <button class="btn btn-soft" onclick="restart()">🔄 Reiniciar</button>
  </div>
</div>

<!-- WIN -->
<div class="win-ov" id="win-ov">
  <span style="font-size:2.6rem">✨</span>
  <h2>¡Nivel resuelto!</h2>
  <p id="win-art-name">Has revelado un dibujo</p>
  <div class="art" id="win-art"></div>
  <div class="row-btns">
    <button class="btn btn-soft" onclick="closeWin();go('v-pick')">← Niveles</button>
    <button class="btn btn-teal" id="win-next">Siguiente →</button>
  </div>
  <div class="palette" id="palette"></div>
</div>

<script>
/* Ajustes globales compartidos */
function __cfg(){try{return JSON.parse(localStorage.getItem('cris_cfg')||'{}');}catch(e){return{};}}
function __allow(k){const c=__cfg();return c[k]!==false&&c.calm!==true;}
if(__cfg().calm)document.documentElement.classList.add('calm');

/* ── Joyas ── */
const GEMS={
  B:'#3b82f6', R:'#e5484d', G:'#2fb457', Y:'#f5c518',
  P:'#a855f7', O:'#f2820b', K:'#ec4899', C:'#06b6d4'
};
const ORDER=['B','R','G','Y','P','O','K','C'];
function gemBg(l){const c=GEMS[l];return `radial-gradient(circle at 34% 28%, ${shade(c,55)}, ${c} 62%, ${shade(c,-22)})`;}
function shade(hex,p){let n=parseInt(hex.slice(1),16),r=(n>>16)&255,g=(n>>8)&255,b=n&255;const f=v=>Math.max(0,Math.min(255,Math.round(v+(p>0?(255-v)*p/100:v*p/100))));return `rgb(${f(r)},${f(g)},${f(b)})`;}

/* ── Dibujos que se revelan al ganar ── */
const ART=[
  {name:'Corazón',grid:['.RR...RR.','RRRRRRRRR','RRRRRRRRR','RRRRRRRRR','.RRRRRRR.','..RRRRR..','...RRR...','....R....']},
  {name:'Estrella',grid:['....Y....','....Y....','...YYY...','YYYYYYYYY','.YYYYYYY.','..YYYYY..','..YY.YY..','.YY...YY.']},
  {name:'Flor',grid:['...KKK...','..KKKKK..','.KKKYKKK.','..KKKKK..','...KGK...','....G....','..GGGGG..','....G....','....G....']},
  {name:'Mariposa',grid:['.P.....P.','PBP...PBP','PBBP.PBBP','.PBP.PBP.','...BKB...','.PBP.PBP.','PBBP.PBBP','PBP...PBP','.P.....P.']},
  {name:'Arcoíris',grid:['RRRRRRRRR','OOOOOOOOO','YYYYYYYYY','GGGGGGGGG','BBBBBBBBB','PPPPPPPPP']},
  {name:'Gema',grid:['.BB.BB.','BCCBCCB','CBBCBBC','.CBCBC.','..CBC..','...B...']}
];

/* ── Niveles: colores, altura, tubos vacíos ── */
const LEVELS=[
  {colors:3,K:4,empty:2,name:'Fácil'},
  {colors:4,K:4,empty:2,name:'Suave'},
  {colors:5,K:4,empty:2,name:'Media'},
  {colors:6,K:4,empty:2,name:'Reto'},
  {colors:6,K:5,empty:2,name:'Experta'},
  {colors:7,K:4,empty:2,name:'Maestra'}
];

/* ── Estado ── */
let curLv=0, K=4, tubes=[], sel=null, moves=0, history=[], initial=null;

function go(v){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(v).classList.add('active');
  window.scrollTo(0,0);
  if(v==='v-pick')renderPicker();
}

/* ── Persistencia ── */
function getDone(){try{return JSON.parse(localStorage.getItem('cris_joyas_done')||'[]');}catch(e){return[];}}
function markDone(i){const d=getDone();if(!d.includes(i)){d.push(i);localStorage.setItem('cris_joyas_done',JSON.stringify(d));}}
function maxUnlocked(){const d=getDone();return d.length?Math.max(...d)+1:0;}

/* ── Audio/vibración ── */
function beep(f=600,d=.12){if(!__allow('sound'))return;try{const a=new(window.AudioContext||window.webkitAudioContext)(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.15,a.currentTime);g.gain.exponentialRampToValueAtTime(.01,a.currentTime+d);o.start();o.stop(a.currentTime+d);}catch(e){}}
function vib(ms){if(!__allow('vib'))return;try{navigator.vibrate(ms);}catch(e){}}

/* ── PICKER ── */
function renderPicker(){
  const done=getDone(),unlocked=maxUnlocked();
  document.getElementById('lv-grid').innerHTML=LEVELS.map((lv,i)=>{
    const locked=i>unlocked;
    return `<button class="lv-card${locked?' locked':''}" onclick="startLevel(${i})">
      ${done.includes(i)?'<span class="lv-badge">✅</span>':locked?'<span class="lv-badge">🔒</span>':''}
      <div class="lv-num">${i+1}</div>
      <div class="lv-name">${lv.name}</div>
      <div class="lv-tag">${lv.colors} colores</div>
    </button>`;
  }).join('');
}

/* ── Generación de nivel resoluble ── */
function genLevel(lv){
  const cols=ORDER.slice(0,lv.colors);
  for(let attempt=0;attempt<80;attempt++){
    // baraja de colores.K cada uno
    let bag=[];
    cols.forEach(c=>{for(let j=0;j<lv.K;j++)bag.push(c);});
    for(let i=bag.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[bag[i],bag[j]]=[bag[j],bag[i]];}
    const t=[];
    for(let i=0;i<lv.colors;i++)t.push(bag.slice(i*lv.K,(i+1)*lv.K));
    for(let i=0;i<lv.empty;i++)t.push([]);
    if(isMixed(t)&&solvable(t,lv.K))return t;
  }
  // respaldo: barajado simple
  return fallbackLevel(lv);
}
function isMixed(t){return t.some(tube=>tube.length>1 && new Set(tube).size>1);}
function fallbackLevel(lv){
  const cols=ORDER.slice(0,lv.colors),t=[];
  cols.forEach(c=>t.push(Array(lv.K).fill(c)));
  for(let i=0;i<lv.empty;i++)t.push([]);
  // mezcla con movimientos legales aleatorios
  for(let s=0;s<200;s++){
    const legal=[];
    for(let a=0;a<t.length;a++)for(let b=0;b<t.length;b++)if(a!==b&&canMove(t,a,b,lv.K))legal.push([a,b]);
    if(!legal.length)break;
    const[a,b]=legal[Math.floor(Math.random()*legal.length)];
    doMoveArr(t,a,b,lv.K);
  }
  return t;
}

/* helpers de estado */
function topColor(tube){return tube.length?tube[tube.length-1]:null;}
function runLen(tube){if(!tube.length)return 0;const c=tube[tube.length-1];let n=0;for(let i=tube.length-1;i>=0&&tube[i]===c;i--)n++;return n;}
function canMove(t,a,b,k){if(a===b||!t[a].length||t[b].length>=k)return false;return t[b].length===0||topColor(t[b])===topColor(t[a]);}
function doMoveArr(t,a,b,k){const c=topColor(t[a]);let n=Math.min(runLen(t[a]),k-t[b].length);while(n-->0){t[b].push(t[a].pop());}}
function isWin(t){return t.every(tube=>tube.length===0||new Set(tube).size===1);}

/* ── Solver (¿resoluble?) ── */
function solvable(start,k){
  const key=st=>st.map(x=>x.join('')).sort().join('|');
  const stack=[start.map(x=>x.slice())];const seen=new Set([key(start)]);let nodes=0;
  while(stack.length){
    if(++nodes>120000)return false;
    const st=stack.pop();
    if(isWin(st))return true;
    for(let a=0;a<st.length;a++){
      if(!st[a].length)continue;
      // no mover un tubo ya completo/uniforme lleno
      if(new Set(st[a]).size===1 && (st[a].length===k))continue;
      for(let b=0;b<st.length;b++){
        if(!canMove(st,a,b,k))continue;
        // evita mover a otro vacío si origen es uniforme (movimiento inútil)
        if(st[b].length===0 && new Set(st[a]).size===1)continue;
        const ns=st.map(x=>x.slice());doMoveArr(ns,a,b,k);
        const kk=key(ns);
        if(!seen.has(kk)){seen.add(kk);stack.push(ns);}
      }
    }
  }
  return false;
}

/* ── EMPEZAR NIVEL ── */
function startLevel(i){
  curLv=i;const lv=LEVELS[i];K=lv.K;
  tubes=genLevel(lv);
  initial=tubes.map(x=>x.slice());
  sel=null;moves=0;history=[];
  document.getElementById('g-title').textContent='Nivel '+(i+1)+' · '+lv.name;
  updateMoves();
  render();
  closeWin();
  go('v-game');
}
function restart(){
  tubes=initial.map(x=>x.slice());
  sel=null;moves=0;history=[];updateMoves();render();
}

function updateMoves(){document.getElementById('g-moves').textContent=moves+' mov.';document.getElementById('undo-btn').disabled=history.length===0;}

/* ── RENDER ── */
function render(){
  const cont=document.getElementById('tubes');
  const n=tubes.length;
  const perRow=n<=5?n:Math.ceil(n/2);
  const gap=16, pad=10, border=6;                 // gap entre tubos + padding + borde
  const avail=Math.min(440,window.innerWidth-28);
  let slot=Math.floor((avail-perRow*gap)/perRow)-pad-border;
  slot=Math.max(28,Math.min(46,slot));
  const tubeOuter=slot+pad+border;
  cont.style.maxWidth=(perRow*tubeOuter+(perRow-1)*gap+2)+'px';  // fuerza el salto de fila
  cont.innerHTML='';
  tubes.forEach((tube,i)=>{
    const t=document.createElement('div');
    t.className='tube'+(sel===i?' sel':'')+(tube.length&&new Set(tube).size===1&&tube.length===K?' win':'');
    t.style.width=(slot+10)+'px';
    t.style.minHeight=(K*(slot+4)+10)+'px';
    t.onclick=()=>tapTube(i);
    tube.forEach((col,gi)=>{
      const g=document.createElement('div');
      g.className='gem';
      const isTopSel=sel===i && gi>=tube.length-runLen(tube);
      if(isTopSel)g.classList.add('lift');
      g.style.width=g.style.height=slot+'px';
      g.style.background=gemBg(col);
      g.innerHTML=`<span class="glyph">${col}</span>`;
      t.appendChild(g);
    });
    cont.appendChild(t);
  });
}

/* ── INTERACCIÓN ── */
function tapTube(i){
  if(sel===null){
    if(!tubes[i].length)return;
    sel=i;beep(700,.07);render();
    document.getElementById('g-hint').textContent='Ahora toca dónde soltarla';
    return;
  }
  if(sel===i){sel=null;render();document.getElementById('g-hint').textContent='Toca un tubo para coger la joya de arriba';return;}
  if(canMove(tubes,sel,i,K)){
    history.push(tubes.map(x=>x.slice()));
    doMoveArr(tubes,sel,i,K);
    moves++;sel=null;updateMoves();
    beep(760+moves*3,.07);vib(12);
    render();
    document.getElementById('g-hint').textContent='';
    if(isWin(tubes))setTimeout(winLevel,350);
  }else{
    // movimiento no válido: aviso suave, cambia selección si el destino tiene joyas
    const el=document.querySelectorAll('.tube')[i];
    if(el){el.classList.add('nope');setTimeout(()=>el.classList.remove('nope'),300);}
    vib(20);
    sel=tubes[i].length?i:null;render();
  }
}
function undo(){
  if(!history.length)return;
  tubes=history.pop();sel=null;moves=Math.max(0,moves-1);updateMoves();render();
  beep(500,.08);
}

/* ── GANAR ── */
function winLevel(){
  markDone(curLv);
  document.querySelectorAll('.tube').forEach(t=>t.classList.add('win'));
  beep(880,.16);setTimeout(()=>beep(1120,.22),160);vib([60,40,90]);
  // revela un dibujo
  const art=ART[curLv%ART.length];
  const w=art.grid[0].length;
  const cell=Math.min(22,Math.floor(240/w));
  const el=document.getElementById('win-art');
  el.style.gridTemplateColumns=`repeat(${w},${cell}px)`;
  const flat=art.grid.join('').split('');
  el.innerHTML=flat.map((ch,idx)=>`<i class="rv" style="width:${cell}px;height:${cell}px;background:${ch==='.'?'transparent':(GEMS[ch]||'#ccc')};animation-delay:${idx*0.012}s"></i>`).join('');
  document.getElementById('win-art-name').textContent='Has revelado: '+art.name;
  const nb=document.getElementById('win-next');
  const next=curLv+1;
  if(next<LEVELS.length){nb.textContent='Nivel '+(next+1)+' →';nb.style.display='';nb.onclick=()=>startLevel(next);}
  else{nb.textContent='¡Todos hechos! 🏆';nb.style.display='';nb.onclick=()=>{closeWin();go('v-pick');};}
  document.getElementById('win-ov').classList.add('show');
  sparkle();
}
function closeWin(){document.getElementById('win-ov').classList.remove('show');}
function sparkle(){
  const ov=document.getElementById('win-ov');
  const em=['✨','💎','⭐','💛','🌟'];
  for(let i=0;i<16;i++){
    const s=document.createElement('span');
    s.className='spark';s.textContent=em[i%em.length];
    s.style.left=(8+Math.random()*84)+'%';s.style.top=(12+Math.random()*70)+'%';
    s.style.animationDelay=(Math.random()*.6)+'s';
    ov.appendChild(s);setTimeout(()=>s.remove(),1900);
  }
}

window.addEventListener('resize',()=>{if(document.getElementById('v-game').classList.contains('active'))render();});

/* ── Boot ── */
renderPicker();
</script>
</body>
</html>
