<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Botiquín Emocional — Cris</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--teal:#26a69a;--teal-dark:#1a6b64;--teal-light:#4dd0e1;--mint:#d6f0eb;--mint-mid:#b8e4dd;--mint-soft:#e8f8f5;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Outfit',sans-serif;background:var(--mint);min-height:100vh;color:var(--teal-dark)}
.screen{display:none;min-height:100vh;padding:16px 16px 80px}
.screen.active{display:block}
.mw{max-width:440px;margin:0 auto;padding-top:8px}
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.back{background:rgba(26,107,100,.12);border:none;border-radius:50%;width:44px;height:44px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--teal-dark);font-weight:700}
.topbar h1{font-size:1.1rem;font-weight:700;color:var(--teal-dark)}
.home-hdr{text-align:center;margin-bottom:14px}
.home-hdr h1{font-size:1.5rem;font-weight:800;color:var(--teal-dark)}
.home-hdr p{font-size:.85rem;color:var(--teal);margin-top:3px}
.home-q{display:flex;justify-content:center;margin-bottom:18px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.acard{border:none;border-radius:20px;padding:18px 20px;font-family:'Outfit',sans-serif;cursor:pointer;text-align:left;display:flex;align-items:center;gap:16px;width:100%;transition:transform .1s,filter .1s;margin-bottom:10px}
.acard:active{transform:scale(.97);filter:brightness(.92)}
.aicon{font-size:2rem;flex-shrink:0;line-height:1}
.ainfo{display:flex;flex-direction:column;gap:3px}
.atitle{font-size:1rem;font-weight:800;color:#fff}
.asub{font-size:.76rem;font-weight:500;color:rgba(255,255,255,.88)}
.c-sos{background:linear-gradient(135deg,#ef4444,#f97316)}
.c-know{background:linear-gradient(135deg,var(--teal-dark),var(--teal))}
.c-find{background:linear-gradient(135deg,#7c3aed,#a855f7)}
.c-calm{background:rgba(255,255,255,.7);border:2px solid var(--mint-mid)!important}
.c-calm .atitle{color:var(--teal-dark)}
.c-calm .asub{color:var(--teal)}
.slabel{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--teal);margin:16px 0 8px}
.tlist{display:flex;flex-direction:column;gap:8px}
.titem{background:rgba(255,255,255,.82);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;width:100%;text-align:left;border:2px solid var(--mint-mid);transition:transform .1s}
.titem:active{transform:scale(.98)}
.tico{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.tinfo h3{font-size:.92rem;font-weight:700;color:var(--teal-dark)}
.tinfo p{font-size:.74rem;color:var(--teal);margin-top:2px;line-height:1.3}
.tcard{background:rgba(255,255,255,.88);border-radius:20px;padding:20px;box-shadow:0 4px 16px rgba(38,166,154,.1);margin-bottom:16px}
.ttag{display:inline-block;padding:3px 12px;border-radius:999px;font-size:.72rem;font-weight:700;margin-bottom:10px;color:#fff}
.tdesc{font-size:.82rem;color:var(--teal);margin-bottom:14px;line-height:1.4}
.sbox{background:var(--mint-soft);border-radius:16px;padding:20px;text-align:center;margin-bottom:14px;border:2px solid var(--mint-mid)}
/* Círculo de respiración: respira a la vez que él */
.breath-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 0 8px;}
.breath-circle{width:110px;height:110px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#a7e8df,var(--teal));box-shadow:0 0 42px rgba(38,166,154,.4);animation:breathe-anim var(--bdur,10s) ease-in-out infinite;}
.breath-circle.paused{animation-play-state:paused;}
.breath-hint{font-size:.74rem;color:var(--teal-dark);font-weight:600;margin-top:12px;opacity:.75;}
.snum{font-size:.72rem;font-weight:700;color:var(--teal);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.sname{font-size:1.4rem;font-weight:800;color:var(--teal-dark);margin-bottom:8px}
.sinstr{font-size:.88rem;color:#3d5a58;line-height:1.5}
.stimer{font-size:3.5rem;font-weight:800;color:var(--teal);margin:12px 0 4px;font-variant-numeric:tabular-nums}
.dots{display:flex;justify-content:center;gap:6px;margin-bottom:14px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--mint-mid);transition:background .3s}
.dot.done{background:var(--teal)}.dot.active{background:var(--teal-light);transform:scale(1.3)}
.pbar{background:var(--mint-mid);border-radius:999px;height:4px;margin-bottom:8px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--teal-dark),var(--teal-light));border-radius:999px;transition:width .5s}
.btn{border:none;border-radius:12px;padding:14px 18px;font-family:'Outfit',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;transition:transform .1s,filter .1s}
.btn:active{transform:scale(.97);filter:brightness(.92)}
.bpri{background:linear-gradient(135deg,var(--teal-dark),var(--teal));color:#fff}
.bsec{background:rgba(255,255,255,.82);color:var(--teal-dark);border:2px solid var(--mint-mid)}
.bful{width:100%}
.brow{display:flex;gap:10px}.brow .btn{flex:1}
.done{background:linear-gradient(135deg,var(--teal-dark),var(--teal));color:#fff;border-radius:20px;padding:28px;text-align:center;margin-bottom:18px}
.done .big{font-size:3rem;margin-bottom:8px}
.done h2{font-size:1.3rem;font-weight:800;margin-bottom:6px}
.done p{font-size:.88rem;opacity:.9}
.egrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.etile{border:none;border-radius:18px;padding:18px 12px;font-family:'Outfit',sans-serif;cursor:pointer;text-align:center;transition:transform .1s;display:flex;flex-direction:column;align-items:center;gap:6px}
.etile:active{transform:scale(.96)}
.etile .be{font-size:2.2rem}
.etile .el{font-size:.85rem;font-weight:700;color:rgba(0,0,0,.65)}
.ecard{background:rgba(255,255,255,.92);border-radius:20px;padding:22px;margin-bottom:14px;box-shadow:0 4px 20px rgba(38,166,154,.1)}
.ehead{text-align:center;margin-bottom:18px}
.ebig{font-size:3.5rem;display:block;margin-bottom:6px}
.ename{font-size:1.4rem;font-weight:800;color:var(--teal-dark)}
.irow{background:var(--mint-soft);border-radius:12px;padding:13px;margin-bottom:9px;border:2px solid var(--mint-mid)}
.irow.hi{border-color:var(--teal)}
.ilbl{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--teal);margin-bottom:4px}
.ival{font-size:.92rem;font-weight:700;color:var(--teal-dark)}
.isub{font-size:.76rem;color:var(--teal);margin-top:3px;line-height:1.3}
.qcard{background:rgba(255,255,255,.88);border-radius:20px;padding:22px;margin-bottom:14px;border:2px solid var(--mint-mid)}
.qcard h2{font-size:1.05rem;font-weight:700;color:var(--teal-dark);margin-bottom:14px;line-height:1.3}
.qopts{display:flex;flex-direction:column;gap:8px}
.qbtn{background:var(--mint-soft);border:2px solid var(--mint-mid);border-radius:12px;padding:14px 16px;text-align:left;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:600;color:var(--teal-dark);width:100%;line-height:1.3}
.qbtn:active{border-color:var(--teal);background:var(--mint-mid)}
.mlist{display:flex;flex-direction:column;gap:10px}
.mitem{background:rgba(255,255,255,.82);border-radius:16px;padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;border:2px solid var(--mint-mid);width:100%;text-align:left;transition:transform .1s}
.mitem:active{transform:scale(.98)}
.mico{font-size:2rem;flex-shrink:0}
.minfo h3{font-size:.95rem;font-weight:700;color:var(--teal-dark)}
.minfo p{font-size:.78rem;color:var(--teal);margin-top:2px}
.sprow{display:flex;gap:8px;margin-bottom:18px}
.spbtn{flex:1;padding:10px;border:2px solid var(--mint-mid);border-radius:10px;background:rgba(255,255,255,.7);font-family:'Outfit',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;color:var(--teal)}
.spbtn.active{border-color:var(--teal);background:var(--teal);color:#fff}

.calm *,.calm *::before,.calm *::after{animation:none !important;transition:none !important}

/* Anillo de tiempo: se vacía según pasa — para ver cuánto queda sin leer números */
.tring{width:176px;height:176px;border-radius:50%;margin:4px auto 10px;display:flex;align-items:center;justify-content:center;background:conic-gradient(#26a69a 360deg,#cde9e4 0);flex-shrink:0;}
.tring-in{width:144px;height:144px;border-radius:50%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px;text-align:center;}
.tring{width:150px;height:150px}.tring-in{width:120px;height:120px;background:var(--mint-soft)}.tring .stimer{font-size:2.2rem;margin:0}
</style>
</head>
<body>

<div id="v-home" class="screen active">
<div class="mw">
  <div class="home-hdr">
    <h1>Botiquín Emocional 🧰</h1>
    <p>¿Qué necesitas ahora mismo?</p>
  </div>
  <div class="home-q">
    <svg viewBox="0 0 110 130" width="96" height="112" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="28" cy="22" rx="13" ry="16" fill="#33b5a7"/><ellipse cx="82" cy="22" rx="13" ry="16" fill="#33b5a7"/>
      <ellipse cx="28" cy="23" rx="7" ry="9" fill="#5dcfc2"/><ellipse cx="82" cy="23" rx="7" ry="9" fill="#5dcfc2"/>
      <ellipse cx="55" cy="93" rx="34" ry="36" fill="#33b5a7"/>
      <ellipse cx="55" cy="97" rx="20" ry="25" fill="#5dcfc2" opacity=".65"/>
      <circle cx="55" cy="50" r="30" fill="#33b5a7"/>
      <circle cx="43" cy="47" r="6" fill="#0f4d47"/><circle cx="45" cy="45" r="2.5" fill="white"/>
      <circle cx="67" cy="47" r="6" fill="#0f4d47"/><circle cx="69" cy="45" r="2.5" fill="white"/>
      <ellipse cx="55" cy="58" rx="5" ry="4" fill="#0f4d47"/>
      <path d="M46 65 Q55 74 64 65" stroke="#0f4d47" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <ellipse cx="23" cy="96" rx="11" ry="8" fill="#33b5a7" transform="rotate(-20 23 96)"/>
      <ellipse cx="87" cy="96" rx="11" ry="8" fill="#33b5a7" transform="rotate(20 87 96)"/>
      <ellipse cx="42" cy="126" rx="12" ry="6" fill="#2da098"/><ellipse cx="68" cy="126" rx="12" ry="6" fill="#2da098"/>
    </svg>
  </div>
  <button class="acard c-sos" onclick="go('techniques')">
    <span class="aicon">🚨</span>
    <div class="ainfo"><span class="atitle">NECESITO AYUDA YA</span><span class="asub">Técnicas para salir del bucle ahora mismo</span></div>
  </button>
  <button class="acard c-know" onclick="go('emotions')">
    <span class="aicon">💭</span>
    <div class="ainfo"><span class="atitle">SÉ QUÉ SIENTO</span><span class="asub">Entiende tu emoción y qué puedes hacer</span></div>
  </button>
  <button class="acard c-find" onclick="go('find-emotion')">
    <span class="aicon">❓</span>
    <div class="ainfo"><span class="atitle">NO SÉ QUÉ SIENTO</span><span class="asub">Ayúdame a identificar lo que me pasa</span></div>
  </button>
  <button class="acard c-calm" onclick="go('meditations')">
    <span class="aicon">🧘</span>
    <div class="ainfo"><span class="atitle">MEDITAR</span><span class="asub">Meditaciones guiadas para calmarme</span></div>
  </button>
</div>
</div>

<div id="v-techniques" class="screen">
<div class="mw">
  <div class="topbar">
    <button class="back" onclick="go('home')">←</button>
    <h1>Técnicas de Rescate</h1>
  </div>
  <div id="tech-list"></div>
</div>
</div>

<div id="v-technique-detail" class="screen">
<div class="mw">
  <div class="topbar">
    <button class="back" id="tec-back">←</button>
    <h1 id="tec-title">Técnica</h1>
  </div>
  <div id="tec-content"></div>
</div>
</div>

<div id="v-emotions" class="screen">
<div class="mw">
  <div class="topbar">
    <button class="back" onclick="go('home')">←</button>
    <h1>¿Qué sientes?</h1>
  </div>
  <p style="font-size:.83rem;color:var(--teal);margin-bottom:14px">Toca lo que más se acerca a lo que sientes ahora mismo</p>
  <div class="egrid" id="emo-grid"></div>
</div>
</div>

<div id="v-emotion-detail" class="screen">
<div class="mw">
  <div class="topbar">
    <button class="back" id="emo-back">←</button>
    <h1>Tu emoción</h1>
  </div>
  <div id="emo-detail"></div>
</div>
</div>

<div id="v-find-emotion" class="screen">
<div class="mw">
  <div class="topbar">
    <button class="back" onclick="go('home')">←</button>
    <h1>Vamos a descubrirlo</h1>
  </div>
  <div id="find-content"></div>
</div>
</div>

<div id="v-meditations" class="screen">
<div class="mw">
  <div class="topbar">
    <button class="back" onclick="go('home')">←</button>
    <h1>Meditaciones</h1>
  </div>
  <div class="mlist" id="med-list"></div>
</div>
</div>

<div id="v-meditation-detail" class="screen">
<div class="mw">
  <div class="topbar">
    <button class="back" onclick="stopTimer();go('meditations')">←</button>
    <h1 id="med-title"></h1>
  </div>
  <div class="sprow">
    <button class="spbtn" id="sp-lento" onclick="setSpeed('lento')">Lento</button>
    <button class="spbtn active" id="sp-normal" onclick="setSpeed('normal')">Normal</button>
    <button class="spbtn" id="sp-rapido" onclick="setSpeed('rapido')">Rápido</button>
  </div>
  <div id="med-content"></div>
</div>
</div>

<script>
/* Ajustes globales (voz/sonido/vibración/reducir estímulos) — compartidos vía localStorage */
function __cfg(){try{return JSON.parse(localStorage.getItem('cris_cfg')||'{}');}catch(e){return{};}}
function __allow(k){const c=__cfg();return c[k]!==false&&c.calm!==true;}
if(__cfg().calm)document.documentElement.classList.add('calm');

function __ring(id,frac){const r=document.getElementById(id);if(r)r.style.background='conic-gradient(#26a69a '+(Math.max(0,Math.min(1,frac))*360)+'deg,#cde9e4 0)';}

const RESCUES = [
  { id:3, name:"Agua fría (crisis)", icon:"🧊", color:"#0ea5e9",
    when:"Cuando la emoción es insoportable — crisis total",
    desc:"Cambia tu química corporal en segundos",
    steps:[
      {text:"AGUA FRÍA",instruction:"Pon agua fría en tu cara o muñecas durante 30 segundos. Activa el reflejo de inmersión",time:30},
      {text:"MUÉVETE",instruction:"Corre en el sitio o haz saltos con toda tu energía",time:60},
      {text:"PARA",instruction:"Para. Respira. Siente cómo tu cuerpo empieza a calmarse",time:30},
      {text:"RELAJA",instruction:"Relaja hombros, mandíbula, manos. Músculo a músculo",time:30}
    ]},
  { id:2, name:"Respiración 4-7-8", icon:"🌬️", color:"#10b981",
    when:"Cuando la ansiedad o el pánico se activan",
    desc:"Calma el sistema nervioso en minutos",
    steps:[
      {text:"INHALA 4",instruction:"Inhala lentamente por la nariz contando hasta 4",time:4},
      {text:"MANTÉN 7",instruction:"Retén el aire suavemente, cuenta hasta 7",time:7},
      {text:"EXHALA 8",instruction:"Exhala completamente por la boca en 8 tiempos. Suelta todo",time:8},
      {text:"INHALA 4",instruction:"Segunda ronda — inhala de nuevo por la nariz",time:4},
      {text:"MANTÉN 7",instruction:"Retén suavemente",time:7},
      {text:"EXHALA 8",instruction:"Exhala todo. Nota cómo te vas calmando",time:8}
    ]},
  { id:1, name:"5-4-3-2-1", icon:"👁️", color:"#3b82f6",
    when:"Cuando tu mente no para de girar o estás disociada",
    desc:"Ancla los sentidos al momento presente",
    steps:[
      {text:"5 VES",instruction:"Nombra 5 cosas que puedes ver ahora mismo a tu alrededor",time:25},
      {text:"4 TOCAS",instruction:"Siente 4 texturas distintas con tus manos. ¿Cómo son?",time:25},
      {text:"3 ESCUCHAS",instruction:"Identifica 3 sonidos diferentes a tu alrededor",time:20},
      {text:"2 HUELES",instruction:"Encuentra 2 aromas en el ambiente donde estás",time:15},
      {text:"1 SABOREAS",instruction:"Detecta el sabor que hay en tu boca ahora mismo",time:10}
    ]},
  { id:4, name:"Movimiento", icon:"🏃", color:"#f59e0b",
    when:"Cuando sientes tensión, rabia o frustración acumulada",
    desc:"Descarga el cortisol con movimiento",
    steps:[
      {text:"SACUDE",instruction:"Sacude brazos y piernas durante 30 segundos. Déjalo caer todo",time:30},
      {text:"SALTA",instruction:"10 saltos de tijera. Cuenta en voz alta mientras los haces",time:20},
      {text:"RESPIRA",instruction:"Manos en rodillas, inclinada. Respira profundo 3 veces",time:15},
      {text:"OBSERVA",instruction:"¿Cómo está tu cuerpo ahora? Nótalo sin juzgar",time:15}
    ]},
  { id:7, name:"Defusión cognitiva", icon:"🧠", color:"#6366f1",
    when:"Cuando un pensamiento te engancha y no puedes parar",
    desc:"Crea distancia del pensamiento sin luchar",
    steps:[
      {text:"IDENTIFICA",instruction:"¿Cuál es el pensamiento que más te engancha ahora? Solo uno",time:15},
      {text:"NÓMBRALO",instruction:"Di en voz alta: 'Estoy teniendo el pensamiento de que...' y complétalo",time:15},
      {text:"AGRADECE",instruction:"Di a tu mente: 'Gracias por el aviso. No necesito actuar ahora'",time:15},
      {text:"VUELVE",instruction:"Pon atención en algo físico: la silla, tus pies, el aire que entra",time:15}
    ]},
  { id:6, name:"Auto-compasión", icon:"🤍", color:"#ec4899",
    when:"Cuando te castigas, sientes culpa o vergüenza",
    desc:"Trátate como tratarías a alguien que quieres",
    steps:[
      {text:"RECONOCE",instruction:"Pon una mano en el corazón. Esto es dolor, y es real. No lo minimices",time:15},
      {text:"HUMANIDAD",instruction:"Recuerda: todas las personas sufrimos a veces. No estás sola",time:15},
      {text:"AMABILIDAD",instruction:"Di en voz baja: 'Que esté bien. Que me trate con cariño'",time:20},
      {text:"QUÉDATE",instruction:"Siente el calor de tu mano en el pecho. Respira. Aquí está el consuelo",time:20}
    ]},
  { id:5, name:"Escritura libre", icon:"✍️", color:"#8b5cf6",
    when:"Cuando necesitas sacar lo que tienes dentro",
    desc:"Vacía la mente sin filtros",
    steps:[
      {text:"PREPARA",instruction:"Coge papel o notas. Sin filtros — lo que salga está bien",time:10},
      {text:"ESCRIBE",instruction:"Escribe todo lo que sientes sin parar, sin borrar. Que fluya",time:120},
      {text:"LEE",instruction:"Lee lo que escribiste una vez. Sin juzgar",time:30},
      {text:"SUELTA",instruction:"Cierra o guarda. Ya salió de ti. Eso es suficiente",time:10}
    ]},
  { id:8, name:"Conectar", icon:"📞", color:"#14b8a6",
    when:"Cuando te sientes sola o aislada",
    desc:"Un gesto pequeño rompe el aislamiento",
    steps:[
      {text:"ELIGE",instruction:"Piensa en una persona con la que te sientas segura. Solo una",time:10},
      {text:"CONTACTA",instruction:"Mándale un audio, un mensaje o llámala ahora mismo",time:60},
      {text:"RECIBE",instruction:"Si no puede responder, está bien. Ya hiciste el gesto — eso cuenta",time:15},
      {text:"RECONOCE",instruction:"Has roto el aislamiento. Eso es valentía",time:10}
    ]}
];

const TEC_GROUPS = [
  {label:"🔥 Para cuando estás en crisis total", ids:[3]},
  {label:"😨 Para el miedo — anclarte a lo seguro", ids:[1,2]},
  {label:"🫁 Para calmar la ansiedad o el pánico", ids:[2]},
  {label:"👁️ Para salir del bucle mental", ids:[1]},
  {label:"💪 Para descargar rabia o frustración", ids:[4]},
  {label:"🧠 Para el pensamiento que te engancha", ids:[7]},
  {label:"🤍 Para la culpa o la vergüenza", ids:[6]},
  {label:"✍️ Para soltar lo que pesa", ids:[5]},
  {label:"🫂 Para cuando te sientes sola", ids:[8]}
];

const EMOTIONS = [
  {id:'ansiedad', emoji:'😰', label:'Ansiedad', color:'#fef3c7',
    impulse:'Evitar o escapar de lo que da miedo',
    need:'Sentirte segura',
    helps:'Respiración lenta', helpsDesc:'Calma el sistema nervioso activado', tecId:2},
  {id:'miedo', emoji:'😨', label:'Miedo', color:'#e0e7ff',
    impulse:'Huir, congelarte o buscar protección',
    need:'Sentirte a salvo y protegida',
    helps:'Anclarte al aquí y ahora', helpsDesc:'Nombra lo que ves y tocas: el peligro no está en este momento', tecId:1},

function medDur(m){const s=m.steps.reduce((a,x)=>a+x.time,0);return Math.max(1,Math.round(s/60))+' min';}

const SPEED = {lento:1.5, normal:1, rapido:0.7};
const S = {
  view:'home',
  tecCurrent:null, tecStep:0, tecPlaying:false, tecTimer:0, tecDone:false, tecSource:'techniques',
  emoSource:'emotions', findStep:0, findMatches:[],
  medCurrent:null, medStep:0, medPlaying:false, medTimer:0, medSpeed:'normal', medDone:false
};
let timerInterval = null;

function beep(f=600,d=0.2){if(!__allow('sound'))return;try{const c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.setValueAtTime(0.3,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
function vibrate(ms=80){if(!__allow('vib'))return;try{if(navigator.vibrate)navigator.vibrate(ms);}catch(e){}}
let _utt=null;
function speak(t){
  try{if(!__allow('voice'))return;
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    if(window.speechSynthesis.paused)window.speechSynthesis.resume();
    _utt=new SpeechSynthesisUtterance(t);
    _utt.lang='es-ES';_utt.rate=0.9;
    const voices=window.speechSynthesis.getVoices();
    const esVoice=voices.find(v=>v.lang.startsWith('es'));
    if(esVoice)_utt.voice=esVoice;
    window.speechSynthesis.speak(_utt);
  }catch(e){}
}
function stopTimer(){if(timerInterval){clearInterval(timerInterval);timerInterval=null;}try{if(window.speechSynthesis)window.speechSynthesis.cancel();}catch(e){}}

function go(view){
  stopTimer();
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('v-'+view).classList.add('active');
  S.view=view;
  if(view==='techniques') renderTecList();
  if(view==='emotions') renderEmoGrid();
  if(view==='find-emotion'){S.findStep=0;S.findMatches=[];renderFind();}
  if(view==='meditations') renderMedList();
}

function renderTecList(){
  document.getElementById('tech-list').innerHTML = TEC_GROUPS.map(g=>`
    <div class="slabel">${g.label}</div>
    <div class="tlist">
    ${g.ids.map(id=>{const t=RESCUES.find(r=>r.id===id);return`
      <button class="titem" onclick="startTec(${t.id},'techniques')">
        <div class="tico" style="background:${t.color}22">${t.icon}</div>
        <div class="tinfo"><h3>${t.name}</h3><p>${t.desc}</p></div>
      </button>`;}).join('')}
    </div>`).join('');
}

function startTec(id, source){
  beep(400); vibrate(50);
  S.tecCurrent=RESCUES.find(r=>r.id===id);
  S.tecStep=0; S.tecPlaying=false; S.tecTimer=0; S.tecDone=false; S.tecSource=source||'techniques';
  document.getElementById('tec-title').textContent=S.tecCurrent.name;
  document.getElementById('tec-back').onclick=()=>{stopTimer();go(S.tecSource);};
  go('technique-detail');
  renderTec();
}

function renderTec(){
  const tec=S.tecCurrent; if(!tec)return;
  const el=document.getElementById('tec-content');
  if(S.tecDone){
    el.innerHTML=`<div class="done"><div class="big">🎉</div><h2>¡Lo conseguiste!</h2><p>${tec.name}</p></div>
      <p style="text-align:center;color:var(--teal);font-size:.88rem;margin-bottom:18px">¿Cómo te sientes ahora?</p>
      <div class="brow">
        <button class="btn bsec" onclick="go('home')">🏠 Inicio</button>
        <button class="btn bpri" onclick="go('techniques')">Otra técnica</button>
      </div>`;
    return;
  }
  const step=tec.steps[S.tecStep];
  const pct=(S.tecStep/tec.steps.length)*100;
  const dots=tec.steps.map((_,i)=>`<div class="dot ${i<S.tecStep?'done':i===S.tecStep?'active':''}" ></div>`).join('');
  el.innerHTML=`
    <div class="tcard">
      <span class="ttag" style="background:${tec.color}">${tec.icon} ${tec.name}</span>
      <div class="tdesc">${tec.desc}</div>
      <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
      <div class="dots">${dots}</div>
      <div class="sbox">
        <div class="snum">Paso ${S.tecStep+1} de ${tec.steps.length}</div>
        <div class="sname">${step.text}</div>
        <div class="sinstr">${step.instruction}</div>
        <div class="tring" id="tec-ring"><div class="tring-in"><div class="stimer" id="tec-timer">${S.tecPlaying?S.tecTimer:step.time}</div></div></div>
      </div>
    </div>
    <div class="brow">
      <button class="btn bsec" onclick="tecToggle()">${S.tecPlaying?'⏸ Pausar':'▶ Iniciar'}</button>
      <button class="btn bpri" onclick="tecNext()">Siguiente →</button>
    </div>`;
  __ring('tec-ring',(S.tecPlaying?S.tecTimer:step.time)/Math.max(1,step.time));
}

function tecToggle(){
  if(!S.tecPlaying){
    S.tecPlaying=true; S.tecTimer=S.tecCurrent.steps[S.tecStep].time;
    speak(S.tecCurrent.steps[S.tecStep].instruction);
    timerInterval=setInterval(tecTick,1000);
  } else {S.tecPlaying=false; stopTimer();}
  renderTec();
}
function tecTick(){S.tecTimer--;const el=document.getElementById('tec-timer');if(el)el.textContent=S.tecTimer;const _tt=S.tecCurrent.steps[S.tecStep].time;__ring('tec-ring',_tt?S.tecTimer/_tt:0);if(S.tecTimer<=0)tecAdv();}
function tecAdv(){
  stopTimer(); const tec=S.tecCurrent;
  if(S.tecStep<tec.steps.length-1){
    beep(600,0.15);vibrate(60);S.tecStep++;S.tecPlaying=true;S.tecTimer=tec.steps[S.tecStep].time;
    renderTec(); speak(tec.steps[S.tecStep].instruction); timerInterval=setInterval(tecTick,1000);
  } else {beep(800,0.2);setTimeout(()=>beep(1000,0.3),250);vibrate([80,50,80]);S.tecDone=true;S.tecPlaying=false;renderTec();}
}
function tecNext(){stopTimer();S.tecPlaying=false;tecAdv();}

function renderEmoGrid(){
  document.getElementById('emo-grid').innerHTML=EMOTIONS.map(e=>`
    <button class="etile" style="background:${e.color}" onclick="showEmo('${e.id}','emotions')">
      <span class="be">${e.emoji}</span><span class="el">${e.label}</span>
    </button>`).join('');
}

function showEmo(id, source){
  beep(400,0.1); vibrate(30);
  S.emoSource=source||'emotions';
  const e=EMOTIONS.find(x=>x.id===id);
  const tec=RESCUES.find(r=>r.id===e.tecId);
  document.getElementById('emo-back').onclick=()=>go(S.emoSource);
  document.getElementById('emo-detail').innerHTML=`
    <div class="ecard">
      <div class="ehead"><span class="ebig">${e.emoji}</span><div class="ename">${e.label}</div></div>
      <div class="irow"><div class="ilbl">Tu impulso va a ser...</div><div class="ival">${e.impulse}</div></div>
      <div class="irow"><div class="ilbl">Lo que realmente necesitas</div><div class="ival">${e.need}</div></div>
      <div class="irow hi">
        <div class="ilbl">Qué puede ayudarte ahora</div>
        <div class="ival">${e.helps}</div>
        <div class="isub">${e.helpsDesc}</div>
      </div>
    </div>
    <button class="btn bpri bful" onclick="startTec(${tec.id},'emotion-detail')">${tec.icon} Empezar: ${tec.name}</button>
    <button class="btn bsec bful" style="margin-top:10px" onclick="go('${S.emoSource}')">← Elegir otra emoción</button>`;
  go('emotion-detail');
}

function renderFind(){
  const el=document.getElementById('find-content');
  if(S.findStep===0){
    el.innerHTML=`
      <div class="qcard">
        <h2>¿Qué notas en tu cuerpo ahora mismo?</h2>
        <div class="qopts">
          ${BODY_OPTIONS.map((o,i)=>`<button class="qbtn" onclick="findPick(${i})">${o.label}</button>`).join('')}
        </div>
      </div>
      <p style="font-size:.78rem;color:var(--teal);text-align:center">Elige lo que más se acerca, no tiene que ser exacto</p>`;
  } else {
    const emos=S.findMatches.map(id=>EMOTIONS.find(e=>e.id===id)).filter(Boolean);
    el.innerHTML=`
      <div class="qcard"><h2>Puede que estés sintiendo...</h2></div>
      <div class="egrid">
        ${emos.map(e=>`<button class="etile" style="background:${e.color}" onclick="showEmo('${e.id}','find-emotion')">
          <span class="be">${e.emoji}</span><span class="el">${e.label}</span></button>`).join('')}
      </div>
      <button class="btn bsec bful" style="margin-top:4px" onclick="S.findStep=0;renderFind()">← Intentarlo de nuevo</button>`;
  }
}
function findPick(i){beep(400,0.1);vibrate(30);S.findMatches=BODY_OPTIONS[i].ids;S.findStep=1;renderFind();}

function renderMedList(){
  document.getElementById('med-list').innerHTML=MEDITATIONS.map(m=>`
    <button class="mitem" onclick="startMed(${m.id})">
      <span class="mico">${m.icon}</span>
      <div class="minfo"><h3>${m.name}</h3><p>${medDur(m)} · ${m.steps.length} pasos · avanza sola con voz</p></div>
    </button>`).join('');
}
function setBreathAnim(b){
  // Genera la animación del círculo con el ritmo de esta meditación
  const hold=b.hold||0, total=b.in+hold+b.out;
  const pIn=(b.in/total*100).toFixed(1), pHold=((b.in+hold)/total*100).toFixed(1);
  let st=document.getElementById('breath-style');
  if(!st){st=document.createElement('style');st.id='breath-style';document.head.appendChild(st);}
  st.textContent=`@keyframes breathe-anim{0%{transform:scale(.55)}${pIn}%{transform:scale(1)}${pHold}%{transform:scale(1)}100%{transform:scale(.55)}}`;
  document.documentElement.style.setProperty('--bdur',total+'s');
}
function breathHint(b){
  return b.hold?`Inhala ${b.in} · mantén ${b.hold} · exhala ${b.out}`:`Inhala ${b.in} · exhala ${b.out}`;
}
function startMed(id){
  beep(400);vibrate(40);
  S.medCurrent=MEDITATIONS.find(m=>m.id===id);
  S.medStep=0;S.medPlaying=false;S.medTimer=0;S.medDone=false;
  setBreathAnim(S.medCurrent.breath||{in:4,out:6});
  document.getElementById('med-title').textContent=S.medCurrent.name;
  go('meditation-detail'); renderMedStep();
}
function setSpeed(sp){
  S.medSpeed=sp;
  ['lento','normal','rapido'].forEach(s=>document.getElementById('sp-'+s).classList.toggle('active',s===sp));
}
function renderMedStep(){
  const med=S.medCurrent; if(!med)return;
  const el=document.getElementById('med-content');
  if(S.medDone){
    el.innerHTML=`<div class="done"><div class="big">🙏</div><h2>Meditación completada</h2><p>${med.name}</p></div>
      <div class="brow">
        <button class="btn bsec" onclick="go('meditations')">← Lista</button>
        <button class="btn bpri" onclick="startMed(${med.id})">Repetir</button>
      </div>`;
    return;
  }
  const step=med.steps[S.medStep];
  const pct=(S.medStep/med.steps.length)*100;
  const dots=med.steps.map((_,i)=>`<div class="dot ${i<S.medStep?'done':i===S.medStep?'active':''}" ></div>`).join('');
  const t=S.medPlaying?S.medTimer:Math.round(step.time*SPEED[S.medSpeed]);
  const b=med.breath||{in:4,out:6};
  el.innerHTML=`
    <div class="tcard">
      <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
      <div class="dots" style="margin-top:8px">${dots}</div>
      <div class="breath-wrap">
        <div class="breath-circle${S.medPlaying?'':' paused'}"></div>
        <div class="breath-hint">🌬️ Respira con el círculo · ${breathHint(b)}</div>
      </div>
      <div class="sbox">
        <div class="snum">Paso ${S.medStep+1} de ${med.steps.length}</div>
        <div class="sname">${step.text}</div>
        <div class="sinstr">${step.instruction}</div>
        <div class="tring" id="med-ring"><div class="tring-in"><div class="stimer" id="med-timer">${t}</div></div></div>
      </div>
    </div>
    <div class="brow">
      <button class="btn bsec" onclick="medToggle()">${S.medPlaying?'⏸ Pausar':'▶ Iniciar'}</button>
      <button class="btn bpri" onclick="medNext()">Siguiente →</button>
    </div>`;
  __ring('med-ring',t/Math.max(1,Math.round(step.time*SPEED[S.medSpeed])));
}
function medToggle(){
  if(!S.medPlaying){
    S.medPlaying=true;const step=S.medCurrent.steps[S.medStep];
    S.medTimer=Math.round(step.time*SPEED[S.medSpeed]);speak(step.instruction);
    timerInterval=setInterval(medTick,1000);
  } else {S.medPlaying=false;stopTimer();}
  renderMedStep();
}
function medTick(){S.medTimer--;const el=document.getElementById('med-timer');if(el)el.textContent=S.medTimer;const _mt=Math.round(S.medCurrent.steps[S.medStep].time*SPEED[S.medSpeed]);__ring('med-ring',_mt?S.medTimer/_mt:0);if(S.medTimer<=0)medAdv();}
function medAdv(){
  stopTimer(); const med=S.medCurrent;
  if(S.medStep<med.steps.length-1){
    beep(500,0.2);vibrate(40);S.medStep++;S.medPlaying=true;
    S.medTimer=Math.round(med.steps[S.medStep].time*SPEED[S.medSpeed]);
    renderMedStep();speak(med.steps[S.medStep].instruction);timerInterval=setInterval(medTick,1000);
  } else {beep(700,0.3);setTimeout(()=>beep(900,0.4),300);vibrate([60,40,60]);S.medDone=true;S.medPlaying=false;renderMedStep();}
}
function medNext(){stopTimer();S.medPlaying=false;medAdv();}
</script>
