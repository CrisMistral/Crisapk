<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Botiquín Emocional — Cris</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--teal:#26a69a;--teal-dark:#1a6b64;--teal-light:#4dd0e1;--mint:#d6f0eb;--mint-mid:#b8e4dd;--mint-soft:#e8f8f5;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Outfit',sans-serif;background:var(--mint);min-height:100vh;color:var(--teal-dark)}
.screen{display:none;min-height:100vh;padding:16px 16px 100px}
.screen.active{display:block}
.mw{max-width:440px;margin:0 auto;padding-top:8px}
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.back{background:rgba(26,107,100,.12);border:none;border-radius:50%;width:44px;height:44px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--teal-dark);font-weight:700}
.topbar h1{font-size:1.1rem;font-weight:700;color:var(--teal-dark)}
.home-hdr{text-align:center;margin-bottom:14px}
.home-hdr h1{font-size:1.5rem;font-weight:800;color:var(--teal-dark)}
.home-hdr p{font-size:.85rem;color:var(--teal);margin-top:3px}
.home-q{display:flex;justify-content:center;margin-bottom:18px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.acard{border:none;border-radius:20px;padding:18px 20px;font-family:'Outfit',sans-serif;cursor:pointer;text-align:left;display:flex;align-items:center;gap:16px;width:100%;transition:transform .1s,filter .1s;margin-bottom:10px}
.acard:active{transform:scale(.97);filter:brightness(.92)}
.aicon{font-size:2rem;flex-shrink:0;line-height:1}
.ainfo{display:flex;flex-direction:column;gap:3px}
.atitle{font-size:1rem;font-weight:800;color:#fff}
.asub{font-size:.76rem;font-weight:500;color:rgba(255,255,255,.88)}
.c-sos{background:linear-gradient(135deg,#ef4444,#f97316)}
.c-know{background:linear-gradient(135deg,var(--teal-dark),var(--teal))}
.c-find{background:linear-gradient(135deg,#7c3aed,#a855f7)}
.c-calm{background:rgba(255,255,255,.7);border:2px solid var(--mint-mid)!important}
.c-calm .atitle{color:var(--teal-dark)}
.c-calm .asub{color:var(--teal)}
.slabel{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--teal);margin:16px 0 8px}
.tlist{display:flex;flex-direction:column;gap:8px}
.titem{background:rgba(255,255,255,.82);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;width:100%;text-align:left;border:2px solid var(--mint-mid);transition:transform .1s}
.titem:active{transform:scale(.98)}
.tico{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.tinfo h3{font-size:.92rem;font-weight:700;color:var(--teal-dark)}
.tinfo p{font-size:.74rem;color:var(--teal);margin-top:2px;line-height:1.3}
.tcard{background:rgba(255,255,255,.88);border-radius:20px;padding:20px;box-shadow:0 4px 16px rgba(38,166,154,.1);margin-bottom:16px}
.ttag{display:inline-block;padding:3px 12px;border-radius:999px;font-size:.72rem;font-weight:700;margin-bottom:10px;color:#fff}
.tdesc{font-size:.82rem;color:var(--teal);margin-bottom:14px;line-height:1.4}
.sbox{background:var(--mint-soft);border-radius:16px;padding:20px;text-align:center;margin-bottom:14px;border:2px solid var(--mint-mid)}
/* Círculo de respiración: respira a la vez que él */
.breath-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 0 8px;}
.breath-circle{width:110px;height:110px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#a7e8df,var(--teal));box-shadow:0 0 42px rgba(38,166,154,.4);animation:breathe-anim var(--bdur,10s) ease-in-out infinite;}
.breath-circle.paused{animation-play-state:paused;}
.breath-hint{font-size:.74rem;color:var(--teal-dark);font-weight:600;margin-top:12px;opacity:.75;}
.snum{font-size:.72rem;font-weight:700;color:var(--teal);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.sname{font-size:1.4rem;font-weight:800;color:var(--teal-dark);margin-bottom:8px}
.sinstr{font-size:.88rem;color:#3d5a58;line-height:1.5}
.stimer{font-size:3.5rem;font-weight:800;color:var(--teal);margin:12px 0 4px;font-variant-numeric:tabular-nums}
.dots{display:flex;justify-content:center;gap:6px;margin-bottom:14px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--mint-mid);transition:background .3s}
.dot.done{background:var(--teal)}.dot.active{background:var(--teal-light);transform:scale(1.3)}
.pbar{background:var(--mint-mid);border-radius:999px;height:4px;margin-bottom:8px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--teal-dark),var(--teal-light));border-radius:999px;transition:width .5s}
.btn{border:none;border-radius:12px;padding:14px 18px;font-family:'Outfit',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;transition:transform .1s,filter .1s}
.btn:active{transform:scale(.97);filter:brightness(.92)}
.bpri{background:linear-gradient(135deg,var(--teal-dark),var(--teal));color:#fff}
.bsec{background:rgba(255,255,255,.82);color:var(--teal-dark);border:2px solid var(--mint-mid)}
.bful{width:100%}
.brow{display:flex;gap:10px}.brow .btn{flex:1}
.brow .bprev{flex:0 0 auto;padding:14px 16px;font-size:1.15rem;line-height:1}
.done{background:linear-gradient(135deg,var(--teal-dark),var(--teal));color:#fff;border-radius:20px;padding:28px;text-align:center;margin-bottom:18px}
.done .big{font-size:3rem;margin-bottom:8px}
.done h2{font-size:1.3rem;font-weight:800;margin-bottom:6px}
.done p{font-size:.88rem;opacity:.9}
.egrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.etile{border:none;border-radius:18px;padding:18px 12px;font-family:'Outfit',sans-serif;cursor:pointer;text-align:center;transition:transform .1s;display:flex;flex-direction:column;align-items:center;gap:6px}
.etile:active{transform:scale(.96)}
.etile .be{font-size:2.2rem}
.etile .el{font-size:.85rem;font-weight:700;color:rgba(0,0,0,.65)}
.ecard{background:rgba(255,255,255,.92);border-radius:20px;padding:22px;margin-bottom:14px;box-shadow:0 4px 20px rgba(38,166,154,.1)}
.ehead{text-align:center;margin-bottom:18px}
.ebig{font-size:3.5rem;display:block;margin-bottom:6px}
.ename{font-size:1.4rem;font-weight:800;color:var(--teal-dark)}
.irow{background:var(--mint-soft);border-radius:12px;padding:13px;margin-bottom:9px;border:2px solid var(--mint-mid)}
.irow.hi{border-color:var(--teal)}
.ilbl{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--teal);margin-bottom:4px}
.ival{font-size:.92rem;font-weight:700;color:var(--teal-dark)}
.isub{font-size:.76rem;color:var(--teal);margin-top:3px;line-height:1.3}
.qcard{background:rgba(255,255,255,.88);border-radius:20px;padding:22px;margin-bottom:14px;border:2px solid var(--mint-mid)}
.qcard h2{font-size:1.05rem;font-weight:700;color:var(--teal-dark);margin-bottom:14px;line-height:1.3}
.qopts{display:flex;flex-direction:column;gap:8px}
.qbtn{background:var(--mint-soft);border:2px solid var(--mint-mid);border-radius:12px;padding:14px 16px;text-align:left;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:600;color:var(--teal-dark);width:100%;line-height:1.3}
.qbtn:active{border-color:var(--teal);background:var(--mint-mid)}
.mlist{display:flex;flex-direction:column;gap:10px}
.mitem{background:rgba(255,255,255,.82);border-radius:16px;padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;border:2px solid var(--mint-mid);width:100%;text-align:left;transition:transform .1s}
.mitem:active{transform:scale(.98)}
.mico{font-size:2rem;flex-shrink:0}
.minfo h3{font-size:.95rem;font-weight:700;color:var(--teal-dark)}
.minfo p{font-size:.78rem;color:var(--teal);margin-top:2px}
.sprow{display:flex;gap:8px;margin-bottom:18px}
.spbtn{flex:1;padding:10px;border:2px solid var(--mint-mid);border-radius:10px;background:rgba(255,255,255,.7);font-family:'Outfit',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;color:var(--teal)}
.spbtn.active{border-color:var(--teal);background:var(--teal);color:#fff}

.calm *,.calm *::before,.calm *::after{animation:none !important;transition:none !important}

/* Anillo de tiempo: se vacía según pasa — para ver cuánto queda sin leer números */
.tring{width:176px;height:176px;border-radius:50%;margin:4px auto 10px;display:flex;align-items:center;justify-content:center;background:conic-gradient(#26a69a 360deg,#cde9e4 0);flex-shrink:0;}
.tring-in{width:144px;height:144px;border-radius:50%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px;text-align:center;}
.tring{width:150px;height:150px}.tring-in{width:120px;height:120px;background:var(--mint-soft)}.tring .stimer{font-size:2.2rem;margin:0}

/* Quico con manitas (mascota) */
.quico-mascot{position:relative;width:-moz-fit-content;width:fit-content;margin:0 auto 6px;filter:drop-shadow(0 3px 8px rgba(93,64,55,.18));}
.quico-mascot .qm-head{display:block;margin:0;filter:none;}
.qm-paws{position:absolute;left:50%;bottom:-7px;transform:translateX(-50%);width:64%;line-height:0;}
.qm-paws svg{display:block;width:100%;}
</style>
</head>
<body>

<div id="v-home" class="screen active">
<div class="mw">
  <div class="home-hdr">
    <h1 data-i18n="home_h">Botiquín Emocional 🧰</h1>
    <p data-i18n="home_p">¿Qué necesitas ahora mismo?</p>
  </div>
  <div class="home-q">
    <img src="../quico/quico_happy.png" alt="Quico" style="width:128px;height:auto;object-fit:contain;display:block;margin:0 auto 6px;filter:drop-shadow(0 4px 10px rgba(93,64,55,.18))">
  </div>
  <button class="acard c-sos" onclick="go('techniques')">
    <span class="aicon">🚨</span>
    <div class="ainfo"><span class="atitle" data-i18n="c_sos_t">NECESITO AYUDA YA</span><span class="asub" data-i18n="c_sos_s">Técnicas para salir del bucle ahora mismo</span></div>
  </button>
  <button class="acard c-know" onclick="go('emotions')">
    <span class="aicon">💭</span>
    <div class="ainfo"><span class="atitle" data-i18n="c_know_t">SÉ QUÉ SIENTO</span><span class="asub" data-i18n="c_know_s">Entiende tu emoción y qué puedes hacer</span></div>
  </button>
  <button class="acard c-find" onclick="go('find-emotion')">
    <span class="aicon">❓</span>
    <div class="ainfo"><span class="atitle" data-i18n="c_find_t">NO SÉ QUÉ SIENTO</span><span class="asub" data-i18n="c_find_s">Ayúdame a identificar lo que me pasa</span></div>
  </button>
  <button class="acard c-calm" onclick="go('meditations')">
    <span class="aicon">🧘</span>
    <div class="ainfo"><span class="atitle" data-i18n="c_calm_t">MEDITAR</span><span class="asub" data-i18n="c_calm_s">Meditaciones guiadas para calmarme</span></div>
  </button>
</div>
</div>

<div id="v-techniques" class="screen">
<div class="mw">
  <div class="topbar">
    <button class="back" onclick="go('home')">←</button>
    <h1 data-i18n="tech_h">Técnicas de Rescate</h1>
  </div>
  <div id="tech-list"></div>
</div>
</div>

<div id="v-technique-detail" class="screen">
<div class="mw">
  <div class="topbar">
    <button class="back" id="tec-back">←</button>
    <h1 id="tec-title" data-i18n="tec_h_fb">Técnica</h1>
  </div>
  <div id="tec-content"></div>
</div>
</div>

<div id="v-emotions" class="screen">
<div class="mw">
  <div class="topbar">
    <button class="back" onclick="go('home')">←</button>
    <h1 data-i18n="emo_h">¿Qué sientes?</h1>
  </div>
  <p style="font-size:.83rem;color:var(--teal);margin-bottom:14px" data-i18n="emo_hint">Toca lo que más se acerca a lo que sientes ahora mismo</p>
  <div class="egrid" id="emo-grid"></div>
</div>
</div>

<div id="v-emotion-detail" class="screen">
<div class="mw">
  <div class="topbar">
    <button class="back" id="emo-back">←</button>
    <h1 data-i18n="emo_detail_h">Tu emoción</h1>
  </div>
  <div id="emo-detail"></div>
</div>
</div>

<div id="v-find-emotion" class="screen">
<div class="mw">
  <div class="topbar">
    <button class="back" onclick="go('home')">←</button>
    <h1 data-i18n="find_h">Vamos a descubrirlo</h1>
  </div>
  <div id="find-content"></div>
</div>
</div>

<div id="v-meditations" class="screen">
<div class="mw">
  <div class="topbar">
    <button class="back" onclick="go('home')">←</button>
    <h1 data-i18n="med_h">Meditaciones</h1>
  </div>
  <div class="mlist" id="med-list"></div>
</div>
</div>

<div id="v-meditation-detail" class="screen">
<div class="mw">
  <div class="topbar">
    <button class="back" onclick="stopTimer();go('meditations')">←</button>
    <h1 id="med-title"></h1>
  </div>
  <div class="sprow">
    <button class="spbtn" id="sp-lento" onclick="setSpeed('lento')" data-i18n="sp_lento">Lento</button>
    <button class="spbtn active" id="sp-normal" onclick="setSpeed('normal')" data-i18n="sp_normal">Normal</button>
    <button class="spbtn" id="sp-rapido" onclick="setSpeed('rapido')" data-i18n="sp_rapido">Rápido</button>
  </div>
  <div id="med-content"></div>
</div>
</div>

<script>
/* Ajustes globales (voz/sonido/vibración/reducir estímulos) — compartidos vía localStorage */
function __cfg(){try{return JSON.parse(localStorage.getItem('cris_cfg')||'{}');}catch(e){return{};}}
function __allow(k){const c=__cfg();return c[k]!==false&&c.calm!==true;}
if(__cfg().calm)document.documentElement.classList.add('calm');

/* ── IDIOMAS (es · en · fr) ── */
const UI={
 es:{home_h:'Botiquín Emocional 🧰',home_p:'¿Qué necesitas ahora mismo?',

function crisLang(){const l=localStorage.getItem('cris_lang');return UI[l]?l:'es';}
function t(k,vars){let s=UI[crisLang()][k];if(s===undefined)s=UI.es[k];if(s===undefined)return k;if(vars)Object.keys(vars).forEach(x=>{s=s.split('{'+x+'}').join(vars[x]);});return s;}
const VOICE_LANG={es:'es-ES',en:'en-US',fr:'fr-FR'};
/* Traducción de contenido (el emoji, color, time, breath vienen del dato ES) */
const RESCUES_L={

function rescL(r){const lang=crisLang();if(lang==='es'||!RESCUES_L[lang]||!RESCUES_L[lang][r.id])return r;const tr=RESCUES_L[lang][r.id];return {...r,name:tr.name,when:tr.when,desc:tr.desc,steps:r.steps.map((s,i)=>({...s,text:tr.steps[i][0],instruction:tr.steps[i][1]}))};}
function emoL(e){const lang=crisLang();if(lang==='es'||!EMOTIONS_L[lang]||!EMOTIONS_L[lang][e.id])return e;return {...e,...EMOTIONS_L[lang][e.id]};}
function medL(m){const lang=crisLang();if(lang==='es'||!MED_L[lang]||!MED_L[lang][m.id])return m;const tr=MED_L[lang][m.id];return {...m,name:tr.name,steps:m.steps.map((s,i)=>({...s,text:tr.steps[i][0],instruction:tr.steps[i][1]}))};}
function tecGroupLabel(i,esLabel){const lang=crisLang();return (lang!=='es'&&TEC_LABELS[lang])?TEC_LABELS[lang][i]:esLabel;}
function bodyLabel(i,esLabel){const lang=crisLang();return (lang!=='es'&&BODY_LABELS[lang])?BODY_LABELS[lang][i]:esLabel;}
function applyStaticI18n(){document.documentElement.lang=crisLang();document.querySelectorAll('[data-i18n]').forEach(el=>{el.innerHTML=t(el.getAttribute('data-i18n'));});}

let __beepCtx=null;function __getCtx(){try{if(!__beepCtx)__beepCtx=new(window.AudioContext||window.webkitAudioContext)();if(__beepCtx.state==='suspended')__beepCtx.resume();return __beepCtx;}catch(e){return null;}}
function beep(f=600,d=0.2){if(!__allow('sound'))return;try{const c=__getCtx();if(!c)return;const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.setValueAtTime(0.3,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}

let _utt=null;
function speak(t){
  try{if(!__allow('voice'))return;
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    if(window.speechSynthesis.paused)window.speechSynthesis.resume();
    _utt=new SpeechSynthesisUtterance(t);
    _utt.lang=VOICE_LANG[crisLang()];_utt.rate=0.9;
    const voices=window.speechSynthesis.getVoices();
    const lv=voices.find(v=>v.lang.startsWith(crisLang()));
    if(lv)_utt.voice=lv;
    window.speechSynthesis.speak(_utt);
  }catch(e){}
}

/* Habla y llama a cb SOLO al terminar el dictado (o al instante si la voz está
   apagada). Red de seguridad temporal por si el navegador no emite 'end'. */
let _speakSeq=0;
function speakThen(t,cb){
  const seq=++_speakSeq;let done=false;
  const fin=()=>{if(done||seq!==_speakSeq)return;done=true;cb();};
  try{
    if(!__allow('voice')||!window.speechSynthesis){fin();return;}
    window.speechSynthesis.cancel();
    if(window.speechSynthesis.paused)window.speechSynthesis.resume();
    _utt=new SpeechSynthesisUtterance(t);
    _utt.lang=VOICE_LANG[crisLang()];_utt.rate=0.9;
    const voices=window.speechSynthesis.getVoices();
    const lv=voices.find(v=>v.lang.startsWith(crisLang()));
    if(lv)_utt.voice=lv;
    _utt.onend=fin;_utt.onerror=fin;
    window.speechSynthesis.speak(_utt);
    setTimeout(fin,Math.max(4000,t.length*110));
  }catch(e){fin();}
}
// stopTimer también invalida dictados pendientes (pausa, navegación, ← anterior)
function stopTimer(){_speakSeq++;if(timerInterval){clearInterval(timerInterval);timerInterval=null;}try{if(window.speechSynthesis)window.speechSynthesis.cancel();}catch(e){}}

function tecToggle(){
  if(!S.tecPlaying){
    S.tecPlaying=true; S.tecTimer=S.tecCurrent.steps[S.tecStep].time;

      if(!S.tecPlaying||timerInterval)return;
      timerInterval=setInterval(tecTick,1000);

}
function tecTick(){S.tecTimer--;const el=document.getElementById('tec-timer');if(el)el.textContent=S.tecTimer;const _tt=S.tecCurrent.steps[S.tecStep].time;__ring('tec-ring',_tt?S.tecTimer/_tt:0);if(S.tecTimer<=0)tecAdv();}
function tecAdv(){
  stopTimer(); const tec=S.tecCurrent;

function setBreathAnim(b){

}
function breathHint(b){
  return b.hold?t('breath_hold',{i:b.in,h:b.hold,o:b.out}):t('breath_simple',{i:b.in,o:b.out});
}
function startMed(id){
  beep(400);vibrate(40);
  S.medCurrent=medL(MEDITATIONS.find(m=>m.id===id));
  S.medStep=0;S.medPlaying=false;S.medTimer=0;S.medDone=false;
  setBreathAnim(S.medCurrent.breath||{in:4,out:6});
  document.getElementById('med-title').textContent=S.medCurrent.name;
  go('meditation-detail'); renderMedStep();
}
function setSpeed(sp){
  S.medSpeed=sp;
  ['lento','normal','rapido'].forEach(s=>document.getElementById('sp-'+s).classList.toggle('active',s===sp));
}
function renderMedStep(){
  const med=S.medCurrent; if(!med)return;
  const el=document.getElementById('med-content');
  if(S.medDone){
    el.innerHTML=`<div class="done"><div class="big">🙏</div><h2>${t('med_done_t')}</h2><p>${med.name}</p></div>
      <div class="brow">
        <button class="btn bsec" onclick="go('meditations')">${t('med_list')}</button>
        <button class="btn bpri" onclick="startMed(${med.id})">${t('med_repeat')}</button>
      </div>`;
    return;
  }
  const step=med.steps[S.medStep];
  const pct=(S.medStep/med.steps.length)*100;
  const dots=med.steps.map((_,i)=>`<div class="dot ${i<S.medStep?'done':i===S.medStep?'active':''}" ></div>`).join('');
  const tv=S.medPlaying?S.medTimer:Math.round(step.time*SPEED[S.medSpeed]);
  const b=med.breath||{in:4,out:6};
  el.innerHTML=`
    <div class="tcard">
      <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
      <div class="dots" style="margin-top:8px">${dots}</div>
      <div class="breath-wrap">
        <div class="breath-circle${S.medPlaying?'':' paused'}"></div>
        <div class="breath-hint">${t('breath_hint',{b:breathHint(b)})}</div>
      </div>
      <div class="sbox">
        <div class="snum">${t('step_of',{i:S.medStep+1,n:med.steps.length})}</div>
        <div class="sname">${step.text}</div>
        <div class="sinstr">${step.instruction}</div>
        <div class="tring" id="med-ring"><div class="tring-in"><div class="stimer" id="med-timer">${tv}</div></div></div>
      </div>
    </div>
    <div class="brow">
      ${S.medStep>0?`<button class="btn bsec bprev" onclick="medPrev()" aria-label="${t('prev_aria')}">←</button>`:''}
      <button class="btn bsec" onclick="medToggle()">${S.medPlaying?t('pause_btn'):t('start_btn')}</button>
      <button class="btn bpri" onclick="medNext()">${t('next_btn')}</button>
    </div>`;
  __ring('med-ring',tv/Math.max(1,Math.round(step.time*SPEED[S.medSpeed])));
}
function medToggle(){
  if(!S.medPlaying){
    S.medPlaying=true;const step=S.medCurrent.steps[S.medStep];
    S.medTimer=Math.round(step.time*SPEED[S.medSpeed]);
    renderMedStep();
    // La instrucción se dicta ENTERA antes de arrancar la cuenta del paso
    speakThen(step.instruction,()=>{
      if(!S.medPlaying||timerInterval)return;
      timerInterval=setInterval(medTick,1000);
    });
    return;
  }
  S.medPlaying=false;stopTimer();
  renderMedStep();
}
function medTick(){S.medTimer--;const el=document.getElementById('med-timer');if(el)el.textContent=S.medTimer;const _mt=Math.round(S.medCurrent.steps[S.medStep].time*SPEED[S.medSpeed]);__ring('med-ring',_mt?S.medTimer/_mt:0);if(S.medTimer<=0)medAdv();}
function medAdv(){
  stopTimer(); const med=S.medCurrent;
  if(S.medStep<med.steps.length-1){
    beep(500,0.2);vibrate(40);S.medStep++;S.medPlaying=true;
    S.medTimer=Math.round(med.steps[S.medStep].time*SPEED[S.medSpeed]);
    renderMedStep();
    speakThen(med.steps[S.medStep].instruction,()=>{
      if(!S.medPlaying||timerInterval)return;
      timerInterval=setInterval(medTick,1000);
    });
  } else {beep(700,0.3);setTimeout(()=>beep(900,0.4),300);vibrate([60,40,60]);S.medDone=true;S.medPlaying=false;markCalmaDone();renderMedStep();}
}
function medNext(){stopTimer();S.medPlaying=false;medAdv();}
function medPrev(){if(S.medStep<=0)return;stopTimer();S.medPlaying=false;S.medTimer=0;S.medDone=false;S.medStep--;renderMedStep();}
/* Aplica traducciones a los textos estáticos al cargar */
applyStaticI18n();
/* Botón atrás del móvil: la app pregunta si este módulo puede retroceder una pantalla */
/* Atrás del móvil: el padre llama __crisBack() (síncrono); true = retrocedió */
window.__crisBack=function(){
  var el=document.querySelector('.screen.active .back');
  if(el){el.click();return true;}
  return false;
};
/* Puente para versiones mezcladas: si el index viejo aún manda postMessage */
window.addEventListener('message',function(e){
  if(e&&e.data==='cris:back'&&window.__crisBack&&window.__crisBack()){
    try{parent.postMessage('cris:back-ok','*');}catch(_){}
  }
});
</script>
