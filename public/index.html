<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0f0f">
  <title>VideoBot — Publicador Automático</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --card: #1a1a1a;
      --card2: #222;
      --border: #2a2a2a;
      --accent: #6c63ff;
      --accent2: #ff6b6b;
      --green: #22c55e;
      --yellow: #f59e0b;
      --red: #ef4444;
      --text: #f0f0f0;
      --muted: #888;
      --radius: 16px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    /* ── Layout ── */
    .app { display: flex; flex-direction: column; height: 100%; max-width: 600px; margin: 0 auto; }
    .header {
      padding: calc(var(--safe-top) + 16px) 20px 16px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .header-icon { font-size: 28px; }
    .header-title { font-size: 20px; font-weight: 700; }
    .header-sub { font-size: 12px; color: var(--muted); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); margin-left: auto; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .content { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }

    /* ── Cards ── */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .card-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 12px; }

    /* ── Upload Zone ── */
    .upload-zone {
      border: 2px dashed var(--border); border-radius: var(--radius);
      padding: 32px 20px; text-align: center; cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .upload-zone:active, .upload-zone.drag { border-color: var(--accent); background: rgba(108,99,255,.08); }
    .upload-zone .icon { font-size: 48px; margin-bottom: 12px; }
    .upload-zone .label { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .upload-zone .hint { font-size: 13px; color: var(--muted); }
    #videoInput { display: none; }

    /* Video preview */
    .video-preview { border-radius: var(--radius); overflow: hidden; background: #000; position: relative; }
    .video-preview video { width: 100%; max-height: 240px; object-fit: contain; display: block; }
    .video-preview .remove-btn {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,.7); border: none; color: #fff;
      border-radius: 50%; width: 32px; height: 32px; font-size: 18px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .video-info { margin-top: 8px; font-size: 12px; color: var(--muted); }

    /* ── Inputs ── */
    textarea, input[type="text"] {
      width: 100%; background: var(--card2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px; color: var(--text); font-size: 15px;
      font-family: inherit; resize: none; outline: none;
      transition: border-color .2s;
    }
    textarea:focus, input[type="text"]:focus { border-color: var(--accent); }
    .char-count { font-size: 11px; color: var(--muted); text-align: right; margin-top: 4px; }
    .char-count.warn { color: var(--yellow); }
    .char-count.over { color: var(--red); }

    /* ── Platforms ── */
    .platforms { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .platform-btn {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 12px 8px; border-radius: 12px; border: 2px solid var(--border);
      background: var(--card2); cursor: pointer; transition: all .2s; user-select: none;
    }
    .platform-btn .p-icon { font-size: 28px; }
    .platform-btn .p-name { font-size: 11px; font-weight: 600; color: var(--muted); }
    .platform-btn.active { border-color: var(--accent); background: rgba(108,99,255,.12); }
    .platform-btn.active .p-name { color: var(--accent); }

    /* ── Publish Button ── */
    .publish-btn {
      width: 100%; padding: 16px; border-radius: var(--radius); border: none;
      background: var(--accent); color: #fff; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: opacity .2s, transform .1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .publish-btn:active { transform: scale(.98); }
    .publish-btn:disabled { opacity: .5; cursor: not-allowed; }
    .publish-btn .spinner {
      width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Jobs list ── */
    .jobs-list { display: flex; flex-direction: column; gap: 10px; }
    .job-card { background: var(--card2); border: 1px solid var(--border); border-radius: 12px; padding: 12px; }
    .job-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .job-status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .job-status-dot.pending { background: var(--muted); }
    .job-status-dot.processing { background: var(--yellow); animation: pulse 1s infinite; }
    .job-status-dot.done { background: var(--green); }
    .job-status-dot.error { background: var(--red); }
    .job-name { font-size: 14px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .job-time { font-size: 11px; color: var(--muted); flex-shrink: 0; }
    .job-platforms { display: flex; gap: 6px; flex-wrap: wrap; }
    .platform-badge {
      font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 600;
      display: flex; align-items: center; gap: 4px;
    }
    .platform-badge.success { background: rgba(34,197,94,.15); color: var(--green); }
    .platform-badge.fail { background: rgba(239,68,68,.15); color: var(--red); }
    .platform-badge.pending { background: rgba(136,136,136,.15); color: var(--muted); }
    .job-error { font-size: 12px; color: var(--red); margin-top: 6px; opacity: .8; }
    .job-delete { background: none; border: none; color: var(--muted); cursor: pointer; padding: 2px 6px; border-radius: 6px; font-size: 16px; }
    .job-delete:active { color: var(--red); }

    .empty-state { text-align: center; padding: 32px; color: var(--muted); font-size: 14px; }
    .empty-state .e-icon { font-size: 40px; margin-bottom: 8px; }

    /* ── Toast ── */
    .toast-container { position: fixed; bottom: calc(var(--safe-bottom) + 80px); left: 50%; transform: translateX(-50%); z-index: 999; display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: none; }
    .toast { background: var(--card2); border: 1px solid var(--border); border-radius: 12px; padding: 10px 16px; font-size: 13px; font-weight: 500; white-space: nowrap; animation: toastIn .3s ease; }
    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error { border-color: var(--red); color: var(--red); }
    @keyframes toastIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    /* ── Nav ── */
    .bottom-nav {
      display: flex; background: var(--card); border-top: 1px solid var(--border);
      padding: 8px 0 calc(var(--safe-bottom) + 8px);
    }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px; cursor: pointer; border: none; background: none; color: var(--muted); transition: color .2s; }
    .nav-btn .n-icon { font-size: 22px; }
    .nav-btn .n-label { font-size: 10px; font-weight: 600; }
    .nav-btn.active { color: var(--accent); }

    /* ── Sections ── */
    .section { display: none; flex-direction: column; gap: 16px; }
    .section.active { display: flex; }
  </style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <span class="header-icon">🎬</span>
    <div>
      <div class="header-title">VideoBot</div>
      <div class="header-sub">Publicador automático</div>
    </div>
    <div class="status-dot" id="serverDot" title="Servidor conectado"></div>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- UPLOAD SECTION -->
    <div class="section active" id="section-upload">
      <div class="card">
        <div class="card-title">Video</div>
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('videoInput').click()">
          <div class="icon">📱</div>
          <div class="label">Toca para seleccionar video</div>
          <div class="hint">MP4, MOV, AVI — máx. 500 MB</div>
        </div>
        <input type="file" id="videoInput" accept="video/*">
        <div id="videoPreviewContainer" style="display:none;margin-top:12px">
          <div class="video-preview">
            <video id="videoPreview" controls playsinline></video>
            <button class="remove-btn" onclick="removeVideo()">✕</button>
          </div>
          <div class="video-info" id="videoInfo"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Descripción</div>
        <textarea id="descInput" rows="3" placeholder="Escribe la descripción de tu video..." maxlength="2200" oninput="updateCharCount(this, 'descCount', 2200)"></textarea>
        <div class="char-count" id="descCount">0 / 2200</div>
      </div>

      <div class="card">
        <div class="card-title">Hashtags</div>
        <input type="text" id="tagsInput" placeholder="#hashtag1 #hashtag2 #hashtag3">
      </div>

      <div class="card">
        <div class="card-title">Plataformas</div>
        <div class="platforms">
          <div class="platform-btn active" data-platform="tiktok" onclick="togglePlatform(this)">
            <span class="p-icon">🎵</span>
            <span class="p-name">TikTok</span>
          </div>
          <div class="platform-btn active" data-platform="instagram" onclick="togglePlatform(this)">
            <span class="p-icon">📸</span>
            <span class="p-name">Instagram</span>
          </div>
          <div class="platform-btn active" data-platform="youtube" onclick="togglePlatform(this)">
            <span class="p-icon">▶️</span>
            <span class="p-name">YouTube</span>
          </div>
        </div>
      </div>

      <button class="publish-btn" id="publishBtn" onclick="publishVideo()">
        <span>🚀</span> Publicar ahora
      </button>
    </div>

    <!-- QUEUE SECTION -->
    <div class="section" id="section-queue">
      <div class="card">
        <div class="card-title">Cola de publicaciones</div>
        <div class="jobs-list" id="jobsList">
          <div class="empty-state">
            <div class="e-icon">📭</div>
            Aún no hay publicaciones
          </div>
        </div>
      </div>
    </div>

  </div><!-- /content -->

  <!-- Bottom nav -->
  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-upload" onclick="showSection('upload')">
      <span class="n-icon">➕</span>
      <span class="n-label">Publicar</span>
    </button>
    <button class="nav-btn" id="nav-queue" onclick="showSection('queue')">
      <span class="n-icon">📋</span>
      <span class="n-label">Cola</span>
    </button>
  </div>

  <div class="toast-container" id="toastContainer"></div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let selectedFile = null;
let activePlatforms = new Set(['tiktok', 'instagram', 'youtube']);
let pollInterval = null;

const API = window.location.origin + '/api';

// ── Sections & Nav ───────────────────────────────────────────────────────────
function showSection(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('section-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'queue') loadJobs();
}

// ── File input ───────────────────────────────────────────────────────────────
document.getElementById('videoInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  selectedFile = file;

  const url = URL.createObjectURL(file);
  const vid = document.getElementById('videoPreview');
  vid.src = url;
  document.getElementById('videoPreviewContainer').style.display = 'block';
  document.getElementById('videoInfo').textContent =
    `${file.name} — ${formatSize(file.size)}`;
});

// Drag & drop on desktop
const zone = document.getElementById('uploadZone');
['dragenter','dragover'].forEach(e => zone.addEventListener(e, ev => { ev.preventDefault(); zone.classList.add('drag'); }));
['dragleave','drop'].forEach(e => zone.addEventListener(e, ev => { ev.preventDefault(); zone.classList.remove('drag'); }));
zone.addEventListener('drop', ev => {
  const file = ev.dataTransfer.files[0];
  if (file && file.type.startsWith('video/')) {
    selectedFile = file;
    document.getElementById('videoPreview').src = URL.createObjectURL(file);
    document.getElementById('videoPreviewContainer').style.display = 'block';
    document.getElementById('videoInfo').textContent = `${file.name} — ${formatSize(file.size)}`;
  }
});

function removeVideo() {
  selectedFile = null;
  document.getElementById('videoInput').value = '';
  document.getElementById('videoPreview').src = '';
  document.getElementById('videoPreviewContainer').style.display = 'none';
}

// ── Platforms ────────────────────────────────────────────────────────────────
function togglePlatform(btn) {
  const p = btn.dataset.platform;
  if (activePlatforms.has(p)) {
    if (activePlatforms.size === 1) { toast('Selecciona al menos una plataforma', 'error'); return; }
    activePlatforms.delete(p);
    btn.classList.remove('active');
  } else {
    activePlatforms.add(p);
    btn.classList.add('active');
  }
}

// ── Char counter ─────────────────────────────────────────────────────────────
function updateCharCount(el, countId, max) {
  const n = el.value.length;
  const span = document.getElementById(countId);
  span.textContent = `${n} / ${max}`;
  span.className = 'char-count' + (n > max * 0.9 ? ' warn' : '') + (n >= max ? ' over' : '');
}

// ── Publish ───────────────────────────────────────────────────────────────────
async function publishVideo() {
  if (!selectedFile) { toast('Selecciona un video primero', 'error'); return; }
  if (activePlatforms.size === 0) { toast('Selecciona al menos una plataforma', 'error'); return; }

  const btn = document.getElementById('publishBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Subiendo...';

  const formData = new FormData();
  formData.append('video', selectedFile);
  formData.append('description', document.getElementById('descInput').value.trim());
  formData.append('hashtags', document.getElementById('tagsInput').value.trim());
  formData.append('platforms', JSON.stringify([...activePlatforms]));

  try {
    const res = await fetch(`${API}/upload`, { method: 'POST', body: formData });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error desconocido');

    toast('✅ Video en cola — publicando pronto', 'success');
    removeVideo();
    document.getElementById('descInput').value = '';
    document.getElementById('tagsInput').value = '';
    updateCharCount(document.getElementById('descInput'), 'descCount', 2200);

    // Switch to queue tab
    setTimeout(() => { showSection('queue'); }, 1000);
  } catch (err) {
    toast(`Error: ${err.message}`, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<span>🚀</span> Publicar ahora';
  }
}

// ── Jobs ─────────────────────────────────────────────────────────────────────
async function loadJobs() {
  try {
    const res = await fetch(`${API}/jobs`);
    const jobs = await res.json();
    renderJobs(jobs);
  } catch {}
}

function renderJobs(jobs) {
  const list = document.getElementById('jobsList');
  if (!jobs.length) {
    list.innerHTML = '<div class="empty-state"><div class="e-icon">📭</div>Aún no hay publicaciones</div>';
    return;
  }

  list.innerHTML = jobs.map(job => {
    const platforms = JSON.parse(job.platforms || '[]');
    const results = JSON.parse(job.results || '{}');
    const timeAgo = formatTimeAgo(job.created_at);

    const badges = platforms.map(p => {
      const r = results[p];
      const cls = !r ? 'pending' : r.success ? 'success' : 'fail';
      const icon = p === 'tiktok' ? '🎵' : p === 'instagram' ? '📸' : '▶️';
      const label = !r ? p : r.success ? p : `${p} ✕`;
      return `<span class="platform-badge ${cls}">${icon} ${label}</span>`;
    }).join('');

    const errorHtml = job.error ? `<div class="job-error">⚠️ ${job.error}</div>` : '';

    return `
      <div class="job-card">
        <div class="job-header">
          <div class="job-status-dot ${job.status}"></div>
          <div class="job-name" title="${job.filename}">${job.filename}</div>
          <div class="job-time">${timeAgo}</div>
          <button class="job-delete" onclick="deleteJob('${job.id}')" title="Eliminar">🗑</button>
        </div>
        <div class="job-platforms">${badges}</div>
        ${errorHtml}
      </div>`;
  }).join('');
}

async function deleteJob(id) {
  try {
    await fetch(`${API}/jobs/${id}`, { method: 'DELETE' });
    loadJobs();
  } catch { toast('No se pudo eliminar', 'error'); }
}

// ── Server health ─────────────────────────────────────────────────────────────
async function checkServer() {
  try {
    await fetch(`${API}/health`);
    document.getElementById('serverDot').style.background = 'var(--green)';
  } catch {
    document.getElementById('serverDot').style.background = 'var(--red)';
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function formatTimeAgo(ts) {
  const diff = Date.now() - new Date(ts).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'ahora mismo';
  if (m < 60) return `hace ${m}m`;
  const h = Math.floor(m / 60);
  if (h < 24) return `hace ${h}h`;
  return `hace ${Math.floor(h/24)}d`;
}

function toast(msg, type = '') {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ── Init ──────────────────────────────────────────────────────────────────────
checkServer();
setInterval(checkServer, 30000);

// Auto-refresh queue every 5s when visible
setInterval(() => {
  if (document.getElementById('section-queue').classList.contains('active')) loadJobs();
}, 5000);
</script>
</body>
</html>
