<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#26a69a">
<title>Cris</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --mint-bg:#d6f0eb;
  --mint-mid:#b8e4dd;
  --mint-deep:#8dcfc7;
  --teal:#26a69a;
  --teal-dark:#1a6b64;
  --teal-body:#33b5a7;
  --teal-belly:#5dcfc2;
  --teal-outline:#0f4d47;
  --text:#1a6b64;
  --text-soft:#3d8880;
  --white-card:rgba(255,255,255,0.72);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:'Outfit',sans-serif;
  background:var(--mint-bg);
  min-height:100vh;
  color:var(--text);
  overflow-x:hidden;
}

/* ── DASHBOARD ── */
#dashboard{
  max-width:440px;
  margin:0 auto;
  padding:24px 18px 48px;
}

/* Header greeting */
.hero{
  text-align:center;
  margin-bottom:4px;
}
.greeting-row{
  font-size:1.5rem;
  font-weight:800;
  color:var(--teal-dark);
  margin-bottom:2px;
}
.hero-sub{
  font-size:.88rem;
  color:var(--text-soft);
  margin-bottom:20px;
}

/* Quokka + bubble */
.quokka-zone{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-bottom:24px;
  position:relative;
}
.quokka-wrap{
  animation:float 3.2s ease-in-out infinite;
}
@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-9px);}
}
.bubble{
  background:var(--white-card);
  border:2px solid var(--mint-mid);
  border-radius:18px;
  padding:10px 16px;
  font-size:.88rem;
  font-weight:600;
  color:var(--teal-dark);
  max-width:260px;
  text-align:center;
  margin-bottom:10px;
  position:relative;
  box-shadow:0 2px 12px rgba(38,166,154,.12);
}
.bubble::after{
  content:'';
  position:absolute;
  bottom:-10px;
  left:50%;
  transform:translateX(-50%);
  border:5px solid transparent;
  border-top-color:var(--mint-mid);
}

/* ── TODAY PANEL ── */
#today-panel{
  background:var(--white-card);
  border:2px solid var(--mint-mid);
  border-radius:20px;
  padding:14px;
  margin-bottom:18px;
  box-shadow:0 3px 10px rgba(38,166,154,.10);
}
.tp-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.tp-title{font-size:.95rem;font-weight:800;color:var(--teal-dark);text-transform:capitalize;}
.tp-eco{border:2px solid var(--mint-mid);background:#fff;color:var(--teal-dark);border-radius:999px;padding:6px 12px;font-family:'Outfit',sans-serif;font-size:.72rem;font-weight:700;cursor:pointer;}
.tp-eco.on{background:#fef3c7;border-color:#f59e0b;color:#92400e;}
.tp-eco-msg{background:#fef9ec;border:1.5px solid #fde9b8;border-radius:12px;padding:9px 12px;font-size:.78rem;color:#92400e;font-weight:600;margin-bottom:10px;line-height:1.45;}
.tp-row{display:flex;align-items:center;gap:11px;width:100%;border:none;background:var(--mint-bg);border-radius:14px;padding:11px 12px;margin-bottom:7px;cursor:pointer;text-align:left;font-family:'Outfit',sans-serif;transition:transform .1s;}
.tp-row:last-child{margin-bottom:0;}
.tp-row:active{transform:scale(.98);}
.tp-row.done{opacity:.6;}
.tp-em{font-size:1.5rem;flex-shrink:0;}
.tp-info{flex:1;display:flex;flex-direction:column;gap:1px;min-width:0;}
.tp-t{font-size:.86rem;font-weight:700;color:var(--teal-dark);}
.tp-row.done .tp-t{text-decoration:line-through;}
.tp-s{font-size:.72rem;color:var(--text-soft);font-weight:500;}
.tp-arrow{font-size:1.1rem;color:var(--teal);font-weight:800;flex-shrink:0;}

/* Module grid */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:4px;
}
.module-card{
  background:var(--white-card);
  border-radius:20px;
  padding:18px 10px 14px;
  text-align:center;
  cursor:pointer;
  border:2px solid var(--mint-mid);
  transition:transform .12s, background .12s, border-color .12s;
  position:relative;
  box-shadow:0 3px 10px rgba(38,166,154,.10);
}
.module-card:active{
  transform:scale(0.95);
  background:var(--mint-mid);
  border-color:var(--teal);
}
.module-card .icon{
  font-size:2rem;
  display:block;
  margin-bottom:8px;
}
.module-card .title{
  font-size:.9rem;
  font-weight:700;
  color:var(--teal-dark);
  line-height:1.2;
}
.module-card .sub{
  font-size:.7rem;
  color:var(--text-soft);
  margin-top:3px;
  font-weight:500;
}

.footer-note{
  text-align:center;
  margin-top:28px;
  font-size:.72rem;
  color:var(--text-soft);
  line-height:1.7;
  opacity:.7;
}

/* ── MODULE VIEWER ── */
#viewer{
  position:fixed;
  inset:0;
  background:#fff;
  display:none;
  z-index:100;
}
#viewer.show{display:block;}
#viewer iframe{
  width:100%;
  height:100%;
  border:none;
  display:block;
}
#homeBtn{
  position:fixed;
  bottom:20px;
  left:18px;
  width:52px;
  height:52px;
  border-radius:50%;
  background:var(--teal);
  color:#fff;
  border:none;
  font-size:1.4rem;
  box-shadow:0 4px 16px rgba(38,166,154,.45);
  z-index:101;
  display:none;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
#homeBtn.show{display:flex;}
#homeBtn:active{transform:scale(.9);}

/* ── SOS flotante: botiquín a un toque desde cualquier sitio ── */
#sosBtn{
  position:fixed;bottom:20px;right:18px;z-index:200;
  background:linear-gradient(135deg,#e35d6a,#ef8354);color:#fff;
  border:none;border-radius:999px;padding:14px 20px;
  font-family:'Outfit',sans-serif;font-weight:800;font-size:.95rem;
  box-shadow:0 4px 18px rgba(227,93,106,.45);cursor:pointer;
  display:flex;align-items:center;gap:7px;
}
#sosBtn:active{transform:scale(.93);}

/* ── Ajustes rápidos ── */
.cfg-zone{margin-top:22px;}
#calmBtn{
  width:100%;border:2px solid #f3d9a4;background:#fdf6e3;color:#8a6410;
  border-radius:16px;padding:14px;font-family:'Outfit',sans-serif;
  font-size:.92rem;font-weight:700;cursor:pointer;margin-bottom:10px;
}
#calmBtn.on{background:#8a6410;border-color:#8a6410;color:#fff;}
.cfg-chips{display:flex;gap:8px;}
.cfg-chips button{
  flex:1;border:2px solid var(--mint-mid);background:var(--white-card);color:var(--teal-dark);
  border-radius:12px;padding:10px 4px;font-family:'Outfit',sans-serif;
  font-size:.76rem;font-weight:700;cursor:pointer;
}
.cfg-chips button.off{opacity:.4;text-decoration:line-through;}
.cfg-note{font-size:.72rem;color:var(--text-soft);text-align:center;margin-top:8px;opacity:.8;}

/* ── Quokka asomado agarrando el panel ── */
.quokka-peek{display:flex;justify-content:center;margin-bottom:-24px;position:relative;z-index:0;}
.tp-wrap{position:relative;z-index:1;}
.q-paw{position:absolute;top:-13px;width:44px;z-index:2;pointer-events:none;}
.q-paw.l{left:16%;transform:rotate(-6deg);}
.q-paw.r{right:16%;transform:rotate(6deg);}

.calm *,.calm *::before,.calm *::after{animation:none !important;transition:none !important}
</style>
</head>
<body>

<div id="dashboard">
  <div class="hero">
    <div class="greeting-row" id="greeting">¡Hola, Cris!</div>
    <div class="hero-sub">¿en qué te ayudo hoy?</div>
  </div>

  <div class="quokka-zone" style="margin-bottom:0;">
    <div class="bubble" id="bubble-msg">¡Aquí estoy! Elige un módulo 🌿</div>
  </div>

  <!-- Quokka realista-kawaii asomado detrás del panel -->
  <div class="quokka-peek">
    <svg viewBox="0 0 150 96" width="175" xmlns="http://www.w3.org/2000/svg" aria-label="Quokka, tu acompañante">
      <!-- Orejas -->
      <circle cx="42" cy="16" r="13" fill="#b98d5f" stroke="#7c5a38" stroke-width="2.5"/>
      <circle cx="108" cy="16" r="13" fill="#b98d5f" stroke="#7c5a38" stroke-width="2.5"/>
      <ellipse cx="42" cy="17" rx="6.5" ry="7" fill="#d9a18b"/>
      <ellipse cx="108" cy="17" rx="6.5" ry="7" fill="#d9a18b"/>
      <!-- Cabeza con mofletes (silueta de quokka) -->
      <path d="M75 6 C52 6 35 20 31 40 C19 42 12 55 16 65 C20 75 33 80 45 77 C53 87 66 92 75 92 C84 92 97 87 105 77 C117 80 130 75 134 65 C138 55 131 42 119 40 C115 20 98 6 75 6 Z"
            fill="#b98d5f" stroke="#7c5a38" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- Pelaje de la frente -->
      <path d="M67 8 Q71 3 75 8 M73 9 Q77 4 81 9" stroke="#7c5a38" stroke-width="2" stroke-linecap="round" fill="none" opacity=".7"/>
      <!-- Hocico claro -->
      <ellipse cx="75" cy="67" rx="26" ry="19" fill="#ecd9b8"/>
      <!-- Ojos grandes kawaii -->
      <circle cx="55" cy="47" r="7" fill="#2f2013"/>
      <circle cx="57.5" cy="44.5" r="2.6" fill="#fff"/>
      <circle cx="53" cy="49" r="1.2" fill="#fff" opacity=".8"/>
      <circle cx="95" cy="47" r="7" fill="#2f2013"/>
      <circle cx="97.5" cy="44.5" r="2.6" fill="#fff"/>
      <circle cx="93" cy="49" r="1.2" fill="#fff" opacity=".8"/>
      <!-- Mejillas sonrosadas -->
      <ellipse cx="42" cy="61" rx="6.5" ry="4" fill="#e2836d" opacity=".35"/>
      <ellipse cx="108" cy="61" rx="6.5" ry="4" fill="#e2836d" opacity=".35"/>
      <!-- Nariz -->
      <path d="M69 56 Q75 51.5 81 56 Q81 62.5 75 65.5 Q69 62.5 69 56 Z" fill="#4e3423"/>
      <!-- La famosa sonrisa del quokka -->
      <path d="M75 65.5 Q75 70 69 71.5 M75 65.5 Q75 70 81 71.5" stroke="#4e3423" stroke-width="2.4" stroke-linecap="round" fill="none"/>
      <path d="M63 70 Q75 81 87 70 Q75 76 63 70 Z" fill="#8a4a3a"/>
      <ellipse cx="75" cy="74.5" rx="4" ry="2" fill="#e2836d"/>
      <!-- Bigotes -->
      <path d="M36 58 L20 54 M37 64 L20 63 M36 70 L21 72" stroke="#7c5a38" stroke-width="1.5" stroke-linecap="round" opacity=".55"/>
      <path d="M114 58 L130 54 M113 64 L130 63 M114 70 L129 72" stroke="#7c5a38" stroke-width="1.5" stroke-linecap="round" opacity=".55"/>
    </svg>
  </div>

  <div class="tp-wrap">
    <!-- Patitas agarrando el borde del panel -->
    <svg class="q-paw l" viewBox="0 0 44 28" xmlns="http://www.w3.org/2000/svg">
      <path d="M5 28 L5 15 Q5 3 22 3 Q39 3 39 15 L39 28 Z" fill="#b98d5f" stroke="#7c5a38" stroke-width="2.5"/>
      <line x1="16" y1="7" x2="16" y2="19" stroke="#7c5a38" stroke-width="2" stroke-linecap="round"/>
      <line x1="28" y1="7" x2="28" y2="19" stroke="#7c5a38" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <svg class="q-paw r" viewBox="0 0 44 28" xmlns="http://www.w3.org/2000/svg">
      <path d="M5 28 L5 15 Q5 3 22 3 Q39 3 39 15 L39 28 Z" fill="#b98d5f" stroke="#7c5a38" stroke-width="2.5"/>
      <line x1="16" y1="7" x2="16" y2="19" stroke="#7c5a38" stroke-width="2" stroke-linecap="round"/>
      <line x1="28" y1="7" x2="28" y2="19" stroke="#7c5a38" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <div id="today-panel" style="background:#fdfefd;"></div>
  </div>

  <div class="grid" id="moduleGrid"></div>

  <div class="cfg-zone">
    <button id="calmBtn" onclick="toggleCalm()">🕯️ Reducir estímulos</button>
    <div class="cfg-chips">
      <button id="c-voice" onclick="toggleCfg('voice')">🗣️ Voz</button>
      <button id="c-sound" onclick="toggleCfg('sound')">🔔 Sonido</button>
      <button id="c-vib" onclick="toggleCfg('vib')">📳 Vibración</button>
    </div>
    <div class="cfg-note">Los ajustes se aplican a toda la app</div>
  </div>

  <div class="footer-note">
    Cris · tu compañera de cada día 💚<br>
    Toca 🏠 para volver aquí desde cualquier módulo
  </div>
</div>

<!-- Visor de módulos -->
<div id="viewer">
  <iframe id="moduleFrame" title="Módulo de Cris"></iframe>
</div>
<button id="homeBtn" title="Volver al inicio">🏠</button>
<button id="sosBtn" title="Botiquín de emergencia" onclick="openModule('modules/rescate-emocional.html')">🫀 SOS</button>

<script>
const modules = [
  { icon:'🍅', title:'Rutina Diaria',    sub:'Empieza ya: 25 min',  file:'modules/rutina-diaria.html' },
  { icon:'🧘', title:'Ejercicios',       sub:'Pilates guiado, manos libres', file:'modules/ejercicios-hiit.html' },
  { icon:'🍲', title:'Comer Rico',       sub:'Menú semanal y compra',  file:'modules/comida.html' },
  { icon:'🧹', title:'Limpieza',         sub:'Una zona al día · 15 min',    file:'modules/limpieza.html' },
  { icon:'🎨', title:'Intereses',        sub:'Aprender cada día',  file:'modules/intereses.html' },
  { icon:'🫀', title:'Botiquín Emocional',sub:'Rescate y calma',   file:'modules/rescate-emocional.html' },
  { icon:'🌙', title:'Rutina Nocturna',  sub:'Cierre del día',     file:'modules/rutina-nocturna.html' },
  { icon:'🐍', title:'Juegos Mentales',  sub:'Snake y agilidad',   file:'modules/juegos.html' }
];

const BUBBLES = [
  '¡Aquí estoy! Elige un módulo 🌿',
  '¿Cómo estás hoy? 🫶',
  '¡Tú puedes con esto! 💚',
  'Un paso a la vez, sin prisa 🐾',
  '¡Estoy contigo! Elige algo 🌱',
  'Respira. Vamos juntos 🌬️'
];

// Saludo según hora
function setGreeting(){
  const h = new Date().getHours();
  let txt;
  if(h < 12) txt = '¡Buenos días!';
  else if(h < 19) txt = '¡Buenas tardes!';
  else txt = '¡Buenas noches!';
  document.getElementById('greeting').textContent = txt;
  document.getElementById('bubble-msg').textContent =
    BUBBLES[Math.floor(Math.random()*BUBBLES.length)];
}
setGreeting();

/* ── AJUSTES GLOBALES (voz/sonido/vibración/reducir estímulos) ── */
function getCfg(){try{return JSON.parse(localStorage.getItem('cris_cfg')||'{}');}catch(e){return{};}}
function setCfgStore(c){try{localStorage.setItem('cris_cfg',JSON.stringify(c));}catch(e){}}
function toggleCfg(k){const c=getCfg();c[k]=c[k]===false;setCfgStore(c);renderCfg();}
function toggleCalm(){
  const c=getCfg();c.calm=c.calm!==true;setCfgStore(c);
  document.documentElement.classList.toggle('calm',c.calm);
  renderCfg();
}
function renderCfg(){
  const c=getCfg();
  document.getElementById('c-voice').classList.toggle('off',c.voice===false||c.calm===true);
  document.getElementById('c-sound').classList.toggle('off',c.sound===false||c.calm===true);
  document.getElementById('c-vib').classList.toggle('off',c.vib===false||c.calm===true);
  const cb=document.getElementById('calmBtn');
  cb.classList.toggle('on',c.calm===true);
  cb.textContent=c.calm?'🕯️ Modo calma activo — toca para salir':'🕯️ Reducir estímulos';
}
if(getCfg().calm)document.documentElement.classList.add('calm');

/* ── PANEL HOY (lee el progreso real de cada módulo en localStorage) ── */
const PILATES={1:['🌀','Core Profundo','18 min'],2:['🍑','Cadera y Glúteos','17 min'],3:['🌿','Espalda y Postura','18 min'],4:['🦵','Piernas y Equilibrio','17 min'],5:['⭐','Cuerpo Completo','20 min'],6:['🌸','Estiramientos Profundos','20 min'],0:['☀️','Movilidad Suave','15 min']};
const ZONES={1:['🍳','Cocina','cocina'],2:['🛁','Baño','bano'],3:['🛋️','Salón','salon'],4:['🛏️','Dormitorio','dormitorio'],5:['🚪','Zonas Comunes','comunes']};

function weekNum(){const d=new Date(),y=d.getFullYear(),s=new Date(y,0,1);return Math.ceil(((d-s)/864e5+s.getDay()+1)/7);}
function lsJSON(k){try{return JSON.parse(localStorage.getItem(k)||'{}');}catch(e){return{};}}
function todayStr(){return new Date().toISOString().split('T')[0];}
function isEco(){return localStorage.getItem('cris_eco_day')===todayStr();}

function toggleEco(){
  if(isEco())localStorage.removeItem('cris_eco_day');
  else localStorage.setItem('cris_eco_day',todayStr());
  renderToday();
}

function renderToday(){
  const el=document.getElementById('today-panel');
  const d=new Date(),day=d.getDay(),h=d.getHours();
  const eco=isEco();
  const w=weekNum(),y=d.getFullYear();
  const rows=[];

  if(eco){
    rows.push({e:'🫁',t:'Respira 2 minutos',s:'Con eso ya cuenta',f:'modules/rescate-emocional.html'});
    rows.push({e:'🧘',t:'Movilidad suave',s:'Solo lo que te apetezca, sin más',f:'modules/ejercicios-hiit.html#suave'});
    rows.push({e:'🧹',t:'Recoge 3 cosas',s:'Express corto, sin presión',f:'modules/limpieza.html#express'});
    rows.push({e:'🍽️',t:'Receta salvavidas',s:'10 min de despensa y comes',f:'modules/comida.html#basicos'});
  }else{
    const p=PILATES[day];
    rows.push({e:p[0],t:'Pilates: '+p[1],s:p[2]+' · manos libres',f:'modules/ejercicios-hiit.html'});

    if(ZONES[day]){
      const z=ZONES[day];
      const done=!!lsJSON('lim-w'+w+'-'+y)[z[2]];
      rows.push({e:z[0],t:'Limpieza: '+z[1],s:done?'¡Ya está hecha!':'~18 min · 6 pasos',f:'modules/limpieza.html',done});
    }else{
      rows.push({e:'⚡',t:'Finde: limpieza libre',s:'¿Un express de 15 min?',f:'modules/limpieza.html#express'});
    }

    const menuDone=Object.values(lsJSON('cris_menu_w'+w+'_'+y)).filter(Boolean).length;
    const left=Math.max(0,14-menuDone);
    rows.push({e:'🍽️',t:h<17?'¿Qué comes hoy?':'¿Qué cenas hoy?',s:left>0?'Te quedan '+left+' recetas del menú':'Menú de la semana completado 🎉',f:'modules/comida.html'});

    if(h>=20)rows.push({e:'🌙',t:'Rutina nocturna',s:'25 min · cierre del día',f:'modules/rutina-nocturna.html'});
  }

  const dias=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  el.innerHTML=`
    <div class="tp-head">
      <span class="tp-title">${eco?'🪫 Hoy, en modo eco':'✨ Hoy, '+dias[day]}</span>
      <button class="tp-eco ${eco?'on':''}" onclick="toggleEco()">${eco?'💪 Volver a normal':'🪫 Modo eco'}</button>
    </div>
    ${eco?'<div class="tp-eco-msg">Día de poca batería — lo mínimo cuenta. Hacer poco también es cuidarte 💚</div>':''}
    ${rows.map(r=>`
      <button class="tp-row${r.done?' done':''}" onclick="openModule('${r.f}')">
        <span class="tp-em">${r.e}</span>
        <span class="tp-info"><span class="tp-t">${r.t}</span><span class="tp-s">${r.s}</span></span>
        <span class="tp-arrow">${r.done?'✓':'›'}</span>
      </button>`).join('')}`;
}
renderToday();
renderCfg();

// Generar tarjetas
const grid = document.getElementById('moduleGrid');
modules.forEach(m => {
  const card = document.createElement('div');
  card.className = 'module-card';
  card.innerHTML = `<span class="icon">${m.icon}</span><div class="title">${m.title}</div><div class="sub">${m.sub}</div>`;
  card.addEventListener('click', () => openModule(m.file));
  grid.appendChild(card);
});

function openModule(file){
  document.getElementById('moduleFrame').src = file;
  document.getElementById('viewer').classList.add('show');
  document.getElementById('homeBtn').classList.add('show');
}

document.getElementById('homeBtn').addEventListener('click', () => {
  document.getElementById('viewer').classList.remove('show');
  document.getElementById('homeBtn').classList.remove('show');
  document.getElementById('moduleFrame').src = '';
  renderToday(); // refresca el panel: lo hecho dentro del módulo se ve al volver
});

// PWA service worker
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}
</script>
</body>
</html>
