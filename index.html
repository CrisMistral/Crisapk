<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#26a69a">
<title>Cris</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  :root{
    --turq:#26a69a;
    --turq-light:#4dd0e1;
    --lavanda:#e8e6fb;
    --lavanda-soft:#f3f1ff;
    --bg:#f0f9ff;
    --text:#2d3748;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:linear-gradient(160deg,var(--bg) 0%, var(--lavanda-soft) 50%, #ffffff 100%);
    min-height:100vh;
    color:var(--text);
    overflow-x:hidden;
  }

  /* ---------- DASHBOARD ---------- */
  #dashboard{
    max-width:520px;
    margin:0 auto;
    padding:24px 18px 40px;
  }
  .hero{
    text-align:center;
    margin-bottom:22px;
  }
  .hero .mascot{
    font-size:4.2rem;
    animation:bounce 2.4s ease-in-out infinite;
  }
  @keyframes bounce{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-10px) rotate(3deg);}}
  .hero h1{
    color:var(--turq);
    font-size:2rem;
    font-weight:800;
    letter-spacing:1px;
    margin-top:4px;
  }
  .hero p{
    color:#7a8a99;
    font-size:0.95rem;
    margin-top:4px;
  }
  #greeting{
    font-weight:700;
    color:var(--turq);
  }

  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    margin-top:8px;
  }
  .module-card{
    background:#fff;
    border-radius:20px;
    padding:18px 12px;
    text-align:center;
    box-shadow:0 6px 16px rgba(38,166,154,0.10);
    cursor:pointer;
    border:2px solid transparent;
    transition:transform .12s, border-color .12s;
    position:relative;
  }
  .module-card:active{
    transform:scale(0.96);
    border-color:var(--turq-light);
  }
  .module-card .icon{
    font-size:2.2rem;
    margin-bottom:8px;
    display:block;
  }
  .module-card .title{
    font-size:0.92rem;
    font-weight:700;
    color:var(--text);
    line-height:1.2;
  }
  .module-card .sub{
    font-size:0.72rem;
    color:#9aa5b1;
    margin-top:4px;
  }
  .module-card.pending{
    opacity:0.55;
  }
  .module-card .badge{
    position:absolute;
    top:8px;
    right:8px;
    background:var(--lavanda);
    color:#6c5ce7;
    font-size:0.6rem;
    font-weight:700;
    padding:3px 7px;
    border-radius:999px;
  }

  .footer-note{
    text-align:center;
    margin-top:28px;
    font-size:0.72rem;
    color:#b3bcc4;
    line-height:1.6;
  }

  /* ---------- VISOR DE MÓDULOS ---------- */
  #viewer{
    position:fixed;
    inset:0;
    background:#fff;
    display:none;
    z-index:100;
  }
  #viewer.show{display:block;}
  #viewer iframe{
    width:100%;
    height:100%;
    border:none;
    display:block;
  }
  #homeBtn{
    position:fixed;
    bottom:18px;
    left:18px;
    width:52px;
    height:52px;
    border-radius:50%;
    background:var(--turq);
    color:#fff;
    border:none;
    font-size:1.4rem;
    box-shadow:0 4px 14px rgba(38,166,154,0.4);
    z-index:101;
    display:none;
    align-items:center;
    justify-content:center;
  }
  #homeBtn.show{display:flex;}
  #homeBtn:active{transform:scale(0.92);}
</style>
</head>
<body>

<div id="dashboard">
  <div class="hero">
    <div class="mascot">🦘</div>
    <h1>Cris</h1>
    <p><span id="greeting">¡Hola!</span> ¿qué te ayudo a hacer hoy?</p>
  </div>

  <div class="grid" id="moduleGrid">
    <!-- Las tarjetas se generan con JS -->
  </div>

  <div class="footer-note">
    Cris · tu compañera de cada día 💚<br>
    Toca un módulo para empezar. Siempre puedes volver aquí con el botón 🏠
  </div>
</div>

<div id="viewer">
  <iframe id="moduleFrame" title="Módulo de Cris"></iframe>
</div>
<button id="homeBtn" title="Volver al inicio">🏠</button>

<script>
  const modules = [
    { icon:'🍅', title:'Rutina Diaria', sub:'Pomodoro y tareas', file:'modules/rutina-diaria.html' },
    { icon:'💪', title:'Ejercicios', sub:'HIIT semanal', file:'modules/ejercicios-hiit.html' },
    { icon:'🍲', title:'Comer Rico', sub:'Recetas y compras', file:'modules/comida.html' },
    { icon:'🧹', title:'Limpieza', sub:'Plan progresivo', file:'modules/limpieza.html' },
    { icon:'🎨', title:'Intereses', sub:'Aprender cada día', file:'modules/intereses.html' },
    { icon:'💚', title:'Botiquín Emocional', sub:'Rescate y calma', file:'modules/rescate-emocional.html', pending:true },
    { icon:'🌙', title:'Rutina Nocturna', sub:'Con Shiné', file:'modules/rutina-nocturna.html' },
    { icon:'🧩', title:'Juegos Mentales', sub:'Agilidad y enfoque', file:'modules/juegos.html', pending:true }
  ];

  const grid = document.getElementById('moduleGrid');
  modules.forEach(m=>{
    const card = document.createElement('div');
    card.className = 'module-card' + (m.pending ? ' pending' : '');
    card.innerHTML = `
      ${m.pending ? '<span class="badge">pronto</span>' : ''}
      <span class="icon">${m.icon}</span>
      <div class="title">${m.title}</div>
      <div class="sub">${m.sub}</div>
    `;
    card.addEventListener('click', ()=> openModule(m.file));
    grid.appendChild(card);
  });

  function openModule(file){
    const frame = document.getElementById('moduleFrame');
    frame.src = file;
    document.getElementById('viewer').classList.add('show');
    document.getElementById('homeBtn').classList.add('show');
  }

  document.getElementById('homeBtn').addEventListener('click', ()=>{
    document.getElementById('viewer').classList.remove('show');
    document.getElementById('homeBtn').classList.remove('show');
    document.getElementById('moduleFrame').src = '';
  });

  // Saludo según la hora
  function setGreeting(){
    const h = new Date().getHours();
    let txt;
    if(h < 12) txt = '¡Buenos días!';
    else if(h < 19) txt = '¡Buenas tardes!';
    else txt = '¡Buenas noches!';
    document.getElementById('greeting').textContent = txt;
  }
  setGreeting();

  // Registrar service worker (PWA)
  if('serviceWorker' in navigator){
    window.addEventListener('load', ()=>{
      navigator.serviceWorker.register('service-worker.js').catch(()=>{});
    });
  }
</script>
</body>
</html>
