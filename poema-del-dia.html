de árbol azotado por el viento,","entristecido por el aullar de las pasiones,","sin una mano fuerte, sin una mano tierna,","sin una verdad limpia y pura como el aire de las cumbres.","Tú sabes, mi Señor, que sed de ti han gemido mis labios,","y cómo quise llenar el vaso de mi dolor en la renovada fuente de tu misericordia,","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Carmen Conde","title":"G loria Hernández","lines":["Un ala de niebla bate el cielo ancho de las terrazas. ¡Qué cerca está lo negro de nosotras!","Siento tu latido de miedo en mi latido. ¿Por qué temes si soy yo","más clara que la niebla y puedes caminar por mi transparencia?","¿Por qué temes, si somos de cielo y aunque esté oscuro yo soy alta y firme para ti?","Aquí están las mañanas con sus palomas lúcidas ,","con sus jardines ávidos y sus arroyos breves.","En bosques humeantes, en arboledas fluidas,","entre los juncos negros de consumir las noches.","Cantando desde aves, buscándose los ríos;","suben claras antorchas y ríen entregadas","estas auroras tibias que confunden sus bríos","con mediodías gruesos poblados de campanas.","Son los primeros días, las horas iniciales;","el universo aprende que tiene días anchos.","Aquí están las mañanas, vendrán luego las tardes","y las noches de luna con aljibes de fango...","Ahora, no; ahora los que caminan oyen","cómo la voz del campo crece dentro del pino,","y va en la tierna boca de ese viento salobre","que llega desde el puerto como un amargo vino.","Si nadie las estruja, las mañanas doncellas","desnudarán sus cuerpos y tomarán del musgo","este baño de escarcha que en lo verde destella","porque es túnica limpia para el soñar impuro.","Hombres van sonriendo, hembras van deseando;","dichosas bestias plácidas en la hora infinita;","creciendo en las palmeras sus horizontes largos,","volcándose de luz, campana que gravita.","¡Que nadie las detenga, que ninguna palabra","silbe su lazo oscuro para coger los torsos","de estas mañanas dúctiles, azores de las mañanas,","que vuelan, que trascienden los cielos más remotos!","Detengo el caminar por estos versos","que recogen pedazos de memoria,","porque es mucho y es nada tanto tiempo","ofrecido a la fuga de una historia.","Aunque dije y diría, ¿qué palabra","es la exacta versión de lo infinito?","Aunque anduve y conté, ¿cómo se habla","para hacer que se entienda lo inaudito?","¡Oh, qué tierra la mía, tan extensa","y tan breve que cabe en mi persona!","Una zanja de fuego es su defensa","y un espino sin flores la corona.","Que los tibios y ajenos no se mezclen,","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Carmen Conde","title":"Autobiografía","lines":["En este gran salón donde la noche","penetra con su luz de ensueño puro,","quisiera rescatar de tantos ángeles","la luz que por velar ya sé perdida.","La luz que solo yo sabía mía,","aquella que luché porque alumbrara.","Redonda luz de infancia ajena a todos","que tuve por cilicio. Hasta apagarla.","Extraña niña ardiente castigada","por olas de rencor, inextinguibles;","soñando con las rosas, con fantasmas","colmados de purpúreas vestiduras;","cerrándose al ataque con silencio","y tensa voluntad de mundo propio.","Pequeño corazón el que mantuvo","lo oscuro del dolor que perseguía...;","las ansias de escapar eran su agua","y tuvo sed de fuentes celestiales.","Lo crezco desde entonces, grande y duro,","como una piedra roja sin misterio.","Ninguno de mis seres, ni siquiera","la joven que fui pronto, me perturba","la pura maravilla de mi infancia.","Creyente de imposibles aventuras,","fanática soñante de delirios","que nunca realidad alcanzarían.","¡Oh, espíritus, volved! Traedme sienes","que turnen su verdor con las marchitas","que empiezan a pesar sobre mi rostro.","Llevadme con vosotros al trasmundo;","llevadme, que olvidé cómo se iba.","Anduve con los ojos muy cerrados","y nunca me perdí. Llevadme ahora,","que no puedo soñar, de tan despierta.","Perdono con dolor a los que entonces","sus látigos en mí ejercitaron.","Por serles transparentes mi presencia","quisieron concretarla con mi sangre.","Dormida por los siglos se ha quedado,","sin nadie que libere tanto sueño,","la niña que me dio lo que yo he sido.","El día se abrirá. Los días abren","del fondo silencioso del pasado...","¡Oh, noche, que me urges las antorchas,","yo quiero que tú seas irredenta!","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Carmen Conde","title":"Primera noche en la tierra","lines":["Desoladamente","nos ha dejado solos...","No vemos el Jardín de nuestro ocio.","¿Apagose del fuego la gran rama,","o Dios se la llevó fuera del aire?","Habrá luna. Él creaba estrellas,","las que en el agua florecían veloces","buscándome los dedos vegetales.","Habrá su sol.","La líquida corola derramándose","encima de las selvas inholladas","que yo caminaré descalza siempre.","Junto al árbol que lleva doce frutos,","dando uno cada mes, nunca hubo noche.","Ni urgencia de la antorcha ni la brasa.","¡Dios lo alumbra todo! Hizo astros","para nosotros en destierro de sus síes.","Tibias sombras apaciguan las memorias.","Frío de soledad. Ven a mi pecho,","que yo seré tu tierno prado tibio,","y seguro soñarás en mi corteza.","Allá no ululan lobos. Allí lamían dulces","mis pies sobre tomillos aceitosos.","Aquí se encienden ojos y dientes amenazan","modernos calcañares desgarrados.","Ladran los chacales. ¡Oh, las hienas","que lúgubres husmean nuestro sueño!","Toma el paraíso de mi cuerpo:","mis labios son de ascua, mis hogueras","serán lo único vivo de la noche.","Más fuerte que el amor no será el cierzo.","Más dura que tu pecho no es la sombra.","Defiéndete de mí, estoy buscando","olvido de las selvas que no huelo.","¡Noche, cueva negra de la tierra!","Vamos a bebérnosla de un trago","que deje descubiertas las auroras."],"src":"Poetas españolas","pri":0},{"poet":"Carmen Conde","title":"Nostalgia de mujer","lines":["Mil años ante Ti son como sueño.","Como de aguas el grosor de una avenida.","Hierba que en la mañana crece,","florece y crece en la mañana","aunque a la tarde es cortada y se seca.","¿Qué es el tiempo ante Ti, qué son los truenos","que blandes contra mí cuando me nombras?","Pavor siento a tu idea, te veo hosco","mirándome en la lumbre de tu Arcángel.","La espada Tú también, eres el filo","y el pomo que se aprieta con el puño.","Para verte a Ti mismo me has nacido.","Por no estar solo con tu omnipotencia.","Soy la nada, soy de tiempo, soy un sueño...","Agua que te fluye, hierba ácida","que cortas sin amor...","Tú no me quieres."],"src":"Poetas españolas","pri":0},{"poet":"Carmen Conde","title":"Súplica final de la mujer","lines":["Señor, ¿Tú no perdonas? Si perdonara tu olvido","ya no pariría tantos hombres con odio,","ni seguiría arando cada día más estrechas","las sendas de los trigos entre zanjas de sangre.","La fuente de mi parto no se restaña nunca.","Yo llevo las entrañas por raíces de siglos,","y ellos me las cogen, las hunden, las levantan","para tirarlas siempre a las fosas del llanto.","Señor, mi Dios, un día creí que Tú eras mío","porque bajaste a mí alumbrando mi carne","con el alma que allá, al sacarme del hombre,","metiste entre mis huesos con tu soplo de aurora.","Más, ¿no perdonas Tú? Y no es gozo el que tuve","después del gozo inmenso en el jardín robado.","Me sigues en la tierra, retorciendo mis pechos","con labios de criaturas, con dientes demoníacos.","No hay lecho que me guarda, ¡ni de tierra siquiera!","Los muertos me sepultan, y obligada a vivir","aparto sus plomadas y vuelvo a dar la vida.","¡ Oh, tu castigo eterno, tu maldición perenne:","brotar y aniquilarme lo que brotó a la fuerza,","porque un día yo quise que el hombre por Ti hecho","repitiera en mi cuerpo su estatua, tu Figura!","¿Sembrando he de seguir, pariendo más hombres","para que todos maten y escupan mis entrañas","que cubren con el mundo los cielos, tus estrellas,","y hasta el manto de brisas con que Tú paseabas","por tu Jardín soñado, cuando yo era suya?","¿Por qué me visitaste, Señor? ¿Por qué tu Espíritu","entrose a mi angostura dejándome tu Hijo?","¿Por qué te lo llevaste a aquella horrible cueva","que el odio de los hombres le abriera como tumba?","¡ Oh! ¿No perdonas, Dios? Pues sigue tu mirada","teniéndome presente: joven, bella e impía","delante de tus árboles, que yo ya ni recuerdo...","Pues soy vieja, Señor. ¿No escuchas cuánto lloro","cuando el hombre, dormido, me vuelca su simiente","porque Tú se lo ordenas sin piedad de mi duelo?","¿No ves mi carne seca, mi vientre desgarrado;","no escuchas que te llamo por bocas estalladas,","por los abiertos pechos de niños, de mujeres?...","¡En nada te ofendieron sino en nacer!","Soy yo la que Tú olvidas y a ellos los devastas;","me obligas a que siga el lúbrico mandato","de aquella bestia horrible nacida en contra mía.","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Ernestina de Champourcín","title":"Laxitud","lines":["La tarde gris y triste me agobia,","tengo sueño;","estiro lentamente","mis dos brazos abiertos","que se prenden al aire;","quieren cazar el tiempo,","aprisionarlo pronto,","robarle su secreto,","deshacer bruscamente sus límites estrechos.","Quiero llorar: no sé;","quiero reír: no puedo.","Los deseos","se estrellan contra la inexorable inercia","del silencio;","sobre mi corazón rueda grávido el peso","de la existencia toda.","Al fin me desperezo.","Logro romper el cerco","del malsano sopor,","pero apenas lo venzo","ya me torna a invadir","quedamente su tedio.","Luego...","Ya no sé más;","suspiro,","me paseo,","exprimo el tormentoso","lagar de mi cerebro,","destilo el elixir de su inquietud","en mi pecho...","Sujeto en mi memoria","repite el pensamiento;","la tarde gris y triste me agobia,","¡tengo sueño!...","Tú no sabes aún que he cercado tu orilla,","que sueñas por la noche el color de mis ojos,","que tus manos en sombra","dirigen su tanteo hacia mi soledad.","¡Ignóralo así siempre!","Yo agolparé tinieblas en el limpio sendero","que hollan las verdades.","Plegaré la inconsciencia como una venda inmóvil","sobre tu laxitud.","Nunca sabrás que en ti la fuerza se desnuda","para erguir hasta el cielo el soplo de mi vida.","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Ernestina de Champourcín","title":"La oración","lines":["Ese muro implacable, tan ciego, tan callado…","y yo a los pies del muro con mi sed y mis ansias,","yo sola, rodeada de todo lo que esquivo…","¡Qué lucha de lo inútil contra la pura esencia!","Un reflejo en el muro… una luz resbala","sobre esa cal inmóvil de un blanco impenetrable…","¡Es Tu sombra, Señor! Qué minuto de gloria.","Y después… qué silencio en qué sombras de noche.","Aquí estoy todavía… Yo sé que existe el pozo","donde dormita el agua que ofreciste a mis labios.","Yo sé que solo falta una grieta en el muro;","la que yo podré abrir mientras espero y amo.","Dame fuerzas, Señor. Aunque transcurran siglos","me encontrarás aquí, rendida y obstinada,","soñándote y amándote mientras pasan las horas,","mientras mi sed de Ti va adelgazando el muro…","A Juan Ramón Jiménez","Hoja blanca de hoy, de siempre, de mañana.","Frutal de cada día, semilla fecundada","por un rayo de luz o una gota de agua.","La vida fluye abajo, arrastrándose vana.","Encima de mi frente, los divinos fantasmas","del sueño verdadero, los éxtasis del alma…","cicatrices de oro, que mi pluma va abriendo","sobre la hoja blanca."],"src":"Poetas españolas","pri":0},{"poet":"Ernestina de Champourcín","title":"I","lines":["(Huerto de fray Luis, Salamanca, febrero de 1928)","Laten oscuramente","los frutos del mañana...","¡Árbol mío reseco,","desnúdate más hondo!","Va sin túnica el agua","ofreciéndose al cielo."],"src":"Poetas españolas","pri":0},{"poet":"Ernestina de Champourcín","title":"II","lines":["(México, mayo de 1971)","Y pasó aquel mañana","–con frutos o sin ellos–","y vuelven al presente,","de pronto, aquellos versos.","Mi árbol ya cantó","vibrando entre Tus dedos,","y se fue despojando","mi pobre tronco hueco","para dejarte paso.","Después... hubo desiertos","y luz, oscuridades","y pozos de silencio.","El agua de aquel día","se ha quedado muy lejos.","–Éramos tres entonces:","sola en el Huerto quedo.","Voy a erguirme sin túnica ante tus ojos claros","que persiguen sin verme un sueño irrealizable,","quiero alzar ante ti mi desnudez intacta","como una ofrenda inútil que nunca aceptarás.","Seré tuya en silencio. Tus manos abstraídas","ignorantes del don que ha de colmar sus palmas,","se detendrán en mí, advirtiéndome apenas,","entre el vivo relumbre de un espejismo ignoto.","Me poseerás ajeno, ausente de tu abrazo,","tendido hacia otro rumbo de frágiles riberas","mientras te doy mi vida impetuosa y pura","en el breve cristal de un momento sin gloria.","Todo es nuevo,","se siente y aún se quiere","con gracia de capullo.","Un ramo de esperanzas","acaricia las puertas","que duermen todavía.","¿Y es posible nacer","cuando todo se acaba?","Si cerramos los ojos","ya en lenta despedida","algo nos fuerza a abrirlos","porque el mundo despunta","deslumbrando las horas,","un ramo de esperanzas","un brote de belleza","en medio de lo oscuro:","[…]"],"src":"Poetas españolas","pri":0},{"poet":"María Teresa Roca de Togores","title":"A un abanico","lines":["Abanico encantado, en tus tenues colores,","vibra el arte supremo del pincel de Watteau,","en ti mueren las frases de los viejos amores","y las rimas ingenuas que tu gracia inspiró.","Tu naciste en un siglo de placer y de orgía,","y en la Corte famosa de un famoso Rey Luis,","escuchaste las risas de la amada de un día","como el triste suspiro de una reina infeliz.","Eres frívolo y frágil, como el alma liviana","de la grácil marquesa que te supo agitar;","¡oh, cómplice temible de la fiel cortesana,","qué de intrigas contaras si pudieras hablar!","Tú robaste a la noche sus matices de plata","y sus pálidos oros a las rosas de té;","en ti duermen los ecos de la vieja sonata","y las rítmicas notas del gentil minué.","Tú recuerdas la pompa de la Corte francesa,","y revives la historia del augusto Borbón","que salpicara el trono de su invicta grandeza","con el cieno del vicio de una insana pasión.","Y viviste entre aromas, entre seda y brocados,","entre burlas y besos, y palabras de amor;","y bebiste el aliento de labios perfumados,","y evaporaste gemas que cuajara el dolor.","Hay escrito en tu vida un retazo de historia,","de la historia de un siglo de inagotable afán;","que lo mismo cantaba del guerrero la gloria,","que admiraba las rimas del abate galán.","Instrumento engañoso de la trama de encajes,","encubridor de risas, de llanto y de traición,","en ti vibran las almas de añejos personajes,","en ti vive el recuerdo que amó la tradición.","Eres frívolo y frágil, como el alma liviana","de la grácil marquesa que te supo agitar.","¡Oh, cómplice temible de la fiel cortesana,","qué de intrigas contaras si pudieras hablar!","Hoy yace ya olvidada la escena campesina","de los tenues colores que el tiempo acarició;","que encerrado en la cárcel de moderna vitrina","duerme el arte supremo del alma de Watteau."],"src":"Poetas españolas","pri":0},{"poet":"María Teresa Roca de Togores","title":"Roja, toda roja…","lines":["Roja, toda roja vi siempre la vida;","como una inmensa hoguera","donde quemaba bien","mi pobre corazón, rojo también.","Todo rojo el camino,","todo rojo el sendero","a seguir","y el día a vivir.","Y rojo el mundo entero.","Rojo de amor.","Y de dolor","y de horror…","En este vasto incendio","(brasa, flama, carbunclo),","que todo centelleante apareció","en esa luminaria,","¿qué había de ser yo,","alma furtiva","y temeraria?","¿Qué habría de ser yo","sino una llama viva?"],"src":"Poetas españolas","pri":0},{"poet":"María Teresa Roca de Togores","title":"La zarpa","lines":["Noche de estío, que en inquietud me sume…","Una flor lentamente se deshoja","entre intensas oleadas de perfume;","y hay una luna grande, hiriente y roja.","La brisa espesa muerde perversamente","con el hábito tibio de un suspiro,","y acaricia la boca febrilmente","con el ávido beso de un vampiro.","No hay estrellas. El cielo es esta noche","la misteriosa comba inmaculada","prendida únicamente con el broche","de una luna de faz congestionada.","Quizás mañana habrá tormenta; acaso","en esa obscuridad se está preñando","el rayo y la tormenta paso a paso,","y el torrente pluvial que ha de ir saciando","esta ansia intensa de humedad que encierra","una agria emanación calenturienta","que sube de la entraña de la tierra","seca y resquebrajada, ardorosa y sedienta.","Nocturno de estío. Hora febril y palpitante","en que el silencio y la fragancia arrullan","y toda la existencia se hace un interrogante","y en la calma tan solo los sentidos aúllan.","Mañana habrá tormenta. Esta noche expectante","me deja dolorida de emoción","como una zarpa alucinante","que me fuera exprimiendo el corazón."],"src":"Poetas españolas","pri":0},{"poet":"María Teresa Roca de Togores","title":"Rebeldía","lines":["Señor, ya no más hiel; quiero un momento","ser yo quien el atroz látigo empuñe.","Hastiado de lo injusto del tormento","el león que hay en mí protesta y gruñe.","Señor, ni sumisión ni mansedumbre","quiero; no soporto lo inicuo de mi yugo.","Soy rayo, río, volcán, soy muchedumbre,","no tolero cadenas ni verdugo.","Señor, ya no más hiel, que mi garganta","la inhumana ponzoña más no aguanta.","Mi corazón, congestionado, estalla...","Y una roja visión me va exaltando...","¡Si he de morir, Señor, que sea matando,","como muere el soldado en la batalla!"],"src":"Poetas españolas","pri":0},{"poet":"María Teresa Roca de Togores","title":"El pulpo","lines":["Una noche soñé que un pulpo me quería.","¡Oh, la indecible angustia de aquella aberración!","Nunca he sufrido tanto; cuando amaneció el día","dijérase que había perdido la razón.","¿Alguien ha visto un pulpo acercársele quedo,","asqueroso y lascivo, monstruoso y feroz?","Por vez primera supe qué es ser presa del miedo,","qué es hundirse en la sima de una demencia atroz.","Él caminaba siempre, y yo huía, yo huía;","sus tentáculos eran como una maldición","caída del infierno sobre la carne mía","que crispaba el espanto de la alucinación.","¡Qué terror! Se me helaban los gritos en la boca.","¡Qué terror! No acertaba ni auxilio a demandar.","Y él avanzaba siempre, y yo, como una loca,","ni siquiera sabía hacia dónde escapar.","Un tentáculo horrible sobre mí iba a caer","como una helada mano blancuzca y amarilla,","cuando al fin dando un grito que sacudió mi ser","desperté sollozando de aquella pesadilla","que me hizo conocer el infierno del pánico,","el dolor de lo innoble, el terror de lo infecto","encarnado en lo inmundo de aquel pulpo satánico,","tenebroso y maldito, misterioso y abyecto.","Si en mis ojos a veces un terror pavoroso","refleja la impotencia de un grito silencioso,","si parece que miro una horrenda visión,","si a veces en mis labios hay un temblor de agonía,","es desde que soñé que un pulpo me quería.","¿Cómo olvidar la angustia de aquella aberración?"],"src":"Poetas españolas","pri":0},{"poet":"María Teresa Roca de Togores","title":"Reposo","lines":["No fijes tu mirada","en mis pupilas hondas;","no sacudas el ángel","de las visiones rojas.","No oprimas con tu mano","mi mano temblorosa;","no despiertes la bruja","de los gestos de loca.","No obligue tu palabra","a que la mía responda;","deja mi voz ahogada,","mi lengua silenciosa.","No indiques a mis pies","la ruta tentadora;","no evoques el fantasma","de la marcha azarosa.","No nombres a mi mente","la rima que obsesiona;","no llames al espíritu","de la ilusión traidora."],"src":"Poetas españolas","pri":0},{"poet":"María Teresa Roca de Togores","title":"Elogio de la risa","lines":["¡Saludad a la risa que pasa!","¡Respetad a la jocunda masa","que tiene por bandera un cascabel!","La vida es vieja y fea; necesita una gasa","que ciña alegremente su cabellera rasa,","como una triunfante corona de laurel.","No busquéis a la risa su razón matemática.","No indaguéis si sus ecos distraen al alma extática","o si encierran sus sones mil formas de fingir.","¿Qué importa que una vieja desquiciada y apática","ría apáticamente? ¿O que alguna lunática","trunque en bruscos desmayos su histérico reír?","Lo importante es la risa. Lo esencial el sonido","que nos sacuda el alma. Sea real o fingido,","tiene sobre nosotros su vibrar tal poder","que unas veces nos calma y otras nos da el olvido,","y así un gozo mecánico que empezó indefinido","acaba y se resuelve en sincero placer.","¡Saludad a la risa! ¡Respetad sus blasones!","Ella es la dulce musa que da preciosos sones,","y el juego de sus viñas tiene fulgor de gema.","Amad sus locas huestes: los payasos burlones,","los ciegos optimistas, los alegres histriones","y todos los que hicieron de la risa su emblema.","¡Saludad a la risa! Su armonía","es el himno más grande, la poesía","más pura que en el libro del mundo escribiréis.","¡Dad al viento sus sones, gozad su melodía,","reíd con alma y nervios, porque pensad que un día","tendréis tierra en la boca... y nunca más reiréis!"],"src":"Poetas españolas","pri":0},{"poet":"María Teresa Roca de Togores","title":"El viejo trío","lines":["Colombina, Pierrot, Arlequín. El viejo trío","que aparece del todo transformado.","En una clara noche de este estío","yo lo he visto pasar, modernizado.","Colombina, elegante y esquelética,","mostrando una silueta parisina.","Pierrot sin blanquear su faz patética","porque hoy quien se pinta es Colombina.","Arlequín, siempre a la caza de conquista,","mira a Colomba y tararea el allegro","sincopado de un canto de revista","mientras marca un compás de baile negro.","A Pierrot ya no vence la ansiedad","de contarle a la luna su tragedia","y se atiene a la cruda realidad:","con serenatas poco se remedia.","Ya no tañe la vieja mandolina","ni versifica su pasión cruenta.","Se ha dado al cabaret y a la morfina","como el héroe de un tango de Spaventa.","Arlequín se ha tornado indiferente","y ha adoptado una «pose» bastante exótica;","pero quiere a Colomba ciegamente...","Por su tipo perfecto de neurótica.","Y con aburrimiento soberano","entró el trío, silencioso,","en un «dancing» americano","que anunciaba un letrero luminoso."],"src":"Poetas españolas","pri":0},{"poet":"María Teresa Roca de Togores","title":"Crepúsculo","lines":["¡Oros, oros! ¡Granas, granas!","¡Sangre todavía caliente","de asesinadas mañanas!"],"src":"Poetas españolas","pri":0},{"poet":"María Teresa Roca de Togores","title":"Molinos de viento","lines":["Molinos de viento...","¡Alma, si pudieras","tú, como ellos, dar","máximo provecho","de la fuerza inútil","que te hace girar!"],"src":"Poetas españolas","pri":0},{"poet":"Cristina de Arteaga","title":"Sembrad","lines":["Sin saber quién recoge, sembrad,","serenos, sin prisas,","las buenas palabras, acciones, sonrisas...","que se lleven la siembra las brisas.","Con un gesto que ahuyenta el temor","abarcad la tierra,","en ella se encierra","la gran esperanza para el sembrador.","¡Abarcad la tierra!","No os importe no ver germinar","el don de alegría;","sin melancolía","dejad al capricho del viento volar","la siembra de un día.","Las espigas dobles romperán después.","Yo abriré la mano","para echar mi grano","como una armoniosa promesa de mies","en el surco humano."],"src":"Poetas españolas","pri":0},{"poet":"Cristina de Arteaga","title":"Lo intrazado","lines":["Las carreteras, como reptiles,","son largas","y amargas,","las cruzan con tráficos viles","las turbas malditas, las turbas serviles...","¡Tengo horror al camino trazado!","Prefiero","el sendero","modesto, olvidado","que trilla el ganado.","Un esbozo de senda","vacía","tan mía","que nunca pretenda","otra vía.","Pero más que senderos","muy llanos","con lodos","de todos","los rastros humanos;","yo pienso","en lo Inmenso","magnífico y rudo","donde mi destino","devaste un camino","desnudo..."],"src":"Poetas españolas","pri":0},{"poet":"Cristina de Arteaga","title":"Por la estepa dolorosa…","lines":["Por la estepa dolorosa","los caminos polvorientos","van trazando su elegía","de soledad y silencios...","Por las almas siempre solas","como los campos desiertos,","por las almas relegadas","a los olvidos del tiempo;","solo transitan las sombras,","¡las sombras de los recuerdos!"],"src":"Poetas españolas","pri":0},{"poet":"Cristina de Arteaga","title":"Contraste","lines":["Me he tendido en el suave jardín del monasterio.","La iglesia se adormece bajo el sol de verano.","Se doran los cipreses del viejo cementerio...","¡Quiero cantar la estrofa de un himno gregoriano!","Allá en la lejanía, recogidos y graves,","unos monjes, calada la capucha, meditan.","Pero el ambiente es cálido, se estremecen las aves,","la tierra aletargada vierte efluvios que incitan.","Inflexible la voz de la campana reza,","en el cristal del día se desnuda su alarde.","¡No he podido rezar!... Me invade la pereza","esparcida en la densa laxitud de la tarde.","Sumergida en las hierbas perfumadas y untuosas,","ante un monje muy pálido, de figura de asceta,","por absurda ilación de paisajes y cosas...","¡Me acuerdo de Tais y del anacoreta!"],"src":"Poetas españolas","pri":0},{"poet":"Cristina de Arteaga","title":"IV","lines":["Deja que apoye en tu hombro mi cabeza,","deja que en ti descanse mi alma de mujer;","pero acércate más. ¡Me da tanta tristeza","la sombra que desciende con el atardecer!...","¿No oyes subir el cauce de la melancolía?","Me parece un presagio de lo que va a cesar...","ya se asoman las almas a ver morir el día;","es la hora romántica. ¡No la dejes pasar!","Pon tu mano en mis manos, un instante... Sofoca","las palabras que dicen adiós a la ilusión...","Séllala con los besos, lágrimas de tu boca...","¡Y déjame llorar sobre tu corazón!"],"src":"Poetas españolas","pri":0},{"poet":"Cristina de Arteaga","title":"Invernal","lines":["Solos por el parque,","por el parque viejo","que tenía un largo","cansancio de invierno;","tras de tantos años","volvimos a vernos.","Yo llevaba el triste","corazón enfermo,","caía en el suyo","la niebla del tedio.","¡Cuán lejos las horas","vírgenes de duelos","en que nuestras vidas","eran como versos","que a veces rimaban","casi sin saberlo...!","Me clavó sus ojos","como en otros tiempos,","mas nada me dijo","su turbado acento.","Yo cerraba el arca","de mis pensamientos","porque no rasgase","lo gris del silencio","que esfumaba un mudo","soñador arpegio...","Y con una angustia","despertaba un nuevo","pavoroso acorde","dentro de su pecho,","nos miramos como","se miran los ciegos...","¡Y nos separamos","para nunca vernos!"],"src":"Poetas españolas","pri":0},{"poet":"Cristina de Arteaga","title":"Convalecencia","lines":["En el blanco terrado me dejó la enfermera,","silenciosa y tendida bajo el beso del sol","y me acoge el rumor de la gens dominguera,","esas voces de niños que juegan al futbol.","Superado el peligro, casi extraño mi suerte","me pregunto si debo contristarme o reír...","Fue tan dulce vivir cara a cara a la muerte","que hasta cuesta vivir.","Y me miro las manos de un marfil transparente,","que tan lánguidas unen su deseo de orar.","Siento una alegría de convaleciente","que me hace llorar."],"src":"Poetas españolas","pri":0},{"poet":"Concha Méndez","title":"Nocturno","lines":["Una plaza. La luna","juega con la Noche.","Y una campanada muda","mira desde su torre.","Una fuente y una luz","decoran la rinconada.","Más allá se ve un farol","y una reja iluminada.","El pueblo espera dormido","otra llegada del alba.","Y, mientras espera, tiene","todas sus puertas cerradas."],"src":"Poetas españolas","pri":0},{"poet":"Concha Méndez","title":"Nadadora","lines":["Mis brazos:","los remos.","La quilla:","mi cuerpo.","Timón:","mi pensamiento.","(si fuera sirena,","mis cantos","serían mis versos)"],"src":"Poetas españolas","pri":0},{"poet":"Concha Méndez","title":"Paisaje urbano","lines":["Ya pasea la luna por las azoteas.","En las calles y avenidas los perfiles se agrandan.","En el momento lívido, que hace inclinar las hojas","las farolas encienden su luz de madrugada.","Un cielo barnizado de cemento, sostiene","entre sus anchos dedos escasas luminarias.","Por el asfalto ruedan rehilanderas de acero","con sonoros flautines de voces esmaltadas.","Se estremece un tic-tac de pasos epilépticos.","Se disparan a un tiempo cohetes de miradas.","Se juega a serpentinas a través de las lunas","de los escaparates –cintura cinemática–.","Y se ven, dominando las huestes callejeras,","policías ecuestres de ondulantes capas.","Los vastos rascacielos emanan claridades","de las ruedas Catalina y luces de Bengala,","que saltan a la calle, gozosas de perderse,","entre el rumor continuo de todas las pisadas.","Por las profundas venas, el metropolitano","veloz de puerto en puerto, acompasando escalas,","cruzando del suburbio a la gran avenida","en una eterna noche de sombras estrelladas.","Se ha tendido en lo alto, sobre las azoteas,","la etíope danzarina, dulce y desmelenada."],"src":"Poetas españolas","pri":0},{"poet":"Concha Méndez","title":"Recuerdo de sombras","lines":["Sobre la blanca almohada,","más allá del deseo,","sobre la blanca noche,","sobre el blanco silencio,","sobre nosotros mismos,","las almas en su encuentro.","Sobre mi frente erguido","el exacto momento,","dices que en una sombra","vives en mi recuerdo.","Síntesis de las horas.","Tú y yo en movimiento","luchando vida a vida,","gozando cuerpo a cuerpo.","Dices que en estas sombras","vives en mi recuerdo,","y son las mismas sombras","que están en mí viviendo."],"src":"Poetas españolas","pri":0},{"poet":"Concha Méndez","title":"Silencio","lines":["De piedra siento el silencio","sobre mi cuerpo y mi alma.","No sé qué hacer bajo el peso","de esta losa.","Tendida estoy a la noche","–árbol de sombra sin ramas–.","Parece el tiempo dormido,","parece que no soy yo","quien está a solas conmigo.","Se desprendió mi sangre para formar tu cuerpo .","Se repartió mi alma para formar tu alma.","Y fueron nueve lunas y fue toda una angustia","de días sin reposo y noches desveladas.","Y fue en la hora de verte que te perdí sin verte.","¿De qué color tus ojos, tu cabello, tu sombra?","Mi corazón que es cuna que en secreto te guarda,","porque sabe que fuiste y te llevó en la vida,","te seguirá meciendo hasta el fin de mis horas."],"src":"Poetas españolas","pri":0},{"poet":"Concha Méndez","title":"Tiempo","lines":["Pupilas verdes, azules,","negras, de color castaño;","pupilas inolvidables","a las que yo me he asomado.","¿Qué habrá sido de vosotras","al transcurrir de los años?","Al igual que de los ojos","qué habrá sido de las manos","que al contacto con las mías","supe que me acariciaron.","¿Y qué de aquellas palabras?","¿Qué vientos se las llevaron?","Si algún dolor va perdido,","no tema acercarse a mí","que a muchos que me llegaron","calma y abrigo les di.","Yo tengo una fiel morada","en donde van a vivir,","según van y van llegando,","y se reúnen allí.","Así todos se acompañan","y se cuentan entre sí","cómo fueron engendrados,","la razón de su existir.","Y se van entreteniendo","hasta que les llega el fin.","Si turbia la razón y roto el sueño","paso a ser una sombra entre mortales,","quede de mí la luz que ahora me guía","antes de ser mi sombra larga noche.","Quede de mí la angustia y el anhelo","y la risa y el llanto en esa espera.","Que algunos ojos para verme un día","se asomarán al mar donde me muevo.","Salgo a la calle y voy en ascua viva ,","o voy temblando porque el mundo es triste.","Y vuelvo de la calle y entro en casa","y el mundo sigue triste sin remedio.","Y no es que falte un ángel en la estancia","que nos sonría, que nos hable al menos.","Y no es que falte un dios para las cosas,","ni ese deseo de pasar soñando","sin escuchar las quejas que en el aire","vagan por encontrar por fin el eco."],"src":"Poetas españolas","pri":0},{"poet":"Lucía Sánchez Saornil","title":"Nocturno de cristal","lines":["Los cisnes","cobijan la luna bajo sus alas.","¿Quién ha sembrado el fondo negro","de anzuelos de oro?","Las hojas de los árboles","sobre el estanque sueñan","con un viaje a ultramar.","Me ha tentando el suicidio","y al mirarme en el espejo","me ha espantado mi doble","ahogándose en el fondo."],"src":"Poetas españolas","pri":0},{"poet":"Lucía Sánchez Saornil","title":"Es en vano","lines":["Detrás de nosotros","dejamos un rastro de cadáveres.","A cuántos los quisiéramos resucitar","y darles su sol y su cantar y su sonrisa.","Nada hay que pueda ponerlos en pie.","De algunos nos hemos traído el perfume","pero ellos van en sus cajas negras","río abajo."],"src":"Poetas españolas","pri":0},{"poet":"Lucía Sánchez Saornil","title":"Anochecer de domingo","lines":["¿Quién aprisionó el paisaje","entre rieles de cemento?","Bocas hediondas ametrallan la noche.","Los hombres que tornan del domingo","con mujeres marchitas colgadas de los brazos","y un paisaje giróvago","en la cabeza","vendrán soñando en un salto prodigioso","para que el río acune su sueño.","Un grito mecánico entra en el puente.","De pronto alguien","ha volcado sobre nosotros su mirada","desde la curva de la carretera.","Pasó.","Sus ojos van levantando los paisajes que duermen.","Ahora la luna ha caído a mis pies."],"src":"Poetas españolas","pri":0},{"poet":"Pilar de Valderrama","title":"Huerto cerrado","lines":["Unas tapias altas cerrando un espacio pequeño:","pequeño tan solo si se mira a tierra,","pero ilimitado si se mira al cielo.","Hiedras en esas tapias.","Un ciprés muy viejo","al que en mayo alegran unas golondrinas","pone en el ocaso su perfil austero.","Las nubes muy cerca.","El mundo muy lejos...","Crece el cinamomo junto a los granados,","el mirto, el romero;","y sobre la orilla fresca de un arroyo","abren sus corolas los lirios bermejos.","De mi propio campo, de mis propias flores","soy el jardinero.","¡Con qué amor las riego!","De hierbas, reptiles","e insectos,","que un día pudieran secar sus raíces,","las limpio y defiendo.","Y para que nunca ningún ser profano","a ultrajar llegara mis lirios bermejos,","quisiera crecieran... crecieran... las tapias","hasta confundirse con el ancho cielo.","Por fuera la vida","y yo aislada dentro","sobre el viejo mundo","en mi mundo nuevo...","Y cuando un extraño, mirando el recinto","curioso indagara: «¿Será torre o templo?».","Alguien respondiera: «Es Huerto Cerrado","donde se cultiva la Flor de los Sueños»."],"src":"Poetas españolas","pri":0},{"poet":"Pilar de Valderrama","title":"Poema tercero","lines":["Ella y él se miraron hondamente,","y algo indefinido","entre los dos flotó, tan impalpable","como un soplo divino.","Después, cuando las manos se estrecharon,","de nuevo confundidos","ella y él, no supieron","lo que pasó muy dentro de ellos mismos.","Ni una frase de amores hubo luego,","ni un pensamiento vino","a conturbarles con aliento impuro","la carne ni el espíritu.","No hubo allí en realidad, ni apariencia,","más que un saludo frío.","Una mirada en otra, y sin embargo...","¡Qué inmensurable abismo!"],"src":"Poetas españolas","pri":0},{"poet":"Pilar de Valderrama","title":"Briznas del hogar","lines":["Estas pequeñas cosas que conmigo han vivido","íntimamente unidas ¿dónde irán a parar","el día que yo parta, se desmorone el nido,","y sus pajas el viento llegue a desparramar?","Los libros que yo quise y leí tantas veces,","la lámpara que siempre mi trabajo alumbró,","la simbólica imagen que recibió mis preces,","la tela caprichosa que mi mano bordó.","El cofre cincelado, el jarrón, la pintura,","deleites de mis ojos, galas de mi mansión;","ellos fueron testigos de dolor y ventura;","del querido hogar mío fueron la ramazón.","Objetos que estuvisteis con mi vida ligados","y visteis los cambiantes de mi propio sentir,","descubriendo en los pliegues más hondos y cerrados","lo que acaso yo misma no supe definir.","Las manos que os recojan, ¿serán como las mías?","¿Será su tacto suave, como el mío lo fue?","¿Verán otras pupilas, impasibles y frías,","algún rastro del alma que en vosotros dejé?","¿Cuál será vuestra suerte cuando me marche lejos...?","Mis fieles compañeros, ¿qué dueño encontraréis?","Presos en la nostalgia de los afectos viejos","acaso arrinconados en un desván seréis.","¿No habrá un ser que descubra que el curso de los años","algo os fue transmitiendo de aquel que os poseyó?","¿Que aparecéis a veces con matices extraños","mezcla de luz y sombra de un alma que pasó...","... y que os legó a su paso algún rasgo, una huella","donde quedó estampada su personalidad;","una luz indecisa, como de errante estrella,","que siendo el alma vuestra, es suya en realidad?","No verán nada, nada... ¡pobres objetos míos!","mi lámpara, mis libros, mi cuadro, mi jarrón...","seréis pequeñas gotas perdidas en los ríos","del olvido, que arrastran recuerdo y tradición."],"src":"Poetas españolas","pri":0},{"poet":"Pilar de Valderrama","title":"Mayo holgazán","lines":["Yo quiero un día gris, entoldadito,","para trabajar.","No puedo con este sol de mayo","el hervor de la sangre refrenar...","Las ideas","se agolpan por salir todas a un tiempo,","densas y turbias,","como si fueran lava de un volcán;","y no puedo, en su fuga, coordinarlas,","en calma razonar...","¡Cómo, si huelo el aire a flores,","y el sol me queda dentro,","y las acacias han abierto ya!","El invierno, la niebla,","despejan los sentidos","y el pensamiento llenan","de viva claridad.","¡Pero este sol!... ¡Pero este sol de mayo!","¡Pero este olor a flores...!","¡Imposible! ¡No puedo trabajar!"],"src":"Poetas españolas","pri":0},{"poet":"Pilar de Valderrama","title":"Dolor fecundo","lines":["¡Oh, vida! cuando dueles, viene un llanto callado","a humedecer la tierra de nuestro corazón.","Es un llorar por dentro, de todos ignorado.","Los ojos están secos como una negación.","Solo en la boca un rictus, solo un surco en la frente","por instantes nos muda la expresión de la faz.","Nuestras manos quisieran ser un garfio potente","que arrancando esta vida nos trajera la paz.","Mas la negra semilla se va abriendo en el fondo.","El prodigio ¡quién sabe cómo se realizó!","Aquel llanto invisible penetró en lo más hondo","y a las turbias acequias de la angustia, llegó...","¡Oh, simiente de penas! ¡Ay, amarga simiente!","¡Cómo endulzas, a veces, con tu propio amargor!","Cuando la vida duele, duele infinitamente,","en la raíz del alma nace una nueva flor."],"src":"Poetas españolas","pri":0},{"poet":"Concha Espina","title":"Mi secreto","lines":["Yo soy una mujer: nací poeta,","y por blasón me dieron","la dulcísima carga dolorosa","de un corazón inmenso.","En este corazón, todo llanuras","y bosques y desiertos,","han nacido un amor, interminable,","y un cantar gigantesco;","pasión que se desborda de la tierra","y que invade los cielos…","Ando la vida muerta de cansancio,","inclinándome al peso","de este afán, al que busca mi esperanza","un horizonte nuevo,","un lugar apacible en que repose","y se derrame luego","con la palabra audaz y victoriosa","dueña de mi secreto.","Yo necesito un mundo que no existe,","el mundo que yo sueño,","donde la voz de mis canciones halle","espacios y silencios;","un mundo que me asile y que me escuche;","¡lo busco, y no lo encuentro!…","¡Todo está dicho ya!… ¡Qué tarde llego!…","Por los hondos caminos de la vida","pasaron vagabundos los poetas","rodando sus cantigas:","cantaron los amores, los olvidos,","anhelos y perfidias,","perdones y venganzas,","zozobras y alegrías.","Siglos y siglos, por el ancho mundo","la canción peregrina","sube a los montes, baja a los collados,","en los bosques suspira;","cruza mares y ríos, llora y muge","en vientos y celliscas;","se queja en el jardín abandonado,","en las flores marchitas,","en las cosas humildes, en las tumbas,","en las almas sombrías.","Todo el mundo es querella, todo es himno,","todo el mundo es sollozo y poesía…","Y yo vengo detrás de ese torrente","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Concha Espina","title":"Insomnio","lines":["¡Qué bien se está contigo, noche amiga,","la temerosa y negra,","tendida como un manto de confines","sin luna y sin estrellas!","Livor celeste en el divino sueño","del orbe sideral,","párpado oscuro de la rubia tarde","cerrado sobre el mar.","¡Qué bien se está contigo, cuando sobran","imágenes de soles","en una mente condenada al fuego","de cárdenos amores!","Campana grave, de tañido sordo,","eclosión de silencios,","donde solo percute el inaudible","cantar de los recuerdos.","Espasmo informe de las cosas, vivas","en un tétrico arrullo,","¡qué bien recibe el alma su rocío","de tu callado pulso!","Calma, tiniebla,","cerrazón silente","bálsamo fresco de la roja herida","que nunca duerme...","¡Qué bien se está contigo, noche oscura,","regazo maternal,","luto de la mirada que Dios vela","encima de la mar!","Envuelve en tu ropaje sedativo","la voz de mi secreto;","¡que nadie sepa mi quebranto, insomne","bajo tu sueño!"],"src":"Poetas españolas","pri":0},{"poet":"Sofía Casanova","title":"… ¡Ni fe!","lines":["Cuando llegó del áspero sendero","a la cumbre distante,","halló en vez del albergue apetecido,","tan solo abrumadoras soledades.","Cuando, sin fuerzas ya, llegar creía","de la jornada al fin, miró el camino","roto por la mitad cortado el paso","por la negrura del abierto abismo.","Vacilante cayó junto a unas rocas,","vencida el alma, de su cruz al peso.","La fe le hizo buscar aquel calvario","y allí no estaba lo que vio su anhelo.","Brotó la sangre de su planta herida","y no pudo avanzar en el camino;","pensó en retroceder, y heló sus ojos","una impotente lágrima de hastío.","Rindiose al desaliento su alma noble,","y, al sentir su esperanza que moría,","dijo: Fe en lo ideal que no alcanzamos,","¡ay! tú también amargas nuestra vida."],"src":"Poetas españolas","pri":0},{"poet":"Sofía Casanova","title":"Gota de agua","lines":["Gota de agua es la lágrima brillante","que, al nacer, en los ojos se evapora;","gota de agua es la perla de rocío","que nace y muere en la mañana hermosa.","Gota de agua también es la perpetua","gota que filtra y que la piedra horada,","secreto de las rocas de granito,","caliza filtración de la montaña.","¡Gotas de agua las dos! Mas, cuán distinta","es la que nace y muere en un momento,","de aquella que, entre rocas serpeando,","se petrifica y desafía al tiempo!","Así también del alma soñadora","brotan, a veces, fugitivas lágrimas,","que mueren a la luz de una sonrisa,","que evapora el calor de una esperanza.","Y, otras veces, hay lágrimas que brotan","y dejan en el alma, para siempre,","estalactitas de dolor profundo,","que el tiempo agranda, y que jamás perecen."],"src":"Poetas españolas","pri":0},{"poet":"Sofía Casanova","title":"Preludio","lines":["Lo que aquí canta,","lo que aquí expira","trémulo el labio sobre la lira,","no son humanas palabras rudas;","son armonías de otro universo;","son luz del alma cuajada en verso;","son del espíritu las hablas mudas.","Son las silentes","hablas remotas","que, cual gemidos de cuerdas rotas,","por las dormidas selvas del alma","suenan en largas degradaciones,","como elegías, como oraciones,","como susurros de un mar en calma.","Son hablas tristes","que a nuestro oído","pronuncian seres que hemos perdido;","son vagas músicas; son remembranza","de lo entrevisto, de lo soñado;","son el memento de lo pasado","y el sursum corda de la esperanza.","Son lo indecible,","lo inexpresable;","voces amorfas de lo inefable","que en vano ensayan lenguas ignotas,","y en ansia eterna como el deseo","tercas repiten su balbuceo,","como en la playa las olas rotas.","Son vaticinos,","son confidencias;","gárrulos himnos, blandas cadencias,","trovas que el viento silba en las cañas,","risas que el agua presa borbota,","rachas que vienen de playa ignota","trayendo sílabas de hablas extrañas.","Manar de fuentes","que sin rumores","fluyen del seno de los amores;","raudal perenne nunca agotado,","rumor de besos de honda cisterna,","donde sus labios, con sed eterna,","pondrán las almas que no han amado.","Voces de aurora,","voces de lumbre,","voces de halago, de dulcedumbre;","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Sofía Casanova","title":"La hoja blanca","lines":["¡Cuántas veces, la frente en la mano","y en el blanco papel la mirada,","entre el blanco papel y la mente","sorda lucha en secreto se entabla!","Como el mar solicita las velas,","como el aire estimula las alas,","el papel, con su casta blancura,","solicita a la idea y la llama.","Ven –le dice–; sumido en la mente,","pobre germen, te anulas, te matas;","tenue ser de la nada engendrado,","¿no te asusta el volver a la nada?","Ven, amiga; yo soy tu destino,","soy el aire que el águila aguarda,","soy silencio que espera armonías,","soy el mármol que ser quiere estatua.","Soy espera y misterio de cita;","tú la ignota belleza esperada;","soy lo incierto, lo vago, lo amorfo;","tú la línea, el color, la palabra.","Yo, mezquino papel, soy el lienzo","donde el Verbo su imagen estampa...","¡Cuántas veces impresa con sangre","en mi nieve su faz deja el alma!"],"src":"Poetas españolas","pri":0},{"poet":"Carolina Valencia","title":"Mi tumba","lines":["Cuando mis breves días acabados,","salga el alma del cuerpo que mantuvo,","y los calcáreos huesos separados","del hálito vital que los sostuvo","bajen al seno de la tierra fría","para dormir el sueño de la muerte","hasta que el alba del postrero día","la trompeta del ángel me despierte.","Quiero una tumba humilde y escondida","en región ignorada y silenciosa,","sin recuerdos del mundo y de la vida,","sin nombre ni inscripción sobre la losa.","Quiérola junto a un bosque colocada","y al lindel solitario de un camino","donde canten las aves la alborada","y al pasar me bendiga el peregrino.","Y a otro lado se extienda con la alfombra","de sus menudos céspedes brillantes","ancho valle al que presten fresca sombra","las copas de los álamos gigantes.","Y con paso tranquilo y perezoso,","retratando en su linfa el bosque umbrío,","sereno, transparente y armonioso,","corra a mis plantas murmurante río","que al ir a visitar tierras ignotas","en la encantada soledad campestre,","arrulle mi pereza con sus notas","de no estudiada música silvestre.","Y en sus ondas de plata rumorosas","se miren las pintadas florecillas,","que se alcen en sus márgenes hermosas","rojas, blancas, moradas y amarillas.","Crezcan allí los lirios perfumados,","la humilde y odorante violeta,","los gentiles narcisos columpiados","al leve soplo de la brisa inquieta;","el pensamiento de hojas afelpadas,","la azucena cuajada de rocío,","el vulgo de amapolas encarnadas","y los blancos nenúfares del río;","y la fragante y encendida rosa,","y los nevados toldos de jazmines","donde suspire el aura bulliciosa","y salten los alegres colorines...","Y cuando el cano invierno con sus lutos","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Concepción de Estevarena","title":"Misterio","lines":["Silenciosa es la noche: las campanas","con causa y gravedad su voz elevan,","y de las doce el último sonido","al extinguirse en el espacio tiembla.","Un instante no más ha separado","el año que termina del que empieza;","un instante no más, también, separa","la vida humana de la vida eterna.","Un año confundido entre las sombras","en el dormido mundo se despierta;","¡quién sabe lo que guarda en sus momentos!,","¡quién desgarra el misterio que lo encierra!","Para mí, que temblando lo recibo,","¡quién puede adivinar lo que reserva!","Acaso las auroras de sus días","me anuncien horas de amargura inmensa,","y las trémulas horas de sus tardes","noches de afán y luchas como esta:","noches en que el pasado que ya ha muerto,","el porvenir que mi esperanza crea,","y el presente, que miro con enojos,","como ahora rodarán por mi cabeza.","Tiempo, que has de pasar, yo ambicionara","impulsar con mis manos tu carrera,","y al par es tanto el miedo que me inspiras","que con afán quisiera detenerla.","Año fugaz, que empiezas tu dominio","a la indecisa luz de las estrellas,","lágrimas, risas, ambiciones, luchas,","consigo arrastrará tu indiferencia:","en ti la humanidad, tras de la dicha,","cual siempre, correrá cansada y ciega,","no comprendiendo que el que ciego nace","aunque brille la luz no puede verla.","Así es la humanidad, dueña y esclava:","mas yo, triste de mí, ¿qué soy en ella?","¿Qué es en el huracán embravecido","un leve soplo que en sus alas lleva?","Año, que has de pasar, en tus momentos,","que han empezado a resbalar apenas:","o abrume mi cabeza la ventura,","o mi cuerpo infeliz cubra la tierra."],"src":"Poetas españolas","pri":0},{"poet":"Concepción de Estevarena","title":"Grande y sabio","lines":["Alcé los ojos: tu mirada, entonces,","brilló intensa en mis lágrimas,","como un rayo de sol que ardiente cae","sobre trémulas aguas.","Te dejé de mirar, por parecerme","que te causaba pena,","aunque yo, contemplándola, sentía","satisfacción secreta.","Volví a mirarte cuando ya a mis labios","atrajo una sonrisa:","llorando estabas tú, pero tus lágrimas","eran lágrimas mías.","Grande es tu corazón, porque consuela","con el triste sufriendo:","tu corazón es sabio porque sabe","llorar males ajenos."],"src":"Poetas españolas","pri":0},{"poet":"Concepción de Estevarena","title":"Siempre igual","lines":["Si algo existe en el mundo que me halague,","es mi mundo ideal;","mas va la claridad de cada día","apagando su hermosa claridad.","Esclava de la vida, apenas puede","mi mente fatigada ni aún soñar,","que para dar la muerte a cada sueño","hay una realidad."],"src":"Poetas españolas","pri":0},{"poet":"Concepción de Estevarena","title":"Hojas perdidas","lines":["Conservo el tallo verde entre mis manos","y ya esparcí las hojas de la flor;","las he visto alejarse, cual se aleja","la primera ilusión.","Eran hojas de rosas, que aún guardaban","el perfume, la forma y el color,","y, aun siendo así, volaron con el viento,","y nadie las miró.","He visto en esas hojas el destino","de seres sin hogar y sin amor,","que saben de la noche y nada saben","de los rayos del sol.","Arrancados del tallo en que nacieran","y arrojados al viento del dolor,","nadie se para a ver si en esos seres","existe un corazón."],"src":"Poetas españolas","pri":0},{"poet":"Concepción de Estevarena","title":"Luz que pasa","lines":["Los cielos y la tierra resplandecen,","es la felicidad la que se acerca:","cierro los ojos; respetad mi sueño;","dejad que pase sin que yo la vea.","Palpita en el ambiente, y no respiro,","gira en la luz, y busco las tinieblas;","que se aleje por mí desconocida,","ya que ni ella ni yo somos eternas."],"src":"Poetas españolas","pri":0},{"poet":"Concepción de Estevarena","title":"Deseos","lines":["Porque miro dolores y miserias","me pesa haber nacido;","yo quisiera ignorar ajenos males,","aun sintiendo los míos.","Quisiera ser la nota que se eleva","al espacio infinito,","quisiera ser el sueño que se forma","en la mente de un niño.","Quisiera ser más grande que el deseo,","más libre que un suspiro:","quisiera ser un ignorado mundo","rodando en el vacío."],"src":"Poetas españolas","pri":0},{"poet":"Concepción de Estevarena","title":"Libertad","lines":["En cuanta extensión inunda el sol con su luz dorada,","la libertad es amada con una pasión profunda,","un canto en su honor entona,","y bien la fama pregona","que, aunque destronarla intenten,","tiene en las almas que sienten","un trono y una corona.","La libertad presta aliento","al pensamiento que crea,","porque es la primera idea","que brota en el pensamiento;","ella es luz y es sentimiento,","y es fuerza que la respeten,","pues, aunque su marcha inquieten","almas a su luz ajenas,","no habrá quien labre cadenas","que a la libertad sujeten.","¡Libertad, lazo de amor,","talismán que honra y escuda,","la humanidad te saluda","como a su gloria mejor!","No pierdes en esplendor,","aunque al verte victoriosa","te promuevan guerra odiosa;","que aun siendo tus penas muchas","sales de las nuevas luchas","más radiante y más hermosa."],"src":"Poetas españolas","pri":0},{"poet":"Carolina Coronado","title":"A una tórtola","lines":["Tórtola, qué misteriosa","querella de amores cantas,","dolorida,","azorada, temblorosa,","como la lluvia en las plantas","conmovida;","que levantas arrullando","de tu seno palpitante","la alba pluma,","como el agua murmurando","en las olas, vacilante","leve espuma:","tórtola tímida y bella,","melancólica vecina","de los valles,","nunca tu blanda querella,","tu cántiga peregrina,","muda acalles:","lleva a el aura ese ruido","que en las soledades mueven","tus acentos:","los ecos de tu gemido","siempre amorosos se eleven","a los vientos.","Canta, canta dulcemente","con la tierna compañera","tus amores:","verás tu arrullo inocente","dar más vida a la pradera","y a las flores.","¿Mas por qué si regalado","tu murmurio en mis oídos","desfallece,","el pecho mío turbado,","a tus lánguidos gemidos","se estremece?","¿Será que yo también como tú siento","esa ternura que tu seno oprime,","y el dulce sentimiento","que de inefable amor tu acento exprime?","Con nuevo fuego el corazón se anima,","al escuchar tu canto apasionado;","¿será que también gima","en amoroso lazo aprisionado?","Es tu tristeza la tristeza mía;","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Carolina Coronado","title":"I","lines":["¿Cómo te llamaré para que entiendas","que me dirijo a ti, dulce amor mío,","cuando lleguen al mundo las ofrendas","que desde oculta soledad te envío?...","A ti, sin nombre para mí en la tierra,","¿cómo te llamaré con aquel nombre,","tan claro que no pueda ningún hombre","confundirlo, al cruzar por esta sierra?","¿Cómo sabrás que enamorada vivo","siempre de ti, que me lamento sola","del Gévora que pasa fugitivo","mirando relucir ola tras ola?","Aquí estoy aguardando en una peña","a que venga el que adora el alma mía;","¿por qué no ha de venir, si es tan risueña","la gruta que formé por si venía?","¿Qué tristeza ha de haber donde hay zarzales","todos en flor, y acacias olorosas,","y cayendo en el agua blancas rosas,","y entre la espuma libros virginales?","Y ¿por qué de mi vida has de esconderte?","¿Por qué no has de venir si yo te llamo?","¡Porque quiero mirarte, quiero verte","y tengo que decirte que te amo!","¿Quién nos ha de mirar por estas vegas,","como vengas al pie de las encinas,","si no hay más que palomas campesinas","que están también con sus amores ciegas?","Pero si quieres esperar la luna,","escondida estaré en la zarza-rosa,","y si vienes con planta cautelosa,","no nos podrá seguir paloma alguna.","Y no temas si alguna se despierta,","que si te logro ver, de gozo muero,","y aunque después lo cante al mundo entero,","¿qué han de decir los vivos de una muerta?"],"src":"Poetas españolas","pri":0},{"poet":"Carolina Coronado","title":"Nada resta de ti…","lines":["Nada resta de ti..., te hundió el abismo...,","te tragaron los monstruos de los mares...","No quedan en los fúnebres lugares","ni los huesos siquiera de ti mismo.","Fácil de comprender, amante Alberto,","es que perdieras en el mar la vida,","mas no comprende el alma dolorida","cómo yo vivo cuando tú ya has muerto.","Darnos la vida a mí y a ti la muerte;","darnos a ti la paz y a mí la guerra,","dejarte a ti en el mar y a mí en la tierra","¡es la maldad más grande de la suerte!..."],"src":"Poetas españolas","pri":0},{"poet":"Gertrudis Gómez de Avellaneda","title":"A Él","lines":["No existe lazo ya: todo está roto:","plúgole al cielo así: ¡bendito sea!","Amargo cáliz con placer agoto:","mi alma reposa al fin: nada desea.","Te amé, no te amo ya: piénsolo al menos:","¡nunca, si fuere error, la verdad mire!","Que tantos años de amarguras llenos","trague el olvido: el corazón respire.","Lo has destrozado sin piedad: mi orgullo","una vez y otra vez pisaste insano...","Mas nunca el labio exhalará un murmullo","para acusar tu proceder tirano.","De graves faltas vengador terrible,","dócil llenaste tu misión: ¿lo ignoras?","No era tuyo el poder que irresistible","postró ante ti mis fuerzas vencedoras.","Quísolo Dios y fue: ¡gloria a su nombre!","Todo se terminó, recobro aliento:","¡Ángel de las venganzas!, ya eres hombre...","ni amor ni miedo al contemplarte siento.","Cayó tu cetro, se embotó tu espada...","Mas, ¡ay!, cuán triste libertad respiro...","Hice un mundo de ti, que hoy se anonada","y en honda y vasta soledad me miro.","¡Vive dichoso tú! Si en algún día","ves este adiós que te dirijo eterno,","sabe que aún tienes en el alma mía","generoso perdón, cariño tierno."],"src":"Poetas españolas","pri":0},{"poet":"Gertrudis Gómez de Avellaneda","title":"A la poesía","lines":["¡Oh, tú, del alto cielo","precioso don, al hombre concedido!","¡Tú, de mis penas íntimo consuelo,","de mis placeres manantial querido!","¡Alma del orbe, ardiente Poesía,","dicta el acento de la lira mía!","Díctalo, sí, que enciende","tu amor mi seno, y sin cesar ansío","la poderosa voz, que espacios hiende,","para aclamar tu excelso poderío,","y en la naturaleza augusta y bella","buscar, seguir y señalar tu huella.","¡Mil veces desgraciado","quien –al fulgor de tu hermosura ciego–","en su alma inerte y corazón helado","no abriga un rayo de tu dulce fuego;","que es el mundo, sin ti, templo vacío,","cielo sin claridad, cadáver frío!","Mas yo doquier te miro;","doquier el alma, estremecida, siente","tu influjo inspirador; el grave giro","de la pálida Luna, el refulgente","trono del Sol, la tarde, la alborada...","todo me habla de ti con voz callada.","En cuanto ama y admira,","te halla mi mente. Si huracán violento","zumba, y levanta el mar, bramando de ira;","si con rumor responde soñoliento","plácido arroyo al aura que suspira...","tú alargas para mí cada sonido","y me explicas su místico sentido.","Al férvido verano,","a la apacible y dulce primavera,","al grave otoño y al invierno cano","me embellece tu mano lisonjera;","¡que alcanzan, si los pintan tus colores,","calor el hielo, eternidad las flores!","¿Qué a tu dominio inmenso","no sujetó el Señor? En cuanto existe","hallar tu ley y tus misterios pienso:","el Universo tu ropaje viste,","y en su conjunto armónico demuestra","que tú guiaste la hacedora diestra.","¡Hablas! ¡Todo renace!","Tu creadora voz los yermos puebla;","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Gertrudis Gómez de Avellaneda","title":"Cuartetos escritos en un cementerio","lines":["He aquí el asilo de la eterna calma,","do solo el sauce desmayado crece...","¡Dejadme aquí; que fatigada el alma,","en aura de las tumbas apetece!","Los que aspiráis las flores de la vida,","llenas de aroma de placer y gloria,","no piséis el lugar do convertida","veréis su pompa en miserable escoria.","Mas venid todos los que el ceño airado","del destino mirasteis en la cuna;","los que sentís el corazón llagado","y no esperáis consolación alguna.","¡Venid también, espíritus ardientes,","que en ese mundo os agitáis sin tino,","y cuya inmensa sed sus turbias fuentes","calmar no pueden con raudal mezquino!","Los que el cansancio conocisteis, antes","que paz os diesen y quietud los años...","¡Venid con vuestros sueños devorantes!","¡Venid con vuestros tristes desengaños!","No aquí las horas, rápidas o lentas,","cuenta el placer ni mide la esperanza:","¡quiébranse aquí las olas turbulentas","que el huracán de las pasiones lanza!","Aquí, si os turban sombras de la duda,","la severa verdad inmóvil vela:","aquí reina la paz eterna y muda,","si paz el alma fatigada anhela.","Los que aquí duermen en profundo sueño,","insomnes cual nosotros se agitaron...","Ya de muerte en el letal beleño","sus abrasadas sienes refrescaron.","Amemos, pues, nuestra mansión futura,","única que tenemos duradera...","¡que ilusión de la vida es la ventura,","mas la paz de la muerte es verdadera!"],"src":"Poetas españolas","pri":0},{"poet":"Gertrudis Gómez de Avellaneda","title":"Al partir","lines":["¡Perla del mar! ¡Estrella de occidente!","¡Hermosa Cuba! Tu brillante cielo","la noche cubre con su opaco velo,","como cubre el dolor mi triste frente.","¡Voy a partir!... La chusma diligente,","para arrancarme del nativo suelo","las velas iza, y pronta a su desvelo","la brisa acude de tu zona ardiente.","¡Adiós!, ¡patria feliz, edén querido!","¡Doquier que el hado en su furor me impela,","tu dulce nombre halagará mi oído!","¡Adiós!... Ya cruje la turgente vela...","¡El anda se alza... El buque, estremecido,","las olas corta y silencioso vuela!"],"src":"Poetas españolas","pri":0},{"poet":"María Nicolasa de Helguero y Alvarado","title":"Pedro de Helguero","lines":["Desgajado el ciprés, rota la lira,","mal concertado el susto con el canto,","empiece el triste numen que me inspira","a dar tímida voz envuelta en llanto;","que mal entre congojas se respira,","que poco explica quien padece tanto;","pero si he de cantar, sea el tormento","el que sirva esta vez por instrumento.","Amaba yo a Petronio generoso","ufana de que fuese hermano mío,","miraba que a su genio belicoso","las Gracias asistían sin desvío,","no desdeñando al joven animoso","docta, canora, sonorosa Clío;","gracias y Musas se unen a elevarle","y las Furias y Parca a derribarle.","Heredó de Cantabria el ardimiento,","imitó del Gran Noja las acciones,","advertido ilustró su entendimiento","tomando de Minerva las lecciones;","supo dar a su empleo cumplimiento,","supo también robar las aficiones","cuando en el regio Nápoles florido","brilló gallardo y se explicó entendido.","Del Betis caudaloso en la ribera","festivo divirtió los cortos años","logrando en la fortuna lisonjera","los aplausos de propios y extraños;","corrió veloz, y al fin de la carrera","enseñó a los mortales desengaños,","dejando entre cenizas sepultado","el valor adquirido y heredado.","Cuando el sabio Pastor americano","surcaba el golfo por gozar su esposa,","el furor atrevido de Vulcano","arrojó al vaso llama pavorosa;","diestro Petronio, con activa mano","cortó el incendio y dio quietud dichosa","a los que ya entre sustos desmayaban","en vista de la muerte que esperaban.","No experimentó en Tolón el triste estrago","cuando en nave fatal dio providencia","de un sitio a otro discurriendo vago,","armado de valor y de prudencia.","El mismo fuego le sirvió de halago;","[…]"],"src":"Poetas españolas","pri":0},{"poet":"María Rosa Gálvez","title":"Oda","lines":["¡Portentosa natura! Yo en mi mente","saludo tus augustas maravillas,","obra de un Dios de eterna omnipotencia;","permíteme que pueda reverente","al tiempo que me humillas","con tu magnificencia,","del Teyde abrasador cantar la cumbre,","su altura prodigiosa,","su hondo abismo y su mole cavernosa.","El astro de la luz, padre del día,","del globo de la tierra","sus rayos escondía","cuando yo penetraba","de Laguna la selva deliciosa.","Si entre el horror sangriento de la guerra","sublime Tasso en su cantar mudaba","la horrible trompa en cítara de amores","que en la selva de Armida resonaba,","del bosque de laguna Apolo en tanto","la imagen inspiró a su dulce canto.","Por él mil arroyuelos se deslizan","que en tortuoso giro","cortan del valle el plácido retiro.","Allí en largas praderas fertilizan","el plátano sabroso;","aquí verdes colinas esquivando","su falda van lamiendo","y del tronco pomposo","del drago la altivez desenvolviendo,","que de su seno abriendo las vertientes,","de púrpura matiza las corrientes.","Las frutas y las flores","lisonjean y halagan los sentidos","con su sabor y olores;","encantan los oídos","las quejas de los dulces ruiseñores,","y del canario y colorín hermosos","al par resuenan ecos armoniosos.","La bóveda perpetua de verdura","de esta selva sombría","pasó entre sus antiguos moradores","por el elíseo campo","do en eterna ventura","habitaban las sombras inmortales","de los varones y héroes virtuosos;","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Margarita Hickey","title":"De las mujeres","lines":["De bienes destituidas,","víctimas del pundonor,","censuradas con amor,","y sin él desatendidas;","sin cariño pretendidas,","por apetito buscadas,","conseguidas, ultrajadas;","sin aplausos la virtud,","sin lauros la juventud,","y en la vejez despreciadas."],"src":"Poetas españolas","pri":0},{"poet":"Margarita Hickey","title":"De los hombres","lines":["Son monstruos inconsecuentes,","altaneros ya batidos;","humildes, si aborrecidos;","si amados, irreverentes;","con el favor, insolentes;","desean, pero no aman;","en las tibiezas se inflaman,","sirven para dominar;","se rinden para triunfar;","y a la que los honra infaman."],"src":"Poetas españolas","pri":0},{"poet":"Margarita Hickey","title":"Al oído","lines":["Déjame penetrar por este oído,","camino de mi bien el más derecho,","y, en el rincón más hondo de tu pecho,","deja que labre mi amoroso nido.","Feliz eternamente y escondido,","viviré de ocuparlo, y satisfecho...","¡De tantos mundos como Dios ha hecho,","este espacio no más a Dios le pido!","Ya no codicio fama dilatada,","ni el aplauso que sigue a la victoria,","ni la gloria de tantos codiciada...","Quiero cifrar mi fama en tu memoria;","quiero encontrar mi aplauso en tu mirada;","y en tus brazos de amor toda mi gloria."],"src":"Poetas españolas","pri":0},{"poet":"Margarita Hickey","title":"Endecasílabos","lines":["Los dulcísimos metros que tu pluma","hoy me dirige, amada amiga mía,","fueran el refrigerio más gustoso","si admitieran alguno mis fatigas:","la paz, con que el amor y la fortuna","la bella unión coronan a porfía","de tantas bellas almas, que su culto","engrandecen con ver que se dedican,","celebrara, si acaso ser pudiera","que por bien estimara la alegría;","mas yo que la conozco cierto anuncio","de tristezas, pesares y fatigas,","compadezco las almas que engañadas","en su inconstante duración se fían,","y huyendo del contagio que las cerca","me acojo a mi feliz melancolía.","Si esta cede al encanto que le ofrecen","de tu discurso las pinturas vivas,","mil funestos objetos me prevengo","porque conserven las tristezas mías.","¡Qué estado tan feliz! Quien le conoce","no apetece más gustos ni más dichas,","pues libre del temor y la esperanza","es de la nada, y nada le lastima.","El aire brama en fuertes huracanes,","la tierra toda tiembla estremecida,","una escuadra se sorbe el mar airado;","destruye un edificio llama activa.","Perecerá, si perecer le toca,","pero no temblará con cobardía","el sabio corazón que reconoce","que nada pierde con perder la vida.","No reirá cual Heráclito del mundo","vanas perecederas alegrías,","ni cual Demócrito llorará las tristes","funestas consecuencias que las sigan.","Mas como aquel filósofo del Támesis,","huyendo sí, sus engañosas dichas","y los vanos objetos que interpone","para que la verdad se nos resista.","Se entra por los altísimos cipreses","y con el mayor gusto ve y visita","sepulcrales cavernas a quien solo","de la muerte blandones iluminan.","Y leyendo piadosos epitafios","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Margarita Hickey","title":"Glosa","lines":["¡Oh, ser que me das el ser,","toma este ser que me das,","que yo no quiero ser más,","que ser en quien es mi ser!","Puede, tal vez, engañada","la humana naturaleza,","tener por propia riqueza,","la que de ti es derivada.","Y entonces, precipitada,","engreírse más y más.","Tú, señor, que viendo estás","lo que mi engaño no advierte,","si con él he de ofenderte,","toma este ser que me das.","¡Ay mi Dios!, ¿sin ti qué fuera","este envanecido ser,","que solo con tu querer","en nada se resolviera?","Cuando pienso en lo que era","y soy, temo lo que harás","conmigo, y al ver que estás","pronto a castigar mi error,","te entrego mi ser, Señor,","que yo no quiero ser más."],"src":"Poetas españolas","pri":0},{"poet":"Margarita Hickey","title":"A un pajarillo","lines":["Infeliz pajarillo,","que apenas empezaste","a gozar de tu imperio","la libertad amable,","de contingentes riesgos","que amenazan el aire,","antes de conocerlos,","víctima a ser llegaste.","¡Cuánto dolor me causa","el mirar que se añade","a tus lindos colores","el matiz de tu sangre!","Parece en la tristeza","con que las alas bates,","que me pides socorro","en tu mudo lenguaje.","Te lo daré amorosa,","y si logro sanarte,","tendrás en mis cuidados","con mi Diana parte.","Sobre su blanco lomo","vendrás a pasearte,","volándote a mi pecho","siempre que yo te llame.","Ni probarás prisiones","de dorados alambres,","ni cortaré a tus alas","los pintados plumajes.","Mas si después que logres","la quietud apreciable","ingrato a mis finezas,","volando te escapares,","plegue al cielo que encuentres,","oh pajarillo infame,","ya lazo que te prenda,","ya tiro que te mate."],"src":"Poetas españolas","pri":0},{"poet":"Margarita Hickey","title":"Anacreóntica","lines":["Oye, Filena mía,","por qué en tus años tiernos","tengas el desengaño","antes que el escarmiento.","Ese todo, que ahora","te llena de embeleso,","y en cada parte suya","te ofrece un placer nuevo.","Ese conjunto alegre","de músicos conciertos,","de danzas, de teatros,","festines, y paseos:","al pasar cada uno","oye que va diciendo:","nada en el mundo dura","todo lo acaba el tiempo.","Esas, que al campo hermoso","en su verdor ameno,","matizan bellas flores","de colores diversos.","No son las que ayer viste,","pues su lugar cedieron","a nuevos individuos","de su florido reino.","Mas todas destruidas","del riguroso invierno","presentarán lo triste","de un árido terreno.","Entonces mudamente","te dirá el campo seco:","nada en el mundo dura,","todo lo acaba el tiempo.","Mira esa hermosa tropa","de jóvenes sin seso,","que en pos de los placeres","corren sin conocerlos.","Después que se han cansado,","ya con el dulce acento,","ya con ligera planta,","agitándose el pecho","examina y repara","si no ha sido su objeto","del próximo la ruina,","la envidia de su sexo.","Sus gozos se transforman","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Sor Juana Inés de la Cruz","title":"I","lines":["Piramidal, funesta de la tierra","nacida sombra, al cielo encaminaba","de vanos obeliscos punta altiva,","escalar pretendiendo las estrellas;","si bien sus luces bellas","–exentas siempre, siempre rutilantes–,","la tenebrosa guerra","que con negros vapores le intimaba","la vaporosa sombra fugitiva","burlaban tan distantes,","que su atezado ceño","al superior convexo aún no llegaba","del orbe de la diosa","que tres veces hermosa","con tres hermosos rostros ser ostenta;","quedando solo dueño","del aire que empañaba","con el aliento denso que exhalaba.","Y en la quietud contenta","de impero silencioso,","sumisas solo voces consentía","de las nocturnas aves","tan oscuras tan graves,","que aún el silencio no se interrumpía.","Con tardo vuelo, y canto, de él oído","mal, y aún peor del ánimo admitido,","la avergonzada Nictímene acecha","de las sagradas puertas los resquicios","o de las claraboyas eminentes","los huecos más propicios,","que capaz a su intento le abren la brecha,","y sacrílega llega a los lucientes","faroles sacros de perenne llama,","que extingue, sino inflama","en licor claro la materia crasa","consumiendo; que el árbol de Minerva","de su fruto, de prensas agravado,","congojoso sudó y rindió forzado.","Y aquellas que su casa","campo vieron volver, sus telas yerba,","a la deidad de Baco inobedientes","ya no historias contando diferentes,","en forma si afrentosa transformadas","segunda forman niebla,","ser vistas, aun temiendo en la tiniebla,","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Sor Juana Inés de la Cruz","title":"II","lines":["El conticinio casi ya pasando","iba y la sombra dimidiaba, cuando","de las diurnas tareas fatigados","y no solo oprimidos","del afán ponderosos","del corporal trabajo, más cansados","del deleite también; que también cansa","objeto continuado a 1os sentidos","aún siendo deleitoso;","que la naturaleza siempre alterna","ya una, ya otra balanza,","distribuyendo varios ejercicios,","ya al ocio, ya al trabajo destinados,","en el fiel infiel con que gobierna","la aparatosa máquina del mundo.","Así pues, del profundo","sueño dulce los miembros ocupados,","quedaron los sentidos","del que ejercicio tiene ordinario","–trabajo, en fin, pero trabajo amado","si hay amable trabajo–","si privados no, al menos suspendidos.","Y cediendo al retrato del contrario","de la vida que lentamente armado","cobarde embiste y vence perezoso","con armas soñolientas,","desde el cayado humilde al cetro altivo","sin que haya distintivo","que el sayal de la púrpura discierna;","pues su nivel, en todo poderoso,","gradúa por exentas","a ningunas personas,","desde la de a quien tres forman coronas","soberana tiara","hasta la que pajiza vive choza;","desde la que el Danubio undoso dora,","a la que junco humilde, humilde mora;","y con siempre igual vara","(como, en efecto, imagen poderosa","de la muerte) Morfeo","el sayal mide igual con el brocado.","El alma, pues, suspensa","del exterior gobierno –en que ocupada","en material empleo,","o bien o mal da el día por gastado–,","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Sor Juana Inés de la Cruz","title":"III","lines":["En tanto el padre de la luz ardiente,","de acercarse al Oriente","ya el término prefijo conocía","y al antípoda opuesto despedía","con trasmontantes rayos","que –de su luz en trémulos desmayos–","en el punto hace mismo su Occidente,","que nuestro Oriente ilustra luminoso.","Pero de Venus antes el hermoso","apacible lucero","rompió el albor primero","y del viejo Titón la bella esposa","–amazona de luces mil vestida,","contra la noche armada,","hermosa si atrevida,","valiente aunque llorosa–,","su frente mostró hermosa","de matutinas luces coronada,","aunque tierno preludio, ya animoso","del planeta fogoso,","que venía las tropas reclutando","de bisoñas vislumbres","–las más robustas, veteranas, lumbres","para la retaguardia reservando–,","contra la que tirana usurpadora","del imperio del día,","negro laurel de sombras mil ceñía","y con nocturno cetro pavoroso","las sombras gobernaba,","de quien aun ella misma se espantaba.","Pero apenas la bella precursora","signífera del Sol, el luminoso","en el Oriente tremoló estandarte,","tocando alarma todos los suaves","si bélicos clarines de las aves","(diestros –aunque sin arte–","trompetas sonorosos),","cuando –como tirano al fin, cobarde","de recelos medrosos","embarazada, bien que hacer alarde","intentó de sus fuerzas, oponiendo","de su funesta capa los reparos,","breves en ella, de los tajos claros","heridas recibiendo","(bien que mal satisfecho su denuedo,","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Ana Francisca Abarca de Bolea","title":"Romance a una fuente","lines":["Fuente que en círculo breve","presumes de gran caudal,","si tus principios observas","no te precipitarás.","Considera que, mendiga","en diverso mineral,","con anhelos de grandiosa","te nos quieres ostentar.","Rica de bienes ajenos","todos nos dicen que estás,","que usurpas cual poderoso","a los pobres el caudal.","De ambiciosa te calumnian,","mas tú te puedes quejar,","pues ves no te agradecemos","el gran gusto que nos das.","Recién nacida se ofrece","a clausura tu humildad;","no son acciones de niña,","aunque sean en agraz.","Parecímonos los dos;","mas en proseguir está","la fineza, fuente amiga;","no des pasos hacia atrás.","Dicen que envidias te quieren","de esta huerta desterrar,","que hasta en raudales ofende","lo claro de la verdad.","Que eres en todo sabrosa","no hay quien lo pueda dudar,","que fuente en huerta de monjas,","¿quién duda que tendrá sal?","Aunque estás puesta en la pila","no te quieren bautizar","con nombre, más desde hoy","eres fuente del Peral.","Uno guarda tus espaldas,","pero aunque te haga amistad,","es imposible que tú","le dejes de murmurar.","Más de cosario a cosario","muy poco perdido habrá,","que te la juran sus hojas","con desquite general.","En mí has visto claramente","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Sor Marcela de San Félix","title":"Villancico a la profesión de la hermana Isabel del Santísimo Sacramento","lines":["No pudo Amor","hacer tu dicha mayor.","Hoy que al más dichoso lazo","el alma, Isabel, ofreces,","y de tu Esposo mereces","el dulce mental abrazo,","y a su divino regazo","entregas tu hermoso abril,","pues para lograr gentil","tanta repetida flor,","no pudo Amor","hacer tu dicha mayor,","más nobleza has adquirido,","pues con ilustre renombre,","de su dulcísimo nombre","te vales para apellido.","El favor que has conseguido","no es de mano temporal,","y así con afecto igual","eterno será el favor,","que no pudo Amor","hacer tu dicha mayor.","Esa bella juventud","que a tu Esposo has consagrado,","aseguras en su agrado","no menos que la quietud.","El dote de la virtud","te hizo de tan buena estrella,","pues para con Él es ella","la prenda de más valor,","no pudo Amor","hacer tu dicha mayor.","A tu entendimiento unida","tu fortuna corresponde,","pues quien a Dios le responde","sin duda es bien entendida;","de los riesgos de la vida","tu discurso te previno","y la elección del camino","fue de tu ingenio primor,","que no pudo Amor","hacer tu dicha mayor.","Liberal de tus riquezas","con tu Esposo procediste;","cuerda diligencia hiciste","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Sor Marcela de San Félix","title":"Al buen empleo del tiempo","lines":["¡Oh, cuánto pierde quien pierde","el preciosísimo tiempo!","¡Oh, cuánto gana quien gana","sus instantes y momentos!","Toda la plata y el oro","y diamantes de más precio","no valen lo que un instante","que se gasta para el cielo.","¡Oh, tiempo, riqueza suma","a quien te estima! Yo creo","que ni un solo respirar","no le exhale sin provecho.","¡Oh, infelicísima vida","la que he gastado sin miedo","de la cuenta que he de dar","del instante más pequeño!","Las coronas y las mitras,","y aun las tiaras, es cierto","que son la misma desgracia","si desperdician el tiempo.","¡Oh, si licencia les dieran","a los que gastaron, necios,","el tiempo, sin granjear","que volviesen a sus cuerpos!","Con provechosa codicia,","divinamente avarientos,","guardarían los instantes","como antes los dineros.","Para adquirir y ganar","vivimos este destierro,","y nuestros censos y juros","son los espacios del tiempo.","Depende una eternidad","de solo un instante incierto:","¿pues cómo se pasa instante","sin dar pasos a lo eterno?","¡Oh, si me diesen a mí","tiempo en que llorar el tiempo","que tan sin cuenta he gastado","todo lo mejor del tiempo!","De mi tiempo mal gastado,","Dios mío, aquel tiempo apelo","que dispuso tu piedad","el que yo llegase a tiempo.","A sus vanas alegrías","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Sor Marcela de San Félix","title":"El jardín del convento","lines":["En estas verdes hojas","que esta fuente riega","con agua de mis ojos,","que suya no la lleva,","contemplo, amado mío,","tu grande providencia,","tu beldad soberana","y tu hermosura inmensa.","También, por el contrario,","conozco mi vileza,","mi imperfección sin par,","mi descuido y tibieza,","pues las hojas y flores,","que crecen tan aprisa,","con sus calladas voces","significan mis menguas,","y siempre que las miro,","parece que me enseñan","que yo sola en el mundo","soy la que nunca medra.","Miro del cinamomo","aquella copia inmensa","de su olorosa flor","que tanto nos deleita;","parece que, a porfía,","su multitud afecta","llevarse de las flores","la palma de belleza.","En las guardadas rosas","a quien espinas cercan,","de tus hermosas llagas","la memoria refrescan.","Los vistosos jazmines","en su candor ostentan","lo lindo de tus manos","y liberal franqueza,","porque, sin aguardar","que los cojan por fuerza,","ellos se dan al suelo","sin hacer resistencia.","Acuérdame tu olor","la fragante mosqueta,","tan noble entre las flores","y tan linda en sí misma.","El clavel estimado","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Luisa Manrique","title":"Décimas","lines":["Señor, cuando os llego a hablar","no sé cierto qué pedir,","si vida para servir","o muerte para gozar.","Yo os quisiera asegurar,","y vivo temo perderos;","muerto no podré ofenderos;","mas dejaré de serviros;","en fin, no acierto a pediros:","haced que acierte a quereros.","No hay dicha como la vida","en serviros empleada,","ni cosa más desdichada","que una vida mal vivida.","En duda tan conocida","que Vos elijáis espero;","la vida y la muerte quiero,","pero con tales reparos,","que, si vivo, he de obligar
