<style>
  :root{ --ink:#0a0a0a; --paper:#f6f5f1; }
  *{box-sizing:border-box;margin:0;padding:0}

    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  body{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 0 80px;}

  .mast .sub{font-size:10.5px;letter-spacing:.26em;text-transform:uppercase;opacity:.62;text-align:right;line-height:1.7;}
  .controls-wrap{width:100%;max-width:980px;padding:0 28px;margin-top:30px;}
  .ctl{display:flex;border:2px solid var(--ink);}
  .ctl button{appearance:none;background:var(--paper);border:none;border-right:2px solid var(--ink);
    cursor:pointer;color:var(--ink);font-family:inherit;font-size:18px;line-height:1;width:54px;
    display:flex;align-items:center;justify-content:center;transition:background .12s ease,color .12s ease;}
  .ctl button:last-child{border-right:none;border-left:2px solid var(--ink);}
  .ctl button:hover{background:var(--ink);color:var(--paper);}
  .ctl button:focus-visible{outline:3px solid var(--ink);outline-offset:3px;}
  .ctl .day-field{flex:1;display:flex;flex-direction:column;justify-content:center;padding:13px 22px;cursor:pointer;position:relative;}
  .ctl .day-field:hover{background:rgba(10,10,10,.05);}
  .ctl .index{font-size:10px;letter-spacing:.28em;text-transform:uppercase;opacity:.55;}
  .ctl .datestr{font-size:21px;font-weight:700;letter-spacing:.01em;text-transform:lowercase;margin-top:3px;}
  .ctl input[type=date]{position:absolute;opacity:0;pointer-events:none;width:0;height:0;}
  main{width:100%;max-width:980px;padding:0 28px;margin-top:36px;display:grid;grid-template-columns:300px 1fr;gap:0;border:2px solid var(--ink);}
  .canon{border-right:2px solid var(--ink);display:flex;flex-direction:column;}
  .canon svg{display:block;width:100%;height:auto;}
  .canon .legend{border-top:2px solid var(--ink);padding:12px 16px;display:flex;justify-content:space-between;align-items:baseline;}
  .canon .legend .n{font-size:34px;font-weight:700;line-height:.9;font-variant-numeric:tabular-nums;}
  .canon .legend .k{font-size:9.5px;letter-spacing:.24em;text-transform:uppercase;opacity:.6;text-align:right;line-height:1.6;}
  .poem{padding:34px 38px 30px;display:flex;flex-direction:column;min-height:430px;}
  .poem .meta{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--ink);padding-bottom:11px;gap:14px;flex-wrap:wrap;}
  .poem .poet{font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;}
  .poem .src{font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;opacity:.55;display:flex;align-items:center;gap:8px;}
  .poem .src .dot{width:7px;height:7px;background:var(--ink);display:inline-block;flex:none;}
  .poem .src .dot.hollow{background:transparent;border:1.5px solid var(--ink);}
  .poem .title{font-size:14px;font-style:italic;letter-spacing:.02em;margin:20px 0 20px;opacity:.85;}
  .poem .body{font-size:17px;line-height:1.62;font-weight:400;letter-spacing:.005em;flex:1;}
  .poem .body div{min-height:1px;}
  .poem .body .stz{height:.85em;}
  footer{width:100%;max-width:980px;padding:18px 28px 0;margin-top:30px;}
  .foot-rule{height:2px;background:var(--ink);}
  .foot-txt{font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;opacity:.55;padding-top:12px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;line-height:1.7;}
  .today-btn{appearance:none;background:var(--paper);border:2px solid var(--ink);color:var(--ink);
    font-family:inherit;font-size:10px;letter-spacing:.24em;text-transform:uppercase;padding:9px 16px;cursor:pointer;margin-top:14px;transition:background .12s,color .12s;}
  .today-btn:hover{background:var(--ink);color:var(--paper);}
  .today-btn:focus-visible{outline:3px solid var(--ink);outline-offset:3px;}
  @media (max-width:720px){
    main{grid-template-columns:1fr;}
    .canon{border-right:none;border-bottom:2px solid var(--ink);flex-direction:row;}
    .canon svg{width:auto;height:150px;}
    .canon .legend{flex-direction:column;justify-content:center;border-top:none;border-left:2px solid var(--ink);flex:1;gap:6px;}
    .canon .legend .k{text-align:left;}
    .poem{padding:26px 24px;} .poem .body{font-size:16px;} .ctl .datestr{font-size:17px;} .ctl button{width:46px;}
  }
  @media (prefers-reduced-motion:no-preference){ .poem,.canon{animation:fade .45s ease;} @keyframes fade{from{opacity:0}to{opacity:1}} }
</style>

<script>
const POEMS = [{"poet":"Ana Rossetti","title":"Traficantes De Sueños","lines":["Antes de los reclamos nadie sabía dónde estaba. Habían","oído su nombre como el de esas ciudades de las viejas","historias. Quizás no existiera.","Hasta que, secretamente, sin que nadie hasta entonces se","hubiera podido dar cuenta, llegaron de allá seres","extraordinarios. Ropas distintas, relojes y cadenas de oro","bueno, zapatos flexibles como cáscaras, pañuelos de","colores demasiado hermosos que huelen como flores","nocturnas y se aprietan en el puño de un niño.","De repente, estaban por doquier.","Como por descuido, las abultadas carteras abrían sus","fuelles. Billetes arrugados o flamantes. Billetes grandes y","blandos, suaves hojas sobre los mostradores de las","tabernas, en las cajas de las apuestas o en los bolsillos del","timador. Billetes que no se acaban jamás.","Alegre lluvia de billetes, trasiego de billetes, papeles que","significan inagotables tesoros.","Y entonces, el padre entregó a la hija y entolló la ganancia","en su pantalón traído.","Y entonces, la madre entregó a la hija a cambio de una","hipotética máquina de coser.","Y entonces la hija, con la bendición del padre y de la","madre, se fue con otras hijas a la fabulosa y desconocida","ciudad de las viejas historias.","Y la aldea se quedó sín hijas.","Nunca más se supo de ellas.","Las lágrimas que la hija y las otras hijas derramaron por el","camino se secaron y ya nunca pudieron volver."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Ana Rossetti","title":"Hacedoras De Ciudades","lines":["Como sucede en los sueños, los tiempos se aúnan en un","único presente.","El recuerdo es recurrencia vivida; un","presente dilatado, la espera indefinible.","También el espacio es una realidad inmóvil que ellas hacen","vibrar con todas las alternancias del anhelo.","En la nada de la nada, resetean hogares, refugios y","alacenas.","Ellas, artesanas de una patria en terrenos prestados,","descubren un oasis en la desolación, bombean el manantial","de sus inagotables corazones y sus dedos, hospitales que","curan y consuelan, continuamente engrasan bisagras de","sonrisas sobre la despiadada mueca del hambre.","Pase lo que pase, sus dedos, trenzan alfombras en la arena","para ocultar el turbio color de los designios.","Sin descanso se alzan en la noche para desempañar","estrellas; retumban en el vientre tirante de la luna para","espantar a la desesperación.","Bailan sus dedos. Domestican el viento en la quietud de la","jaima y abren sus inexistentes puertas para invitar al","mundo.","Como quién vuelve de la despensa y suelta sobre la mesa","las provisiones del delantal, ofrecen el idioma de los","antepasados como único y seguro baluarte.","De este modo, edificando en la desgracia la firmeza,","consiguen permanecer en la tierra perdida como sí no se","hubieran marchado jamás.","De este modo consiguen habitar el día del retorno, como si","la espera hubiera concluido.","De este modo, lo pasado y lo venidero se entrelazan","indisolublemente, como el día y el lugar alcanzados.","Y cuando esto llegue, cuando ellas hagan coincidir","geografía con mapa, entre las cicatrices de la resistencia","emergerá la dignidad como una flor intacta y poderosa.","Serán restituidos los saberes ancestrales, la orgullosa","filiación y los perdurables cimientos de su pueblo.","¿Entregarán también sus llaves de guardianas, sus cayados","de guías, sus punteros de maestras?","Ellas, las hacedoras de ciudades en la memoria, ¿se","apartarán entonces de sus puestos para ceder el paso y la","tribuna y el albedrío?","Y entonces ¿a favor de quienes abdicarán de su soberanía?","Decidme, entonces ¿qué será entonces de ellas?"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Ana Rossetti","title":"Historial De Aprendizaje","lines":["Seis años. Anginas. El miedo y las lágrimas desleídos como","los helados en su paladar antes de deslizarse por su garganta.","Enjambres de mimos y pequeños regalos. Las flores de","papá, diminutos soles anaranjados, las primeras de su vida.","Un racimo de globos cabeceando perezosos en el techo. Sus","hilos balanceándose como flexibles colas de cometas.","Trece años. Accidente en bici. Fractura de la pierna y","brecha. Diez puntos. Entrada gloriosa en clase. La","admiración oscilando hacia la envidia atajó el residuo del","pánico y del dolor por el atropello. Y, sobre todo, un","corazón con un nombre en su escayola; un nombre que hará","que le ardan las mejillas. Primera carta de amor. Primeras","mariposas.","Veintiocho años. Parto difícil. Una niña. La ilusión de la","espera y la emoción de recibir a la recién nacida entre sus","brazos es lo único que le consta. Cualquier sensación","negativa, física o anímica, si es que la hubo, no la recuerda.","Cuarenta y cinco años. Biopsia. Apoyo de la familia,","mensajes de amistad, ted de ayuda para soportar la terrible","sospecha. Y luego la noticia: nada que temer. Alivio. Alivio","inmenso e inmensa gratitud. La alegría en casa. Alegría en el","trabajo. Fiesta y brindis. La tensión precedente se disipó en","una compulsiva tarde de compras, a golpe de tarjeta.","Nota: No figura el aborto que le fue practicado a los","diecinueve años. La angustia, la rabia y la soledad previas,","fueron sepultadas con paletadas de secreto. Y no merece la","pena remover lo pasado."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Ángeles Mora","title":"El Infierno Está En Mí","lines":["Pasos de","un peregrino son","errante"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Ángeles Mora","title":"Góngora","lines":["El infierno no son aquellos otros","que siempre se quedaron lejos","de mi calor:","el infierno soy yo.","Mí nombre es el desierto donde vivo.","Mi destierro, el que me procuté.","No me he reconocido en este mundo","inhóspito,","tan ancho y tan ajeno.","Supe que mi equipaje, demasiado indeciso,","pronto me delataba: este mundo tampoco","se reconoce en mí.","Yo siempre estuve fuera,","en otra parte siempre.","Soy una extraña aquí.","Sólo tengo una fuerza, sólo un secteto acaso:","esta voz que me escribe,","el doble que me habita en el silencio,","Este otro, mi infierno,","el vértigo","que al despertar me empuja","a una huida sin fin.","Estos son sólo pasos","de un peregrino ertante.","Los caminos","que no me pertenecen,","las palabras prestadas que los días","dejaron en mi oído."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Ángeles Mora","title":"Feeling/Canción","lines":["(O la posibilidad de decir)","Cuántas veces el sonido de la lluvia","fue escribiendo mis canciones","como se oye crecer la hierba en el invierno.","Aunque sé que no importan mis canciones,","lo que importa es el agua","mojando la tierra,","haciéndola despertar.","Me despierta","la lluvia en el tejado","taladrando mi espalda,","mi cerebro, mis párpados, mis dedos.","Como la tierra","atrapo ahora esa música","para que diga cosas,","para que lo que canta me cuente","sus secretos,","los que llevo por dentro.","Ya los perros ladraron a la luna,","se abren los cerrojos, amanece","en su condena este mundo de siervos.","Cuántas veces el ritmo de las sílabas","grita lo que la lengua calla:","sé que el sonido de los versos","ilumina la oscuta corriente","de sentidos que arrastran las palabras,","huellas que se bifutcan en una imagen,","en una idea dormida.","Pot eso escribo canciones que no importan","y me hacen falta.","Si la poesía es lluvia","—y nos empapa— que su música diga","lo que ya sabe el cuerpo.","Si la música calla ¿cómo nos guardaremos","de la muerte?","Me despiertan","los versos que gotean","desde el tejado, atraviesan","el silencio","susuttan en mi oído","con la incansable voz baja","de los héroes cotidianos.","Nada es la vida,","suelen rezar los dueños de la vida.","Pero canta la lluvia","[…]"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Ángeles Mora","title":"A Destiempo","lines":["Nací una noche vieja","del frío de diciembre.","Nervios, carreras en la casa,","vapor de agua caliente,","prisas, lágrimas, gritos,","susurros y pañales.","Las luces de aquel cuarto","se fueron apagando con mi llanto","mientras crecía","el bullir de la gente por las calles.","Calma adentro y afuera algarabía,","recordaba mi madre como un sueño.","En aquel desajuste","—todo un presagio—","he vivido por siempre.","Fuera del mundo yo,","aquella habitación, aquellos brazos,","aquella cuna.","Llegué muy tarde al año que se iba","y el que venía me encontró dormida."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Aurora Luque","title":"La Palabra Gaviera4*","lines":["A Ana Santos Payán","Para entender lo que es una gaviera","hay que ponerse dentro de Sophia.","Ella pasa a menudo de poniente a levante","unas veces ociosa entre delfines,","otras en un radiante hidropedal.","Monologa o dialoga con Fernando","o entona una salmodia soleada.","Pone a Grecia su proa, porque se sabe cíclada,","una isla desgajada que se incrustó en Oporto.","Hay que saber pulir el horizonte,","mantenerlo muy terso, anotar los destellos","homéricos, muy raros, que aún crepitan,","alzar a los Ulises africanos y atender los aullidos","de libertad del mar.","Para explicar lo que es una gaviera,","hay que usar las palabras","marinas de Sophia."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Aurora Luque","title":"O Los Tres Exiliados De Miss Alcott","lines":["Me asomo a la ventana","de la biografía de Miss Alcott.","Ella puso a Jo March como amiga en mi vida.","Jo tenía dieciséis. Yo tenía seis años","y leí una versión abreviada en Bruguera.","Jo quería ser Jo. Escribir y ser libre.","Yo quería ser Jo. He puesto empeño en ello.","Los senderos son crueles.","Me asomo a la ventana de Miss Alcott.","Tomó tres elixires de martirio en su vida.","Sólo se escribe si la dieta es rara.","En la utópica Fruitlands no debe molestarse","ni a gusanos ni a ovejas ni a caballos.","El fanático padre, por no dañar la tierra,","a sus hijos nutría con papillas silvestres.","Para cutatr los fríos arrastrados le dieron a beber","un reputado filtro de mercurio","que le hizo perder pelo y energías.","Conjuró su veneno con láudanos y opios.","-VWendería con gusto mi alma a Satanás","for a year offreedom), puso en boca","de una heroína suya, una antimujercita.","En el camino hubo","jaulas, trampas y setas venenosas.","Pero escribiste a Jo en la calle McDougall,","en Manhattan. He viajado a esa puerta como el que","peregrina","porque un santo le ayuda a usar las piernas.","Y las gracias te doy","por darme tu Semilla de Inquietud","con un brindis secreto","de elixir que no nombro."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Aurora Luque","title":"Disidanzas","lines":["(Homenaje a Nancy Spero)","Mais, chaque fois, un appel lointain de remorqueur","venait me rappeler que cette ville, citerne séche, était une ile,","et qu a la pointe de la Battery l'ean de mon baptéme","m'attendait, notre et pourne...","Albert Camus","Viajeros y viajeras de la línea","sesenta y seis del metro de Manhattan","notaron un temblor un agua de desierto","una palpitación en las paredes","de azulejos —nada que no pudiera tegistrarse","bajo la rúbrica de los espejismos","que provoca el cansancio","medular de las urbes.","La bailarina azul-azul-egeo","la más estilizada dijo adiós a Deméter","se soltó de las hélices eróticas","de los abrazos de las aprendizas","las gimnastas cerámicas","de carne de minúsculas teselas","que quieren ser de nuevo","para los humillados transeúntes","las antiguas coreutas las voces que ofrecieron","su locura gentil al viejo Alcmán.","La bailarina azul la ménade más viva","saltó de la pared subió al vagón","se hacía llamar Nancy","no Atalanta no Ártemis","bajó en Columbus Circle","salió de las entrañas de granito","besó la hierba pura del gran parque","con gran hambre de piel","soleada corrió mordiendo el aire sucio","la gente no sabía","de acrobacias felices y gratuitas","los niños sí entendían su danza descompuesta","de bruja o girasol —sonreían calladosbebió cerveza rubia y espumosa","y formó un riachuelo por la Quinta","puso la zancadilla a un grupo de turistas","grasientos y españoles","y una bengala al culo de un banquero","que entraba por las puertas","de innoble transparencia de su banco","y le cerró los ojos a un poeta muy cuervo","o a un músico que se regodeaba","[…]"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Ayo Ayoola-Amale","title":"Mi Color Negro, Mi Belleza","lines":["Mi color negro, mi belleza.","Mi color negro, profundo, elegante, el oro en mi piel color","sol","gritando por mi rostro, yendo y viniendo de mi corazón","con gran dignidad.","Mi color negto no se agrieta como tierra seca y apelmazada","Mi color negro, mi belleza","meciéndose en elegancia,","inflexible a las grietas del daño","como cadáveres quemados con pieles peladas.","Mi color negro, mi belleza.","Mi color negro, hogar de la humanidad como semillas","esparcidas por el viento.","Mi color negro, eternamente fuerte como un baobab,","con corrientes de luz, radiante, radiante de alegría a la luz","de la luna,","atenuó las estrellas.","Mi color negro, mi belleza.","Algunos marrones, algunos verdaderamente claros como","una tormenta que arroja rayos por todas partes.","Mi color negro, mi belleza","no una tela trenzada llena de bultos, con rebordes, podrida","que cuelga suelta como un pat de ubres de vaca.","Mi color negro, mi belleza,","abarrotado de piedras preciosas retorcidas","empacar entre mis muslos tarareando como una colmena","de abejas","buscando el panal de miel dulce más hermoso que las","flores.","Mi color negro, la alegría de mi piel, pesado y ancho como","la línea entre el estaño y el oto.","Mi color negro, mi belleza.","El remolino de color, de frescura con una gran alma","femenina, que no yace muerta como pájaros disparados","desde el cielo.","Mi color negro, mis labios, llenos de miel, hablando como","las estrellas.","Mi color negro, mi cabello elástico como las raíces de un","árbol de karité, endurecido pot el tiempo","energía nutritiva fragante.","Mí color negro, mi belleza, el fuerte sol del amanecer.","Mi canción negra, dorada, tejida en el tapiz de mi odisea.","Mi color negro, mi fragancia se aferró a las almas que caían","en cascada de mis labios, mi pecho lleno y caderas bien","formadas en una dulzura tan activa como el agua","[…]"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Azucena Enríquez Martín","title":"Marionetas Desterradas","lines":["Surgiendo de la inocencia,","un instante cruza clemente y fugaz","el primer destierro de los hombrtes.","Permanece apoyado","en su soplo de vida,","ignorando la caída de las sombras.","Susurros de marionetas que derraman","doloroso serrín de sus pies de trapo,","perfume de terciopelo intimidado","por el repentino estallido de las pisadas.","Torsos desteñidos que se aproximan","a las rejas entramadas de coronas y agujas","mientras se levantan torres de humo.","En su sufrimiento de madera,","pervive todavía un instante consumido","por esta tierra de lágrimas y astillas.","de"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Azucena Enríquez Martín","title":"El Caminante","lines":["Dicen que han visto al caminante.","El miedo se apodera de las horas inertes","a la vez que su susutro esconde una súplica,","escaso es el sonido de su voz enmascarada","por el clamor de unas gaviotas de cartón.","Añora aquellas noches de oriente recorridas","junto a lo ausente, brisa torturando","a la estricta soledad de las farolas.","El eco de un violín desgarrando una nota","evita que el desvarío se aloje en la melancolía","de este presente detenido segundo a segundo.","Altas sendas desnudas rozan el límite","de todo lo invisible en este panorama.","Región que vive solitaria tras la deriva,","reza por divisar una sonrisa inhumana.","Polvo emanando de unas tibias manos,","como el llanto de un engaño azatoso,","permanece en el suelo ciegamente","buscando las turbulencias de su viaje.","Los silbidos han perdido a su dueño","asomándose tras la inmensidad de las cenizas.","Tiempo dispersándose tras los rincones","temblando tras su muro de seda","mientras un rostro cae derrumbado al abismo."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Azucena Enríquez Martín","title":"Sinfonía De Vagabundos","lines":["Crimen cometido bajo la sospecha del desamparado","mientras los dedos del mundo caen cabeza abajo.","Caminaremos espetando a que un coro de muñecas","acaricie el perfume de sus desconocidos dueños","y la piel gotee como sorbos de esperanza herida","en la vasija de las palabras mudas.","Embriaguez que como pétalos marchitos","brama sorprendida por la ignorancia de los hombres.","Voz que resucita con los brazos distantes","junto a la ceguera de las estrellas,","lucha abandonada por el despliegue de la muchedumbre.","La tempestad arranca la desnudez y la falsedad","de sus mejillas atormentadas,","espesa tinta impregnada de delicadas miradas.","Por fin, las estrías de las estatuas de piedra","se entreabren indefensas ante la igualdad de los párpados","al comprobar que los mortales nacemos bajo la misma","quimera."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Begoña Callejón","title":"Hermana Muerte","lines":["Estás en el rojo terciopelo de mi vientre, en los","gritos secretos que anuncian mi temblor de niña","herida. Quiero mostrarme desnuda ante ti. Quiero","que dispares el gatillo, que me ahotques, que me","asfixies, que abras mis ojos hacia los horizontes","marinos. Ponerme un abrigo de fuego, arder, en la","miseria. De noche buscas a tus hijas iniciadas en el","mal. No quiero que me salves. No lo repitas. Las","campanas tocan a muerto. Invítame a ser un ama de","cría. Mis manos abiertas reclaman sangre. Mi útero","estrecho busca un pájaro desplumado. Nuestros","besos mueren, tu lengua, la de mi hermana, la tuya,","la mía. Si me tiendo en la cama me pudriré. Baja","conmigo las escaleras. Cuece un caldo espeso para","el diablo. Brotan lágrimas de mis senos. La luna","celosa, ocupa mis ojos."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Begoña Callejón","title":"Ishtar","lines":["¿Quién alumbra el amor y la guerra? ¿Quién protege a las","prostitutas y los amantes? La hija de Sin, de la luna y el sol, la","esposa de Tammuz. Alguien que quiso aferrarse a la prisión","de sus propios huesos. La que conduce la violencia de forma","caprichosa hasta el extremo. Tienes que saber que si sigues la","estrella de ocho puntas que llevo en la mano te llevaré donde","muere cada día la noche abierta. Donde la tierra tiene bordes","de papel y ojos de fuego. Cuando te encuentran te dicen:","destruye el viento. Y así, desnuda, con las manos sobre el","vientre o sujetando mis pesados senos de vida fértil intuyo","que el cuerpo de la niña traerá un mañana de guerra, oscuta y","prohibida. Sé que en ese instante me llenarán el espíritu de","esas caricias perdidas en la memoria, las que sueñan con","respirar el olor de las lilas del camino. Me cubrirán de años y","minutos, de los cantos de amor en las horas muertas, y","entonces, descenderé a los infiernos en busca de Etreshkigal,","para arrancatle de sus manos a mi amado hermano.","Mi mitada lo ha perdido todo, en ocasiones, con un arco en","la mano: dirijo el carro de los siete leones."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Begoña Callejón","title":"Persephone","lines":["Estoy donde el miedo no cuenta cuentos, donde nadie me","llama por mi nombre, donde las garras de Hades se alojan","en mi respiración. Y vuelvo a la noche, al ya familiar roce de","la caída, casi como un descenso musical hasta la llegada de","la primavera. El invisible enciende una antorcha en este","lugar extranjero mientras me estremezco abrazada al suelo.","He creído que estaba muerta pero la muerte solo era la","repetición de tu nombre cuando me separaste de los lirios.","Ofrezco","la inmortalidad y vosotros, sobrecogidos","participantes, os arrodilláis a mis pies. Hago míos vuestros","anhelos. Dirijo este lugar de espectral textura. Tengo el don","de trasfigurar y acercatos a lo prohibido. Este es mi reino.","Pasos y voces en la sombría estancia. En este cementerio los","huesos afilados van dándole forma a mi memoria. No","hablaré de Tisífona, Megera, Alecto, potque no llegaron a","nacer. Si hablaré de los pájaros muertos que caen de mis","pechos cuando abandono su cama, de la luz anaranjada que","arrastra la huérfana.","Hemos intentado perdonarnos","lo que no hicimos.","Olvidar la siembra,","Deméter."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Berta García Faet","title":"Oliverio Girondo","lines":["and the lovers","pass by, pass by","ira"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Berta García Faet","title":"Bata","lines":["Padres, hermanos, amigos, profesores:","soy un ser de deseo.","No es suficiente el contexto","—yo en el salón, en la bañera, en el cine, en el despacho:","ocupada en las tareas que desubican el deseo","para lograr acallar este hecho sin espacio:","que, especialmente,","soy un ser de deseo.","En el reino de la astenia y sus panfletos,","en el milenio de la saturación y los cuerpos bellísimos","encerrados en patéticos frasquitos de fobias,","sin tocarse,","yo soy un ser de deseo: bocas entreabiertas,","corazón-voluta.","En el mundo de los helados estanques","de unidades inconmensurables y aisladas del contacto","(cuerpos bellísimos agarrados a maderas,","miedosos de rozar un tobillo,","por si al final se enamotan),","os tan-solemne-y-tierna-y-felizmente anuncio","una pulpa de deseo: no puedo salir de Shostakovitch","y me alimento de trompetas y de amores de la infancia","que me encuentro en el metro y de señores-frutas.","Soy un ser de deseo:","1. Sé lo que es una revuelta de hormigas rojas","africanas","por entre las piernas.","2. Sé lo que es llegar a morderse los labios.","3. Sé lo que es decitle, pot ejemplo","oh qué interesante","mientras pienso","oh Dios lo que te haría","oh Dios oh Dios en cuanto te descuides","te planto un beso que te mueres de colotes;","luego,","impondré mi disciplina —y una cierta dulzura—","en tu cuarto ex-templo-de-ver-castamente-películas;","luego,","montaré una fiesta con los que un día fueron míos,","y os haréis buenos amigos, y volveremos todos","a un cierto París básicamente de cuellos.","Potque,","sobre todo,","soy un ser de deseo;","y sí me muevo por el mundo","[…]"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Berta García Faet","title":"Procedencia: Acrílicos","lines":["Todo lo que alcanza el cuerpo a hacer en vida.","Brodsky","Formo parte de aquel selecto grupo de chicas","a las que Las Chinas han acariciado el pelo","¿es natural? ¿es natural? ¿es natural?","y los chicos comido concienzudamente","muslos y omoplatos en garajes y autocines.","Me casaré contigo. Verás. Me casaré contigo.","Desde sus cubitos-corazón, los inocentes","numerosos mirones supuestamente imparciales","(hoy, por sinestesia, físicos, aves y piedras,","un médico, un músico, un gestor de manías)","se empeñaton en proclamar el supuesto prodigio","de mis atributos visibles (los de todas las chicas)","(que, a los quince años, somos todas la misma:","un dibujo de Brenda, vulva-mirto-en-el-agua,","¡mirad los pellizcos!: violetas contra el mundo)","Hoy está claro:","el amor lo ve todo muy bello","muchas gracias a lo cual","formo parte de aquel selecto grupo de chicas","que, en la adolescencia,","no hicieron régimen.","¿Nos vamos a París? ¿Nos vamos a París?","Me casaré contigo. Werás. Me casaré contigo.","Los chicos (hoy la mayoría filósofos de la ciencia,","escultores de fresas, pintores de heridas, diplomáticos)","se atrevían,","se atrevían a sangrar pot las rodillas","(su menstruo divertido),","se atrevían,","y nosotras —lógicamente vírgenes y drogadas—","creíamos muy importante","cerrar mucho los ojos al besarnos.","Hoy está claro:","fueron tiempos felices","muchas gracias a lo cual","formo patte de aquel selecto grupo de chicas","a las que acechaban por los mares los hombres excesivos","—mnos motíamos de miedo, cortíamos, sudábamos;","pero nos sentíamos bonitas: eso bastaba: eso entonces","bastaba—","y los chicos nos juraban apasionadamente","atrocidades y absurdos en cementerios y playas,","y los chicos exponían con notable entusiasmo","[…]"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Berta García Faet","title":"Bases Del Concurso","lines":["lt ¿s a terrible thing","to be so open: it is as ifmy heart","put on a face and walked into the world"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Berta García Faet","title":"Sotevala Plata","lines":["Tanto la temática ¿De qué vas como el procedimiento","sacándome desnuda serán (recreándote en elpecho)","de absoluta libertad del autor en un maldito poemario?","¿De qué vas? ¡A doble espacio! ¡Por cuatro","perras, por quintuplicado!","Todo el mundo va a teítse","Todo el mundo va a medirme, sin entender nada","Ahora todo el mundo va a saber qué soy","Ahota todo el mundo va a saber que soy","e","blanca en agosto","y suave y sencilla","Oh delicada Honey","que abortas y no se lo dices a Nick","y desquiciada Martha","que le cargas el muerto a Geotge:","sí, durante tres segundos también las fui","como todo aquel que se ennegrece tres segundos","cada década de flor,","pero se supone que esto era un secreto","entre tú, el jardín y yo, los cómplices insólitos","que se descaran y desnudan sólo porque saben que se van","a ir","por la mañana.","Todo el mundo va a reírse.","Me van a medit, yo","lucharé","como un animal ciego en un agujero en la tierra, yo","lucharé","(heurística del escondite para hundir la transparencia), yo","lucharé","contra tu retrato y el galardón a tu retrato","de mí","con la mentira: les diré “ésa","no soy yo”.","De Introducción a todo La Bella Varsovia, 2011)"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Clara Janés","title":"Lineas","lines":["Una vez más el paisaje fugitivo,","el lago, los valles,","los árboles que corren como tíos.","Llega una nube","y ciega la mirada;","luego descubre","un mat, un fuego.","Cuando duermes","se recoge la vela de tu tiempo,","se borta el libro","por la magia de la sombra","y pasa a tus sueños la escritura.","A mis ojos,","la desapatición de tu día,","y mi quedar en mi día y en mi noche.","La belleza se desliza en su órbita.","En la isla que se aleja","tensas el arco.","La flecha sigue su línea.","Yo la mía."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Clara Janés","title":"Retrato","lines":["Ni una sombra","que merme ese paisaje","de luz.","Y vuela","el reverbero múltiple:","el ser y su espejismo.","Y corren en su seno","-profunda compañíalos leones.","Las rosas del cielo","se despliegan","en el lago del alma.","Llega la danza","como el canto de un ave","con hojas y con ramas","enlazado;","un pie ligero,","moreno,","para el que no hay escollos.","Y la carrera","llena de color","hasta el fondo de las palabras;","y la voz","donde el cuerpo","se abre al espacio como un río","con intensa","calma."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Clara Janés","title":"Desde La Niebla","lines":["Vi una campana en Ispahán.","Era como una cúpula dorada.","Resplandecía","y su sonido","también resplandecía.","Me llega ahora su destello","cruzando los cercos.","Es la señal","que de noche transmite","un latido susurrante.","Ya sé que el río se ha secado.","Ya sé que el puente, cegado de los astros,","se desmaya,","mientras la tierra","entona un lamento","por la ausencia.","Ausencia,","descúbtete, muestra tu forma","puto deseo y fábula.","Estás ahí","aunque la lluvia venga,","estás ahí","y dibujas el amor,","pero en lo hondo,","en lo más hondo,","la noche","toda ficción devota.","¿Por qué no cesa, pues, ese destello,","ese latido","de un aliento que emite","desde la niebla del misterio?"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Clara Janés","title":"Tumba De Hafez","lines":["Veneto el árbol y la tierra,","y la arena amorosa de tu mano","en la losa.","Ella acoge la luz","del otto lado,","yo parto hacia el bosque","del desasimiento.","Y planea sobre nuestras cabezas","una elevación azul","que se prolonga","hasta los astros noctutnos.","Venero el árbol y los astros","que se abren camino en nuestros ojos,","espejos de esa noche","que salta la linde de la noche.","Giran las doce ramas","y los tiempos se dispersan,","queda la muda claridad incesante","del fondo de un abismo inescrutable."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Concha García","title":"Ser Mujer","lines":["A María Guadalupe Valle Moreno","Haber nacido mujet significa:","poner tu cuerpo al servicio de otros,","dar tu tiempo a otros,","pensar sólo en función de ottos.","Haber nacido mujer significa:","que tu cuerpo no te pertenece,","que tu tiempo no te pertenece,","que tus pensamientos no te pertenecen.","Nacer mujer es nacer al vacío.","Si no fuera porque tu cuerpo-albergue","asegura la continuidad de los hombres","bien pudieras no haber nacido.","Nacer mujer es venir a la nada.","A la vida deshabitada de ti misma","en la que todos los demás —no tu corazón—","deciden o disponen.","Nacer mujer es estar en el fondo","del pozo, del abismo, del foso","que rodea a la ciudad amurallada","habitada por Ellos, sólo por Ellos,","a los que tendrás que encantar, que engañar,","servir, venderte, halagarlos, humillarte,","rebelatte, nadar a contra corriente, pelear,","gritar, gritar, gritar","hasta partir las piedras,","atravesar las grietas,","botar el puente levadizo, desmoronar los muros,","ascender el foso, saltar sobre el abismo,","lanzarte sin alas a salvar el precipicio","impulsada pot tu propio corazón","sostenida por tus propios pensamientos","hasta librarte del horrot al vacío","que tendrás que vencer","sólo con tu voz y tu palabra."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Concha García","title":"Las Veo Pasar","lines":["Cuando las veo pasar alguna vez me digo: qué sentirán","ellas, las que decidieron ser perfectas conservar a toda","costa","sus matrimonios no importa cómo les haya resultado el","marido","(parrandero mujeriego jugador pendenciero","gritón violento penqueador lunático raro algo anormal","neurótico temático de plano insoportable","dundeco mortalmente aburrido bruto insensible desaseado","ególatra ambicioso desleal politiqueto ladrón traidor","mentiroso","violador de las hijas verdugo de los hijos emperador de la","casa","tirano en todas partes) pero ellas se aguantaron","y sólo Dios que está allá arriba sabe lo que sufrieron.","Cuando las veo pasar tan dignas y envejecidas","los hijos las hijas ya se han ido en la casa sólo ellas han","quedado","con ese hombre que alguna vez quisieron (tal vez ya se","calmó","no bebe apenas habla se mantiene sentado frente al","televisor","anda en chancletas bosteza se duerme ronca se levanta","temprano","está achacoso cegato inofensivo casi niño) me pregunto:","¿Se atreverán a imaginarse viudas, a soñar alguna noche","que son libres","y que vuelven por fin sin culpas a la vida?"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Damarice Yongo","title":"Infinito Alternativo","lines":["Tráeme una manta","abraza mi espalda para calmarme","una almohada","suave para mi cuello","Un teposapiés también","aterciopelado para los pies y sonreité","no olvides cubrit","de lana mi piel y amaré","Eso sí, busca un trago","con frío mi alma está desconsolada","que suene la música","llévame al paraíso","espera a mi lado","para cuando brillen dos soles","y los árboles","den sombra","incluso me abaniquen","cuando hierva el aire","entonces, espera a mi lado."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Duna Ghali","title":"Trenes","lines":["¿Cuantos trenes tengo que coget","para estar a salvo de mis errores?","Trenes de pensamientos alineados","estacionados en vías, en un tórtido día de verano","Sus sueños con trenes vinculados, son infinitos,","aquellas vías vacías","Una unión entre estación y tren","es esa monotonía que produce un agradable sueño, y ruido","a la vez","te complace ser continental","a pesar de ser un cansado viento","coges un tren con sentido","y ritmo","al medio día","sin equipaje ni libro","descalza","me desvío","de cuando en cuando","como un monje hindú","tragando espinas, trozos de cristal y clavos","andando sobre ascuas","para acortar el camino."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Eba Reiro","title":"Llevo Ropa De Hombre","lines":["Leo revistas de mujeres potque serlo es muy difícil,","llevo ropa de hombre porque es fácil,","porque la he heredado","y es domingo en mi corazón","y nadie me espera.","Ser mujer es un trabajo a tiempo completo","y yo estoy ocupada escribiendo","-lo siento, no lo siento-","demasiado ocupada, zu beschaftigt;","ser mujer requiere un organigrama y un control","nunca ejercido sobre el tiempo","-reaplicar pintalabios, anti-frizz en día de lluvia,","la puntualidad de la luna, temporada","otoño-invierno, comprar medias de repuestoy yo estoy ocupada escribiendo.","Ser mujer requiere la posesión de un secador","del pelo y de antiojeras y, terriblemente, de","sujetadotes, y yo estoy demasiado ocupada","escribiendo y gastándome el dinero","en libros y en hombres y en comida:","Atraer a un hombre heterosexual sano","es igual a dos hotas de tatea,","atraer a un hombre heterosexual enfermo","es igual a tres horas de tarea,","mi marido homosexual muy sin embargo","me quiere sin condición desde el principio.","(8. 11.14)"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Eba Reiro","title":"Tablero Del Pinterest","lines":["He construido una casa pata ti","en un tablero del Pinterest,","quizás alabes algún día las guirnaldas","de esa luz tan especial en la buhardilla","o el color menta de las paredes del porche","que arañarán después los perros,","ideas posteadas por Carla y Wendy","de Ohio y Massachusetts.","Tú no lo sabes, peto he reservado una habitación","forrada con mi carne y mis mucosas,","húmeda, en la que te puedas","tumbar a brillar y a dormir.","No lo sabes todavía, pero en nuestro ¿tercer? viaje","pasearemos juntos junto al Sena y mis pasos","serán lentos, mis piernas cansadas,","y al esperarme mitartás el patrón moteado","que dibujan las hojas en mi cara,","oscureciéndome un ojo el contraluz","de un árbol joven, y tecordarás entonces","la primera noche en el hotel, en la que","las persianas proyectaron su ajedrez","cebrado en la cara de tu novia,","y quizás luego te sientes a escribir","sobre la situación y simetría.","Mientras no sucedes me tumbo a intentar dormir","a las 4 de la mañana,","y podría jurar que siento","mi corazón grapado al pecho","con material escolar color plata,","y podría jurar que he visto","a la Luna latir,","agatrándose sin brazos a su cielo.","(4, 12.14,"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Eba Reiro","title":"Solsticio. Diciembre.","lines":["En la noche más larga del año","me entero","de que nuestros ritmos circadianos corresponden","más bien","a la órbita de Matte y de que","no estoy hecha, por decreto,","para ser distraída o escoger","libremente entre todas","las opciones de la vida.","Tú ya no pronuncias mi nombre y he","de buscarte entre una lista muda de contactos,","con lo que estoy de acuerdo ahora.","He nacido con báculos metálicos","por esqueleto,","en los que socavo una muesca pot cada","abandono;","silbando he de bailatme","hasta la muerte","a mí y alos niños de esta aldea:","aire sano entre mi armónica de hueso.","(27. 12.14)"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Estefanía Montero Sánchez","title":"He Perdido","lines":["Si digo que me he perdido,","no es porque mis labios ya no estén conmigo.","Es por el tiempo,","que el reloj cuenta,","mientras mis brazos están vacíos.","Es porque este año,","el invierno viene con ropa de abrigo.","Puede que sea,","porque a tu vida","le falta un “conmigo”.","Puede ser culpa","de que tú seas un gato y","yo el ladrido.","Mierda,","si digo que he perdido,","es potque a este sentimiento","le gana el olvido."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Estefanía Montero Sánchez","title":"Abismo","lines":["Escrita con la tinta que genera el corazón,","el alma te otorga la posibilidad de convertir","en palabras y melodía","el mensaje que ese corazón quiere que viaje pot este","inhóspito mundo.","Pulsaciones que aumentan,","hacen vibrar a este pequeño cuerpo","hasta hacerlo temblar de emoción.","Con los ojos cerrados y apretando con fuerza","para que no quede ni un milímetro expuesto.","Gritando y dejando que explote","la parte de mí que necesita volar,","que necesita fluir,","que necesita morir y resurgif...","Mientras,","doy el salto,","me ptecipito cien metros en caída libre.","El viento corta con fuerza sobre mi cata.","Los ojos siguen cerrados,","ahora hay un extraño silbido en los oídos.","El momento es eterno","Y, sin embargo, es ínfimo","para realmente dejar paso a la eternidad.","Caigo,","caigo sin poder frenar,","sin quererlo, además.","Mis manos se van fusionando con el aire que me azota,","mi cara se relaja,","mis ojos se destensan.","Al fin llega el impacto.","La tremenda brusquedad y frialdad del suelo","se incrusta en mi cuerpo,","y yo en él.","Hoy, superman no puedo hacer nada por rescatarme.","Hoy, la heroicidad quiso dejarme marchar.","Sin capa,","casi desnuda,","por trozos me hallo en el suelo.","Nadie tíe, nadie grita.","El estupor se hace contagioso.","Solo un pequeño trozo más en la necrológica de mañana.","Solo un valiente corazón que acabó siendo tan cobarde","como el miedo."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Estefanía Montero Sánchez","title":"Llover","lines":["Si te atreves a llover,","seré el agua,","el relámpago,","el granizo,","el trueno.","Si te atreves a llover,","me lluevo contigo."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Estefanía Montero Sánchez","title":"Luz","lines":["Me había prometido que no volvería a estar en esta","situación,","y allí estaba: con los dados en la mano","y los sentimientos en la tripa","mientras todo se movía a una velocidad teducida.","Joder,","lejos me quedaba pensar","¿cómo aquel rojo de sus labios se había convertido en","mi color favorito?","o ¿como el tres se había quedado a vivir en mis","gustos?","Porque tres","eran los segundos que tardaba en sonteír","cuando yo dejaba de hablar.","Bailando las calles,","contando las baldosas","en busca de los pasos que me han alejado de ella.","Que no es aire sino lo ha rozado antes,","que no es vida","sino es el mismo reloj","el que cuenta mi tiempo y el suyo.","Y se paraban,","juro","que se paraban las tormentas y los rayos,","las mareas","y las hojas de los árboles,","que no quedaba en el mundo más que su sonrisa y sus ojos","(porque ella sabe sonreír con los ojos)","OS","intentando colgarme de la fuerza que nacía de no sé donde","y que volvía para hacerme sentir no sé qué...","aunque ese dónde y ese qué","sean ella.","Y se le inflaba el pecho de aite y","a mi de sentimientos,","enloquecía por segundos y","no era más que amor","o eso decían aquellos que callaban","para escuchar como mis latidos tompían el mundo.","Maldita la locura que me dominaba","y me dejaba desnuda ante su manera de caminar,","ante su voz convertida en hilo que yo","tejía para vestirme con él.","Y, no nace el día","hasta que no quiere abrir los ojos,","[…]"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Estefanía Montero Sánchez","title":"Compasión","lines":["Vuelve a levantar el ánimo y diluye tu pena","la claridad reducida de tu cielo antaño tan iluminado","no debe en ningún caso hacerte bajar la cabeza","Levanta tu ánimo lacerado más allá de todos los cielos","pues el cuerpo perdido deja siempre atrás su esencia","esta alma radiante persistente eterna","Las lágrimas son frutos de la ignorancia","El saber las seca, e ilumina sus rasgos estirados","La fuerza del espíritu sobre la materia es palabra de","sabios","Sonríe, sí, sonríe en el dolor","Reniega de esta satánica manía de la naturaleza","queriéndonos creer que todo se apaga","¿No ves esta cara radiante?","No escuchas esta voz llena de dulzuras","prueba de la eternidad del ser?","Recibe este rocío amigable, este rocío fraternal","para ayudarte, querido amigo y hermano, para","restañat tu herida","Pues lo que ha sido será.","Bamako 3, septiembre 2001"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Estefanía Montero Sánchez","title":"Sueño","lines":["La vida es un sueño","Soñamos que un día reímos","Soñamos que un día lloramos","y un día soñamos que motimos","allí termina el sueño de cada uno.","¿Porque tenemos que teír y llorar","si no es para acabar muriendo?","Soñamos porque estamos condenados a soñar","Reímos lloramos morimos si tal es el destino","Soñamos ese sueño que es nuestro destino","Soñamos ese sueño que es nuestra vida","Soñamos ese sueño que es nuestra muette."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Fátima Zahra Bennis","title":"Mujer De Fantasía","lines":["¿Fue un sueño","o una emoción del cielo?","como desaparecieron mis pasos,","borraron conmigo la espina de la herencia?","¿Qué fuego tocó a mi ceguera?","El perfume del asado","se exhala","por gotas de brasa,","con sus gotfjeos","se emborracharon mis sangres.","soy la nube reprimida;","al encender la pasión,","estoy lloviendo mares","que atestiguan","que soy mujer de fantasía.","Cuando se ha visto","mi mitad, entertada viva,","me fugaba.","con las sacudidas más dolorosas,","descendí","eligiendo","la desnudez de metáfora.","Yo a quien me crucificó","La sopladura de lo desconocido.","Circulé","entre tumbas.","¿Quién me presta","un sentido con el qué","traigo mi existencia?","Yo quien maceré mis deseos","en mis palabras","y me dormí","cerca de la luna.","De sus pliegues","creé mis pasiones más bellas."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Fátima Zahra Bennis","title":"Paraíso De Fuego","lines":["¡Placer amante!","¿Qué dolorosa es tu blancura!","Desde lo más alto","lanzas tus gemidos,","navegando pot mis lados.","Paraíso de fuego","por cuyo bajo","fluyen","ríos.","Al borde de la dispersión","acompaño a tu desasimiento,","me pliego","sobre mí","y hago creer","a mi copa vacía,","que tu espera","es más apetecible","que la dicha de abundancia."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Fátima Zahra Bennis","title":"Ansiedad","lines":["Un Brillo","de agua y fuego.","con tu útero","lo sorbes en forma de panal,","mientras que tu vacío","se disculpó a un espejismo","que ya no te merece.","Sobrecatgada de ansiedad,","de tinta del deseo.","ahogas","el desierto del cuerpo.","Ofrecida a lo imposible,","ninguna patria te abraza,","ninguna cosecha te satisface."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Faun Ataya","title":"No Tienes Que Llorar","lines":["Déjame contarte todas esas cosas","por las que no tienes que llorar.","Está oscuto cuando despiertas","y oscuto cuando duermes.","No debes de tener miedo.","Tus manos duelen de vez en cuando,","quizás sea por miedo,","peto no lo puedes parar.","Déjame contarte todas esas cosas","pot las que no tienes que llorar.","Hace frío y está húmedo,","peto no solo fuera, sino también dentro.","Dentro, no en el corazón; pero en la sangte.","No, no tienes que llorar,","el dolor ya está desapareciendo.","Es normal sentirse sola,","es normal sentirse dolida.","Te cuento todas esas cosas","por las que no tienes que llorar.","Que nieva y no nieva,","que el sol no se quiera esconder.","Que no haga calor, ni tampoco frío.","Me cuento a mí misma todas esas cosas","por las que yo sí tengo que llorar,","Un viejo vaso en el cual","crecen cristales rojos brillantes.","¡Qué bonita puede ser","la naturaleza -ciencia-!","No, no tienes que llorar.","Déjame contarte todas esas cosas","por las que no tienes que llorar.","Sí, déjame contarte todas esas cosas","por las que no debes llorar."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Faun Ataya","title":"Verde","lines":["La luz que emite aquel árbol,","rodeado de hojas secas de otoño,","ilumina tanto, que la noche,","parece día.","En su sombra, crecen las flores,","protegidas de la lluvia.","Todo vetde,","campos verdes,","prados verdes,","y árboles rojos de amot.","\"Mundo de papel\"","Con las letras se pueden construir castillos","y con las palabras, sembrar campos.","Campos llenos de margaritas de papel con tallos de","periódico.","Todo en blanco y negro,","y gris y azul.","El cielo está compuesto por libros,","y cuando llueve, caen sus hojas.","El mar formado por papel","que al pisarlo no se hunde.","Los seres vivos recortados de revistas,","nos comunicamos con sellos de tinta.","Lo que decimos se queda para siempre,","lo que pensamos, no existe.","Un mundo de papel,","un mundo lleno de errores imborrables.","Furat Esber (Siria)","Nació en Damasco en 1958. Se licenció en Derecho por la","Universidad de Damasco. Actualmente vive entre Nueva","Zelanda y su país natal.","Publicó su primera obra en el año 2006 bajo el título “El","truco de lo misterioso”. Tiene también en su haber: “Cómo","el agua no puede ser quebrantada”; “La desnuda flor de la","montaña”, y “Día de campo entre el cielo y la tierra”.","En su obra poética, intenta expresar que la vida es un viaje","en el que el ser humano y, sobre todo, la mujer debe","expresarse libremente. En un mundo cada vez más","machista, los versos de la poetisa anuncian libertad. Para la","autora, se debe luchar mucho más para conseguir la libertad","de la mujer en el mundo árabe. Esta lucha se libra, según","ella, a través de la poesía.","Me pliego en mí misma.","Cuento los días de mi ocaso;","cuanto más se ensancha mi soledad, más asciendo,","[…]"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Faun Ataya","title":"Reino De Palabras","lines":["Quiero tener un reino de palabras","o un tío de palabras","que arrastre la desdicha humana","que haga raíces en mi alma","y la transformen en Argonauta","Quijota de los mares de la fantasía","valiente soñadora de la Libertad..","Un teino de palabras","que me haga trastocar","el movimiento de los pájaros en sus ramas","y que me transmita el color de una estrella","el olor del viento","la espiritualidad de la pasión de los hombres.","Un reino de palabras que me haga conocer","al ser humano, los mares y los astros","para juntar mi alma con mi cuerpo","y así complacer mi carne.","Quiero un reino de palabras para mi alma","como quiero una Patria inmensa para mi corazón","libre como la soñamos todos.","un reino de palabras que me seduzcan","y que se desgranen entre mi lengua","como laberinto de perlas","en un atardecer de mi Patria.","Un reino de palabras o un rio de palabras.","que se desborde y arrastre todo lo que encuentre","que sea fuego fatuo entre mi boca","pasión devoradora de mis sueños.","Que me encandile los labios","que me entregue las llaves de la imaginación","de las islas de los colores y las especias","Amboina, Banda, Ternate y Tidote","con sus baúles, sus tragedias y sus aventuras","en el mar del llanto de Vespuccio y Magallanes","Y, que para detenerse ante mí,","solo baste, que me iluminen tus ojos","o el temblor del umbral de un sueño","para manchar la página en blanco."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Faun Ataya","title":"Mujer","lines":["Soy mujer, luna y nube.","Pelo al viento y ojos a la vida.","Soy mujer, simplemente mujer.","Cotidiana de Gloria o de agonía,","acuario pot el movimiento de los astros,","feudal en el amor y planetaria.","Soy Selene, Venus, Nube con Pantalones;","en eterna búsqueda del cielo o del infierno,","de infame y celoso corazón,","carne sagrada de mi carne,","mujer, desde las yemas de mis dedos,","hasta la última gotita de mi sangre."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Faun Ataya","title":"El Pájaro Guis","lines":["En mi ciudad hay un pájato que se llama Cierto Gúis","y dicen que su canto indica que alguien viene","o alguien se va para siempre.","Cuando escucho en las mañanas el canto de algún","pajarito","tiemblo y sueño con el mar","con estrellas fugaces y cometas de larga cola.","En las horas de amargura y de impotencia","me vuelvo Gúis y alzo el vuelo","a gran velocidad hasta golpeat el viento con mis alas.","Luego vuelvo, suave, pausadamente,","Hasta que el viento es un susutro entre mis alas","O hasta que el Océano a mis pies","Parece inmóvil, o se ve menos imponente.","A veces, Gúis presuroso, alzo vuelo y huyo,","y sin importarme nada, vuelo, vuelo, vuelo","hasta encontrar el Sol, y la brisa del mar","me sacude el cuerpo en un desbordante golpetazo de","vida","que me hace regresar al principio de mi furia o de mi","impotencia.","Que se vaya el Gúis.","Que no venga hasta a mi casa.","Que se vaya con los Pájaros Perdidos de Tagore.","Que se vaya, como él dice, a buscar a otro lado","las lágrimas de la tierra."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Hema Ravi","title":"Pequeña Pluma Blanca ...","lines":["Desde la ventana de la cocina esta mañana","vi la pequeña pluma mientras se deslizaba","cuando una suave brisa la empujó más lejos por el aire","me recordó a la ancha hoja de arce amarillenta","que giraba y giraba en una tempestuosa víspera de otoño","pisoteada por un coche a toda velocidad sin previo aviso.","La diminuta pluma se posó sobre el capó","del coche rojo brillante de mi vecino gruñón","era la pluma perfecta para un soneto","justo en ese momento, comenzó la pelea","la voz locuaz y ruidosa del vecino","¡Tuve que aguantar sin elección!","Oh, pequeña pluma, tu himno alguna vez, deseo cantar","cuando estás de gira en solitario o en vuelo de pájaro."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Hema Ravi","title":"Gritos","lines":["Mujeres silenciosas","llenaron todos los caminos que llevan a ti","prepararon sus cuerpos para un ritual","que pulirá la herrumbre alborotada en gargantas","que no se escuchan","sino en un grito colectivo."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Inma Luna","title":"Las Poetas","lines":["Las poetas se sientan tras la puerta,","se dan codazos en el empeño estéril","de rescatar el agua de la profundidad.","Tienen los labios cada día más finos,","justo en el límite de la fisiología,","en el confín de la apariencia humana.","Lo que sabían descifrar","-ese misterio ignoto de lo que está debajo,","el pálpito que presagiaba la conmociónse ha vuelto mate,","desolador currículum,","proyecto huero.","Las poetas no quieren tener hijos,","no saben si podrán darlos a luz","con todos esos verbos empapados en nada,","cantos desacunados, mal nacidos,","nada de corazón en ninguna palabra.","Las poetas se astringen,","baldías,","ya no son peces ni saben sumergirse,","sus versos no fevientan,","son senderos nocturnos","hacia un palenque de barreños vacíos.","Tenían consistencia de jugo en el pasado","rociaban cosechas","y conocían todas las canciones.","Las poetas se rompieron los dientes","a fuerza de morder las paredes,","de sotber las aceras.","Se dejaron las uñas rascando las rejillas,","dándonos de comet bocadillos de sol.","Se han quedado sin casa las poetas,","sus lenguas espasmadas","no podrán advertir","del temerario paso de los días.","Las poetas han sido silenciadas,","languidecen,","nadie nota su falta,","por ahora.","Mi madre, mi hija y yo","nos sentaremos en un banco,","no tejeremos para nadie.","Hemos venido aquí","a disfrutar del sol y su envoltura,","somos tres consecuencias","de nuestra personal artesanía."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Isabel Romera","title":"Institución Psiquiátrica","lines":["El mundo es una institución psiquiátrica","regida pot el hombre,","lo comprendí hace tiempo","y confieso que intenté adaptarme.","Pero en la lucha","mi descenso a la locura va en aumento","y el tratamiento es nulo.","Debo permanecer como una piedra","quieta, muda,","viendo pasar las horas y los días","los meses y los años","sin sueños y sin realidad.","Pero tras estos muros","forjados por la intransigencia","seguiré golpeando","con mi puño y palabra","esperando que alguien","al otto lado escuche.","Aquí, tras estos muros,","seguiré amamantando cada día","a todas las mujeres que llevo dentro."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Juana Castro","title":"Dafne","lines":["Que tu luz no me busque, Apolo, porque soy una hoja","que vive con el viento.","Toda la savia es","una caricia blanda,","tengo verdes los brazos de besarme en las ramas,","de mirar en las sombras el cristal desvaído de mi cuerpo.","Los helechos me abren su corazón de agua,","poseo dos mil lunas ganadas al ocaso,","los tilos, el espliego, la frescura","de todos los diamantes que se mueren de frío,","las lianas que adornan","la libertad, el talle, las avenas,","mis pestañas, las rosas, los pedernales tiernos de los frutos,","las blancas mariposas donde beben su plata las raíces,","donde el bosque se espesa de semillas y muerte.","No deseo tu fuego, adoro la ceniza que es espota del trigo","y no quiero otro rayo que el resplandor redondo en las","naranjas,","el cenit que atomiza la techumbre calada de los átboles,","los troncos como dioses,","las auroras cebadas en su vientre de polen solitario.","Es inútil que cortas, porque este paraíso que fecundan tus","Ojos","me pertenece ya, es la textura","del fondo de mi catne","y crezco vegetal","desde la dermis al vello más oscuro","mundos,","donde duermen","los","es inútil que cotras, inútil que me alcances,","porque tengo las plantas","vaciadas en la tierra","y el laurel","es ya un triunfo de oro en mi cabeza."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Juana Castro","title":"De La Caza Con El Gavilán","lines":["En España los mejores gavilanes, que yo sepa, y mayores y de mejor","esfuerzo son los que crían en el Pedroche, que es en término de","Córdoba.","Pero López de Ayala","Ni una sombra, ni polvo, quedarán de este lance.","Tan secreto será, tan silencioso,","que aguardo ya tu nombre, descendiendo,","cuando el vuelo levantes tras la muerte.","Ni un gemido se oirá, ni el aletazo","breve de tu sombra en mi rostro.","Parpadeo y te acecho. Más temprano o más tatde","has de intentar la huida. No te equivoques, ciega,","porque el pico es a viento y hay dolor","en tus manos. Será el golpe más limpio","para nadie y nosotros. Quién habrá de morir","no importa nada ya, si el sigilo se esconde","en la brisa del campo y sus murmullos.","Lo que tardate un ojo en abrir y cerratse,","será un cuerpo abatido. El otro, victorioso,","se volverá a la vida. Bañado, perfumado,","sin que sola una pluma, despeinada publique","el perpetrado crimen."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Juana Castro","title":"Era Una Vez","lines":["Por el camino de los alambres caía la luna llena.","La luna llena caía en las encinas","y ella andaba sola con su gato Toribio.","La ciudad estaba lejos y el pueblo estaba lejos,","y ella iba en el campo","sola y sola en la sombra de la noche de matzo.","Esto era un cortijo, y una mujer, y un gato,","y la luna brillando sola sola en el sueño.","—Cuando seas mayor recorrerás el mundo.","Cuando yo sea mayot.","Por eso llego ahora al cortijo y me siento","en la noche de marzo más sola que la una,","y sé que tengo sueño, y sé que ya he vivido,","y el silencio se escucha como cae la luna","en el camino largo de alambres y de polvo.","—No eres más que una niña.","Tú eres una niña fantasiosa que duerme,","porque quiere dormirse de pie como los gatos.","Era marzo y la noche, y había una mujer","sola sola viniendo","de la mano de un gato que llamaba Toribio.","Yo ya no la conozco.","Sólo sé que la veo","cerrando las ventanas","como quien cierra un libro","perfecto y acabado, y hablándole a su gato","como al tonto Toribio.","Sola sola en la noche silenciosa de marzo.","Ella siempre teía.","Ella duerme en un campo","que es otro y es el mismo.","Ella tiende su cuerpo, y su gato Toribio","se adormece en silencio.","Y está la luna llena dando luz al cortijo."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Katariina Vuorinen","title":"Los Sueños De Mostar","lines":["Te escucho hablar, el aire se limpia","en el extremo de la plaza, el aire está vacío de colonia y","alcohol","y los pulmones reciben la mañana fría","como un aviso: por el momento","tú vas a vivir limpio y sorprendido como las extrañas","criaturas que se levantan inesperadamente del mar, lo que","sucede entonces es la tarea de los comerciantes,","de básculas y balanzas,","los silenciosos hombres de las calles se asoman por sus","puertas,","colocan cada tomate en su lugar preciso en el mundo.","Dices que tenemos que olvidar lo que sucedió en las","montañas","que había tiros en la ciudad","tenemos que abrir el candado de la mandíbula y un papel","ha sido doblado en la caja de letras","¿Qué más? dices. Nos reunimos como si entendiéramos","todo y nada.","Qué más, siempre habrá suficientes como aquellos que","permanecen despiertos toda la noche,","ya hay memorias inacabadas y costuras, reuniones","en una región desconocida","amores que no conoces","Si la mampostería de golondrinas cayera por debajo de los","aleros","Si las sombras se enfrían desapatecerán de los techos","una imagen intacta de repente brilla en el sol","y tu exprimes el teléfono, en él, en el espacio","te expresas hermosamente, rápido, con los bordes afilados","como una piel que ha sido abierta con un cuchillo, se","repata y se cosa."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Katariina Vuorinen","title":"Tareas Para Casa Y Pereza","lines":["Apresura a los niños, amor, el lobo te conduce","en un paisaje afilado, un paisaje crepitando con arándanos","rojos y viento,","el lobo impulsa tu pálida cabeza entre faisanes y liebres","abrazos y juegos son encerrados en un recinto alto.","Tú extiendes la palabra descubierta, la evidencia de","derribar,","el bosque cae a la base de la mente","el atardecer hace una cama de paja en el suelo","la luna, la punta seca de la conciencia, cuelga en el norte.","Te envuelves en una manta y en su picazón,","las rayas rojas de racha de las nalgas","por la noche, te quedas en la misma posición","con eczema y una expresión","Y otra vez las mantas deben huir.","Bestias febriles chorrean de la selva","caramelos de Polka para los pechos","despejas tu cabeza del humo, los hongos entierran a los","viejos árboles","en las fábulas de la sombra y de la búsqueda, al fin","consientes el dormir entre ellas","Espolvoreas sal para protección,","repite la palabra mágica, mil palabras para muchacha."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Katariina Vuorinen","title":"Reloj De Sol","lines":["Por la tarde el susto detiene los vaivenes de mis pechos:","pronto la tierra tendrá el olor de remolachas","cuervos actibillados caerán desde el cielo.","La ropa mohosa debe ser recogida.","Tú tienes que volver atrás para besarme,","para freír un pescado.","Yo jalo una camisa sobre mi cabeza.","Los caminos están sembrando esas áreas donde los árboles","han caído,","trazo a los alces que se esparcen sobre el cofre","disparo con tiros de arándanos rojos","sobre la mesa, Te gustaría juntar mis mitades","Charcos afilados en el patio para saludar a los que vendrán.","La primera noche brillante te trae sobre mi piel que se ha","rendido,","de mi cabello sacas botellas de brandy, coletas de la","esperanza,","tomas abajo","un cumpleaños y esa edad que debe empezar de nuevo.","Duermes dándome la espalda,","una piedra caliente resplandece en una caja, y la desecho."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Katia-Sofía Hakim","title":"Halógena","lines":["Soy el insecto","ardiente que fuma","sobre una bombilla","mientras","tus","vértebras","se","comprimen","al escribir","me evaporo","en un drapeo de metal.","Te quedará de mí","este olor","octe en el techo","un olor vivo","y aullante de un tiempo","derrumbado."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Katy Parra","title":"De Amor Y Viceversa","lines":["Hay abrazos que dicen que sí a la primera,","que multiplican los panes y los peces","como se multiplican los milagros","-de dos en dos, si el cielo te sontíe-.","Hay abrazos de alcoba, de lunes de cuaresma,","abrazos que te salvan de la desolación y el desamparo,","abrazos que imaginas a destiempo,","que ofrecen su mendrugo cada noche","para recompensatte de algún modo.","Hay abrazos de vértigo, de pubis y licor,","de entresábanas húmedas, manchadas de carmín,","abrazos que a menudo esperas sin rendirte, en mitad de la","noche,","por si llegan y dan su do de pecho.","Abrazos con abrazos de amot y viceversa."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Kayal Ahmad","title":"Las Nuevas Calles","lines":["Las nuevas calles","se llenan de mujeres con experiencia","de escribir novelas poco tristes","y con más pasión.","Las nuevas mujeres","se enfrentan al espejo mucho tiempo,","se maquillan ligeramente por la mañana","y por la noche","nos deseamos a nosotras felices sueños."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Lamia Makaddam","title":"Lloraba","lines":["Estábamos parados frente de un semáfoto en tojo,","cuando descansó sus dedos en mi cabello","me besó y me prometió una vida feliz.","Sin embargo, después de un año,","Levantaron el semáforo feo,","construyeron un jardín en su lugar","pero yo cuando paso por ese lugar","permanezco quieto y sin justificación.","Las rosas cambian de color bajo el sol","se iluminan y se apagan","las huelo","Y lloro."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Lamia Makaddam","title":"Sueño","lines":["Ayer,","dividí mi sueño","- mientras andaba su camino cortaba lo que no debería quedarse","de él.","Mientras andaba,","dejé mis fuertes carcajadas","detrás de mi,","y crucé hasta la otra orilla","después de quitarme la sonrisa,","ya andaba sin el poema","sin el amor,","entonces vi mi cuerpo","aún lleno de deseo,","no dudé en tirarlo en el umbral de la puerta","y entrar sin él.","Y soñé:","que la victima,","mis múltiples victimas","vendían pot la tarde","y contarán","mis pecados."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Luz Mary Guiraldo","title":"Como Un Centinela","lines":["La vida por siempre dando vueltas.","Y como un centinela","la muerte llama con todo y sus gerundios:","gato lamiéndose despacio","perro ladrando en la mitad del sueño","pájaro cantando al comenzar el día","mientras tejen su tela las arañas.","Golpea el viento apaga","un sonido en la ventana","se escucha la zozobra","parpadea la luz","y el silencio recoge algarabías.","Suenan distintas formas de alegría:","pequeñas cosas que pasan en la casa.","Magie F-V Vijay-Kumar (República de Seychelles)","Nació en República de Seychelles. Ha sido ganadora de","múltiples premios internacionales de poesía. Ha publicado","31 antologías hasta la fecha. Es la Directora Regional de","Tiras Motivacionales, mayor Foto de escritores, RD World","Nation Writers \"Union for Sudeste de África y Asia Central,","Presidente Nacional de la Hispanomundial Writers (UHE)","para las Seychelles. Embajadora de Humanidad y","Humanitario Desarrollo de WCHHD","- Ghana, consultora","jefe para la Asociación Literaria de Seychelles, Congo Ecrit","y Rodrigues / Mauricio. Tiene 6 medallas de plata, la Copa","de Jacques Chirac de la Academia de París, Peacock Opinion","(excelencia superior) de MS, artes Premio de Seychelles de","2017 a 2019, Lauteado del Premio Mundial del Gobierno de","Perú. Es también la Representante de ISISAR para la Unión","Africana, y Editora Jefe /directora de SIPAY, de la revista","literaria Seychelles Global."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Luz Mary Guiraldo","title":"De Una Semilla Hacia Las Plumas","lines":["Soy una semilla","esperando en silencio ser regada","por favor, elimina una mala hierba","deja que mis ramas se extiendan","Extiende las frutas","y comparte el jugo","con la humanidad","ofrece un estado de paz","Detén la estratagema","para destruir una gema","valora el entorno","y las abejas zumbando","Disfrutemos el néctar","la crema de la nata","y seguir soñando","no quedar atrapado en un frasco","Se un pájaro libre","viajando por el mundo","visitando a todos los amigos","con regalos, en los picos - plumas multicolotes."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Manal al Shaikh","title":"Naufragio","lines":["El muchacho que olvidó regar su flor","esta mañana","se despertó sumergido","entre la blancura de su mirada","y el silencio de una rosa","que brota a la fuerza en el corazón de una","noche ahogada.","¿Sigues insistiendo","que no estás matando a las flores?"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Margaret Saine","title":"Práctica Del Vivir","lines":["Navego por espacios móviles","deltas de alambre y sisal","como quien dijera recuerdo","racimos hallando puertas de sol","capulleros de luz","espejos alumbrados","Un relieve es este sueño","tributo de la transformación","que se desdibuja","ante la nieve de paisajes","Sedas sonoras","formas que surgen","de los campos de la memoria","esparcen su resquebrada fiesta","en la empinada danza de los hilos","arte de mujer urdido en fibras","Sobre una exposición del tejido México-Polonia-España","en Ciudad de Móico."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Maria do Sameiro Barroso","title":"Insomnio","lines":["La noche es un insomnio sagrado,","un lecho encendido, un soplo vacío,","la luna escribiendo su caligrafía extraña","en mis dedos totos.","Me acuetdo cuando tus manos","eran líricas paisajes, cumbres, fragmentos,","rincones póstumos de pájaros","donde leía tu rostro,","los cántatos de agua clara,","las ventanas de hiedras,","los crisantemos, las lámparas,","las amapolas que me traían sus frutos,","sus semillas,","el dolor de los muertos también,","despertando, en sus arpas de oro,","el testigo frío","de su tostro intermitente."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"María Ángeles Lonardi","title":"Mujer","lines":["En la luz del alba puedo encontrarte,","o en el silencio de la montaña,","en las iniciales de una letra eterna","o en las consonantes protectoras...","En las hondonadas luminosas del río,","en las luciérnagas que habitan tus ojos","o en las manos cuenco y tesoro.","Puedo encontrarte siempre","donde huele a vida, mujer,","donde se esparce el consuelo","que ante la muerte repartes","con un beso, porque eres lágrima y más...","Eres pureza, eres alfa y omega,","la continuidad del germen,","el cántaro donde el agua es fuente.","Y cuando la fruta es pasión y deseo","el aire verde de almizcle fecunda.","Con las alas desplegadas puedo verte","trazando caminos, sosteniendo el sol,","curando heridas, derrochando aliento,","dejando huellas por donde pasas","con la luna en los hombros","y en movimiento constante.","De día eres remolino de carne y hueso","y por la noche, te quitas las alas de ángel."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"María Eloy-García","title":"Alta Metafísica Del Trapo","lines":["he visto entonces el signo","de toda la topa tendida","su coyuntura modificada","una manga al borde oh pablo gargallo","como un marat sin espacio","inflado por el aire","un suéter Opina que hacía allí","hacia nada la nada del suéter","camisas muestran su detrás y su debajo","honestamente advierten todo su poliéster","la vida es una sencillez de pinzas","un simple juego de poleas","por el que la funda destrozada","de un colchón se desliza/","la imposible cabeza bocabajo de una americana","no se relaciona","autonomía de unas bragas confirman","el pobre estado de su infeliz autoestima","hace un momento suicidio de pinzas","y calcetín izquierdo /","la muerte puede ser como la vecina","del primero que acumula calcetines","y el más allá cuando esos calcetines","se los ponen sus hijos","entonces la vida surge de una lavadora","motor primero y la arruga es la orogenia","y el móvil de la vida","la plancha es dios cuyo libro sagrado","es el de instrucciones","la iglesia es el detergente quitamanchas","y la mancha la llevamos todos -defecto de fábricaporque hay que vender detergentes","el paso del tiempo está programado","hasta la feliz y centrifugante catarsis","y por fin cualquier desdichado anorak","cualquier sábana desafortunada","se desprende de aquel hilo","se desentiende de aquellas frágiles poleas","y es claro que aquella vieja última","y también primera porque vive en el primero","espera en el ojo del patio que todo lo ve","para abrirnos las puertas de su casa infinita"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"María Eloy-García","title":"La Sopera","lines":["en el ciclo artúrico de mi mueblebar todos prueban a abrir","la llave que va a dat a ginebra]","lleva una sopera dentro porque es un mueble conceptual","la cuestión de lo artístico se tesuelve en lo cotidiano","¿por qué resulta mi sopera sin estrenar atrapada en las","entrañas del mueble","tan poderosamente sentimental?","qué duda tan presocrática","¿será la misma sopera?","¿la veré como la primera vez será menos azul?","¿cuántos pensaron en su producción en cadena","que estaría condenada a la oscuridad más absoluta?","¿puede llamarse sopera a lo que nunca contendrá?","ante mi intuición empírica el fenómeno es la sopera","sólo un juicio sintético podría acercarme a tocarla","pero cuántos juicios universales necesito tan sólo para el","recuerdo","este idealismo trascendental merece una crítica necesatia","imposible hacer pucheros","pero si me pongo empírico-racional y digo que","la experiencia es el origen y el límite de nuestro","conocimiento","mi sopeta tiene en sus cualidades sensibles","ideas complejas que mantienen mi religión y mi memoria","la sopera es este deseo imposible hacer pucheros","y yo me pregunto","¿cómo será la sopera con su realidad","o cómo setía la sopera sin mi idea?"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"María Eloy-García","title":"Transverberación De La Vecina","lines":["tú que compras en gran superficie","que crees que sus precios te nombran","tú la puritana socialdemócrata mediamelena apoteosis de la","brutal bisutería","que protestas sólo por ser consumidor perfectamente","informado","tinte","azúcar","puerro","cuarto de kilo de aquello","pasillos caminas estanterías tevisas","buscando en verdad nada de lo posible","a ti matriarca convencida de la educación redonda de tus","hijos","qué lejana herencia lleva tu trágica conformidad tan","limitada","un paso triste un lento envilecerse","diosa entrampada letra espera","te ganas la libertad con grilletes de domingo","pata pasear marido y niños por el restaurante efervescente","pero aquel día sentada de moaré sillón a plazos","tu alma se despedaza por el extractor","se mezcla con aceite semipuro","sube por el aire disecado de tu dúplex abierto","entra de nuevo por la ventana y","por una sola vez entiendes","que la vida son más cosas"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"María José Valenzuela","title":"La Sed De La Palabra","lines":["Cada mañana me interrogo ante el espejo:","¿Quién puede detener la sed de la pobreza?","¿Por qué no la detienen?","Los cielos y los ciclos se repiten","como una sucesión de voluntades.","Las mismas catas, los mismos hombtes,","idéntica violencia dueña de su destino.","Pero al menos, seguimos tras las huellas","de aquellos que cayeron sin rendirse.","La canción de los valientes como hoja seca","desenreda la plata","de la música que duerme","detrás de los espejos."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"María Miraglia","title":"Creo,","lines":["Yo creo en el amor,","en ese amor que no pide nada a cambio,","el amor que no necesita juramentos","o pruebas eternas,","garantías y confirmaciones;","que puede entender y percibir mis silencios.","Las emociones no necesitan palabras","porque los mensajes pueden tomarse rápidamente","como el aleteo de un petitrojo.","Pienso en ti y en","mí bajo una luna azul","no importa donde,","escuchando una romántica serenata","tocada por arpas y violines","tomados de la mano,","o previendo mañanas venideras.","Sí, creo en el amor."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Marine Petrosyan","title":"Lo'Sée Nadie...","lines":["Lo sé, nadie está en este cuarto","y la ciudad se encuentra ssl","y todas las glorietas de esta ciudad están vacías.","Pero yo amo las calles polvorosas","y la lluvia de las calles polvorosas.","Yo amo a los derrotados que están tristes","pero amo más a los victoriosos que son tristes."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Marine Petrosyan","title":"El Espacio Del Tankas6","lines":["Would you please, read, it, twice, again?","-Léalos dos veces,","desde la sala alguien me lo pidió","y yo repetí dos veces cada uno de los poemas","En un festival de poesía de Melboume recordé","en la tribuna el juego de naipes Hyakunin isshu””,","que jugábamos en los años nuevos","36 Tanka: tipo de poesía japonesa tradicional, que se compone","de 31 sílabas (5-7-5-7-7)","37 Hyakunin Isshu: Famosa antología de poemas japoneses del","poeta Fujiwara no Teika en el siglo XIII. Traducción española:","Cien poetas, cien poemas, José María Bermejo y Teresa","Herrero, Editorial Hiperión, 2004. Estos poemas se usan en el","juego de naipes(uta karuta) en el que dos jugadores escuchan a","un lector que recita la primera mitad de los versos, y deben","capturar las cartas que completan cada poema."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Marine Petrosyan","title":"“Otomenosugatashibashitodomen?”38","lines":["(Mi abuela solía recitar los poemas de las cartas, y leía dos","veces nada más que “la segunda mitad” de los poemas; así","que ahora solo recuerdo la parte inferior de los poemas.)","El que levantó la mano pata peditme fue","un japonés que llevaba mucho tiempo en Melbourne,","el señor Tokita;","un hombre despreocupado","muy cultivado","llama a su mujer australiana cortésmente y cada mañana","prepara comida para llevar a sus hijos","-Es po
