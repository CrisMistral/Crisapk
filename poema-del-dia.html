sible que no me gusten las mujeres, pot eso...","Yo pensé que","le venía mejor","el epíteto “gentle” que a nadie.","38 Otomenosugatashibashitodomen”: la “parte inferior” del","poema del Bonzo Sojo, en una de las cartas más famosas de","Hyakunin Isshu; “El viento del cielo/ sople y acumule nubes/","para cerrar el pasillo celestial/ para que la bella doncella/ se","quede un poco más”.","A ver, ¿pot qué","se recitan Tanka dos veces?","¿pot qué dos veces”","Recitado dos veces, es más fácil entenderlo.","Recitado dos veces, te impresiona más.","La primera vez se va, pero con la segunda","empieza a vivit.","¡Uy!, una serpiente se me sale de la boca.","Cuando lo repites el Tiempo emerge en el poema Tanka","El tiempo Tanka, el tiempo emergente sube ondeando","y se lanza; mira, allí.","¿Por qué? recitado una vez, no ocutte nada.","La repetición es peligrosa; acelera el mundo","Matrimonio, fracaso...todas las experiencias","se clasifican en dos categorías:","o lo haces sólo una vez o lo repites más de una.","Es decir, si lo repites, quiere decir que lo haces más de una","vez.","La segunda vez iguala a la tercera y la cuarta","¿Qué quieres decir?","Si lo tecitas dos veces, aunque no lo repites más,","la tercera y la cuarta vez y su voz - ¿la voz de quién?","empiezan a sonar entoscándose.","La segunda vez es un espacio inmenso","que incluye todas las veces más grandes que la segunda.","Y un poema, todos los poemas viven en el mundo más de","[…]"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Marine Petrosyan","title":"La Caja","lines":["Una caja","una caja vacía","altura","longitud","profundidad","La profundidad es lo que","más importa a Tokio Kinbara.","Si es poco profunda no cabe nada, pero si lo es en","demasía, se ahogan las cosas.","-Meto algo en el fondo de la caja y de allí lo recojo.","Lo que importa es la sensación de distancia que siente la","mano al tomarlo.","Al ver una caja vacía Tokio se estremece.","Es una manía que tiene desde joven, incorregible.","Le encantan las cajas vacías, antes las coleccionaba","pero actualmente las hace con sus manos.","-Hago unas cajas tan profundas que no puedo dejar de","atisbar; es mi vicio.","Tokio, que casi nunca se arrepiente, algunas veces se pone","modesto.","Condiciones de buena caja:","1 Cuando se abre, ilumina la cara del que mira en un","instante","2 Es tan clara que en ninguna esquina hay sombra","3 No es demasiado grande ni pequeña","4 Está en su sitio sosegada","5 Sobre la tapa, vea la hoja adjunta (que no existe todavía)","Tokio fabrica cajas pot cajas.","El exterior tiene que ser rígido y firme.","El interior debe ser sorprendentemente delicado y fino.","La medida interior es el alma de la caja.","Cuando abre una caja Tokio Kinbara siempre oye un","gemido que se escapa.","Una caja","una caja vacía","altura","longitud","profundidad","La profundidad es lo que","ha obsesionado a Tokio Kinbara durante la vida.","-Contemplando una caja, se me ocurre la idea de meterlo","todo en ella.","La casa de Tokio está llena de cajas vacías.","A veces el cúmulo se derrumba y hace tuido.","Tokio recoge una de las cajas vacías","[…]"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Marine Petrosyan","title":"No Está Conmigo","lines":["No tengo límites","mientras a este pie se lo lleva el cáncer","este pecho ruge por la noche en busca de un botín que no","me deje dormir","esta mano me sorprende siempre que la afilo,","y es que mi amado no está conmigo para darme sosiego","lo único que poseo son los cadáveres que duermen en mi","interior."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Merci Too","title":"A Mi Hijo","lines":["Amo mi reloj azul, ese es mi color","el agua es azul, el agua es vida.","Si alguna vez se pone el sol al mediodía,","hijo, alrededor de tu muñeca usa un reloj azul","siempre simbolizará la vida.","El jazmín es mi perfume favorito","su olor es mi identidad.","Si alguna vez los cortes de energía te sumergen en la","oscuridad,","y andas a tientas solo en la oscuridad","hijo, solo huele el jazmín,","y sentirás mi presencia contigo.","Dondequiera que pise, me quedo más tiempo","y dejo que mis pies dejen huellas permanentes.","Si el granizo y las tormentas borran todas las huellas,","hijo, mira con atención el asfalto,","allí, no te perderás al ver la huella de mis pies.","Escribir es mi corazón","Al igual que tú, significa mucho para mí.","Si alguna vez te despiertas, pero no el sol,","niño, que no cunda el pánico; ve hacia mi obra,","allí, pacientemente esperándote,","serán nubes para guiarte de día y fuego de noche.","Una vez que duermas y estés solo en el mundo,","recuerda que amo leer,","disfruta de la libertad de mi biblioteca de la tierra al cielo.","Si es que alguna vez, todos los secretos que nunca llegué a","revelarte","hijo, no pierdas ni un guiño; solo ve a mi biblioteca,","todos mis marcadores hablan el mismo idioma","ese donde te espera tu papá."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Mia Gallegos","title":"Mia De Nadie","lines":["Mía Gallegos.","Mía de nadie. Mía de mí.","Sin una biografía.","Tierna. Casi ácida.","Con un destino trazado","y una cruz.","Mía Gallegos. Mía de nadie,","de nadie, nadie, nadie, nadie.","Aferrada a la ternura","como único pan que no consuela.","Mía de nadie. Mía de mí.","Sin aire. Umbría.","Deja que el tiempo pase.","Deja que la vida pase.","je","Deja que el amor pase.","Deja que la muerte pase.","Mía sin biografía y sin abuelo.","Sin un sitio.","Ni siquiera santa.","Ni siquiera puta.","Mía de mí."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Mia Leonin","title":"Mirada","lines":["En una casa junto al mar, las sombras de una tormenta","titilan en tu rostro.","Los vientos sacuden el vidtio.","Las alas batientes de una gaviota se ciernen sobre el mar.","Bajo la mesa, nuestra perra,","agazapada, tiembla.","Quizás es el estallido de un trueno o Papi","irrumpiendo por la puerta con pan fresco y manzanas.","Cualquiera sea la sorpresa tú, hija, no te asustas.","Miras más allá de la ventana y yo te miro a ti.","Pronto, puertas se abrirán y te llevarán hacia el orden de","E)","las cosas:","Temo la mirada de gavilán que podría tornarte en presa o","la mirada","que como dedos inquietos podría tocarte en las cuerdas de","una guitarra robada.","¿Será tu cuello tan exquisito y reemplazable como el de","María Antonieta?","Como la hermana de Mozart, ¿serás vista y no oída?","Las patas de los niños traducen pechos de miel en leche.","Una bandeja de plata pulida refracta el rostro de la","anfitriona en una mirada entornada.","Una rodilla doblada puede prensar el mosaico de tu sexo","en una naturaleza muetta.","Pero aquí, en una casa junto al mar, miras más allá de mí.","Miras","más allá del hogar, y lo que rebosa dentro de ti","te devuelve la mirada."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Mia Leonin","title":"Como Música","lines":["(Bagdad 2003)","Llueve bajo la copa del ciprés: tú fuiste esta voz,","este anhelo natural pot el agua — niña-hoja","esperando la lluvia, enroscada dentro del burka de tu","madre","muñecas ondulantes, cabellos ceceando al viento.","Cada mañana las regaderas de ensueño despertaban las","flores de grano,","cernidas desde los dedos de tu madre a la cacerola de metal","en su regazo.","Hasta que llegaban con sus truenos, rugidos, golpes","y temotes-","nubes blancas crepitantes, sandalias y tobillos explotando.","Alfombras y cuerpos de piel arrastrados”","al son de llantas, muerte metálica, acordes de Humvee.","Un tiachuelo de sangre desciende por tu quijadallevas uno de tus dedos a la altura de la oreja inclinando la","cabeza","cómo quien comienza la búsqueda pot ser escuchado."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Mia Leonin","title":"Un Cuatro De Julio.","lines":["Una voz se dispara como jabalina en mi radio.","Es la queja y jaleo, el tartamudeo","de mi padre tratando de hablar inglés.","I love this country. Su voz se arrastra","hacia el sentido de su densa,","cenagosa migración-","más allá de los coños de las mujeres que a él le parecía que","apestaban,","más allá de los pacientes a quienes recetó","thorazine, electroshocks y otras formas de perforar el cerebro","como remedios contra la soledad,","más allá de los niños de quien nadie se responsabilizó,","ahora cuarentones,","casi historias de éxito","quienes a veces lo escuchaban hablar a través de las","paredes.","Para cuando él haya terminado,","El paradise de este país se habrá marchitado en paraíso.","Claro que así será. Siempre ha sido así.","Todo esto en la radio","y Yo que nunca lo he conocido."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Mireille Ferrandez","title":"Ausencia","lines":["A mi madtina","Bajo el plátano despojado","revolotean las hojas muettas,","cuatro granadas olvidadas","en un cesto se cobijan.","Ya no sé el nombre de las rosas","que trepan sobre el pilar,","poco importan esas cosas,","en la escalera oigo tus pasos.","Abandonado patece el viejo pozo,","la noria está silenciosa","el viento sopla bajo la hojarasca","y hace llorar la piedra hueca.","Con las hojas de la motera,","alimentaba yo los gusanos de seda.","Todo eta entonces vida y alegría","en la escalera oigo tus pasos.","En el color sepia de una foto","algo busco de tu presencia","hilvanando mis palabras","pero nada logra colmar tu ausencia.","Cerrados quedan los azules postigos","huérfana la casa queda","también silencioso el reloj amigo","como el viento en la roqueda."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Mireille Ferrandez","title":"Buenos Aires, Mi Predilecto...","lines":["Al llegar la primavera, de despedida al invierno","en Buenos Aires florecen las jacarandas...","Me gustan las grandes cuencas, artebatadas al rio","donde en línea recta se extienden, color de rosa, los","depósitos de ladrillo","mientras los barcos, en los muelles descansan","al son de un bandoneón que llora un triste tango.","Me gustan las grúas de aceto, transformadas en estatuas","erguidas hacia los cielos, cual centinelas","dormidas, que suenan glorias perdidas:","sus descomunales brazos me parecen irreales.","En el tio de la Plata ha nacido la milonga,","canción de los inmigrantes, surgidos de los buques,","melodía que acuna los sueños","de jornaleros cautivos a la vez que desterrados.","Las chabolas de azul, rojo o verde, pintadas","disfrazan su miseria en un fraternal abrazo.","Los tanguistas hacen allí sus pinitos","y el alma de Carlos Gardel flota sobre el Rio de la Plata.","Me gusta el tio dorado, al sol poniente:","sobre las olas titilan miles de diamantes.","Cielo y mar se reúnen allá en el horizonte","donde para mi brillan todas las esperanzas.","Al llegar la primavera, de despedida al invierno,","En Buenos Aires florecen las jacatandas..."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Mireille Ferrandez","title":"El Número No Premiado","lines":["En las colinas azules, pasan cual un rayo","sobre esta enorme tumba, amatgos fantasmas.","Cuando yo pisoteo, a veces, las rojas","amapolas,","siempre recuerdo tus carretas pot esos oteros.","Allí una bomba se cierne, maldito sea de nuevo","el que, en Verdun, un día, dejó tu cuerpo desmembrado.","Y la blanca nieve que para ti solía ser tan bella,","te deparó un gran lecho mullido cual nido de golondrina.","Tiempo hace ya que esta inmunda trinchera","dejó sepultado todo cuanto en este mundo soñabas.","No, tú ya no creías al contemplar estas tumbas","que volverían los tiempos sin futores y sin bombas.","La plateada placa que colgaba de tu cuello","no te atribuía ningún número premiado.","En las colinas azules, pasan cual un rayo","sobre esta enorme tumba, amargos fantasmas."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Mireille Ferrandez","title":"Resurección","lines":["En cada día","echo en tu boca","una gota de mi lluvia","para acabar de aquí","y desaguarme en tu oleaje.","Cada Noche","mando a tu luna","la luz de mi estrella","para apagar aquí","y lucirme en tu ojos.","En cada sueño","siembro en tu pecho","latidos de mi corazón","para morir aquí","y rtenacerme en tu tierra."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Muna Kareem","title":"Ua Techuza Ciega","lines":["No quiero una sala llena de novatos.","No, quiero que se vacíe del resto,","pero yo sigo como la lechuza","que callaba","para escuchar a su voz.","Debo pensar como set rica","por muchas cosas.","Debo guardar aquellas piedras","que me saludan, carcajeándose,","por todo el camino.","El mozo pintado en mi blusa","rechaza subir conmigo a la buhardilla,","por eso estoy sola,","Ay","nO QUIErO,","¡Oh padre!","Más que castigarme,","mejor que tachemos todo lo que escribo ahora,","todo."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Neelam Saxena Chandra","title":"Encontrarte A Ti Misma","lines":["Siempre que pienses que te has perdido","deja que tu alma se bañe con agua","¡De los ríos del tiempo!","Si bañarse no ayuda,","que se empape","y si los esfuerzos","se vuelven inútiles,","que se ahogue.","En el seno del río,","encontraras los secretos","a un revitalizado tú;","Confidencias que se habían enterrado","sin saberlo e inesperadamente","¡Se abrirán como los pétalos de una flor!","No, ¡Nunca puedes perderte!","Cuando teapateces a orillas del río,","te redescubrirás una vez más,","tu espíritu se rejuvenecerá","Y de él será tallado","¡Un nuevo \"tú\"!"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Neus Bonet i Sala","title":"Sueños En El Despertar","lines":["Soledad ante la inmensidad del mar.","De la tierra. Del cielo.","Soledad contigo misma,","donde la imaginación discutre","hacia un viaje a un mundo paralelo.","¿Realidad o sueño?","Una conciencia durmiente en un corazón despierto.","Matices grises en el fondo blanco,","donde el negro no tiene cabida en ese corazón de luz.","Sola, sí, pero no sentimiento de soledad.","Donde la energía de las olas,","el rumor de mi querido mar","y las ramas de ese árbol mecidas por la brisa de invierno,","me hacen sentir viva y despierta","dentro de este sueño en blanco y negro.","(Mundos Paralelos, Badalona, agosto 2019)"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Nieves Chillón","title":"Espigadoras","lines":["Otras mujeres con un hijo","dentro pisaron esta tierra","hace décadas recogían las espigas","con su hijo y su saco","hace siglos recogían las espigas","con su hijo y su saco y la muerte","agachada también","cerrándoles el cuerpo","la muerte en el ceño","la muerte en el puchero","el perfil de la casa","en el saco de las espigas","triunfante."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Nieves Chillón","title":"Begijnhof*","lines":["Desde este jardín se abarca","la redondez del cielo","los árboles miden la diferente","estatura de nuestra fe","los cristales de las ventanas","parten por la mitad dos siglos","idénticos en la manera","de escuchar a los pájatos","“1 Los begihnhof medievales alojaban comunidades de mujeres","devotas,","tanto","religiosas","como","laicas,","que","no","estaban","comprometidas por votos de tipo monástico, y vivían de forma","autónoma, ya que no dependían de ninguna jerarquía religiosa","O laica.","y en el hambre furiosa de ser libres."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Nieves Chillón","title":"Poetas Musas","lines":["Hoy hemos renunciado a nuestro oficio","de inspirar sus poemas","renunciado a escucharles porque hoy","nos hemos dado cuenta de que mienten","en cuestiones de equidad y política, pero opinan","sobre la pertinencia de buscar compañera","muchísimo mejor que compañero de piso","hoy hemos renunciado a acompañarles como oficio","y también a los viejos amigos comunes","hoy hemos aprendido a caminar","en la penumbra a la que tanto temíamos","pues desde aquí se ve más claro","aunque haya que gritar también más alto","en la noche pastosa de la punzante","y luminosa libertad."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Padmaja Iyengar-Paddy","title":"Consumir Deseo","lines":["Consumir deseo","furioso como un fuego","envolviendo todo","traza su propio curso.","Consumit deseo","todo lo penetra","sobre el poder","sigue su propio camino.","Consumit deseo","cargando por delante","crudo y sin tregua","evade un final.","Consumir deseo","autodestructivo","quemaduras y escaldaduras","se niega a suavizarse.","Consumir deseo","llamativo y cegador","doloroso y rechinante","sigue su propio destino."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Paloma Fernández Gomá","title":"Campo Solidario","lines":["Este campo herido de batro","abre su vientre al desnudo viento","de las estaciones","y esgrime el mayor de los silencios,","llevándonos por derroteros insospechados,","al cimbrearse con el llanto de los niños,","y acumular el eco que dejan las palabras,","en el vacío de la incertidumbre,","al terminar cada noche.","Vivimos una eta nueva de traslaciones,","de mareas que agitan la conciencia","y buscan el calor de la lumbre.","Se necesita una mirada abierta","al abismo que nos rodea.","Las raíces del monte palpitan","de frío extremo,","en sus venas claudicó la esperanza.","Es hora de un tiempo inédito","que albergue la sal y el cilantro","donde se comparta el pan","bajo la lluvia","y la voz siembre nuevas cosechas","para que la palabra se extienda","en plenitud, por todo el orbe","y el agua fertilice la sementera","con sus gotas más antiguas","hasta cicatrizar las heridas del lamento","o extinguir las lágrimas del caos.","Necesitamos una esperanza renovada","sin matices de color","que abrace a todos los hombres."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Paloma Fernández Gomá","title":"Hijos De La Duda","lines":["En el resquicio de la mirada","se derrite la cera de una rosa","incubada en el peligro","donde permanece la andadura","del tiempo.","Hacia dónde caminan los ademanes","y la oscura soledad del limbo,","transitada por manos encallecidas","de sangre recién indultada.","De las umbelas nacieron brotes de sudot","y una herencia extensa y sombría","que conduce al encuentro de un pueblo","deportado, entre rosas de cera."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Paloma Fernández Gomá","title":"Promesa","lines":["El limo cubrirá nuestros días","y las hojas dibujarán nuestro camino","hacia la ruta de las estrellas","que precipitan nuestro tiempo:","Seamos leales ante nuestras conciencias","para crear un mundo de cosecha permanente.","Besat el viento, ceñirse la túnica del mirto","y extraer de la tierra su germen de vida","será condición necesaria","para dejar a nuestros herederos","una estela de Paz,","donde todos los hombres encuentren su voz.","Pascale Lora Schyns (Bélgica)","Nació en Bélgica. Según ella se define a sí misma como:","Erase una vez una niña que soñaba con ser una ranita azul y dorada.","Gracias a sus saltos pasaría de una ciudad a otra, de un país a otro.","Una ranita libre y ágil capaz de escapar a todas las trampas, a todas","las redes. Una ranita que conocería a los seres más raros y","extraordinarios. La niña creció un poco más de la cuenta para","emprender sus peregrinaciones completamente desapercibida — claro a","la ranita le hubiera gustado jugar al hombre invisible sin embargo, se","puso en marcha para realizar sus sueños. Y es así que miró, escuchó,","descubrió y aprendió muchísimas cosas. Y sigue haciéndolo.","Viajar al interior de las personas, conocer mundos nuevos y","reinventarlos, eso es el universo de Pascale Lora Schyns,","escritora, periodista y traductora belga nacida en 1964, Es","la autora de 13 libros publicados en francés, inglés y español.","Es miembro de la Asociación Real de los Escritores Belgas.","El miedo de vivit muerto","quita al sueño sus latidos silenciosos","El hielo sangra lágrimas de fuego","cuando lloran las diosas","Almas gemelas","compatibilidad sinónimo de rechazo.","Los sollozos desaparecen","a medida que se entumecen las siluetas.","El abrazo devora el tormento","trae la copa a sus labios","rompe sus muslos.","Descargas eléctricas","en el horno de fuego pestilente","del tirano y sus acólitos.","Ranita descuartizada","ofrecida a la demencia feroz.","Gula bestial","[…]"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Paloma Fernández Gomá","title":"Delitos Unívocos","lines":["Tropiezan las mujeres de plata","vitrioladas","Puertas de hierro","quebrantadas por la ranura del sótano","Rebelión tardía","frente a la supremacía de los perfiles","Estragos en cámara lenta","Adornos de ópalo","en el cuello anguloso de las horas.","Sil]","Aglutinación abyecta","Hay que castigar el inconforme","Susutros precavidos","Desfloración dantesca","Insolencias inmundas","Imposible simulación","Y llega la penitencia","Maltratos en el serrallo","(Madrid, diciembre de 2014)"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Pilar Quirosa-Cheyrouze","title":"Olas","lines":["No se acaban tus ojos; son los otros los ciegos.","Carmen Conde","A veces yo te buscaba entre bajeles de tiempo,","proceloso mar oscuto, anunciador de vigías,","horizontes desbordados","por otras pautas ya olvidadas.","Posible reencuentro","en los límites del crepúsculo,","cuando retozaban las aves","y nacía, estremecida, la amapola.","Mientras olas placenteras sugerían","servil canto que amainata","el desorden del gemido.","Yo me tefugiaba así, de la tormenta,","en la cueva de mi cuetpo,","cubierto de semen y de algas.","Y jugaba, desde tu pecho hacia el mío,","buscando dólmenes y otras lunas,","azatosa juventud primera.","Y me asombré llamándote Ulises","al regreso de tus manos, como si necesitáramos","de una luz que iluminara el trayecto.","Como si importara más un acento,","la intensidad del orgasmo, que nuestra propia derrota.","Te presentí y te sentí extranjero","en un mundo de promesas y temidos soles.","Te nombré con la sonotidad del eco,","cuando descubrimos la falacia de la noche.","Centelleaba, al fondo, el mar,","catarata de esperma y de espuma.","Niquelaba una esfera","en lo más alto del faro.","Y así quedó, junto al pinar y los juegos,","nuestro lecho de peligros, la sombra del espliego,","el bautismo encendido y el naufragio hecho silencio.","Y me vacié de nuevo,","gritando al infinito nuestra pasión postrera.","Y me llamaste Helena,","y me sentí guerrera. Y me llamaste Claudia,","y culminó el placer de los dioses.","Y me llamaste Cassandra, y presagié nuestro destino.","Y me nombraste Lidia, Náyade y Penélope, y también Iris,","y Fátima y Yasmina, todavía lo recuerdo.","Y después de que mordieras mi pezón,","madura fruta del tiempo, fui Cósima, Atalanta y Drusila.","[…]"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Pilar Quirosa-Cheyrouze","title":"Hypatia","lines":["Entre las sombras","yo he buscado","ese momento imposible,","el vago hechizo","de unos signos que traduzcan","insondables respuestas.","He acariciado día y noche","el frágil destello del conocimiento,","he buscado y he espetado, sí,","en los reflejos grises de la duda.","Yo, Hypatia de Alejandría,","amada por los dioses,","entregada para siempre","a los designios del tiempo.","Manejada pot los hilos","de un presente que me es ajeno,","conducida hacia presagios del destino.","Aún vive en mí la pulsión","de otros días, cuando el cosmos","era horizonte, cuando amanecía","una esfera de luz sobre las cosas.","Pero he errado, sí, al no encontrar las claves","del pensamiento ignoto, el traducido","por la bondad de los hombres,","porque todo era catarsis de soledad y espejismo.","Y ya no temo a la muette,","y deseo que atribe, cuanto antes,","para unirme al sueño eterno,","que me traslade para siempre","a los confines del Universo.","Porque esta es la hora,","así lo han querido los astros,","es el instante de dilapidar un sentimiento."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Pilar Quirosa-Cheyrouze","title":"De Ámbar Y Almizcle","lines":["Apareció, exhalando aromas de sándalo,","al doblar la cintura por el esbelto talle.","¡Cuántas veces me sirvió, aquella oscura noche,","en agua cristalizada, rosas líquidas!","Al-Mu tamid. Siglo XI","Otrota encontraste","espacios gestados con sílabas de luz,","instantes tevividos","más allá de la memoria.","Vigilabas la hoguera","en propuesta de sol,","mientras Yasmina, solícita,","acudía para adecentar la mesa,","donde esperaban, suculentas,","las viandas y las tosas.","Otrora también, hoy recuerdo,","escanciabas el vino","y te mirabas en sus ojos,","henchidos de alegría.","Era el sabor de otro tiempo,","cuando los fogones respiraban","olor a yerbabuena y eneldo,","mientras degustábais","rellenos alcanciles","y tiernas promesas.","Las sábanas expandían","gotas de azahar en la piel,","la más leve, la más dulce","para tus labios.","Dulzainas y rabeles","acompañaban las horas del gozo,","hábil regate al sueño, fértil deseo","desde el mirador de la aurora.","Acaticiabas un tiempo","esplendoroso en el viaje, unido a su cintura,","traspasando planos, crecidos en la hoguera","que unía, ya vencidas, vuestras sombras.","Aquel dulce de almendra y miel","fusionado al calor de su mano,","mientras en la tuya crecía","el olor a canela y cilantro,","confituras cubiertas de alcorza.","Y ella, Jasrina, acrecentaba en el vientre","la danza que evidenciaba el futuro,","que era mucho más vetaz,","[…]"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Raquel Lanseros","title":"La Mujer Que Reza","lines":["La anciana ha colocado","las flores sobre el borde del camino.","[Es una tarde roja y esto es cualquier lugar.]","El luto difumina","las cruces negras como un túnel sin fondo.","Recuerdo los cerezos lamiendo mansamente","la piedra ahogada en líquenes","de las tapias cansadas.","Mientras, la veo movetse.","Tiene manos inquietas de venas abultadas.","Mutmutra sin cesar una antigua plegaria","-perdónanos, Señor, nuestras ofensas,","tiñendo de esperanza","el silencio desierto de la tarde.","Parsimoniosamente va arrancando","con una fuerza inusual para sus años","las malas hierbas, los matojos silvestres","que salpican de olvido la pobre sepultura.","La suave brisa baila con las hojas.","[Es una tarde roja, amarilla, celeste","y esto es cualquier lugar.","El sol resbala lento hacia el ocaso.","De pie contra la luz agonizante,","yo la sigo observando","acariciar despacio la tumba desvalida.","El tiempo desmayado no es más que una advertencia."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Raquel Lanseros","title":"Orieta","lines":["Maestra nacional","(1919-1945)","Los niños corren y saltan a la comba.","Beatriz Orieta pasea junto a Dante","sorteando los pupitres","[en medio del camino de la vida...).","Tiene litros de frío mojándole la espalda.","Apenas pueden nada contra él","los mísetos tizones del brasero oxidado.","Entran al aula los gritos infantiles,","huelen a tos y a hambre.","Algunas veces,","Beatriz Orieta casi no contiene","las ganas de llorar","y mira las caritas sucias afanándose","en recordar las tildes de las palabras llanas.","Prosigue Dante todo el día musitando","en el oído de Beatriz Orieta","[...amor que mueve el sol y las estrellas).","Ella siente de veras","que otro mundo la mira","al lado de este mundo gris y parco.","Contra el lejano sol","del lejano crepúsculo","dos amantes se miran a los ojos.","Beatriz Orieta está","apoyada en su hombro.","Los álamos susurran las palabras de Dante.","Los amantes son túneles de luz","a través de la niebla.","Los besos, amapolas","de un cuadro de Van Gogh.","Pasa el invierno lento como pasa un poema.","Pasan el frío andrajoso, la fiebre y el esputo","y toman posesión del blanco cuerpo","igual que las hormigas invadiendo","esas migas de pan abandonadas.","Sesenta años después, entre las ruinas verdes","leo un descanse en paz envejecido","sobre la tumba de Beatriz Orieta.","El silencio es de mármol.","El silencio","es la respuesta de todas las preguntas.","Unos metros más lejos, hace sólo dos años","yace también el hombre","[…]"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Rita Taborda Duarte","title":"Las Madres","lines":["Madre 1","Filhos náo te sáo nada, carne","da tua came sáo 0s poemas","que escreveste contra tudo","Herberto Helder","Nunca asumo la maternidad de los versos","ni de aquellos que me caen","rechazados del poema","A esos","los aparto aún en sangre","cortado el cordón a golpe de cuchillo","Palabras no me son nada: sólo sobras","las dejo en la cuneta en abandono puto","sin remordimiento, como si fueran","- son -","la lámina de piel endurecida","y seca amatilleando al sol. Y yo,","cobra,","apartando los desperdicios del cuerpo,","y lamiendo las heridas para avivar la sal en la carne.","Sólo mi sangre es realmente sangre de mi sangre.","Poemas no me son hijos: renuncio","al verso incluso mal parido","sin saber si está muerto O vivo.","Y nunca me acordé","siquiera","de volver atrás","para dejarle una mirada de despedida."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Rita Taborda Duarte","title":"Madre Iii","lines":["Son las madres:","traen el cuerpo entero en la gravedad de los pechos,","piernas como raíces escarbando la tierra","en busca del leño verde de la infancia.","Las madres son las obreras de los hijos","- versos no les son nada Disputan los huesos a la nostalgia, parten","a golpes el catozo herido, lo abren","y sorben el verdor amargo de las canciones de cuna","- versos no les son nada -","Traen los vientres ubérrimos de los poemas","que murieron Las madres","perpetuamente embarazadas","de los hijos que partieron de los frutos","que partieron","cargan una piedra desgastada y vieja","secándose en el útero","Las madres llevan el útero","en el lugar del corazón."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Rosa Díaz","title":"De La Que Salió De La Ciduad Santa","lines":["Escucha sus palabras porque el Níger es más que un","enigma","cuando lo empuja el Hatmattan,","el viento empolvado del desierto, suspendido en la Torre","del Agua,","en el ocaso púrpura de la mezquita de Djingareyber.","Vino el oro del sur y la sal del norte, las monedas, del país","de los blancos;","pero los cuentos estaban escondidos en la Ciudad Santa de","Tombuctú.","Allí tenía los pies, cuando cogió el lio de trapo, que era el","llanto de la niña,","y anduvo por el anochecer con la vía láctea hacia otro","porvenir.","Dejó atrás la Madraza de Sankotre y la de Sidi Yahya,","la ancianidad de sus padres, el mísero ajuar y el hoyo de su","cuerpo sobre la estera.","Cogió a la niña, y su miedo la siguió por los campamentos","de refugiados,","por las colas de la sed, por las mafias, por los nómadas del","pastoreo,","por los hombres azules o por los que abusan del Santo","Corán.","Considera su lamento porque a punto está de sucumbir y","tiene un hermoso nombre,","claro como su alma en su primera amanecida.","Su piel viene a ser como el polvo de la canela, su","dentadura,","como la nieve en la quebrada sin mácula de sol. ¿No","querrás verla","en los polígonos industriales, explotada por un proxeneta","en los asientos de atrás?","¿No quettás vetla, ahíta de los miserables de la","elobalización,","los que ponen todas sus neuronas y toda su indignidad en","el glande? ¿Tú no querrás?","Pero la niña llora sin saber por qué. Es un ruidito a","corazón abierto.","Llora como enfermedad yes también como un nublado","2CuOso,","una flor triste que empujan los muertos hacía afuera.","Llora el retortijón en el estómago, la denuncia, la falta,","la calamidad de la leche de las mujeres en las patéticas","cuarentenas.","¿De dónde viene la minúscula sangre de la niña, si no es de","[…]"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Rosa Díaz","title":"De Los Caminos Exraviados","lines":["Yo no trafico con atmas, yo no soy terrorista ni me lucro","con la beligerancia.","Le tomé cariño a Ana Frank. Pasé por sus páginas. Repasé","la historia.","Maldije a Hitler y al arcediano de Écija.","Estuve en el muro de las lamentaciones. Llegué al","cementerio de Praga.","Al gueto de Cracovia. Al miedo de Auschwitz. A la calle","Levíes de mi ciudad.","Ahora no sé si parecerá extraño que recuerde la guerra de","los “Seis días” como un extravío,","como la visión tuerta de un parche imposible sobre una","franja oscuta.","Por ese extravío veo pasar los ojos cerrados de los niños","y el dolor de sus padres cuando los llevan a las sepulturas.","Arrasados sus hogares y sus guarderías la ruina de sus","enseres entra en mi casa","y mi sofá se llena de angustia, y un ínfimo juguete junto a","la sangre","cruza la frontera que hay entre la paz y el terror.","Luego miro el poblado de abuelos, de hijos, de muchachas","en edad,","de mujeres que no saben dónde han puesto sus manos.","La cachatrería que movilizaban cuando daban a su prole de","comer se ve en los escombros,","y entre los escombros la almohada de los sueños.","¿Dónde estará la herida que montó en la ambulancia?","La herida tenía ojos, iba en un cuerpo ¿dónde está?","Porque una niña espera en una cola de no sé qué. Con su","botella de plástico espera","como si alguien le hubiera indicado estate quietecita aquí y","aquí es el infierno,","y en ese infierno sigue esperando a esa herida que tenía","besos y palabras en la boca.","Espera, y yo la veo tan cetca,","tan aquí mismo con la tristeza instalada como susto de","cada día,","que el reportaje de su carne traspasa mi ámbito de familia y","es como si esperara","dentro de mí o conmigo dentto, y ambas no sabemos qué","hacer.","Quizás ya no tenga a nadie que le abroche el vestido","empolvado que lleva.","Nadie que alise el oblongo cabello, que ponga compostura,","alimento a su existir.","[…]"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Rosa Díaz","title":"De La Mujer Que Duerme","lines":["Sonrió con incredulidad,","como Sara cuando vio pasar el vaticinio de su","alumbramiento","delante de su tienda.","Se había relajado en los afeites. Guardó el óleo de la mitra.","Dejó de ponerse la alheña en el pelo","y de separar las piernas para el que envejeció.","¡El que llegaba ahora, era tan mayor y tan comprometido","cuando la vida los hizo coincidir,","que ella rechazó sus ojos y dobló su recuerdo. ..!","Se enteró de su muerte","cuando el hombre santo dijo su nombre","y vio pasar llorando a todas las mujeres de su casa.","Quizás por eso sonrió incrédula, o tal vez sería","porque él regresaba desde su mejor edad:","Le cosió los","besos en sus labios,","la condujo a la casa de sus padres,","a la cama donde su madre lo vino a concebit.","Separó su vestido, sintió la prisa de su corazón,","succionó el grano dulce de sus frutas,","agitó el pistilo de la escondida orquídea de su sexo.","Hizo rebozar el pozo de la carestía, propició el arcano","y entró al sendero como ave en el nido,","como pez en el agua nadando a lo profundo;","balanceándose,","huyendo,","contaminándola con su cadencia","hasta el golpeteo de los relámpagos y los rayos,","hasta la rendición del último gemido.","Ese)","A la mujer que no tiñe su pelo con alheña","y luce su edad como una joya,","la cubrió el guardado en los pabellones de la muerte,","el que oculta el tiempo en otro tiempo, y en el sueño","encuentra lo que no tiene fin.","Tomó en prenda su manto y se lo devolvió al amanecer.","Y dormida la dejó sin rompetrla ni mancharla:","Limpia su","alma,","limpia la sábana de su ajuar."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Sofía Diadié González","title":"Rojo En Konya","lines":["52 el amado resplandece como el sol","Como un átomo la amante ha de girar","Cuando sopla el céfero del amor","Cada rama aún viva se ha de agitar","Rumi!","Un lugar es tan sólo un lugar. Ese levitar divino en","una mezquita, en una iglesia, una sinagoga o un templo es","la vibración del Creador dentro de nosotros: amante y","amado en unión, para siempre enramados como el","trenzado de nuestros genes.","Por el sendero del deseo, sabios y necios son lo"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Sofía Diadié González","title":"Dúsimo","lines":["En los caminos del amor, amgos y","extraños son lo 1357720","Aquellos a los que se ha dado el vino de la unión","con el amado","En su fe, la Casa de Dios y los ídolos del","templo se vuelven lo 7101570","Rumi?","Así fue como entré en cada mezquita: con un cuerpo","cubierto y un alma desnuda. Rezo dentro de mis ojos, en la","caverna de mi propio ser. Pronuncio palabras sin ayuda del","EM","aliento, creo pensamientos con mi espíritu, no me inclino","ante nadie salvo ante aquello que me ayude a encajar en el","corazón de la humanidad.","A veces oculto y a veces revelado soy","A veces Musulmán, Cristiano o Judío","Para que mi corazón encaje en cada corazón","Cada día alguien totalmente nuevo soy","Rumi?","Pero los espacios abiertos están reservados para","hombres. Sólo hombres.","Tarareo plegarias en un susurro, bajo cada","cautivadora cúpula de cada mezquita, entre su delicada","belleza, entre las almas de artistas que brindaron ojos,","espaldas, manos y almas a su grandeza.","Las mujeres deben hacinarse tras cuerdas y muros","de madera, en los márgenes, al otro lado, como esclavas,","cubiertas de pies a cabeza. Se arrodillan unas junto a otras,","se levantan orando. Me aplastan entre los almohadones de","sus caderas.","Los hombres rezan en libertad, directamente bajo","la cúpula. Los observo con una sensación de disonancia.","Esto espolea esa peligrosa parte de mí a la que llamo","ROJO, potque es roja: la mujer rebelde que me esfuerzo","en mantener bajo control.","En la tumba de Shams- Tabrizi,","la alfombra hecha a máquina","de una pared a otra de la mezquita, es roja.","Rompo las reglas, evito la sección de las","mujeres tras la cuerda, alejada y negra,","al margen, me siento con la espalda contra","la pared","bajo una gran placa enmarcada con Su","nombre,","la caligrafía como los largos dedos","[…]"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Varsha Das","title":"Horizonte","lines":["El fin de la tierra","donde se encuentra con el cielo,","aunque ambos son infinitos","convetgen en una franja,","¿Qué tipo de cita es esta?","La línea llamada horizonte","está ahí, ¡y no está ahí!","Amanecer y atardecer diario","hacen la tierra y el cielo","¡Pan colorido y divino!","El tramo de la línea es desconcertante.","Se desvanece por la noche y","reaparece en el crepúsculo de la mañana.","Como deseos humanos","que suben y bajan.","Como las olas del océano","turbulento, pero tranquilo.","¡Como mis horizontes interior y exterior!"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Virginia Fernández Collado","title":"Semanal","lines":["en","la sección","de","opinión","“Cartas8zColaboradores”. Así mismo en El diario urbano en","Santiago de Chile y en Quillota (Chile). Ha colaborado en la","revista Axarquía. Algunos de sus poemas aparecen en libros","conjuntos como Antología del poeta y artista virtual (Ediciones","Monsieur James, Quebec-Canadá, 2010); Antología del Poeta","Virtual (PR Ediciones, Madrid, 2010); Un poema a Pablo","Neruda. Homenaje (Edición a cargo de Alfredo Asís, Chile,","2010). Lo demás es oscuridad (Coordinadores Pilar QuirogaCheyrouze y Mario Sanz, 2013), Izbertad tras las rejas","(Coordinador Toño Jerez, 2013) y La honda presencia, 20","poetas al encuentro de Antonio López (Mar de plástico, 2013),","entre otros. Ha publicado el poemario Depredador (Oficina","ediciones, 2015) y Poemas 2006-2016 (Ed. Del Genal y","Fundación Fondo Kati). Bosque (Fondo Kati, 2020), Forest","(Fondo Kati, 2020), Guía ddiáctica para preparación de","programación didáctica, (Fondo Kati, 2020). Ha recibido el 1?","Premio (modalidad poesía) en el XIII Certamen de Creación","Joven, Ciudad de Almería en 2011."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Virginia Fernández Collado","title":"La Tristeza De Dono","lines":["La tristeza es una cosa que se siente, aquí","Maite Dono","El hombre huye asustado con un traje de buzo","mientras tiene miedo a la enfermedad.","Si se emborracha, después","viene la tristeza.","Si ama, después","viene la tristeza.","Amar es más difícil que perseguir a una bandada de pájaros","pero yo amo.","Yo no siento la tristeza como Dono,","ya no siento la tristeza, aquí.","Todos están solos,","todos están locos,","los amados son como los pájaros","y no voy a entrar en esa espiral.","Amo la luz y el color del cielo,","me gusta cómo huele el mar,","quiero aspirar el olor de tu pelo,","eso es tan bello,","eso es entrar en la espiral.","Tumbatse en la arena,","evaporarse y desaparecer, no lo es."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Virginia Fernández Collado","title":"Vi-Polar","lines":["1.no hay escapatoria a la piel","2.aunque la derrota diga: No lo hagas","3.no he querido mirar al despedirme","4.no lo teconoceré","peto...","5.en la despedida","6.no hay árboles","7.ni párpados","8.no hay lenguas ni ojos","10. y es como la crueldad cuando me deja con mi silencio","11.sabiendo que el amor nos destrozará","12. en la muerte tranquila y púrpura del amanecer."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Virginia Fernández Collado","title":"Calle Niños Luchando","lines":["Le he petdido el miedo a la calle Niños Luchando","al escribir esto recuerdo la escultura del pájaro niño","no es la primera vez que escribo sobre la escultura","ni sobre nuestro mundo inocente.","Guardo tu saliva en mis sueños","como árboles llenos de palabras y cuchillas","esto es difícil,","el tiempo no se escribe en los poemas,","el tiempo no debería existir en los poemas,","ellos son para el viento pequeños meteoritos.","Desde hace poco los bosques","escriben mi destino","al decir esto siento el invierno","muy frío metido en el pecho."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Watitwa Ruth Sylvia","title":"Mujer De Los Bazares","lines":["Fuerte es la mujer que se levantó de la multitud","y desempolvó su vestido. Después de que su corazón fue","estafado","se enfrió, pero se calentó y amplió su sonrisa.","Aprendió a disfrutar de su propia compañía en el borde del","balcón.","Ahora ella respira de nuevo; \"Inhala, exhala y tiene mucho","sentido\"","Meses atrás sintió un dolor tan agudo en su alma y cuerpo","Su mente fortalecida, ella lleva el dolor sin una lágrima.","Ella ha conocido el tipo de dolor más agudo, que viene","con insomnio","Noches y copas de sabor hibernado. Ella está entumecida","por el dolor.","Ajusta la corona y agarra su bolso. 'No esta vez'","Fuerte es esta nueva mujer que no busca","O espera la validación física y emocional masculina más.","No se puede suponer, pero no presta atención a los","destructores,","Peligrosamente segura e irresistiblemente hermosa es su","presencia.","Ella está vestida de amor espiritual alimentado por un","espíritu que arde en llamas.","Fuerte es la mujer, los hombres levantan la cabeza, algunos","asienten de acuerdo","\"Ella es imparable\", te mueves con ella o allanas el camino","para su ascenso.","Un luchador y perdedor no es conocido por ella, sus","batallas son pocas.","Su voz ronca domina la autoridad y tira de cada oído.","Esa es la mujer en la que se convirtió después de la","injusticia de la vida.","No. La vida no es injusta; juegas las cartas con un ganador","o una mente entrenada. No. La gente no es abusiva, es lo","que permites","enséñales cómo tratarte. Ella es la \"mujer de los bazares\"","En casa, es la madre más amable, su tierna y amorosa","crianza es su vocación.","Los golpes de la vida le trajeron grandeza. La fortuna a","través del trabajo tras trabajo."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Watitwa Ruth Sylvia","title":"Lo Suficiente","lines":["Rojas","han sido mis rosas, este año","llena es mi cosecha","¿Por qué no pasas por aquí","para entregarte mis granos?","Pezón tras pezón","¿Cuántos brazos deseas que tenga?","Para abrazarte lo suficientemente","yo","el refinado árbol de granadas."],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Zingonia Zingone","title":"Los Primeros Dolores De Parto","lines":["cayó","el último tabique","sobre los restos del otoño","desgarrados los niños","siguen jugando a la cuerda","vieja sábana entollada—","y el médico zutce la manta herida","entre las manchas del desagúe","fuerte como la muerte","el amor de las madres","que dieron a luz la huella","de este dolor","cayó la teja","que estalla en el aire y cotona la tierta","juntando los bordes de una zanja","cobijando a la bella rosa de Siria","dormida en su lecho de sangre","levántate amot","de los escombros","levántate","en la mirada del cielo","que amando genera","levántate"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Zingonia Zingone","title":"Mi Cántico","lines":["Ámame de ese amor que te ama,","no del mío tan imperfecto,","de aquella luz que atraviesa tus ojos","y recoge las llamas","en el temblor de una sonrisa.","Ámame","sin que me de cuenta","con la insistencia del latido","crece","nutriendo mi linfa","como taíz tierra agua, y brilla","sobre las hojas de mi incertidumbre,","terso como cada respiro.","No le hagas caso a mis tonterías,","recoge del día","este puñado de arcilla,","y enciéndela","con ese amor que te ama;","plasma un gorrión","y déjalo volar","cerca de tus pensamientos","cuando la soledad se asoma","y amenaza la penumbra con sus misterios,","me posaré sobre tu mesa de noche","quieta, a velar","como hacen las madres sobre sus niños,","sabes, ellas también","aman de ese amor que las anima,","no del mío tan imperfecto,","y volaré entre los sueños,","en el pico","el cielo de tu despertar.","CPSIA information can be obtained","at www.ICGtesting.com","Printed in the USA","LVHW030100171221","706396LV00004B/688","mbr”","(España) Ayo Ayoola-Amale","España),","Isabel","Katariina","Romera","Vuorinen","(Italia), María Ramos","[…]"],"src":"Poesía femenina contemporánea","pri":1},{"poet":"Akiko Yosano","title":"Tankas","lines":["Sin conocer","la sangre ardiente","de un cuerpo tierno,","¿no te sentirás solo,","tú que predicas el camino?"],"src":"Japón","pri":0},{"poet":"Akiko Yosano","title":"No Te Mueras","lines":["La primavera es fugaz.","¿Qué me importa una vida inmortal?","Toqué","con las manos","mis senos abundantes."],"src":"Japón","pri":0},{"poet":"Akiko Yosano","title":"Tankas","lines":["En Kamakura","aunque sea un Buda","Shakyamuni","[1]","es guapo.","Una arboleda de verano."],"src":"Japón","pri":0},{"poet":"Akiko Yosano","title":"Tankas","lines":["Hacia Kiyomizu","[2]","la noche de luna y de cerezo","atravesaba Guion","[3]",".","Toda la gente bajo la luna","¡Se veía tan hermosa!"],"src":"Japón","pri":0},{"poet":"Akiko Yosano","title":"Tankas","lines":["La joven veinteañera.","Fluye entre los dientes del peine","su cabellera negra.","La ostentosa juventud,","¡oh, maravilla!"],"src":"Japón","pri":0},{"poet":"Akiko Yosano","title":"Tankas","lines":["Ay, hermano, lloro por ti,","no te mueras.","Tú que naciste el menor de la familia,","el cariño de tus padres superaba todo,","mas ¿acaso ellos te han educado para matar a la gente","haciéndote empuñar una espada?","¿Te han criado hasta los veinticuatro años","para que mueras después de matar a la gente?","Eres el dueño de una tienda tradicional","de un comerciante de la ciudad de Sakai.","Eres el heredero del nombre de tu padre.","No te mueras.","¿Qué te importa si el Castillo de Puerto Arturo","cae o no cae?","Sólo conoces las costumbres de una familia de mercaderes.","No te mueras.","El Emperador nunca aparecerá en el campo de batalla.","“Que mueran como bestias,","que derramen mutuamente sangre humana,","que es el honor del hombre el morir”","¿Pensará así el Emperador?","No creo, pues tiene una benevolencia profunda.","Ay, hermano,","no te mueras en el campo de batalla.","A tu madre que había perdido al esposo","le han quitado a su hijo","en medio del llanto sin misericordia","el otoño pasado.","Ella mantiene a su familia y","mientras se habla de la paz nacional","aumentan las canas de su cabello.","¿Acaso te has olvidado","de tu mujer joven y frágil","que a la sombra de la cortina","llora inclinada,","con quien no has vivido ni diez meses?","Piensa en el dolor de la joven.","Ay, ¿en quién podría ella apoyarse","sino en ti, el único en este mundo para ella.","Tú no te mueras."],"src":"Japón","pri":0},{"poet":"Hakushu Kitahara","title":"Sen Rikyu [4]","lines":["Sen Rikyu amaba el té","porque le complacía el espíritu del té.","Alma tranquila y noble del amanecer y del atardecer.","El humo era más amado aún que el té.","Mantener la sutileza en la apariencia","equivale a purificar el alma con sutileza.","Por eso Rikyu permanecía sentado","y le sonreía al sol tenue bajo el pabellón de té."],"src":"Japón","pri":0},{"poet":"Hakushu Kitahara","title":"Palma De La Mano","lines":["En la palma de mi mano reluciente","está un Buda de Oro.","De mi alma reluciente","desapareció el Buda en un parpadeo.","Volteando la palma de mi mano reluciente","busqué al Buda todo el día."],"src":"Japón","pri":0},{"poet":"Hakushu Kitahara","title":"Impresión Del Crepúsculo","lines":["Delicia de los besos… murmullos…","Mas la sangre invisible gotea en el cielo","como el rugido de una bestia herida y agonizante.","¿Por qué duele tanto?","Ah, el color de la melodía crepuscular,","el silencioso resplandor.","Delicia de los besos… murmullos…"],"src":"Japón","pri":0},{"poet":"Hakushu Kitahara","title":"Fatiga","lines":["Ay, beso que vas aumentando en violencia,","melodía carnal…","De esa manera, el rostro de una bestia, pálido, fatigado,","ahora me contempla, fugaz, tan fugazmente,","y del otro lado de la ventana turbia me maldice, vacilando.","Oh, violín enloquecido que rechinas, oh, mis labios.","Un muro de arsénico quema mi cuerpo.","El sol de la tarde rebota en la pared."],"src":"Japón","pri":0},{"poet":"Takuboku Ishikawa","title":"Tankas","lines":["En una isla del Mar del Este","sobre la arena blanca de la playa","cansado de tanto llorar","me entretengo con un cangrejo."],"src":"Japón","pri":0},{"poet":"Takuboku Ishikawa","title":"Tankas","lines":["Por tu mejilla resbalaba una lágrima.","Sin secarla, me mostrabas un puñado de arena.","¡Imposible olvidarla!"],"src":"Japón","pri":0},{"poet":"Takuboku Ishikawa","title":"Tankas","lines":["Esta duna","que la tormenta de una noche","construyó;","¿tumba de quién será?"],"src":"Japón","pri":0},{"poet":"Takuboku Ishikawa","title":"Tankas","lines":["Echado de bruces en la arena","hoy revivo aquel dolor","del primer amor."],"src":"Japón","pri":0},{"poet":"Takuboku Ishikawa","title":"Tankas","lines":["¡Ay el silencio de muerte","de la arena","que se cuela entre mis dedos!"],"src":"Japón","pri":0},{"poet":"Takuboku Ishikawa","title":"Tankas","lines":["Por juego, cargué a mi madre en la espalda","sin poder contener el llanto","ni avanzar más de tres pasos","¡pesaba tan poco!"],"src":"Japón","pri":0},{"poet":"Takuboku Ishikawa","title":"Tankas","lines":["La arena se encoge al chupar mis lágrimas;","¡qué cosa tan pesada una lágrima!","Cien veces escribo en la arena la letra","dai","[5]","y regreso a casa dejando","la idea de suicidarme."],"src":"Japón","pri":0},{"poet":"Takuboku Ishikawa","title":"Tankas","lines":["Salí huyendo:","quería llorar a solas","frente al vasto mar","por siete u ocho días."],"src":"Japón","pri":0},{"poet":"Takuboku Ishikawa","title":"Tankas","lines":["Lágrimas, lágrimas","¡Extraño!","Lavan mi corazón","y siento ganas de bromear."],"src":"Japón","pri":0},{"poet":"Sakutaro Haguiwara","title":"Muerte De Una Rana","lines":["Mataron a una rana,","los niños alzaron las manos formando un corro,","todos juntos,","alzaron pequeñitas","y ensangrentadas manos.","Salió la luna.","Encima del cerro se yergue una persona.","Hay un rostro debajo del sombrero."],"src":"Japón","pri":0},{"poet":"Sakutaro Haguiwara","title":"Piedad Amorosa","lines":["Sin duda, con tus dientes bellos y duros,","mujer, masticarás el verdor de hierbas.","Mujer,","con esta tinta de hierba verdegay,","el rostro te pintaré del todo,","te excitaré a la lujuria,","y nos divertiremos con juegos secretos a la sombra del follaje.","Mira,","aquí las campánulas mueven el cuello,","allá cimbrean los brazos las gencianas.","¡Oh!, abrazaré tu seno con firmeza.","Tú, tú me empujarás con toda fuerza el cuerpo.","Así, en medio de este campo desolado,","retocemos como dos culebras.","¡Oh!, yo, yo te acariciaré apretándote,","te mancharé la piel hermosa con el verde jugo de la hierba."],"src":"Japón","pri":0},{"poet":"Sakutaro Haguiwara","title":"Enamorado Del Enamoramiento","lines":["Con la boca pintada, yo","besé el tronco de un tierno abedul blanco.","Yo, por más guapo que sea,","no tengo pechos como pelotas.","Mi cutis no esparce la fragancia de polvos finos.","Soy un infeliz marchitado.","Ay, ¡qué hombre tan pobre!","En este campo de estío temprano aromado,","en la arboleda fulgurante,","me puse ajustados guantes de color del cielo.","Me puse en la cadera algo parecido a un corsé,","me enhariné la nunca con polvo.","Así coqueteando sigilosamente","como hacen las muchachas","incliné la cabeza levemente,","besé el tronco de un joven abedul blanco.","Pintada la boca con el color de las rosas","abracé al alto árbol blanco."],"src":"Japón","pri":0},{"poet":"Sakutaro Haguiwara","title":"Flauta Verde","lines":["En esta llanura crepuscular","indolentes caminan en procesión","los elefantes de orejas amplias.","En el viento se estremece una luna amarilla de atardecer.","Acá y allá flamean hojas de hierba como sombreros.","¿Se siente sola, Señorita?","He aquí una flauta cuyo son es de verde transparente.","Toque dulcemente una melodía.","Temblando en el cielo diáfano","invoque a su espejismo.","Desde aquel remoto mar de añoranza","lentamente se acerca una imagen.","Parece como un gato degollado que se tambalea","a la sombra de las yerbas de un camposanto.","¡Quisiera, en verdad, morirme en medio de","tal paisaje desolado de crepúsculo,","Señorita!"],"src":"Japón","pri":0},{"poet":"Sakutaro Haguiwara","title":"Caza De La Luciérnaga","lines":["Una, desde el escote de mi amada hermana","Una, desde la ventana de un hospital de leprosos","Una, desde el pozo del linaje","Una, desde los pies descalzos de Cristo","Una, desde el dorso de un pez","Una, desde el corazón de un homicida","Una, desde mis manos pulidas","En el lejano mundo nocturno cacé una luciérnaga."],"src":"Japón","pri":0},{"poet":"Mitsuharu Kaneko","title":"Paracaídas","lines":["Los paracaídas se despliegan","como un rosario","se enredan","como las flores marchitas de la correhuela.","Floto aislado enmedio del cielo azul","¡Ah, qué soledad!","Nubes donde se reúnen","los granizos","y el trueno,","Los quitasoles van flotando","por el cielo donde moran la luna y el arcoiris","¡Qué frágiles son!","¿Pero adónde se dirigen?","¿Hacia qué destino van?","Y ese vértigo con que van cayendo","¿qué significa?","¿De qué equivocación?"],"src":"Japón","pri":0},{"poet":"Mitsuharu Kaneko","title":"Paracaídas","lines":["Y esa tierra bajo mis pies ¿qué es?","… ¡Es mi patria!","Qué felicidad: ahí nací.","País heroico","desde la antigüedad de los antepasados.","País de mujeres fieles.","cáscaras de arroz, espinas de pescado,","risueñas hasta cuando se tiene hambre.","Disciplina.","Vestidos de humildes telas,","paisajes sentimentales.","Allí habitan mis amados compañeros con los que, más que nada,","puedo comunicarme perfectamente en nuestro idioma,","con quienes nos entendemos","hasta en lo profundo del significado del semblante.","Frente angosta, mirada concentrada, hombros esbeltos.","Los postes eléctricos están inundados.","Entre los aleros de paja","flamean las banderas del sol naciente.","Llueven las flores de cerezo.","Hay monumentos de piedra de vetas frescas","de valientes héroes.","Los aleros alineados de las personas decentes.","Banzai","[6]","Fuziyama de porcelana."],"src":"Japón","pri":0},{"poet":"Mitsuharu Kaneko","title":"Paracaídas","lines":["Mientras bajo, oscilante,","cierro los ojos","y rozo el dorso de mis pies y rezo:","“Oh, Dios,","por favor, no te equivoques,","condúceme a la deliciosa tierra, a mi patria.","No me lleves hacia el mar tirado por el viento.","Que no sea como una ensoñación que se desvanece como el viento,","la tierra, allá abajo.","Que no me acontezca la tragedia de no encontrar","en donde caer, aun si,","traicionado por la gravitación de la tierra,","cayera abajo”."],"src":"Japón","pri":0},{"poet":"Kenzi Miyazawa","title":"No Sucumbir Ala Lluvia","lines":["No sucumbir a la lluvia","No sucumbir al viento","No sucumbir a la nieve ni al calor del estío","Tener un cuerpo firme y sano","sin avaricia ni codicia","Sonreír siempre tranquilo","Nunca tener ira","comer cuatro tazas de arroz al día","y un poco de pasta de soya y legumbres.","No contar conmigo mismo","en ninguna ocasión","observar atentamente y comprender","Además, no olvidar","A la sombra de una arboleda de pinos en el campo","vivir en una choza de cañas","Si al este hay un niño enfermo","ir a cuidarlo","Si al oeste hay una madre fatigada","ayudarle cargando las gavillas de arroz","Si al sur hay una persona moribunda","decirle que no tenga miedo","Si al norte hay pendencias y acusaciones","decirles que cesen de hacerlo porque no es interesante","Si se presenta la sequía tener lágrimas en los ojos","y caminar perplejo y preocupado bajo el verano frío","Ser llamado ‘títere imbécil’ por la gente","sin nunca ser alabado","ni molesto","un hombre así","quisiera ser","Yo."],"src":"Japón","pri":0},{"poet":"Daigaku Horiguchi","title":"Arabesco","lines":["Iluminados por la luna","Pierrot, Pierrete","Danzaban. Pierrot, Pierrette.","Iluminados por la luna","Pierrot, Pierrette","Cantaban. Pierrot, Pierrette.","Danzaban, cantaban","Pierrot, Pierrette."],"src":"Japón","pri":0},{"poet":"Daigaku Horiguchi","title":"Noche Argentada","lines":["En la calle bañado por la luna","Taciturno, Pierrot se erguía.","La imagen pálida de Pierrot","¡Humedecida por los rayos de la luna!","A su alrededor echó en vano la mirada fija","buscando la sombra de colombina.","Y con desconsuelo infinito","¡se le saltaron las lágrimas!"],"src":"Japón","pri":0},{"poet":"Daigaku Horiguchi","title":"Pierrot Autumnal","lines":["Con tono plañidero, mi Pierrot","Canta: “¡Es otoño!”, “¡Es otoño!”.","Abriendo la boca en forma de “O”","Canta; “¡Es otoño!”, “¡Es otoño!”","La faz enharinada como la luna","Se le llena de lágrimas.","Su menester de payaso obliga a mi Pierrot","a esta pobre arlequinada.","Mas el otoño melancólico lo hiere de verdad","Y le arranca lágrimas sinceras."],"src":"Japón","pri":0},{"poet":"Daigaku Horiguchi","title":"Pierrot","lines":["¡Palidez de Pierrot! ¡Pena terrenal!","Pese a su brillante blancura","La faz de Pierrot era triste","Como rayo de Luna.","Pese a su brillante blancura","¡El rayo de luna era triste!"],"src":"Japón","pri":0},{"poet":"Daigaku Horiguchi","title":"Lamento De Pierrot","lines":["¿No es tu vida una aflicción, Pierrot?","¡Bastardo de la luna viuda!","Ella, en el alto cielo","Y tú, acá en la tierra","¡En esta faena tragicómica!"],"src":"Japón","pri":0},{"poet":"Daigaku Horiguchi","title":"Onomotopée [7]","lines":["La pared, el piso, el cielo","Y amante mía","Un poco de anatomía","Un mucho de secreción interna","Un mucho de secreción externa","Un poco de sonido carnal:","Pitto… pitto… pitto…"],"src":"Japón","pri":0},{"poet":"Chuya Nakahara","title":"Adiós De La Madrugada","lines":["Hemos de trabajar","hemos de discutir nuestros asuntos.","Siempre que nos reunimos","nos asaltan los gendarmes","y nos golpean la nariz","nos golpean los ojos.","Por eso nos cambiamos a este segundo piso","con salida a callejones y atajos de refugio.","Aquí duermen seis adolescentes.","En la planta baja, un matrimonio y un niño de pecho.","No conozco a estos adolescentes","sólo sé que son mis camaradas.","No conozco el nombre del matrimonio","sólo sé que nos han prestado su segundo piso","con buena voluntad.","Pronto amanecerá","nos mudaremos otra vez","cargaremos el maletín","discutiremos minuciosamente","realizaremos bien nuestro trabajo","mañana por la noche dormiremos en otro colchón prestado.","Ya empieza a amanecer","este cuarto de seis metros cuadrados","pañales colgados del cordón eléctrico","el foco tiznado y desnudo","los juguetes de celuloide","los colchones prestados","las pulguitas.","De todo esto me despido","hay que continuar el trabajo","para hacer florecer","nuestras flores:","la flor del matrimonio","la flor del niño de pecho","para que florezcan estas flores","de pronto, plenamente."],"src":"Japón","pri":0},{"poet":"Chuya Nakahara","title":"Canto","lines":["Tú no cantes","no cantes a las flores de cerezo","ni a las alas de las libélulas","no cantes al murmullo del aire","ni al aroma del cabello de las mujeres.","Niégate","todas las cosas débiles","todas las cosas frágiles","todas las cosas melancólicas.","Rechaza","todas las cosas sentimentales","y canta con franqueza","lo que piensas","lo que llena nuestro estómago.","Canta las cosas que penetran al corazón","canta un canto que aúlle cuando lo destrocen","un canto que brote desde el fondo del agravio.","Estos cantos","cántalos valerosamente con una melodía severa.","Estos cantos","clávalos con martillo en el corazón de la gente."],"src":"Japón","pri":0},{"poet":"Chuya Nakahara","title":"Circo","lines":["Habían transcurrido varias épocas","y hubo guerras de color castaño.","Habían transcurrido varias épocas","y soplaron ráfagas heladas de invierno.","Habían transcurrido varias épocas","y esta noche, aquí, llegaban a su punto culminante,","y esta noche, aquí, llegaban a su punto culminante.","Hay una viga en lo alto de la carpa del circo.","Hay un columpio.","Un columpio casi invisible.","Cuelga boca abajo con los brazos tendidos","bajo el techo manchado de algodón.","Yuán yuyón yuyayuyón.","Las luces blancas, cercanas,","respiran como si fueran listones baratos.","Yuán yuyón yuyayuyón.","Los espectadores son pequeñas sandías.","Sus gargantas chillan como las conchas de ostión.","Yuán yuyón yuyayuyón.","La negra y ennegrecida oscuridad cubre la carpa.","La noche avanza","y la nostalgia de los paracaídas condenados.","Yuán yuyón yuyayuyón."],"src":"Japón","pri":0},{"poet":"Chuya Nakahara","title":"La Tristeza Manchada","lines":["Sobre la tristeza manchada","caen hoy otra vez copos de nieve.","Sobre la tristeza manchada","hoy hasta el viento pasa.","La tristeza manchada","es como la piel del zorro.","La tristeza manchada","se encoge bajo la nieve que cae como polvo.","La tristeza manchada","nada desea ni nada suplica.","La tristeza manchada","sueña en la muerte, con tedio.","Temo la tristeza manchada,","y me duele.","La tarde cae en la tristeza manchada","sin que yo pueda hacer nada…"],"src":"Japón","pri":0},{"poet":"Chuya Nakahara","title":"Plato","lines":["Plato plato plato plato plato","plato plato plato plato plato","plato plato plato plato plato","plato plato plato plato plato","Aburrimiento","Pasión con que repta una lombriz en el frente.","Con un delantal de color de arroz blanco","no sequen los platos.","Mujer de negros nidos nasales,","allí también el humorismo está ahumándose.","Disuelvan la vida en el agua","en la cazuela con sopa enfriada.","Flota el tedio.","Rompan los platos.","Al romperlos,","resuena el ruido de aburrimiento."],"src":"Japón","pri":0},{"poet":"Chuya Nakahara","title":"Papas","lines":["Quisiera ser una papa","recién sacada de la tierra."],"src":"Japón","pri":0},{"poet":"Chuya Nakahara","title":"Hojas Secas","lines":["No necesitan estar vivas","se han muerto calcinadas","Han de ser oreadas al viento.","En la lluvia desolada de otoño","entre los montes de arces sutilmente coloreados,","como son hojas muertas caídas en la tierra,","han de dormir con tranquilidad."],"src":"Japón","pri":0},{"poet":"Chuya Nakahara","title":"Ausencia","lines":["Decid que no estoy.","Decid que aquí no hay nadie,","que regreso cincuenta millones de años después."],"src":"Japón","pri":0},{"poet":"Chuya Nakahara","title":"Ignorancia Es El Buda","lines":["Nada mejor que no saber nada","Bien dicho: “ignorancia es el Buda”","No saber nada","es la suprema sabiduría."],"src":"Japón","pri":0},{"poet":"Chuya Nakahara","title":"Enseñanzas De Buda","lines":["Las enseñanzas de Buda","no son para que vivamos","sino para señalarnos qué es vivir.","una vez pronunciadas, ya son inútiles","También vivir es inútil,","mas vivimos por los demás","para señalarles qué es vivir."],"src":"Japón","pri":0},{"poet":"Chuya Nakahara","title":"Abrojo","lines":["Brotaba una flor de abrojo","en el arenal de México.","La flor de abrojo se levantaba en un vaso","en medio del inmenso desierto de la luna.","Florecía el abrojo","encima del cerro escabroso del corazón de una mujer.","El mar, bullicioso, se manchaba con el abrojo.","El tallo del abrojo encerraba al cielo.","El abrojo púrpura","florecía en silencio","al costado de la mujer.","Era el cadáver de un hombre.","Al pie de un cactus con flores amarillas","arrancándose plumas, una paloma se acurrucaba.","Un perro lloraba como tragando el aire radiante."],"src":"Japón","pri":0},{"poet":"Susana March","title":"Umbral","lines":["Cándidamente azul. Aún no he nacido.","Ciñe el aire mis muslos. Soy de aire.","El mar me sabe. Sal, vela y espuma","dibujan mi contorno en el paisaje.","Me traspasa la luz. No me conozco.","Soy apenas un soplo de la tarde.","El sexo yace en paz, el alma duerme,","no tengo voz y Dios está distante.","Navego por los cielos castamente","con las alas al viento.","Pequeña llama, apenas un chispazo,","mi corazón no existe pero arde."],"src":"Poetas españolas","pri":0},{"poet":"Susana March","title":"La pasión desvelada","lines":["Dame tu voz antigua en cuyo acento escucho","el rumor de los bosques primitivos,","el canto misterioso de los seres selváticos,","el grito de agonía","de la primera virgen violada.","Dame tu voz antigua donde yo reconozco","mi propia voz extinguida,","aquella que cantaba hace milenios","en las frondosas selvas sin historia,","aquella que sonaba en el murmullo","de las límpidas fuentes intocadas.","Yo fui una gota de agua,","o un pájaro aturdido cruzando el aire nuevo","de la aurora del mundo;","acaso un pez de oro sobre cuyas escamas","probó el sol la dorada destreza de sus rayos.","Mas era ya la misma doliente criatura","que ahora soy, consumida de sueños y tristezas,","en el ardiente caos del Paraíso,","con los ojos abiertos al secreto de Dios.","Es tu voz el puente por donde regreso,","milenios y milenios traspasando,","a mi libre existencia de agua fresca,","de verde candidez. Mi carne gime","escuchando tu voz como si oyera","la llamada lejana y misteriosa","de las tribus sin nombre. Rituales","de sangre y fuego en el brutal nocturno,","aullidos fugitivos y, en la hierba,","mi cuerpo –¿de mujer?, ¿de reptil?, ¿de insecto?–","hollado por la bárbara dulzura","de la pasión del mundo."],"src":"Poetas españolas","pri":0},{"poet":"Susana March","title":"I","lines":["A veces me siento muy pequeña","cerca de ti, hijo mío.","¡Tu infancia es tan enorme!","Cuando sueñas tus sueños en voz alta","sentado en mis rodillas,","yo noto la pobreza de los míos,","su mísera arrogancia. Y me avergüenzo","de mi cuitada condición de adulta.","¡Tú sí que sabes cosas! ¡Ese mundo","tan grande de ti mismo!","A veces dices sin saber qué dices:","–Cuando sea mayor haré. –¡Tú ignoras","que entonces no harás nada!","Ahora sí, cuanto quieras.","Puedes ser un bandido caballeresco y rubio,","galopador de nubes;","puedes ser un guerrero victorioso","y ganar las batallas tan deprisa","que apenas tengan tiempo","tus fieros enemigos de morirse.","Puedes llenar de pájaros tu alcoba,","de estrellas mi regazo,","puedes cruzar el mundo en un minuto,","solo cerrar los ojos.","¡Ah, mi pequeño dios! ¡Qué gran respeto","me inspira tu mirar iluminado!","A veces he querido","conocer el secreto de tu sabiduría","y me he asomado al cielo de tus ojos","con un pasmo infinito.","No había allí otra cosa","que una gran candidez, un creérselo todo,","un tiernísimo afán de izar el alma","por encima de sombras y torpezas.","¡Tu infancia, hijo, tu infancia!","La llevo entre las manos","como un vaso finísimo. Quisiera","salvarla de su triste,","segura destrucción, ¡y no sé cómo!","Los años van cayendo sobre ti blandamente.","Crecerás, te harás hombre.","¡Y ya no sabrás nada!","¡y ya no sabrás nada!,","y se te morirán dentro del pecho,","sin que apenas lo notes, tanta audacia,","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Susana March","title":"II","lines":["Te canto a ti","porque es cual si yo misma me cantara.","No salgo de mi cárcel. Tú me encierras,","–¡Oh misterioso muro!– tú me atas","a mí con las cadenas más penosas.","¡Qué grilletes tus ojos! Y tus manos,","¡qué eslabones de lirio a mi tortura!","Inmenso amor que vuelve a mí, regresa","a su secreta fuente sin dejarte.","Yo soy tú. Tú eres mío","como es la rosa del rosal y el fruto","del árbol que lo crea. ¡Tú eres mío!","¿Quién podría arrancarte a mi ternura?","Clavado estás en ella. Ni la Muerte","podrá jamás, amor, desenclavarte.","Irás siempre conmigo como un gozo,","como un dolor tal vez. Y cuando mueras,","tu muerte yacerá sobre la mía.","Reposarás en mí, niño y dormido,","siempre tu almohada yo, siempre tu cuna."],"src":"Poetas españolas","pri":0},{"poet":"Susana March","title":"III","lines":["¡Esta inmensa ternura","que es como un mar donde me anego inerme!","¡Esta inmensa ternura","de tenerte, de hablarte, de sentirte!","¿Qué pueden saber ellos,","los que no han conocido","más hijos que sus hondos pensamientos,","de este amor que me llena y me rebosa?","Tú de carne, de espíritu, como un ánfora","donde he guardado todos mis tesoros;","tú creciendo lo mismo que una palma,","brotando de mi tierra, alto y perfecto.","¡Oh, ángel de mis rezos! Dulcemente,","te precedo, te guío, te acompaño.","Más allá de ti mismo ya no hay nada.","Tus ojos son el límite a que aspiro.","¡Cómo quise tu boca ,","granada abierta,","que en las noches","de estío de amor","me llena!","¡Cómo lloran las sombras","de las veredas,","qué cauces más amargos","dejan!","En fragmentos la luna","se mete en las ventanas","entreabiertas,","y manos de fulgores","las cierran.","En las praderas bailan blancas estrellas.","¡Cómo quiero tu boca","cuando te alejas!"],"src":"Poetas españolas","pri":0},{"poet":"Susana March","title":"Permanencia del pensamiento en el paisaje","lines":["Cada rama demuestra","un alto pensamiento.","Cada raíz responde","a un goce permanente.","Cada nube es un sueño","que se deshace en rosa.","Cada soplo de viento","es un latido breve.","Cada charco de lluvia","espera una mirada.","Cada hoja olvidada","una palabra muerta.","Cada señal de vida,","una vida que pasa.","¡Y cada pensamiento","un anhelo en la nada!"],"src":"Poetas españolas","pri":0},{"poet":"Susana March","title":"Tender un puente firme","lines":["Tender un puente firme","en esta noche clara,","desde mi pensamiento","a tu dormido ensueño.","Tener la certidumbre","de que esperas, sin duda,","y sentir palpitar","como un pájaro herido,","tu corazón en lucha","que reclama el silencio.","Estar en el deseo","como bruma azulada","que acaricia tus párpados","con desvelo de nido.","Ordenar las estrellas","que velarán tu sueño;","y sentirte latir","en la onda sonora","que trae tu sentimiento."],"src":"Poetas españolas","pri":0},{"poet":"Josefina Romo Arregui","title":"El mar ausente del Sahara","lines":["Sí. Yo tuve un mar sobre mi arena.","Un mar grande sin límites, compacto.","La tierra de oro que abrasa soledades","estuvo henchida augusta del mar que ya no soy.","Picaban gaviotas mi cuerpo remeciente,","movíanse las naves arriba de mis olas.","Pues yo era el mar que hervía sobre la arena rubia,","la arena saturada que hoy clama por su agua.","¡Oh el mar aquí fantasma, el mar que finge el viento","desmelenando dunas al aventar mi arena!","¡Ay mar del agua espesa, la que corpórea y dura","ansían los caminantes de mi desierto blando!","¿Qué arcángeles de fuego evaporar pudieron","tanto mar que hube, llevándolo a un abismo?","Es mi arena abrasada la más sedienta boca","que gime por un agua que le bebieron dioses.","Los hombres me caminan soñándome poblado","de aquel mar que fue mío, el mar sobre el desierto.","Yo les mullo mi carne, les recibe mi arena,","y se quejan de sed junto a mi sed sin huelgo.","¡Oh gran mar de mi génesis, el mar que me escurrieron","a una zanja de llamas: cuánto pesa la arena!","1945 agosto"],"src":"Poetas españolas","pri":0},{"poet":"Josefina Romo Arregui","title":"Ser fea","lines":["Hoy he sentido todo el amargo pesar","de saber que es mi rostro casi feo, vulgar;","tal vez tú no comprendas lo hondo de la herida","no sabiendo que adoro el amor y la vida,","la belleza hecha carne de plástica asombrosa,","de suavidad de bruma y de aroma de rosa.","Por eso me he sentido encogida de pena","cuando él me decía, la mirada serena:","no eres bella, más luce sobre tu frente","la magnitud de tu alma escogida y consciente.","¡Ay! La amargura toda se ha agolpado en mi pecho","y el castillo de naipes ha quedado deshecho.","He golpeado mi cuerpo con sañuda fiereza","hasta quedar rendida de dolor y tristeza.","Por ser hermosa, hermosa, de atractivos sin cuento","diera todo este espíritu que tan solo es tormento","que me retiene en hondas meditaciones graves,","mientras las flores mecen sus contornos suaves.","¡Oh! En la Armonía Eterna de ser un triste designio","y en la bella Natura no encontrarse a sí mismo.","Por eso hoy he sentido tan amargo pesar","al saber que es mi rostro casi feo, vulgar,","y llevaré en mi alma el rastro de la herida,","en mi alma enamorada del amor y la vida."],"src":"Poetas españolas","pri":0},{"poet":"Josefina Romo Arregui","title":"El amor a las cosas","lines":["Llevo dentro del alma un amor a las cosas,","que es la esencia suprema de mi amor a la vida","mientras haya jazmines y pomas olorosas","¡qué importa que la dicha para mí esté perdida!","¿No hay ojos que me miren? Me miran las estrellas,","que no hay ojos humanos brillando así de amor","y envuelta en el nocturno de irradiaciones bellas","gozo las luminosas miradas del Señor","y aunque en vano he soñado una pasión ardiente","amorosas palabras yo tendré al escuchar","el murmurio del río, el canto de la fuente","o el verso imponderable que me recita el mar","me dará la montaña su base firme y fuerte","por ella sin desmayo ascenderé a la luz","y los pinos amigos, fieles hasta la muerte","me aguardaran constantes con los brazos en cruz.","Llevo dentro del alma este amor a las cosas,","que es la esencia suprema de mi amor a la vida","y él son fecundas raíces dolorosas","en la aridez estéril de mi ilusión perdida."],"src":"Poetas españolas","pri":0},{"poet":"Josefina Romo Arregui","title":"Cántico de las manos","lines":["No mariposas, no pájaros, no nubes,","volad, vosotras sois el puro vuelo,","el del gesto que marca el pensamiento","–vuelo del alma por las altas cimas–.","Rubricad, húmedas gaviotas,","el blanco rito de la acción","sobre el ancho mar de la palabra","en espera del éxtasis seguro","de pétalos surcando el infinito.","Sois la forma y modeláis la forma;","en vuestro hueco nacieron delicadas","íntimas, perdurables, la gracia y la belleza.","Vuestras agudas flores en racimo,","de curvas gráciles, crean los aromas","que las sensibles palmas dan al viento.","El pincel y el buril son vuestros nervios","y el verso se desliza de la frente","por los dulces canales de las venas,","hasta salir de la prisión suave","de vuestros dedos tensos, hecho canto.","Sois la forma y modeláis la forma;","gesto y medida, el equilibrio exacto.","Sois el amor también. ¿Qué sin vosotras","la lentitud de la caricia, el gesto","rudo y ardiente de intensidad agobiante?","¡Íntima languidez de vuestro vuelo","girando del deseo al abandono!","El tacto es la verdad; solo la piel","sabe del elemento primordial del fuego.","El hambre de los ojos solo sacia el tacto,","y el bien únicamente es nuestro","cuando lo moldeamos en las palmas","o lo encerramos en la ardiente cárcel","de los dedos febriles, sensitivos.","El nardo y la magnolia nos doblegan","porque su aroma, de tan denso, es táctil,","carne de flor que nos seduce siempre","con engaño de oscura dulcedumbre.","Nunca será el amor sin vuestro celo,","guardadoras del ámbito secreto","que ilumináis, súbitamente aptas.","¡Oh, difícil camino de las rosas","lleno de espinas ávidas de sangre!","¡Oh, difícil camino, crispadura","de los tallos sensibles, que mordiendo","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Josefina Romo Arregui","title":"La ternura","lines":["Y pensar cómo te busqué, con qué ciega esperanza","hice resonar el silencio con mi llamada;","cómo he sabido abandonar el penetrante fuego apasionado","por seguir tu sendero sencillo con musgo verde","y pájaros escondidos en sus árboles,","llegando hasta tu agua mi rostro","para aliviar las sienes agobiadas e infelices...","Ahora sé que solo eres un fugitivo temblor,","una buena mentira para acallar infantiles congojas;","que nadie puede aprisionarte, pájaro desmesurado en vuelo,","y que en la mano tu limosna no cae","más que en los sueños imposibles.","Solo es cierto el agrio sabor de la manzana verde,","de las grosellas fragantes y luminosas,","y el ácido escalofrío del membrillo duro y oloroso.","Solo es cierto el amor, áspero y fuerte, inconstante y dolorido,","que troncha el esbelto talle de los árboles jóvenes","como el viento del Sur, ardiente e impetuoso.","Solo es cierta la acongojada duda,","la irrazonable pregunta de los celos,","el encuentro de dos pleamares con distinto equinoccio,","de dos hambres que nada sacia,","de una sed diferente y conjunto que se abreva de vino áspero.","Ternura, tú no existes: es tan solo tu nombre","un ojo de agua quieta que se pierde en el llano,","un ojo gris que se estanca y se pudre.","Las nubes te visitan como mi sueño","y mis manos se llegan a tu cauce","hasta romper la dura realidad de un espejo,","de un espejo vulgar, mentira de agua clara.","Y la sed infinita va agrietando mis labios","y retuerce mis manos como secas raíces.","¡Oh, mi agua soñada de ternura!,","pequeña voz del arroyo naciente","que peinabas dichosos tréboles en tu orilla.","Nada tengo, porque no sé si te he perdido por no merecerte,","o acaso no has existido más que en mi anhelo impetuoso,","dulce ser de agua, suave espuma de nube, fugitiva ala de pájaro,","risa de niño, palabra no pronunciada,","voz que nació sin garganta del temblor de las primeras flores de almendro.","Ternura, tú."],"src":"Poetas españolas","pri":0},{"poet":"Josefina Romo Arregui","title":"Cántico de María sola","lines":["Volvemos los ojos a Dios","porque estamos cansados,","porque somos carne cansada,","porque sentimos la vida","como una enorme rueda de molino en los hombros.","Volvemos los ojos a Dios","porque nada esperamos;","ya que el padre y la madre se fueron,","ya los hermanos son cuervos de nuestro pan,","ya los amigos tienen los ojos secos a nuestro llanto,","ya el amor sabe a ceniza en nuestros labios","y pone hielo en el corazón.","Entonces","volvemos a Dios los ojos","y gemimos y nos humillamos","como si nunca hubiésemos levantado la frente orgullosa y enlodada.","Volvemos los ojos a Dios","reclamando ardientemente,","quejándonos de abandono y desesperanza,","exigiendo la fe que desdeñamos.","Como desventurados huesos sin paz de tierra,","como desesperados suspiros sin aire que los recoja","ahogando los minutos y las horas en llanto,","marchando irremediablemente hacia el fin","con terror y lástima.","¡Oh, Dios, oh, Dios!","Yo no supe reconocerte en los floridos prados,","en la dulce ladera de mi juventud,","cuando zumbaban las abejas doradas del sueño,","llenando los labios con la miel de la esperanza;","cuando crecía la vida bajo la mirada del padre y de la madre","y los hermanos compartían nuestras risas;","cuando la amistad trenzaba las manos confiadas y","felices","y el amor se presentía como un olor a lluvia lejana.","¡Oh Dios! ¿Pero es que acaso","tuvo mi vida una ladera tierna y apacible?","¿Es que supe lo que era sonreír sin lágrimas","caminar sin rencores, sin lóbrega amargura?","¡Oh! Mi destino
