os,","y he de gozaros si muero.","Señor mío, haced en mí","vuestra santa voluntad,","que toda mi libertad,","os entrego desde aquí;","de vos vida recibí,","quitádmela si queréis;","solo os pido que me deis","que nunca mi gusto hagáis,","que si el vuestro ejecutáis","lo más conveniente haréis."],"src":"Poetas españolas","pri":0},{"poet":"Violante do Ceo","title":"Romance","lines":["Huid de amor, zagalejas;","huid si vivir queréis,","que verme morir amando","escarmiento os puedo ser.","No fiéis de sus caricias,","no de sus gustos fiéis,","que cual sirena engañosa","regala para ofender.","Huid de sus tiranías,","que, disfrazadas, tal vez","áspides son entre flores,","si flores al parecer.","En los tormentos que paso","cerca el ejemplo tenéis;","miradme y veréis, zagalas,","este enemigo quién es.","Mirad la tristeza mía","y en ella conoceréis","su tirano maltratar,","mi continuo padecer.","Mirad mis lágrimas tristes","Y en su corriente veréis","desde tirano lo injusto,","desde traidor lo cruel."],"src":"Poetas españolas","pri":0},{"poet":"Amarilis","title":"Epístola a Belardo","lines":["Tanto como la vista, la noticia","de grandes cosas suele las más veces","al alma tiernamente aficionarla,","que no hace el amor siempre justicia,","ni los ojos a veces son jueces","del valor de la cosa para amarla:","mas suele en los oídos retratarla","con tal virtud y adorno,","haciendo en los sentidos un soborno","(aunque distinto tengan el sujeto,","que en todo y en sus partes es perfecto),","que los inflama a todos","y busca luego artificiosos modos,","con el que pueda entenderse","el corazón, que piensa entretenerse,","con dulce imaginar para alentarse","sin mirar que no puede","amor sin esperanza sustentarse.","El sustentarse amor sin esperanza,","es fineza tan rara, que quisiera","saber si en algún pecho se ha hallado,","que las más veces la desconfianza","amortigua la llama que pudiera","obligar con amar lo deseado;","mas nunca tuve por dichoso estado","amar bienes posibles,","sino aquellos que son más imposibles.","A estos ha de amar un alma osada;","pues para más alteza fue criada","que la que el mundo enseña;","y así quiero hacer una reseña","de amor dificultoso,","que sin pensar desvela mi reposo,","amando a quien no veo y me lastima:","ved qué extraños contrarios,","venidos de otro mundo y de otro clima.","Al fin de este, donde el Sur me esconde","oí, Belardo, tus conceptos bellos,","tu dulzura y estilo milagroso;","vi con cuánto favor te corresponde","el que vio de su Dafne los cabellos","trocados de su daño en lauro umbroso","y admirando tu ingenio portentoso,","no puedo reportarme","del descubrirme a ti, y a mí dañarme.","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Sor María de Santa Isabel","title":"Décimas para una novela","lines":["Fatigado corazón,","¿qué os aqueja? ¿Ver el oro","de vuestro amado tesoro","convertido ya en carbón?","Apelad a la razón,","si descansar pretendéis,","y en ella conoceréis","que ese de mi vida engaño","os libra del desengaño","que en su muerte hallar podréis.","No me admira que sintáis","padecer, sin culpa alguna,","desaires de mi fortuna","cuando la pena pagáis,","mas si olvidado no estáis,","de vos en vuestro desvelo","pues sabéis que os hizo el cielo","tan valiente en el sufrir,","en parte, os pueden servir","las desdichas de consuelo.","Esforzad el sufrimiento,","consultando a la cordura,","que es suerte, si no ventura,","ver a tiempo un escarmiento.","Sufrid, que según yo siento,","grande hazaña viene a ser,","corazón mío, vencer","con sufrimiento el rigor.","Por cuanto es mayor valor","el sufrir que el padecer.","Pues olvidar es forzoso,","determinaos, corazón,","a salir con la razón","de un abismo proceloso.","El triunfo es dificultoso","y en vos poco el valor fuera,","si fácil guerra emprendiera,","si esta os promete más gloria.","¡Ea! Al arma, mi memoria,","muera el enemigo, muera."],"src":"Poetas españolas","pri":0},{"poet":"Sor María de Santa Isabel","title":"Romance","lines":["Procurad, memorias tristes,","divertir mi sentimiento","con penas que siempre son","y no con gustos que fueron.","Representadme pesares,","dejad pasados contentos,","que son figuras de humo","en el teatro del viento.","Muy bien entiendo las voces","de vuestro mudo silencio,","qué mal concertadas suenan,","qué acordes fueron un tiempo.","De mis muertas esperanzas","clamor parecen sus ecos","o que se cantan endechas","a mi perdido sosiego.","Si con inciertos favores","olvidáis agravios ciertos,","guerra armáis al corazón","no menos que a sangre y fuego.","No me deis en vaso de oro,","disimulado veneno,","creyendo así lo que dice","quien no cree lo que siento.","Memorias, dejadme ya","o acabad mi vida luego,","que no hay fuerzas en el alma","para tan crueles tormentos."],"src":"Poetas españolas","pri":0},{"poet":"Sor María de Santa Isabel","title":"Dándome por asunto cortarse un dedo llegando a cortarse un jazmín","lines":["Filis, de amor hechizo soberano,","cortar quiso un jazmín desvanecido,","y de cinco mirándose excedido,","quedó del vencimiento más ufano.","No bien corta el jazmín, cuando tirano","acero, en rojo humor otro ha teñido,","mintiendo ramillete entretejido,","da jazmín y clavel la hermosa mano.","Átropos bella a la tijera cede","piadosa ejecución, si inadvertida,","a su mano dolor ocasionando.","Que si alma con su sangre dar no puede,","en vez de muerte, dio al jazmín vida,","de amor el dulce imperio dilatando."],"src":"Poetas españolas","pri":0},{"poet":"Sor María de Santa Isabel","title":"Romance melancólico","lines":["Pensamiento, si pensáis","en dar a mi mal remedio,","mal pensáis porque es un mal","causado de pensamientos,","pienso con ajenos gustos","engañar propios deseos","y es engaño donde el alma","penando más, se halla menos.","Si en dormir busco descanso","por ser del morir diseño,","más me canso porque lidio","con enemigos desvelos,","siempre intento hallar alivio","y siempre queda el intento,","con el logro en esperanza","y con la esperanza a riesgo","o apenas alivio hallo","cuando a penas ya le pierdo,","el intento examinando","convertido en escarmiento.","En mi dolor, no hay templanza","y si a la memoria apelo","para el que tengo presente","me da pasados remedios;","en fin, peno, siento y callo","por no decir lo que siento,","que solo puedo quejarme","de que quejarme no puedo;","nacer amable es estrella,","suerte nacer con ingenio,","pero si falta ventura,","nada es gloria y todo infierno;","nuestra derrota sigamos","triste corazón sin miedo","por el golfo de desdicha,","rumbo más seguro y cierto.","¡Ay de mí, triste!,","¡socorro, cielos!","que me anego sin agua,","en sentimientos.","¡Socorro, cielos!, ¡socorro os pido!,","dad, en llanto, a mis penas","algún alivio."],"src":"Poetas españolas","pri":0},{"poet":"Sor María de Santa Isabel","title":"A una señora casada, a quien aborrecía su marido","lines":["Divino hechizo de amor,","en quien se admiran a un tiempo","la discreción y la hermosura","en iguales paralelos,","a todo sentir del alma","todo penar del deseo","justamente querellosa","vives de tu injusto dueño,","que como siempre el amor,","solo del alma hace empleo","no se opusieron al tuyo,","imperfecciones del cuerpo,","alma irracional, sin duda,","tiene, pues no aspira a un cielo,","que tantas lleva en sus ojos","cuantos hacen movimientos,","tantos dotes nobles ricos","engrandecen tu sujeto","que el más discreto en amarle","logra felices aciertos,","que te adoran, no lo dudes,","que a tu dueño envidian, menos,","los que no alcanzan su dicha","con mejor conocimiento,","vive, pues, siempre gozosa","de que los cielos te hicieron","deidad que solo merecen","gozarla los cielos mesmos."],"src":"Poetas españolas","pri":0},{"poet":"Sor María de Santa Isabel","title":"Décimas escritas muy deprisa, en respuesta a otras en que ponderaban la mudanza de las mujeres","lines":["Hombres, no deshonoréis,","con título de inconstantes,","las mujeres que diamantes","son, si obligarlas sabéis.","Si alguna mudable veis,","la mudanza es argumento","de que antes quiso de asiento,","mas en vuestra voluntad,","antes ni después, verdad","no se halló con fundamento.","Si mujer dice mudanza,","el hombre mentira dice,","y si en algo contradice,","es que el juicio no lo alcanza.","Si se ajusta a igual balanza,","por la cuenta se hallaría,","en el mentir cada día","y en mudarse cada mes.","Que el mentir vileza es,","mudar de hombres, mejoría."],"src":"Poetas españolas","pri":0},{"poet":"Sor María de Santa Isabel","title":"Décimas apoyando que los celos declarados son más insufribles que los recelos","lines":["De un recelo imaginado","a una celosa evidencia,","hay la misma diferencia","que entre lo vivo y pintado.","Un agravio declarado","vivo dolor a ser viene","del alma en quien siempre tiene","muerta toda la esperanza.","Y, como alivio no alcanza,","es su tormento perenne.","Cuando el agravio es dudoso,","pinta el temor una calma","adonde padece el alma","de un qué será, riguroso,","mas en el sentir penoso","de la duda se alimenta.","Y si salir de ella intenta,","porque enfermo el gusto advierte,","luego teme que su muerte","cause ejecución violenta.","No diga que tiene amor","quien no tiene sufrimiento,","que esperar es argumento","de la fineza mayor.","Perder el gusto en rigor","por un disgusto temido","siempre es remedio mentido","que busca amor agraciado,","y después, desesperado,","llora el sosiego perdido.","Perseverar en querer,","aunque se oponga el recelo,","es a costa de un desvelo","granjearse el merecer;","y por salir de temer","dar por bien que llegue el mal,","es de amor desaire tal","que aquí establecer querría","que amor tan sin bizarría,","no es de amante racional."],"src":"Poetas españolas","pri":0},{"poet":"Leonor de la Cueva y Silva","title":"A los celos","lines":["Siempre guerra me dais, terribles celos;","celos, nunca acabáis de atormentarnos;","injustos celos, no queréis dejarnos,","pues que siempre nos dais tantos desvelos.","Ladrones sois de el nombre de los cielos,","que os disfrazáis ansí para matarnos,","pues de vuestra ponzoña no hay librarnos,","aunque más por huir alcemos vuelos.","Veneno sois, bastardos, mal nacidos,","del alma pena y de la vida infierno,","flecha del corazón, del pecho fuego,","donde se abrasan todos los sentidos,","y al fin sois, celos, un tormento eterno","laberinto intrincado de amor ciego."],"src":"Poetas españolas","pri":0},{"poet":"Leonor de la Cueva y Silva","title":"Soneto","lines":["Ni sé si muero ni si tengo vida;","ni estoy en mí, ni fuera puedo hallarme;","ni en tanto olvido cuido de buscarme,","que estoy de pena y de dolor vestida.","Dame pesar el verme aborrecida,","y, si me quieren, doy en disgustarme;","ninguna cosa puede contentarme:","todo me enfada y deja desabrida.","Ni aborrezco, ni quiero, ni desamo;","ni desamo, ni quiero, ni aborrezco,","ni vivo confïada ni celosa;","lo que desprecio a un tiempo adoro y amo;","¡vario portento en condición parezco,","pues que me cansa toda humana cosa!"],"src":"Poetas españolas","pri":0},{"poet":"Leonor de la Cueva y Silva","title":"Lira a la hermosura y variedad de flores de la primavera","lines":["Plantas bellas y hermosas","resucitadas de el abril ufano","que anuncia vuestras rosas,","sacándoos del rigor tan inhumano","de el cano invierno helado","a ser gallarda ostentación de el prado;","jacintos que primicias","sois, y violetas, de las otras flores,","que parece que albricias","pedís al mundo, provocando amores","de que ya el mayo hermoso","se le acerca con paso presuroso;","dorados alhelíes","bellos, blancos narcisos y mosquetas,","rosas, sí, carmesíes,","de la purpúrea sangre más perfecta","de la Ericina diosa,","que su color os dio su planta undosa;","olorosos junquillos,","poblada madreselva, jazmín blanco,","de los montes tomillos,","fragante azahar, en quien el cielo franco","mostró con mil primores","más divino poder en tus olores;","campanillas moradas,","casta azucena y trébol oloroso,","manutisas rosadas,","azul espuela, toronjil hojoso,","encarnados claveles,","menuda albahaca y verdes mirabeles;","rajadas clavellinas,","lirio que haces gallardos tornasoles,","gigantas que divinas","os mostráis, pues seguís los arreboles","de Cintio celestiales,","que su rosa os llamamos los mortales;","árboles de mil nombres,","que viste abril de flor y mayo de hoja,","regalo de los hombres,","a quien noviembre robador despoja","el galano vestido,","de verdes esmeraldas guarnecido;","arroyuelos helados","que el rubio sol los grillos os desata,","adorno de los prados,","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Leonor de la Cueva y Silva","title":"Todo lo pierde quien lo quiere todo","lines":["Muestra Galicio que a Leonarda adora,","y con segura y cierta confianza","promete que en su fe no habrá mudanza,","que el ser mudable su firmeza ignora.","Mas de su amor a la segunda aurora","muda su pensamiento y su esperanza,","y sin tener de el bien desconfianza,","publica que Elia sola le enamora.","Con gran fineza, aunque si bien fingida,","a Leonarda da el alma por despojos,","y luego con un falso y nuevo modo","dice que es Elia el dueño de su vida;","pues oiga un desengaño a sus antojos:","todo lo pierde quien lo quiere todo."],"src":"Poetas españolas","pri":0},{"poet":"Leonor de la Cueva y Silva","title":"Liras a la muerte de mi querido padre y señor","lines":["Dejad, cansados ojos,","el justo llanto que os convierte en fuentes,","detened los enojos","y enjugad vuestras líquidas corrientes,","que al mal que oprime el pecho","el alma y corazón le viene estrecho.","En tan terrible pena,","ni hallo descanso, gusto ni alegría;","de todo estoy ajena,","y solo tengo la desdicha mía","por alivio y consuelo,","que de todo lo más me priva el cielo.","Quitome en breves días,","airado y riguroso, un bien amado,","a las fortunas mías","añadiendo este golpe desdichado,","¡Oh, suerte fiera y dura!","¡Llorad, ojos, llorad mi desventura!","Contenta el alma estaba","en sus trabajos, penas y dolores","con el bien que gozaba;","mas la Parca cruel, con mil rigores,","fiera y embravecida,","cortó el hilo al estambre de su vida.","Musa, detente un poco,","que si de tantos males hago suma","y en el presente toco,","no es suficiente mi grosera pluma,","que pues estoy penando,","cuanto puedo decir digo callando."],"src":"Poetas españolas","pri":0},{"poet":"Leonor de la Cueva y Silva","title":"Introduce un galán desfavorecido de su dama, quejándose de su crueldad","lines":["Basta el desdén y bastan los rigores:","Clori, no más crueldad, no más enojos,","serena un poco tus divinos ojos","y suspende sus rayos matadores.","Cesen desprecios, cesen disfavores,","que por flores no es bien que des abrojos","a quien te rinde un alma por despojos,","no indigna de gozar de tus favores.","¡Ah, ingrata Clori! ¡Ah, ingrata, que a mis quejas","tienes el alma y pecho de diamante,","y parece que vives con mi muerte!","Mas, cruel Clori, aunque penar me dejas,","y aunque me matas, he de estar constante,","con tu desdén luchando hasta vencerte."],"src":"Poetas españolas","pri":0},{"poet":"Antonia de Mendoza","title":"Romance","lines":["Hoy una rosa, Domingo,","plantando está en su jardín,","para que su ramillete","tenga del rosa el matiz.","El botón de su virtud,","aunque en julio se va a abrir,","en fragancia y en edad","está gozando el abril.","Siendo rosa es maravilla,","puesto que, para lucir,","en vez de extender su pompa,","quiere su pompa ceñir.","De la religión la selva","la prohíja en su pensil,","con que otra hija desde hoy","en la madre selva vi.","El armiño y la pureza","de que hoy se viste es decir","que, sin dejar de ser rosa,","quiere parecer jazmín.","Azucena se transforma:","¿quién ha visto introducir","el candor de la azucena","de la rosa en el carmín?","Aunque de todas las flores","lo más puro llegó a unir","no hay en su designio azahar,","pero amor perfecto sí.","Aplauso le demos, flores,","pues siempre logró feliz","el aplauso de las flores","la rosa, su emperatriz."],"src":"Poetas españolas","pri":0},{"poet":"Catalina Clara de Guzmán","title":"Romance pintado del invierno","lines":["Qué amenazado está el campo","de las iras de el diciembre,","que le ha dado soplo al aire,","que ha de abrasarlo con nieve.","Los árboles prevenidos","desnudas las hojas tienen,","que el estorbo de estar preso","no embaraza al que es valiente.","Piezas las nubes disparan","desde sus muros celestes,","siendo campo de batalla","el que de flores fue albergue.","Balas de cristal esparce","sobre el florido tapete,","blanco de su puntería,","a pesar de tanto verde.","Banderas tremola el cierzo","y las plantas se estremecen,","porque, aunque son cosas de aire,","la debilidad las teme.","Su miedo helados confiesan","los arroyos y las fuentes,","si no es que, muertas las flores,","ya ser expertos no quieren.","Treguas les propone el marzo,","y abril socorros le ofrece,","con ejércitos de rosas","y escuadrones de mosquetes."],"src":"Poetas españolas","pri":0},{"poet":"Catalina Clara de Guzmán","title":"Retrato suyo","lines":["Un retrato me has pedido,","y aunque es alhaja costosa","a mi recato,","por lograrte agradecido,","si he dicho que soy hermosa,","me retracto.","El carecer de belleza","con paciencia lo he llevado;","mas repara","en que ya a cansarme empieza,","y aunque lo niegue mi agrado,","me da en cara.","Pero, pues precepto ha sido,","va a un traslado reducida","mi figura,","y porque sea parecido","ha de ser cosa perdida","la pintura.","No siendo largo ni rizo,","a todos parece bien","mi cabello,","porque tiene al hechizo,","que dicen cuantos le ven","que es bello.","Si es de azucena o de rosa","mi frente, no comprehendo,","ni el color,","y será dificultosa","de imitar, pues no le entiendo,","yo la flor.","Y aunque las cejas en frente","viven de quien las mormura","sin recelo,","andan en traje indecente,","pues siempre está su hermosura","de mal pelo.","Los ojos se me han hundido,","y callar sus maravillas","me da enojos,","y en su ausencia me han servido","como negros dos neguillas","de ojos.","Mis mejillas desmayadas,","nunca se ve su candor,","y esto ha sido","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Catalina Clara de Guzmán","title":"Romance","lines":["Sin color anda la niña","después que se fue su amante,","enemiga de sus ojos,","descuidada de su talle.","El cabello suelto deja","a la voluntad al aire,","que avariento con el sol,","antes le riza que esparce.","Sus hermosos ojos negros","vierten perlas orientales,","que para alguno que envidia","cada lágrima es un áspid.","No se conoce a sí misma","desde el jueves en la tarde,","que ya para sus desdichas","los jueves han de ser martes.","Bien puede ser que la ausencia,","de enamorada me engañe,","que no hay venturoso firme","ni desdichado mudable."],"src":"Poetas españolas","pri":0},{"poet":"Ana Caro Mallén","title":"A un posible lector","lines":["Noble lector piadoso, cuando leas","este bosquejo de mi inculta pluma,","y en cada letra mil defectos veas,","pensando ver una perfecta suma,","que deseé acertar es bien que creas,","mas la materia es mar, mi ingenio espuma:","halle mi hierro en tu intención disculpa","si amor la suele ser de toda culpa."],"src":"Poetas españolas","pri":0},{"poet":"Sor Dorotea Félix de Ayala","title":"Décimas a la muerte del doctor Juan Pérez de Montalbán","lines":["Que amor uno pueda hacer","de dos amantes ingenios,","y más siendo unos los genios,","nadie le duda el poder.","Pues si esto así puede ser","cuando uno al otro así quiere,","sin duda alguna se infiere","que por más que uno se prive","al morir, todo no vive","al punto que el otro muere.","Montalbán, pues esto es cierto,","¿quién es aquel que no vio","lo mucho que en ti murió","cuando al gran Lope vio muerto?","Así con razón advierto","al mundo que, cuanto a mí,","morir dos veces os vi,","¡quién tanto visto no hubiera!:","en Lope, tú, la primera,","la segunda, Lope en ti.","En tanto extremo notamos","cuanto sentir os hicistes;","pues si dos veces moristes,","nosotros cuatro os lloramos;","a la fortuna culpamos","de sernos tan importuna,","y responde la fortuna","que era injusto que se viese","que dos veces no muriese","quien ha de vivir más de una."],"src":"Poetas españolas","pri":0},{"poet":"Beatriz Jiménez Cerdán","title":"Soneto a la muerte de doña Isabel de Borbón","lines":["De Francia marchitó la flor más bella,","del rigor más común el golpe fiero;","desdicha grande, si funesto agüero,","que a España le dejó tanta querella.","Si alfombras de cristal triunfante huella","túmulo de dolor grave y austero","renueva sus memorias tan severo","que anocheció la más lucida estrella,","hoy atenta celebra las memorias","del sol, a quien debió luces tan claras,","llorando que le falten sus reflejos.","Perdió su luz mi sol, perdí mis glorias;","aquí, vida veloz, tu curso paras;","quiebren a un mismo tiempo dos espejos."],"src":"Poetas españolas","pri":0},{"poet":"Cristobalina Fernández de Alarcón","title":"Canción amorosa","lines":["Cansados ojos míos,","ayudadme a llorar el mal que siento,","hechos corrientes ríos","daréis algún alivio a mi tormento","y al triste pensamiento","que tanto me atormenta","anegaréis con vuestra gran tormenta.","Llora el perdido gusto","que ya tuvo otro tiempo el alma mía,","y el eterno disgusto","en que vive muriendo noche y día;","que estando mi alegría","de vosotros ausente,","es justo que lloréis eternamente.","¡Que viva yo penando,","por quien tanto de amarme se desdeña!","¡Que cuando estoy llorando","haga tierna señal la dura peña,","y que a su zahareña","condición no la mueven","las tiernas lluvias que mis ojos llueven!","Sombras que en noche oscura","habitáis de la tierra el hondo centro,","decidme ¿por ventura","iguala con mi mal el de allá dentro?","Mas ¡ay! que nunca encuentro","ni aun en el mismo infierno","tormento igual a mi tormento eterno.","¿Cuándo tendrá, alma mía,","la tenebrosa noche de su ausencia","fin, y en dichoso día","saldrá el alegre sol de tu presencia?","Mas ¿quién tendrá paciencia?","Que es la esperanza amarga","cuando el mal es prolijo y ella es larga.","¡Oh, tú, sagrado Apolo!,","que del alegre oriente al triste ocaso,","el uno y el otro polo","del cielo vas midiendo paso a paso,","¿has descubierto acaso","desde tu sacra cumbre","el hemisferio a quien mi sol da lumbre?","Dirasle, si lo esconde","en sus dichosas faldas el aurora,","lo mal que corresponde","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Cristobalina Fernández de Alarcón","title":"Soneto a la batalla de Lepanto","lines":["De la pólvora el humo sube al cielo,","busca el cielo su esfera, y entre tanto","mira Neptuno con terror y espanto","teñido en sangre su cerúleo velo.","Al centro profundísimo del suelo","bajan mil almas con eterno llanto","a contar la batalla de Lepanto,","y otras vuelan al reino del consuelo;","cuando de Carlos el valiente hijo","español Escipión, César triunfante,","levantando en sus hechos su memoria:","«¡Virgen Señora del Rosario», dijo,","«venced nuestro enemigo!», y al instante","se oyó por los cristianos la victoria."],"src":"Poetas españolas","pri":0},{"poet":"Cristobalina Fernández de Alarcón","title":"Soneto a san Ignacio de Loyola y san Francisco Javier","lines":["Sale dando matices de escarlata","al cielo de zafir el sol dorado","y el grato al resplandor que le ha prestado","todo planeta influye en luz de plata.","Si en un espejo el cielo se retrata,","de estrellas, cielo y sol se ve un traslado,","mas si el cristal por arte es ochavado,","en diversas esferas se dilata.","Javier e Ignacio a Dios, que es sol, imitan","en la Iglesia, cristal de la triunfante,","distinta en dos opuestos paralelos.","Mas no en la unión que entre ambos solicitan,","siendo el uno en Poniente, otro en Levante,","dos planetas, dos soles en dos cielos."],"src":"Poetas españolas","pri":0},{"poet":"Cristobalina Fernández de Alarcón","title":"A la Virgen","lines":["Reina del cielo, que con bellas plantas","sobre tapetes y alcatifas bellas,","cantando himnos y pisando estrellas,","los coros guías de doncellas santas,","de cuyas gracias tantas","se admiran de tu corte los galanes,","los que, en vez de brocado y tafetanes,","visten púrpura ardiente y blancas luces:","escucha mi lamento,","si mis piadosas lágrimas","pueden subir al reino del contento."],"src":"Poetas españolas","pri":0},{"poet":"Cristobalina Fernández de Alarcón","title":"(sin título)","lines":[],"src":"Poetas españolas","pri":0},{"poet":"Silvia Monteser","title":"Soneto a la muerte de Felipe III","lines":["No pases, huésped, no, para y admira","la pompa de este túmulo arrogante","y esa inscripción te informará elegante","que es lengua muda de esta excelsa pira.","Penetra el mármol y en su centro mira","triste cadáver el cristiano atlante,","contra el hereje rayo fulminante,","que ya su imperio y majestad expira.","Aquí verás los triunfos por despojos","colgajos en el templo de la muerte,","donde huella la púrpura y cayado.","Mas si no son dos ríos tus dos ojos","no pares, huésped, no, para y advierte","que aquí vives y mueres retratado."],"src":"Poetas españolas","pri":0},{"poet":"Hipólita de Narváez","title":"Soneto","lines":["Engañó el navegante a la sirena,","el dulce canto en blanda cera roto;","y ayudado del santo, su devoto,","el cautivo huyó de la cadena.","De la serpiente que en la selva suena,","la virgen se libró con alboroto,","y de las ondas se escapó el piloto","haciendo remo el brazo, nao la entena.","Yo, fuerte, presa tímida, constante,","venzo sirenas, sierpes, ondas, hierro,","y sola muero a manos de mi daño.","Virgen, piloto, esclavo, navegante,","ven, libres, que no importa a mi destierro","voto, temor, necesidad, engaño."],"src":"Poetas españolas","pri":0},{"poet":"Hipólita de Narváez","title":"Soneto","lines":["Leandro rompe, con gallardo intento,","el mar confuso, que soberbio brama;","y el cielo, entre relámpagos, derrama","espesa lluvia con furor violento.","Sopla con fuerza el animoso viento,","triste de aquel que es desdichado y ama,","al fin al agua ríndase la llama,","y a la inclemente furia el sufrimiento.","Mas, ¡oh felice amante!, pues al puerto","llegaste deseado de ti tanto,","aunque con cuerpo muerto y gloria incierta.","Y desdichada yo, quien mar incierto,","muriendo entre las aguas de mi llanto,","aún no espero tal bien después de muerta.","","Alegres horas de memorias tristes","que, por un breve punto que durastes,","a eterna soledad me condenastes","en pago de un contento que me distes.","Decid: ¿por qué de mí, sin mí, os partistes","sabiendo vos, sin vos, cual me dejastes?","Y si por do venistes os tornastes,","¿por qué no al mismo punto que vinistes?","¡Cuánto fue esta venida deseada","y cuán arrebatada esta venida!","Que, en fin, la mejor hora fue menguada.","No me costastes menos que una vida","la media en desear vuestra llegada","y la media en llorar vuestra partida."],"src":"Poetas españolas","pri":0},{"poet":"Isabel de Vega","title":"Glosa a este villancico","lines":["Nunca más vean mis ojos","cosas que les den placer","hasta tornaros a ver.","Si pudiese con la vida","recobrarse el bien perdido,","yo la doy por bien perdida,","que el morir no es a medida","del dolor que he padecido;","y pues veros apartar","fue causa de mis enojos,","pues no queda que mirar","ni lágrimas que llorar,","nunca más vean mis ojos.","¿Qué puedo ya ver, señora,","habiéndote visto en mí?","Que el que te vido y te adora","no puede vivir un hora","más que cuando vive en ti;","mas pues que con mis gemidos","no puedo ya detener,","no se acabe el padecer,","ni suenen a mis oídos","cosas que les den placer.","Cuando me atormenta amor","con temor, ausencia y muerte,","tengo yo por buena suerte","vivir con tanto dolor","a trueque de esperar verte;","pero porque de sufrir","no se canse el padecer,","finge mi mal un placer","qu’es imposible sentir","hasta tornaros a ver."],"src":"Poetas españolas","pri":0},{"poet":"Isabel de Vega","title":"Coplas","lines":["Ni basta disimular","ni fingir contentamiento,","qu’el rabioso pensamiento","revienta por se mostrar.","No me aprovecha callar","aunque la razón me ayuda,","que si la lengua está muda","los ojos saben hablar.","¡Oh, cuitado corazón!","¡Cuán dichoso hubieras sido","si fuera tu mal fingido","como los de muchos son!","Mas, ¡ay!, cuán a costa mía","es vuestro mal verdadero,","pues mucho más persevero","mientras más el mal porfía.","Ya no valen desengaños","para hacerme entender","cuán costoso es el querer","que acarrea tantos daños.","Qu’es tan ciega mi afición","y está el mal tan arraigado,","que en virtud de mi cuidado","me sustenta mi pasión."],"src":"Poetas españolas","pri":0},{"poet":"Isabel de Vega","title":"Soneto a la muerte del emperador Carlos V","lines":["¡Oh, muerte! Cuánta gloria has alcanzado","triunfando del que triunfos par no tiene;","que triunfes más de nadie no conviene,","pues no hay plus ultra adonde has llegado.","Sosiéguese de hoy más tu pecho airado,","qu’el daño que por ti cruel nos viene","ni el nombre del que en tal dolor nos tiene","no temas que jamás será olvidado.","¡Oh César y Alejandro!, que ganastes","tan clara fama por los hechos raros","y con ellos triunfáis en el abismo.","¡Oh Carlos! Clara luz, que vos volastes","al sumo cielo con triunfos claros","después de haber triunfado de vos mismo."],"src":"Poetas españolas","pri":0},{"poet":"Isabel de Vega","title":"Soneto al príncipe don Carlos de España, sobre este verso de David: «Omnia excelsa tua et fluctus tui super me transierunt»","lines":["Divino ingenio, lengua casi muda,","hermoso rostro, cuerpo desgraciado,","valor inestimable no estimado,","con mano larga y de poder desnuda.","Virtud resplandeciente sin ayuda,","rigor y ejecución bien empelado;","benigno, afable, nunca espirmentado,","palabra firme, fe que no se muda.","Alto estado, grandeza, abatimiento,","prisión y libertad, poca salud","con ánimo constante y sufrimiento.","Pasó sin hacer daño a su virtud","el Príncipe don Carlos desdichado","a quien Fortuna rostro no ha mostrado."],"src":"Poetas españolas","pri":0},{"poet":"Sor María de la Antigua","title":"Canción","lines":["Alma, que estando muerta","y en horrores de vicios sepultada,","Dios te llama y despierta","con una voz tan dulce y regalada,","¿qué haces, que no escuchas","sus amorosos ecos? ¿Con quién luchas?","¿Qué miedos te combaten?","¿Qué temores te impiden? ¿Qué recelos","hay en ti que delaten","el logro de tus ansias y desvelos?","Responde a quien te llama","y no te hieles cuando Dios te inflama.","Concede al ocio justo","la piadosa atención que está pidiendo,","y con intenso gusto","escucharás a un cisne que muriendo","entre las ansias suyas","se acuerda así de las miserias tuyas.","–Pobre ovejuela –dice–,","¿qué quieres ignorante de tu daño,","malograrte, infelice?","¿No ves que vas huyendo del rebaño","de mis mansos corderos,","a ser manjar de lobos carniceros?","De ti te compadece;","ten lástima de ti, que vas perdida,","y si no te parece","que es muy grande tu culpa y tu caída,","mira, fiel, con cuidado,","verás lo que me cuesta tu pecado.","Mira estas nobles sienes","coronadas de espinas rigurosas,","y si en tu pecho tienes","piedad, mira estas puntas dolorosas","que el cerebro me pasan","y el corazón y el alma me traspasan.","Mira estos ojos bellos,","por tu culpa sangrientos y eclipsados,","y estos rubios cabellos,","en mi sangre teñidos y bañados;","verás al sol ponerse","y al oro entre la púrpura esconderse.","Mira aquestas mejillas","que a esmaltes de carmín fondo de nieve","les daban, ya amarillas,","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Sor María de la Antigua","title":"Invocación del favor divino que puso la venerable madre sor María de la Antigua a esta obra","lines":["Socorredme, Señor mío,","si no queréis que perezca","entre dos mares metida","de quien soy y tus grandezas","hechas en la criatura","peor que el Cielo sustenta,","que cuanto mayores fueron,","tanto lo son las ofensas.","Mandaisme, mi Dios, que escriba","las soberanas larguezas","que habéis hecho con mi alma,","y cómo respondo a ellas.","Sépase mi ingratitud;","no tengas, alma, vergüenza;","pues sin vergüenza pecasteis,","decid que sois sinvergüenza.","Yo soy la ingrata que di","a mi Señor con las puertas","tantas veces en la cara,","como si Él algo perdiera.","Y habiéndole menester,","yo le traté de manera","que en no echarme en el Infierno","mostró su amor y grandeza.","Ojalá estuviera en él","primero que le ofendiera,","que no siento mis tormentos,","sino solo sus ofensas."],"src":"Poetas españolas","pri":0},{"poet":"Luisa de Carvajal y Mendoza","title":"En la sagrada comunión","lines":["¡Ay! soledad amarga y enojosa,","cansada de mi ausente y dulce amado,","dardo eres en el alma atravesado,","dolencia penosísima y furiosa.","Prueba de amor terrible y rigurosa,","y cifra del pesar más apurado,","cuidado que no sufre otro cuidado,","tormento intolerable y sed ansiosa.","Fragua, que en vivo fuego me convierte,","de los soplos de amor tan avivada,","que aviva mi dolor hasta la muerte.","bravo mar, en el cual mi alma engolfada","con tormenta camina dura y fuerte","hasta el puerto y ribera deseada."],"src":"Poetas españolas","pri":0},{"poet":"Luisa de Carvajal y Mendoza","title":"Al pie izquierdo de Cristo","lines":["El pie que de amor me hirió","de solo mirarle un día,","¿qué efecto en el alma haría","cuando a mis labios llegó?","Dígalo amor, a quien diere","el alma por escucharle,","que fuerza será dejarle","vida y alma, si le oyere.","Que sin jamás apremiar","la voluntad de manera,","él la fuerza a que te quiera,","que no te puede olvidar.","El pie tu Silva besando,","que juntamente adoraba,","do sentí que al alma entraba","un fuego y otro abrasando.","Y abierto hasta el corazón","el camino a puro fuego,","a paso llano el pie luego","entró a tomar posesión.","Y tan perdida quedé,","cuando los ojos por verle","alcé, que por no perderle","me di por el dulce pie.","Y como me di a mí, diera","por solo este pie pintado","cuanto bien imaginado","puede haber, si le tuviera.","Aquesto así ejecutado,","me fuera suma riqueza","verle sobre mi cabeza","después de haberle besado.","Que no solo vencedor","tu robusto brazo diestro","es, que con tu pie siniestro","hieres y matas de amor.","Mil dardos dél me arrojaste","y al alma todos llegaron,","y mil heridas causaron","de amor, con que me mataste."],"src":"Poetas españolas","pri":0},{"poet":"Luisa de Carvajal y Mendoza","title":"Deseos de martirio","lines":["Esposas dulces, lazo deseado,","ausentes trances, hora victoriosa,","infamia felicísima y gloriosa,","holocausto en mil llamas abrasado.","Di, amor, ¿por qué tan lejos apartado","se ha de mí aquella suerte venturosa","y la cadena amable y deleitosa","en dura libertad se me ha trocado?","¿Ha sido, por ventura, haber querido","que la herida que al alma penetrada","tiene con dolor fuerte desmedido","no quede socorrida ni curada,","y, el afecto aumentado y encendido,","la vida a puro amor sea desatada?"],"src":"Poetas españolas","pri":0},{"poet":"Luisa de Carvajal y Mendoza","title":"Amor y ausencia","lines":["¿Cómo vives, sin quien vivir no puedes;","ausente, Silva, el alma, tienes vida;","y el corazón aquesta misma herida","gravemente atraviesa, y no te mueres?","Dime, si eres mortal, o inmortal eres.","¿Hate cortado Amor a su medida,","o forjado en sus llamas derretida,","que tanto el natural límite excedes?","Vuelto a tu corazón cifra divina","de extremos mil Amor, en que su mano","mostrar quiso destreza peregrina,","y la fragilidad del pecho humano","en firmísima piedra diamantina,","con que quedó hecho alcázar soberano.","En el siniestro brazo recostada","de su amado pastor, Silvia dormía,","y con la diestra mano la tenía","con un estrecho abrazo a sí allegada.","Y de aquel dulce sueño recordada,","le dijo: «El corazón del alma mía","vela, y yo duermo. ¡Ay! Suma alegría,","cuál me tiene tu amor tan traspasada.","Ninfas del paraíso soberanas,","sabed que estoy enferma y muy herida","de unos abrasadísimos amores.","Cercadme de odoríferas manzanas,","pues me veis, como fénix, encendida,","y cercadme también de amenas flores»."],"src":"Poetas españolas","pri":0},{"poet":"Constanza Ossorio","title":"Salmo LXIV","lines":["A ti, Dios, en Sión den alabanzas","tus queridos devotos;","los que en Jerusalén ¡oh rey! alcanzas","también te rindan votos.","Y entre unos y otros yo te pido,","dando al alma trasiegos,","que inclines tu amoroso y fiel oído","a mis humildes ruegos.","Pues a ti solo todos los mortales","van a pedir remedio","de sus crueles y incurables males","como a su único medio.","Contra nosotros han prevalecido","las palabras dañosas","de nuestros enemigos, y han vencido","sus lenguas venenosas.","Si desto causa han sido los pecados","que habemos cometido,","de tu piedad seremos perdonados,","cual siempre lo hemos sido.","Porque es dichoso y bienaventurado","aquel que Tú recibes,","y por mil siglos vive coronado","adonde Tú resides.","Que es tu sagrado templo donde hay bienes","y premios de honra y gloria;","allí tu mano coronó sus sienes","con triunfos de victoria.","Dando con igualdad a cada uno","el premio que merece,","quedando de honra y gloria siempre ayuno","el que el mundo engrandece.","A los que somos tuyos, salud nuestra,","óyenos del altura,","y muestra en nuestra ayuda tu gran diestra,","¡oh mi esperanza pura!","que aunque al fin de la mar y de las tierras","esté de ti apartado,","me aparejas los montes y las sierras","que sirven de collado,","donde con tu poder y fortaleza,","mientras el mar se altera,","me ciñen de valor y de firmeza,","guardando mi fe entera.","Viendo tu gran saber y tus señales","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Sor Jerónima de la Asunción","title":"Soliloquio","lines":["Vuestra soy, para vos nací;","¿qué mandáis hacer de mí?","Inaccesible grandeza,","eterna Sabiduría","y bondad del alma mía,","Dios, un ser, poder y alteza,","mirad la suma pobreza","de esta que se ofrece aquí.","¿Qué mandáis hacer de mí?","Veis aquí mi corazón,","yo le pongo en vuestra palma,","mi cuerpo, mi vida y mi alma,","mis entrañas, mi afición;","luz, esposo y Redención,","pues por vuestra me ofrecí,","¿qué mandáis hacer de mí?","Dadme muerte o dadme vida,","salud o enfermedad","honra o deshonra me dad,","dadme guerra o paz cumplida,","que, medrosa o atrevida,","a todo diré que sí.","¿Qué mandáis hacer de mí?","Dadme riqueza o pobreza,","dadme gusto o desconsuelo,","dadme alegría o tristeza,","dadme infierno o dadme cielo;","vida dulce, sol sin velo,","pues del todo me vendí.","¿Qué mandáis hacer de mí?","Si queréis que me esté holgado","por amor, quiérome holgar;","si me mandáis trabajar,","morir quiero trabajando;","decí dónde, cómo y cuándo,","decí, dulce amor, decí,","¿qué mandáis hacer de mí?","Si queréis, dadme oración;","si no, dadme sequedad;","si abundancia o devoción,","o si no esterilidad.","Soberana Majestad,","solo hallo paz aquí.","¿Qué mandáis hacer de mí?","Dadme, pues, sabiduría,","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Sor Ana de San Bartolomé","title":"Letrilla","lines":["Si ves mi pastor,","háblale, Llorente;","dile mi dolor,","mira si lo siente .","Dile con cuidado,","y bien dicho, pastor,","que por qué ha cerrado","ansí mi corazón,","y siendo el Señor","ansí se me ausente.","Dile mi dolor,","mira si lo siente .","Vuélveme la luz,","caro y buen amigo,","y venga la cruz","como seáis servido,","que ese es el camino","que pide el amor.","Dile mi dolor,","mira si lo siente .","La noche es oscura","y da mil temores,","y los robadores","que no se conduran;","¿y entonces te escondes,","mi buen fiador?","Dile mi dolor,","mira si lo siente .","No os mostréis tan duro,","buena está la prueba","y basta la hecha,","pues veis no es seguro","en tan flaca tierra","y tan sin vigor.","Dile mi dolor,","mira si lo siente .","¿Cómo me has metido","en tan fuerte breña,","y te has escondido","dejándome en ella","y en estrecha senda","sin saber dó voy?","Dile mi dolor,","mira si lo siente .","Si me has entendido,","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Sor Hipólita de Jesús Rocaberti","title":"Himno en desprecio del mundo","lines":["Pues a cuanto el mundo alaba","pone fin la sepultura,","no quiero bien que no dura,","ni temo mal que se acaba.","Llore yo el tiempo pasado","y menosprecie el presente,","meditando atentamente","el tiempo que no ha llegado.","Pues el tiempo está pasando","y se me acerca la muerte,","quiero vivir de tal suerte,","que en el bien me halle velando.","La cruz quiero por cayado,","séanme clavos y lanza","asilos de mi esperanza","en mi corazón fijados.","Aunque vivo en este mundo,","trátole como traidor,","aborrezco su favor,","vístome de su descuido.","A mi alma, cual carbón,","muerta, negra, fría y fea,","con la sangre la hermosea","que por mí en su Pasión dio.","La muerte venir afecta;","yo deseo que no tarde","cuando mi corazón arde","en la caridad perfecta.","Si el mundo llama al perdido,","llama Jesús sus electos;","quiero ser de los perfectos","y a Jesús prestar oído.","Este es cordero y pastor","y yo su pequeña oveja,","y así mi amor se apareja","a oír la voz del Señor.","¡Oh!, si en esta tierra ajena","viviera yo de tal suerte","que cuando llegue la muerte","venga muy en hora buena."],"src":"Poetas españolas","pri":0},{"poet":"Sor María de San José","title":"Ansias de amor","lines":["Por las calles y plazas voceando,","buscando te he andado, Amado mío;","mil días han pasado, y no hallando,","con dolorosas ansias a ti envío","mil suspiros, y a todos conjurando,","cada cual me arroja y da desvío;","vuelvo con triste llanto y cruda pena","a soltar al dolor copiosa vena.","Tornen los ojos al continuo llanto,","torne el gemido, torne la tristeza,","cubra el cielo su lustroso manto","y todo se me vuelva en aspereza,","y nada me sustente, ni vea cuanto","cobija el firmamento y su riqueza,","que mientras no tuviere luz preciosa,","la que alumbra a los otros me es odiosa.","El caos confuso oscuro otra vez sea,","que para mí yo doy carta de horro","a todo lo criado, y nada sea","en mi favor, provecho, ni socorro;","hasta que aquel que ama mi alma vea,","en nada paro y con deseo corro","al fin donde me llevan mis deseos,","huyendo de tropiezos y rodeos.","Y por que nada estorbe mi destino,","ni me impida ninguna criatura,","a todos doy repudio, y sé que atino,","porque sin ti, mi Dios, todo es locura,","y quien en esto para, va sin tino,","buscando eterna muerte y desventura;","vaya lejos de mí lo que es dañoso,","y aun para vivir lo provechoso.","Lejos vaya de mí todo contento,","afuera tierra y afuera suelo,","que sin Dios nada soy ni llevo intento","admitir el más mínimo consuelo;","si algo he de admitir, es el tormento,","ansias, penas que dais y desconsuelo;","que esta medicina a mi dolencia","sana, y della tengo ya experiencia.","No hay agua más preciada al sediento,","ni manjar más sabroso al sin hastío,","ni sombra do descanse el sin aliento","de la furia del sol en el estío;","ni tesoro escondido al avariento,","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Sor María de San José","title":"Esto es ser carmelita reformada","lines":["Pobre el vestido, limpio sin cuidado,","un rostro afable, grave, alegre, honesto,","un trato honroso, sincero y modesto,","a la verdad el corazón ligado;","un valeroso pecho al bien atado,","sin que temor o amor le mude el puesto,","conforme a Dios, en todo al hombre opuesto,","por sí mismo temblando sosegado;","buscar a Dios, por solo ser Dios bueno,","abrazar con el alma la pobreza,","tener por libertad el ser mandada;","el corazón vacío, de Dios lleno,","conocer la soberbia en su bajeza:","esto es ser carmelita reformada."],"src":"Poetas españolas","pri":0},{"poet":"Sor María de San José","title":"Redondillas exhortando a las carmelitas descalzas a conservar las constituciones de santa Teresa","lines":["¡Ay, ay, Carmelo dichoso,","guarte, que anda la raposa","solícita y cuidadosa","por quitarte tu reposo!","Está con el ojo alerta,","puesto siempre en centinela,","y llama para esta vela","a tu Teresa y Alberto.","No fíes en esperanzas","ni promesas aparentes,","nota bien inconvenientes","y previene las mudanzas.","No te engañen con decir","de otras nuevas perfecciones;","huye de las invenciones,","que te quieren destruir.","Bien vas, bien vas, no te mudes,","pues tiene larga experiencia;","resiste con vehemencia,","de lo demás no te cures.","¡Ay, ay, otra vez te digo,","y mil decirlo querría,","y aún de grado moriría","y desde luego me obligo!","A trueque de te servir,","dulce monte y patria buena,","venga sobre mí la pena,","que no quiero más vivir.","Por no ver el torbellino","y tempestad que diviso,","no digas que no te aviso","con tiempo lo que adivino.","¡Ay!, que a todos descuidados","nos hallará, sin pensar","que nos podrá derribar;","no es bien ser tan confiados,","ni fiar de nuestro celo","y nuestra traza y prudencia;","mira a quien tiene experiencia;","abre los ojos, Carmelo.","No fíes de mal tu cumbre,","ni vivas tan descuidado;","mira que nunca ha mudado","el enemigo costumbre","de acometer lo más alto,","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Sor Ana de Jesús","title":"Invitación de Navidad, 1585","lines":["Sal acá fuera, querido.","Darémoste el corazón","y tú tomarás posesión.","Sal acá fuera, querido,","ya del vientre de tu madre,","abajo de las alturas,","que allí tienes a tu Padre.","Que no te entrega nadie;","hasta verte, el corazón","y tú tomarás posesión."],"src":"Poetas españolas","pri":0},{"poet":"Sor Ana de Jesús","title":"Liras en loor de los trabajos","lines":["Quien no sabe de penas","en este valle lleno de dolores","no sabe cosas buenas,","ni ha gustado amores,","pues penas son el traje de amadores.","La piedra reprobada","por los hombres y por Dios elegida,","con penas fue labrada","dando su propia vida","con ansías y dolores sin medida.","Y aquellas que tú viste,","¡oh, Juan!, del claro febo revestida,","ropas de penas viste,","con ellas guarnecida","vivió su virginal y limpia vida.","Y aquellos capitanes","para doctores nuestros enviados","fueron purificados","con trabajos y afanes","y en la sublime rueda colocados.","Y el coro ensangrentado,","que la aureola goza por la espada,","con penas fue labrado,","con muerte trabajada","subió a la vida bienaventurada.","Y aquel vergel bendito","de vírgenes sagradas tan florido,","domando su apetito","de penas fue vestido,","tentado, fatigado y afligido.","Y los que se apartaron","por las congregaciones y desiertos,","vestidos caminaron","de penas cubiertos,","cansados, agotados, casi muertos.","Esta es la vestidura","de aquello que son viejos escogidos,","de los favorecidos","esta es la cobertura,","amados, regalados y queridos.","Con tanta rica librea","se gozará su alma rodeada,","con tal querella se vea","como piedra labrada","en el alto edificio colocada.","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Luisa Sigea","title":"Un fin, una esperanza, un cómo, un cuándo","lines":["Un fin, una esperanza, un cómo, un cuándo;","tras sí traen mi derecho verdadero;","los meses y los años voy pasando","en vano, y paso yo tras lo que espero;","estoy fuera de mí, y estoy mirando","si excede la natura lo que quiero;","y así las tristes noches velo y cuento,","mas no puedo contar lo que más siento.","En vano se me pasa cualquier punto,","mas no pierdo yo punto en el sentirlo;","con mi sentido hablo y le pregunto","si puede haber razón para sufrirlo:","respóndeme: sí puede, aunque difunto;","lo que entiendo de aquel no sé decirlo,","pues no falta razón mi buena suerte,","pero falta en el mundo conocerse.","En esto no hay respuesta, ni se alcanza","razón para dejar de fatigarme,","y pues tan mal responde mi esperanza","justo es que yo responda con callarme;","fortuna contra mí enristró la lanza","y el medio me fuyó para estorbarme","el poder llegar yo al fin que espero,","y así me hace seguir lo que no quiero.","Por sola esta ocasión atrás me quedo,","y estando tan propensa al descontento,","las tristes noches cuento, y nunca puedo,","hallar cuanto en el mal que en ella cuento;","ya de mí propia en esto tengo miedo","por lo que me amenaza el pensamiento;","mas pase así la vida, y pase presto,","pues no puede haber fin mi presupuesto."],"src":"Poetas españolas","pri":0},{"poet":"Luisa Sigea","title":"Canción de la señora Luisa Sigea de Velasco, declarando : «Habui menses vacuos et noctes laboriosas, et numeravi mihi»","lines":["Pasados tengo hasta ahora","muchos meses y largos","tras un deseo en vano sostenido","que tanto hoy día mejora","cuanto los más amargos","y más desesperados he tenido;","lo que en ellos sentido","no puedo yo contallo;","el alma allá lo cuente;","mas ella no lo siente","tan poco que no calle como callo;","¡oh grande sentimiento!","que a veces quita al alma el pensamiento,","y cuanto esto acaece,","según veo las señales","ya creo que el remedio está cercano;","la vida se amortece,","no se sienten los males","tanto como si esté el cuerpo más sano;","pero todo es en vano,","que al fin queda la vida","y torna el alma luego","en el acostumbrado fuego","a ser muy más que antes encendida;","así que en fantasías","se me pasan los meses y los días,","en fantasías y cuentos","la vida se me pasa;","los días se me van con lo primero,","las noches en tormentos,","que el alma se traspasa","echando cuenta a un cuento verdadero","cual es desde que espero","el fin de mi deseo;","¡cuántas habré pasadas","de noches trabajadas","sufriéndolas por ver lo que aun no veo!","estas muy bien se cuentan,","mas ¡ay que las que quedan más me afrentan!","En esto un pensamiento","me acude a consolarme","de quantos males solo dél recibo","pensando en mi tormento","no oso de alegrarme","según que se me muestra tan esquivo;","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Isabel de Castro y Andrade","title":"Competencia entre la rosa y el sol","lines":["Púrpura ostenta, disimula nieve,","entre malezas peregrina rosa,","que mil afectos suspendió frondosa,","que mil donaires ofendió por breve.","Madre de olores a quien ambas debe","lisonjas, no por prenda de la diosa,","mas porque a los aromas deliciosa","lo más sutil de los alientos bebe.","En prevenir al sol tomó licencia:","sintiolo él, que, desde un alto risco,","sol de las flores halla que le incita;","mirola al fin ardiente basilisco,","y, ofendido de tanta competencia,","fulminando veneno la marchita."],"src":"Poetas españolas","pri":0},{"poet":"Santa Teresa de Jesús","title":"Unos versos de la Santa Madre Teresa de Jesús, nacidos al fuego del amor de Dios que en sí tenía","lines":["Vivo sin vivir en mí,","y tan alta vida espero,","que muero porque no muero .","Aquesta divina unión,","del amor con que yo vivo,","hace a Dios ser mi cautivo,","y libre mi corazón.","Más causa en mí tal pasión","ver a Dios mi prisionero,","que muero porque no muero .","¡Ay! ¡Qué larga es esta vida!","¡Qué duros estos destierros,","esta cárcel, estos hierros","en que el alma está metida!","Solo esperar la salida","me causa un dolor tan fiero,","que muero porque no muero .","¡Ay! ¡Qué vida tan amarga","do no se goza el Señor!","Y si es dulce el amor,","no lo es la esperanza larga;","quíteme Dios esta carga,","más pesada que el acero,","que muero porque no muero .","Solo con la confianza","vivo de que he de morir,","porque muriendo, el vivir","me asegura mi esperanza;","muerte, do el vivir se alcanza,","no te tardes, que te espero,","que muero porque no muero .","Mira que el amor es fuerte;","vida, no me seas molesta,","mira que solo te resta,","para ganarte, perderte:","venga ya la dulce muerte,","venga el morir muy ligero,","que muero porque no muero .","Aquella vida de arriba,","que es la vida verdadera;","hasta que esta vida muera,","no se goza estando viva:","muerte, no me seas esquiva;","viva muriendo primero,","que muero porque no muero .","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Santa Teresa de Jesús","title":"Otra glosa sobre los mismos versos","lines":["Vivo ya fuera de mí,","después que muero de amor,","porque vivo en el Señor,","que me quiere para sí;","cuando el corazón le di","puso en mí este letrero","que muero porque no muero.","Esta divina unión,","y el amor con que yo vivo,","hace a mi Dios mi cautivo,","y libre mi corazón;","y causa en mí tal pasión,","ver a Dios mi prisionero,","que muero porque no muero .","¡Ay! ¡Qué larga es esta vida!","¡Qué duros estos destierros,","esta cárcel y estoy hierros","en que está el alma metida!","Solo esperar la salida","me causa un dolor tan fiero","que muero porque no muero .","Acaba ya de dejarme,","vida, no me seas molesta,","porque muriendo, ¿qué resta","sino vivir y gozarme?","No dejes de consolarme,","Muerte, que así te requiero,","que muero porque no muero ."],"src":"Poetas españolas","pri":0},{"poet":"Santa Teresa de Jesús","title":"Villancico","lines":["¡Oh, hermosura que excedéis","a todas las hermosuras!","Sin herir dolor hacéis,","y sin dolor deshacéis,","el amor de las criaturas.","¡Oh, ñudo que así juntáis","dos cosas tan desiguales!","No sé por qué os desatáis,","pues atado fuerza dais","a tener por bien los males.","Quien no tiene ser juntáis","con el ser que no se acaba;","sin acabar, acabáis,","sin tener que amar, amáis,","engrandecéis nuestra nada."],"src":"Poetas españolas","pri":0},{"poet":"Santa Teresa de Jesús","title":"Octava","lines":["Dichoso el corazón enamorado","que solo en Dios ha puesto el pensamiento.","Por Él renuncia a todo lo criado","y en Él halla su gloria y su contento.","Aun de sí mismo vive descuidado,","porque en su Dios está todo su intento,","y así, alegre pasa y muy gozoso","las olas de este mar tempestuoso."],"src":"Poetas españolas","pri":0},{"poet":"Santa Teresa de Jesús","title":"Nada te turbe","lines":["Nada te turbe,","nada te espante,","todo se pasa,","Dios no se muda.","La paciencia","todo lo alcanza.","Quien a Dios tiene,","nada le falta:","solo Dios basta.","Si el amor que me tenéis,","Dios mío, es como el que os tengo,","decidme: ¿en qué me detengo?","O Vos, ¿en qué os detenéis?","–Alma, ¿qué quieres de mí?","–Dios mío, no más que verte.","–¿Y qué temes más de ti?","–Lo que más temo es perderte.","Un alma en Dios escondida,","¿qué tiene que desear,","sino amar y más amar,","y en amor toda escondida","tornarte de nuevo a amar?","Un amor que ocupe os pido,","Dios mío, mi alma os tenga,","para hacer un dulce nido","adonde más la convenga.","Sea mi gozo en el llanto,","sobresalto mi reposo,","mi sosiego doloroso,","y mi bonanza el quebranto.","Entre borrascas mi amor,","y mi regalo en la herida,","esté en la muerte mi vida,","y en desprecios mi favor.","Mis tesoros en pobreza,","y mi triunfo en pelear,","mi descanso en trabajar,","y mi contento en tristeza.","En la oscuridad mi luz,","mi grandeza en puesto bajo.","De mi camino el atajo","y mi gloria sea la cruz.","Mi honra el abatimiento,","y mi palma padecer,","en las menguas mi crecer,","[…]"],"src":"Poetas españolas","pri":0},{"poet":"Santa Teresa de Jesús","title":"Véante mis ojos","lines":["Véante mis ojos,","dulce Jesús bueno;","véante mis ojos,","muérame yo luego.","Vea quien quisiere","rosas y jazmines,","que si yo te viere,","veré mil jardines:","flor de serafines,","Jesús Nazareno,","véante mis ojos,","muérame yo luego.","No quiero contento","mi Jesús ausente,","que todo es tormento","a quien esto siente;","solo me sustente","tu amor y deseo,","véante mis ojos,","dulce Jesús bueno;","véante mis ojos,","muérame yo luego."],"src":"Poetas españolas","pri":0},{"poet":"Florencia del Pinar","title":"Canción","lines":["El amor ha tales mañas","que quien no se guarda dellas,","si se l’entra en las entrañas,","no puede salir sin ellas.","El amor es un gusano","bien mirada su figura,","es un cáncer de natura","que come todo lo sano.","Por sus burlas, por sus sañas,","dél se dan tales querellas","que si s’entra en las entrañas,","no puede salir sin ellas.","Es de diversas colores","que quien no se guarda dellas,","si se l’entra en las entrañas,","no puede salir sin ellas.","Es de diversas colores,","críase de mil antojos;","da fatiga, da dolores,","rige grandes y menores,","ciega muchos claros ojos;","y aquellos, desque cegados,","no quieren verse en clarura;","hállanse tanto quebrados,","que dicen los desdichados","es un cáncer de natura,","a quien somos sojuzgados.","Éntranos por las axiellas","cuándo quedo, cuándo apriesa,","con sospechas, con rencillas;","y al contar destas mancillas","tal se burla que s’confiesa,","y aun las más defendidas","señoras del ser humano","cuando deste son heridas,","si saben y son garridas,","y a ellas come lo sano","y a nosotros nuestras vidas."],"src":"Poetas españolas","pri":0},{"poet":"Florencia del Pinar","title":"Canción de unas perdices que le enviaron vivas","lines":["Destas aves su nación","es cantar con alegría,","y de vellas en prisión","siento yo grave pasión,","sin sentir nadie la mía.","Ellas lloran que se vieron","sin temor de ser cativas,","y a quien eran más esquivas","esos mismos las prendieron.","Sus nombres mi vida son","que va perdiendo alegría,","y de vellas en prisión","siento yo grave pasión,","sin sentir nadie la mía.","del riguroso invierno","presentarán lo triste","de un árido terreno.","Entonces mudamente","te dirá el campo seco:","nada en el mundo dura,","todo lo acaba el tiempo.","Mira esa hermosa tropa","de jóvenes sin seso,","que en pos de los placeres","corren sin conocerlos.","Después que se han cansado,","ya con el dulce acento,","ya con ligera planta,","agitándose el pecho","Examina y repara","si no ha sido su objeto","del próximo la ruina,","la envidia de su sexo.","Sus gozos se transforman","en pesares y celos,","nada en el mundo dura,","todo lo acaba el tiempo."],"src":"Poetas españolas","pri":0},{"poet":"Lilvia Soto","title":"El Barro","lines":["con el que","Blanca y yo","hacíamos","casas de adobe","para las muñecas","de trapo,","y, a veces,","el balde","en el que","Alfonso","ordeñaba","la blanca","espumosa","leche","para la avena","del desayuno.","Sí, es verdad,","tanto depende","de aquella","carretilla","roja","de los","cálidos veranos","del desierto","embarrada","de terrones","de arcilla","roja","repletos de","hormigas","rojas","y de las","plumas","de las","blancas","ponedoras","de la abuela.","Pastiche","Escribe. (No hay ideas sino en las cosas) ¡Inventa!","William, oh, William,","debes saber","que las gallinas blancas","[…]"],"src":"Hay algo urgente (WCW)","pri":1},{"poet":"Fabricio Gutiérrez","title":"El Gorrión Que Viene","lines":["a pararse a la rama del árbol","es el soporte del árbol,","si no fuera por él, el árbol se vendría abajo.","Y tú que miras al gorrión","pienso que tu manera de mirarlo","es su soporte, es decir,","que si no fuera por tu mirada","el gorrión se vendría abajo,","y junto con él, el árbol,","y todos los gorriones que posiblemente","se hubieran podido parar en él.","El viento trajo","un nido a mí.","El mismo viento","trajo después un gorrión.","Ahora en mí hay un nido","y en él, un gorrión.","Ahora soy cuidadoso. Delicado.","Hay en mí algo pequeño y frágil","que en cualquier momento","puede caer al suelo.","William Carlos Williams come una ciruela","Las ciruelas que traje del mercado","están acaloradas.","Por eso he abierto la ventana,","una bocanada de aire fresco","les sentará bien.","Qué pequeño se ve su sueño","ahora que toman una siesta","en un plato.","Esta ciruela que cojo del plato","segundos antes se soñaba en mi mano.","Ahora no sabe distinguir","si es un sueño o no.","Cuando doy la primera mordida","está por completo segura","de lo primero."],"src":"Hay algo urgente (WCW)","pri":1},{"poet":"Fabricio Gutiérrez","title":"Estoy Comiendo Ciruelas","lines":["sentado en una banca del parque.","Al mismo tiempo","estoy en el sueño de un niño.","En el sueño del niño","las ciruelas nunca se acaban:","si cojo una del plato","al momento vuelve aparecer otra.","Y ya tengo la lengua roja roja.","Alejandro Ramos Ayala","Ofrenda de flores y torcacitas","¿Y quién más pobre que aquel que ama en primavera?","William Carlos Williams","Las escenas cambian como","las estaciones,","y del gélido frío del silencio","brota lentamente","un botón:","una flor que nacerá de su voz,","un pétalo de su palabra pétalo,","un perfume de su palabra olor","y dulcísimo","como el amor de las aves,","como los nidos que se","destruyen en silencio","y los retoños que se","engendran en la tinta de la noche.","Los amantes son todos torcacitas","y William lo vio en la locura de un jardín","imaginó la floración de una lengua","como jacintos, lirios acuáticos"],"src":"Hay algo urgente (WCW)","pri":1},{"poet":"Alejandro Ramos Ayala","title":"(sin título)","lines":["Y también su locura brotaba","como un amor","por la sencillez de las palabras","como un amor","por la potencia de la reiteración","y los silencios exactos.","Con la precisión de un cirujano","desarticuló cada pieza del","rompecabezas del lenguaje","y sus versos brotaban","desde lo tan pequeño","que lo abarcaban todo.","Lo siguen haciendo.","Y como en aquella lejana historia","bíblica,","en la que la única mesa que","resistió el enojo del mesías,","fue la de quien vendía","las torcacitas (ofrenda de los humildes)","William permanece","en este breve encuentro,","al centro, como un pistilo","con pétalos sobrepuestos,","como una flor.","Luis Vicente de Aguinaga","Es complicado explicarlo, pero William Carlos","Williams vio pasar una mosca mientras leía el","poema 465 de Emily Dickinson","Primero","¿Cuántos años tenías","cuando supiste que Williams era nieto","de una mujer llamada","Emily Dickenson o Dickinson?","Fue la misma que, poco antes","de morir, dijo estar harta","de los árboles, que le parecían","unas cosas borrosas.","Le había dicho, ya estando ella","muy enferma: “Déjame llevarte","al hospital y, cuando te mejores,","puedes hacer lo que tú quieras.”","Ella le respondió sonriendo: “¡Claro!","[…]"],"src":"Hay algo urgente (WCW)","pri":1},{"poet":"Luis Vicente De Aguinaga","title":"Y Después Hago Yo Lo Que Se Me Antoje","lines":["a mí.” No es casi nada, pero tiene gracia","que lo haya dicho llamándose como se llamaba.","Entre tanto","Asís queda lejos,","pero no mucho.","¿Cuánto vuela una mosca","en un día de ser mosca?","Eso sí queda lejos.","¿Habrá manera de no","ser ni moscas ni nada","y simplemente respirar","de nuevo?","Después","No puede haberse muerto","quien oye todavía","zumbar las moscas. La quietud","era la quietud","que hay entre dos azotes","de tormenta. En torno a mí","nadie lloraba, porque no","me había muerto","ni el rey estaba en jaque","todavía. Mis recuerdos","y la porción de mí que aún quedara","los di en herencia. Y fue","cuando pasó una mosca,","mitad azul, mitad zumbido","incierto, entre mis ojos","y la luz, pero cerraron la ventana","y entonces no vi más el ver.","Elia Osuna","El carbonero de Rutherford","A William Carlos Williams","El médico se sienta a la sombra del ciruelo.","Líneas luminosas se dibujan en el césped","y mientras las mira,","escribe.","En cada estrofa imprime la precisión del cirujano,","y en cada corte de escalpelo","adivina la ternura","de una palabra que todavía no nace.","Cierra los ojos y bajo sus párpados","[…]"],"src":"Hay algo urgente (WCW)","pri":1},{"poet":"Elia Osuna","title":"El Ave Silba Y El Poeta Hilvana:","lines":["un viaje,","una tumba,","el desayuno en la nevera,","y un séquito de mujeres","casi etéreas en sus batas blancas.","Nadie percibe en dónde canta el carbonero,","y nadie sabe","las minucias que el poeta se imagina.","El ave mira al hombre,","el hombre escucha al ave","y en el trino,","palpita el ritmo de sus versos.","El sicomoro: carta póstuma","Alguna vez fue joven","el árbol que talaron hoy.","Alguna vez erguido","en su esquina de barrio","alzaba la vista","sobre cables y tejados.","El árbol que talaron hoy","era frondoso y verde,","de corteza fiera","y sombra generosa.","Así como se agota el agua en el desierto,","se agotaron las raíces de abrazar la tierra.","Y sus ramas,","extendidas como cuernos por encima de la copa,","envejecieron rson","i","De noche, enfundados con cobijas","que fueron y ahora ya no, perros ladran.","Perros en protesta.","Les da lo mismo esta o aquella ley.","Se ponen a ladrar frente a letreros que gritan,","como megáfonos, como viejos cuidadores","de la nada metafísica:","no se permiten perros sueltos en este parque.","En fila (hay que ser ordenados en el desorden)","van a orinar ese letrero."],"src":"Hay algo urgente (WCW)","pri":1},{"poet":"Carlos Sánchez Ramírez","title":"Ii","lines":["¿Cómo hablar de la belleza en un parque?","¿Es bella la fuente que bebe,","una y otra vez, sus propias aguas? ¿Qué poema","cabe en un árbol sin defecto visible?","Transeúntes, no estará la belleza","entre esos árboles. Ni mucho menos","estará en los perros que, traídos","aquí por sus dueños, secan su pelaje.","La belleza, como la poesía, siempre está en otra parte.","Tal vez la belleza es el perro sin correa,","el perro que siempre está en ninguna parte.","iii","Fue tu perrito el que me mordió el año pasado.","Sí, y tú me lo mataste.","Un perro, la cabeza hacia atrás, bajo el agua,","las patas asoman en la superficie.","Tú conociste ese perro del que hablan, ¿o es otro","perro muerto el que no te deja dormir?","Me mordió tres veces. Vinieron y se lo llevaron","y lo mataron. Nunca le hizo daño a nadie. Escuchas.","El año pasado llevabas su mierda en la suela del zapato.","Por más que zacate y jabón, jamás volvió a estar limpia.","La luz no deja de ser luz por nimiedades, te dijiste","para que el día siguiera con lo suyo y tú con lo tuyo.","Teléfono.","Murió el amigo más alegre y sano. Razón desconocida.","La luz no deja de ser luz por nimiedades, aseguró el","","vecino.","Último informe: Un perro muerto gira sobre el agua.","En esa misma bebió antes el reflejo de los árboles."],"src":"Hay algo urgente (WCW)","pri":1},{"poet":"Carlos Sánchez Ramírez","title":"Jazmín Cano","lines":["Descenso 1.1","El todo-amor que tú eres; el todo-conocedor que yo traía.","A ti, existas o no, dedico esta obra dorna un aparador","para el niño bueno,","un juguete descompuesto","Este dolor que se muele","como pastillas en un mortero","y arroja toneladas de sargazo","que estorba a los turistas","que afea las playas","un dolor reborujado","una tristeza mansa,","bailarina","de ojos que se llenan de agua","pero no desbordan el lagrimal","un dolor justo","como zapato que aprieta","los últimos dos dedos","para que no me vaya","lejos como quisiera","Me arrincono yo mismo","no protesto como forma de protesta","me convenzo de que no queda mucho","para que esta obra de teatro termine","que ya pagué boleto,","que no me puedo bajar del escenario","para llevarme al yo espectador que me","contempla con una cara de asco","porque así es esto.","Óscar","Cuando yo era un niño no muy alto","Óscar era enorme y de ojos grandes,","protegidos por violáceas ojeras.","Los hombros altivos","custodiaban una joroba prominente.","[…]"],"src":"Hay algo urgente (WCW)","pri":1},{"poet":"Erwin Limón","title":"Quizá Aún Te Sacudirás","lines":["como un árbol","cuando mis labios alcancen","tu vientre.","Los asqueles siguen tu rastro","en esa pared derruida,","son como las tildes vivas","que liberas de tu boca.","¿Dónde quedaron la voz del escribano","que vuela y canta,","las amapolas","que antes subían","por las hendiduras de la tierra","y los dioses","que no resistieron?","Ya todo es humo y viento.","¿No te das cuenta","que tu voz es un sahumerio","dejado atrás?","Solo nos queda la ceniza,","soplar el polvo","y las huellas de una perdiz","que alguna vez cortejó","a las diosas.","Crecen lilas salvajes","entre las piedras del altar","donde parto mi trozo de pan","y la sangre malva de algún poeta","se pierde seca entre la tierra.","Quién salvará a tu hija","Casiopea","ya no queda nadie.","El mar se ha llenado de silencio","entre los corales que crecen","en la leche fría de tu pecho.","El mar es un niño tendido","en espera de su madre.","Las aguas del abismo","cerraron tu matriz,","la luz mengua.","Aletheia","de const START=new Date(2026,5,18), END=new Date(2027,5,18);
const TOTAL=Math.round((END-START)/86400000)+1;  // 366
const DIAS=["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
const MES=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
function hash(n){let x=(n+1)*2654435761>>>0;x^=x>>>15;x=(x*2246822519)>>>0;x^=x>>>13;x=(x*3266489917)>>>0;x^=x>>>16;return x>>>0;}
function seededShuffle(arr,seed){const a=arr.slice();let s=seed>>>0;const r=()=>{s^=s<<13;s^=s>>>17;s^=s<<5;return (s>>>0)/4294967296;};
  for(let i=a.length-1;i>0;i--){const j=Math.floor(r()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ---- One UNIQUE poem per day for all 366 days, no repeats.
   Priority poems (contemporary anthologies) are placed first so the year
   opens with them; the rest follow. Deterministic: a given date is fixed. ---- */
const PRI=POEMS.map((p,i)=>i).filter(i=>POEMS[i].pri===1);
const SEC=POEMS.map((p,i)=>i).filter(i=>POEMS[i].pri!==1);
function buildSchedule(){
  let order=seededShuffle(PRI,1001).concat(seededShuffle(SEC,2002)); // priority first
  return order.slice(0,TOTAL); // 381 available >= 366; every day unique
}
const SCHEDULE=buildSchedule();
const poemForDay=i=>POEMS[SCHEDULE[i]];

function buildCanon(i){
  const SZ=300,G=6,cell=SZ/G,h=hash(i);
  const rng=(seed=>{let s=seed>>>0;return ()=>{s^=s<<13;s^=s>>>17;s^=s<<5;return (s>>>0)/4294967296;}})(h);
  const ink="#0a0a0a";let svg=`<svg viewBox="0 0 ${SZ} ${SZ}" xmlns="http://www.w3.org/2000/svg"><rect width="${SZ}" height="${SZ}" fill="#f6f5f1"/>`;
  for(let y=0;y<G;y++)for(let x=0;x<G;x++){const r=rng(),px=x*cell,py=y*cell;
    if(r<0.42){svg+=`<rect x="${px}" y="${py}" width="${cell}" height="${cell}" fill="${ink}"/>`;}
    else if(r<0.66){const rot=Math.floor(rng()*4)*90;svg+=`<g transform="translate(${px+cell/2},${py+cell/2}) rotate(${rot})"><path d="M ${-cell/2} ${-cell/2} L ${cell/2} ${-cell/2} A ${cell} ${cell} 0 0 1 ${-cell/2} ${cell/2} Z" fill="${ink}"/></g>`;}
    else if(r<0.80){if(rng()<0.5)svg+=`<path d="M ${px} ${py} L ${px+cell} ${py} L ${px} ${py+cell} Z" fill="${ink}"/>`;else svg+=`<path d="M ${px+cell} ${py} L ${px+cell} ${py+cell} L ${px} ${py+cell} Z" fill="${ink}"/>`;}
  }
  svg+=`<g stroke="${ink}" stroke-width="0.5" opacity="0.18">`;
  for(let k=1;k<G;k++){svg+=`<line x1="${k*cell}" y1="0" x2="${k*cell}" y2="${SZ}"/><line x1="0" y1="${k*cell}" x2="${SZ}" y2="${k*cell}"/>`;}
  return svg+`</g></svg>`;
}
const fmtDate=d=>`${DIAS[d.getDay()]} ${d.getDate()} ${MES[d.getMonth()]} ${d.getFullYear()}`;
const pad3=n=>String(n).padStart(3,"0");
let cur=0;
function render(){
  if(cur<0)cur=0; if(cur>TOTAL-1)cur=TOTAL-1;
  const d=new Date(START); d.setDate(d.getDate()+cur);
  const p=poemForDay(cur);
  document.getElementById("idx").textContent=`Día ${pad3(cur+1)} / ${TOTAL}`;
  document.getElementById("dstr").textContent=fmtDate(d);
  document.getElementById("poet").textContent=p.poet;
  document.getElementById("srctxt").textContent=p.src;
  const dot=document.getElementById("srcdot"); dot.className="dot"+(p.pri===1?"":" hollow");
  document.getElementById("title").textContent=p.title;
  const body=document.getElementById("body"); body.innerHTML="";
  p.lines.forEach(line=>{ if(line.trim()===""){const s=document.createElement("div");s.className="stz";body.appendChild(s);}
    else{const ln=document.createElement("div");ln.textContent=line;body.appendChild(ln);} });
  document.getElementById("canonHolder").innerHTML=buildCanon(cur);
  document.getElementById("canonN").textContent=String(cur+1).padStart(2,"0");
  document.getElementById("canonCode").textContent=`${(hash(cur)%9000+1000)}`;
  const pk=document.getElementById("picker");
  pk.value=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
const dayFromDate=o=>Math.max(0,Math.min(TOTAL-1,Math.round((o-START)/86400000)));
document.getElementById("prev").onclick=()=>{cur--;render();};
document.getElementById("next").onclick=()=>{cur++;render();};
document.getElementById("todayBtn").onclick=()=>{const n=new Date();n.setHours(0,0,0,0);cur=(n<START)?0:(n>END)?TOTAL-1:dayFromDate(n);render();};
const field=document.getElementById("dayField"),picker=document.getElementById("picker");
const openPicker=()=>{picker.showPicker?picker.showPicker():(picker.focus(),picker.click());};
field.onclick=openPicker; field.onkeydown=e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();openPicker();}};
picker.onchange=()=>{if(!picker.value)return;const[Y,M,D]=picker.value.split("-").map(Number);cur=dayFromDate(new Date(Y,M-1,D));render();};
document.addEventListener("keydown",e=>{if(e.target===picker)return;if(e.key==="ArrowLeft"){cur--;render();}if(e.key==="ArrowRight"){cur++;render();}});
document.getElementById("footstats").textContent=`${TOTAL} días · ${TOTAL} poemas únicos · ${PRI.length} de antologías contemporáneas`;
(function init(){const n=new Date();n.setHours(0,0,0,0);cur=(n>=START&&n<=END)?dayFromDate(n):0;render();})();
</script>
